. Đột biến vi điểm nhỏ"],"correct":2,"explanation":"Đáp án đúng là: Tái tổ hợp gen tạo chủng hoàn toàn mới Vì: Shift là tái tổ hợp gen HA/NA giữa hai chủng.","reference":"Mục 5.1.10"},{"id":230,"text":"Phương pháp chẩn đoán Bluetongue nhanh và chính xác nhất hiện nay là gì?","answers":["A. Kết tủa khuếch tán","B. ELISA","C. RT-PCR","D. Nuôi cấy phôi gà"],"correct":2,"explanation":"Đáp án đúng là: RT-PCR Vì: RT-PCR định danh virus nhanh, nhạy cao Tham khảo: Mục II.2.6.2 Bài 5","reference":""},{"id":231,"text":"Loài động vật nào là ổ chứa chính của Brucella melitensis?","answers":["A. Chó","B. Dê và cừu","C. Bò","D. Lợn"],"correct":1,"explanation":"Đáp án đúng là: Dê và cừu Vì: Brucella melitensis chủ yếu ở dê và cừu.","reference":"Mục 3.2.1"},{"id":232,"text":"Kháng sinh nhóm nào thường dùng điều trị CRD?","answers":["A. Tetracycline","B. Penicillin","C. Sulfonamide đơn độc","D. Beta-lactamase inhibitors"],"correct":0,"explanation":"Đáp án đúng là: Tetracycline Vì: M. gallisepticum nhạy với tetracycline, kháng penicillin","reference":"Mục 10.8"},{"id":233,"text":"Phương pháp chẩn đoán đặc hiệu Marek’s là gì?","answers":["A. ELISA huyết thanh học","B. Hiển vi quang học","C. PCR phát hiện gene virus MDV","D. Nuôi cấy tế bào"],"correct":2,"explanation":"Đáp án đúng là: PCR phát hiện gene virus MDV Vì: PCR phát hiện gene đặc hiệu của MDV từ mô đích (lách, thần kinh…).","reference":"Mục 4.6.3"},{"id":234,"text":"H. paragallinarum có hình thái nào sau đây?","answers":["A. Song cầu khuẩn Gram âm","B. Trực khuẩn dài, Gram dương","C. Cầu khuẩn Gram dương","D. Trực khuẩn ngắn, Gram âm"],"correct":3,"explanation":"Đáp án đúng là: Trực khuẩn ngắn, Gram âm Vì: H. paragallinarum là trực khuẩn ngắn, Gram âm, không di động","reference":"Mục 9.2.1"},{"id":235,"text":"Chỉ số ICPI dùng để đánh giá điều gì ở NDV?","answers":["A. Độ độc khi tiêm não gà con 1 ngày tuổi","B. Khả năng nuôi cấy trên MDCK","C. Tốc độ ngưng kết hồng cầu","D. Khả năng tạo vỏ"],"correct":0,"explanation":"Đáp án đúng là: Độ độc khi tiêm não gà con 1 ngày tuổi Vì: ICPI đo tỷ lệ chết khi tiêm não gà sơ sinh.","reference":"Mục 5.2.5"},{"id":236,"text":"Gà dễ mắc Gumboro nhất ở độ tuổi nào?","answers":["A. Trên 8 tuần tuổi","B. 3–6 tuần","C. Trên 12 tuần","D. 1–3 ngày tuổi"],"correct":1,"explanation":"Đáp án đúng là: 3–6 tuần Vì: Gà từ 3–6 tuần tuổi nhạy cảm nhất với IBDV.","reference":"Mục 3.3.2"},{"id":237,"text":"Phương pháp chẩn đoán khẳng định S. suis là gì?","answers":["A. ELISA kháng thể","B. Nuôi cấy & xác định serotyp","C. Xét nghiệm huyết thanh","D. Hiển vi điện tử"],"correct":1,"explanation":"Đáp án đúng là: Nuôi cấy & xác định serotyp Vì: Nuôi cấy phân lập và xác định serotyp là tiêu chuẩn vàng.","reference":"Mục 9.6.1"},{"id":238,"text":"Phương pháp RT-PCR chẩn đoán PRRSV tìm gì?","answers":["A. Tế bào hoại tử","B. ARN virus","C. Kháng thể","D. Thể bóng nước"],"correct":1,"explanation":"Đáp án đúng là: ARN virus Vì: RT-PCR phát hiện ARN","reference":"Mục 3.6"},{"id":239,"text":"Phân loại Salmonella theo Kauffmann-White dựa vào kháng nguyên nào?","answers":["A. P và Q","B. K và S","C. M và N","D. O, H và Vi"],"correct":3,"explanation":"Đáp án đúng là: O, H và Vi Vì: Hệ thống Kauffmann-White dùng kháng nguyên thân O, lông H và vỏ Vi.","reference":"Mục 10.2.1"},{"id":240,"text":"Kháng sinh thường dùng dự phòng S. suis trong thức ăn là?","answers":["A. Penicillin G","B. Erythromycin","C. Ceftriaxon","D. Tetracyclin"],"correct":0,"explanation":"Đáp án đúng là: Penicillin G Vì: Penicillin G thường được trộn thức ăn để phòng bệnh.","reference":"Mục 9.7.3"},{"id":241,"text":"Kháng huyết thanh dùng để:","answers":["A. Khử khuẩn dụng cụ","B. Thay thế vacxin nhược độc","C. Gây miễn dịch chủ động lâu dài","D. Tạo miễn dịch thụ động nhanh, ngắn hạn"],"correct":3,"explanation":"Đáp án đúng là: Tạo miễn dịch thụ động nhanh, ngắn hạn Vì: Kháng huyết thanh tạo kháng thể sẵn, có tác dụng ngay.","reference":"Mục 4.2.3"},{"id":242,"text":"Streptococcus suis thuộc chi nào?","answers":["A. Enterococcus","B. Listeria","C. Staphylococcus","D. Streptococcus"],"correct":3,"explanation":"Đáp án đúng là: Streptococcus Vì: S. suis là một loài trong chi Streptococcus.","reference":"Mục 9.1.1"},{"id":243,"text":"Bệnh tích đại thể ở tụ huyết trùng trâu bò thường thấy điều gì?","answers":["A. Tụ huyết đỏ sẫm dưới da","B. U hạt da","C. Viêm loét da","D. Xơ hóa mô"],"correct":0,"explanation":"Đáp án đúng là: Tụ huyết đỏ sẫm dưới da Vì: Mô dưới da tụ huyết, xuất huyết thành mảng rõ ràng","reference":"Mục 3.5"},{"id":244,"text":"Phương pháp chẩn đoán PEDV nhanh nhất hiện nay?","answers":["A. RT-PCR","B. ELISA","C. Nuôi cấy in vitro","D. Miễn dịch huỳnh quang"],"correct":0,"explanation":"Đáp án đúng là: RT-PCR Vì: RT-PCR nhạy và đặc hiệu","reference":"Mục 4.6"},{"id":245,"text":"Vaccine Neethling dùng phòng LSD cần nhắc lại định kỳ sau bao lâu?","answers":["A. 2 năm","B. 6 tháng","C. 1 năm","D. 3 tháng"],"correct":2,"explanation":"Đáp án đúng là: 1 năm Vì: Miễn dịch kéo dài ~12 tháng, cần tiêm nhắc hàng năm","reference":"Mục 4.7"},{"id":246,"text":"Tác nhân gây PRRS là virus thuộc họ nào?","answers":["A. Arteriviridae","B. Coronaviridae","C. Togaviridae","D. Flaviviridae"],"correct":0,"explanation":"Đáp án đúng là: Arteriviridae Vì: PRRSV là Arterivirus","reference":"Mục 3.1"},{"id":247,"text":"LT virus bất hoạt ở 56 °C trong bao lâu?","answers":["A. 24 giờ","B. 30 phút","C. 1 giờ","D. 5 phút"],"correct":2,"explanation":"Đáp án đúng là: 1 giờ Vì: LTV nhạy nhiệt, cần 1 giờ để bất hoạt ở 56 °C.","reference":"Mục 6.2.4"},{"id":248,"text":"Thách thức lớn nhất trong kiểm soát PRRS là gì?","answers":["A. Tính biến đổi cao và thoát miễn dịch","B. Nuôi cấy khó","C. Kháng kháng sinh","D. Thiếu vacxin"],"correct":0,"explanation":"Đáp án đúng là: Tính biến đổi cao và thoát miễn dịch Vì: PRRSV đột biến nhanh","reference":"Mục 3.8"},{"id":249,"text":"Cơ chế sinh bệnh của tụ huyết trùng bắt đầu như thế nào?","answers":["A. Qua không khí","B. Vi khuẩn xâm nhập qua vết xây xát niêm mạc ruột","C. Qua da lành","D. Qua tiếp xúc với sữa"],"correct":1,"explanation":"Đáp án đúng là: Vi khuẩn xâm nhập qua vết xây xát niêm mạc ruột Vì: Xâm nhập qua ổ xây xát niêm mạc ruột rồi vào máu","reference":"Mục 3.3.3"},{"id":250,"text":"Biến đổi vi thể đặc trưng trong xoang mũi gà IC gồm?","answers":["A. Tróc, phân hủy biểu mô & thâm nhiễm BC trung tính","B. Tăng sinh lympho nang","C. Tăng sản biểu mô nhiều lớp","D. Hoại tử vùng dưới niêm mạc"],"correct":0,"explanation":"Đáp án đúng là: Tróc, phân hủy biểu mô & thâm nhiễm BC trung tính Vì: Xoang mũi viêm cấp có tróc biểu mô & thâm nhiễm BC trung tính","reference":"Mục 9.5.2"},{"id":251,"text":"NDV nhóm velogenic có MDT (Mean Death Time) nhỏ hơn bao nhiêu giờ?","answers":["A. < 60 giờ","B. > 90 giờ","C. 30–40 giờ","D. 60–90 giờ"],"correct":0,"explanation":"Đáp án đúng là: < 60 giờ Vì: Velogenic gây chết phôi nhanh < 60 giờ.","reference":"Mục 5.2.6"},{"id":252,"text":"Phương pháp chẩn đoán CSF nhanh, độ nhạy cao nhất?","answers":["A. Nuôi cấy trên phôi gà","B. RT-PCR","C. Miễn dịch huỳnh quang trực tiếp","D. ELISA cạnh tranh"],"correct":1,"explanation":"Đáp án đúng là: RT-PCR Vì: RT-PCR đặc hiệu, nhạy cao","reference":"Mục 1.6.3"},{"id":253,"text":"Cơ chế sinh bệnh chính của PCV2?","answers":["A. Tăng tiết histamin","B. Ức chế ion","C. Tấn công tế bào thần kinh","D. Giảm sản xuất interferon"],"correct":3,"explanation":"Đáp án đúng là: Giảm sản xuất interferon Vì: PCV2 gây suy giảm miễn dịch qua ức chế tiết interferon, thúc đẩy bệnh lý toàn thân.","reference":"Mục 5.2.4"},{"id":254,"text":"Đường kính trung bình của virion cúm lợn khoảng bao nhiêu?","answers":["A. 80–120 nm","B. 10–20 nm","C. 200–300 nm","D. 20–40 nm"],"correct":0,"explanation":"Đáp án đúng là: 80–120 nm Vì: Virion cúm lợn hình cầu, đường kính 80–120 nm.","reference":"Mục 7.2.2"},{"id":255,"text":"Virus Marek’s thuộc nhóm nào trong Herpesviridae?","answers":["A. Betaherpesvirinae","B. Lentivirus","C. Alphaherpesvirinae","D. Gammaherpesvirinae"],"correct":2,"explanation":"Đáp án đúng là: Alphaherpesvirinae Vì: MDV thuộc nhóm alpha gây bệnh tăng sinh tế bào lympho ở gà.","reference":"Mục 4.2.1"},{"id":256,"text":"Tác nhân chính gây bệnh viêm mũi truyền nhiễm ở gà là vi khuẩn nào?","answers":["A. Pasteurella multocida","B. Haemophilus paragallinarum","C. Escherichia coli","D. Mycoplasma gallisepticum"],"correct":1,"explanation":"Đáp án đúng là: Haemophilus paragallinarum Vì: Bệnh IC do H. paragallinarum gây ra","reference":"Mục 9.1"},{"id":257,"text":"Bộ gen của PCV2 là gì?","answers":["A. ARN sợi đơn","B. ARN sợi kép","C. ADN sợi đơn vòng, ~1.767 kb","D. ADN sợi kép"],"correct":2,"explanation":"Đáp án đúng là: ADN sợi đơn vòng, ~1.767 kb Vì: PCV2 mang gen ADN vòng đơn; độ dài ~1.7 kb.","reference":"Mục 5.1.2"},{"id":258,"text":"Khái niệm “độc lực” (virulence) của mầm bệnh được hiểu là:","answers":["A. Số lượng mầm bệnh cần thiết để gây bệnh","B. Khả năng xâm nhập, sinh sản và tiết độc tố trong mô ký chủ","C. Enzym ngoại bào phá mô liên kết","D. Khả năng sinh sản trong môi trường ngoại cảnh"],"correct":1,"explanation":"Đáp án đúng là: Khả năng xâm nhập, sinh sản và tiết độc tố trong mô ký chủ Vì: Độc lực là khả năng xâm nhập, sinh sản và tiết độc tố của mầm bệnh trong mô ký chủ.","reference":"Mục 1.1.2."},{"id":259,"text":"Ở 50 °C, S. suis có thể sống được bao lâu?","answers":["A. 2 giờ","B. 1 tuần","C. 15 phút","D. 24 giờ"],"correct":0,"explanation":"Đáp án đúng là: 2 giờ Vì: S. suis serotyp 2 sống được ~2 giờ ở 50 °C.","reference":"Mục 9.1.4"},{"id":260,"text":"Thời gian ủ bệnh cúm gia cầm thường là bao lâu?","answers":["A. 1–3 ngày","B. 7–10 ngày","C. 5–7 ngày","D. 10–14 ngày"],"correct":0,"explanation":"Đáp án đúng là: 1–3 ngày Vì: Cúm gà ủ bệnh 1–3 ngày.","reference":"Mục 5.1.5"},{"id":261,"text":"Bộ gen TGEV dài khoảng bao nhiêu?","answers":["A. 50 kb ADN sợi kép","B. 27–32 kb ARN sợi đơn","C. 1.7 kb ADN","D. 10 kb ARN sợi kép"],"correct":1,"explanation":"Đáp án đúng là: 27–32 kb ARN sợi đơn Vì: TGEV mang ARN sợi đơn dài ~27–32 kb, giống các coronavirus khác.","reference":"Mục 6.1.3"},{"id":262,"text":"Phương pháp chẩn đoán nhanh, nhạy cao nhất hiện nay cho FMD là gì?","answers":["A. Real-time PCR","B. ELISA","C. Nuôi cấy virus","D. IFA"],"correct":0,"explanation":"Đáp án đúng là: Real-time PCR Vì: Real-time PCR đặc hiệu và cho kết quả nhanh trong vài giờ Tham khảo: Mục I.1.6.2 Bài 5","reference":""},{"id":263,"text":"S. suis thường cư trú ở đâu trên lợn khỏe?","answers":["A. Cơ","B. Niêm mạc hô hấp trên, ruột, sinh dục","C. Máu","D. Da"],"correct":1,"explanation":"Đáp án đúng là: Niêm mạc hô hấp trên, ruột, sinh dục Vì: S. suis ký sinh ở niêm mạc đường hô hấp trên, tiêu hóa và sinh dục.","reference":"Mục 9.3.1"},{"id":264,"text":"Virus gây bệnh lở mồm long móng (FMD) thuộc họ nào?","answers":["A. Poxviridae","B. Reoviridae","C. Picornaviridae","D. Flaviviridae"],"correct":2,"explanation":"Đáp án đúng là: Picornaviridae Vì: FMDV là virus ARN thuộc Picornaviridae Tham khảo: Mục I.1.2.1 Bài 5","reference":""},{"id":265,"text":"Biện pháp vệ sinh phòng bệnh S. suis cơ bản là?","answers":["A. Dùng kháng sinh","B. Dùng vaccine","C. Phun khử trùng chuồng, tránh chồng lấn thú","D. Xạ trị"],"correct":2,"explanation":"Đáp án đúng là: Phun khử trùng chuồng, tránh chồng lấn thú Vì: Vệ sinh, khử trùng và quản lý chuồng trại tốt ngăn lây lan.","reference":"Mục 9.7.1"},{"id":266,"text":"Phân biệt DHV 1 và DHV 2 bằng phương pháp nào?","answers":["A. Nuôi cấy phôi","B. PCR chung","C. ELISA chung","D. Sequencing gene VP1"],"correct":3,"explanation":"Đáp án đúng là: Sequencing gene VP1 Vì: Đòi hỏi giải trình tự để phân biệt typ","reference":"Mục 7.5"},{"id":267,"text":"Triệu chứng điển hình của vịt mắc DHV 1 là gì?","answers":["A. Co giật, tư thế opisthotonus, bỏ ăn","B. Ho gà","C. Tiêu chảy nặng","D. Sưng chân"],"correct":0,"explanation":"Đáp án đúng là: Co giật, tư thế opisthotonus, bỏ ăn Vì: Vịt co giật, đầu ngửa cổ (Opisthotonus)","reference":"Mục 7.4"},{"id":268,"text":"Một bệnh truyền nhiễm thường tiến triển qua bao nhiêu thời kỳ cơ bản?","answers":["A. 2","B. 5","C. 4","D. 3"],"correct":2,"explanation":"Đáp án đúng là: 4 Vì: Bệnh truyền nhiễm gồm 4 giai đoạn: nung bệnh, khởi phát, toàn phát, kết thúc.","reference":"Mục 2.2.3"},{"id":269,"text":"Trong chẩn đoán IC, xét nghiệm HI dùng để phát hiện kháng thể nào?","answers":["A. Kháng thể kháng NDV","B. Kháng thể kháng M. gallisepticum","C. Kháng thể kháng H. paragallinarum","D. Kháng thể kháng E. coli"],"correct":2,"explanation":"Đáp án đúng là: Kháng thể kháng H. paragallinarum Vì: HI (Hemagglutination Inhibition) phát hiện kháng thể H. paragallinarum","reference":"Mục 9.6"},{"id":270,"text":"Đặc điểm chính của thời kỳ toàn phát là:","answers":["A. Chỉ có biến chứng, không có triệu chứng","B. Không có triệu chứng","C. Chỉ tồn tại độc tố trong cơ thể","D. Triệu chứng lâm sàng đầy đủ, giúp chẩn đoán"],"correct":3,"explanation":"Đáp án đúng là: Triệu chứng lâm sàng đầy đủ, giúp chẩn đoán Vì: Toàn phát là giai đoạn triệu chứng điển hình và biến chứng xuất hiện.","reference":"Mục 2.3.3"},{"id":271,"text":"Triệu chứng tiêu hóa CSF bao gồm?","answers":["A. Tiêu chảy nặng có khi kèm máu","B. Ho khan","C. Nôn mửa","D. Suyễn phổi"],"correct":0,"explanation":"Đáp án đúng là: Tiêu chảy nặng có khi kèm máu Vì: CSF gây tiêu chảy nặng","reference":"Mục 1.4"},{"id":272,"text":"Enzym hyaluronidaza được xếp vào nhóm nào?","answers":["A. Độc tố","B. Giáp mô","C. Enzym nội bào","D. Yếu tố lan truyền"],"correct":3,"explanation":"Đáp án đúng là: Yếu tố lan truyền Vì: Hyaluronidaza phân hủy axit hyaluronic, giúp vi khuẩn lan tràn; là yếu tố lan truyền.","reference":"Mục 1.1.3."},{"id":273,"text":"Điều trị đặc hiệu cho DHV 1 là gì?","answers":["A. Ribavirin","B. Không có thuốc điều trị đặc hiệu","C. Penicillin","D. Acyclovir"],"correct":1,"explanation":"Đáp án đúng là: Không có thuốc điều trị đặc hiệu Vì: Không thuốc đặc hiệu, chỉ hỗ trợ điều trị","reference":"Mục 7.7"},{"id":274,"text":"Vaccine cúm lợn hiện có trên thị trường thường nhắm vào chủng nào?","answers":["A. H7N9","B. H2N2","C. H1N1 và H3N2","D. H5N1"],"correct":2,"explanation":"Đáp án đúng là: H1N1 và H3N2 Vì: Vaccine cúm lợn thường phối hợp H1N1 và H3N2.","reference":"Mục 7.7.2"},{"id":275,"text":"Giáp mô ở một số vi khuẩn giúp chúng:","answers":["A. Tăng sản xuất nội độc tố","B. Tiết ngoại độc tố","C. Phá hủy mô liên kết","D. Né tránh sự thực bào của tế bào ký chủ"],"correct":3,"explanation":"Đáp án đúng là: Né tránh sự thực bào của tế bào ký chủ Vì: Giáp mô (capsule) cản trở thực bào, bảo vệ vi khuẩn khỏi miễn dịch.","reference":"Mục 1.1.3."},{"id":276,"text":"Dựa trên cơ chế gây bệnh của vi sinh vật, biện pháp phòng chống quan trọng nhất là:","answers":["A. Chỉ khử khuẩn môi trường","B. Tiêm vaccin cho động vật và người để ngăn ngừa xâm nhập mầm bệnh","C. Tăng số lượng mầm bệnh trong cơ thể","D. Giảm độc lực mầm bệnh thông qua diệt sạch ký chủ"],"correct":1,"explanation":"Đáp án đúng là: Tiêm vaccin cho động vật và người để ngăn ngừa xâm nhập mầm bệnh Vì: Vaccin kích thích miễn dịch, ngăn chặn mầm bệnh xâm nhập và sinh trưởng.","reference":"Mục 1"},{"id":277,"text":"PMWS thường xảy ra ở lợn độ tuổi nào?","answers":["A. > 1 năm","B. < 1 tháng","C. 6–8 tháng","D. 2–4 tháng tuổi"],"correct":3,"explanation":"Đáp án đúng là: 2–4 tháng tuổi Vì: Triệu chứng PMWS vốn xuất hiện ở giai đoạn sau cai sữa (2–4 tháng).","reference":"Mục 5.2.2"},{"id":278,"text":"Bội nhiễm khác với tái nhiễm ở điểm:","answers":["A. Tái nhiễm là lây từ động vật lành mang trùng","B. Bội nhiễm không có triệu chứng","C. Tái nhiễm chỉ xảy ra ở người","D. Bội nhiễm là mầm bệnh thứ hai xâm nhập trong lúc cơ thể đang bệnh"],"correct":3,"explanation":"Đáp án đúng là: Bội nhiễm là mầm bệnh thứ hai xâm nhập trong lúc cơ thể đang bệnh Vì: Bội nhiễm xảy ra khi mầm bệnh thứ hai xâm nhập vào cơ thể đang nhiễm bệnh.","reference":"Mục 1.1.5"},{"id":279,"text":"Mức khỏi bệnh “hoàn toàn về lâm sàng và xét nghiệm” nghĩa là:","answers":["A. Chỉ hết triệu chứng lâm sàng","B. Hết triệu chứng, hết xét nghiệm dương tính và không thải mầm bệnh","C. Chỉ hết xét nghiệm dương tính","D. Không còn triệu chứng lâm sàng nhưng vẫn mang mầm bệnh"],"correct":1,"explanation":"Đáp án đúng là: Hết triệu chứng, hết xét nghiệm dương tính và không thải mầm bệnh Vì: Khỏi hoàn toàn gồm cả lâm sàng, xét nghiệm và không còn bài xuất mầm bệnh.","reference":"Mục 2.3.4"},{"id":280,"text":"“Con nghi lây” trong ổ dịch là:","answers":["A. Con đã khỏi bệnh hoàn toàn","B. Con tiếp xúc với ổ dịch hoặc mầm bệnh ở ngoại cảnh","C. Chỉ con mang trùng mãn tính","D. Động vật không liên quan ổ dịch"],"correct":1,"explanation":"Đáp án đúng là: Con tiếp xúc với ổ dịch hoặc mầm bệnh ở ngoại cảnh Vì: Những con tiềm ẩn khả năng nhiễm do tiếp xúc.","reference":"Mục 4.3.1"},{"id":281,"text":"Yếu tố thiên nhiên không gồm:","answers":["A. Khí hậu","B. Kinh tế – xã hội","C. Đất đai","D. Thời tiết"],"correct":1,"explanation":"Đáp án đúng là: Kinh tế – xã hội Vì: Kinh tế – xã hội là yếu tố xã hội, không phải thiên nhiên.","reference":"Mục 3.3.1"},{"id":282,"text":"Giai đoạn tiềm ẩn trong CRD kéo dài khoảng bao lâu?","answers":["A. 5–7 ngày","B. 1–3 ngày","C. 12–21 ngày","D. 2–4 tuần"],"correct":2,"explanation":"Đáp án đúng là: 12–21 ngày Vì: Trước khi kháng thể xuất hiện kéo dài 12–21 ngày","reference":"Mục 10.3.2"},{"id":283,"text":"Bệnh dại được xác định trong phòng thí nghiệm bằng cách nào?","answers":["A. Nuôi cấy tế bào và FAT","B. Đếm bạch cầu","C. Tính độ pH máu","D. Xét nghiệm đường huyết"],"correct":0,"explanation":"Đáp án đúng là: Nuôi cấy tế bào và FAT Vì: Bệnh dại xác định bằng nuôi cấy tế bào kết hợp phản ứng huỳnh quang FAT.","reference":"Mục 1.6"},{"id":284,"text":"Virus gây bệnh dịch tả lợn cổ điển (CSF) thuộc họ nào?","answers":["A. Poxviridae","B. Flaviviridae","C. Asfarviridae","D. Herpesviridae"],"correct":1,"explanation":"Đáp án đúng là: Flaviviridae Vì: Đúng họ CSFV thuộc Flaviviridae","reference":"Mục 1.2"},{"id":285,"text":"Thời gian bảo hộ sau tiêm 2 mũi vaccine cúm lợn là khoảng bao lâu?","answers":["A. 1 tuần","B. 1 tháng","C. 6–8 tháng","D. 2 năm"],"correct":2,"explanation":"Đáp án đúng là: 6–8 tháng Vì: Vaccine cúm lợn thường bảo hộ 6–8 tháng sau 2 mũi.","reference":"Mục 7.7.2"},{"id":286,"text":"Virus dại có thể tồn tại bao lâu trong não động vật ở 4°C?","answers":["A. Không tồn tại","B. 1 giờ","C. 1 năm","D. Vài tuần"],"correct":3,"explanation":"Đáp án đúng là: Vài tuần Vì: Virus dại có thể tồn tại vài tuần trong não động vật ở 4°C.","reference":"Mục 1.2"},{"id":287,"text":"Tổn thương da “đóng dấu” ở thể cấp tính của Swine Erysipelas có đặc điểm gì?","answers":["A. Mụn nước nhỏ","B. Ban đỏ lan tỏa","C. Loét sâu","D. Vết đỏ vuông/đa giác, ấn mất, thả ra đỏ lại"],"correct":3,"explanation":"Đáp án đúng là: Vết đỏ vuông/đa giác, ấn mất, thả ra đỏ lại Vì: Dấu đóng dấu lợn là dát đỏ giới hạn rõ, mất khi ấn rồi đỏ lại.","reference":"Mục 8.4"},{"id":288,"text":"Penicillin tác dụng tốt trên xoắn khuẩn do:","answers":["A. Ức chế tiểu thể","B. Gắn vào ribosome","C. Tác động DNA","D. Cơ chế phá vỡ thành tế bào"],"correct":3,"explanation":"Đáp án đúng là: Cơ chế phá vỡ thành tế bào Vì: Penicillin phá vỡ thành vi khuẩn.","reference":"Mục 4.2.3"},{"id":289,"text":"Vaccine Circovac dùng cho đối tượng nào?","answers":["A. Lợn thịt trưởng thành","B. Lợn con < 1 tuần","C. Lợn nái và lợn hậu bị","D. Lợn hoang dã"],"correct":2,"explanation":"Đáp án đúng là: Lợn nái và lợn hậu bị Vì: Circovac (inactivated PCV2) dùng chủ yếu để tạo kháng thể cho lợn nái và lợn hậu bị trước khi sinh con.","reference":"Mục 5.1.7"},{"id":290,"text":"Đường xâm nhập chủ yếu của PCV2?","answers":["A. Muỗi đốt","B. Thức ăn","C. Chuyển gen","D. Miệng–mũi (phân, tinh dịch)"],"correct":3,"explanation":"Đáp án đúng là: Miệng–mũi (phân, tinh dịch) Vì: PCV2 lây qua tiếp xúc với phân, bĩu, tinh dịch; miệng–mũi là cửa ngõ xâm nhập chính.","reference":"Mục 5.1.5"},{"id":291,"text":"Ở 56 °C, virus cúm gia cầm mất độc tính sau bao lâu?","answers":["A. 10 phút","B. 24 giờ","C. Vài phút","D. 1 giờ"],"correct":2,"explanation":"Đáp án đúng là: Vài phút Vì: Virus cúm rất nhạy nhiệt, 56 °C bất hoạt trong vài phút.","reference":"Mục 5.1.12"},{"id":292,"text":"Phương pháp chẩn đoán huyết thanh học ưu tiên cho EDS là?","answers":["A. Nuôi cấy virus","B. ELISA toàn phần","C. HI (hemagglutination inhibition)","D. PCR phát hiện gene"],"correct":2,"explanation":"Đáp án đúng là: HI (hemagglutination inhibition) Vì: HI dễ thực hiện, đặc hiệu cho anticapsid của EDSV.","reference":"Mục 5.6"},{"id":293,"text":"CSFV là virus ADN hay ARN?","answers":["A. ADN sợi đơn","B. ADN mạch kép","C. ARN sợi kép","D. ARN sợi đơn"],"correct":3,"explanation":"Đáp án đúng là: ARN sợi đơn Vì: CSFV là Pestivirus ARN sợi đơn","reference":"Mục 1.2.1"},{"id":294,"text":"Nguyên tắc “phát hiện sớm” đối với con ốm là:","answers":["A. Chờ xuất hiện triệu chứng điển hình","B. Chỉ xét nghiệm khi nhiều con mắc","C. Xác định và cách ly ngay khi nghi ngờ","D. Đợi kết quả huyết thanh đối chiếu"],"correct":2,"explanation":"Đáp án đúng là: Xác định và cách ly ngay khi nghi ngờ Vì: Thà chẩn đoán nhầm còn hơn bỏ sót dịch.","reference":"Mục 4.3.2"},{"id":295,"text":"Dịch tễ PRRS tại Việt Nam, lợn dễ nhiễm chủ yếu ở đâu?","answers":["A. Hệ thống chăn nuôi mật độ cao","B. Chuồng lạnh","C. Nuôi thả rông","D. Chuồng đơn lẻ"],"correct":0,"explanation":"Đáp án đúng là: Hệ thống chăn nuôi mật độ cao Vì: Mật độ cao tăng lây lan","reference":"Mục 3.5"},{"id":296,"text":"Salmonella nhuộm màu Gram cho kết quả?","answers":["A. Không nhuộm được","B. Biến đổi","C. Âm (–)","D. Dương (+)"],"correct":2,"explanation":"Đáp án đúng là: Âm (–) Vì: Salmonella là trực khuẩn Gram âm.","reference":"Mục 10.2.2"},{"id":297,"text":"Khâu đầu tiên trong sinh dịch là gì?","answers":["A. Nhân tố trung gian truyền bệnh","B. Nguồn bệnh","C. Môi trường ngoài","D. Động vật thụ cảm"],"correct":1,"explanation":"Đáp án đúng là: Nguồn bệnh Vì: Nguồn bệnh là nơi mầm bệnh khu trú và sinh sôi.","reference":"Mục 3.1.1"},{"id":298,"text":"Để phòng bệnh, tiêm vacxin cho gia súc thường dùng đường:","answers":["A. Tiêm dưới da","B. Uống qua thức ăn","C. Đắp thuốc lên da","D. Hít khí dung"],"correct":0,"explanation":"Đáp án đúng là: Tiêm dưới da Vì: Lợn tiêm dưới da gốc tai; trâu bò tiêm dưới da cổ.","reference":"Mục 4.2.3"},{"id":299,"text":"Trong HI, virus EDS có hịu lực ngưng kết RBC của loài nào?","answers":["A. Gia cầm (gà, vịt, ngỗng)","B. Lợn","C. Chó","D. Chuột"],"correct":0,"explanation":"Đáp án đúng là: Gia cầm (gà, vịt, ngỗng) Vì: EDSV gây HA nhiều loài gia cầm nhưng không gây HA ở động vật có vú.","reference":"Mục 5.2.3"},{"id":300,"text":"Gene nào thường được sử dụng để thiết kế mồi PCR phát hiện IBDV?","answers":["A. VP2","B. S1","C. VP1","D. HA"],"correct":0,"explanation":"Đáp án đúng là: VP2 Vì: Gen VP2 đặc hiệu, mã hóa protein capsid, thường được chọn làm chỉ thị phân tử.","reference":"Mục 3.5.2"},{"id":301,"text":"Kỹ thuật nào KHÔNG dùng phân lập M. gallisepticum?","answers":["A. Nuôi cấy trên môi trường bổ sung huyết thanh","B. Nhuộm Gram","C. PCR đặc hiệu","D. Miễn dịch huỳnh quang"],"correct":1,"explanation":"Đáp án đúng là: Nhuộm Gram Vì: MG không bắt màu Gram rõ, không dùng Gram để chẩn đoán phân lập","reference":"Mục 10.6.1"},{"id":302,"text":"Streptococcus suis gây dung huyết dạng nào trên thạch máu?","answers":["A. β-dung huyết (clear)","B. δ-dung huyết","C. α-dung huyết (greenish)","D. γ-dung huyết (không)"],"correct":2,"explanation":"Đáp án đúng là: α-dung huyết (greenish) Vì: Hầu hết S. suis gây dung huyết α (greenish) trên thạch máu.","reference":"Mục 9.1.2"},{"id":303,"text":"Trong chẩn đoán huyết thanh học, phản ứng nào có thể dùng?","answers":["A. FAT","B. PCR","C. Trung hòa virus (VN)","D. ELISA tổng kháng nguyên"],"correct":2,"explanation":"Đáp án đúng là: Trung hòa virus (VN) Vì: VN cho phép xác định kháng thể trung hòa","reference":"Mục 7.5"},{"id":304,"text":"Tần suất tiêm vaccine phòng tụ huyết trùng thường là bao lâu?","answers":["A. 1 năm một lần","B. 2 năm một lần","C. 3 tháng một lần","D. 6 tháng một lần"],"correct":0,"explanation":"Đáp án đúng là: 1 năm một lần Vì: Vaccine theo khuyến cáo tiêm lại hàng năm","reference":"Mục 3.7.2"},{"id":305,"text":"Trong CRD phức hợp (CCRD), tác nhân thường phối hợp với M. gallisepticum?","answers":["A. NDV","B. Escherichia coli","C. Virus IB","D. Haemophilus paragallinarum"],"correct":1,"explanation":"Đáp án đúng là: Escherichia coli Vì: E. coli thường ghép với MG gây viêm túi khí nặng","reference":"Mục 10.4"},{"id":306,"text":"Biện pháp phòng bệnh dại hiệu quả nhất là:","answers":["A. Tiêm phòng vacxin","B. Tăng cường dinh dưỡng","C. Cách ly chuồng trại","D. Dùng thuốc bổ"],"correct":0,"explanation":"Đáp án đúng là: Tiêm phòng vacxin Vì: Tiêm phòng vacxin là biện pháp phòng bệnh dại hiệu quả nhất.","reference":"Mục 1.7"},{"id":307,"text":"PCV2 liên quan đến hội chứng nào?","answers":["A. Anthrax","B. PRRS","C. TGE","D. PMWS"],"correct":3,"explanation":"Đáp án đúng là: PMWS Vì: PCV2 là tác nhân chính gây Post-weaning Multisystemic Wasting Syndrome.","reference":"Mục 5.2.1"},{"id":308,"text":"Điều trị hỗ trợ DVE nặng thường dùng gì?","answers":["A. Dexamethasone","B. Oseltamivir","C. Kháng sinh + bù điện giải, O₂ liệu pháp","D. Acyclovir"],"correct":2,"explanation":"Đáp án đúng là: Kháng sinh + bù điện giải, O₂ liệu pháp Vì: Không có thuốc đặc hiệu, hỗ trợ kháng sinh và truyền dịch","reference":"Mục 8.8"},{"id":309,"text":"Tổn thương đại thể ở ruột heo mắc PEDV điển hình là gì?","answers":["A. Xơ hóa đoạn cuối ruột","B. Loét thực quản","C. Niêm mạc ruột non phù nề, teo nhung mao","D. Sung huyết dạ dày"],"correct":2,"explanation":"Đáp án đúng là: Niêm mạc ruột non phù nề, teo nhung mao Vì: PEDV gây teo nhung mao ruột non","reference":"Mục 4.4"},{"id":310,"text":"Vaccine DVE nhược độc thường dùng chủng nào?","answers":["A. IBDV vaccine","B. CVI988","C. HVT","D. DP–EG–2000"],"correct":3,"explanation":"Đáp án đúng là: DP–EG–2000 Vì: Chủng DP–EG–2000 trên phôi gà 9–11 ngày tuổi","reference":"Mục 8.7.2"},{"id":311,"text":"Phương pháp chẩn đoán PCV2 tốt nhất?","answers":["A. Nuôi cấy tế bào","B. ELISA","C. Miễn dịch huỳnh quang","D. PCR"],"correct":3,"explanation":"Đáp án đúng là: PCR Vì: PCR phát hiện gen đặc hiệu PCV2 cho kết quả nhạy và đặc hiệu nhất.","reference":"Mục 5.1.4"},{"id":312,"text":"Triệu chứng PMWS điển hình là gì?","answers":["A. Còi cọc, da nhợt, hạch lympho sưng to","B. Chảy máu chân móng","C. Ho khan","D. Liệt chi"],"correct":0,"explanation":"Đáp án đúng là: Còi cọc, da nhợt, hạch lympho sưng to Vì: Lợn PMWS thường còi cọc, da nhợt và hạch lympho ngoại biên phÌnh to.","reference":"Mục 5.2.3"},{"id":313,"text":"PCV2 có vỏ bọc hay không?","answers":["A. Không có vỏ bọc","B. Chỉ có ở PCV1","C. Chỉ có ở PRCV","D. Có vỏ bọc"],"correct":0,"explanation":"Đáp án đúng là: Không có vỏ bọc Vì: Hạt PCV2 bộc lộ capsid trực tiếp, không có envelope.","reference":"Mục 5.1.3"},{"id":314,"text":"Trong xét nghiệm huyết thanh, phản ứng nào thường dùng để phát hiện kháng thể FMDV?","answers":["A. ELISA","B. PCR","C. Nuôi cấy","D. Cấy chuyển mù"],"correct":0,"explanation":"Đáp án đúng là: ELISA Vì: ELISA phát hiện kháng thể nhóm và serotyp nhanh chóng Tham khảo: Mục I.1.6.3 Bài 5","reference":""},{"id":315,"text":"PRRSV nhân lên chủ yếu trong tế bào nào?","answers":["A. Tế bào Vero","B. Tế bào MDCK","C. Đại thực bào phế nang lợn (PAM)","D. Tế bào HEK293"],"correct":2,"explanation":"Đáp án đúng là: Đại thực bào phế nang lợn (PAM) Vì: PAM là dòng điển hình","reference":"Mục 3.3"},{"id":316,"text":"Môi trường EMJH dùng để nuôi cấy Leptospira bổ sung:","answers":["A. Glucose và NaCl","B. Tween 80 và BSA","C. Agar alkol","D. Phenol"],"correct":1,"explanation":"Đáp án đúng là: Tween 80 và BSA Vì: EMJH có BSA và Tween 80.","reference":"Mục 4.2.1"},{"id":317,"text":"Ba yếu tố chính quyết định biểu hiện và tiến triển của nhiễm trùng gồm:","answers":["A. Vi sinh vật, ký chủ, môi trường","B. Vaccin, kháng sinh, vệ sinh","C. Đường xâm nhập, enzym, độc tố","D. Tính đặc hiệu, độc lực, số lượng"],"correct":0,"explanation":"Đáp án đúng là: Vi sinh vật, ký chủ, môi trường Vì: Ba yếu tố quyết định nhiễm trùng là mầm bệnh, cơ thể ký chủ và môi trường.","reference":"Mục 1.1.1"},{"id":318,"text":"Loài nào sau đây không cảm thụ FMD?","answers":["A. Ngựa","B. Trâu","C. Cừu","D. Bò"],"correct":0,"explanation":"Đáp án đúng là: Ngựa Vì: Ngựa không bị FMD mặc dù mang tính chất guốc chẵn Tham khảo: Mục I.1.3.1 Bài 5","reference":""},{"id":319,"text":"DHV 1 lây truyền chủ yếu qua đường nào?","answers":["A. Muỗi đốt","B. Da tiếp xúc","C. Qua thức ăn, nước uống (phân–miệng)","D. Hô hấp"],"correct":2,"explanation":"Đáp án đúng là: Qua thức ăn, nước uống (phân–miệng) Vì: Virus đào thải theo phân, xâm nhập qua đường tiêu hóa","reference":"Mục 7.3.2"},{"id":320,"text":"Tỷ lệ tử vong của bệnh nhân thể phổi nếu không điều trị có thể đạt:","answers":["A. 1","B. 0.4","C. 0.2","D. 0.6"],"correct":0,"explanation":"Đáp án đúng là: 1 Vì: Tỷ lệ tử vong của thể phổi bệnh than không điều trị có thể lên đến 100%.","reference":"Mục 2.4"},{"id":321,"text":"Xây dựng vùng an toàn dịch là:","answers":["A. Khu vực không có gia súc","B. Vùng không để xảy ra bệnh đã chọn","C. Khu vực có tỷ lệ mắc bệnh cao","D. Trang trại chỉ chăn nuôi 1 loại"],"correct":1,"explanation":"Đáp án đúng là: Vùng không để xảy ra bệnh đã chọn Vì: Vùng đảm bảo không có ổ dịch bệnh truyền nhiễm.","reference":"Mục 4.2.3"},{"id":322,"text":"Bệnh tích đại thể LT thấy ở đâu rõ nhất?","answers":["A. Da chân","B. Ruột non","C. Gan","D. Niêm mạc thanh quản & khí quản có giả mạc dày, xuất huyết"],"correct":3,"explanation":"Đáp án đúng là: Niêm mạc thanh quản & khí quản có giả mạc dày, xuất huyết Vì: Thanh khí quản có lớp màng giả dày, dễ bóc, xuất huyết.","reference":"Mục 6.5"},{"id":323,"text":"Dịch tả vịt (DVE) do virus thuộc họ nào?","answers":["A. Flaviviridae","B. Picornaviridae","C. Herpesviridae","D. Orthomyxoviridae"],"correct":2,"explanation":"Đáp án đúng là: Herpesviridae Vì: DVE virus là Anatid herpesvirus 1 (Herpesviridae)","reference":"Mục 8.2.1"},{"id":324,"text":"Điều trị đặc hiệu EDS ở gà là gì?","answers":["A. Không có thuốc đặc hiệu","B. Oseltamivir","C. Amoxicillin","D. Doxycycline"],"correct":0,"explanation":"Đáp án đúng là: Không có thuốc đặc hiệu Vì: EDS là virus, không có thuốc điều trị đặc hiệu, chỉ hỗ trợ.","reference":"Mục 5.8"},{"id":325,"text":"Để phòng Gumboro hiệu quả trong đàn nhiều lứa tuổi nên?","answers":["A. Cho ăn probiotic","B. Chia đàn theo lứa tuổi và vệ sinh sát trùng","C. Không cần tiêm phòng","D. Dùng kháng sinh"],"correct":1,"explanation":"Đáp án đúng là: Chia đàn theo lứa tuổi và vệ sinh sát trùng Vì: Phân đàn theo tuổi và vệ sinh chuồng là then chốt để tránh lây nhiễm chéo.","reference":"Mục 3.6.1"},{"id":326,"text":"Virus PEDV thuộc giống nào?","answers":["A. Reovirus","B. Calicivirus","C. Coronavirus nhóm I","D. Alphavirus"],"correct":2,"explanation":"Đáp án đúng là: Coronavirus nhóm I Vì: PEDV là Coronavirus","reference":"Mục 4.1"},{"id":327,"text":"Đặc trưng lâm sàng đầu tiên của FMD ở trâu bò là gì?","answers":["A. Sốt cao","B. Ho ra máu","C. Tiêu chảy","D. Viêm da nổi cục"],"correct":0,"explanation":"Đáp án đúng là: Sốt cao Vì: Bệnh khởi phát bằng sốt cao trước khi xuất hiện mụn nước Tham khảo: Mục I.1.4.1.1 Bài 5","reference":""},{"id":328,"text":"Loài nào sau đây không phải vật chủ Brucella điển hình?","answers":["A. Cá","B. Chó","C. Cừu","D. Bò"],"correct":0,"explanation":"Đáp án đúng là: Cá Vì: Cá không phải vật chủ Brucella.","reference":"Mục 3.3.1"},{"id":329,"text":"PRRSV có thể đột biến mạnh nhất ở gen nào để thoát miễn dịch?","answers":["A. N gene","B. E gene","C. ORF5","D. M gene"],"correct":2,"explanation":"Đáp án đúng là: ORF5 Vì: ORF5 chịu áp lực miễn dịch cao","reference":"Mục 3.8"},{"id":330,"text":"Bệnh tích đại thể điển hình nhất của S. suis ở màng não là?","answers":["A. Viêm màng não mủ, có fibrin","B. Xuất huyết da","C. Hoại tử gan","D. Hạch to mủ"],"correct":0,"explanation":"Đáp án đúng là: Viêm màng não mủ, có fibrin Vì: S. suis gây viêm màng não mủ với fibrin bám trên bề mặt.","reference":"Mục 9.5.1"},{"id":331,"text":"EDS truyền lây chính qua đường nào?","answers":["A. Theo trứng (phôi → gà con)","B. Qua muỗi","C. Qua tiếp xúc da","D. Qua không khí"],"correct":0,"explanation":"Đáp án đúng là: Theo trứng (phôi → gà con) Vì: Virus lây theo trứng, EDS làm vỏ mỏng, vỏ khuyết.","reference":"Mục 5.3.2"},{"id":332,"text":"Kiểm soát vệ sinh thú y tại lò mổ bao gồm:","answers":["A. Không cho gia súc ăn trước mổ","B. Tự ý mổ thịt bệnh","C. Khám sống trước mổ và khám thịt sau mổ","D. Bỏ qua giấy chứng nhận vaccin"],"correct":2,"explanation":"Đáp án đúng là: Khám sống trước mổ và khám thịt sau mổ Vì: Khám cả trước và sau mổ để phát hiện bệnh.","reference":"Mục 4.2.3"},{"id":333,"text":"Phân nhóm Lancefield Streptococcus dựa vào yếu tố nào?","answers":["A. Kháng nguyên C (polysaccharide)","B. Kháng nguyên S","C. Kháng nguyên K","D. Kháng nguyên H"],"correct":0,"explanation":"Đáp án đúng là: Kháng nguyên C (polysaccharide) Vì: Phân nhóm Lancefield dựa vào kháng nguyên C thành tế bào.","reference":"Mục 9.1.2"},{"id":334,"text":"Triệu chứng nào đặc trưng cho thể nội nhiệt thán?","answers":["A. Chóng mặt, buồn nôn, tức ngực","B. Đau đầu kéo dài","C. Viêm da, ngứa tai","D. Ho có đờm"],"correct":0,"explanation":"Đáp án đúng là: Chóng mặt, buồn nôn, tức ngực Vì: Thể nội nhiệt thán gây chóng mặt, buồn nôn và tức ngực.","reference":"Mục 2.4"},{"id":335,"text":"FMDV bị bất hoạt nhanh tại nhiệt độ nào?","answers":["A. 70°C trong 5–10 phút","B. 4°C trong 1 tháng","C. 50°C sau 30 phút","D. 37°C sau 24 giờ"],"correct":0,"explanation":"Đáp án đúng là: 70°C trong 5–10 phút Vì: Virus dễ bị tiêu diệt ở 70°C chỉ sau 5–10 phút Tham khảo: Mục I.1.2 Bài 5","reference":""},{"id":336,"text":"Túi khí gà mắc CRD thường chứa chất gì?","answers":["A. Nước vàng trong","B. Dịch máu đỏ","C. Hạt nhỏ trắng như bã đậu","D. Mủ đặc xanh"],"correct":2,"explanation":"Đáp án đúng là: Hạt nhỏ trắng như bã đậu Vì: Viêm túi khí tạo hạt nhỏ trắng như bã đậu","reference":"Mục 10.5.1"},{"id":337,"text":"Virus ASF (African swine fever) thuộc họ nào?","answers":["A. Flaviviridae","B. Asfarviridae","C. Poxviridae","D. Herpesviridae"],"correct":1,"explanation":"Đáp án đúng là: Asfarviridae Vì: ASFV thuộc họ Asfarviridae Tham khảo: Mục II.2.1 Bài 7","reference":""},{"id":338,"text":"Nơi virus dại có thể tồn tại lâu nhất là:","answers":["A. Phân tươi","B. Da khô","C. Tuyến mồ hôi","D. Não động vật đông lạnh"],"correct":3,"explanation":"Đáp án đúng là: Não động vật đông lạnh Vì: Virus dại tồn tại lâu trong não động vật được bảo quản ở nhiệt độ thấp.","reference":"Mục 1.2"},{"id":339,"text":"Kích thước trung bình của P. multocida là bao nhiêu?","answers":["A. 0,1 × 1 µm","B. 5 × 0,5 µm","C. 1 × 10 µm","D. 0,2 × 2 µm"],"correct":3,"explanation":"Đáp án đúng là: 0,2 × 2 µm Vì: P. multocida là cầu trực khuẩn kích thước ~0,2–2 µm","reference":"Mục 3.2.2"},{"id":340,"text":"Salmonella thuộc họ vi khuẩn nào?","answers":["A. Streptococcaceae","B. Staphylococcaceae","C. Enterobacteriaceae","D. Clostridiaceae"],"correct":2,"explanation":"Đáp án đúng là: Enterobacteriaceae Vì: Salmonella là trực khuẩn Gram âm trong họ Enterobacteriaceae.","reference":"Mục 10.2.1"},{"id":341,"text":"Vi khuẩn Erysipelothrix rhusiopathiae thuộc giống nào?","answers":["A. Clostridium","B. Listeria","C. Erysipelothrix","D. Bacillus"],"correct":2,"explanation":"Đáp án đúng là: Erysipelothrix Vì: Độc tố đóng dấu lợn do trực khuẩn Erysipelothrix rhusiopathiae.","reference":"Mục 8.2.1"},{"id":342,"text":"Điều trị hỗ trợ LT nặng thường dùng gì?","answers":["A. Ampicillin","B. Oseltamivir","C. Ribavirin","D. Kháng sinh ± kháng viêm, bổ trợ oxy"],"correct":3,"explanation":"Đáp án đúng là: Kháng sinh ± kháng viêm, bổ trợ oxy Vì: Không có thuốc đặc hiệu, kháng sinh và hỗ trợ hô hấp là chính.","reference":"Mục 6.8"},{"id":343,"text":"Phương pháp chẩn đoán khẳng định cúm lợn tốt nhất?","answers":["A. ELISA kháng thể","B. Nuôi cấy vi khuẩn","C. Hiển vi điện tử","D. RT-PCR"],"correct":3,"explanation":"Đáp án đúng là: RT-PCR Vì: RT-PCR phát hiện ARN virus nhanh và chính xác.","reference":"Mục 7.6"},{"id":344,"text":"Penicillin có vai trò gì trong điều trị bệnh đóng dấu lợn?","answers":["A. Giảm đau thần kinh","B. Tiêu diệt virus","C. Ức chế độc tố","D. Kháng sinh lựa chọn đầu tay, rất nhạy cảm"],"correct":3,"explanation":"Đáp án đúng là: Kháng sinh lựa chọn đầu tay, rất nhạy cảm Vì: Penicillin là thuốc hàng đầu, vi khuẩn rất nhạy cảm với nó.","reference":"Mục 8.8.2"},{"id":345,"text":"PEDV lây qua đường nào?","answers":["A. Tinh dịch","B. Miệng – phân","C. Không khí","D. Máu"],"correct":1,"explanation":"Đáp án đúng là: Miệng – phân Vì: PEDV qua đường tiêu hóa","reference":"Mục 4.5"},{"id":346,"text":"Virus cúm gia cầm có bao nhiêu phân đoạn genome ARN?","answers":["A. 6","B. 8","C. 10","D. 3"],"correct":1,"explanation":"Đáp án đúng là: 8 Vì: Influenza A có 8 đoạn ARN.","reference":"Mục 5.1.2"},{"id":347,"text":"Động vật thụ cảm là:","answers":["A. Vật chủ không liên quan","B. Động vật có khả năng mắc bệnh truyền nhiễm","C. Động vật mang trùng không mắc bệnh","D. Nhân tố trung gian truyền bệnh"],"correct":1,"explanation":"Đáp án đúng là: Động vật có khả năng mắc bệnh truyền nhiễm Vì: Chỉ những loài có thể mắc bệnh mới là thụ cảm.","reference":"Mục 3.1.3"},{"id":348,"text":"Biện pháp phòng EDS cơ bản ở gà bố mẹ là gì?","answers":["A. Xạ trị chuồng","B. Dùng kháng sinh","C. Tiêm vaccine cho gà mẹ để truyền kháng thể qua trứng","D. Cho ăn probiotic"],"correct":2,"explanation":"Đáp án đúng là: Tiêm vaccine cho gà mẹ để truyền kháng thể qua trứng Vì: Vaccine cho gà mẹ giúp con có kháng thể thụ động chống EDS.","reference":"Mục 5.7.2"},{"id":349,"text":"Quá trình sinh dịch gồm bao nhiêu khâu?","answers":["A. 2","B. 4","C. 3","D. 5"],"correct":2,"explanation":"Đáp án đúng là: 3 Vì: Sinh dịch cần đủ Nguồn bệnh – Nhân tố trung gian – Động vật thụ cảm.","reference":"Mục 3.1"},{"id":350,"text":"Nhiễm trùng huyết là khi:","answers":["A. Mầm bệnh từ máu vào mô ngoại vi","B. Máu không chứa mầm bệnh","C. Mầm bệnh xâm nhập vào máu và sinh trưởng trong đó","D. Chỉ có độc tố trong máu"],"correct":2,"explanation":"Đáp án đúng là: Mầm bệnh xâm nhập vào máu và sinh trưởng trong đó Vì: Nhiễm trùng huyết là trạng thái máu có mầm bệnh và chúng sinh sôi trong máu.","reference":"Mục 1.1.5"},{"id":351,"text":"CSFV nhân lên tốt trên dòng tế bào nào?","answers":["A. PK-15 (thận lợn)","B. MDCK","C. HeLa","D. Vero"],"correct":0,"explanation":"Đáp án đúng là: PK-15 (thận lợn) Vì: CSFV thường dùng PK-15","reference":"Mục 1.2.3"},{"id":352,"text":"Vai trò của giám sát vỏ trứng trong phát hiện EDS là gì?","answers":["A. Phát hiện virus trên da","B. Dự đoán bệnh Newcastle","C. Phát hiện sớm gà con nhiễm virus","D. Ước tính tuổi gà"],"correct":2,"explanation":"Đáp án đúng là: Phát hiện sớm gà con nhiễm virus Vì: Quan sát vỏ trứng là dấu ấn sinh học dễ theo dõi, phát hiện ca bệnh tiềm ẩn.","reference":"Mục 5.6.1"},{"id":353,"text":"Triệu chứng đặc trưng nhất của bệnh tụ huyết trùng trâu bò là gì?","answers":["A. Ho ra máu","B. Tiêu chảy","C. Sốt kéo dài","D. Sưng hạch hầu và xuất huyết dưới da"],"correct":3,"explanation":"Đáp án đúng là: Sưng hạch hầu và xuất huyết dưới da Vì: Xuất huyết và sưng hạch là dấu hiệu kinh điển","reference":"Mục 3.4.1"},{"id":354,"text":"Đường lây truyền chính của bệnh tụ huyết trùng ngoài tiếp xúc là gì?","answers":["A. Đường tình dục","B. Vectơ côn trùng (ruồi, chuột)","C. Đường sữa","D. Không khí"],"correct":1,"explanation":"Đáp án đúng là: Vectơ côn trùng (ruồi, chuột) Vì: Côn trùng và động vật gặm nhấm truyền vi khuẩn","reference":"Mục 3.3.2"},{"id":355,"text":"Ngoại độc tố (exotoxin) có đặc điểm:","answers":["A. Chỉ được giải phóng khi tế bào bị phá hủy","B. Là thành phần lipid A của LPS","C. Chủ yếu là protein, kém bền với nhiệt","D. Giúp vi khuẩn né tránh thực bào"],"correct":2,"explanation":"Đáp án đúng là: Chủ yếu là protein, kém bền với nhiệt Vì: Ngoại độc tố đa số là protein, dễ biến tính khi đun nóng.","reference":"Mục 1.1.3."},{"id":356,"text":"Cơ chế bám dính của M. gallisepticum quan trọng vì?","answers":["A. Trung hòa kháng thể tại chỗ","B. Kích thích tăng sản lympho","C. Kích hoạt miễn dịch bẩm sinh","D. Giúp xâm nhập, gây viêm niêm mạc mãn tính"],"correct":3,"explanation":"Đáp án đúng là: Giúp xâm nhập, gây viêm niêm mạc mãn tính Vì: Bám dính mở đầu quá trình viêm mạn","reference":"Mục 10.2.4"},{"id":357,"text":"Cơ chế sinh bệnh cùm lợn liên quan đến cytokine nào sau đây?","answers":["A. IL-10","B. TGF-β","C. IL-2","D. IFN-α, TNF-α, IL-1, IL-6"],"correct":3,"explanation":"Đáp án đúng là: IFN-α, TNF-α, IL-1, IL-6 Vì: Những cytokine này gây viêm, sốt và tổn thương phổi.","reference":"Mục 7.3.3"},{"id":358,"text":"Biện pháp phòng TGE hiệu quả nhất?","answers":["A. Kháng huyết thanh","B. Xạ trị","C. Kháng sinh","D. Vệ sinh chuồng, cách ly lợn mới"],"correct":3,"explanation":"Đáp án đúng là: Vệ sinh chuồng, cách ly lợn mới Vì: Vệ sinh và cách ly là biện pháp chủ yếu vì chưa có thuốc đặc hiệu điều trị TGEV.","reference":"Mục 6.1.7"},{"id":359,"text":"Sự khác biệt mô bệnh học của cúm gà và Newcastle ở đường tiêu hóa?","answers":["A. ND không gây tổn thương đường ruột","B. Cúm gà xuất huyết niêm mạc ruột, ND sưng phù túi khí","C. Cúm gà có loét Payer","D. Cúm gà không xuất huyết"],"correct":1,"explanation":"Đáp án đúng là: Cúm gà xuất huyết niêm mạc ruột, ND sưng phù túi khí Vì: Cúm gà có tổn thương chủ yếu đường tiêu hóa; ND chủ yếu hô hấp và hệ thần kinh.","reference":"Mục 5.1.15"},{"id":360,"text":"Vaccine Gumboro thường dùng hiện nay là loại nào?","answers":["A. Tiểu đơn vị kháng nguyên","B. Sống giảm độc lực","C. Vô hoạt toàn phần","D. DNA tái tổ hợp"],"correct":1,"explanation":"Đáp án đúng là: Sống giảm độc lực Vì: Vaccine sống nhược độc tạo miễn dịch sớm và hiệu quả.","reference":"Mục 3.6.2"},{"id":361,"text":"LT lây truyền chủ yếu qua đường nào?","answers":["A. Tiếp xúc da","B. Hô hấp (dịch khí quản, khí dung)","C. Đường tiêu hóa","D. Qua trứng"],"correct":1,"explanation":"Đáp án đúng là: Hô hấp (dịch khí quản, khí dung) Vì: Virus phát tán qua ho, hắt hơi, lây lan qua hô hấp.","reference":"Mục 6.3"},{"id":362,"text":"Anthrax (B. anthracis) có nha bào hay không?","answers":["A. Không","B. Có nhưng không bền","C. Có","D. Không bền"],"correct":1,"explanation":"Đáp án đúng là: Có Vì: B. anthracis có nha bào Tham khảo: Mục II.2.2 Bài 7","reference":""},{"id":363,"text":"Chẩn đoán mô bệnh học của PDNS?","answers":["A. ELISA","B. IHC (hóa mô miễn dịch)","C. Nuôi cấy tế bào","D. PCR"],"correct":1,"explanation":"Đáp án đúng là: IHC (hóa mô miễn dịch) Vì: IHC trực tiếp phát hiện kháng nguyên PCV2 trong tổ chức bị tổn thương là tiêu chuẩn vàng.","reference":"Mục 5.2.6"},{"id":364,"text":"“Tính đặc hiệu” của mầm bệnh nghĩa là:","answers":["A. Mỗi mầm bệnh luôn gây ra cùng một bệnh nhiễm trùng nhất định","B. Đường xâm nhập chính của mầm bệnh","C. Mầm bệnh càng nhiều càng gây bệnh nhanh","D. Khả năng tiết độc tố của vi sinh vật"],"correct":0,"explanation":"Đáp án đúng là: Mỗi mầm bệnh luôn gây ra cùng một bệnh nhiễm trùng nhất định Vì: Tính đặc hiệu nghĩa là mỗi mầm bệnh chỉ gây một bệnh nhiễm trùng nhất định.","reference":"Mục 1.1.2."},{"id":365,"text":"Trong điều trị LSD, sử dụng kháng sinh để làm gì?","answers":["A. Kích thích miễn dịch","B. Tiêu diệt virus","C. Giảm sẹo da","D. Ngăn ngừa bội nhiễm vi khuẩn thứ phát"],"correct":3,"explanation":"Đáp án đúng là: Ngăn ngừa bội nhiễm vi khuẩn thứ phát Vì: Kháng sinh chỉ ngăn bội nhiễm, không tiêu diệt virus","reference":"Mục 4.8"},{"id":366,"text":"Phương pháp vàng để xác định độc lực B. anthracis là gì?","answers":["A. ELISA cạnh tranh CSF","B. PCR xác định gen độc lực (pag)","C. Miễn dịch huỳnh quang trực tiếp","D. RT-PCR ASF"],"correct":1,"explanation":"Đáp án đúng là: PCR xác định gen độc lực (pag) Vì: Xác định gen pag độc lực bằng PCR Tham khảo: Mục II.6.4 Bài 7","reference":""},{"id":367,"text":"Hình thái bệnh tích điển hình của FMD là gì?","answers":["A. Mụn nước trên da và niêm mạc","B. Sẹo xơ hóa da","C. Hoại tử gan","D. Khối u ở cơ tim"],"correct":0,"explanation":"Đáp án đúng là: Mụn nước trên da và niêm mạc Vì: FMD đặc trưng mụn nước trên niêm mạc miệng và kẽ móng Tham khảo: Mục I.1.5 Bài 5","reference":""},{"id":368,"text":"Chỉ số ICPI không áp dụng cho bệnh nào dưới đây?","answers":["A. LT","B. Gumboro","C. Newcastle","D. Cúm gia cầm"],"correct":0,"explanation":"Đáp án đúng là: LT Vì: ICPI chỉ dùng cho NDV, không áp dụng cho virus Herpes như LT.","reference":"Mục 6.7"},{"id":369,"text":"Thể bại huyết do Salmonella chủ yếu xảy ra ở lứa tuổi nào?","answers":["A. 6–12 tháng","B. Dưới 2 tháng tuổi","C. > 6 tháng","D. Mọi lứa tuổi"],"correct":1,"explanation":"Đáp án đúng là: Dưới 2 tháng tuổi Vì: Thể septicemic thường ở lợn con cai sữa < 2 tháng.","reference":"Mục 10.4.1"},{"id":370,"text":"Phương thức lây lan chính của bệnh nhiệt thán (Anthrax)?","answers":["A. Tiếp xúc với bào tử qua da trầy xước","B. Máu","C. Đường tiêu hóa","D. Không khí"],"correct":0,"explanation":"Đáp án đúng là: Tiếp xúc với bào tử qua da trầy xước Vì: Anthrax lây qua bào tử vào vết thương Tham khảo: Mục II.2.3 Bài 7","reference":""},{"id":371,"text":"Virus gây bệnh viêm da nổi cục (LSD) ở trâu bò thuộc họ nào?","answers":["A. Flaviviridae","B. Picornaviridae","C. Herpesviridae","D. Poxviridae"],"correct":3,"explanation":"Đáp án đúng là: Poxviridae Vì: LSDV là virus DNA họ Poxviridae","reference":"Mục 4.2"},{"id":372,"text":"Phương pháp xác định độc lực Bacillus anthracis trong Bài 10 dùng kỹ thuật nào?","answers":["A. ELISA","B. Hiển vi điện tử","C. PCR","D. Nuôi cấy dòng"],"correct":2,"explanation":"Đáp án đúng là: PCR Vì: PCR xác định gene độc lực trên DNA vi khuẩn.","reference":"Mục 8.6.2"},{"id":373,"text":"Phương pháp phân tích trình tự ORF5 của PRRSV dùng để làm gì?","answers":["A. Xác định kháng thể","B. Phân nhóm chủng và theo dõi đột biến","C. Định lượng virus","D. Đánh giá đề kháng thuốc"],"correct":1,"explanation":"Đáp án đúng là: Phân nhóm chủng và theo dõi đột biến Vì: ORF5 phục vụ phân nhóm","reference":"Mục 3.8"},{"id":374,"text":"Biện pháp vệ sinh–khử trùng cơ bản phòng tụ huyết trùng là gì?","answers":["A. Tẩy uế dụng cụ đắt tiền","B. Đốt cháy chuồng","C. Phun khử khuẩn ruộng","D. Rửa chuồng, sát trùng bằng vôi hoặc formol"],"correct":3,"explanation":"Đáp án đúng là: Rửa chuồng, sát trùng bằng vôi hoặc formol Vì: Vôi và formol tiêu diệt vi khuẩn hiệu quả trong chuồng trại","reference":"Mục 3.7.1"},{"id":375,"text":"Biến chứng miễn dịch hậu Gumboro là gì?","answers":["A. Viêm não","B. Suy giảm đáp ứng kháng thể với vaccin khác","C. Xuất huyết ruột","D. Bại liệt"],"correct":1,"explanation":"Đáp án đúng là: Suy giảm đáp ứng kháng thể với vaccin khác Vì: IBDV làm tổn thương lympho B, gây suy giảm miễn dịch dịch thể kéo dài.","reference":"Mục 3.4.1"},{"id":376,"text":"Triệu chứng điển hình của PEDV là gì?","answers":["A. Ho khan","B. Sốt cao không tiêu chảy","C. Nôn mửa","D. Tiêu chảy nước, mất nước nhanh"],"correct":3,"explanation":"Đáp án đúng là: Tiêu chảy nước, mất nước nhanh Vì: PEDV gây tiêu chảy","reference":"Mục 4.3"},{"id":377,"text":"Neuraminidase (NA) giúp virus cúm làm gì?","answers":["A. Tổng hợp ARN","B. Giải phóng virion khỏi tế bào chủ","C. Tạo vỏ bọc","D. Kết dính hồng cầu"],"correct":1,"explanation":"Đáp án đúng là: Giải phóng virion khỏi tế bào chủ Vì: NA cắt liên kết sialic, giải phóng virus ra khỏi tế bào.","reference":"Mục 7.2.2"},{"id":378,"text":"Bệnh tích vi thể của LSD thường ghi nhận hiện tượng gì?","answers":["A. Tân sinh mao mạch","B. Viêm tắc mạch và thể bóng nước ở biểu bì","C. Xơ hóa toàn bộ","D. Hoại tử nặng"],"correct":1,"explanation":"Đáp án đúng là: Viêm tắc mạch và thể bóng nước ở biểu bì Vì: Tắc mạch kèm phù và bóng nước đặc trưng tổn thương","reference":"Mục 4.5"},{"id":379,"text":"Vacxin phòng leptospira cho lợn thường chứa serovar:","answers":["A. Canicola, Pomona, Icterohaemorrhagiae","B. Melitensis","C. Typhimurium","D. Abortus"],"correct":0,"explanation":"Đáp án đúng là: Canicola, Pomona, Icterohaemorrhagiae Vì: Vacxin chứa các serovar Leptospira phổ biến.","reference":"Mục 4.7.2.2"},{"id":380,"text":"Bệnh truyền nhiễm có tính chất mùa vụ nghĩa là:","answers":["A. Xảy ra quanh năm đều đặn","B. Chỉ lây qua đường hô hấp","C. Chỉ xảy ra một lần trong đời","D. Phát sinh theo mùa trong năm"],"correct":3,"explanation":"Đáp án đúng là: Phát sinh theo mùa trong năm Vì: Ví dụ: tụ huyết trùng thường bùng phát cuối xuân – đầu hè.","reference":"Mục 3.4.2"},{"id":381,"text":"Pasteurella multocida nhuộm Gram có màu gì?","answers":["A. Gram âm","B. Không bắt màu","C. Gram dương","D. Kháng acid"],"correct":0,"explanation":"Đáp án đúng là: Gram âm Vì: P. multocida là cầu trực khuẩn Gram âm","reference":"Mục 3.2.2"},{"id":382,"text":"Triệu chứng khởi phát của cúm lợn bao gồm gì?","answers":["A. Viêm da mụn nước","B. Tiêu chảy nặng","C. Sốt cao đột ngột, ho, chảy nước mũi","D. Co giật"],"correct":2,"explanation":"Đáp án đúng là: Sốt cao đột ngột, ho, chảy nước mũi Vì: Cúm lợn biểu hiện đột ngột sốt, ho, chảy nước mũi.","reference":"Mục 7.4"},{"id":383,"text":"Virus cúm lợn dễ dàng nuôi cấy nhất trên phôi gì?","answers":["A. Phôi cừu","B. Phôi bò","C. Phôi heo","D. Phôi gà"],"correct":3,"explanation":"Đáp án đúng là: Phôi gà Vì: Nuôi cấy trên phôi gà túi ối 10–11 ngày cho hiệu quả cao.","reference":"Mục 7.2.4"},{"id":384,"text":"Bệnh đường hô hấp mạn tính (CRD) ở gà do vi khuẩn nào gây ra?","answers":["A. Newcastle disease virus","B. Mycoplasma gallisepticum","C. Avibacterium paragallinarum","D. Haemophilus paragallinarum"],"correct":1,"explanation":"Đáp án đúng là: Mycoplasma gallisepticum Vì: CRD do M. gallisepticum gây viêm xoang mãn tính","reference":"Mục 10.1"},{"id":385,"text":"Phương thức truyền bệnh cơ học qua côn trùng là:","answers":["A. Côn trùng mang mầm bệnh trên cơ thể rồi truyền","B. Mầm bệnh sinh sản trong cơ thể côn trùng","C. Qua tiêm máu","D. Lây trực tiếp qua vết cắn"],"correct":0,"explanation":"Đáp án đúng là: Côn trùng mang mầm bệnh trên cơ thể rồi truyền Vì: Ví dụ: ruồi, gián bám bẩn chở mầm bệnh.","reference":"Mục 3.1.2"},{"id":386,"text":"Cúm gia cầm lây chủ yếu qua đường nào?","answers":["A. Đường hô hấp (khí dung, dịch tiết)","B. Máu","C. Đường tiêu hóa","D. Da tiếp xúc"],"correct":0,"explanation":"Đáp án đúng là: Đường hô hấp (khí dung, dịch tiết) Vì: Cúm gà lây qua hắt hơi, ho, khí dung.","reference":"Mục 5.1.4"},{"id":387,"text":"Genome NDV là ARN sợi đơn có kích thước bao nhiêu?","answers":["A. 10 kb","B. 27 kb","C. 8 kb","D. ~15.186 kb"],"correct":3,"explanation":"Đáp án đúng là: ~15.186 kb Vì: NDV có genome ARN đơn ~15.2 kb.","reference":"Mục 5.2.2"},{"id":388,"text":"PEDV sống trong phân heo ở nhiệt độ 4 °C bao lâu?","answers":["A. Khoảng 4–5 tuần","B. 2–3 ngày","C. Vài giờ","D. Không tồn tại"],"correct":0,"explanation":"Đáp án đúng là: Khoảng 4–5 tuần Vì: PEDV bền lạnh","reference":"Mục 4.4"},{"id":389,"text":"Kiểm dịch ngoại quan không gồm:","answers":["A. Giám sát tiêm phòng","B. Khám động vật sống","C. Khử trùng dịch tễ","D. Kiểm tra giấy kiểm dịch"],"correct":2,"explanation":"Đáp án đúng là: Khử trùng dịch tễ Vì: “Khử trùng dịch tễ” không phải bước kiểm dịch.","reference":"Mục 4.2.3"},{"id":390,"text":"Vì sao không được mổ động vật nghi mắc bệnh nhiệt thán?","answers":["A. Mổ không hiệu quả","B. Thiếu thiết bị","C. Tránh phát tán nha bào","D. Không cần thiết"],"correct":2,"explanation":"Đáp án đúng là: Tránh phát tán nha bào Vì: Không được mổ để tránh phát tán bào tử Bacillus anthracis.","reference":"Mục 2.2"},{"id":391,"text":"Ở 56 °C, virus cúm lợn mất độc tính sau bao lâu?","answers":["A. 1 giờ","B. Vài phút","C. 1 tuần","D. 24 giờ"],"correct":1,"explanation":"Đáp án đúng là: Vài phút Vì: Virus không bền với nhiệt, ở 56 °C mất độc tính rất nhanh.","reference":"Mục 7.2.5"},{"id":392,"text":"Hemagglutinin (HA) của virus cúm có chức năng gì?","answers":["A. Gắn kết và xâm nhập vào tế bào vật chủ","B. Tăng độc lực","C. Phá hủy tế bào","D. Tạo kháng thể"],"correct":0,"explanation":"Đáp án đúng là: Gắn kết và xâm nhập vào tế bào vật chủ Vì: HA gắn vào receptor trên tế bào, khởi đầu quá trình nhiễm.","reference":"Mục 7.2.2"},{"id":393,"text":"Tác nhân gây bệnh tụ huyết trùng trâu bò là gì?","answers":["A. Pasteurella multocida","B. Clostridium perfringens","C. Listeria monocytogenes","D. Bacillus anthracis"],"correct":0,"explanation":"Đáp án đúng là: Pasteurella multocida Vì: Đúng theo mô tả vi khuẩn gây bệnh tụ huyết trùng","reference":"Mục 3.2.1"},{"id":394,"text":"Nguyên nhân cơ bản khiến FMD khó kiểm soát là gì?","answers":["A. Lây qua không khí","B. Không có vaccine","C. Có nhiều typ và subtyp không miễn dịch chéo","D. Virus tồn tại trong đất nhiều năm"],"correct":2,"explanation":"Đáp án đúng là: Có nhiều typ và subtyp không miễn dịch chéo Vì: Typ và subtyp đa dạng gây kháng miễn dịch chéo rất thấp Tham khảo: Mục I.1.2.1 Bài 5","reference":""},{"id":395,"text":"Triệu chứng cấp tính LT điển hình là gì?","answers":["A. Khạc đờm đục/đờm máu, khó thở, ho khan","B. Tiêu chảy","C. Chóng mặt","D. Phù chân"],"correct":0,"explanation":"Đáp án đúng là: Khạc đờm đục/đờm máu, khó thở, ho khan Vì: Cấp tính có đờm đặc, máu và triệu chứng hô hấp nặng.","reference":"Mục 6.4"},{"id":396,"text":"Anthrax tồn tại lâu nhất dưới dạng nào?","answers":["A. Nha bào","B. Bào tử","C. Sợi tơ","D. Vi thể"],"correct":0,"explanation":"Đáp án đúng là: Nha bào Vì: Nha bào kháng môi trường tốt nhất Tham khảo: Mục II.2.5 Bài 7","reference":""},{"id":397,"text":"Fowl plague trước đây là tên gọi khác của bệnh nào?","answers":["A. CRD","B. Gumboro","C. Newcastle","D. Cúm gia cầm"],"correct":3,"explanation":"Đáp án đúng là: Cúm gia cầm Vì: Cúm gà từng gọi là Fowl plague.","reference":"Mục 5.1.1"},{"id":398,"text":"Tác nhân gây bệnh Gumboro thuộc họ nào?","answers":["A. Picornaviridae","B. Birnaviridae","C. Paramyxoviridae","D. Orthomyxoviridae"],"correct":1,"explanation":"Đáp án đúng là: Birnaviridae Vì: IBDV là virus dsRNA thuộc họ Birnaviridae.","reference":"Mục 3.2.1"},{"id":399,"text":"NDV lây truyền chủ yếu qua đường nào?","answers":["A. Da tiếp xúc","B. Đường sinh dục","C. Hô hấp và tiêu hóa (phân, khí dung)","D. Máu"],"correct":2,"explanation":"Đáp án đúng là: Hô hấp và tiêu hóa (phân, khí dung) Vì: NDV phát tán qua phân và khí dung của gà bệnh.","reference":"Mục 5.2.4"},{"id":400,"text":"Phân biệt cúm gà và Newcastle bằng xét nghiệm nào?","answers":["A. ELISA toàn bộ virus","B. RT-PCR hoặc HI với serum đặc hiệu","C. Nuôi cấy vi khuẩn","D. PCR vi khuẩn"],"correct":1,"explanation":"Đáp án đúng là: RT-PCR hoặc HI với serum đặc hiệu Vì: RT-PCR subtyp H5/H7 và HI phân biệt với huyết thanh Newcastle.","reference":"Mục 5.1.7"}];
</script>

<script>
(function () {
  var LETTERS = "ABCDEFGHIJ";
  var container = document.getElementById("questionContainer");
  var noResults = document.getElementById("noResults");
  var searchInput = document.getElementById("searchInput");
  var searchClear = document.getElementById("searchClear");
  var countEl = document.getElementById("searchCount");
  var total = QUESTIONS.length;

  /* ── Escape HTML ── */
  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  /* ── Highlight từ khóa ── */
  function highlight(text, term) {
    if (!term) return esc(text);
    var safe = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return esc(text).replace(
      new RegExp("(" + safe.replace(/&amp;/g, "&amp;amp;") + ")", "gi"),
      "<mark>$1</mark>"
    );
  }

  /* ── Render 1 câu hỏi ── */
  function renderQ(q, term) {
    var answersHtml = q.answers.map(function (ans, i) {
      var isCorrect = i === q.correct;
      var cls = "answer-item" + (isCorrect ? " correct" : "");
      var check = isCorrect ? '<span class="check-mark">&#10003;</span>' : "";
      return (
        '<div class="' + cls + '">' +
        '<span class="answer-letter">' + (LETTERS[i] || i + 1) + ".</span>" +
        '<span class="answer-text">' + highlight(ans, term) + "</span>" +
        check +
        "</div>"
      );
    }).join("");

    var feedbackHtml = "";
    if (q.explanation || q.reference) {
      feedbackHtml =
        '<div class="feedback-section">' +
        (q.explanation
          ? "<p><strong>Vì: </strong>" + esc(q.explanation) + "</p>"
          : "") +
        (q.reference
          ? "<p><strong>Tham khảo: </strong>" + esc(q.reference) + "</p>"
          : "") +
        "</div>";
    }

    return (
      '<div class="question-block" id="q' + q.id + '">' +
      '<div class="question-header">' +
      '<span class="q-badge">Câu ' + q.id + "</span>" +
      "</div>" +
      '<div class="question-text">' + highlight(q.text, term) + "</div>" +
      '<div class="answers">' + answersHtml + "</div>" +
      feedbackHtml +
      "</div>"
    );
  }

  /* ── Render danh sách câu hỏi ── */
  function renderList(filtered, term) {
    // Xóa các block cũ (giữ lại #noResults)
    var old = container.querySelectorAll(".question-block");
    old.forEach(function (el) { el.remove(); });

    if (filtered.length === 0) {
      noResults.style.display = "block";
    } else {
      noResults.style.display = "none";
      var frag = document.createDocumentFragment();
      filtered.forEach(function (q) {
        var div = document.createElement("div");
        div.innerHTML = renderQ(q, term);
        frag.appendChild(div.firstChild);
      });
      container.appendChild(frag);
    }

    countEl.innerHTML =
      "<strong>" + filtered.length + "</strong> / " + total + " câu";
  }

  /* ── Lọc câu hỏi ── */
  function doSearch(term) {
    var t = term.trim().toLowerCase();
    var filtered = t
      ? QUESTIONS.filter(function (q) {
          return (
            q.text.toLowerCase().includes(t) ||
            q.answers.some(function (a) { return a.toLowerCase().includes(t); })
          );
        })
      : QUESTIONS;

    searchClear.style.display = term ? "block" : "none";
    renderList(filtered, term.trim());
  }

  /* ── Khởi tạo ── */
  renderList(QUESTIONS, "");

  searchInput.addEventListener("input", function () {
    doSearch(this.value);
  });
  searchClear.addEventListener("click", function () {
    searchInput.value = "";
    doSearch("");
    searchInput.focus();
  });

  /* ── Scroll to top ── */
  var scrollBtn = document.getElementById("scrollTopBtn");
  window.addEventListener("scroll", function () {
    scrollBtn.style.display = window.scrollY > 320 ? "flex" : "none";
  }, { passive: true });
  scrollBtn.addEventListener("click", function (e) {
    e.preventDefault();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
})();
</script>
</body>
</html>
