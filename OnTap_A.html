<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn Tập - Bệnh truyền nhiễm Thú y (400 câu)</title>
<style>
:root {
  --blue:      #2563eb;
  --blue-dark: #1e40af;
  --blue-bg:   #eff6ff;
  --green:     #16a34a;
  --green-bg:  #f0fdf4;
  --green-bd:  #86efac;
  --yellow-bg: #fefce8;
  --yellow-bd: #fde047;
  --gray:      #6b7280;
  --gray-lt:   #f3f4f6;
  --border:    #e5e7eb;
  --text:      #111827;
  --radius:    12px;
  --shadow:    0 1px 4px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f1f5f9; color: var(--text);
  line-height: 1.65; font-size: 15px;
}

/* ── HEADER ── */
.page-header {
  background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%);
  color: #fff; padding: 28px 20px 22px; text-align: center;
  position: relative;
}
.page-header h1 { font-size: clamp(1.1em, 4vw, 1.7em); font-weight: 700; margin-bottom: 5px; }
.page-header p  { opacity: .85; font-size: .88em; }

/* ── SEARCH BAR ── */
.search-wrap {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
.search-inner {
  max-width: 860px; margin: 0 auto;
  display: flex; align-items: center; gap: 10px;
}
.search-box { flex: 1; position: relative; }
.search-box input {
  width: 100%; padding: 9px 36px 9px 38px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: .95em; outline: none; background: var(--gray-lt);
  transition: border-color .15s, background .15s;
  -webkit-appearance: none;
}
.search-box input:focus { border-color: var(--blue); background: #fff; }
.search-icon {
  position: absolute; left: 11px; top: 50%;
  transform: translateY(-50%); color: var(--gray);
  pointer-events: none; font-size: 1em;
}
.search-clear {
  position: absolute; right: 9px; top: 50%;
  transform: translateY(-50%); background: none; border: none;
  cursor: pointer; color: var(--gray); font-size: 1.1em;
  padding: 2px 4px; display: none; line-height: 1; border-radius: 50%;
}
.search-clear:hover { color: #111; background: var(--gray-lt); }
.search-count {
  white-space: nowrap; font-size: .88em; color: var(--gray);
  min-width: 90px; text-align: right;
}
.search-count strong { color: var(--blue-dark); }

/* ── CONTAINER ── */
.container {
  max-width: 860px; margin: 18px auto;
  padding: 0 14px 80px;
}

/* ── QUESTION CARD ── */
.question-block {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 16px;
  border-left: 4px solid var(--blue);
  overflow: hidden;
  transition: box-shadow .15s;
}
.question-block:hover {
  box-shadow: 0 2px 8px rgba(0,0,0,.12), 0 6px 20px rgba(0,0,0,.08);
}

.question-header {
  display: flex; align-items: center; gap: 8px;
  background: var(--blue-bg); padding: 8px 14px;
  border-bottom: 1px solid #dbeafe;
}
.q-badge {
  background: var(--blue); color: #fff;
  border-radius: 20px; padding: 1px 9px;
  font-size: .78em; font-weight: 700; letter-spacing: .3px;
}

.question-text {
  padding: 14px 16px 8px;
  font-size: 1em; font-weight: 500; color: #1e293b;
}
.question-text mark {
  background: #fef08a; color: inherit;
  border-radius: 3px; padding: 0 2px;
}

/* ── ANSWERS ── */
.answers {
  padding: 4px 16px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.answer-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 12px; border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--gray-lt);
}
.answer-item.correct {
  background: var(--green-bg);
  border-color: var(--green-bd);
  font-weight: 600;
}
.answer-letter {
  font-weight: 700; font-size: .9em;
  width: 22px; flex-shrink: 0; padding-top: 1px; color: var(--gray);
}
.answer-item.correct .answer-letter { color: var(--green); }
.answer-text {
  flex: 1; color: #374151; font-size: .95em;
}
.answer-item.correct .answer-text { color: #14532d; }
.answer-text mark {
  background: #bbf7d0; color: inherit;
  border-radius: 3px; padding: 0 2px;
}
.check-mark {
  flex-shrink: 0; margin-left: auto; padding-left: 6px;
  color: var(--green); font-weight: 700;
}

/* ── FEEDBACK ── */
.feedback-section {
  background: var(--yellow-bg);
  border-top: 1.5px solid var(--yellow-bd);
  padding: 10px 16px; font-size: .875em; color: #44403c;
}
.feedback-section p { margin: 3px 0; }
.feedback-section strong { color: #1c1917; }

/* ── EMPTY STATE ── */
#noResults {
  display: none; text-align: center;
  padding: 60px 20px; color: var(--gray);
}
#noResults .nr-icon { font-size: 2.5em; margin-bottom: 12px; }
#noResults p { font-size: .95em; }

/* ── SCROLL TOP ── */
#scrollTopBtn {
  position: fixed; bottom: 20px; right: 16px;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--blue); color: #fff; border: none;
  font-size: 1.3em; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 3px 10px rgba(37,99,235,.4);
  transition: background .15s, transform .15s;
  z-index: 200; text-decoration: none;
  line-height: 44px; text-align: center;
}
#scrollTopBtn:hover { background: var(--blue-dark); transform: translateY(-2px); }

/* ── MOBILE ── */
@media (max-width: 600px) {
  body { font-size: 14px; }
  .page-header { padding: 18px 14px 14px; }
  .container { margin: 12px auto; padding: 0 10px 80px; }
  .question-text { padding: 12px 12px 6px; }
  .answers { padding: 4px 12px 10px; gap: 5px; }
  .answer-item { padding: 7px 10px; }
  .feedback-section { padding: 9px 12px; }
  .search-count { display: none; }
}

.page-header { text-align: center; position: relative; }
.back-btn {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,.18); border: 1.5px solid rgba(255,255,255,.35);
  color: #fff; padding: 6px 13px; border-radius: 7px;
  text-decoration: none; font-size: .82em; font-weight: 600;
  white-space: nowrap; transition: background .15s; line-height: 1.4;
}
.back-btn:hover { background: rgba(255,255,255,.3); }
@media (max-width: 480px) {
  .back-btn { position: static; transform: none; display: inline-block;
              margin-bottom: 10px; font-size: .8em; }
  .page-header { padding-top: 16px; }
}
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-btn">&#8592; Trang chủ</a>
  <h1>Ôn Tập Bệnh truyền nhiễm Thú y</h1>
  <p>Câu hỏi trắc nghiệm có đáp án &mdash; Nguồn: LT_A01 – LT_A09</p>
</div>

<div class="search-wrap">
  <div class="search-inner">
    <div class="search-box">
      <span class="search-icon">&#128269;</span>
      <input type="search" id="searchInput"
             placeholder="Tìm câu hỏi hoặc đáp án..." autocomplete="off">
      <button class="search-clear" id="searchClear" title="Xóa">&#10005;</button>
    </div>
    <div class="search-count" id="searchCount">
      <strong>400</strong> / 400 câu
    </div>
  </div>
</div>

<div class="container" id="questionContainer">
  <div id="noResults">
    <div class="nr-icon">&#128269;</div>
    <p>Không tìm thấy câu hỏi phù hợp.</p>
  </div>
</div>

<script>
const QUESTIONS = [{"id":1,"text":"Đường kính trung bình hạt virus cúm gia cầm khoảng bao nhiêu?","answers":["A. 200–300 nm","B. 50–60 nm","C. 20–40 nm","D. 80–120 nm"],"correct":3,"explanation":"Đáp án đúng là: 80–120 nm Vì: Virus cúm có kích thước 80–120 nm.","reference":"Mục 5.1.3"},{"id":2,"text":"Phân biệt thể cấp tính và mạn tính của bệnh truyền nhiễm, phát biểu đúng là:","answers":["A. Cấp tính diễn biến vài ngày–vài tuần, mạn tính kéo dài tháng–năm","B. Cả hai đều không thể âm thầm","C. Cấp tính không có triệu chứng, mạn tính có triệu chứng rõ","D. Cấp tính diễn biến chậm, mạn tính diễn biến nhanh"],"correct":0,"explanation":"Đáp án đúng là: Cấp tính diễn biến vài ngày–vài tuần, mạn tính kéo dài tháng–năm Vì: Thể cấp tính nhanh (vài ngày–tuần), thể mạn tính kéo dài tháng–năm, triệu chứng mờ nhạt.","reference":"Mục 2.4.2"},{"id":3,"text":"Triệu chứng điển hình nhất của IC ở gà là gì?","answers":["A. Viêm màng túi khí","B. Chảy nước mũi, viêm xoang mũi","C. Tiêu chảy kèm sốt","D. Ho khan kéo dài"],"correct":1,"explanation":"Đáp án đúng là: Chảy nước mũi, viêm xoang mũi Vì: IC gây viêm cấp niêm mạc mũi và xoang, chảy dịch mũi","reference":"Mục 9.4"},{"id":4,"text":"Yếu tố dịch tễ làm CRD lan nhanh trong đàn là gì?","answers":["A. Thức ăn dư thừa","B. Thời tiết nóng ẩm","C. Mật độ nuôi cao, thông thoáng kém","D. Nồng độ amoniac thấp"],"correct":2,"explanation":"Đáp án đúng là: Mật độ nuôi cao, thông thoáng kém Vì: Chuồng bí, mật độ cao tạo điều kiện lây truyền ngang nhanh","reference":"Mục 10.3.2"},{"id":5,"text":"Nhân tố trung gian truyền bệnh không bao gồm:","answers":["A. Côn trùng","B. Thức ăn, nước uống","C. Động vật mang trùng","D. Không khí"],"correct":2,"explanation":"Đáp án đúng là: Động vật mang trùng Vì: Động vật mang trùng là nguồn bệnh, không phải trung gian.","reference":"Mục 3.1.2"},{"id":6,"text":"TGEV gây bệnh qua đường nào?","answers":["A. Tiêu hóa (miệng–mũi)","B. Da tiếp xúc","C. Máu","D. Hô hấp"],"correct":0,"explanation":"Đáp án đúng là: Tiêu hóa (miệng–mũi) Vì: TGEV xâm nhập qua đường tiêu hóa, chủ yếu qua miệng – mũi.","reference":"Mục 6.1.4"},{"id":7,"text":"Triệu chứng chính ở móng FMD là gì?","answers":["A. Mụn nước và loét quanh móng","B. Liệt chân","C. Rụng móng toàn bộ","D. Sưng khớp"],"correct":0,"explanation":"Đáp án đúng là: Mụn nước và loét quanh móng Vì: Mụn nước kẽ móng là dấu hiệu điển hình Tham khảo: Mục I.1.4.1.1 Bài 5","reference":""},{"id":8,"text":"Tỷ lệ chết lợn con trong dịch TGE endemic thường?","answers":["A. 10–20 %","B. 1","C. 0","D. 0.5"],"correct":0,"explanation":"Đáp án đúng là: 10–20 % Vì: Trong điều kiện endemic, TGE gây tử vong 10–20 % ở lợn con.","reference":"Mục 6.1.5"},{"id":9,"text":"Chỉ định sử dụng vacxin sống nhược độc PRRSV khi nào?","answers":["A. Khi dịch bùng phát","B. Không bao giờ","C. Trước khi heo nái phối","D. Sau khi heo bệnh"],"correct":2,"explanation":"Đáp án đúng là: Trước khi heo nái phối Vì: Chủ động trước đợt sinh sản","reference":"Mục 3.7"},{"id":10,"text":"Kháng sinh nào KHÔNG có tác dụng phòng ngừa cúm lợn?","answers":["A. Zanamivir","B. Amantadine","C. Ampicillin","D. Tamiflu (oseltamivir)"],"correct":2,"explanation":"Đáp án đúng là: Ampicillin Vì: Ampicillin là kháng sinh, không tác động lên virus.","reference":"Mục 7.8"},{"id":11,"text":"Dơi là nguồn truyền bệnh dại nguy hiểm vì:","answers":["A. Di chuyển xa và chứa virus lâu","B. Làm hỏng lưới","C. Gây thương tích","D. Gây tiếng ồn"],"correct":0,"explanation":"Đáp án đúng là: Di chuyển xa và chứa virus lâu Vì: Dơi di chuyển xa và có thể chứa virus dại lâu trước khi phát bệnh.","reference":"Mục 1.3"},{"id":12,"text":"ASFV mang bộ gen loại gì?","answers":["A. ARN sợi kép","B. ARN sợi đơn","C. ADN sợi đơn","D. ADN mạch kép"],"correct":3,"explanation":"Đáp án đúng là: ADN mạch kép Vì: ASFV là virus ADN mạch kép Tham khảo: Mục II.2.1 Bài 7","reference":""},{"id":13,"text":"Triệu chứng điển hình của Gumboro là gì?","answers":["A. Ho nhiều, mũi khô","B. Sưng khớp, liệt chân","C. Tiêu chảy màu trắng vàng, ủ rũ","D. Mắt sưng, chảy nước mắt"],"correct":2,"explanation":"Đáp án đúng là: Tiêu chảy màu trắng vàng, ủ rũ Vì: Tiêu chảy trắng-vàng, giảm ăn là biểu hiện đặc trưng.","reference":"Mục 3.4.1"},{"id":14,"text":"Triệu chứng khởi phát của cúm gia cầm gồm?","answers":["A. Tiêu chảy nặng","B. Sốt cao đột ngột, chảy nước mũi, ho","C. Co giật","D. Viêm da mụn nước"],"correct":1,"explanation":"Đáp án đúng là: Sốt cao đột ngột, chảy nước mũi, ho Vì: Cúm gà biểu hiện sốt, chảy mũi, ho.","reference":"Mục 5.1.6"},{"id":15,"text":"Biện pháp phòng bệnh cơ bản nhất với cúm lợn là gì?","answers":["A. Xạ trị","B. Dùng corticosteroid","C. Vệ sinh chuồng, cách ly lợn bệnh","D. Dùng kháng sinh"],"correct":2,"explanation":"Đáp án đúng là: Vệ sinh chuồng, cách ly lợn bệnh Vì: Chưa có thuốc đặc hiệu, vệ sinh – cách ly là chủ yếu.","reference":"Mục 7.7.1"},{"id":16,"text":"Ở –70 °C, virus cúm gia cầm và NDV tồn tại trong bao lâu?","answers":["A. Không tồn tại","B. Vài giờ","C. Vài ngày","D. Nhiều tháng đến hàng năm"],"correct":3,"explanation":"Đáp án đúng là: Nhiều tháng đến hàng năm Vì: Cả hai virus bền lạnh, –70 °C bảo quản lâu dài (> năm).","reference":"Mục 5.1.12"},{"id":17,"text":"Vacxin nhược độc CSF chủng GPE-(-) được nuôi cấy trên?","answers":["A. Môi trường tế bào","B. Môi trường thịt nước","C. Môi trường thạch","D. Môi trường huyết thanh"],"correct":0,"explanation":"Đáp án đúng là: Môi trường tế bào Vì: Vacxin GPE-(-) nuôi cấy tế bào","reference":"Mục 1.7.2"},{"id":18,"text":"Con đường lây chính của S. suis là?","answers":["A. Tiếp xúc niêm mạc (hô hấp, tiêu hóa, sinh dục)","B. Ăn phải thịt sống","C. Muỗi đốt","D. Nước uống"],"correct":0,"explanation":"Đáp án đúng là: Tiếp xúc niêm mạc (hô hấp, tiêu hóa, sinh dục) Vì: S. suis lây qua tiếp xúc niêm mạc, phân, nước bọt, tinh dịch.","reference":"Mục 9.3.2"},{"id":19,"text":"Bệnh Newcastle thuộc họ Paramyxoviridae subfamily nào?","answers":["A. Orthomyxoviridae","B. Pneumovirinae","C. Flaviviridae","D. Paramyxovirinae"],"correct":3,"explanation":"Đáp án đúng là: Paramyxovirinae Vì: NDV là avian paramyxovirus 1 trong Paramyxovirinae.","reference":"Mục 5.2.1"},{"id":20,"text":"DVE virus bất hoạt ở 56 °C sau bao lâu?","answers":["A. 24 giờ","B. 10 phút","C. 90–120 phút","D. 30 phút"],"correct":2,"explanation":"Đáp án đúng là: 90–120 phút Vì: Virus nhạy nhiệt, cần 90–120 phút ở 56 °C","reference":"Mục 8.2.5"},{"id":21,"text":"Chẩn đoán lâm sàng bệnh tụ huyết trùng dựa vào dấu hiệu nào?","answers":["A. Khó thở","B. Giảm ăn","C. Gầy mòn","D. Sốt cao, sưng hạch và tụ huyết"],"correct":3,"explanation":"Đáp án đúng là: Sốt cao, sưng hạch và tụ huyết Vì: Kết hợp triệu chứng sốt, sưng hạch và xuất huyết dưới da","reference":"Mục 3.6.1"},{"id":22,"text":"Tổn thương đặc trưng khi mổ khám Gumboro?","answers":["A. Túi Fabricius teo, xuất huyết","B. Phổi xung huyết","C. Gan sưng, vàng","D. Tim mềm nhũn"],"correct":0,"explanation":"Đáp án đúng là: Túi Fabricius teo, xuất huyết Vì: Túi Fabricius teo, xuất huyết là đặc điểm điển hình.","reference":"Mục 3.4.2"},{"id":23,"text":"Salmonella có khả năng di động nhờ?","answers":["A. Roi","B. Lông chuyển động","C. Pseudopodia","D. Không di động"],"correct":0,"explanation":"Đáp án đúng là: Roi Vì: Salmonella di động nhờ roi (flagella).","reference":"Mục 10.2.2"},{"id":24,"text":"Mùa bùng phát FMD thường vào thời gian nào ở Việt Nam?","answers":["A. Tháng 6–8","B. Tháng 10–12","C. Tháng 8–10","D. Tháng 2–4 (mùa mưa phùn)"],"correct":3,"explanation":"Đáp án đúng là: Tháng 2–4 (mùa mưa phùn) Vì: FMD bùng phát mạnh vào mùa mưa phùn, ẩm ướt Tham khảo: Mục I.1.3.3 Bài 5","reference":""},{"id":25,"text":"Vaccine ngừa S. suis chủ yếu sử dụng cho đối tượng nào?","answers":["A. Lợn con < 2 tuần","B. Lợn sinh sản","C. Lợn nái và lợn hậu bị","D. Lợn thịt trưởng thành"],"correct":2,"explanation":"Đáp án đúng là: Lợn nái và lợn hậu bị Vì: Tiêm vaccine vô hoạt cho lợn nái và hậu bị để truyền kháng thể thụ động.","reference":"Mục 9.7.2"},{"id":26,"text":"Điều trị S. suis ở lợn bệnh nặng chọn thuốc nào?","answers":["A. Ciprofloxacin","B. Penicillin hoặc trimethoprim-sulfonamide","C. Gentamicin","D. Azithromycin"],"correct":1,"explanation":"Đáp án đúng là: Penicillin hoặc trimethoprim-sulfonamide Vì: Penicillin và trimethoprim-sulfonamide hiệu quả cao.","reference":"Mục 9.8"},{"id":27,"text":"Xét nghiệm huyết thanh ELISA cạnh tranh CSF dùng kháng nguyên nào?","answers":["A. NS3","B. E2 (glycoprotein)","C. Core protein","D. p7"],"correct":1,"explanation":"Đáp án đúng là: E2 (glycoprotein) Vì: ELISA dùng kháng nguyên E2","reference":"Mục 1.6.2"},{"id":28,"text":"IBDV bất hoạt dưới ánh sáng mặt trời sau khoảng bao lâu?","answers":["A. 12 giờ","B. 6 giờ","C. 48 giờ","D. 24 giờ"],"correct":2,"explanation":"Đáp án đúng là: 48 giờ Vì: Virus nhạy cảm với ánh nắng, mất hoạt lực sau khoảng 2 ngày.","reference":"Mục 3.3.4"},{"id":29,"text":"Biện pháp phòng bệnh tổng hợp cho gia cầm khi có cả hai dịch?","answers":["A. Dùng kháng sinh","B. Trộn thức ăn thuốc","C. Xạ trị","D. Vệ sinh chuồng, cách ly, tiêm phòng đồng thời cả cúm và ND"],"correct":3,"explanation":"Đáp án đúng là: Vệ sinh chuồng, cách ly, tiêm phòng đồng thời cả cúm và ND Vì: Phối hợp vệ sinh, cách ly và chích vaccine cúm & ND song song.","reference":"Mục 5.1.8"},{"id":30,"text":"Ổ dịch viêm da nổi cục đầu tiên ở Việt Nam được phát hiện ở tỉnh nào?","answers":["A. Đồng Nai","B. An Giang","C. Cao Bằng","D. Hà Nội"],"correct":2,"explanation":"Đáp án đúng là: Cao Bằng Vì: Báo cáo đầu tiên tháng 10/2020 tại Cao Bằng","reference":"Mục 4.1"},{"id":31,"text":"PRCV là biến chủng của virus nào?","answers":["A. PCV2","B. PEDV","C. TGEV","D. FIPV"],"correct":2,"explanation":"Đáp án đúng là: TGEV Vì: PRCV là biến thể lây qua đường hô hấp của Transmissible Gastroenteritis Virus.","reference":"Mục 6.2.1"},{"id":32,"text":"Bệnh tích đại thể ở gan vịt DHV 1 thể hiện thế nào?","answers":["A. Không có thay đổi","B. Lách sưng","C. Gan sưng, nhũn, xuất huyết lan tỏa","D. Gan teo"],"correct":2,"explanation":"Đáp án đúng là: Gan sưng, nhũn, xuất huyết lan tỏa Vì: Gan sưng nhũn, có nốt xuất huyết","reference":"Mục 7.5"},{"id":33,"text":"Hình thái Bacillus anthracis quan sát dưới kính hiển vi?","answers":["A. Cầu","B. Trụ, xếp thành chuỗi","C. Xoắn khuẩn","D. Song cầu"],"correct":1,"explanation":"Đáp án đúng là: Trụ, xếp thành chuỗi Vì: B. anthracis là trực khuẩn trụ xếp chuỗi Tham khảo: Mục II.2.2 Bài 7","reference":""},{"id":34,"text":"Chỉ số LD50 dùng để:","answers":["A. Phân loại mầm bệnh theo trọng lượng","B. Xác định đường xâm nhập chính","C. Đánh giá độc lực bằng liều gây chết 50% động vật thí nghiệm","D. Đo lượng độc tố tiết ra trong 50 giờ"],"correct":2,"explanation":"Đáp án đúng là: Đánh giá độc lực bằng liều gây chết 50% động vật thí nghiệm Vì: LD50 (lethal dose 50%) là liều gây chết 50% số động vật thử nghiệm.","reference":"Mục 1.1.2."},{"id":35,"text":"Doxycycline có thể dùng đơn liều ủng hộ điều trị leptospirosis ở người với liều:","answers":["A. 200 mg","B. 100 mg","C. 500 mg","D. 50 mg"],"correct":0,"explanation":"Đáp án đúng là: 200 mg Vì: Doxycycline 200 mg liều duy nhất.","reference":"Mục 4.8"},{"id":36,"text":"Tỷ lệ chết trung bình của gà mắc IBDV là?","answers":["A. 50–60 %","B. 0–5 %","C. Trên 80 %","D. 10–20 %"],"correct":3,"explanation":"Đáp án đúng là: 10–20 % Vì: IBDV cổ điển có tỷ lệ chết trung bình từ 10–20 %.","reference":"Mục 3.4.1"},{"id":37,"text":"Bệnh tích điển hình DVE thấy ở thực quản là?","answers":["A. Xuất huyết thành đám hoặc màng giả","B. U gan","C. Xơ hóa","D. Hoại tử túi khí"],"correct":0,"explanation":"Đáp án đúng là: Xuất huyết thành đám hoặc màng giả Vì: Thực quản có xuất huyết + màng giả (8.5)","reference":"Mục 8.5"},{"id":38,"text":"Động vật lành mang trùng là:","answers":["A. Đã tiêm vaccin đầy đủ","B. Chỉ mang kháng thể, không mang mầm bệnh","C. Có triệu chứng lâm sàng nhưng không thải mầm bệnh","D. Không có triệu chứng, mang và thải mầm bệnh ra môi trường"],"correct":3,"explanation":"Đáp án đúng là: Không có triệu chứng, mang và thải mầm bệnh ra môi trường Vì: Động vật không biểu hiện triệu chứng nhưng vẫn mang và thải mầm bệnh ra môi trường.","reference":"Mục 1.1.4."},{"id":39,"text":"Hình thái virus LT quan sát là gì?","answers":["A. ARN sợi đơn ~30 kb","B. ADN sợi kép, có vỏ, đường kính 195–250 nm","C. dsRNA hai đoạn","D. ADN 1 sợi"],"correct":1,"explanation":"Đáp án đúng là: ADN sợi kép, có vỏ, đường kính 195–250 nm Vì: LTV là ADN virus, capsid và vỏ lớn (195–250 nm).","reference":"Mục 6.2.2"},{"id":40,"text":"Tác nhân gây bệnh cúm gia cầm thuộc họ nào?","answers":["A. Orthomyxoviridae","B. Coronaviridae","C. Flaviviridae","D. Paramyxoviridae"],"correct":0,"explanation":"Đáp án đúng là: Orthomyxoviridae Vì: Virus cúm gia cầm là influenza A thuộc Orthomyxoviridae.","reference":"Mục 5.1.1"},{"id":41,"text":"Mục đích chính của phản ứng HI trong cúm gà?","answers":["A. Đo độc lực","B. Phân biệt subtyp HA và NA","C. Nuôi cấy virus","D. Xác định lượng virus"],"correct":1,"explanation":"Đáp án đúng là: Phân biệt subtyp HA và NA Vì: HI đo kháng thể ức chế HA gây ngưng kết hồng cầu.","reference":"Mục 5.1.13"},{"id":42,"text":"Virus cúm gia cầm dễ nuôi cấy nhất trên hệ thống nào?","answers":["A. Thận bò","B. Phôi gà","C. Thận chó Madin-Darby","D. Tế bào thực quản"],"correct":1,"explanation":"Đáp án đúng là: Phôi gà Vì: Nuôi cấy phôi gà 9–11 ngày tuổi cho hiệu quả cao.","reference":"Mục 5.1.11"},{"id":43,"text":"Virus dại thường gây bệnh cho loài nào?","answers":["A. Chim biển","B. Động vật máu nóng","C. Côn trùng","D. Cá và lưỡng cư"],"correct":1,"explanation":"Đáp án đúng là: Động vật máu nóng Vì: Virus dại thường gây bệnh cho các loài động vật máu nóng.","reference":"Mục 1.1"},{"id":44,"text":"Vacxin Anthrax thường dùng chủng nào?","answers":["A. Sterne (bào tử giảm độc lực)","B. LOM","C. BVDV","D. GPE-(-)"],"correct":0,"explanation":"Đáp án đúng là: Sterne (bào tử giảm độc lực) Vì: Vacxin Sterne nhược độc bào tử Tham khảo: Mục II.7.2 Bài 7","reference":""},{"id":45,"text":"Kháng nguyên nào thường dùng để phát hiện miễn dịch với DHV 1?","answers":["A. NP protein","B. Capsid VP1","C. HA protein","D. Glycoprotein G"],"correct":1,"explanation":"Đáp án đúng là: Capsid VP1 Vì: VP1 là protein capsid đặc hiệu","reference":"Mục 7.2.2"},{"id":46,"text":"Tác nhân gây viêm gan vịt typ 1 thuộc họ nào?","answers":["A. Orthomyxoviridae","B. Flaviviridae","C. Herpesviridae","D. Picornaviridae"],"correct":3,"explanation":"Đáp án đúng là: Picornaviridae Vì: DHV 1 là Enterovirus thuộc họ Picornaviridae","reference":"Mục 7.2.1"},{"id":47,"text":"Trong mẫu phân heo bệnh PED, virus phân lập tốt nhất trên môi trường nào?","answers":["A. Môi trường thạch","B. Phôi gà màng niệu","C. Dòng tế bào Vero","D. Dòng tế bào PAM"],"correct":2,"explanation":"Đáp án đúng là: Dòng tế bào Vero Vì: PEDV nhân lên tốt trên Vero","reference":"Mục 4.6"},{"id":48,"text":"Biện pháp phòng cơ bản nhất với cúm gia cầm?","answers":["A. Bổ sung vitamin","B. Vệ sinh chuồng, cách ly đàn bệnh","C. Dùng kháng sinh","D. Xạ trị"],"correct":1,"explanation":"Đáp án đúng là: Vệ sinh chuồng, cách ly đàn bệnh Vì: Chưa có thuốc đặc hiệu, vệ sinh và cách ly là biện pháp chủ yếu.","reference":"Mục 5.1.8"},{"id":49,"text":"Thời gian bảo hộ của vaccine Gumboro kéo dài khoảng?","answers":["A. 4–6 tuần","B. 8–12 giờ","C. Trọn đời gà","D. 1–2 tuần"],"correct":0,"explanation":"Đáp án đúng là: 4–6 tuần Vì: Kháng thể bảo hộ thường đạt tối đa sau 1 tuần và kéo dài 4–6 tuần.","reference":"Mục 3.6.2"},{"id":50,"text":"Bệnh nhiệt thán có thể lây sang người qua:","answers":["A. Tiếp xúc với động vật bệnh","B. Côn trùng đốt","C. Không khí bình thường","D. Qua hô hấp người lành"],"correct":0,"explanation":"Đáp án đúng là: Tiếp xúc với động vật bệnh Vì: Bệnh nhiệt thán lây qua tiếp xúc với động vật hoặc sản phẩm nhiễm bào tử.","reference":"Mục 2.1"},{"id":51,"text":"Dấu hiệu bệnh than ở động vật ăn cỏ bao gồm:","answers":["A. Chảy nước mắt","B. Sốt cao, bỏ ăn, lách to","C. Ho dai dẳng","D. Lông rụng"],"correct":1,"explanation":"Đáp án đúng là: Sốt cao, bỏ ăn, lách to Vì: Động vật bệnh than có dấu hiệu sốt cao, bỏ ăn và lách to.","reference":"Mục 2.4"},{"id":52,"text":"Kỹ thuật đòi hỏi quan sát Leptospira dưới kính nền đen vì:","answers":["A. Kích thước lớn","B. Khả năng phát huỳnh quang","C. Chịu nhiệt cao","D. Khó nhuộm thông thường"],"correct":3,"explanation":"Đáp án đúng là: Khó nhuộm thông thường Vì: Leptospira khó nhuộm nên soi nền đen.","reference":"Mục 4.6.2.1"},{"id":53,"text":"Yếu tố độc lực CPS của S. suis có vai trò gì?","answers":["A. Tạo độc tố","B. Chống thực bào, giúp vi khuẩn sống sót trong cơ thể","C. Kết dính hồng cầu","D. Phá hủy tế bào"],"correct":1,"explanation":"Đáp án đúng là: Chống thực bào, giúp vi khuẩn sống sót trong cơ thể Vì: CPS (capsular polysaccharide) bảo vệ vi khuẩn khỏi thực bào.","reference":"Mục 9.3.3"},{"id":54,"text":"Reservoir chính của leptospira là:","answers":["A. Bò","B. Chó","C. Chuột","D. Cừu"],"correct":2,"explanation":"Đáp án đúng là: Chuột Vì: Chuột luôn mang và thải leptospira.","reference":"Mục 4.3.2"},{"id":55,"text":"Phương pháp chẩn đoán vi ngưng kết (MAT) xác định leptospira dùng:","answers":["A. Leptospira chết","B. DNA mẫu","C. Leptospira sống","D. Kháng nguyên tổng hợp"],"correct":2,"explanation":"Đáp án đúng là: Leptospira sống Vì: MAT dùng leptospira sống làm kháng nguyên.","reference":"Mục 4.6.2.5"},{"id":56,"text":"Triệu chứng vàng da ở xoắn khuẩn là do:","answers":["A. Viêm gan virus","B. Suy thận","C. Nhiễm độc thuốc","D. Độc tố phá hủy tế bào máu"],"correct":3,"explanation":"Đáp án đúng là: Độc tố phá hủy tế bào máu Vì: Leptospira sản sinh độc tố gây vàng da.","reference":"Mục 4.1"},{"id":57,"text":"Triệu chứng chính của CRD ở gà trưởng thành là gì?","answers":["A. Viêm kết mạc mắt","B. Mẩn ngứa da đầu","C. Tiêu chảy phân lỏng","D. Ran phế quản, chảy nước mũi, ho"],"correct":3,"explanation":"Đáp án đúng là: Ran phế quản, chảy nước mũi, ho Vì: CRD gây viêm đường hô hấp trên, ran phế quản và chảy dịch mũi","reference":"Mục 10.4"},{"id":58,"text":"Trong phòng bệnh Bluetongue, biện pháp nào quan trọng nhất?","answers":["A. Cách ly gia súc","B. Tiêm vaccine kháng nguyên","C. Kiểm soát vector côn trùng","D. Đốt xác động vật bệnh"],"correct":2,"explanation":"Đáp án đúng là: Kiểm soát vector côn trùng Vì: Bluetongue lây qua vector, nên kiểm soát véc tơ là biện pháp chủ lực Tham khảo: Mục II.2.7.1 Bài 5","reference":""},{"id":59,"text":"Chất sát trùng nào sau đây không hiệu quả cao trong tiêu diệt FMDV?","answers":["A. NaOH","B. Xà phòng","C. Formol","D. Iod hữu cơ"],"correct":1,"explanation":"Đáp án đúng là: Xà phòng Vì: Xà phòng không bất hoạt được virus ARN bọc capsid như FMDV Tham khảo: Mục I.1.7 Bài 5","reference":""},{"id":60,"text":"Triệu chứng đầu tiên thường gặp ở gà mắc EDS là gì?","answers":["A. Sốt cao không rõ nguyên nhân","B. Vỏ trứng mỏng, vỏ mềm hoặc khuyết","C. Tiêu chảy","D. Ho khan"],"correct":1,"explanation":"Đáp án đúng là: Vỏ trứng mỏng, vỏ mềm hoặc khuyết Vì: Dấu ấn lâm sàng EDS là vỏ trứng bất thường, gà không có triệu chứng hô hấp.","reference":"Mục 5.4"},{"id":61,"text":"Bệnh tích đại thể điển hình nhất của LSD là gì?","answers":["A. Loét dạ dày","B. Nốt sần hoại tử ở da và mô dưới da","C. Xơ hóa tinh hoàn","D. Viêm gan"],"correct":1,"explanation":"Đáp án đúng là: Nốt sần hoại tử ở da và mô dưới da Vì: Nốt sần hoại tử là tổn thương chính trên da","reference":"Mục 4.5"},{"id":62,"text":"Loài ve truyền ASFV chủ yếu thuộc chi gì?","answers":["A. Amblyomma","B. Rhipicephalus","C. Ornithodoros","D. Ixodes"],"correct":2,"explanation":"Đáp án đúng là: Ornithodoros Vì: ASFV qua Ornithodoros spp. Tham khảo: Mục II.2.3 Bài 7","reference":""},{"id":63,"text":"Virus dại chủ yếu xâm nhập vào cơ thể qua:","answers":["A. Đường hô hấp","B. Qua da lành","C. Đường tiêu hóa","D. Vết cắn của động vật"],"correct":3,"explanation":"Đáp án đúng là: Vết cắn của động vật Vì: Virus dại xâm nhập qua vết cắn của động vật mang bệnh.","reference":"Mục 1.4"},{"id":64,"text":"Brucella thuộc nhóm nguy cơ nào theo WHO?","answers":["A. III","B. II","C. I","D. IV"],"correct":0,"explanation":"Đáp án đúng là: III Vì: WHO xếp Brucella trong nhóm nguy cơ III.","reference":"Mục 3.1"},{"id":65,"text":"Biện pháp phòng bệnh DHV 1 chủ yếu là gì?","answers":["A. Cách ly bình thường","B. Vệ sinh chuồng, khử trùng, tiêm vaccine","C. Xạ trị chuồng","D. Dùng kháng sinh"],"correct":1,"explanation":"Đáp án đúng là: Vệ sinh chuồng, khử trùng, tiêm vaccine Vì: Vaccine nhược độc và vệ sinh là chính","reference":"Mục 7.6"},{"id":66,"text":"Đường lây truyền chủ yếu của LSDV là gì?","answers":["A. Tiếp xúc với nước","B. Qua thức ăn","C. Qua vectơ côn trùng","D. Qua không khí"],"correct":2,"explanation":"Đáp án đúng là: Qua vectơ côn trùng Vì: Muỗi, ruồi hút máu truyền virus giữa gia súc","reference":"Mục 4.2"},{"id":67,"text":"Triệu chứng hô hấp ASF thể cấp thường thấy?","answers":["A. Mắt mờ","B. Giảm bạch cầu","C. Viêm niêm mạc mũi, ho ướt","D. Yếu tứ chi"],"correct":2,"explanation":"Đáp án đúng là: Viêm niêm mạc mũi, ho ướt Vì: ASN cấp có ho, viêm mũi Tham khảo: Mục II.2.4 Bài 7","reference":""},{"id":68,"text":"Tại sao phải sát trùng chuồng sau dịch Gumboro?","answers":["A. Loại bỏ virus tồn lưu trong môi trường","B. Ngừa tiêu chảy","C. Ngăn mùi hôi","D. Kích thích tăng trưởng"],"correct":0,"explanation":"Đáp án đúng là: Loại bỏ virus tồn lưu trong môi trường Vì: Virus tồn lưu trong chất độn, sát trùng kỹ giúp ngăn tái phát bệnh.","reference":"Mục 3.6.3"},{"id":69,"text":"Bộ gen của EDS virus có đặc điểm gì?","answers":["A. ssRNA đơn ~10 kb","B. dsRNA hai đoạn","C. dsDNA khoảng 33,2 kb","D. ssDNA vòng"],"correct":2,"explanation":"Đáp án đúng là: dsDNA khoảng 33,2 kb Vì: EDSV có ADN sợi kép, genome nhỏ hơn các aviadenovirus I.","reference":"Mục 5.2.1"},{"id":70,"text":"Yếu tố nào sau đây không được coi là nguồn bệnh?","answers":["A. Dã thú","B. Động vật mang trùng","C. Đất","D. Động vật đang mắc bệnh"],"correct":2,"explanation":"Đáp án đúng là: Đất Vì: Nha bào tồn tại lâu trên đất nhưng không sinh sôi trên đó.","reference":"Mục 3.1.1"},{"id":71,"text":"Bệnh sảy thai truyền nhiễm do vi khuẩn nào gây ra?","answers":["A. Leptospira","B. Salmonella","C. Staphylococcus","D. Brucella"],"correct":3,"explanation":"Đáp án đúng là: Brucella Vì: Do Brucella gây ra bệnh sảy thai truyền nhiễm.","reference":"Mục 3.2"},{"id":72,"text":"Kết quả thử catalase của Streptococcus suis là?","answers":["A. Âm tính","B. Dương tính","C. Không xác định được","D. Biến đổi"],"correct":0,"explanation":"Đáp án đúng là: Âm tính Vì: Streptococcus spp. thường catalase âm tính.","reference":"Mục 9.1.2"},{"id":73,"text":"Amantadine thử nghiệm ức chế virus nào?","answers":["A. FECV","B. PRCV","C. TGEV","D. PCV2"],"correct":2,"explanation":"Đáp án đúng là: TGEV Vì: Nghiên cứu cho thấy Amantadine có tác dụng ức chế nhân lên TGEV trên tế bào in vitro.","reference":"Mục 6.1.8"},{"id":74,"text":"Phương pháp chẩn đoán phân tử ưu tiên cho DHV 1?","answers":["A. FAT phát hiện kháng nguyên","B. RT-PCR phát hiện gene VP1","C. Nuôi cấy trên phôi","D. ELISA kháng thể"],"correct":1,"explanation":"Đáp án đúng là: RT-PCR phát hiện gene VP1 Vì: PCR nhạy, đặc hiệu phát hiện gene virus","reference":"Mục 7.5"},{"id":75,"text":"Ổ dịch FMD tại Việt Nam đầu tiên xuất hiện ở tỉnh nào năm 2020?","answers":["A. Hà Nội","B. Đồng Nai","C. Cao Bằng","D. An Giang"],"correct":2,"explanation":"Đáp án đúng là: Cao Bằng Vì: Theo báo cáo Cục Thú y, ổ dịch đầu tiên năm 2020 ở Cao Bằng Tham khảo: Mục I.1 (tổng quan) Bài 5","reference":""},{"id":76,"text":"Triệu chứng lâm sàng đầu tiên của S. suis ở lợn là gì?","answers":["A. Sốt cao, bỏ ăn, chán ăn","B. Ban đỏ","C. Tiêu chảy nặng","D. Ho khan"],"correct":0,"explanation":"Đáp án đúng là: Sốt cao, bỏ ăn, chán ăn Vì: Lợn nhiễm S. suis thường sốt cao và bỏ ăn đầu tiên.","reference":"Mục 9.4"},{"id":77,"text":"Loại Leptospira không gây bệnh là:","answers":["A. Leptospira pomona","B. Leptospira canicola","C. Leptospira interrogans","D. Leptospira biflexa"],"correct":3,"explanation":"Đáp án đúng là: Leptospira biflexa Vì: L. biflexa là loài không gây bệnh.","reference":"Mục 4.2"},{"id":78,"text":"Biện pháp vệ sinh chuồng phòng DVE là gì?","answers":["A. Xạ trị chuồng","B. Cho ăn kháng sinh","C. Phun muỗi","D. Tiệt trùng formol, NaOH, cresol"],"correct":3,"explanation":"Đáp án đúng là: Tiệt trùng formol, NaOH, cresol Vì: Vệ sinh–tiêu độc chuồng, dụng cụ (8.7.1)","reference":"Mục 8.7.1"},{"id":79,"text":"Kháng nguyên HA giúp virus cúm làm gì?","answers":["A. Gắn kết và xâm nhập vào tế bào","B. Giải phóng virion","C. Tổng hợp protein","D. Trung hòa kháng thể"],"correct":0,"explanation":"Đáp án đúng là: Gắn kết và xâm nhập vào tế bào Vì: HA gắn vào receptor trên tế bào, khởi đầu quá trình nhiễm.","reference":"Mục 5.1.9"},{"id":80,"text":"Thời gian ủ bệnh trung bình của bệnh dại ở người là:","answers":["A. 1 - 3 tháng","B. 6 tháng","C. 1 ngày","D. Trên 1 năm"],"correct":0,"explanation":"Đáp án đúng là: 1 - 3 tháng Vì: Thời gian ủ bệnh trung bình của bệnh dại ở người là 1 - 3 tháng.","reference":"Mục 1.4"},{"id":81,"text":"Trong chẩn đoán huyết thanh học cúm lợn, phản ứng HI đo gì?","answers":["A. Số lượng kháng nguyên","B. Kháng thể ức chế ngưng kết hồng cầu","C. Lượng ARN virus","D. Số lượng phôi gà"],"correct":1,"explanation":"Đáp án đúng là: Kháng thể ức chế ngưng kết hồng cầu Vì: HI đo khả năng kháng thể ức chế HA gây ngưng kết hồng cầu.","reference":"Mục 7.6.3"},{"id":82,"text":"Biện pháp phòng bệnh leptospira ở lợn là:","answers":["A. Vắcxin 2 mũi cách 7 ngày","B. Uống nước khử khuẩn","C. Cách ly động vật hoang dã","D. Ăn thức ăn đã tiệt trùng"],"correct":0,"explanation":"Đáp án đúng là: Vắcxin 2 mũi cách 7 ngày Vì: Tiêm vaccine 2 mũi cách 7 ngày.","reference":"Mục 4.7.2.2"},{"id":83,"text":"Nội độc tố (endotoxin) là:","answers":["A. Lipid A trong lipopolysaccharide của vi khuẩn Gram âm","B. Protein do Clostridium tiết ra","C. Yếu tố lan truyền","D. Enzym phá vỡ mô liên kết"],"correct":0,"explanation":"Đáp án đúng là: Lipid A trong lipopolysaccharide của vi khuẩn Gram âm Vì: Nội độc tố là lipid A thuộc LPS của vi khuẩn Gram âm, giải phóng khi tế bào bị phân hủy.","reference":"Mục 1.1.3."},{"id":84,"text":"Bệnh dại do loại virus nào gây ra?","answers":["A. Herpesvirus","B. Influenza virus","C. Lyssavirus","D. Coronavirus"],"correct":2,"explanation":"Đáp án đúng là: Lyssavirus Vì: Bệnh dại do virus Lyssavirus gây ra.","reference":"Mục 1.2"},{"id":85,"text":"Vai trò chính của kháng sinh trong điều trị Gumboro?","answers":["A. Kích thích miễn dịch","B. Tiêu diệt virus","C. Ngăn ngừa bội nhiễm vi khuẩn","D. Giảm rối loạn tiêu hóa"],"correct":2,"explanation":"Đáp án đúng là: Ngăn ngừa bội nhiễm vi khuẩn Vì: Kháng sinh chỉ có vai trò kiểm soát bội nhiễm, không tác dụng với virus.","reference":"Mục 3.7"},{"id":86,"text":"Động vật chủ chính của ASFV là gì?","answers":["A. Lợn nhà (Sus scrofa domesticus)","B. Gia cầm","C. Bò","D. Trâu"],"correct":0,"explanation":"Đáp án đúng là: Lợn nhà (Sus scrofa domesticus) Vì: ASFV lây chủ yếu ở lợn Tham khảo: Mục II.2.2 Bài 7","reference":""},{"id":87,"text":"Đường xâm nhập chính của mầm bệnh vào cơ thể động vật KHÔNG bao gồm:","answers":["A. Đường máu","B. Đường hô hấp","C. Đường tiêu hóa","D. Đường thần kinh"],"correct":3,"explanation":"Đáp án đúng là: Đường thần kinh Vì: Các đường xâm nhập chính: tiêu hóa, hô hấp, da–niêm mạc, sinh dục–tiết niệu, máu; không có đường thần kinh.","reference":"Mục 1.1.2."},{"id":88,"text":"Kích thước hạt TGEV khoảng bao nhiêu?","answers":["A. 500–800 nm","B. 20–40 nm","C. 60–160 nm","D. 200–300 nm"],"correct":2,"explanation":"Đáp án đúng là: 60–160 nm Vì: Coronaviridae thường có đường kính 60–160 nm, phù hợp với số liệu TGEV.","reference":"Mục 6.1.2"},{"id":89,"text":"Đường truyền chính của IC trong đàn gà là gì?","answers":["A. Qua vết thương da","B. Tiêu hóa","C. Hô hấp (qua không khí)","D. Theo trứng"],"correct":2,"explanation":"Đáp án đúng là: Hô hấp (qua không khí) Vì: Lây nhanh qua không khí từ gà mang trùng hoặc bệnh","reference":"Mục 9.3.2"},{"id":90,"text":"Thời gian ủ bệnh của IC thường là bao lâu?","answers":["A. 7–14 ngày","B. 24–48 giờ","C. 2–3 tuần","D. 5–7 ngày"],"correct":1,"explanation":"Đáp án đúng là: 24–48 giờ Vì: IC khởi phát lâm sàng sau 24–48 giờ","reference":"Mục 9.4"},{"id":91,"text":"Dấu hiệu lâm sàng điển hình của PRRS ở lợn con?","answers":["A. Sốt cao, ho, khó thở","B. Tiêu chảy nặng","C. Co giật","D. Liệt chi"],"correct":0,"explanation":"Đáp án đúng là: Sốt cao, ho, khó thở Vì: PRRS gây triệu chứng hô hấp","reference":"Mục 3.4"},{"id":92,"text":"Nuôi cấy M. gallisepticum cần bổ sung gì?","answers":["A. 10–15% huyết thanh (lợn/gà)","B. NAD","C. Hemin","D. 5% CO₂"],"correct":0,"explanation":"Đáp án đúng là: 10–15% huyết thanh (lợn/gà) Vì: MG cần huyết thanh cung cấp lipid và protein thiết yếu","reference":"Mục 10.2.2"},{"id":93,"text":"Chẩn đoán phân biệt IC cần loại trừ bệnh nào?","answers":["A. CRD, tụ huyết trùng mạn tính, đậu gà","B. E. coli cấp tính","C. CRD, cúm gia cầm","D. Newcastle, Marek"],"correct":0,"explanation":"Đáp án đúng là: CRD, tụ huyết trùng mạn tính, đậu gà Vì: Phân biệt các bệnh gây triệu chứng giống viêm mũi","reference":"Mục 9.6.1"},{"id":94,"text":"Nha bào Bacillus anthracis có đặc điểm gì?","answers":["A. Dễ bị tiêu diệt bằng nước","B. Không gây bệnh","C. Chết nhanh ở môi trường","D. Sức đề kháng rất cao"],"correct":3,"explanation":"Đáp án đúng là: Sức đề kháng rất cao Vì: Nha bào Bacillus anthracis có sức đề kháng rất cao với điều kiện môi trường.","reference":"Mục 2.2"},{"id":95,"text":"CSFV bị bất hoạt nhanh bởi chất nào sau?","answers":["A. Chloroform","B. Ether 20%","C. NaOH 2%","D. Iodin"],"correct":2,"explanation":"Đáp án đúng là: NaOH 2% Vì: CSFV nhạy cảm NaOH 2%","reference":"Mục 1.2.4"},{"id":96,"text":"Số lượng mầm bệnh cần thiết để gây bệnh gọi là:","answers":["A. Số lượng mầm bệnh","B. Enzym ngoại bào","C. Độc lực","D. Tính đặc hiệu"],"correct":0,"explanation":"Đáp án đúng là: Số lượng mầm bệnh Vì: Số lượng mầm bệnh cần đạt ngưỡng nhất định mới gây được bệnh.","reference":"Mục 1.1.2."},{"id":97,"text":"Vaccine cúm gà dị chủng đang dùng ở Việt Nam chứa kháng nguyên nào?","answers":["A. H5N2","B. H7N1","C. H3N8","D. H9N2"],"correct":0,"explanation":"Đáp án đúng là: H5N2 Vì: VN dùng vacxin H5N2 dị chủng nhập từ Trung Quốc, Hà Lan.","reference":"Mục 5.1.14"},{"id":98,"text":"Động vật trung gian truyền bệnh Bluetongue chủ yếu là gì?","answers":["A. Muỗi Anopheles","B. Ruồi nhà","C. Ve truyền bệnh bệnh Lyme","D. Culicoides spp."],"correct":3,"explanation":"Đáp án đúng là: Culicoides spp. Vì: Chuột dĩn (Culicoides spp.) là vector chính truyền Bluetongue Tham khảo: Mục II.2.3.3 Bài 5","reference":""},{"id":99,"text":"Phân biệt LSD với pseudo-LSD (Herpesvirus 2) dựa vào gì?","answers":["A. Màu sắc nốt da","B. Thời gian ủ bệnh","C. Syncytium ở pseudo-LSD, thể chứa virus ở LSDV","D. Mức độ sốt"],"correct":2,"explanation":"Đáp án đúng là: Syncytium ở pseudo-LSD, thể chứa virus ở LSDV Vì: Pseudo-LSD tạo syncytium; LSDV tạo thể chứa virus trong bào tương","reference":"Mục 4.6"},{"id":100,"text":"Hình dạng chuỗi của Streptococcus suis quan sát bằng kính hiển vi?","answers":["A. Hình que đơn","B. Chuỗi hạt (chain)","C. Hình giọt nước","D. Đám tròn (cluster)"],"correct":1,"explanation":"Đáp án đúng là: Chuỗi hạt (chain) Vì: S. suis xếp thành chuỗi, điển hình là chuỗi từ 2–10 cầu khuẩn.","reference":"Mục 9.1.2"},{"id":101,"text":"Phương thức truyền chủ yếu của FMDV trong tự nhiên?","answers":["A. Qua không khí","B. Qua đường tình dục","C. Tiếp xúc và ăn vật bài xuất","D. Qua đường tiêu hóa"],"correct":2,"explanation":"Đáp án đúng là: Tiếp xúc và ăn vật bài xuất Vì: FMDV lây qua tiếp xúc và ăn phải chất bài xuất có virus Tham khảo: Mục I.1.3.3 Bài 5","reference":""},{"id":102,"text":"Loài động vật chủ yếu mang mầm bệnh dại ở Việt Nam là:","answers":["A. Chuột","B. Lợn","C. Chó","D. Trâu"],"correct":2,"explanation":"Đáp án đúng là: Chó Vì: Ở Việt Nam, chó nuôi chủ yếu là nguồn dự trữ virus dại.","reference":"Mục 1.3"},{"id":103,"text":"Ở 70 °C, Salmonella bị diệt sau khoảng bao lâu?","answers":["A. 20 phút","B. 1 giờ","C. 5 phút","D. 2 giờ"],"correct":0,"explanation":"Đáp án đúng là: 20 phút Vì: Salmonella chịu nhiệt kém; ở 70 °C bị diệt sau ~20 phút.","reference":"Mục 10.2.4"},{"id":104,"text":"Chẩn đoán phân tử EDS ưu tiên xét nghiệm gì?","answers":["A. HI","B. ELISA","C. PCR phát hiện gene đặc hiệu","D. Nuôi cấy trên phôi"],"correct":2,"explanation":"Đáp án đúng là: PCR phát hiện gene đặc hiệu Vì: PCR nhanh, đặc hiệu phát hiện gene capsid EDSV.","reference":"Mục 5.5"},{"id":105,"text":"Số serogroups chính của Leptospira interrogans là:","answers":["A. 50","B. 10","C. 5","D. 25"],"correct":3,"explanation":"Đáp án đúng là: 25 Vì: Gồm 240 serovar chia thành 25 serogroup.","reference":"Mục 4.2"},{"id":106,"text":"Môi trường đất ẩm, thiếu ánh sáng có vai trò gì với Pasteurella multocida?","answers":["A. Kích hoạt độc lực","B. Diệt vi khuẩn","C. Là nơi vi khuẩn tồn tại lâu","D. Ngăn vi khuẩn sinh sản"],"correct":2,"explanation":"Đáp án đúng là: Là nơi vi khuẩn tồn tại lâu Vì: P. multocida sống lâu trong điều kiện ẩm, tối","reference":"Mục 3.2.4"},{"id":107,"text":"Trong thể dại điên cuồng, bệnh nhân thường biểu hiện:","answers":["A. Co giật cơ vân","B. Sợ nước, kích thích","C. Sốt nhẹ, tiêu chảy","D. Hôn mê sâu"],"correct":1,"explanation":"Đáp án đúng là: Sợ nước, kích thích Vì: Trong thể dại điên cuồng, bệnh nhân có biểu hiện sợ nước và kích thích.","reference":"Mục 1.4"},{"id":108,"text":"Biện pháp “Cùng vào, cùng ra” nhằm mục đích gì?","answers":["A. Giảm chi phí thức ăn","B. Tăng năng suất trứng tức thì","C. Hạn chế lây lan mầm bệnh cho đàn mới","D. Tăng hiệu quả tăng trọng"],"correct":2,"explanation":"Đáp án đúng là: Hạn chế lây lan mầm bệnh cho đàn mới Vì: Ngăn chặn mầm bệnh tồn lưu trong chuồng","reference":"Mục 9.7.1"},{"id":109,"text":"Khi đường xâm nhập không phù hợp, mầm bệnh:","answers":["A. Tăng độc lực","B. Luôn gây bệnh nhanh","C. Cần số lượng lớn mới gây bệnh","D. Luôn tiết ngoại độc tố"],"correct":2,"explanation":"Đáp án đúng là: Cần số lượng lớn mới gây bệnh Vì: Nếu đường xâm nhập không ưu thế, mầm bệnh phải có số lượng lớn mới gây bệnh.","reference":"Mục 1.1.2."},{"id":110,"text":"Bệnh tích điển hình EDS ở cơ quan sinh sản là?","answers":["A. Phổi hoại tử","B. Tim xuất huyết","C. Ống dẫn trứng phù nề, xơ hóa nhẹ","D. Gan to"],"correct":2,"explanation":"Đáp án đúng là: Ống dẫn trứng phù nề, xơ hóa nhẹ Vì: EDS tấn công ống dẫn trứng → phù, viêm, ứ dịch.","reference":"Mục 5.4"},{"id":111,"text":"Vaccine DHV 1 được khuyến cáo tiêm lúc vịt bao nhiêu ngày tuổi?","answers":["A. 14 ngày tuổi","B. 7 ngày tuổi","C. 21 ngày tuổi","D. 1 ngày tuổi"],"correct":2,"explanation":"Đáp án đúng là: 1 ngày tuổi Vì: Tiêm khi vịt 1 ngày tuổi để có miễn dịch sớm","reference":"Mục 7.6"},{"id":112,"text":"Dịch lẻ tẻ (sporadic) đặc trưng bởi:","answers":["A. Xảy ra theo mùa vụ","B. Lây lan nhanh khắp cả nước","C. Chỉ ở vùng núi","D. Số ca rải rác, không thành ổ lớn"],"correct":3,"explanation":"Đáp án đúng là: Số ca rải rác, không thành ổ lớn Vì: Số con mắc thấp, lây lan không đáng kể.","reference":"Mục 3.4.1"},{"id":113,"text":"Cơ chế sinh bệnh chính của bệnh Marek’s là?","answers":["A. Gây loét niêm mạc","B. Gây u lympho ác tính ở thần kinh và mô lympho","C. Gây bại huyết toàn thân","D. Gây viêm phổi hoại tử"],"correct":1,"explanation":"Đáp án đúng là: Gây u lympho ác tính ở thần kinh và mô lympho Vì: MDV xâm nhập lympho T và gây u ác tính tại cơ quan lympho và thần kinh ngoại biên.","reference":"Mục 4.6.2"},{"id":114,"text":"Vaccine bất hoạt PEDV cho heo con dùng kết hợp chất gì để tăng đáp ứng miễn dịch?","answers":["A. Polysorbate","B. Lipid đơn","C. Bạc nguyên tố","D. Adjuvant nhôm"],"correct":3,"explanation":"Đáp án đúng là: Adjuvant nhôm Vì: Nhôm tăng đáp ứng miễn dịch","reference":"Mục 4.7"},{"id":115,"text":"Đặc điểm nào phân biệt mụn nước FMD với mụn do viêm da sần (pseudo-LSD)?","answers":["A. Mụn ở FMD không hoại tử sâu","B. Mụn pseudo-LSD rất đau","C. Mụn pseudo-LSD tập trung ở bụng","D. Mụn FMD chứa huyết thanh"],"correct":0,"explanation":"Đáp án đúng là: Mụn ở FMD không hoại tử sâu Vì: FMD mụn nước nông, vỡ để lại sẹo ít, không hoại tử sâu như pseudo-LSD Tham khảo: Mục I.1.6 Bài 5","reference":""},{"id":116,"text":"PRRSV chủ yếu lây qua đường nào?","answers":["A. Thực phẩm","B. Tiếp xúc trực tiếp và tiết dịch hô hấp","C. Không khí","D. Da nguyên vẹn"],"correct":1,"explanation":"Đáp án đúng là: Tiếp xúc trực tiếp và tiết dịch hô hấp Vì: PRRS truyền qua dịch tiết","reference":"Mục 3.5"},{"id":117,"text":"Thời kỳ nung bệnh được đặc trưng bởi:","answers":["A. Xuất hiện biến chứng","B. Xuất hiện triệu chứng lâm sàng rõ rệt","C. Hết sốt và hồi phục","D. Tích lũy độc tố và sinh sản mầm bệnh nhưng chưa có triệu chứng"],"correct":3,"explanation":"Đáp án đúng là: Tích lũy độc tố và sinh sản mầm bệnh nhưng chưa có triệu chứng Vì: Thời kỳ nung bệnh là giai đoạn vi sinh vật sinh sản, tích lũy độc tố, chưa biểu hiện lâm sàng.","reference":"Mục 2.3.1"},{"id":118,"text":"Trong ổ dịch, biện pháp đầu tiên phải làm là gì?","answers":["A. Vận chuyển sang vùng khác","B. Diệt toàn bộ đàn","C. Tiêm vaccine liều cao","D. Cách ly động vật bệnh ngay lập tức"],"correct":3,"explanation":"Đáp án đúng là: Cách ly động vật bệnh ngay lập tức Vì: Cách ly ổ dịch là bước then chốt kiểm soát lây lan Tham khảo: Mục I.1.7 Bài 5","reference":""},{"id":119,"text":"Cúm lợn lây chủ yếu qua đường nào?","answers":["A. Tiêu hóa","B. Da tiếp xúc","C. Hô hấp (dịch tiết đường hô hấp)","D. Máu"],"correct":2,"explanation":"Đáp án đúng là: Hô hấp (dịch tiết đường hô hấp) Vì: Virus cúm lợn phát tán qua hắt hơi, ho, khí dung.","reference":"Mục 7.3.2"},{"id":120,"text":"Biện pháp không thuộc tiêu độc chuồng trại là:","answers":["A. Tiêm kháng huyết thanh","B. Phun formol, clorua vôi","C. Lau chùi, rửa nền","D. Quét vôi bột"],"correct":0,"explanation":"Đáp án đúng là: Tiêm kháng huyết thanh Vì: Kháng huyết thanh dùng cho vật nuôi, không phải tiêu độc.","reference":"Mục 4.2.2"},{"id":121,"text":"Để phòng bệnh FMD, tần suất tiêm nhắc vaccine cho bò là bao lâu?","answers":["A. 6 tháng","B. 1 tháng","C. 1 năm","D. 3 năm"],"correct":0,"explanation":"Đáp án đúng là: 6 tháng Vì: Tái chủng vaccine FMD mỗi 6 tháng để duy trì miễn dịch Tham khảo: Mục I.1.7.2 Bài 5","reference":""},{"id":122,"text":"Vacxin S19 phòng Brucellosis cho bò được tiêm qua đường nào?","answers":["A. Hô hấp","B. Bắp","C. Tiêm tĩnh mạch","D. Tiêm dưới da"],"correct":1,"explanation":"Đáp án đúng là: Bắp Vì: Vacxin S19 dùng tiêm bắp cho bê.","reference":"Mục 3.7.2.1"},{"id":123,"text":"Thời gian sống H. paragallinarum trong chất tiết ở 37 °C là?","answers":["A. 2 tuần","B. 1–3 ngày","C. 1 tuần","D. 24–48 giờ"],"correct":3,"explanation":"Đáp án đúng là: 24–48 giờ Vì: Ngoài vật chủ, vi khuẩn vẫn tồn tại đến 48 giờ ở 37 °C","reference":"Mục 9.2.3"},{"id":124,"text":"Hạn chế của phản ứng ngưng kết CRD trên phiến kính?","answers":["A. Chi phí cao","B. Độ nhạy quá thấp","C. Kết quả quá chậm","D. Phản ứng chéo với M. synoviae"],"correct":3,"explanation":"Đáp án đúng là: Phản ứng chéo với M. synoviae Vì: Dễ nhầm với M. synoviae","reference":"Mục 10.6.2"},{"id":125,"text":"Triệu chứng đặc trưng của DVE là gì?","answers":["A. Xuất huyết niêm mạc","B. Ho khan","C. Sốt cao, chảy nước mắt, phân xanh, sưng đầu, liệt","D. Da bong vảy"],"correct":2,"explanation":"Đáp án đúng là: Sốt cao, chảy nước mắt, phân xanh, sưng đầu, liệt Vì: DVE thể hiện sốt, phân xanh, chảy nước mắt","reference":"Mục 8.4"},{"id":126,"text":"Bệnh dại có thể xảy ra sau khi ghép mô nào?","answers":["A. Máu","B. Giác mạc","C. Gan","D. Da"],"correct":1,"explanation":"Đáp án đúng là: Giác mạc Vì: Bệnh dại có thể lây qua giác mạc trong ghép mô.","reference":"Mục 1.6"},{"id":127,"text":"Phương pháp điều trị chính của bệnh tụ huyết trùng là gì?","answers":["A. Thuốc chống vi rút","B. Truyền máu","C. Corticosteroid","D. Dùng kháng sinh phổ rộng"],"correct":3,"explanation":"Đáp án đúng là: Dùng kháng sinh phổ rộng Vì: Kháng sinh ngăn bội nhiễm vi khuẩn thứ phát","reference":"Mục 3.8"},{"id":128,"text":"Hộ lý trong chữa bệnh truyền nhiễm không gồm:","answers":["A. Theo dõi thân nhiệt, hô hấp","B. Cho nghỉ ngơi, chuồng thoáng mát","C. Dùng kháng sinh liều cao để diệt mầm bệnh","D. Cho ăn đủ chất phù hợp"],"correct":2,"explanation":"Đáp án đúng là: Dùng kháng sinh liều cao để diệt mầm bệnh Vì: Hộ lý tập trung vào chăm sóc, không phải dùng thuốc.","reference":"Mục 4.3.4"},{"id":129,"text":"DHV 1 có khả năng tồn tại ngoài môi trường bao lâu trong phân?","answers":["A. > 37 ngày","B. 5 ngày","C. 24 giờ","D. 1 tuần"],"correct":0,"explanation":"Đáp án đúng là: > 37 ngày Vì: Virus bền, sống > 37 ngày trong phân và chuồng","reference":"Mục 7.2.4"},{"id":130,"text":"Phương pháp chẩn đoán xác định virus cúm gia cầm tốt nhất?","answers":["A. RT-PCR","B. ELISA kháng thể","C. Nuôi cấy vi khuẩn","D. Hiển vi điện tử"],"correct":0,"explanation":"Đáp án đúng là: RT-PCR Vì: RT-PCR phát hiện ARN virus nhanh và chính xác.","reference":"Mục 5.1.7"},{"id":131,"text":"Protein HN của NDV có chức năng gì?","answers":["A. Ngưng kết hồng cầu và là neuraminidase","B. Gắn kết tế bào","C. Tổng hợp ARN","D. Phá hủy màng"],"correct":0,"explanation":"Đáp án đúng là: Ngưng kết hồng cầu và là neuraminidase Vì: HN vừa gắn vừa cắt liên kết sialic, giải phóng virion.","reference":"Mục 5.2.3"},{"id":132,"text":"Triệu chứng đặc trưng ở bò cái nhiễm Brucella là:","answers":["A. Tiêu chảy","B. Ho","C. Sốt cao","D. Sảy thai"],"correct":3,"explanation":"Đáp án đúng là: Sảy thai Vì: Bò cái nhiễm thường sảy thai.","reference":"Mục 3.4.1"},{"id":133,"text":"Triệu chứng ban đầu của viêm da nổi cục thường là gì?","answers":["A. Ho khan","B. Sốt cao và hạch lympho sưng","C. Xuất huyết niêm mạc","D. Tiêu chảy"],"correct":1,"explanation":"Đáp án đúng là: Sốt cao và hạch lympho sưng Vì: Sốt cao kèm sưng hạch trước khi nổi nốt da","reference":"Mục 4.4"},{"id":134,"text":"DVE virus có genome dạng gì?","answers":["A. ARN sợi đơn","B. ARN sợi đôi","C. ADN sợi đôi","D. ADN sợi đơn"],"correct":2,"explanation":"Đáp án đúng là: ADN sợi đôi Vì: DVE virus là ADN kép (8.2.2)","reference":"Mục 8.2.2"},{"id":135,"text":"Đường lây chủ yếu của bệnh sảy thai truyền nhiễm ở người là:","answers":["A. Hít phải bụi","B. Tiêu hóa qua sữa nhiễm khuẩn","C. Qua vết cắn","D. Qua da lành"],"correct":1,"explanation":"Đáp án đúng là: Tiêu hóa qua sữa nhiễm khuẩn Vì: Người hay lây qua sữa nhiễm khuẩn Brucella.","reference":"Mục 3.3.2"},{"id":136,"text":"CSF lợn thể cấp tính thường chết trong bao lâu?","answers":["A. 2–3 tuần","B. 1 tháng","C. Trong 1 tuần","D. 2–3 tháng"],"correct":2,"explanation":"Đáp án đúng là: Trong 1 tuần Vì: CSF cấp tính chết nhanh < 1 tuần","reference":"Mục 1.4"},{"id":137,"text":"Nguyên lý cơ bản của phòng chống bệnh truyền nhiễm là:","answers":["A. Điều trị triệu chứng kịp thời","B. Đóng cửa chuồng kín mít","C. Vắc-xin có tác dụng 100%","D. Xóa bỏ hoặc cắt đứt 1 trong 3 khâu sinh dịch"],"correct":3,"explanation":"Đáp án đúng là: Xóa bỏ hoặc cắt đứt 1 trong 3 khâu sinh dịch Vì: Chỉ cần loại trừ Nguồn – Trung gian – Thụ cảm một khâu là đủ.","reference":"Mục 4.1"},{"id":138,"text":"Trong nuôi cấy phòng thí nghiệm, FMDV phát triển tốt nhất trên mô nào?","answers":["A. Tổ chức thượng bì lưỡi bò","B. Tế bào Vero","C. Tế bào thận bê","D. Phôi gà"],"correct":0,"explanation":"Đáp án đúng là: Tổ chức thượng bì lưỡi bò Vì: FMDV hướng thượng bì, ưu tiên nuôi cấy trên mô thượng bì lưỡi bò Tham khảo: Mục I.1.2.3 Bài 5","reference":""},{"id":139,"text":"FMDV tồn tại lâu nhất trong môi trường nào?","answers":["A. Nước tiểu","B. Thịt đông lạnh","C. Lông súc vật","D. Phân khô"],"correct":1,"explanation":"Đáp án đúng là: Thịt đông lạnh Vì: Thịt đông lạnh bảo quản virus lâu nhất lên đến vài tháng Tham khảo: Mục I.1.2 Bài 5","reference":""},{"id":140,"text":"Thời gian ủ bệnh của FMD ở trâu bò thường là bao lâu?","answers":["A. 10–14 ngày","B. 1 ngày","C. 14–21 ngày","D. 2–7 ngày"],"correct":3,"explanation":"Đáp án đúng là: 2–7 ngày Vì: Ủ bệnh tự nhiên từ 2–7 ngày trước khi xuất hiện mụn nước Tham khảo: Mục I.1.4.1 Bài 5","reference":""},{"id":141,"text":"Virus TGEV thuộc giống nào?","answers":["A. Astrovirus","B. Rotavirus","C. Calicivirus","D. Coronavirus"],"correct":3,"explanation":"Đáp án đúng là: Coronavirus Vì: TGEV là một loài thuộc họ Coronaviridae, có vỏ và gen ARN sợi đơn lớn.","reference":"Mục 6.1.1"},{"id":142,"text":"Thể tiêu hóa của bệnh than có thể xuất hiện khi:","answers":["A. Uống nước ô nhiễm","B. Ăn thịt gia súc bị bệnh","C. Tiêm vacxin không đúng cách","D. Hít phải phấn hoa"],"correct":1,"explanation":"Đáp án đúng là: Ăn thịt gia súc bị bệnh Vì: Thể tiêu hóa bệnh than xuất hiện khi ăn thịt gia súc nhiễm","reference":"Mục 2.4"},{"id":143,"text":"Hội chứng giảm đẻ (EDS) do virus thuộc họ nào?","answers":["A. Herpesviridae","B. Adenoviridae","C. Orthomyxoviridae","D. Paramyxoviridae"],"correct":1,"explanation":"Đáp án đúng là: Adenoviridae Vì: EDS virus là Avian adenovirus subgroup III thuộc Adenoviridae.","reference":"Mục 5.2.1"},{"id":144,"text":"Dấu hiệu bệnh tích điển hình ở dây thần kinh ngoại biên là?","answers":["A. Xơ hóa cơ","B. Sưng phù dây thần kinh, mất vân vân","C. Viêm tụy","D. Tụ huyết xoang bụng"],"correct":1,"explanation":"Đáp án đúng là: Sưng phù dây thần kinh, mất vân vân Vì: MDV làm dây thần kinh to, mất vân tủy, gây liệt.","reference":"Mục 4.6.1"},{"id":145,"text":"Xét nghiệm ELISA cạnh tranh PRRSV đo kháng thể với kháng nguyên nào?","answers":["A. GP5 (glycoprotein 5)","B. E protein","C. M protein","D. NP (nucleoprotein)"],"correct":0,"explanation":"Đáp án đúng là: GP5 (glycoprotein 5) Vì: GP5 là kháng nguyên chính","reference":"Mục 3.6"},{"id":146,"text":"PRRS ở heo nái chửa gây hậu quả gì?","answers":["A. Viêm màng não","B. Viêm phổi cấp","C. Sẩy thai, đẻ non, dị dạng thai","D. Tiêu chảy"],"correct":2,"explanation":"Đáp án đúng là: Sẩy thai, đẻ non, dị dạng thai Vì: PRRS ảnh hưởng sinh sản","reference":"Mục 3.4"},{"id":147,"text":"Nhiễm trùng được định nghĩa là gì?","answers":["A. Hiện tượng vi sinh vật tồn tại khắp nơi trong tự nhiên","B. Sự tiết độc tố của vi khuẩn vào môi trường","C. Tình trạng cơ thể không có triệu chứng lâm sàng","D. Hiện tượng mầm bệnh xâm nhập và tương tác với cơ thể động vật trong điều kiện ngoại cảnh nhất định"],"correct":3,"explanation":"Đáp án đúng là: Hiện tượng mầm bệnh xâm nhập và tương tác với cơ thể động vật trong điều kiện ngoại cảnh nhất định Vì: Nhiễm trùng được định nghĩa là hiện tượng mầm bệnh xâm nhập và tương tác với cơ thể động vật trong điều kiện ngoại cảnh nhất định.","reference":"Mục 1.1.1"},{"id":148,"text":"Phương pháp chẩn đoán xác định LSD hiệu quả nhất hiện nay là gì?","answers":["A. Real-time PCR","B. Sinh thiết da","C. Xét nghiệm huyết thanh","D. Nuôi cấy phôi gà"],"correct":0,"explanation":"Đáp án đúng là: Real-time PCR Vì: PCR real-time đặc hiệu, nhanh và nhạy cao","reference":"Mục 4.6"},{"id":149,"text":"Muốn nuôi tăng sinh Salmonella từ mẫu có số lượng thấp, dùng môi trường nào?","answers":["A. MacConkey","B. Brilliant green","C. Tetrathionate broth","D. XLD"],"correct":2,"explanation":"Đáp án đúng là: Tetrathionate broth Vì: Dùng môi trường tăng sinh tetrathionate trước khi phân lập trên chọn lọc.","reference":"Mục 10.2.3"},{"id":150,"text":"Bệnh sảy thai truyền nhiễm hiếm khi gây tử vong ở người với tỷ lệ:","answers":["A. 0.1","B. 0.5","C. 0.2","D. Dưới 5%"],"correct":3,"explanation":"Đáp án đúng là: Dưới 5% Vì: Tỷ lệ tử vong ở người < 5%.","reference":"Mục 3.3.1"},{"id":151,"text":"Trong chẩn đoán bệnh dại, kỹ thuật FAT có nghĩa là:","answers":["A. Phản ứng miễn dịch chậm","B. Phản ứng huỳnh quang","C. Phát hiện axit nhân","D. Phân tích huyết học"],"correct":1,"explanation":"Đáp án đúng là: Phản ứng huỳnh quang Vì: FAT là phản ứng huỳnh quang để phát hiện kháng nguyên virus dại.","reference":"Mục 1.6"},{"id":152,"text":"Ở –20 °C, PCV2 tồn tại bao lâu?","answers":["A. 24 giờ","B. 1 tuần","C. 1–2 ngày","D. 6–18 tháng"],"correct":3,"explanation":"Đáp án đúng là: 6–18 tháng Vì: PCV2 rất bền, có thể tồn tại 6–18 tháng ở nhiệt độ đông lạnh.","reference":"Mục 5.1.6"},{"id":153,"text":"Hội chứng giảm đẻ kéo dài trong bao lâu?","answers":["A. 2–3 ngày","B. 4–10 tuần","C. > 6 tháng","D. 1–2 tuần"],"correct":1,"explanation":"Đáp án đúng là: 4–10 tuần Vì: EDS thường kéo dài 4–10 tuần, gà giảm 10–40 % sản lượng.","reference":"Mục 5.4"},{"id":154,"text":"Chủng vvIBDV (very virulent) khác chủng cổ điển ở điểm nào?","answers":["A. Không gây tổn thương thực thể","B. Chỉ gặp ở gà > 10 tuần","C. Không gây triệu chứng","D. Tỷ lệ chết > 60%, hoại tử túi Fab nặng hơn"],"correct":3,"explanation":"Đáp án đúng là: Tỷ lệ chết > 60%, hoại tử túi Fab nặng hơn Vì: vvIBDV có độc lực cao, gây chết nhanh và tổn thương nặng nề hơn IBDV cổ điển.","reference":"Mục 3.4.1"},{"id":155,"text":"Loài nào tự nhiên mang mầm bệnh nhưng không biểu hiện triệu chứng?","answers":["A. Vịt trời","B. Gà","C. Vịt, ngỗng","D. Chim trĩ"],"correct":2,"explanation":"Đáp án đúng là: Vịt, ngỗng Vì: Vịt, ngỗng có kháng thể HI nhưng không bệnh.","reference":"Mục 5.3.1"},{"id":156,"text":"Phương pháp chẩn đoán phân tử chuẩn cho DVE là gì?","answers":["A. PCR phát hiện gene TK, gB","B. FAT","C. ELISA","D. Hiển vi điện tử"],"correct":0,"explanation":"Đáp án đúng là: PCR phát hiện gene TK, gB Vì: Gene TK/gB đặc hiệu, PCR nhạy & đặc hiệu cao","reference":"Mục 8.6.2"},{"id":157,"text":"Bệnh tích vi thể của tụ huyết trùng biểu hiện gì nổi bật?","answers":["A. Phù kẽ mô","B. Xơ hóa mao mạch","C. Tụ huyết và xuất huyết nội mô","D. Hoại tử áp xe"],"correct":2,"explanation":"Đáp án đúng là: Tụ huyết và xuất huyết nội mô Vì: Xuất huyết nội mô và viêm tắc mạch là đặc trưng","reference":"Mục 3.5"},{"id":158,"text":"TGEV nhạy cảm với ánh sáng mặt trời sau bao lâu?","answers":["A. 2 ngày","B. 6 giờ","C. 30 phút","D. 1 tuần"],"correct":1,"explanation":"Đáp án đúng là: 6 giờ Vì: TGEV bị bất hoạt nhanh dưới ánh sáng mặt trời, thường sau ~6 giờ.","reference":"Mục 6.1.6"},{"id":159,"text":"Tỷ lệ chết của ASF cấp tính có thể lên đến?","answers":["A. 0.5","B. 0.2","C. 0.05","D. 1"],"correct":3,"explanation":"Đáp án đúng là: 1 Vì: ASF cấp tính gần 100% Tham khảo: Mục II.2 Bài 7","reference":""},{"id":160,"text":"Để nuôi cấy Streptococcus suis cần bổ sung gì vào môi trường?","answers":["A. Máu hoặc huyết thanh","B. Vitamin C","C. Glucose","D. Nước muối"],"correct":0,"explanation":"Đáp án đúng là: Máu hoặc huyết thanh Vì: S. suis yêu cầu môi trường bổ sung máu/huyết thanh để phát triển.","reference":"Mục 9.1.2"},{"id":161,"text":"Ổ dịch được hiểu là:","answers":["A. Phạm vi có nguồn bệnh và điều kiện sinh dịch","B. Chỉ vùng núi rừng","C. Phạm vi chỉ có 1 con ốm","D. Khu vực đã hết dịch"],"correct":0,"explanation":"Đáp án đúng là: Phạm vi có nguồn bệnh và điều kiện sinh dịch Vì: Ổ dịch cần đủ Nguồn – Trung gian – Thụ cảm.","reference":"Mục 4.3.1"},{"id":162,"text":"PEDV có bao nhiêu kiểu gen chính lưu hành ở Việt Nam?","answers":["A. 2 (Genogroup 1 và 2)","B. 4","C. 1","D. 3"],"correct":0,"explanation":"Đáp án đúng là: 2 (Genogroup 1 và 2) Vì: Hai genogroup chính","reference":"Mục 4.8"},{"id":163,"text":"Yếu tố không ảnh hưởng đến sức thụ cảm của vật chủ là:","answers":["A. Liều kháng sinh điều trị","B. Vệ sinh, dinh dưỡng tốt","C. Nhiệt độ, độ ẩm chuồng trại","D. Tiêm vaccin"],"correct":0,"explanation":"Đáp án đúng là: Liều kháng sinh điều trị Vì: Kháng sinh điều trị không làm tăng sức đề kháng tự nhiên.","reference":"Mục 3.3.1"},{"id":164,"text":"Đặc điểm phân biệt lâm sàng Anthrax thể ngoài da?","answers":["A. Tiêu chảy","B. Nốt sần viêm hoại tử, chảy mủ đen","C. Xuất huyết","D. Ho sốt"],"correct":1,"explanation":"Đáp án đúng là: Nốt sần viêm hoại tử, chảy mủ đen Vì: Anthrax ngoài da có mụn than Tham khảo: Mục II.4.1 Bài 7","reference":""},{"id":165,"text":"Triệu chứng ở thời kỳ khởi phát thường là:","answers":["A. Đặc hiệu cho từng bệnh","B. Chảy máu nhiều","C. Chỉ có tổn thương mô vi thể","D. Chung của nhiễm trùng, nhiễm độc, khó phân biệt bệnh"],"correct":3,"explanation":"Đáp án đúng là: Chung của nhiễm trùng, nhiễm độc, khó phân biệt bệnh Vì: Khởi phát chỉ có dấu hiệu nhiễm trùng và nhiễm độc toàn thân, chưa đặc hiệu.","reference":"Mục 2.3.2"},{"id":166,"text":"Hiệu giá kháng thể HI ≥ 1/8 được coi là?","answers":["A. Dương tính","B. Âm tính","C. Nghi ngờ","D. Không giá trị"],"correct":0,"explanation":"Đáp án đúng là: Dương tính Vì: HI ≥ 1/8 chứng tỏ có kháng thể bảo vệ","reference":"Mục 10.6.2"},{"id":167,"text":"PRRSV có bộ gen là gì?","answers":["A. ADN mạch kép","B. ARN sợi kép","C. ARN sợi đơn dương (+)","D. ADN sợi đơn"],"correct":2,"explanation":"Đáp án đúng là: ARN sợi đơn dương (+) Vì: PRRSV là ARN ss(+)","reference":"Mục 3.2"},{"id":168,"text":"Thể nhiễm trùng kế phát là:","answers":["A. Nhiễm đồng thời nhiều mầm bệnh","B. Nhiễm trong máu","C. Nhiễm mầm bệnh thứ hai khi cơ thể đang nhiễm bệnh đầu tiên","D. Nhiễm sau khi khỏi hoàn toàn"],"correct":2,"explanation":"Đáp án đúng là: Nhiễm mầm bệnh thứ hai khi cơ thể đang nhiễm bệnh đầu tiên Vì: Kế phát xảy ra khi mầm bệnh thứ hai xâm nhập trong lúc cơ thể đang bị nhiễm bệnh đầu tiên.","reference":"Mục 1.1.5"},{"id":169,"text":"Antigenic shift gây ra điều gì?","answers":["A. Xuất hiện chủng hoàn toàn mới","B. Giảm độc lực","C. Kháng thuốc","D. Mất vỏ bọc"],"correct":0,"explanation":"Đáp án đúng là: Xuất hiện chủng hoàn toàn mới Vì: Tái tổ hợp gene tạo ra chủng mới hoàn toàn, có thể gây đại dịch.","reference":"Mục 7.2.3"},{"id":170,"text":"Loại vaccine phổ biến nhất phòng Marek’s là?","answers":["A. Tiểu đơn vị","B. Vô hoạt toàn phần","C. Sống giảm độc lực (CVI988)","D. Vaccine ADN tái tổ hợp"],"correct":2,"explanation":"Đáp án đúng là: Sống giảm độc lực (CVI988) Vì: CVI988 được sử dụng rộng rãi do hiệu quả cao trong bảo hộ.","reference":"Mục 4.7.2"},{"id":171,"text":"LT virus thuộc subfamily nào?","answers":["A. Gammaherpesvirinae","B. Deltaherpesvirinae","C. Betaherpesvirinae","D. Alphaherpesvirinae"],"correct":3,"explanation":"Đáp án đúng là: Alphaherpesvirinae Vì: LTV là Gallid herpesvirus 1, nhóm Alphaherpesvirinae.","reference":"Mục 6.2.1"},{"id":172,"text":"Tác nhân gây bệnh cúm lợn thuộc họ nào?","answers":["A. Paramyxoviridae","B. Flaviviridae","C. Coronaviridae","D. Orthomyxoviridae"],"correct":3,"explanation":"Đáp án đúng là: Orthomyxoviridae Vì: Virus cúm typ A – nguyên nhân cúm lợn – thuộc họ Orthomyxoviridae.","reference":"Mục 7.2.1"},{"id":173,"text":"Phương pháp chẩn đoán vàng phân tử LT là gì?","answers":["A. PCR phát hiện gene UL47–UL49","B. ELISA","C. HI","D. Nuôi cấy phôi"],"correct":0,"explanation":"Đáp án đúng là: PCR phát hiện gene UL47–UL49 Vì: UL47–UL49 đặc hiệu cho LTV, PCR nhạy & đặc hiệu cao.","reference":"Mục 6.6"},{"id":174,"text":"Vaccine LT sống giảm độc lực thường dùng chủng nào?","answers":["A. IBDV vaccine","B. CEO (chicken-embryo origin)","C. CVI988","D. HVT"],"correct":1,"explanation":"Đáp án đúng là: CEO (chicken-embryo origin) Vì: CEO là chủng sống giảm độc lực hiệu quả nhất cho LT.","reference":"Mục 6.7"},{"id":175,"text":"Bộ gen của IBDV là gì?","answers":["A. dsRNA phân đoạn (2 đoạn)","B. dsRNA không phân đoạn","C. dsDNA vòng","D. ssRNA 1 sợi"],"correct":0,"explanation":"Đáp án đúng là: dsRNA phân đoạn (2 đoạn) Vì: Genome IBDV gồm 2 phân đoạn RNA sợi kép.","reference":"Mục 3.2.2"},{"id":176,"text":"Phương pháp chẩn đoán huyết thanh thường dùng cho Brucellosis là:","answers":["A. ELISA","B. PCR","C. Wright","D. MAT"],"correct":2,"explanation":"Đáp án đúng là: Wright Vì: Phản ứng Wright thường dùng chẩn đoán huyết thanh.","reference":"Mục 3.6.4.2"},{"id":177,"text":"Brucella có thể tồn tại trong sữa ở nhiệt độ thường bao lâu?","answers":["A. 4 năm","B. 4 tuần","C. 4 ngày","D. 4 tháng"],"correct":3,"explanation":"Đáp án đúng là: 4 tháng Vì: Vi khuẩn tồn tại trong sữa tới 4 tháng ở nhiệt độ thường.","reference":"Mục 3.2.3"},{"id":178,"text":"EDS virus bị bất hoạt ở 60 °C trong bao lâu?","answers":["A. 5 phút","B. 30 phút","C. 3 giờ","D. 24 giờ"],"correct":1,"explanation":"Đáp án đúng là: 30 phút Vì: EDSV mất hoạt lực sau 30 phút ở 60 °C.","reference":"Mục 5.2.5"},{"id":179,"text":"Bệnh tích đại thể ở phổi lợn cúm thường là gì?","answers":["A. Hoại tử cơ tim","B. Xuất huyết não","C. Viêm phổi phù, tắc nghẽn khí quản, giới hạn rõ mô lành–bệnh","D. Loét dạ dày"],"correct":2,"explanation":"Đáp án đúng là: Viêm phổi phù, tắc nghẽn khí quản, giới hạn rõ mô lành–bệnh Vì: Phổi có các vùng phù nề, giới hạn rõ ranh giới mô lành–bệnh.","reference":"Mục 7.5.1"},{"id":180,"text":"Đặc điểm nổi bật của bệnh dại ở động vật là gì?","answers":["A. Tiêu chảy kéo dài","B. Viêm gan cấp","C. Sốt và viêm da","D. Loạn thần kinh và chết"],"correct":3,"explanation":"Đáp án đúng là: Loạn thần kinh và chết Vì: Bệnh dại gây loạn thần kinh và dẫn đến chết.","reference":"Mục 1.4"},{"id":181,"text":"Bệnh tích vi thể đặc trưng của CSF là gì?","answers":["A. Xơ hóa phổi","B. Nang hoại tử gan","C. Hoại tử niêm mạc ruột và xuất huyết mao mạch","D. Thể bóng nước da"],"correct":2,"explanation":"Đáp án đúng là: Hoại tử niêm mạc ruột và xuất huyết mao mạch Vì: CSF gây hoại tử, xuất huyết niêm mạc","reference":"Mục 1.5.2"},{"id":182,"text":"Đặc điểm vaccine DNA PEDV đang nghiên cứu?","answers":["A. Mã hóa protein S (spike)","B. Mã hóa E protein","C. Mã hóa protein N","D. Mã hóa M protein"],"correct":0,"explanation":"Đáp án đúng là: Mã hóa protein S (spike) Vì: DNA vaccine nhắm S","reference":"Mục 4.9"},{"id":183,"text":"Tại sao số lượng mầm bệnh xâm nhập ban đầu càng nhiều thì thời gian nung bệnh càng ngắn?","answers":["A. Vì tăng tính đặc hiệu","B. Vì số lượng lớn giúp tích lũy độc tố nhanh hơn","C. Vì giảm độc lực","D. Vì thay đổi đường xâm nhập"],"correct":1,"explanation":"Đáp án đúng là: Vì số lượng lớn giúp tích lũy độc tố nhanh hơn Vì: Số lượng lớn giúp vi sinh vật tích lũy độc tố nhanh, rút ngắn giai đoạn nung bệnh.","reference":"Mục 2.3.1"},{"id":184,"text":"Môi trường nuôi cấy phân lập PRRSV thường dùng?","answers":["A. Thạch máu","B. Dòng tế bào MDCK","C. Môi trường thạch","D. Dòng tế bào PAM"],"correct":3,"explanation":"Đáp án đúng là: Dòng tế bào PAM Vì: PRRSV khó nuôi, dùng PAM","reference":"Mục 3.3"},{"id":185,"text":"Tên chuẩn của chủng cúm lợn phân lập từ New Jersey 1976 viết là?","answers":["A. A/Swine/New-Jersey/76/H1N1","B. Swine/76/New-Jersey/H1N1","C. A/New-Jersey/Swine/76/H1N1","D. A/H1N1/New-Jersey/76/Swine"],"correct":0,"explanation":"Đáp án đúng là: A/Swine/New-Jersey/76/H1N1 Vì: Theo quy ước: loại-virus/địa điểm/năm/HA–NA.","reference":"Mục 7.2.6"},{"id":186,"text":"Phương pháp chẩn đoán vi khuẩn học bệnh tụ huyết trùng là gì?","answers":["A. Nuôi cấy trên thạch máu","B. ELISA","C. Miễn dịch huỳnh quang","D. PCR real-time"],"correct":0,"explanation":"Đáp án đúng là: Nuôi cấy trên thạch máu Vì: Nuôi cấy cho phép quan sát đặc điểm khuẩn lạc","reference":"Mục 3.6.2"},{"id":187,"text":"Biện pháp đối với nguồn bệnh mang trùng ở đàn lớn khó xét nghiệm là:","answers":["A. Cách ly dài ngày","B. Giết triệt để","C. Điều trị dự phòng định kỳ","D. Bỏ hoang chuồng trại"],"correct":2,"explanation":"Đáp án đúng là: Điều trị dự phòng định kỳ Vì: Điều trị dự phòng nhằm tiêu diệt mầm bệnh tiềm tàng.","reference":"Mục 4.2.1"},{"id":188,"text":"Colagenaza thuộc nhóm:","answers":["A. Độc tố","B. Yếu tố lan truyền","C. Nội độc tố","D. Enzym ngoại bào"],"correct":3,"explanation":"Đáp án đúng là: Enzym ngoại bào Vì: Colagenaza là enzym ngoại bào phân hủy collagen của mô liên kết.","reference":"Mục 1.1.3."},{"id":189,"text":"Khi điều trị FMD, kháng sinh được dùng chủ yếu để làm gì?","answers":["A. Tiêu diệt virus","B. Ngăn ngừa bội nhiễm vi khuẩn","C. Tăng miễn dịch","D. Giảm sẹo da"],"correct":1,"explanation":"Đáp án đúng là: Ngăn ngừa bội nhiễm vi khuẩn Vì: Kháng sinh chỉ phòng ngừa và xử lý nhiễm khuẩn thứ phát Tham khảo: Mục I.1.8 Bài 5","reference":""},{"id":190,"text":"Triệu chứng hô hấp của PRCV?","answers":["A. Xuất huyết niêm mạc","B. Viêm phổi nhẹ, ho nhẹ","C. Hoàng đản","D. Tiêu chảy nặng"],"correct":1,"explanation":"Đáp án đúng là: Viêm phổi nhẹ, ho nhẹ Vì: PRCV chủ yếu gây viêm phổi nhẹ và ho; không gây tiêu chảy nặng như PEDV hay TGEV.","reference":"Mục 6.2.3"},{"id":191,"text":"Phương pháp chẩn đoán nhanh Gumboro tại hiện trường là gì?","answers":["A. Kính hiển vi quang học","B. ELISA","C. Nuôi cấy tế bào","D. Hiển vi điện tử"],"correct":1,"explanation":"Đáp án đúng là: ELISA Vì: ELISA dễ triển khai, kết quả nhanh.","reference":"Mục 3.5.1"},{"id":192,"text":"Antigenic drift ở virus cúm là gì?","answers":["A. Thay đổi cấu trúc vỏ","B. Biến đổi kháng sinh","C. Đột biến nhỏ liên tục trên gene HA","D. Tái tổ hợp toàn bộ genome"],"correct":2,"explanation":"Đáp án đúng là: Đột biến nhỏ liên tục trên gene HA Vì: Khả năng đột biến ngẫu nhiên gây thay đổi nhỏ kháng nguyên HA.","reference":"Mục 7.2.3"},{"id":193,"text":"Tổn thương da điển hình của PDNS?","answers":["A. Sẩn đỏ","B. Loét có mủ","C. Xuất huyết, hoại tử vùng chân sau, mông","D. Mụn nước"],"correct":2,"explanation":"Đáp án đúng là: Xuất huyết, hoại tử vùng chân sau, mông Vì: PDNS biểu hiện bởi ban xuất huyết và hoại tử tại chi sau và mông.","reference":"Mục 5.2.5"},{"id":194,"text":"Miễn dịch kéo dài sau tiêm vacxin IC là bao lâu?","answers":["A. 9 tháng","B. 6 tháng","C. 3 tháng","D. 1 năm"],"correct":0,"explanation":"Đáp án đúng là: 9 tháng Vì: Vacxin IC bảo hộ khoảng 9 tháng","reference":"Mục 9.7.2"},{"id":195,"text":"Triệu chứng nổi bật của Bluetongue ở cừu là gì?","answers":["A. Sưng phù và loét lưỡi chuyển sang màu xanh","B. Mụn nước quanh móng","C. Tiêu chảy xuất huyết","D. Động kinh"],"correct":0,"explanation":"Đáp án đúng là: Sưng phù và loét lưỡi chuyển sang màu xanh Vì: Lưỡi sưng to, chuyển màu xanh tím đặc trưng Bluetongue Tham khảo: Mục II.2.4 Bài 5","reference":""},{"id":196,"text":"IBDV có thể tồn tại trong môi trường chuồng bao lâu?","answers":["A. 1 tuần","B. 2 ngày","C. ≥ 1 tháng","D. 24 giờ"],"correct":2,"explanation":"Đáp án đúng là: ≥ 1 tháng Vì: Virus có thể tồn tại rất lâu trong chất độn và chuồng trại nếu không sát trùng kỹ.","reference":"Mục 3.3.4"},{"id":197,"text":"Streptococcus suis nhuộm màu Gram cho kết quả?","answers":["A. Không nhuộm được","B. Âm (–)","C. Dương (+)","D. Biến màu"],"correct":2,"explanation":"Đáp án đúng là: Dương (+) Vì: S. suis là cầu khuẩn Gram dương.","reference":"Mục 9.1.2"},{"id":198,"text":"Vịt dễ mắc DHV 1 nhất ở độ tuổi nào?","answers":["A. Trên 6 tuần","B. Dưới 1 tuần","C. 4–6 tuần","D. 1–3 tuần"],"correct":3,"explanation":"Đáp án đúng là: 1–3 tuần Vì: Bệnh chủ yếu ở vịt con 1–3 tuần tuổi","reference":"Mục 7.3.1"},{"id":199,"text":"Gumboro gây ức chế miễn dịch bằng cách nào?","answers":["A. Ngăn tổng hợp globulin","B. Tạo độc tố bám lympho T","C. Phá hủy tế bào B ở túi Fabricius","D. Tăng IFN-γ"],"correct":2,"explanation":"Đáp án đúng là: Phá hủy tế bào B ở túi Fabricius Vì: Virus phá hủy lympho B → giảm miễn dịch dịch thể.","reference":"Mục 3.4.1"},{"id":200,"text":"Môi trường nuôi cấy H. paragallinarum cần bổ sung yếu tố nào?","answers":["A. Hemin (yếu tố X)","B. Glucose","C. Amino acid tổng hợp","D. NAD (yếu tố V)"],"correct":3,"explanation":"Đáp án đúng là: NAD (yếu tố V) Vì: Nhiều chủng cần NAD để phát triển in vitro","reference":"Mục 9.2.2"},{"id":201,"text":"Trong bệnh than, cơ quan bị tổn thương rõ nhất là:","answers":["A. Da","B. Thận","C. Lách","D. Phổi"],"correct":2,"explanation":"Đáp án đúng là: Lách Vì: Bệnh than gây sưng to lách rõ nhất.","reference":"Mục 2.5"},{"id":202,"text":"EDS virus đặc trưng ở điểm hình thái nào?","answers":["A. Hình cầu 100 nm","B. Hình que 2 µm","C. Hình tam giác, capsome 6 và gai 25 nm","D. Hình sợi dài 300 nm"],"correct":2,"explanation":"Đáp án đúng là: Hình tam giác, capsome 6 và gai 25 nm Vì: Khi tinh sạch CsCl, EDSV thể hiện cấu trúc tam giác với gai 25 nm.","reference":"Mục 5.2.2"},{"id":203,"text":"Phương thức lây chủ yếu của leptospira là:","answers":["A. Qua nhau thai","B. Qua vết cắn","C. Qua đường hô hấp","D. Qua nước tiểu nhiễm khuẩn"],"correct":3,"explanation":"Đáp án đúng là: Qua nước tiểu nhiễm khuẩn Vì: Leptospira lây qua nước tiểu nhiễm khuẩn.","reference":"Mục 4.3.3"},{"id":204,"text":"PCR trong chẩn đoán IC giúp xác định điều gì?","answers":["A. Mức kháng thể trong huyết thanh","B. Sự có mặt DNA H. paragallinarum","C. Sự có mặt DNA M. gallisepticum","D. Số lượng bạch cầu trung tính"],"correct":1,"explanation":"Đáp án đúng là: Sự có mặt DNA H. paragallinarum Vì: PCR khuếch đại vùng DNA đặc hiệu của H. paragallinarum","reference":"Mục 9.6.2"},{"id":205,"text":"Kích thước xoắn khuẩn Leptospira là khoảng:","answers":["A. 1–2 × 1–2 µm","B. 0,5–1 × 0,5–1 µm","C. 10–20 × 10–20 µm","D. 0,1 × 6–20 µm"],"correct":3,"explanation":"Đáp án đúng là: 0,1 × 6–20 µm Vì: Leptospira có kích thước 0,1×6–20 µm.","reference":"Mục 4.2.1"},{"id":206,"text":"Phương thức truyền bệnh gián tiếp không bao gồm:","answers":["A. Đường tiêu hóa","B. Đường máu","C. Đường âm đạo","D. Đường hô hấp"],"correct":2,"explanation":"Đáp án đúng là: Đường âm đạo Vì: Các đường gián tiếp: tiêu hóa, hô hấp, máu, da–niêm mạc.","reference":"Mục 3.2.2"},{"id":207,"text":"Màu máu của xác động vật chết do bệnh than thường là:","answers":["A. Xanh lá","B. Vàng nhạt","C. Đen và khó đông","D. Trắng"],"correct":2,"explanation":"Đáp án đúng là: Đen và khó đông Vì: Máu ở xác động vật chết do bệnh than có màu đen và khó đông.","reference":"Mục 2.5"},{"id":208,"text":"Ở vịt con, DHV 1 gây tỷ lệ chết cao nhất khoảng bao nhiêu?","answers":["A. 20–30 %","B. 10–20 %","C. 50–100 %","D. < 5 %"],"correct":2,"explanation":"Đáp án đúng là: 50–100 % Vì: Vịt 1–3 tuần tuổi chết 50–100 %","reference":"Mục  7.3.1"},{"id":209,"text":"Virus PCV2 thuộc họ nào?","answers":["A. Circoviridae","B. Herpesviridae","C. Parvoviridae","D. Adenoviridae"],"correct":0,"explanation":"Đáp án đúng là: Circoviridae Vì: Virus PCV2 có hạt nhỏ, không vỏ, gen ADN vòng điển hình của Circoviridae.","reference":"Mục 5.1.1"},{"id":210,"text":"DHV 1 có genome dạng gì?","answers":["A. ARN sợi đơn, không phân đoạn","B. ADN sợi kép","C. ADN sợi đơn","D. ARN sợi đơn, phân đoạn"],"correct":3,"explanation":"Đáp án đúng là: ARN sợi đơn, phân đoạn Vì: DHV 1 có genome ssRNA phân đoạn (7.2.2)","reference":"Mục 7.2.2"},{"id":211,"text":"Triệu chứng cấp tính của leptospirosis ở chó bao gồm:","answers":["A. Sốt cao và sốc","B. Tiêu chảy kéo dài","C. Ho khan","D. Mụn nước da"],"correct":0,"explanation":"Đáp án đúng là: Sốt cao và sốc Vì: Chó mắc thường sốt cao, có thể sốc.","reference":"Mục 4.4.1"},{"id":212,"text":"Biện pháp không dùng để diệt côn trùng, chuột là:","answers":["A. Giữ chuồng sạch sẽ, phát quang bụi rậm","B. Đậy kín thức ăn, thu dọn vườn","C. Tiêm kháng sinh đại trà","D. Phun hóa chất chuyên khoa"],"correct":2,"explanation":"Đáp án đúng là: Tiêm kháng sinh đại trà Vì: Kháng sinh không tiêu diệt vật trung gian.","reference":"Mục 4.3.3"},{"id":213,"text":"Dưới kính hiển vi, túi Fabricius bị IBDV có biểu hiện gì?","answers":["A. Tăng sinh biểu mô","B. Không có thay đổi","C. Hoại tử nang lympho, xâm nhập tế bào viêm","D. Sản xuất IgM tăng bất thường"],"correct":2,"explanation":"Đáp án đúng là: Hoại tử nang lympho, xâm nhập tế bào viêm Vì: Tổn thương vi thể là hoại tử tế bào lympho, thay thế bằng tế bào viêm.","reference":"Mục 3.4.2"},{"id":214,"text":"Protein S của PRCV nhỏ hơn TGEV bao nhiêu kDa?","answers":["A. 170–190 kDa vs 220 kDa","B. 50 kDa","C. 300 kDa","D. 100 kDa"],"correct":0,"explanation":"Đáp án đúng là: 170–190 kDa vs 220 kDa Vì: PRCV mất một đoạn trong gene S, nên protein S ~170–190 kDa so với ~220 kDa của TGEV.","reference":"Mục 6.2.2"},{"id":215,"text":"Thời gian ủ bệnh điển hình của cúm lợn là bao lâu?","answers":["A. 7–10 ngày","B. 5–7 ngày","C. 1–3 ngày","D. 10–14 ngày"],"correct":2,"explanation":"Đáp án đúng là: 1–3 ngày Vì: Thời gian nung bệnh cúm lợn thường 1–3 ngày.","reference":"Mục 7.4"},{"id":216,"text":"Trong chẩn đoán bệnh than, cần phân biệt với bệnh:","answers":["A. Viêm gan","B. Cúm gia cầm","C. Lao phổi","D. Lở mồm long móng"],"correct":3,"explanation":"Đáp án đúng là: Lở mồm long móng Vì: Bệnh than cần phân biệt với lở mồm long móng do biểu hiện viêm ở miệng.","reference":"Mục 2.6"},{"id":217,"text":"ASFV lây chủ yếu qua con đường nào?","answers":["A. Đường tiêu hóa","B. Đường miệng","C. Không khí","D. Vector chân đốt (Ornithodoros)"],"correct":3,"explanation":"Đáp án đúng là: Vector chân đốt (Ornithodoros) Vì: ASFV chính qua ve Ornithodoros spp. Tham khảo: Mục II.2.3 Bài 7","reference":""},{"id":218,"text":"Gumboro lây truyền chủ yếu qua đường nào?","answers":["A. Đường hô hấp","B. Đường tiêu hóa (phân-miệng)","C. Qua muỗi và côn trùng","D. Truyền qua trứng"],"correct":1,"explanation":"Đáp án đúng là: Đường tiêu hóa (phân-miệng) Vì: Virus đào thải qua phân và lây lan qua đường tiêu hóa.","reference":"Mục 3.3.3"},{"id":219,"text":"Phân biệt PRCV và TGEV dùng phương pháp nào?","answers":["A. ELISA đo kích thước protein S","B. PCR","C. Nuôi cấy tế bào","D. Kính hiển vi điện tử"],"correct":0,"explanation":"Đáp án đúng là: ELISA đo kích thước protein S Vì: Dựa vào ELISA đo trọng lượng phân tử protein S để phân biệt hai chủng.","reference":"Mục 6.2.4"},{"id":220,"text":"Một trong các dấu hiệu bệnh than ở lợn là:","answers":["A. Mắt đỏ","B. Hạch amidan sưng, có chấm đỏ","C. Sốt kéo dài","D. Lông khô và xù"],"correct":1,"explanation":"Đáp án đúng là: Hạch amidan sưng, có chấm đỏ Vì: Ở lợn, bệnh than thường thấy hạch amidan sưng và có chấm đỏ.","reference":"Mục 2.5"},{"id":221,"text":"DVE virus lây truyền chính qua đường nào?","answers":["A. Muỗi đốt","B. Da tiếp xúc","C. Hô hấp","D. Tiếp xúc trực tiếp, qua nước, thức ăn (phân)"],"correct":3,"explanation":"Đáp án đúng là: Tiếp xúc trực tiếp, qua nước, thức ăn (phân) Vì: Virus đào thải theo phân, lây qua thức ăn & nước","reference":"Mục 8.3.2"},{"id":222,"text":"Tiêu độc cơ giới không gồm:","answers":["A. Tiêm vaccin","B. Thu gom phân, rác, chất độn chuồng","C. Phun hóa chất sát trùng","D. Đốt rơm rạ, thức ăn thừa"],"correct":0,"explanation":"Đáp án đúng là: Tiêm vaccin Vì: Tiêm vaccin là biện pháp nâng cao thụ cảm, không phải tiêu độc.","reference":"Mục 4.2.2"},{"id":223,"text":"Biểu hiện bệnh tích đại thể điển hình của CSF trên da lợn?","answers":["A. Tăng sinh mô hạt","B. Loét dạ dày","C. Thoái hóa bắp cơ","D. Xuất huyết chấm và nốt hoại tử"],"correct":3,"explanation":"Đáp án đúng là: Xuất huyết chấm và nốt hoại tử Vì: CSF gây xuất huyết dưới da","reference":"Mục 1.5.1"},{"id":224,"text":"PEDV gây bệnh chủ yếu ở lứa tuổi nào?","answers":["A. Heo trưởng thành","B. Heo vỗ béo","C. Lợn con sơ sinh đến 3 tuần","D. Heo nái"],"correct":2,"explanation":"Đáp án đúng là: Lợn con sơ sinh đến 3 tuần Vì: PEDV nặng ở heo con","reference":"Mục 4.2"},{"id":225,"text":"Virus cúm lợn có bao nhiêu phân đoạn genome ARN?","answers":["A. 2","B. 7","C. 8","D. 10"],"correct":2,"explanation":"Đáp án đúng là: 8 Vì: Cúm lợn typ A có 8 phân đoạn ARN đơn âm.","reference":"Mục 7.2.2"},{"id":226,"text":"Virus Bluetongue thuộc giống nào?","answers":["A. Flavivirus","B. Orbivirus","C. Aphthovirus","D. Capripoxvirus"],"correct":1,"explanation":"Đáp án đúng là: Orbivirus Vì: Bluetongue thuộc giống Orbivirus, họ Reoviridae Tham khảo: Mục II.2.2.1 Bài 5","reference":""},{"id":227,"text":"Bệnh xoắn khuẩn do tác nhân nào gây ra?","answers":["A. Brucella abortus","B. Leptospira interrogans","C. Salmonella typhi","D. Streptococcus"],"correct":1,"explanation":"Đáp án đúng là: Leptospira interrogans Vì: Leptospira interrogans gây leptospirosis.","reference":"Mục 4.2"},{"id":228,"text":"Bệnh tụ huyết trùng thường bùng phát mạnh vào mùa nào ở Việt Nam?","answers":["A. Mùa lạnh (tháng 12–2)","B. Mùa hè (tháng 4–5)","C. Mùa mưa (tháng 6–9)","D. Mùa khô (tháng 11–3)"],"correct":2,"explanation":"Đáp án đúng là: Mùa mưa (tháng 6–9) Vì: Vi khuẩn lây lan mạnh khi chuồng trại ẩm ướt","reference":"Mục 3.3.2"},{"id":229,"text":"Antigenic shift trên virus cúm là gì?","answers":["A. Biến đổi kháng sinh","B. Thay đổi vỏ bọc","C. Tái tổ hợp gen tạo chủng hoàn toàn mới","D
