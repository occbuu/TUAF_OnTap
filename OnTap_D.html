<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn Tập - Độc chất học thú y (300 câu)</title>
<style>
:root {
  --blue:      #2563eb;
  --blue-dark: #1e40af;
  --blue-bg:   #eff6ff;
  --green:     #16a34a;
  --green-bg:  #f0fdf4;
  --green-bd:  #86efac;
  --yellow-bg: #fefce8;
  --yellow-bd: #fde047;
  --gray:      #6b7280;
  --gray-lt:   #f3f4f6;
  --border:    #e5e7eb;
  --text:      #111827;
  --radius:    12px;
  --shadow:    0 1px 4px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f1f5f9; color: var(--text);
  line-height: 1.65; font-size: 15px;
}

/* ── HEADER ── */
.page-header {
  background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%);
  color: #fff; padding: 28px 20px 22px; text-align: center;
  position: relative;
}
.page-header h1 { font-size: clamp(1.1em, 4vw, 1.7em); font-weight: 700; margin-bottom: 5px; }
.page-header p  { opacity: .85; font-size: .88em; }
.back-btn {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,.18); border: 1.5px solid rgba(255,255,255,.35);
  color: #fff; padding: 6px 13px; border-radius: 7px;
  text-decoration: none; font-size: .82em; font-weight: 600;
  white-space: nowrap; transition: background .15s; line-height: 1.4;
}
.back-btn:hover { background: rgba(255,255,255,.3); }
@media (max-width: 480px) {
  .back-btn { position: static; transform: none; display: inline-block;
              margin-bottom: 10px; font-size: .8em; }
  .page-header { padding-top: 16px; }
}

/* ── SEARCH BAR ── */
.search-wrap {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
.search-inner {
  max-width: 860px; margin: 0 auto;
  display: flex; align-items: center; gap: 10px;
}
.search-box { flex: 1; position: relative; }
.search-box input {
  width: 100%; padding: 9px 36px 9px 38px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: .95em; outline: none; background: var(--gray-lt);
  transition: border-color .15s, background .15s;
  -webkit-appearance: none;
}
.search-box input:focus { border-color: var(--blue); background: #fff; }
.search-icon {
  position: absolute; left: 11px; top: 50%;
  transform: translateY(-50%); color: var(--gray);
  pointer-events: none; font-size: 1em;
}
.search-clear {
  position: absolute; right: 9px; top: 50%;
  transform: translateY(-50%); background: none; border: none;
  cursor: pointer; color: var(--gray); font-size: 1.1em;
  padding: 2px 4px; display: none; line-height: 1; border-radius: 50%;
}
.search-clear:hover { color: #111; background: var(--gray-lt); }
.search-count {
  white-space: nowrap; font-size: .88em; color: var(--gray);
  min-width: 90px; text-align: right;
}
.search-count strong { color: var(--blue-dark); }

/* ── CONTAINER ── */
.container {
  max-width: 860px; margin: 18px auto;
  padding: 0 14px 80px;
}

/* ── QUESTION CARD ── */
.question-block {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 16px;
  border-left: 4px solid var(--blue);
  overflow: hidden;
  transition: box-shadow .15s;
}
.question-block:hover {
  box-shadow: 0 2px 8px rgba(0,0,0,.12), 0 6px 20px rgba(0,0,0,.08);
}

.question-header {
  display: flex; align-items: center; gap: 8px;
  background: var(--blue-bg); padding: 8px 14px;
  border-bottom: 1px solid #dbeafe;
}
.q-badge {
  background: var(--blue); color: #fff;
  border-radius: 20px; padding: 1px 9px;
  font-size: .78em; font-weight: 700; letter-spacing: .3px;
}

.question-text {
  padding: 14px 16px 8px;
  font-size: 1em; font-weight: 500; color: #1e293b;
}
.question-text mark {
  background: #fef08a; color: inherit;
  border-radius: 3px; padding: 0 2px;
}

/* ── ANSWERS ── */
.answers {
  padding: 4px 16px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.answer-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 12px; border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--gray-lt);
}
.answer-item.correct {
  background: var(--green-bg);
  border-color: var(--green-bd);
  font-weight: 600;
}
.answer-letter {
  font-weight: 700; font-size: .9em;
  width: 22px; flex-shrink: 0; padding-top: 1px; color: var(--gray);
}
.answer-item.correct .answer-letter { color: var(--green); }
.answer-text {
  flex: 1; color: #374151; font-size: .95em;
}
.answer-item.correct .answer-text { color: #14532d; }
.answer-text mark {
  background: #bbf7d0; color: inherit;
  border-radius: 3px; padding: 0 2px;
}
.check-mark {
  flex-shrink: 0; margin-left: auto; padding-left: 6px;
  color: var(--green); font-weight: 700;
}

/* ── FEEDBACK ── */
.feedback-section {
  background: var(--yellow-bg);
  border-top: 1.5px solid var(--yellow-bd);
  padding: 10px 16px; font-size: .875em; color: #44403c;
}
.feedback-section p { margin: 3px 0; }
.feedback-section strong { color: #1c1917; }

/* ── EMPTY STATE ── */
#noResults {
  display: none; text-align: center;
  padding: 60px 20px; color: var(--gray);
}
#noResults .nr-icon { font-size: 2.5em; margin-bottom: 12px; }
#noResults p { font-size: .95em; }

/* ── SCROLL TOP ── */
#scrollTopBtn {
  position: fixed; bottom: 20px; right: 16px;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--blue); color: #fff; border: none;
  font-size: 1.3em; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 3px 10px rgba(37,99,235,.4);
  transition: background .15s, transform .15s;
  z-index: 200; text-decoration: none;
  line-height: 44px; text-align: center;
}
#scrollTopBtn:hover { background: var(--blue-dark); transform: translateY(-2px); }

/* ── MOBILE ── */
@media (max-width: 600px) {
  body { font-size: 14px; }
  .page-header { padding: 18px 14px 14px; }
  .container { margin: 12px auto; padding: 0 10px 80px; }
  .question-text { padding: 12px 12px 6px; }
  .answers { padding: 4px 12px 10px; gap: 5px; }
  .answer-item { padding: 7px 10px; }
  .feedback-section { padding: 9px 12px; }
  .search-count { display: none; }
}
</style>
</head>
<body>

<div class="page-header">
  <a href="Index.html" class="back-btn">&#8592; Trang ch&#7911;</a>
  <h1>Ôn Tập Độc chất học thú y</h1>
  <p>Câu hỏi trắc nghiệm có đáp án &mdash; Nguồn: LT_D01 – LT_D09</p>
</div>

<div class="search-wrap">
  <div class="search-inner">
    <div class="search-box">
      <span class="search-icon">&#128269;</span>
      <input type="search" id="searchInput"
             placeholder="Tìm câu hỏi hoặc đáp án..." autocomplete="off">
      <button class="search-clear" id="searchClear" title="Xóa">&#10005;</button>
    </div>
    <div class="search-count" id="searchCount">
      <strong>300</strong> / 300 câu
    </div>
  </div>
</div>

<div class="container" id="questionContainer">
  <div id="noResults">
    <div class="nr-icon">&#128269;</div>
    <p>Không tìm thấy câu hỏi phù hợp.</p>
  </div>
</div>

<a href="#" id="scrollTopBtn" title="Lên đầu trang">&#8679;</a>

<script>
const QUESTIONS = [{"id":1,"text":"Biện pháp điều trị ngộ độc nào sau đây mang tính chất đối kháng hóa học?","answers":["A. Tiêm vitamin","B. Dùng NaHCO₃ khi ngộ độc toan","C. Tiêm glucoza","D. Uống nhiều nước"],"correct":1,"explanation":"Đáp án đúng là: Dùng NaHCO₃ khi ngộ độc toan Vì: NaHCO₃ trung hòa acid trong máu là đối kháng hóa học.","reference":"Mục 1.2"},{"id":2,"text":"Cơ chế chính của ngộ độc muối ăn trong cơ thể động vật?","answers":["A. Suy gan cấp","B. Tăng áp lực máu","C. Phù não do ion Na+","D. Mất nước nghiêm trọng"],"correct":2,"explanation":"Đáp án đúng là: Phù não do ion Na+ Vì: Nồng độ ion Na+ trong máu cao gây tích nước ở não, dẫn đến phù não và áp lực nội sọ tăng. Tham khảo: Bài 6 Mục 2.2.3","reference":""},{"id":3,"text":"Khi ngộ độc nitrit, biện pháp điều trị hiệu quả là gì?","answers":["A. Gây nôn","B. Rửa dạ dày","C. Tiêm xanh methylen","D. Sử dụng than hoạt"],"correct":2,"explanation":"Đáp án đúng là: Tiêm xanh methylen Vì: vì xanh methylen khử methemoglobin, phục hồi khả năng vận chuyển oxy.","reference":"Mục 2.2"},{"id":4,"text":"Vai trò chính của kẽm trong cơ thể là gì?","answers":["A. Trao đổi protein","B. Hấp thu năng lượng","C. Cấu trúc màng tế bào","D. Bảo vệ thần kinh"],"correct":0,"explanation":"Đáp án đúng là: Trao đổi protein Vì: Kẽm quan trọng trong trao đổi protein, carbohydrate và lipid.","reference":"Mục 2.1.6"},{"id":5,"text":"Triệu chứng chủ yếu khi trâu bò ăn cây dương xỉ?","answers":["A. Tăng cân nhanh","B. Gan to lên","C. Co giật nhẹ","D. Xuất huyết và chảy máu"],"correct":3,"explanation":"Đáp án đúng là: Xuất huyết và chảy máu Vì: Gây thiếu máu, xuất huyết do độc tố ảnh hưởng tủy xương.","reference":"Mục 1.2.2"},{"id":6,"text":"Tác nhân gây tổn thương màng tế bào thông qua peroxid hóa lipid là?","answers":["A. Gốc tự do","B. Vitamin E","C. Carbon monoxide","D. Ethylene glycol"],"correct":0,"explanation":"Đáp án đúng là: Gốc tự do Vì: Gốc tự do gây tổn thương trực tiếp bằng cách oxy hóa các phân tử lipid trong màng.","reference":"Mục 3.2"},{"id":7,"text":"Triệu chứng chính của bệnh minamata do Hg là gì?","answers":["A. Sút cân","B. Rối loạn thần kinh","C. Giảm ăn","D. Tê liệt tay chân"],"correct":1,"explanation":"Đáp án đúng là: Rối loạn thần kinh Vì: Bệnh minamata do Hg gây tổn thương thần kinh trung ương không hồi phục.","reference":"Mục 2.1.8"},{"id":8,"text":"Độc tố nấm mốc là gì?","answers":["A. Vi khuẩn gây bệnh","B. Protein ngoại sinh","C. Sản phẩm chuyển hoá thứ cấp của nấm mốc","D. Dẫn xuất alkaloid"],"correct":2,"explanation":"Đáp án đúng là: Sản phẩm chuyển hoá thứ cấp của nấm mốc Vì: Độc tố nấm mốc là sản phẩm chuyển hoá thứ cấp trong quá trình phát triển của nấm.","reference":"Mục 2.1"},{"id":9,"text":"Than hoạt hấp phụ hiệu quả nhất với loại chất nào?","answers":["A. Chất ion hóa","B. Chất bay hơi","C. Phân tử lớn, không phân cực","D. Chất phân cực nhỏ"],"correct":2,"explanation":"Đáp án đúng là: Phân tử lớn, không phân cực Vì: Các phân tử lớn, không phân cực dễ bị than hoạt hấp thụ.","reference":"Mục 2.1"},{"id":10,"text":"Nhóm kháng sinh nào có thể gây ảnh hưởng lên sinh sản của gà đẻ?","answers":["A. Amoxicillin","B. Gentamicin","C. Doxycycline","D. Lincomycin"],"correct":2,"explanation":"Đáp án đúng là: Doxycycline Vì: Doxycycline làm giảm sản lượng trứng, khả năng thụ thai, hoạt lực tinh trùng. Tham khảo: Bài 9 Mục 2.1","reference":""},{"id":11,"text":"Đối tượng nghiên cứu của độc chất học là gì?","answers":["A. Tập trung vào bệnh truyền nhiễm","B. Chỉ nghiên cứu thuốc điều trị","C. Chỉ nghiên cứu sinh lý bình thường","D. Tính chất, tác dụng và ý nghĩa của chất độc, nguyên nhân và điều trị ngộ độc"],"correct":3,"explanation":"Đáp án đúng là: Tính chất, tác dụng và ý nghĩa của chất độc, nguyên nhân và điều trị ngộ độc Vì: Đối tượng độc chất học bao gồm toàn bộ các khía cạnh liên quan đến chất độc và ngộ độc.","reference":"Mục 1"},{"id":12,"text":"Triệu chứng nào thường gặp trong ngộ độc cấp ở gia súc?","answers":["A. Mù, thị giác kém","B. Suy tim, hoại tử gan","C. Xuất huyết toàn thân","D. Tiết nước bọt, nôn, ỉa chảy"],"correct":3,"explanation":"Đáp án đúng là: Tiết nước bọt, nôn, ỉa chảy Vì: là các triệu chứng đặc trưng của ngộ độc cấp.","reference":"Mục 1.2"},{"id":13,"text":"Chế phẩm sinh học nào có khả năng làm vô hoạt mycotoxin trong đường tiêu hoá?","answers":["A. Lactoflor","B. Mycofix Plus","C. Biosorb","D. Biovit"],"correct":1,"explanation":"Đáp án đúng là: Mycofix Plus Vì: Mycofix Plus chứa enzyme đặc hiệu phá huỷ cấu trúc độc tố","reference":"Mục 3.2"},{"id":14,"text":"Thuốc nào làm tăng nguy cơ viêm phúc mạc do phá hủy cơ dưới niêm mạc tiêu hóa?","answers":["A. Ketoconazole","B. Oxytetracyclin","C. Miconazole","D. Acid chlorhydric"],"correct":3,"explanation":"Đáp án đúng là: Acid chlorhydric Vì: Acid mạnh phá huỷ niêm mạc và cơ dưới niêm mạc, dẫn đến nhiễm trùng kế phát.","reference":"Mục 2.2"},{"id":15,"text":"Loài động vật nguyên sinh nào có khả năng chuyển hoá Aflatoxin B1?","answers":["A. Euglena viridis","B. Amoeba proteus","C. Paramecium caudatum","D. Tetrahymena pyriformis"],"correct":3,"explanation":"Đáp án đúng là: Tetrahymena pyriformis Vì: Tetrahymena pyriformis biến đổi Aflatoxin thành dạng kém độc hơn","reference":"Mục 3.2"},{"id":16,"text":"Hai loài nấm mốc phổ biến trong quá trình bảo quản thực phẩm là?","answers":["A. Fusarium và Claviceps","B. Alternaria và Candida","C. Penicillium và Aspergillus","D. Pithomyces và Stachybotrys"],"correct":2,"explanation":"Đáp án đúng là: Penicillium và Aspergillus Vì: Penicillium và Aspergillus thường phát triển mạnh trong quá trình bảo quản. Tham khảo: Bài 10 Mục 1.2","reference":""},{"id":17,"text":"Động vật mắc bệnh về gan, thận dễ bị ngộ độc thuốc vì lý do nào?","answers":["A. Thuốc không hấp thu được","B. Do tăng tiết hormon","C. Giảm khả năng chuyển hóa và thải trừ thuốc","D. Gan, thận không liên quan đến chuyển hóa thuốc"],"correct":2,"explanation":"Đáp án đúng là: Giảm khả năng chuyển hóa và thải trừ thuốc Vì: Khi gan thận yếu, thuốc dễ tích tụ, gây độc.","reference":"Mục 1.1"},{"id":18,"text":"Chất độc của loài cóc có thể gây triệu chứng nào ở chó?","answers":["A. Hạ đường huyết","B. Tăng tiết nước bọt, loạn nhịp tim, chết","C. Giãn đồng tử","D. Sốt cao"],"correct":1,"explanation":"Đáp án đúng là: Tăng tiết nước bọt, loạn nhịp tim, chết Vì: Độc tố như bufotoxin ảnh hưởng tim mạch và thần kinh, rất nguy hiểm.","reference":"Mục 2.1.3"},{"id":19,"text":"Độ ẩm tối đa để ngăn nấm mốc phát triển trong lạc là:","answers":["A. 0,09","B. 0,15","C. 0,2","D. 0,12"],"correct":0,"explanation":"Đáp án đúng là: 0,09 Vì: Lạc chỉ an toàn khi độ ẩm không vượt quá 9%","reference":"Mục 3.1"},{"id":20,"text":"Chất đối kháng hóa học hoạt động theo cơ chế nào?","answers":["A. Ngăn cản tái hấp thu","B. Tăng đào thải chất độc","C. Tạo phức hợp không qua màng tế bào","D. Chuyển hóa chất độc"],"correct":2,"explanation":"Đáp án đúng là: Tạo phức hợp không qua màng tế bào Vì: vì chất đối kháng hóa học liên kết với chất độc, ngăn nó gắn với thụ thể đặc hiệu.","reference":"Mục 2.2"},{"id":21,"text":"Vì sao pralidoxim phải dùng sớm khi ngộ độc phospho hữu cơ?","answers":["A. Để giảm tiết dịch nhanh","B. Để gây nôn ngay lập tức","C. Để kích thích thần kinh","D. Để phục hồi men cholinesterase trước khi phức trở nên bền"],"correct":3,"explanation":"Đáp án đúng là: Để phục hồi men cholinesterase trước khi phức trở nên bền Vì: nếu dùng trễ, phức men – phospho hữu cơ có thể trở nên bền vững và không còn hồi phục được.","reference":"Mục 2.1.7"},{"id":22,"text":"Gốc tự do lipid có khả năng gây tổn thương mạnh nhất khi?","answers":["A. Tăng chuyển hóa protein","B. Oxy hóa màng tế bào","C. Ức chế hoạt động enzym","D. Ổn định năng lượng tế bào"],"correct":1,"explanation":"Đáp án đúng là: Oxy hóa màng tế bào Vì: Gốc tự do lipid gây tổn thương màng tế bào thông qua việc oxy hóa các lipid trong màng.","reference":"Mục 3.2"},{"id":23,"text":"Neurolathyrogen gây độc gì?","answers":["A. Độc tim","B. Độc gan","C. Độc thận","D. Độc thần kinh"],"correct":3,"explanation":"Đáp án đúng là: Độc thần kinh Vì: Gây độc thần kinh do giống acid amin → rối loạn hệ thần kinh.","reference":"Mục 1.1.3"},{"id":24,"text":"Saponin gây độc do cơ chế nào?","answers":["A. Ức chế men tiêu hoá","B. Gây độc thần kinh","C. Tạo bọt trong dạ cỏ làm chướng hơi","D. Gây rối loạn nội tiết"],"correct":2,"explanation":"Đáp án đúng là: Tạo bọt trong dạ cỏ làm chướng hơi Vì: Saponin tạo bọt, gây đầy hơi – chướng dạ cỏ ở nhai lại.","reference":"Mục 1.1.2"},{"id":25,"text":"Loài nhện nào dưới đây có nọc độc rất mạnh, gây co thắt cơ bắp?","answers":["A. Lycosa spp","B. Eurypelma spp","C. Tegenaria spp","D. Lactrodectus mactans"],"correct":3,"explanation":"Đáp án đúng là: Lactrodectus mactans Vì: Lactrodectus mactans (Black widow) là loài nhện có độc cực mạnh.","reference":"Mục 2.1.4"},{"id":26,"text":"Triệu chứng ngộ độc cấp tính của asen là gì?","answers":["A. Giảm thính lực","B. Loãng xương","C. Suy giảm thị lực","D. Tiêu chảy, đau bụng, nôn mửa"],"correct":3,"explanation":"Đáp án đúng là: Tiêu chảy, đau bụng, nôn mửa Vì: Triệu chứng cấp tính bao gồm tiêu chảy, đau bụng, và nôn mửa do asen ảnh hưởng mạnh lên hệ tiêu hóa.","reference":"Mục 2.1.1"},{"id":27,"text":"Khí nitrogen dioxide (NO₂) được tạo thành trong điều kiện nào?","answers":["A. Do sự phân hủy protein","B. Do nitrate bị khử không hoàn toàn","C. Do ammonium bị oxy hóa","D. Do CO₂ phân hủy"],"correct":1,"explanation":"Đáp án đúng là: Do nitrate bị khử không hoàn toàn Vì: NO₂ được sinh ra khi nitrate bị khử không hoàn toàn trong quá trình lên men hoặc tiêu hóa.","reference":"Mục 3.1"},{"id":28,"text":"Loài cây chứa Atropin và Hyoscyamin?","answers":["A. Cà độc dược","B. Ô đầu","C. Anh đào","D. Lá ngón"],"correct":0,"explanation":"Đáp án đúng là: Cà độc dược Vì: Lá cây cà độc dược chứa Atropin, Hyoscyamin gây độc thần kinh.","reference":"Mục 1.1.1"},{"id":29,"text":"Chất nào dễ hấp thu qua màng tế bào hơn?","answers":["A. Chất phức hợp có trọng lượng cao","B. Chất không phân cực có trọng lượng phân tử thấp","C. Chất phân cực","D. Chất ion hóa mạnh"],"correct":1,"explanation":"Đáp án đúng là: Chất không phân cực có trọng lượng phân tử thấp Vì: Chất không phân cực và có trọng lượng phân tử thấp dễ đi qua màng tế bào hơn.","reference":"Mục 4.1"},{"id":30,"text":"Độc tố nào do Aspergillus flavus tạo ra và có khả năng gây ung thư?","answers":["A. Aflatoxin","B. Ergotoxin","C. Citrinin","D. Ochratoxin"],"correct":0,"explanation":"Đáp án đúng là: Aflatoxin Vì: Aflatoxin do A. flavus sinh ra và có khả năng gây ung thư mạnh.","reference":"Mục 2.3"},{"id":31,"text":"Ngộ độc mãn tính có đặc điểm gì?","answers":["A. Thường gây chết ngay","B. Xuất hiện sau nhiều lần phơi nhiễm trong thời gian dài","C. Xuất hiện ngay sau liều cao","D. Không để lại di chứng"],"correct":1,"explanation":"Đáp án đúng là: Xuất hiện sau nhiều lần phơi nhiễm trong thời gian dài Vì: Ngộ độc mãn tính xảy ra sau nhiều lần phơi nhiễm, có biểu hiện lâu dài.","reference":"Mục 2.1.5"},{"id":32,"text":"Cơ chế gây độc của cyanide là gì?","answers":["A. Làm rối loạn điện giải","B. Tăng co bóp cơ tim","C. Ức chế cytochrome oxidase làm MetHb","D. Kích thích thần kinh trung ương"],"correct":2,"explanation":"Đáp án đúng là: Ức chế cytochrome oxidase làm MetHb Vì: Cyanide ức chế enzym hô hấp nội bào → thiếu oxy mô. Tham khảo: Bài 11 Mục 1.1.2","reference":""},{"id":33,"text":"Dữ liệu nào quan trọng khi thu thập thông tin về chẩn đoán?","answers":["A. Địa chỉ chủ gia súc","B. Tình trạng bệnh lý khác","C. Loài và số lượng súc vật bị ngộ độc","D. Loại thuốc đã dùng"],"correct":2,"explanation":"Đáp án đúng là: Loài và số lượng súc vật bị ngộ độc Vì: cung cấp thông tin thiết yếu về nguyên nhân và mức độ ngộ độc.","reference":"Mục 1.2"},{"id":34,"text":"Tại sao máu của gia súc ngộ độc CO có màu đỏ tươi?","answers":["A. Do có carboxyhemoglobin","B. Do chảy máu phổi","C. Do tăng tạo hemoglobin","D. Do thiếu oxy nên hồng cầu vỡ"],"correct":0,"explanation":"Đáp án đúng là: Do có carboxyhemoglobin Vì: Carboxyhemoglobin làm máu có màu đỏ tươi đặc trưng, dễ nhầm với máu có oxy cao.","reference":"Mục 3.3"},{"id":35,"text":"Canavanin là chất kháng dinh dưỡng có trong?","answers":["A. Họ cúc","B. Họ đậu","C. Họ cải","D. Họ hoa chuông"],"correct":1,"explanation":"Đáp án đúng là: Họ đậu Vì: Canavanin có cấu trúc giống Arginine, gây rối loạn chuyển hoá đạm.","reference":"Mục 1.1.3"},{"id":36,"text":"Chất đối kháng nào giúp giảm độc hại từ ethylen glycol?","answers":["A. Magie sulfat","B. Atropin","C. Xanh methylen","D. Ethanol và 4-methylpyrazole (4-MP)"],"correct":3,"explanation":"Đáp án đúng là: Ethanol và 4-methylpyrazole (4-MP) Vì: Ethanol và 4-MP cạnh tranh với enzym chuyển hóa, ngăn tạo chất trung gian độc hại.","reference":"Mục 2.2"},{"id":37,"text":"Triệu chứng nào không phải do ngộ độc cấp tính chì?","answers":["A. Co giật, run rẩy","B. Sưng lợi, đen chân răng","C. Tiêu chảy dữ dội","D. Đau bụng, nôn"],"correct":1,"explanation":"Đáp án đúng là: Sưng lợi, đen chân răng Vì: Sưng lợi, đen chân răng thường thấy ở ngộ độc mãn tính.","reference":"Mục 2.1.4"},{"id":38,"text":"Glucoza 5-10% được dùng trong điều trị ngộ độc vì lý do nào?","answers":["A. Cung cấp năng lượng và tăng lợi tiểu","B. Làm hạ đường huyết","C. Gây mê nhẹ","D. Giúp hấp thu thuốc tốt hơn"],"correct":0,"explanation":"Đáp án đúng là: Cung cấp năng lượng và tăng lợi tiểu Vì: Glucoza hỗ trợ khử độc và tăng bài tiết thuốc.","reference":"Mục 1.2"},{"id":39,"text":"Chất độc nào tác dụng nhanh hơn qua màng tế bào?","answers":["A. Chất rắn không hòa tan","B. Chất không tan trong lipid","C. Chất tan mạnh trong lipid","D. Chất tan trong nước"],"correct":2,"explanation":"Đáp án đúng là: Chất tan mạnh trong lipid Vì: Chất tan mạnh trong lipid dễ hấp thu qua màng tế bào lipoprotein.","reference":"Mục 4.1"},{"id":40,"text":"Khi nào cần sử dụng sắc ký lớp mỏng trong xét nghiệm?","answers":["A. Để định tính chất độc","B. Để đo pH máu","C. Để phát hiện chất điện giải","D. Để xác định vi khuẩn"],"correct":0,"explanation":"Đáp án đúng là: Để định tính chất độc Vì: là ứng dụng chính của kỹ thuật sắc ký lớp mỏng.","reference":"Mục 1.2"},{"id":41,"text":"Một đặc điểm bệnh lý của ngộ độc carbamat trường diễn là gì?","answers":["A. Xơ gan","B. Hoại tử ống tiết niệu","C. Viêm ruột hoại tử","D. Phù phổi"],"correct":1,"explanation":"Đáp án đúng là: Hoại tử ống tiết niệu Vì: Ngộ độc trường diễn carbamat gây hoại tử ống tiết niệu do giảm hoạt tính các men ty thể.","reference":"Mục 2.2.5"},{"id":42,"text":"Một số sulfamid có thể gây gì trên thận của chó?","answers":["A. Sỏi xanh tím, đái dắt","B. Hẹp niệu đạo","C. Viêm bàng quang","D. Tăng ure"],"correct":0,"explanation":"Đáp án đúng là: Sỏi xanh tím, đái dắt Vì: Sulfamid tạo sản phẩm không tan gây sỏi → tiểu khó. Tham khảo: Bài 9 Mục 2.1","reference":""},{"id":43,"text":"Triệu chứng đầu tiên khi bò bị ngộ độc NO₂?","answers":["A. Đỏ mắt","B. Ho và thở hổn hển","C. Tiêu chảy","D. Run rẩy"],"correct":1,"explanation":"Đáp án đúng là: Ho và thở hổn hển Vì: Ho và thở hổn hển là biểu hiện đầu tiên do tổn thương đường hô hấp. Tham khảo: Bài 6 Mục 3.1","reference":""},{"id":44,"text":"Tác hại cấp tính của chất độc vô cơ thường gặp là gì?","answers":["A. Thiếu máu","B. Ức chế miễn dịch","C. Ngộ độc cấp tính","D. Rối loạn tiêu hóa"],"correct":2,"explanation":"Đáp án đúng là: Ngộ độc cấp tính Vì: Ngộ độc cấp tính có thể gây tử vong nhanh chóng nếu liều lượng chất độc cao.","reference":"Mục 1.2"},{"id":45,"text":"Thức ăn nào có thể chứa hàm lượng Se cao nhất?","answers":["A. Cây keo dậu","B. Cây Astragalus species","C. Cây trinh nữ","D. Cây Atriplex"],"correct":1,"explanation":"Đáp án đúng là: Cây Astragalus species Vì: Cây Astragalus species chứa hàm lượng Se rất cao, lên đến 2170 ppm. Tham khảo: Bài 5 Mục 2.1.7","reference":""},{"id":46,"text":"Vai trò của EDTA trong điều trị ngộ độc là gì?","answers":["A. Tạo phức với chất độc, ngăn hấp thu","B. Diệt khuẩn","C. Gây nôn","D. Gây tiêu chảy"],"correct":0,"explanation":"Đáp án đúng là: Tạo phức với chất độc, ngăn hấp thu Vì: EDTA là chất càng cua, tạo phức với chất độc.","reference":"Mục 1.2"},{"id":47,"text":"Phương pháp vật lý nào hiệu quả nhất để khử độc Aflatoxin trong thức ăn ẩm?","answers":["A. Sấy nhẹ ở 40°C","B. Gia nhiệt ở 100°C trong 2,5 giờ","C. Rửa bằng nước lạnh","D. Đông lạnh"],"correct":1,"explanation":"Đáp án đúng là: Gia nhiệt ở 100°C trong 2,5 giờ Vì: Đun nóng ở nhiệt độ cao và độ ẩm phù hợp giúp giảm độc tố","reference":"Mục 3.2"},{"id":48,"text":"Trong máu, chất độc thường gắn với gì?","answers":["A. Lipoprotein","B. Globulin","C. Hemoglobin","D. Albumin"],"correct":0,"explanation":"Đáp án đúng là: Lipoprotein Vì: Chất độc ưa mỡ thường gắn mạnh vào lipoprotein trong huyết tương. Tham khảo: Bài 1 Mục 2.3.1","reference":""},{"id":49,"text":"Phản ứng dị ứng thuốc có thể gặp nhiều hơn ở đối tượng nào?","answers":["A. Gia súc ăn cỏ","B. Gia súc trưởng thành","C. Gia súc non và quá già","D. Gia súc đực"],"correct":2,"explanation":"Đáp án đúng là: Gia súc non và quá già Vì: Động vật non và già có hệ enzym chuyển hóa yếu.","reference":"Mục 1.3.1"},{"id":50,"text":"Alkaloid là gì?","answers":["A. Protein chứa phenol","B. Acid amin không protein","C. Hợp chất hữu cơ có tính kiềm nhẹ, chủ yếu từ thực vật","D. Glucosid có lưu huỳnh"],"correct":2,"explanation":"Đáp án đúng là: Hợp chất hữu cơ có tính kiềm nhẹ, chủ yếu từ thực vật Vì: Alkaloid là hợp chất có tính kiềm, có hoạt tính sinh học mạnh, chủ yếu có nguồn gốc từ thực vật. Tham khảo: Bài 11 Mục 1.1.1","reference":""},{"id":51,"text":"Biến đổi bệnh lý nào thường gặp khi ngộ độc alkaloid?","answers":["A. Viêm dạ dày ruột","B. Viêm thận","C. Khó thở, xuất huyết","D. Gan nhiễm mỡ"],"correct":2,"explanation":"Đáp án đúng là: Khó thở, xuất huyết Vì: là dấu hiệu thường xuyên khi ngộ độc alkaloid.","reference":"Mục 1.2"},{"id":52,"text":"Fluorid có thể gây ngộ độc khi sử dụng sai mục đích trong ngành chăn nuôi.","answers":["A. Sai","B. Chỉ với loài nhai lại","C. Chỉ với gia cầm","D. Đúng"],"correct":3,"explanation":"Đáp án đúng là: Đúng Vì: Fluorid được sử dụng làm thuốc trị giun, nếu sử dụng sai có thể gây ngộ độc cho động vật.","reference":"Mục 2.2.1"},{"id":53,"text":"Chất độc qua đường tiêu hóa bị chuyển hóa ở đâu lần đầu?","answers":["A. Gan","B. Thận","C. Ruột non","D. Dạ dày"],"correct":0,"explanation":"Đáp án đúng là: Gan Vì: Gan thực hiện chuyển hóa lần đầu chất độc hấp thu qua đường tiêu hóa.","reference":"Mục 2.3.1"},{"id":54,"text":"Liều cao Quinolon gây ảnh hưởng nào?","answers":["A. Ức chế tuyến yên","B. Hạ huyết áp","C. Tổn thương mô sụn","D. Tăng co bóp tử cung"],"correct":2,"explanation":"Đáp án đúng là: Tổn thương mô sụn Vì: Quinolon liều cao ảnh hưởng sụn, chậm phát triển.","reference":"Mục 2.1"},{"id":55,"text":"Cơ chế gây độc của phospho hữu cơ là gì?","answers":["A. Ức chế men cholinesterase làm gián đoạn dẫn truyền thần kinh","B. Làm vỡ tế bào máu đỏ","C. Gây đột biến DNA","D. Phân hủy protein trong tế bào"],"correct":0,"explanation":"Đáp án đúng là: Ức chế men cholinesterase làm gián đoạn dẫn truyền thần kinh Vì: Hợp chất phospho hữu cơ tạo phức với cholinesterase, ngăn dẫn truyền xung thần kinh. Tham khảo: Bài 7 Mục 2.1.4","reference":""},{"id":56,"text":"Phương pháp xét nghiệm nào có thể định lượng chất độc?","answers":["A. Kiểm tra huyết thanh","B. Sắc ký khí","C. Xét nghiệm phân","D. Xét nghiệm nấm"],"correct":1,"explanation":"Đáp án đúng là: Sắc ký khí Vì: Sắc ký khí là phương pháp hiện đại giúp định lượng nồng độ các chất độc trong mẫu xét nghiệm.","reference":"Mục 1.2"},{"id":57,"text":"Chất độc xâm nhập qua da nhanh hơn khi?","answers":["A. Da được bảo vệ tốt","B. Da dày hơn bình thường","C. Da bị trầy xước hoặc tổn thương","D. Da khô hoàn toàn"],"correct":2,"explanation":"Đáp án đúng là: Da bị trầy xước hoặc tổn thương Vì: Tổn thương da làm tăng tính thấm và hấp thu chất độc.","reference":"Mục 2.3.1"},{"id":58,"text":"Tanin là chất nào sau đây?","answers":["A. Alkaloid","B. Chất chứa phenolic gây giảm hấp thu","C. Glucosid","D. Enzym tiêu hoá"],"correct":1,"explanation":"Đáp án đúng là: Chất chứa phenolic gây giảm hấp thu Vì: Tanin kết tủa protein, giảm hấp thu và tính ngon miệng.","reference":"Mục 1.1.4"},{"id":59,"text":"Triệu chứng lâm sàng đầu tiên do tiếp xúc SO₂ là gì?","answers":["A. Lạnh run","B. Mắt mờ","C. Ho và đỏ niêm mạc","D. Rối loạn tiêu hóa"],"correct":2,"explanation":"Đáp án đúng là: Ho và đỏ niêm mạc Vì: SO₂ gây kích thích niêm mạc đường hô hấp, ho là triệu chứng sớm nhất.","reference":"Mục 3.2"},{"id":60,"text":"Quá trình chuyển hóa chất độc nhằm mục đích gì?","answers":["A. Tăng độ độc của chất độc","B. Biến chất độc thành dạng dễ thải trừ","C. Tăng hấp thu chất độc","D. Giữ chất độc trong cơ thể"],"correct":1,"explanation":"Đáp án đúng là: Biến chất độc thành dạng dễ thải trừ Vì: Chuyển hóa giúp biến đổi chất độc thành dạng dễ tan và dễ thải ra ngoài.","reference":"Mục 2.3.1"},{"id":61,"text":"Lincomycin nếu phối hợp với Neomycin có thể gây tác dụng phụ nào?","answers":["A. Đau bụng","B. Viêm da","C. Suy hô hấp","D. Sốc quá mẫn tức khắc"],"correct":3,"explanation":"Đáp án đúng là: Sốc quá mẫn tức khắc Vì: Lincomycin + Neomycin gây sốc giống penicillin sau 5-10 giây.","reference":"Mục 2.1"},{"id":62,"text":"Ngộ độc mãn tính thường xảy ra do đâu?","answers":["A. Nhiễm độc qua không khí","B. Ăn phải thức ăn nhiễm độc cấp tính","C. Phơi nhiễm lâu dài với chất độc","D. Tiêm nhầm thuốc độc"],"correct":2,"explanation":"Đáp án đúng là: Phơi nhiễm lâu dài với chất độc Vì: Ngộ độc mãn tính do tiếp xúc liên tục hoặc tích lũy chất độc trong cơ thể qua thời gian dài.","reference":"Mục 1.2"},{"id":63,"text":"Triệu chứng thần kinh nào thường thấy khi ngộ độc?","answers":["A. Xuất huyết nội tạng","B. Vàng da","C. Co giật và liệt","D. Tiết nước bọt"],"correct":2,"explanation":"Đáp án đúng là: Co giật và liệt Vì: Co giật và liệt là triệu chứng điển hình của ngộ độc thần kinh do ảnh hưởng tới hệ thần kinh trung ương. Tham khảo: Bài 3 Mục 1.2","reference":""},{"id":64,"text":"Bệnh do độc tố nấm mốc có đặc điểm nào sau đây?","answers":["A. Có thể điều trị bằng vaccine","B. Không lây lan và điều trị bằng hoá học ít hiệu quả","C. Luôn gây tử vong cấp tính","D. Gây sốt cao, dễ lây truyền"],"correct":1,"explanation":"Đáp án đúng là: Không lây lan và điều trị bằng hoá học ít hiệu quả Vì: Bệnh do độc tố nấm mốc không lây và ít đáp ứng với điều trị hoá học.","reference":"Mục 2.1"},{"id":65,"text":"Chất độc trong cá nóc chủ yếu tập trung ở đâu?","answers":["A. Thịt cá","B. Vây cá","C. Gan, ruột, trứng và da bụng","D. Xương sống cá"],"correct":2,"explanation":"Đáp án đúng là: Gan, ruột, trứng và da bụng Vì: Gan, ruột, trứng và da bụng chứa tetrodotoxin – chất cực độc.","reference":"Mục 2.2.1"},{"id":66,"text":"Liều chì nào nguy hiểm nhất qua thực phẩm hàng ngày?","answers":["A. Trên 200µg","B. Dưới 10µg","C. 50-100µg","D. 150-200µg"],"correct":0,"explanation":"Đáp án đúng là: Trên 200µg Vì: Lượng chì trên 200µg/ngày vượt ngưỡng an toàn gây nguy hiểm.","reference":"Mục 2.1.4"},{"id":67,"text":"Dư lượng hóa chất BVTV là gì?","answers":["A. Phần còn sót lại của hoá chất không bị phân hủy","B. Phân bón chưa tan hết trong đất","C. Hóa chất khi chưa được phun lên cây","D. Thuốc diệt côn trùng đang bay trong không khí"],"correct":0,"explanation":"Đáp án đúng là: Phần còn sót lại của hoá chất không bị phân hủy Vì: dư lượng là phần hóa chất còn lại sau khi đã phân hủy một phần, tồn tại trong đất, nước, không khí, cây trồng.","reference":"Mục 1.2"},{"id":68,"text":"Đường nào cho phép chất độc tiếp cận nhanh nhất đến hệ thống hô hấp?","answers":["A. Đường miệng","B. Đường tiêm dưới da","C. Đường hô hấp","D. Đường tiêu hóa"],"correct":2,"explanation":"Đáp án đúng là: Đường hô hấp Vì: Chất độc qua đường hô hấp sẽ tiếp cận trực tiếp đến phổi, gây tác dụng nhanh.","reference":"Mục 4.3"},{"id":69,"text":"Vì sao chất chứa dạ dày thường được xét nghiệm khi chẩn đoán ngộ độc?","answers":["A. Đánh giá tổn thương niêm mạc","B. Kiểm tra men tiêu hóa","C. Phát hiện vi khuẩn","D. Phản ánh chất độc mới xâm nhập"],"correct":3,"explanation":"Đáp án đúng là: Phản ánh chất độc mới xâm nhập Vì: Chất chứa dạ dày phản ánh chất độc mới xâm nhập qua đường miệng, là dấu hiệu quan trọng khi chẩn đoán.","reference":"Mục 1.2"},{"id":70,"text":"Chất antitrypsine có nhiều trong?","answers":["A. Đậu nành sống","B. Đậu nành chín","C. Khế chua","D. Cỏ Sudan"],"correct":0,"explanation":"Đáp án đúng là: Đậu nành sống Vì: Antitrypsine có nhiều trong hạt đậu sống, gây phình tụy.","reference":"Mục 1.1.5"},{"id":71,"text":"Người hoặc vật có tiền sử dị ứng với thuốc thì sao?","answers":["A. Dễ bị dị ứng lại khi dùng lại thuốc","B. Không bị ảnh hưởng gì","C. Miễn nhiễm hoàn toàn","D. Dùng thuốc càng nhiều càng quen"],"correct":0,"explanation":"Đáp án đúng là: Dễ bị dị ứng lại khi dùng lại thuốc Vì: Cơ địa dị ứng làm tăng nguy cơ tái phản ứng.","reference":"Mục 1.3.1"},{"id":72,"text":"Triệu chứng muscarin chủ yếu là gì?","answers":["A. Tim đập nhanh, giãn đồng tử","B. Co giật toàn thân","C. Co cơ trơn, tăng tiết, nhịp tim chậm","D. Không có triệu chứng gì"],"correct":2,"explanation":"Đáp án đúng là: Co cơ trơn, tăng tiết, nhịp tim chậm Vì: acetylcholin tích tụ gây tăng hoạt động phó giao cảm, làm co cơ trơn và tăng tiết.","reference":"Mục 2.1.6"},{"id":73,"text":"Tác dụng chống Aflatoxin của Actiso là nhờ hoạt chất nào?","answers":["A. Silymarin","B. Quercetin","C. Lycopen","D. Capsaicin"],"correct":0,"explanation":"Đáp án đúng là: Silymarin Vì: Silymarin là flavonoid giúp bảo vệ và giải độc gan","reference":"Mục 3.2"},{"id":74,"text":"Tổn thương tế bào thường xảy ra khi H2O2 được chuyển đổi thành?","answers":["A. Gốc peroxyl (-OO)","B. Gốc hydroxyl (-OH)","C. Gốc lipid tự do","D. Superoxyd (O2-)"],"correct":1,"explanation":"Đáp án đúng là: Gốc hydroxyl (-OH) Vì: Gốc hydroxyl được tạo ra từ H2O2 trong phản ứng Fenton, là một trong những tác nhân gây tổn thương tế bào mạnh nhất.","reference":"Mục 3.2"},{"id":75,"text":"Một trong các tác hại của tồn dư kháng sinh đến công nghệ thực phẩm là gì?","answers":["A. Cản trở quá trình lên men","B. Làm tăng độc tính","C. Làm đổi màu sản phẩm","D. Gây mùi khó chịu"],"correct":0,"explanation":"Đáp án đúng là: Cản trở quá trình lên men Vì: Tồn dư kháng sinh làm gián đoạn lên men (sữa chua, xúc xích).","reference":"Mục 2.1"},{"id":76,"text":"Tại sao cây mơ (Prunus armeniaca) gây ngộ độc?","answers":["A. Chứa saponin","B. Chứa amygdalin → giải phóng HCN","C. Chứa digitalis","D. Chứa ricin"],"correct":1,"explanation":"Đáp án đúng là: Chứa amygdalin → giải phóng HCN Vì: Amygdalin là cyanogenic glucosid có nhiều trong hạt mơ.","reference":"Mục 1.2.4"},{"id":77,"text":"Cơ chế sinh độc tố nấm mốc xảy ra chủ yếu vào giai đoạn nào?","answers":["A. Cuối giai đoạn phát triển tế bào nấm","B. Sau khi chết","C. Khi nấm mới nảy mầm","D. Giai đoạn sinh bào tử"],"correct":0,"explanation":"Đáp án đúng là: Cuối giai đoạn phát triển tế bào nấm Vì: Chuyển hoá thứ cấp xảy ra cuối chu kỳ phát triển, tạo độc tố.","reference":"Mục 2.2"},{"id":78,"text":"Triệu chứng nào biểu hiện trong ngộ độc glucosid cường tim?","answers":["A. Da đỏ rát","B. Co giật liên tục","C. Mạch nhanh nhưng yếu","D. Sốt cao"],"correct":2,"explanation":"Đáp án đúng là: Mạch nhanh nhưng yếu Vì: Mạch nhanh yếu do ảnh hưởng lên dẫn truyền và co bóp cơ tim.","reference":"Mục 1.2.1"},{"id":79,"text":"Biện pháp nào giúp hạn chế lan nhiễm nấm mốc ngay từ đồng ruộng?","answers":["A. Chọn giống có sức đề kháng nấm mốc","B. Không cần luân canh","C. Thu hoạch muộn","D. Tăng mật độ gieo trồng"],"correct":0,"explanation":"Đáp án đúng là: Chọn giống có sức đề kháng nấm mốc Vì: Giống kháng giúp hạn chế nguy cơ nhiễm nấm mốc từ môi trường","reference":"Mục 3.1"},{"id":80,"text":"NO₂ có màu sắc đặc trưng gì?","answers":["A. Không màu","B. Màu xanh","C. Màu hơi đỏ","D. Màu trắng"],"correct":2,"explanation":"Đáp án đúng là: Màu hơi đỏ Vì: NO₂ có màu hơi đỏ, trong khi N₂O₄ không màu.","reference":"Mục 3.1"},{"id":81,"text":"Phương pháp nào không nên áp dụng với súc vật hôn mê khi ngộ độc?","answers":["A. Sử dụng than hoạt","B. Thụt trực tràng","C. Gây nôn","D. Truyền dịch"],"correct":2,"explanation":"Đáp án đúng là: Gây nôn Vì: Vì gây nôn có thể làm ngạt thở khi súc vật không kiểm soát được phản xạ. Tham khảo: Bài 4 Mục 2.1","reference":""},{"id":82,"text":"Tác dụng phụ có hại của thuốc được gọi là gì?","answers":["A. Auto-immune effect","B. Allergic Reaction","C. Adverse Drug Reaction (ADR)","D. Pharmacokinetic reaction"],"correct":2,"explanation":"Đáp án đúng là: Adverse Drug Reaction (ADR) Vì: ADR là phản ứng có hại không mong muốn, xuất hiện ở liều điều trị.","reference":"Mục 1.1"},{"id":83,"text":"Cơ chế gây ngộ độc của cỏ lúa miến là?","answers":["A. Làm thiếu máu","B. Làm xơ gan","C. Giải phóng HCN ức chế cytochrome oxidase","D. Kích thích tim mạnh"],"correct":2,"explanation":"Đáp án đúng là: Giải phóng HCN ức chế cytochrome oxidase Vì: HCN ức chế enzym hô hấp tế bào, gây chết nhanh.","reference":"Mục 1.2.3"},{"id":84,"text":"Lý do cần truyền dung dịch đường ưu trương khi ngộ độc nặng?","answers":["A. Ngăn chặn tổn thương gan","B. Giảm đau","C. Tăng kháng độc","D. Cải thiện lưu thông máu"],"correct":2,"explanation":"Đáp án đúng là: Tăng kháng độc Vì: vì dung dịch đường ưu trương giúp nâng cao khả năng kháng độc của cơ thể.","reference":"Mục 2.1"},{"id":85,"text":"Cadimi thường gây ngộ độc qua đường nào?","answers":["A. Qua ánh sáng mặt trời","B. Qua thực phẩm và nước bị nhiễm","C. Qua đường tiếp xúc da","D. Qua không khí sạch"],"correct":1,"explanation":"Đáp án đúng là: Qua thực phẩm và nước bị nhiễm Vì: Cadimi chủ yếu nhiễm qua thực phẩm và nước ô nhiễm.","reference":"Mục 2.1.3"},{"id":86,"text":"Yếu tố môi trường nào làm tăng sự hấp thu chất độc qua da?","answers":["A. Vùng da dày","B. Vùng da mỏng nhiều mạch máu","C. Da vùng bụng","D. Da vùng đầu"],"correct":1,"explanation":"Đáp án đúng là: Vùng da mỏng nhiều mạch máu Vì: Vùng da mỏng nhiều mạch máu hấp thu chất độc tốt hơn các vùng khác.","reference":"Mục 4.3"},{"id":87,"text":"Ảnh hưởng của nhiệt độ cao đến sự phơi nhiễm chất độc qua nước là gì?","answers":["A. Không đổi","B. Giảm","C. Không xác định","D. Tăng"],"correct":3,"explanation":"Đáp án đúng là: Tăng Vì: Nhiệt độ cao làm tăng nhu cầu nước, dẫn đến tăng phơi nhiễm chất độc qua nước.","reference":"Mục 4.3"},{"id":88,"text":"Biện pháp điều trị đầu tiên khi nghi ngộ độc khí độc là gì?","answers":["A. Dùng kháng sinh","B. Cho uống nước nhiều","C. Gây nôn ngay lập tức","D. Đưa con vật ra khỏi vùng nhiễm"],"correct":3,"explanation":"Đáp án đúng là: Đưa con vật ra khỏi vùng nhiễm Vì: Việc đầu tiên là cách ly khỏi nguồn độc để tránh tiếp tục tiếp xúc.","reference":"Mục 3.1"},{"id":89,"text":"Độc tính của Bari phụ thuộc vào yếu tố nào?","answers":["A. Sự có mặt của oxy","B. Khả năng hòa tan trong lipid","C. Hàm lượng ion Ba²⁺","D. Tính bền trong nước"],"correct":2,"explanation":"Đáp án đúng là: Hàm lượng ion Ba²⁺ Vì: Ion Ba²⁺ quyết định độc tính của các muối bari.","reference":"Mục 2.1.2"},{"id":90,"text":"Chất nào không nên dùng để rửa dạ dày khi bị ngộ độc acid?","answers":["A. Dung dịch Kali permanganat","B. Huyết thanh mặn đẳng trương","C. Dung dịch Magiesium oxyd","D. Dung dịch Natri hydrocarbonat 50/00"],"correct":3,"explanation":"Đáp án đúng là: Dung dịch Natri hydrocarbonat 50/00 Vì: Natri hydrocarbonat giải phóng khí CO2, gây nguy hiểm như chướng bụng, thủng dạ dày.","reference":"Mục 2.1"},{"id":91,"text":"Một số acid hữu cơ như acid oxalic thường gây độc cho loài nào?","answers":["A. Chó","B. Gia súc nhai lại","C. Lợn","D. Gà công nghiệp"],"correct":1,"explanation":"Đáp án đúng là: Gia súc nhai lại Vì: Loài nhai lại mẫn cảm với acid hữu cơ gây độc hệ tiêu hoá.","reference":"Mục 2.2"},{"id":92,"text":"Carbamat bị phân huỷ trong cơ thể chủ yếu theo cách nào sau đây?","answers":["A. Không bị phân huỷ","B. Do tác dụng trực tiếp của esterase","C. Qua sự lên men vi sinh","D. Do gan khử độc hoàn toàn"],"correct":1,"explanation":"Đáp án đúng là: Do tác dụng trực tiếp của esterase Vì: Các hợp chất carbamat bị phân huỷ nhanh chủ yếu nhờ tác dụng trực tiếp của các esterase trong cơ thể.","reference":"Mục 2.2.2"},{"id":93,"text":"Tại sao asen được coi là nguyên tố vi lượng cần thiết?","answers":["A. Thúc đẩy tiêu hóa và tăng trọng","B. Gây độc cao","C. Là chất xúc tác","D. Không tham gia vào các quá trình sinh học"],"correct":0,"explanation":"Đáp án đúng là: Thúc đẩy tiêu hóa và tăng trọng Vì: Asen ở liều thấp kích thích tiêu hóa và tăng trọng cho động vật.","reference":"Mục 2.1.1"},{"id":94,"text":"Loại chất độc bám trên da và lông súc vật được xử lý bằng gì?","answers":["A. Nước ấm và xà phòng","B. Cồn và nước","C. Chỉ cần nước sạch","D. Nước lạnh và xà phòng"],"correct":0,"explanation":"Đáp án đúng là: Nước ấm và xà phòng Vì: Nước ấm và xà phòng giúp làm sạch hiệu quả và an toàn cho da súc vật.","reference":"Mục 2.1"},{"id":95,"text":"Triệu chứng ngộ độc cá nóc xuất hiện sau bao lâu?","answers":["A. Sau 3 ngày","B. Ngay sau ăn","C. Sau 48 giờ","D. 30 phút đến 30 giờ sau ăn"],"correct":3,"explanation":"Đáp án đúng là: 30 phút đến 30 giờ sau ăn Vì: Thời gian khởi phát tùy theo lượng độc, có thể từ nửa giờ đến 30 giờ.","reference":"Mục 2.2.1"},{"id":96,"text":"Dung dịch nào không nên dùng khi súc vật bị ngộ độc xăng, dầu?","answers":["A. Huyết thanh đẳng trương","B. Dung dịch Kali permanganat","C. Nước sạch","D. Dung dịch NaCl"],"correct":1,"explanation":"Đáp án đúng là: Dung dịch Kali permanganat Vì: Dung dịch Kali permanganat phản ứng mạnh, không an toàn cho dạ dày bị tổn thương do xăng, dầu.","reference":"Mục 2.1"},{"id":97,"text":"Nicotin là Alkaloid rất độc có trong?","answers":["A. Cây thuốc lá","B. Cây trúc đào","C. Cây mã tiền","D. Cây lanh"],"correct":0,"explanation":"Đáp án đúng là: Cây thuốc lá Vì: Nicotin có trong lá thuốc lá, tác động nhanh lên hệ thần kinh.","reference":"Mục 1.1.1"},{"id":98,"text":"Loại ngộ độc nào tiến triển rất nhanh và thường gây tử vong trong vài giờ?","answers":["A. Ngộ độc tối cấp","B. Ngộ độc cấp tính","C. Ngộ độc bán cấp","D. Ngộ độc mãn tính"],"correct":0,"explanation":"Đáp án đúng là: Ngộ độc tối cấp Vì: Ngộ độc tối cấp tiến triển nhanh, thường xảy ra khi tiếp xúc với chất độc rất mạnh hoặc liều lượng cao.","reference":"Mục 1.2"},{"id":99,"text":"Thioglucosid là đặc trưng cho loài cây nào?","answers":["A. Họ cúc","B. Họ đậu","C. Họ cải (hoa chữ thập)","D. Họ lúa"],"correct":2,"explanation":"Đáp án đúng là: Họ cải (hoa chữ thập) Vì: Thioglucosid chứa lưu huỳnh có trong cây họ cải. Tham khảo: Bài 11 Mục 1.1.2","reference":""},{"id":100,"text":"Biện pháp đầu tiên khi ngộ độc muối ăn ở gia súc?","answers":["A. Cho uống thuốc lợi tiểu","B. Loại bỏ thức ăn nghi nhiễm","C. Rửa dạ dày","D. Truyền dung dịch muối"],"correct":1,"explanation":"Đáp án đúng là: Loại bỏ thức ăn nghi nhiễm Vì: Loại bỏ thức ăn nghi nhiễm để ngăn ngừa hấp thu thêm ion Na+.","reference":"Mục 2.2.3"},{"id":101,"text":"DL50 là gì?","answers":["A. Liều tối thiểu gây tác dụng đặc trưng","B. Liều không gây độc","C. Liều gây chết 100% động vật","D. Liều gây chết 50% động vật thí nghiệm trong 24-48 giờ"],"correct":3,"explanation":"Đáp án đúng là: Liều gây chết 50% động vật thí nghiệm trong 24-48 giờ Vì: DL50 dùng để xác định độc lực gây chết 50% động vật trong thời gian quy định. Tham khảo: Bài 1 Mục 2.1.4","reference":""},{"id":102,"text":"Màng tế bào bị tổn thương nghiêm trọng nhất khi nào?","answers":["A. Vitamin E bị tiêu hao","B. Mất hoạt động của enzym catalase","C. Các lipid bị oxy hóa","D. Gốc tự do bị ức chế"],"correct":2,"explanation":"Đáp án đúng là: Các lipid bị oxy hóa Vì: Oxy hóa lipid màng tế bào làm suy yếu cấu trúc, dẫn đến mất chức năng màng.","reference":"Mục 3.2"},{"id":103,"text":"Hàm lượng nitrat trong nước uống có thể gây độc ở động vật?","answers":["A. 0,5 ppm","B. 1,0-3,0 ppm","C. >10 ppm","D. 5,0-10,0 ppm"],"correct":1,"explanation":"Đáp án đúng là: 1,0-3,0 ppm Vì: Hàm lượng nitrat từ 1,0-3,0 ppm trong nước uống đã có thể gây ngộ độc.","reference":"Mục 2.2.2"},{"id":104,"text":"Triệu chứng chính khi bị ngộ độc do mytilotoxin là gì?","answers":["A. Chóng mặt, buồn nôn, liệt cơ","B. Tiêu chảy kéo dài","C. Viêm họng nặng","D. Phát ban toàn thân"],"correct":0,"explanation":"Đáp án đúng là: Chóng mặt, buồn nôn, liệt cơ Vì: Mytilotoxin gây ảnh hưởng lên thần kinh và cơ, dẫn tới liệt.","reference":"Mục 2.2.2"},{"id":105,"text":"Vì sao cùng một thuốc nhưng đường đưa thuốc khác nhau có thể gây phản ứng khác nhau?","answers":["A. Do giống gia súc","B. Mức độ hấp thu và phân bố trong cơ thể khác nhau","C. Do mùa trong năm","D. Do khẩu phần ăn"],"correct":1,"explanation":"Đáp án đúng là: Mức độ hấp thu và phân bố trong cơ thể khác nhau Vì: Tiêm trực tiếp vào máu phản ứng nhanh hơn uống.","reference":"Mục 1.4"},{"id":106,"text":"pKa của chất độc ảnh hưởng thế nào đến sự hấp thu?","answers":["A. Xác định tỷ lệ dạng ion hóa và không ion hóa ở môi trường khác nhau","B. Là hằng số phân tán lipid","C. Chỉ ảnh hưởng đến độc lực","D. Không ảnh hưởng đến hấp thu"],"correct":0,"explanation":"Đáp án đúng là: Xác định tỷ lệ dạng ion hóa và không ion hóa ở môi trường khác nhau Vì: pKa liên quan đến mức độ ion hóa của chất độc theo pH môi trường, ảnh hưởng hấp thu.","reference":"Mục 2.3.1"},{"id":107,"text":"Nọc độc rắn có thể ảnh hưởng tới hệ nào sau đây?","answers":["A. Thần kinh, hô hấp, tuần hoàn","B. Sinh sản","C. Bài tiết","D. Tiêu hoá"],"correct":0,"explanation":"Đáp án đúng là: Thần kinh, hô hấp, tuần hoàn Vì: Nọc tấn công lên nhiều hệ cơ quan, nguy hiểm nhất là thần kinh, hô hấp, tuần hoàn.","reference":"Mục 2.1.1"},{"id":108,"text":"Tác dụng của DTT (1,2-dithiol-3-thion) trong phòng ung thư do Aflatoxin là:","answers":["A. Diệt tế bào ung thư trực tiếp","B. Tăng hoạt tính enzyme gan","C. Giảm liên kết Aflatoxin với ADN","D. Làm mất mùi độc tố"],"correct":2,"explanation":"Đáp án đúng là: Giảm liên kết Aflatoxin với ADN Vì: DTT ngăn hình thành phức hợp gây đột biến ADN","reference":"Mục 3.2"},{"id":109,"text":"Nguyên nhân nào sau đây thường gây ngộ độc thuốc do thao tác kỹ thuật?","answers":["A. Do thức ăn ôi thiu","B. Thiếu vitamin","C. Dùng thuốc sai liều, sai liệu trình hoặc sai đường đưa thuốc","D. Do vi khuẩn kháng thuốc"],"correct":2,"explanation":"Đáp án đúng là: Dùng thuốc sai liều, sai liệu trình hoặc sai đường đưa thuốc Vì: Dùng thuốc sai cách là nguyên nhân phổ biến, thuộc thao tác kỹ thuật. Tham khảo: Bài 8 Mục 1.1","reference":""},{"id":110,"text":"Tác dụng của dung dịch NH4Cl 8,3% trong điều trị là gì?","answers":["A. Giảm hấp thu chất độc","B. Bù toan","C. Giảm kiềm","D. Bù nước"],"correct":1,"explanation":"Đáp án đúng là: Bù toan Vì: Dung dịch NH4Cl bù toan bằng cách giảm kiềm trong cơ thể.","reference":"Mục 2.3"},{"id":111,"text":"Phản ứng Haber Weiss tạo ra sản phẩm nào nguy hiểm nhất?","answers":["A. Hydro peroxid (H2O2)","B. Gốc hydroxyl (-OH)","C. Gốc lipid tự do","D. Superoxyd (O2-)"],"correct":1,"explanation":"Đáp án đúng là: Gốc hydroxyl (-OH) Vì: Gốc hydroxyl (-OH) là sản phẩm nguy hại nhất trong các phản ứng sinh học do phá hủy mạnh cấu trúc tế bào.","reference":"Mục 3.1"},{"id":112,"text":"Đường đưa thuốc dễ gây dị ứng nhất là?","answers":["A. Uống","B. Tiêm","C. Trộn thức ăn","D. Xoa ngoài da"],"correct":1,"explanation":"Đáp án đúng là: Tiêm Vì: Tiêm đưa thuốc trực tiếp vào máu, dễ gây phản ứng nặng.","reference":"Mục 1.3"},{"id":113,"text":"Nồng độ H₂S có thể gây bất tỉnh và tử vong nhanh là?","answers":["A. 50 ppm","B. 200 ppm","C. 10 ppm","D. 1000 ppm"],"correct":3,"explanation":"Đáp án đúng là: 1000 ppm Vì: Ở mức 1000 ppm, H₂S gây bất tỉnh và tử vong chỉ sau vài phút tiếp xúc.","reference":"Mục 3.4"},{"id":114,"text":"Cơ chế giải độc chính của phospho hữu cơ trong cơ thể là gì?","answers":["A. Dùng men tiêu hóa","B. Dùng thuốc ngủ mạnh","C. Phân giải phức hợp men – phospho hữu cơ bằng pralidoxim","D. Uống nhiều nước lọc"],"correct":2,"explanation":"Đáp án đúng là: Phân giải phức hợp men – phospho hữu cơ bằng pralidoxim Vì: pralidoxim phân giải phức hợp men – phospho hữu cơ, phục hồi chức năng men.","reference":"Mục 2.1.4"},{"id":115,"text":"Tác dụng của chất độc ảnh hưởng như thế nào bởi khối lượng cơ thể?","answers":["A. Không ảnh hưởng","B. Tiểu gia súc chịu độc cao hơn","C. Đại gia súc chịu độc cao hơn","D. Tùy thuộc vào loại chất độc"],"correct":2,"explanation":"Đáp án đúng là: Đại gia súc chịu độc cao hơn Vì: Đại gia súc có khối lượng lớn hơn, nên chất độc được pha loãng hơn trong máu.","reference":"Mục 4.2"},{"id":116,"text":"Loại mẫu bệnh phẩm nào cần thiết để phát hiện kim loại độc trong cơ thể?","answers":["A. Nước tiểu","B. Phân","C. Máu","D. Lông"],"correct":2,"explanation":"Đáp án đúng là: Máu Vì: Máu là môi trường vận chuyển chất độc và phản ánh sự phơi nhiễm kim loại.","reference":"Mục 1.3"},{"id":117,"text":"Biện pháp sơ cứu hiệu quả sau khi bị rắn độc cắn là gì?","answers":["A. Băng vết thương","B. Cho uống nhiều nước","C. Cố định chi bị cắn","D. Buộc garo, chườm lạnh, nặn máu"],"correct":3,"explanation":"Đáp án đúng là: Buộc garo, chườm lạnh, nặn máu Vì: Garo và chườm lạnh giúp ngăn hấp thu nọc, nặn máu giảm độc tố tại chỗ.","reference":"Mục 2.1.1"},{"id":118,"text":"Cơ quan nào tích lũy chì nhiều nhất trong cơ thể?","answers":["A. Gan, thận, tủy xương","B. Da","C. Phổi","D. Ruột"],"correct":0,"explanation":"Đáp án đúng là: Gan, thận, tủy xương Vì: Chì tích lũy nhiều trong gan, thận và tủy xương. Tham khảo: Bài 5 Mục 2.1.4","reference":""},{"id":119,"text":"Gốc tự do có đặc điểm nào sau đây?","answers":["A. Không tác động đến màng tế bào","B. Có năng lượng thấp","C. Luôn bền vững","D. Có điện tử không cặp"],"correct":3,"explanation":"Đáp án đúng là: Có điện tử không cặp Vì: Gốc tự do là các phân tử có điện tử không cặp, gây ra phản ứng phá hủy cấu trúc tế bào, đặc biệt là màng tế bào.","reference":"Mục 3.1"},{"id":120,"text":"Nhóm động vật nào dễ bị ngộ độc do cóc gây ra nhất?","answers":["A. Mèo","B. Lợn","C. Chó nhà","D. Trâu bò"],"correct":2,"explanation":"Đáp án đúng là: Chó nhà Vì: Chó thường tiếp xúc và cắn cóc, dẫn đến ngộ độc nặng.","reference":"Mục 2.1.3"},{"id":121,"text":"Điều trị suy hô hấp bằng thuốc nào sau khi hô hấp nhân tạo?","answers":["A. Diazepam","B. Naloxon","C. Ephedrin","D. Atropin"],"correct":2,"explanation":"Đáp án đúng là: Ephedrin Vì: vì Ephedrin kích thích hô hấp sau hỗ trợ hô hấp nhân tạo.","reference":"Mục 2.3"},{"id":122,"text":"Chất độc trong nhựa cóc có tác dụng sinh lý giống chất nào sau đây?","answers":["A. Enzym phân giải protein","B. Glucosid giảm huyết áp","C. Glucosid cường tim","D. Chất chống đông máu"],"correct":2,"explanation":"Đáp án đúng là: Glucosid cường tim Vì: Bufotoxin có tác dụng tương tự digitalis – tăng co bóp cơ tim.","reference":"Mục 2.1.3"},{"id":123,"text":"Yếu tố nào thường được kiểm tra khi thu thập thông tin về ngộ độc?","answers":["A. Chế độ tiêm phòng","B. Khối lượng súc vật","C. Lịch sử mua bán gia súc","D. Loài, số lượng súc vật"],"correct":3,"explanation":"Đáp án đúng là: Loài, số lượng súc vật Vì: Thông tin về loài và số lượng giúp xác định nguy cơ và phạm vi ảnh hưởng của chất độc.","reference":"Mục 1.2"},{"id":124,"text":"Dạng tá dược nào làm tăng độc tính của một chất độc?","answers":["A. Tá dược rắn","B. Tá dược lỏng không phân cực","C. Tá dược tan trong nước","D. Tá dược hữu cơ"],"correct":1,"explanation":"Đáp án đúng là: Tá dược lỏng không phân cực Vì: Tá dược lỏng không phân cực dễ vận chuyển chất độc qua màng tế bào. Tham khảo: Bài 2 Mục 4.1","reference":""},{"id":125,"text":"Loại độc tố trong cây trúc đào?","answers":["A. Acid hữu cơ","B. Saponin","C. Glucosid cường tim","D. Alkaloid"],"correct":2,"explanation":"Đáp án đúng là: Glucosid cường tim Vì: Trúc đào chứa nerionin, một glucosid có tác dụng mạnh lên tim.","reference":"Mục 1.1.2"},{"id":126,"text":"CO gây ngộ độc chủ yếu qua cơ chế nào?","answers":["A. Gây viêm hô hấp","B. Kết hợp với hemoglobin làm giảm vận chuyển oxy","C. Tạo thành acid mạnh trong phổi","D. Làm vỡ màng tế bào"],"correct":1,"explanation":"Đáp án đúng là: Kết hợp với hemoglobin làm giảm vận chuyển oxy Vì: CO tạo carboxyhemoglobin không vận chuyển được oxy gây thiếu oxy toàn thân.","reference":"Mục 3.3"},{"id":127,"text":"Thời gian hiệu quả nhất để rửa dạ dày sau ngộ độc là bao lâu?","answers":["A. Trong vòng 60 phút đầu","B. Sau 4 giờ","C. Sau 3 giờ","D. Trong 24 giờ đầu"],"correct":0,"explanation":"Đáp án đúng là: Trong vòng 60 phút đầu Vì: Rửa dạ dày trong 60 phút đầu giảm hấp thu chất độc nhanh nhất.","reference":"Mục 2.1"},{"id":128,"text":"Triệu chứng ngộ độc đường tiêu hóa thường gặp là gì?","answers":["A. Vàng da","B. Nôn mửa và ỉa chảy","C. Động kinh","D. Khó thở"],"correct":1,"explanation":"Đáp án đúng là: Nôn mửa và ỉa chảy Vì: Các triệu chứng nôn mửa, ỉa chảy thường xuất hiện do chất độc kích thích đường tiêu hóa.","reference":"Mục 1.2"},{"id":129,"text":"Loài động vật nào mẫn cảm nhất với fluorid?","answers":["A. Ngựa","B. Bò","C. Gia cầm","D. Lợn"],"correct":1,"explanation":"Đáp án đúng là: Bò Vì: Bò là loài mẫn cảm nhất với fluorid, tiếp theo là lợn và ngựa.","reference":"Mục 2.2.1"},{"id":130,"text":"Tại sao không nên vào nơi có khói màu vàng trong khu ủ thức ăn?","answers":["A. Vì có vi khuẩn gây bệnh","B. Vì thiếu oxy","C. Vì có thể chứa NO₂-N₂O₄ rất độc","D. Vì có thể gây nổ"],"correct":2,"explanation":"Đáp án đúng là: Vì có thể chứa NO₂-N₂O₄ rất độc Vì: Khói vàng là dấu hiệu có NO₂-N₂O₄ – các khí độc có thể gây tử vong.","reference":"Mục 3.1"},{"id":131,"text":"Vì sao không nên rửa dạ dày cho bệnh súc ngộ độc xăng, dầu?","answers":["A. Nguy cơ cao gây tử vong","B. Dạ dày bị tổn thương","C. Dễ gây viêm phổi","D. Không hiệu quả"],"correct":2,"explanation":"Đáp án đúng là: Dễ gây viêm phổi Vì: vì xăng, dầu bay hơi và dễ gây viêm phổi khi tiếp xúc đường hô hấp.","reference":"Mục 2.1"},{"id":132,"text":"Chống chỉ định dùng than hoạt trong trường hợp nào?","answers":["A. Bệnh súc bị ngộ độc thực phẩm","B. Bệnh súc tiêu chảy","C. Bệnh súc sốt cao","D. Bệnh súc hôn mê hoặc co giật"],"correct":3,"explanation":"Đáp án đúng là: Bệnh súc hôn mê hoặc co giật Vì: Than hoạt chỉ an toàn khi đường hô hấp không bị ảnh hưởng.","reference":"Mục 2.1"},{"id":133,"text":"Tác dụng độc của Ergotamin khi dùng với thuốc co mạch ngoại vi là gì?","answers":["A. Hoại tử chi","B. Viêm ruột","C. Bại liệt","D. Suy thận"],"correct":0,"explanation":"Đáp án đúng là: Hoại tử chi Vì: Kết hợp ergotamin với thuốc co mạch gây hoại tử đầu chi.","reference":"Mục 2.3"},{"id":134,"text":"Chất nào dễ gây ngộ độc tối cấp?","answers":["A. Nitrit","B. Kali cyanit","C. Thức ăn mốc","D. Asen"],"correct":1,"explanation":"Đáp án đúng là: Kali cyanit Vì: có tác dụng gây ngộ độc cực kỳ nhanh và mạnh.","reference":"Mục 1.2"},{"id":135,"text":"Dịch chiết đinh hương có khả năng gì đối với Aspergillus flavus?","answers":["A. Làm tăng tốc độ sinh trưởng","B. Ức chế hoàn toàn","C. Làm tăng sinh độc tố","D. Không ảnh hưởng"],"correct":1,"explanation":"Đáp án đúng là: Ức chế hoàn toàn Vì: Đinh hương có hoạt tính kháng nấm mạnh với nồng độ thích hợp","reference":"Mục 3.1"},{"id":136,"text":"Biện pháp đầu tiên khi nhiễm độc Hg cấp tính là gì?","answers":["A. Rửa dạ dày","B. Uống lòng trắng trứng","C. Uống thuốc lợi tiểu","D. Truyền tĩnh mạch"],"correct":1,"explanation":"Đáp án đúng là: Uống lòng trắng trứng Vì: Uống lòng trắng trứng, sữa, hoặc than hoạt tính để làm giảm hấp thu thủy ngân.","reference":"Mục 2.1.8"},{"id":137,"text":"Mức độ NO₂ nào an toàn cho người khi tiếp xúc lâu dài?","answers":["A. 10 ppm","B. 5 ppm","C. 0,6 ppm","D. 2 ppm"],"correct":2,"explanation":"Đáp án đúng là: 0,6 ppm Vì: Mức an toàn theo khuyến cáo là 0,6 ppm để tránh tác dụng độc kéo dài.","reference":"Mục 3.1"},{"id":138,"text":"Biểu hiện ngộ độc thioglucosid ở bò là gì?","answers":["A. Viêm phổi","B. Nước tiểu màu nâu do dung huyết","C. Tiêu chảy cấp","D. Co giật"],"correct":1,"explanation":"Đáp án đúng là: Nước tiểu màu nâu do dung huyết Vì: Dung huyết do phân huỷ acid amin có lưu huỳnh trong dạ cỏ.","reference":"Mục 1.1.2"},{"id":139,"text":"Ngộ độc cá nóc thường gây tử vong do:","answers":["A. Suy thận cấp","B. Vỡ hồng cầu","C. Hủy hoại gan","D. Liệt hô hấp"],"correct":3,"explanation":"Đáp án đúng là: Liệt hô hấp Vì: Tetrodotoxin gây liệt cơ hô hấp, dẫn đến tử vong nhanh chóng.","reference":"Mục 2.2.1"},{"id":140,"text":"Nguyên nhân nào sau đây có thể làm giảm độc tính của chất độc?","answers":["A. Giảm độ ẩm","B. Tăng áp suất khí quyển","C. Sự liên kết với protein","D. Thay đổi nhiệt độ"],"correct":2,"explanation":"Đáp án đúng là: Sự liên kết với protein Vì: Sự liên kết với protein làm giảm sự hấp thu qua màng tế bào, giảm độc tính.","reference":"Mục 4.1"},{"id":141,"text":"Ngộ độc mãn tính chì ảnh hưởng gì đến hệ sinh sản?","answers":["A. Vô sinh ngay lập tức","B. Teo cơ quan sinh sản","C. Không ảnh hưởng","D. Tăng khả năng sinh sản"],"correct":1,"explanation":"Đáp án đúng là: Teo cơ quan sinh sản Vì: Ngộ độc mãn tính gây teo cơ quan sinh sản ở động vật và người.","reference":"Mục 2.1.4"},{"id":142,"text":"Vì sao hợp chất phospho hữu cơ ít tồn dư hơn hợp chất chlor hữu cơ?","answers":["A. Có cấu trúc bền vững hơn","B. Bị phân hủy nhanh trong môi trường","C. Tan trong mỡ nhiều hơn","D. Không phản ứng với nước"],"correct":1,"explanation":"Đáp án đúng là: Bị phân hủy nhanh trong môi trường Vì: phospho hữu cơ dễ phân hủy, không bền vững trong môi trường.","reference":"Mục 2.1.3"},{"id":143,"text":"Cơ chế gây độc chính của hợp chất carbamat là gì?","answers":["A. Ức chế cholinesterase","B. Tăng tổng hợp dopamine","C. Ức chế hệ miễn dịch","D. Tăng dẫn truyền serotonin"],"correct":0,"explanation":"Đáp án đúng là: Ức chế cholinesterase Vì: Carbamat ức chế cholinesterase, gây tích lũy acetylcholine tại synapse, gây triệu chứng ngộ độc giống phospho hữu cơ.","reference":"Mục 2.2.3"},{"id":144,"text":"Loại ngộ độc nào biểu hiện trong vòng dưới 24 giờ?","answers":["A. Ngộ độc tiềm ẩn","B. Ngộ độc cấp tính","C. Ngộ độc bán cấp","D. Ngộ độc mãn tính"],"correct":1,"explanation":"Đáp án đúng là: Ngộ độc cấp tính Vì: Ngộ độc cấp tính có biểu hiện rất sớm, thường dưới 24 giờ.","reference":"Mục 2.1.5"},{"id":145,"text":"Chất nào sau đây là một kháng sinh có tác dụng chống nấm mốc và được dùng trong thực phẩm?","answers":["A. Chloramphenicol","B. Streptomycin","C. Ampicillin","D. Natamycin"],"correct":3,"explanation":"Đáp án đúng là: Natamycin Vì: Natamycin là kháng sinh diệt nấm, được cho phép dùng trong bảo quản thực phẩm","reference":"Mục 3.1"},{"id":146,"text":"Khi dùng acid acetic đậm đặc lên da, hiện tượng nào xảy ra?","answers":["A. Hạ đường huyết","B. Hoại tử bề mặt","C. Tổn thương gan","D. Co giật"],"correct":1,"explanation":"Đáp án đúng là: Hoại tử bề mặt Vì: Acid acetic đậm đặc chỉ gây hoại tử bề mặt nơi tiếp xúc.","reference":"Mục 2.2"},{"id":147,"text":"Triệu chứng điển hình khi bị ong đốt là gì?","answers":["A. Co giật toàn thân","B. Tăng tiết mồ hôi nhiều","C. Đau, sưng, có thể shock","D. Suy hô hấp ngay tức thì"],"correct":2,"explanation":"Đáp án đúng là: Đau, sưng, có thể shock Vì: Vết đốt đau rát, sưng, vật mẫn cảm có thể bị shock phản vệ.","reference":"Mục 2.1.5"},{"id":148,"text":"Biện pháp điều trị khi ngộ độc thuốc do gan, thận suy yếu là gì?","answers":["A. Tăng cường hoạt động chuyển hóa, thải trừ của gan và thận","B. Ngưng ăn 1-2 ngày","C. Cho uống nhiều nước","D. Bổ sung vi sinh vật có lợi"],"correct":0,"explanation":"Đáp án đúng là: Tăng cường hoạt động chuyển hóa, thải trừ của gan và thận Vì: Tăng cường chức năng gan thận giúp đào thải chất độc.","reference":"Mục 1.2"},{"id":149,"text":"Độc tính của chất độc thay đổi khi xâm nhập qua các đường khác nhau vì sao?","answers":["A. Nồng độ trong không khí thay đổi","B. Môi trường bên ngoài khác nhau","C. Tính chất hấp thu và chuyển hóa khác nhau","D. Liều lượng sử dụng khác nhau"],"correct":2,"explanation":"Đáp án đúng là: Tính chất hấp thu và chuyển hóa khác nhau Vì: Đường xâm nhập ảnh hưởng đến hấp thu và chuyển hóa nên độc tính thay đổi.","reference":"Mục 2.3.1"},{"id":150,"text":"Mục tiêu chính của chẩn đoán bệnh căn là gì?","answers":["A. Phân tích các mẫu bệnh phẩm","B. Đánh giá tổn thương mô","C. Tìm triệu chứng lâm sàng","D. Xác định nguyên nhân gây độc"],"correct":3,"explanation":"Đáp án đúng là: Xác định nguyên nhân gây độc Vì: Chẩn đoán bệnh căn nhằm tìm nguyên nhân cụ thể để tiến hành các biện pháp điều trị và phòng ngừa.","reference":"Mục 1.2"},{"id":151,"text":"Biểu hiện nguy hiểm nhất khi bị kiến độc cắn là gì?","answers":["A. Suy gan","B. Viêm phổi cấp","C. Shock phản vệ và tử vong","D. Tiêu chảy cấp"],"correct":2,"explanation":"Đáp án đúng là: Shock phản vệ và tử vong Vì: Shock phản vệ là phản ứng miễn dịch quá mẫn nguy hiểm đến tính mạng.","reference":"Mục 2.1.6"},{"id":152,"text":"Chì ảnh hưởng lớn nhất đến hệ cơ quan nào trong ngộ độc?","answers":["A. Hô hấp","B. Tim mạch","C. Hệ bài tiết","D. Thần kinh và tiêu hóa"],"correct":3,"explanation":"Đáp án đúng là: Thần kinh và tiêu hóa Vì: Chì gây rối loạn trao đổi chất điện giải, ảnh hưởng hệ thần kinh và tiêu hóa.","reference":"Mục 2.1.4"},{"id":153,"text":"Khi dùng miconazole tiêm tĩnh mạch, biến chứng nào có thể gặp?","answers":["A. Bại liệt","B. Chảy máu dạ dày","C. Tăng men gan","D. Loạn nhịp tim"],"correct":3,"explanation":"Đáp án đúng là: Loạn nhịp tim Vì: Miconazole tiêm TM gây loạn nhịp tim do tác dụng trên cơ tim.","reference":"Mục 2.1"},{"id":154,"text":"Cách bảo quản mẫu xét nghiệm chất độc đúng là gì?","answers":["A. Bọc kín không khí","B. Để trong môi trường axit","C. Giữ ở nhiệt độ phòng","D. Bảo quản lạnh"],"correct":3,"explanation":"Đáp án đúng là: Bảo quản lạnh Vì: giúp duy trì tình trạng mẫu tốt nhất cho xét nghiệm.","reference":"Mục 1.3"},{"id":155,"text":"Một ví dụ về chất ưa điện tử là?","answers":["A. Nucleophile","B. Redox-active reactant","C. Free radical","D. Electrophile"],"correct":3,"explanation":"Đáp án đúng là: Electrophile Vì: Electrophile là các phân tử chứa nguyên tử thiếu electron, dễ phản ứng với các phân tử giàu electron.","reference":"Mục 3.1"},{"id":156,"text":"Độc tố mytilotoxin có trong loài nào sau đây?","answers":["A. Mực biển","B. Hào Mytilus oedulis","C. Trai sông","D. Sò huyết"],"correct":1,"explanation":"Đáp án đúng là: Hào Mytilus oedulis Vì: Hào Mytilus oedulis chứa độc tố mytilotoxin gây liệt hô hấp.","reference":"Mục 2.2.2"},{"id":157,"text":"Biểu hiện đặc trưng của lợn khi nhiễm trichothecene là?","answers":["A. Rụng lông","B. Viêm da mủ","C. Không chịu ăn và nôn","D. Vàng da"],"correct":2,"explanation":"Đáp án đúng là: Không chịu ăn và nôn Vì: Trichothecene gây chán ăn và nôn ở lợn, dẫn đến chậm lớn.","reference":"Mục 2.3"},{"id":158,"text":"Mẫu bệnh phẩm nào cần thiết để kiểm tra độc tố tích lũy mãn tính?","answers":["A. Dạ dày","B. Máu","C. Gan","D. Phân"],"correct":2,"explanation":"Đáp án đúng là: Gan Vì: là cơ quan chính tham gia chuyển hóa và bài tiết chất độc mãn tính.","reference":"Mục 1.3"},{"id":159,"text":"Alkaloid tồn tại trong thực vật ở những dạng nào?","answers":["A. Không tồn tại trong thực vật","B. Chỉ tồn tại dưới dạng tự do","C. Chỉ tồn tại dưới dạng glycosid","D. Alkaloid thực, giả, tiền Alkaloid"],"correct":3,"explanation":"Đáp án đúng là: Alkaloid thực, giả, tiền Alkaloid Vì: Có thể tồn tại dưới 3 dạng: thật, giả, tiền Alkaloid.","reference":"Mục 1.1.1"},{"id":160,"text":"Nguyên tắc chính khi bảo quản mẫu bệnh phẩm là gì?","answers":["A. Phơi khô mẫu","B. Làm lạnh và giữ sạch mẫu","C. Đóng gói kín và gửi nhanh","D. Giữ trong dung dịch sát khuẩn"],"correct":1,"explanation":"Đáp án đúng là: Làm lạnh và giữ sạch mẫu Vì: Làm lạnh giúp ngăn mẫu bị phân hủy hoặc nhiễm khuẩn, giữ được tính chính xác khi xét nghiệm.","reference":"Mục 1.3"},{"id":161,"text":"Tại sao chất độc tan trong nước dễ gây tác dụng mạnh hơn chất độc tan trong dầu?","answers":["A. Không bị hấp thu","B. Không bị chuyển hóa","C. Tan nhanh hơn trong dịch cơ thể","D. Không tích lũy"],"correct":2,"explanation":"Đáp án đúng là: Tan nhanh hơn trong dịch cơ thể Vì: Chất độc tan trong nước dễ dàng được hấp thu và chuyển hóa hơn.","reference":"Mục 4.1"},{"id":162,"text":"Tạp chất trong thuốc có thể gây tác dụng phụ do?","answers":["A. Bảo quản lạnh","B. Pha loãng sai cách","C. Đóng gói không kỹ","D. Quá trình sản xuất không loại bỏ hết phản ứng phụ"],"correct":3,"explanation":"Đáp án đúng là: Quá trình sản xuất không loại bỏ hết phản ứng phụ Vì: Tạp chất phát sinh từ nguyên liệu hoặc quá trình bào chế.","reference":"Mục 1.4"},{"id":163,"text":"Tác dụng của acid nitric tại chỗ là gì?","answers":["A. Gây đông máu","B. Làm tổ chức nhuộm vàng","C. Tăng huyết áp","D. Gây mề đay"],"correct":1,"explanation":"Đáp án đúng là: Làm tổ chức nhuộm vàng Vì: Acid nitric làm mô nhuộm vàng tại nơi tiếp xúc. Tham khảo: Bài 9 Mục 2.2","reference":""},{"id":164,"text":"Acid nào có khả năng ức chế hoàn toàn sản sinh độc tố Aflatoxin ở pH = 5?","answers":["A. Acid sorbic","B. Acid oxalic","C. Acid benzoic","D. Acid acetic"],"correct":0,"explanation":"Đáp án đúng là: Acid sorbic Vì: Acid sorbic ở pH 5 là môi trường lý tưởng để ức chế Aflatoxin","reference":"Mục 3.1"},{"id":165,"text":"Ngộ độc muối ăn thường gặp nhất ở loài nào?","answers":["A. Lợn","B. Loài nhai lại","C. Gia cầm","D. Trâu, bò"],"correct":2,"explanation":"Đáp án đúng là: Gia cầm Vì: Gia cầm dễ bị ngộ độc muối ăn hơn các loài khác, đặc biệt khi không đủ nước uống.","reference":"Mục 2.2.3"},{"id":166,"text":"Chloramphenicol tồn dư có thể gây gì cho người?","answers":["A. Rối loạn hệ vi sinh vật","B. Tăng huyết áp","C. Viêm gan cấp","D. Loãng xương"],"correct":0,"explanation":"Đáp án đúng là: Rối loạn hệ vi sinh vật Vì: Chloramphenicol tồn dư rối loạn hệ vi sinh vật, gây dị ứng.","reference":"Mục 2.1"},{"id":167,"text":"Cây dương xỉ gây thiếu hụt vitamin nào?","answers":["A. Vitamin B₁","B. Vitamin D","C. Vitamin C","D. Vitamin A"],"correct":0,"explanation":"Đáp án đúng là: Vitamin B₁ Vì: Dương xỉ ức chế hấp thu hoặc phá hủy vitamin B₁.","reference":"Mục 1.2.2"},{"id":168,"text":"Triệu chứng nào không xuất hiện trong ngộ độc muối ăn mãn tính?","answers":["A. Co giật","B. Khát nước","C. Tăng cân","D. Chán ăn"],"correct":2,"explanation":"Đáp án đúng là: Tăng cân Vì: Ngộ độc muối ăn mãn tính không làm tăng cân mà gây sụt cân và các triệu chứng thần kinh.","reference":"Mục 2.2.3"},{"id":169,"text":"Chất nào sau đây được giải phóng khi tế bào mastocyte bị hoạt hóa?","answers":["A. Histamin","B. Melanin","C. Trypsin","D. Pepsin"],"correct":0,"explanation":"Đáp án đúng là: Histamin Vì: Histamin gây co thắt, mẩn ngứa và các biểu hiện dị ứng.","reference":"Mục 1.3.2"},{"id":170,"text":"Độc tố chính trong cỏ lúa miến Sorghum spp. là gì?","answers":["A. Hypericin","B. Digitalis","C. Dhurrin (cyanogenetic glucosid)","D. Ricin"],"correct":2,"explanation":"Đáp án đúng là: Dhurrin (cyanogenetic glucosid) Vì: Dhurrin thủy phân tạo acid cyanhydric rất độc.","reference":"Mục 1.2.3"},{"id":171,"text":"Phản ứng nào được coi là nghiêm trọng nhất trong dị ứng thuốc?","answers":["A. Viêm mũi dị ứng","B. Sốc phản vệ","C. Mày đay","D. Phù"],"correct":1,"explanation":"Đáp án đúng là: Sốc phản vệ Vì: Sốc phản vệ có thể gây tử vong nếu không xử lý nhanh.","reference":"Mục 1.3.3"},{"id":172,"text":"Chất nào sau đây có khả năng hấp phụ Aflatoxin M1 trong sữa?","answers":["A. Than hoạt","B. Bentonit","C. Cát mịn","D. Kaolin"],"correct":1,"explanation":"Đáp án đúng là: Bentonit Vì: Bentonit có khả năng hấp phụ mạnh các phân tử độc tố trong sữa","reference":"Mục 3.2"},{"id":173,"text":"Loài nhuyễn thể chứa độc tố hướng đường tiêu hoá là?","answers":["A. Sò lông","B. Mực nang","C. Ốc biển","D. Hào Mytilocondestin"],"correct":3,"explanation":"Đáp án đúng là: Hào Mytilocondestin Vì: Gây xuất huyết, viêm niêm mạc tiêu hóa, tiêu chảy nặng.","reference":"Mục 2.2.2"},{"id":174,"text":"Dấu hiệu đầu tiên khi vật nuôi bị ngộ độc phospho hữu cơ là gì?","answers":["A. Tăng ăn, ngủ sâu","B. Bồn chồn, chảy nước dãi, đau bụng","C. Rối loạn đông máu","D. Mất phản xạ ánh sáng"],"correct":1,"explanation":"Đáp án đúng là: Bồn chồn, chảy nước dãi, đau bụng Vì: theo mô tả triệu chứng ban đầu trong phần chẩn đoán lâm sàng.","reference":"Mục 2.1.6"},{"id":175,"text":"Dấu hiệu đầu tiên của mày đay do thuốc thường là gì?","answers":["A. Sốt","B. Ho","C. Ngứa và nóng tại vùng da","D. Chảy nước mắt"],"correct":2,"explanation":"Đáp án đúng là: Ngứa và nóng tại vùng da Vì: Mày đay bắt đầu bằng ngứa, nóng, nổi ban.","reference":"Mục 1.3.3"},{"id":176,"text":"Tại sao không nên dùng thuốc pyrazolon lâu dài?","answers":["A. Tăng nhịp tim","B. Tăng hấp thu đường","C. Gây tích nước","D. Gây giảm bạch cầu"],"correct":3,"explanation":"Đáp án đúng là: Gây giảm bạch cầu Vì: Pyrazolon gây giảm bạch cầu, nguy hiểm khi dùng kéo dài.","reference":"Mục 2.3"},{"id":177,"text":"Formol bị cấm trong bảo quản thực phẩm do đâu?","answers":["A. Gây đột biến, đông vón protein","B. Gây béo phì","C. Làm tăng cholesterol","D. Gây táo bón"],"correct":0,"explanation":"Đáp án đúng là: Gây đột biến, đông vón protein Vì: Formol gây đột biến, đông vón protein, nguy hiểm cho sức khỏe.","reference":"Mục 2.2"},{"id":178,"text":"Sự phân bố chất độc trong cơ thể có thể ảnh hưởng đến?","answers":["A. Không ảnh hưởng đến độc tính","B. Giảm độc tính","C. Tích lũy và gây độc lâu dài","D. Thải trừ nhanh chóng"],"correct":2,"explanation":"Đáp án đúng là: Tích lũy và gây độc lâu dài Vì: Phân bố ảnh hưởng đến tích lũy và mức độ gây độc của chất độc.","reference":"Mục 2.3.1"},{"id":179,"text":"Phản ứng Fenton xảy ra giữa H 2 O 2 và ion kim loại nào?","answers":["A. Mg 2+","B. Fe 2+","C. Ca 2+","D. Na +"],"correct":1,"explanation":"Đáp án đúng là: Fe 2+ Vì: Phản ứng Fenton liên quan đến H 2 O 2 và Fe 2+ , tạo ra gốc hydroxyl có khả năng gây tổn thương cao.","reference":"Mục 3.2"},{"id":180,"text":"Tác dụng tiềm ẩn của chất độc là gì?","answers":["A. Tác dụng ngay khi tiếp xúc","B. Phản ứng xảy ra sau thời gian dài, không biểu hiện ngay","C. Gây ngộ độc cấp","D. Không có tác dụng gì"],"correct":1,"explanation":"Đáp án đúng là: Phản ứng xảy ra sau thời gian dài, không biểu hiện ngay Vì: Tác dụng tiềm ẩn là tác động xảy ra sau nhiều ngày hoặc năm, không biểu hiện ngay.","reference":"Mục 2.1.5"},{"id":181,"text":"Dị ứng thuốc thường gặp nhất với nhóm thuốc nào sau đây?","answers":["A. Thuốc xổ giun","B. Kháng sinh nhóm β-lactam","C. Thuốc giảm đau thông thường","D. Thuốc bổ sung khoáng"],"correct":1,"explanation":"Đáp án đúng là: Kháng sinh nhóm β-lactam Vì: Nhóm β-lactam thường gây phản ứng dị ứng mạnh.","reference":"Mục 1.3"},{"id":182,"text":"Sản phẩm cuối cùng của quá trình peroxid hóa lipid là gì?","answers":["A. Peroxidase","B. H2O2","C. Aldehyde","D. Carbon dioxide"],"correct":2,"explanation":"Đáp án đúng là: Aldehyde Vì: Aldehyde là sản phẩm cuối cùng của quá trình phân hủy các lipid bị oxy hóa, có độc tính cao đối với tế bào.","reference":"Mục 3.2"},{"id":183,"text":"Triệu chứng nào gặp khi uống acid mạnh đậm đặc?","answers":["A. Suy hô hấp","B. Viêm phúc mạc, xuất huyết","C. Tiêu chảy","D. Nổi mề đay"],"correct":1,"explanation":"Đáp án đúng là: Viêm phúc mạc, xuất huyết Vì: Acid phá huỷ niêm mạc tiêu hóa → kế phát viêm phúc mạc.","reference":"Mục 2.2"},{"id":184,"text":"Triệu chứng đặc trưng của ngộ độc nitrat và nitrit?","answers":["A. Co giật","B. Máu màu đen chocolate","C. Sốt cao","D. Tiêu chảy"],"correct":1,"explanation":"Đáp án đúng là: Máu màu đen chocolate Vì: Ngộ độc nitrat/nitrit khiến máu chuyển màu đen chocolate do hemoglobin bị biến đổi thành methemoglobin. Tham khảo: Bài 6 Mục 2.2.2","reference":""},{"id":185,"text":"Độc chất học thú y nghiên cứu về gì?","answers":["A. Nghiên cứu dinh dưỡng cho thú vật","B. Chỉ nghiên cứu các chất vô cơ","C. Các chất độc và tác động của chúng lên cơ thể động vật","D. Các loại thuốc thú y không có độc"],"correct":2,"explanation":"Đáp án đúng là: Các chất độc và tác động của chúng lên cơ thể động vật Vì: Độc chất học thú y chuyên nghiên cứu về các chất độc và tác động của chúng đối với cơ thể động vật.","reference":"Mục 1"},{"id":186,"text":"Một trong các hậu quả nguy hiểm nhất của tồn dư chloramphenicol là gì?","answers":["A. Mẩn ngứa","B. Suy tủy","C. Tăng men gan","D. Tiêu chảy"],"correct":1,"explanation":"Đáp án đúng là: Suy tủy Vì: Chloramphenicol gây suy tủy, quái thai là tác hại nặng nề.","reference":"Mục 2.1"},{"id":187,"text":"Khi ngộ độc khí Clo, cần xử lý như thế nào?","answers":["A. Dùng than hoạt để lọc khí","B. Cho con vật vào nơi kín gió","C. Tiêm thuốc giải độc","D. Đặt con vật ở nơi thoáng mát và thoáng khí"],"correct":3,"explanation":"Đáp án đúng là: Đặt con vật ở nơi thoáng mát và thoáng khí Vì: Khí Clo gây kích ứng mạnh, cần môi trường thoáng để giảm hấp thu qua đường hô hấp.","reference":"Mục 2.3"},{"id":188,"text":"Chất nào sau đây là alkaloid có trong cây mã tiền và có thể dùng làm thuốc diệt chuột?","answers":["A. Strychnine","B. Nicotine","C. Scopolamine","D. Atropine"],"correct":0,"explanation":"Đáp án đúng là: Strychnine Vì: Strychnine là alkaloid có trong cây mã tiền, gây độc mạnh do kích thích quá mức thần kinh trung ương.","reference":"Mục 3.2.2"},{"id":189,"text":"Trong chuyển hóa chất độc, sản phẩm chuyển hóa có thể?","answers":["A. Độc hơn chất gốc","B. Không độc","C. Luôn ít độc hơn","D. Luôn không thay đổi độc tính"],"correct":0,"explanation":"Đáp án đúng là: Độc hơn chất gốc Vì: Một số sản phẩm chuyển hóa có thể độc hơn chất mẹ ban đầu.","reference":"Mục 2.3.1"},{"id":190,"text":"Độc chất học mô tả nghiên cứu gì?","answers":["A. Tính toán nồng độ thuốc","B. Đánh giá nguy cơ phơi nhiễm với chất độc qua xét nghiệm độc tính","C. Phương pháp điều trị ngộ độc","D. Cách tổng hợp chất độc"],"correct":1,"explanation":"Đáp án đúng là: Đánh giá nguy cơ phơi nhiễm với chất độc qua xét nghiệm độc tính Vì: Độc chất học mô tả tập trung đánh giá nguy cơ dựa trên kết quả xét nghiệm độc tính.","reference":"Mục 1"},{"id":191,"text":"Vai trò chính của enzym catalase trong tế bào là gì?","answers":["A. Phân hủy H2O2","B. Oxy hóa gốc tự do","C. Bảo vệ protein khỏi tổn thương","D. Kích thích quá trình peroxid hóa lipid"],"correct":0,"explanation":"Đáp án đúng là: Phân hủy H2O2 Vì: Catalase phân hủy H2O2 thành nước và oxy, bảo vệ tế bào khỏi tác hại của peroxid.","reference":"Mục 3.2"},{"id":192,"text":"Triệu chứng đặc trưng khi bị nhện độc cắn là gì?","answers":["A. Tăng huyết áp","B. Ngứa ngáy nhẹ","C. Phát ban toàn thân","D. Sốt, buồn nôn, suy nhược, xuất huyết"],"correct":3,"explanation":"Đáp án đúng là: Sốt, buồn nôn, suy nhược, xuất huyết Vì: Vết cắn gây suy nhược, buồn nôn và xuất huyết do độc tố gây tổn thương nội mô mạch.","reference":"Mục 2.1.4"},{"id":193,"text":"Kẽm tham gia vào loại enzym nào?","answers":["A. Enzym tiêu hóa","B. Enzym oxi hóa","C. Enzym vận chuyển","D. Enzym bảo vệ"],"correct":0,"explanation":"Đáp án đúng là: Enzym tiêu hóa Vì: Kẽm có mặt trong nhiều enzym tiêu hóa và liên kết với hormone.","reference":"Mục 2.1.6"},{"id":194,"text":"Chỉ số LD50 của chất có độc lực rất cao là?","answers":["A. > 1000 mg/kg","B. ≤ 50 mg/kg","C. 200 – 1000 mg/kg","D. 50 – 200 mg/kg"],"correct":1,"explanation":"Đáp án đúng là: ≤ 50 mg/kg Vì: theo phân loại, chất có LD50 ≤ 50 mg/kg được xếp vào nhóm độc lực rất cao.","reference":"Mục 1.3"},{"id":195,"text":"Khi điều trị triệu chứng co giật ở súc vật, thuốc nào thường được sử dụng?","answers":["A. Atropin","B. Xanh methylen","C. Naloxon","D. Diazepam"],"correct":3,"explanation":"Đáp án đúng là: Diazepam Vì: Diazepam giảm co giật hiệu quả và an toàn khi tiêm tĩnh mạch.","reference":"Mục 2.3"},{"id":196,"text":"Cơ quan nào tích lũy Hg nhiều nhất?","answers":["A. Thận","B. Não","C. Phổi","D. Gan"],"correct":0,"explanation":"Đáp án đúng là: Thận Vì: Thận là nơi giữ thủy ngân nhiều và lâu nhất, chiếm tới 50-90% lượng Hg trong cơ thể.","reference":"Mục 2.1.8"},{"id":197,"text":"Nguyên nhân phổ biến nhất gây ngộ độc cho gia súc?","answers":["A. Thiếu nước sạch","B. Thức ăn ôi thiu","C. Không đủ ánh sáng","D. Cây cỏ độc"],"correct":3,"explanation":"Đáp án đúng là: Cây cỏ độc Vì: Đáp án A thường gặp trong chăn thả gia súc ngoài tự nhiên.","reference":"Mục 1.2"},{"id":198,"text":"Một chất có thể không độc với loài này nhưng độc với loài khác do gì?","answers":["A. Do liều lượng sử dụng","B. Khác biệt sinh học giữa các loài","C. Do thời gian tiếp xúc","D. Do nhiệt độ môi trường"],"correct":1,"explanation":"Đáp án đúng là: Khác biệt sinh học giữa các loài Vì: Độc tính phụ thuộc vào sinh học của từng loài nên có thể khác nhau.","reference":"Mục 2.1.2"},{"id":199,"text":"Một trong các nguyên nhân gây ngộ độc chất độc vô cơ là gì?","answers":["A. Thức ăn giàu dinh dưỡng","B. Sử dụng nông sản sạch","C. Dùng hộp kim loại bảo quản thực phẩm","D. Phân bón hữu cơ"],"correct":2,"explanation":"Đáp án đúng là: Dùng hộp kim loại bảo quản thực phẩm Vì: Hộp kim loại chứa chì hoặc thiếc trong bảo quản thực phẩm có thể gây nhiễm độc.","reference":"Mục 1.1"},{"id":200,"text":"Tác dụng của chất nhạy cảm quang học?","answers":["A. Gây độc gan","B. Gây khó tiêu","C. Gây viêm da dưới ánh sáng","D. Gây co giật"],"correct":2,"explanation":"Đáp án đúng là: Gây viêm da dưới ánh sáng Vì: Dưới ánh sáng mặt trời, gây viêm da ở vùng da không có sắc tố.","reference":"Mục 1.1.6"},{"id":201,"text":"Chất nào sau đây không phải là sản phẩm của quá trình peroxid hóa lipid?","answers":["A. Aldehyde","B. Malondialdehyde","C. Glutathione","D. Hydroperoxide"],"correct":2,"explanation":"Đáp án đúng là: Glutathione Vì: Glutathione là chất chống oxy hóa, không phải sản phẩm của quá trình peroxid hóa lipid.","reference":"Mục 3.2"},{"id":202,"text":"Chất nào bị cấm sử dụng trong điều trị ngộ độc carbamat vì làm tăng độc tính?","answers":["A. PAM","B. Atropin","C. Sulfat magie","D. Than hoạt tính"],"correct":0,"explanation":"Đáp án đúng là: PAM Vì: PAM (chất hồi phục men ChE) bị cấm vì làm tăng độc lực của carbamat, ngược lại với điều trị phospho hữu cơ.","reference":"Mục 2.2.6"},{"id":203,"text":"Đặc điểm nguy hiểm nhất của khí NO₂ là gì?","answers":["A. Có thể gây phù phổi và tử vong","B. Không có mùi","C. Là khí nhẹ hơn không khí","D. Không tan trong nước"],"correct":0,"explanation":"Đáp án đúng là: Có thể gây phù phổi và tử vong Vì: NO₂ gây phù phổi nghiêm trọng và có thể dẫn đến tử vong nếu tiếp xúc ở nồng độ cao.","reference":"Mục 3.1"},{"id":204,"text":"Chỉ số LD50 biểu thị điều gì?","answers":["A. Thời gian phân hủy của chất độc","B. Mức độ tồn lưu của chất độc","C. Độc lực của chất độc","D. Nồng độ chất độc trong không khí"],"correct":2,"explanation":"Đáp án đúng là: Độc lực của chất độc Vì: LD50 là liều lượng gây chết 50% số động vật thử nghiệm, phản ánh độc lực của chất.","reference":"Mục 1.3"},{"id":205,"text":"Độc chất học có quan hệ gần gũi với môn học nào?","answers":["A. Sinh lý bệnh","B. Vật lý","C. Hóa học cơ bản","D. Toán học"],"correct":0,"explanation":"Đáp án đúng là: Sinh lý bệnh Vì: Độc chất học liên quan chặt chẽ đến sinh lý bệnh vì nghiên cứu sinh bệnh học do ngộ độc.","reference":"Mục 1"},{"id":206,"text":"Loại carbamat nào có độc lực cao hơn carbaril nhiều lần?","answers":["A. Carbaril","B. Alkylsevin","C. Carbofuran","D. Pyrolan chứa dimetyl carbamat"],"correct":3,"explanation":"Đáp án đúng là: Pyrolan chứa dimetyl carbamat Vì: Pyrolan có độc tính cao, liều thấp cũng gây chết nhanh ở bê trong vòng 20 phút.","reference":"Mục 2.2.4"},{"id":207,"text":"Chất độc xâm nhập qua màng sinh học chủ yếu bằng cách nào?","answers":["A. Phân giải enzym","B. Đào thải nhanh","C. Vận chuyển chủ động","D. Khuếch tán thụ động"],"correct":3,"explanation":"Đáp án đúng là: Khuếch tán thụ động Vì: Khuếch tán thụ động chiếm ưu thế trong xâm nhập màng sinh học.","reference":"Mục 2"},{"id":208,"text":"Trong cơ chế dị ứng, giai đoạn nào sản sinh IgE?","answers":["A. Giai đoạn 1","B. Giai đoạn 3","C. Giai đoạn phục hồi","D. Giai đoạn 2"],"correct":0,"explanation":"Đáp án đúng là: Giai đoạn 1 Vì: Giai đoạn đầu tiên là giai đoạn mẫn cảm, sản sinh IgE.","reference":"Mục 1.3.2"},{"id":209,"text":"Loài bò sát nào sau đây có nọc độc?","answers":["A. Rùa cạn","B. Heloderma suspectum","C. Kỳ đà","D. Thằn lằn thường"],"correct":1,"explanation":"Đáp án đúng là: Heloderma suspectum Vì: Heloderma s
