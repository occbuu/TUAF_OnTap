uspectum (Gila monster) là loài bò sát chứa nọc độc hiếm gặp. Tham khảo: Bài 12 Mục 2.1.2","reference":""},{"id":210,"text":"Mức độ ppm nào của fluorid bắt đầu gây bệnh lý ở bò?","answers":["A. 5 ppm","B. 10 ppm","C. >25 ppm","D. >14 ppm"],"correct":3,"explanation":"Đáp án đúng là: >14 ppm Vì: Hàm lượng fluorid >14 ppm bắt đầu gây ra các biến đổi bệnh lý có hại ở bò.","reference":"Mục 2.2.1"},{"id":211,"text":"Thuốc nào sau đây từng bị loại khỏi danh mục thuốc do tác dụng phụ?","answers":["A. Glucoza","B. Chloramphenicol","C. Vitamin B1","D. Streptomycin"],"correct":1,"explanation":"Đáp án đúng là: Chloramphenicol Vì: Chloramphenicol có thể gây suy tủy xương.","reference":"Mục 1.4"},{"id":212,"text":"Hệ thống phòng vệ chính của tế bào chống lại tổn thương màng lipid là?","answers":["A. Lipid tự do","B. Glutathione","C. Gốc hydroxyl","D. Nucleophile"],"correct":1,"explanation":"Đáp án đúng là: Glutathione Vì: Glutathione (GSH) là hệ thống chống oxy hóa chủ yếu, loại bỏ các tác nhân oxy hóa và bảo vệ màng lipid.","reference":"Mục 3.2"},{"id":213,"text":"Triệu chứng chính khi ngộ độc fluorid mãn tính ở gia súc?","answers":["A. Tiêu chảy","B. Đau bụng","C. Sốt cao","D. Xương biến dạng"],"correct":3,"explanation":"Đáp án đúng là: Xương biến dạng Vì: Ngộ độc fluorid mãn tính dẫn đến biến dạng xương, răng và giảm khả năng sản xuất.","reference":"Mục 2.2.1"},{"id":214,"text":"Độc tố T2-toxin là sản phẩm của loài nấm nào sau đây?","answers":["A. Penicillium","B. Fusarium","C. Aspergillus","D. Pithomyces"],"correct":1,"explanation":"Đáp án đúng là: Fusarium Vì: Fusarium là loài nấm sản sinh ra T2-toxin.","reference":"Mục 1.1"},{"id":215,"text":"Biểu hiện khi bị kỳ nhông độc cắn là gì?","answers":["A. Sưng hạch toàn thân","B. Đau, phù, có thể shock và suy nhược TKTW","C. Sốt cao dai dẳng","D. Nôn ra máu"],"correct":1,"explanation":"Đáp án đúng là: Đau, phù, có thể shock và suy nhược TKTW Vì: Cắn gây đau phù, dẫn đến shock, nôn, và ảnh hưởng thần kinh trung ương.","reference":"Mục 2.1.2"},{"id":216,"text":"Độc tố zearalenone thường gây rối loạn gì ở lợn?","answers":["A. Tiêu hoá","B. Sinh sản","C. Hô hấp","D. Tuần hoàn"],"correct":1,"explanation":"Đáp án đúng là: Sinh sản Vì: Zearalenone gây viêm âm hộ, tử cung, biểu hiện rõ ở lợn nái.","reference":"Mục 2.3"},{"id":217,"text":"Đường xâm nhập chính của thuốc trừ sâu phospho hữu cơ vào cơ thể là?","answers":["A. Chỉ qua tiêu hóa","B. Qua da, tiêu hóa và hô hấp","C. Chỉ qua đường hô hấp","D. Qua tóc và móng tay"],"correct":1,"explanation":"Đáp án đúng là: Qua da, tiêu hóa và hô hấp Vì: phospho hữu cơ có thể xâm nhập tốt qua da, tiêu hóa và hô hấp – như tài liệu đã nêu.","reference":"Mục 2.1.2"},{"id":218,"text":"Tiên lượng tốt nhất cho gia súc bị ngộ độc thần kinh là gì?","answers":["A. Không có triệu chứng","B. Triệu chứng kích thích thần kinh","C. Liệt hoàn toàn","D. Triệu chứng hôn mê"],"correct":1,"explanation":"Đáp án đúng là: Triệu chứng kích thích thần kinh Vì: phản ánh khả năng hồi phục cao hơn so với các trạng thái nặng hơn.","reference":"Mục 1.2"},{"id":219,"text":"Quá trình nào là bước đầu tiên trong peroxid hóa lipid?","answers":["A. Kết tủa lipid","B. Tăng điện tích màng","C. Oxy hóa protein","D. Hình thành gốc lipid tự do"],"correct":3,"explanation":"Đáp án đúng là: Hình thành gốc lipid tự do Vì: Gốc lipid tự do được hình thành từ phản ứng với gốc hydroxyl, bắt đầu chuỗi phản ứng tự xúc tác.","reference":"Mục 3.2"},{"id":220,"text":"Phân loại hóa chất BVTV theo mục đích sử dụng bao gồm nhóm nào sau đây?","answers":["A. Phân kali, phân đạm, phân lân","B. Thuốc trừ sâu, trừ cỏ, trừ bệnh","C. Thuốc dưỡng cây, thuốc ngừa côn trùng, thuốc kích rễ","D. Phân bón lá, thuốc tăng đề kháng, thuốc bảo vệ lá"],"correct":1,"explanation":"Đáp án đúng là: Thuốc trừ sâu, trừ cỏ, trừ bệnh Vì: là ba nhóm phân loại chính được xác định theo mục đích sử dụng trong tài liệu.","reference":"Mục 1.1"},{"id":221,"text":"Yếu tố nào ở động vật non làm tăng mẫn cảm với chất độc?","answers":["A. Chức năng giải độc chưa hoàn thiện","B. Tăng khả năng bài tiết","C. Gan phát triển tốt","D. Khả năng hấp thu kém"],"correct":0,"explanation":"Đáp án đúng là: Chức năng giải độc chưa hoàn thiện Vì: Động vật non chưa phát triển hoàn thiện chức năng giải độc, nên dễ mẫn cảm với chất độc. Tham khảo: Bài 2 Mục 4.2","reference":""},{"id":222,"text":"Chẩn đoán bệnh căn có vai trò gì?","answers":["A. Phân tích chất chứa dạ dày","B. Xác định tổn thương mô","C. Kiểm tra dấu hiệu thần kinh","D. Xác định nguyên nhân gây độc"],"correct":3,"explanation":"Đáp án đúng là: Xác định nguyên nhân gây độc Vì: Giúp định hướng trị liệu và phòng chống cụ thể. Tham khảo: Bài 3 Mục 1.1","reference":""},{"id":223,"text":"Đặc điểm nào dưới đây đúng với nọc độc rắn biển Đại Tây Dương?","answers":["A. Chỉ gây phản ứng dị ứng","B. Nọc chủ yếu tác động đường tiêu hóa","C. Nọc không độc","D. LD50 rất thấp, nọc cực độc"],"correct":3,"explanation":"Đáp án đúng là: LD50 rất thấp, nọc cực độc Vì: Rắn biển Đại Tây Dương có LD50 chỉ 0,01 – thuộc hàng nọc cực độc, chỉ cần lượng nhỏ đã gây chết.","reference":"Mục 2.1.1"},{"id":224,"text":"Thuốc nào dùng để điều trị loạn nhịp tim do độc cóc gây ra?","answers":["A. Aspirin","B. Propranolol hoặc phenoxybenzamine","C. Ibuprofen","D. Morphin"],"correct":1,"explanation":"Đáp án đúng là: Propranolol hoặc phenoxybenzamine Vì: Đây là thuốc chẹn beta và alpha dùng để điều trị rối loạn nhịp tim do độc tố tim.","reference":"Mục 2.1.3"},{"id":225,"text":"Khi xử trí ngộ độc acid không được làm gì?","answers":["A. Tiêm Glucose","B. Cho uống nhiều nước","C. Gây nôn hoặc rửa dạ dày","D. Trung hoà bằng MgO"],"correct":2,"explanation":"Đáp án đúng là: Gây nôn hoặc rửa dạ dày Vì: Gây nôn làm acid trào ngược nguy hiểm → cấm gây nôn. Tham khảo: Bài 9 Mục 2.2","reference":""},{"id":226,"text":"Vai trò của hệ enzym MFOs trong chuyển hóa xenobiotic là gì?","answers":["A. Kích thích tạo gốc tự do","B. Loại bỏ độc tính hoàn toàn","C. Chuyển hóa thành dạng trung gian electrophile","D. Phân giải hoàn toàn xenobiotic"],"correct":2,"explanation":"Đáp án đúng là: Chuyển hóa thành dạng trung gian electrophile Vì: MFOs chuyển hóa các chất độc ưa mỡ thành dạng electrophile, chuẩn bị cho quá trình liên kết và bài tiết.","reference":"Mục 3.1"},{"id":227,"text":"Mimosin gây bướu cổ do cơ chế gì?","answers":["A. Ức chế tiêu hóa protein","B. Gây độc gan","C. Tổn thương thần kinh","D. Ức chế trao đổi thyrosine"],"correct":3,"explanation":"Đáp án đúng là: Ức chế trao đổi thyrosine Vì: Mimosin cạnh tranh với thyrosine, ức chế tổng hợp hormone tuyến giáp.","reference":"Mục 1.1.3"},{"id":228,"text":"Kiến nào sau đây có nọc độc gây nguy hiểm cho vật nuôi?","answers":["A. Kiến lông đỏ","B. Kiến thợ","C. Kiến vàng thường","D. Kiến lửa (Solenopsis xyloni)"],"correct":3,"explanation":"Đáp án đúng là: Kiến lửa (Solenopsis xyloni) Vì: Kiến lửa gây sưng, đau, dị ứng nặng nếu bị cắn nhiều.","reference":"Mục 2.1.6"},{"id":229,"text":"Methionin có vai trò gì trong điều trị ngộ độc thuốc?","answers":["A. Chất gây nôn","B. Chất kháng khuẩn","C. Acid amin không thay thế, hỗ trợ chức năng gan","D. Hormon kích thích"],"correct":2,"explanation":"Đáp án đúng là: Acid amin không thay thế, hỗ trợ chức năng gan Vì: Methionin giúp gan chuyển hóa và khử độc tốt hơn.","reference":"Mục 1.2"},{"id":230,"text":"Ketoconazole không nên dùng cho đối tượng nào?","answers":["A. Bò đực","B. Trâu","C. Lợn nái sau cai sữa","D. Vật đang có thai hoặc nuôi con bú"],"correct":3,"explanation":"Đáp án đúng là: Vật đang có thai hoặc nuôi con bú Vì: Ketoconazole ảnh hưởng sinh sản, độc gan, không dùng cho vật có thai.","reference":"Mục 2.1"},{"id":231,"text":"Đặc điểm nổi bật của hợp chất phospho hữu cơ là gì?","answers":["A. Cực kỳ bền vững, tồn lưu hàng chục năm","B. Tăng độc tính khi bị phân hủy trong môi trường","C. Không tích lũy lâu trong môi trường","D. Không có độc tính với người"],"correct":2,"explanation":"Đáp án đúng là: Không tích lũy lâu trong môi trường Vì: các hợp chất phospho hữu cơ bị phân hủy nhanh nên ít tồn lưu lâu trong môi trường.","reference":"Mục 2.1"},{"id":232,"text":"Độc tố ochratoxin có cơ quan tác động đích là?","answers":["A. Phổi","B. Thận","C. Gan","D. Tim"],"correct":1,"explanation":"Đáp án đúng là: Thận Vì: Ochratoxin tập trung gây tổn thương và viêm xơ hoá ống thận.","reference":"Mục 2.3"},{"id":233,"text":"Vì sao nên sử dụng pilocarpin để thải chất độc qua đường thận?","answers":["A. Tăng tiết mồ hôi","B. Kích thích thần kinh","C. Làm loãng chất độc","D. Ngăn chặn hấp thu chất độc"],"correct":0,"explanation":"Đáp án đúng là: Tăng tiết mồ hôi Vì: vì pilocarpin tăng tiết mồ hôi và hỗ trợ thải chất độc qua thận hiệu quả.","reference":"Mục 2.1"},{"id":234,"text":"Chất strychnin gây co giật mạnh có trong?","answers":["A. Cây cà độc dược","B. Cây mã tiền","C. Cây ô đầu","D. Cây thuốc lá"],"correct":1,"explanation":"Đáp án đúng là: Cây mã tiền Vì: Hạt cây mã tiền chứa strychnin – chất kích thích thần kinh trung ương.","reference":"Mục 1.1.1"},{"id":235,"text":"Chẩn đoán ngộ độc là gì?","answers":["A. Điều trị các triệu chứng","B. Đánh giá, phát hiện các dấu hiệu ngộ độc","C. Dự phòng bệnh","D. Loại trừ tất cả chất độc"],"correct":1,"explanation":"Đáp án đúng là: Đánh giá, phát hiện các dấu hiệu ngộ độc Vì: Chẩn đoán ngộ độc là bước quan trọng để phát hiện nguyên nhân và triệu chứng, nhằm xử lý hiệu quả.","reference":"Mục 1.1"},{"id":236,"text":"Chất độc dễ hấp thu qua màng sinh học thường có đặc điểm gì?","answers":["A. Không tan trong lipid","B. Ion hóa mạnh và ít tan trong lipid","C. Khối lượng phân tử lớn","D. Không ion hóa và có hệ số phân tán cao"],"correct":3,"explanation":"Đáp án đúng là: Không ion hóa và có hệ số phân tán cao Vì: Chất không ion hóa và ưa mỡ dễ khuếch tán qua màng hơn.","reference":"Mục 2.3.1"},{"id":237,"text":"Vi khuẩn nào có khả năng thoái biến Aflatoxin mạnh nhất?","answers":["A. Bacillus subtilis","B. Lactobacillus acidophilus","C. Flavobacterium aurantiacum","D. Escherichia coli"],"correct":2,"explanation":"Đáp án đúng là: Flavobacterium aurantiacum Vì: Flavobacterium aurantiacum có khả năng làm giảm mạnh độc lực Aflatoxin","reference":"Mục 3.2"},{"id":238,"text":"Triệu chứng tiêu hóa thường gặp trong ngộ độc digitalis?","answers":["A. Buồn nôn và nôn","B. Viêm da","C. Táo bón","D. Tăng cân"],"correct":0,"explanation":"Đáp án đúng là: Buồn nôn và nôn Vì: Glucosid tim thường gây rối loạn tiêu hóa như buồn nôn, nôn.","reference":"Mục 1.2.1"},{"id":239,"text":"Tetrodotoxin trong cá nóc có đặc điểm nào sau đây?","answers":["A. Không bị phân huỷ khi nấu chín","B. Bị enzym tiêu hóa phân huỷ","C. Bị mất hoạt tính khi sấy","D. Dễ bay hơi khi nấu"],"correct":0,"explanation":"Đáp án đúng là: Không bị phân huỷ khi nấu chín Vì: Tetrodotoxin bền với nhiệt, nấu chín không làm giảm độc.","reference":"Mục 2.2.1"},{"id":240,"text":"Nguyên nhân chính gây phơi nhiễm chì ở người?","answers":["A. Ăn thực phẩm sạch","B. Gần nguồn thải công nghiệp","C. Tập thể dục ngoài trời","D. Uống nước lọc"],"correct":1,"explanation":"Đáp án đúng là: Gần nguồn thải công nghiệp Vì: Người sống gần nguồn thải chì, giao thông và công nghiệp dễ phơi nhiễm.","reference":"Mục 2.1.4"},{"id":241,"text":"Độc lực được định nghĩa là gì?","answers":["A. Khả năng hấp thu chất độc","B. Mức độ thải trừ chất độc","C. Lượng chất độc gây tác động độc hại hoặc biến đổi sinh học","D. Tốc độ chuyển hóa chất độc"],"correct":2,"explanation":"Đáp án đúng là: Lượng chất độc gây tác động độc hại hoặc biến đổi sinh học Vì: Độc lực là lượng chất độc trong điều kiện nhất định gây ảnh hưởng độc hại.","reference":"Mục 2.1.3"},{"id":242,"text":"Chất kháng độc nào tạo phức chelat dễ tan trong nước?","answers":["A. EDTA","B. Xanh methylen","C. Atropin","D. Diazepam"],"correct":0,"explanation":"Đáp án đúng là: EDTA Vì: EDTA tạo phức với kim loại nặng, dễ thải qua nước tiểu.","reference":"Mục 2.2"},{"id":243,"text":"Sự khác biệt giữa thuốc và chất độc về tính chất phân bố là gì?","answers":["A. Thuốc không bị thải trừ, chất độc dễ thải trừ","B. Thuốc ít bị ion hóa hơn chất độc","C. Thuốc tan trong lipid, chất độc tan trong nước","D. Thuốc tan nhiều trong nước, chất độc tan nhiều trong lipid"],"correct":3,"explanation":"Đáp án đúng là: Thuốc tan nhiều trong nước, chất độc tan nhiều trong lipid Vì: Thuốc thường tan trong nước và dễ ion hóa, chất độc tan lipid và khó thải trừ.","reference":"Mục 2.3.1"},{"id":244,"text":"Cách sơ cứu hiệu quả nhất khi vật nuôi bị nhiễm phospho hữu cơ qua da là gì?","answers":["A. Bóp tim nhân tạo","B. Tắm bằng xà phòng hoặc dung dịch kiềm nhẹ như NaHCO₃ 5%","C. Cho uống nước lạnh","D. Cho uống nước đường"],"correct":1,"explanation":"Đáp án đúng là: Tắm bằng xà phòng hoặc dung dịch kiềm nhẹ như NaHCO₃ 5% Vì: rửa da bằng xà phòng và dung dịch kiềm giúp loại bỏ chất độc dính trên da, hạn chế hấp thu vào cơ thể.","reference":"Mục 2.1.7"},{"id":245,"text":"Tác dụng phụ đặc trưng của acid salicylic trên vật nuôi là gì?","answers":["A. Tăng đông máu","B. Giãn mạch, hoại tử gan","C. Co thắt phế quản","D. Rối loạn tim mạch"],"correct":1,"explanation":"Đáp án đúng là: Giãn mạch, hoại tử gan Vì: Acid salicylic liều cao gây giãn mạch, xuất huyết, tổn thương gan.","reference":"Mục 2.2"},{"id":246,"text":"Trong trường hợp nào không nên gây nôn cho súc vật bị ngộ độc?","answers":["A. Khi súc vật mới ăn phải chất độc","B. Khi súc vật bị tiêu chảy","C. Khi súc vật có biểu hiện sốt","D. Khi súc vật bị hôn mê"],"correct":3,"explanation":"Đáp án đúng là: Khi súc vật bị hôn mê Vì: Gây nôn khi súc vật hôn mê có thể gây nguy cơ ngạt thở.","reference":"Mục 2.1"},{"id":247,"text":"Đặc điểm ngộ độc cấp hợp chất chlor hữu cơ là gì?","answers":["A. Viêm phổi","B. Gây vàng da","C. Gây co giật kiểu động kinh","D. Giảm bạch cầu"],"correct":2,"explanation":"Đáp án đúng là: Gây co giật kiểu động kinh Vì: Các chất như lindan kích thích neuron trực tiếp gây co giật điển hình trong ngộ độc cấp.","reference":"Mục 2.3.5"},{"id":248,"text":"Biện pháp nào không phù hợp với ngộ độc khí phosgen?","answers":["A. Thở khí carbogen","B. Thở oxy","C. Để súc vật nơi thoáng mát","D. Hỗ trợ hô hấp"],"correct":2,"explanation":"Đáp án đúng là: Để súc vật nơi thoáng mát Vì: vì nơi thoáng mát không an toàn trong trường hợp chất độc gây phù phổi.","reference":"Mục 2.1"},{"id":249,"text":"Độc tính được hiểu là gì?","answers":["A. Tác dụng chữa bệnh","B. Mức độ hấp thu chất độc","C. Tính chất gây độc của chất đối với cơ thể sống","D. Liều lượng chất độc gây chết người"],"correct":2,"explanation":"Đáp án đúng là: Tính chất gây độc của chất đối với cơ thể sống Vì: Độc tính miêu tả tính chất gây độc, không chỉ liều lượng.","reference":"Mục 2.1.3"},{"id":250,"text":"Đặc điểm chung của các loài cóc độc là gì?","answers":["A. Có tuyến độc nằm dưới da","B. Có tuyến độc ở gan","C. Có nanh dài","D. Có cánh"],"correct":0,"explanation":"Đáp án đúng là: Có tuyến độc nằm dưới da Vì: Tuyến độc dưới da giúp tự vệ, đặc biệt dễ gây ngộ độc cho chó.","reference":"Mục 2.1.3"},{"id":251,"text":"Phân tích môi trường thức ăn cần làm gì?","answers":["A. Lấy mẫu duy nhất","B. Lấy mẫu từ nhiều vị trí","C. Không cần bảo quản mẫu","D. Sử dụng mẫu ủ lâu ngày"],"correct":1,"explanation":"Đáp án đúng là: Lấy mẫu từ nhiều vị trí Vì: giúp xác định nguồn nguy cơ chất độc trong môi trường.","reference":"Mục 1.2"},{"id":252,"text":"Loài cây thuộc họ lúa miến chứa cyanide?","answers":["A. Trúc đào","B. Sorghum spp.","C. Anh đào","D. Mã tiền"],"correct":1,"explanation":"Đáp án đúng là: Sorghum spp. Vì: Lúa miến chứa glucosid giải phóng cyanide gây MetHb.","reference":"Mục 1.1.2"},{"id":253,"text":"Cỏ chứa nitrate cao nguy hiểm do gì?","answers":["A. Làm gia súc bị tiêu chảy","B. Làm giảm khẩu phần ăn","C. Có thể sinh khí NO₂ gây ngộ độc","D. Gây viêm dạ cỏ"],"correct":2,"explanation":"Đáp án đúng là: Có thể sinh khí NO₂ gây ngộ độc Vì: Nitrate cao có thể chuyển thành NO₂ trong dạ cỏ, gây độc cho gia súc.","reference":"Mục 3.1"},{"id":254,"text":"Atropin được dùng để giải độc cho các trường hợp ngộ độc thuốc nào?","answers":["A. Paracetamol","B. Tetracyclin","C. Cephalosporin","D. Mebendazol, levamizol, detomax"],"correct":3,"explanation":"Đáp án đúng là: Mebendazol, levamizol, detomax Vì: Atropin là thuốc giải độc với một số thuốc trị ký sinh trùng.","reference":"Mục 1.2"},{"id":255,"text":"Triệu chứng ngộ độc mãn tính của Cadimi là gì?","answers":["A. Mất ngủ, lo lắng","B. Sút cân, suy thận, thiếu máu","C. Tăng cân bất thường","D. Đau cơ, nhức đầu"],"correct":1,"explanation":"Đáp án đúng là: Sút cân, suy thận, thiếu máu Vì: Ngộ độc mãn tính Cadimi dẫn đến sút cân, suy thận và thiếu máu.","reference":"Mục 2.1.3"},{"id":256,"text":"Độc tố nấm mốc nào làm suy giảm hệ miễn dịch khi tồn tại ở liều thấp?","answers":["A. Aflatoxin","B. Citrinin","C. Zearalenone","D. Sterigmatocystin"],"correct":0,"explanation":"Đáp án đúng là: Aflatoxin Vì: Aflatoxin ở liều thấp đã được chứng minh làm suy giảm miễn dịch.","reference":"Mục 2.1"},{"id":257,"text":"Acid focmic gây độc chủ yếu do ức chế enzyme nào?","answers":["A. Catalase","B. Lipase","C. Trypsin","D. Pepsin"],"correct":0,"explanation":"Đáp án đúng là: Catalase Vì: Acid focmic ức chế catalase, gây met-Hb kéo dài.","reference":"Mục 22."},{"id":258,"text":"Biện pháp phòng ngừa phơi nhiễm chì nào là tốt nhất?","answers":["A. Không dùng xăng pha chì","B. Uống nhiều nước","C. Tập thể dục đều đặn","D. Đeo khẩu trang"],"correct":0,"explanation":"Đáp án đúng là: Không dùng xăng pha chì Vì: Hạn chế sử dụng xăng pha chì giúp giảm phát tán chì vào môi trường.","reference":"Mục 2.1.4"},{"id":259,"text":"Da có đặc điểm gì trong việc hấp thu chất độc?","answers":["A. Là hàng rào hoàn hảo không thấm gì","B. Thấm nhiều chất độc dạng rắn, lỏng hoặc khí","C. Thấm tốt các ion và dung dịch nước","D. Không thấm chất độc nào"],"correct":1,"explanation":"Đáp án đúng là: Thấm nhiều chất độc dạng rắn, lỏng hoặc khí Vì: Da thấm nhiều chất độc dạng rắn, lỏng, khí nhưng ít thấm ion và dung dịch nước.","reference":"Mục 2.3.1"},{"id":260,"text":"Chất độc nào thường gây tổn thương bệnh lý gan nhiễm mỡ?","answers":["A. Kim loại và thuốc trừ sâu","B. Oxalat","C. Alkaloid","D. Chất độc thực vật"],"correct":0,"explanation":"Đáp án đúng là: Kim loại và thuốc trừ sâu Vì: liên quan đến những chất có khả năng tích tụ và ảnh hưởng đến chức năng gan.","reference":"Mục 1.2"},{"id":261,"text":"Loại động vật nào ít mẫn cảm với độc tố thực vật?","answers":["A. Động vật nhai lại","B. Ngựa","C. Gà","D. Chó"],"correct":0,"explanation":"Đáp án đúng là: Động vật nhai lại Vì: Động vật nhai lại có hệ vi sinh vật dạ cỏ làm giảm độc tính của độc tố thực vật.","reference":"Mục 4.2"},{"id":262,"text":"Nhóm chất nào sau đây là thuốc trừ sâu sinh học?","answers":["A. Vi sinh vật, vi khuẩn, virus","B. Hợp chất chlor hữu cơ","C. Phân kali, ure","D. Acid mạnh"],"correct":0,"explanation":"Đáp án đúng là: Vi sinh vật, vi khuẩn, virus Vì: sinh học nghĩa là sử dụng các vi sinh vật, vi khuẩn,... để phòng trừ sâu bệnh.","reference":"Mục 1.1"},{"id":263,"text":"Hoá chất BVTV gồm những loại nào sau đây?","answers":["A. Phân hữu cơ, đất mùn, vôi","B. Thuốc bổ cây, phân chuồng, chất bảo quản","C. Chất tăng năng suất, thuốc bổ đất, men vi sinh","D. Phân bón, chất điều hòa sinh trưởng, thuốc trừ sâu"],"correct":3,"explanation":"Đáp án đúng là: Phân bón, chất điều hòa sinh trưởng, thuốc trừ sâu Vì: là các loại hóa chất thực tế được sử dụng trong nông nghiệp để tăng trưởng, phòng trừ dịch bệnh, theo nội dung đại cương.","reference":"Mục 1"},{"id":264,"text":"Hợp chất chlor hữu cơ như DDT chủ yếu gây tích lũy ở đâu trong cơ thể?","answers":["A. Phổi","B. Cơ","C. Máu","D. Mỡ"],"correct":3,"explanation":"Đáp án đúng là: Mỡ Vì: Do tính tan trong mỡ cao, DDT tích lũy lâu dài trong mô mỡ.","reference":"Mục 2.3.3"},{"id":265,"text":"Vitamin nào sau đây thường được dùng để tăng cường chức năng gan trong điều trị ngộ độc?","answers":["A. Vitamin A, D, E","B. Vitamin K","C. Vitamin C","D. Vitamin B12"],"correct":0,"explanation":"Đáp án đúng là: Vitamin A, D, E Vì: Các vitamin tan trong dầu có tác dụng hỗ trợ gan.","reference":"Mục 1.2"},{"id":266,"text":"Amphotericin B độc chủ yếu với cơ quan nào?","answers":["A. Tim","B. Thận","C. Phổi","D. Gan"],"correct":1,"explanation":"Đáp án đúng là: Thận Vì: Amphotericin B gây độc thận, giảm K+, Mg++.","reference":"Mục 2.1"},{"id":267,"text":"Nồng độ NO₂ gây nguy hiểm cho người dù tiếp xúc ngắn là bao nhiêu?","answers":["A. 500 ppm","B. 100 ppm","C. 10 ppm","D. 0,1 ppm"],"correct":1,"explanation":"Đáp án đúng là: 100 ppm Vì: Chỉ cần 100 ppm đã có thể gây nguy hiểm nếu hít phải dù trong thời gian ngắn.","reference":"Mục 3.1"},{"id":268,"text":"Than hoạt tính có đặc điểm gì giúp hấp phụ độc tố?","answers":["A. Có thể hoà tan độc tố","B. Hút nước mạnh","C. Không tan trong nước, không mùi","D. Diện tích bề mặt lớn, hấp phụ phân tử tích điện"],"correct":3,"explanation":"Đáp án đúng là: Diện tích bề mặt lớn, hấp phụ phân tử tích điện Vì: Than hoạt có bề mặt lớn, hấp phụ mạnh các chất độc phân cực Tham khảo: Bài 10 Mục 3.2","reference":""},{"id":269,"text":"Tác dụng phụ của thuốc có thể dẫn đến điều gì?","answers":["A. Tăng giá thuốc","B. Không ảnh hưởng","C. Giảm hiệu lực điều trị","D. Loại bỏ thuốc khỏi danh mục điều trị"],"correct":3,"explanation":"Đáp án đúng là: Loại bỏ thuốc khỏi danh mục điều trị Vì: Một số thuốc đã bị loại bỏ do phát hiện có hại.","reference":"Mục 1.4"},{"id":270,"text":"Thuốc nào dùng trong điều trị ngộ độc glucosid tim?","answers":["A. Procain hoặc kali glutamate","B. Vitamin C","C. Amoxicillin","D. Insulin"],"correct":0,"explanation":"Đáp án đúng là: Procain hoặc kali glutamate Vì: Procain và kali glutamate hỗ trợ điện thế màng và ổn định tim. Tham khảo: Bài 11 Mục 1.2.1","reference":""},{"id":271,"text":"Chất đối kháng nào thường dùng để điều trị ngộ độc nitrit?","answers":["A. Xanh methylen","B. Naloxon","C. Diazepam","D. Atropin"],"correct":0,"explanation":"Đáp án đúng là: Xanh methylen Vì: Xanh methylen giúp khử ion Fe3+ trong methemoglobin thành ion Fe2+ để vận chuyển oxy.","reference":"Mục 2.2"},{"id":272,"text":"Độc tính chính của Oxytetracyclin khi tiêm bắp là gì?","answers":["A. Tăng huyết áp","B. Gây tổn thương gan, liệt thần kinh","C. Loạn nhịp tim","D. Viêm phế quản"],"correct":1,"explanation":"Đáp án đúng là: Gây tổn thương gan, liệt thần kinh Vì: Oxytetracyclin có thể gây tổn thương gan và liệt thần kinh do ngộ độc cấp.","reference":"Mục 2.1"},{"id":273,"text":"Chất độc được định nghĩa là gì?","answers":["A. Chất chỉ có hại khi dùng liều cao","B. Chất hữu cơ hoặc vô cơ có thể gây hại cho cơ thể sống ở nồng độ nhất định","C. Thuốc chữa bệnh có tác dụng phụ","D. Chất không gây hại cho cơ thể"],"correct":1,"explanation":"Đáp án đúng là: Chất hữu cơ hoặc vô cơ có thể gây hại cho cơ thể sống ở nồng độ nhất định Vì: Chất độc là những chất khi đạt đến nồng độ nhất định sẽ gây hiệu quả độc hại.","reference":"Mục 2.1.1"},{"id":274,"text":"Hen phế quản do thuốc thường gặp ở thuốc nào sau đây?","answers":["A. Vitamin A","B. Glucoza","C. Atropin","D. Penicillin"],"correct":3,"explanation":"Đáp án đúng là: Penicillin Vì: Penicillin dễ gây dị ứng đường hô hấp như hen.","reference":"Mục 1.3.3"},{"id":275,"text":"Dung dịch nào hiệu quả trong việc pha loãng chất độc đã vào máu?","answers":["A. Acid hydrocloric","B. Nước oxy già","C. Nước muối sinh lý hoặc glucose","D. Dung dịch kali permanganat"],"correct":2,"explanation":"Đáp án đúng là: Nước muối sinh lý hoặc glucose Vì: vì nước muối sinh lý và glucose giúp pha loãng và hỗ trợ đào thải chất độc.","reference":"Mục 2.1"},{"id":276,"text":"Thuốc diệt chuột fluoroacetate gây độc do cơ chế nào?","answers":["A. Ức chế men MAO","B. Gây tan hồng cầu","C. Tăng nhịp tim trực tiếp","D. Ức chế chu trình Krebs bằng cách tạo fluorocitrate"],"correct":3,"explanation":"Đáp án đúng là: Ức chế chu trình Krebs bằng cách tạo fluorocitrate Vì: Fluoroacetate biến thành fluorocitrate, ức chế men aconitase, làm đình trệ hô hấp tế bào.","reference":"Mục 3.2.1"},{"id":277,"text":"Phù Quincke nguy hiểm nhất khi xuất hiện ở vị trí nào?","answers":["A. Da chân","B. Thanh quản","C. Môi","D. Mí mắt"],"correct":1,"explanation":"Đáp án đúng là: Thanh quản Vì: Phù thanh quản có thể làm tắc thở, rất nguy hiểm.","reference":"Mục 1.3.3"},{"id":278,"text":"H₂S gây nguy hiểm cao vì lý do gì?","answers":["A. Gây dị ứng da","B. Không tan trong nước","C. Không mùi đặc trưng","D. Có thể gây tử vong đột ngột như cyanide"],"correct":3,"explanation":"Đáp án đúng là: Có thể gây tử vong đột ngột như cyanide Vì: H₂S có thể gây ức chế hô hấp tế bào, ngạt và chết nhanh như cyanide.","reference":"Mục 3.4"},{"id":279,"text":"Chất đối kháng nào thường dùng để giải độc nitrit?","answers":["A. Naloxon","B. Xanh methylen","C. EDTA","D. Ethanol"],"correct":1,"explanation":"Đáp án đúng là: Xanh methylen Vì: vì xanh methylen khử methemoglobin thành hemoglobin để vận chuyển oxy.","reference":"Mục 2.2"},{"id":280,"text":"Khí sulfur dioxide (SO₂) có thể gây tổn thương nào sau đây?","answers":["A. Tổn thương thần kinh","B. Viêm, xuất huyết và phù phổi","C. Suy gan","D. Viêm thận"],"correct":1,"explanation":"Đáp án đúng là: Viêm, xuất huyết và phù phổi Vì: SO₂ tạo acid sulfuric khi tiếp xúc với nước trong phổi, gây tổn thương nghiêm trọng.","reference":"Mục 3.2"},{"id":281,"text":"Vì sao việc hỏi về nguồn thức ăn rất quan trọng trong chẩn đoán ngộ độc?","answers":["A. Xác định khả năng nhiễm độc qua đường miệng","B. Đánh giá chế độ dinh dưỡng","C. Tìm hiểu cách chăm sóc gia súc","D. Kiểm tra nguồn nước uống"],"correct":0,"explanation":"Đáp án đúng là: Xác định khả năng nhiễm độc qua đường miệng Vì: Nhiều chất độc xâm nhập vào cơ thể qua thức ăn bị nhiễm độc hoặc bị hư hỏng.","reference":"Mục 1.2"},{"id":282,"text":"Biện pháp nào sau đây không phù hợp để khử độc Aflatoxin trong cơ thể động vật?","answers":["A. Dùng chế phẩm sinh học","B. Hấp phụ bằng than hoạt","C. Tăng cường bài tiết độc tố","D. Dùng chất hoá học giải độc"],"correct":3,"explanation":"Đáp án đúng là: Dùng chất hoá học giải độc Vì: Hoá chất giải độc không hiệu quả và có tác dụng phụ không mong muốn","reference":"Mục 3.2"},{"id":283,"text":"Dung dịch nào không được dùng để rửa dạ dày khi ngộ độc acid?","answers":["A. Kali permanganat","B. Huyết thanh mặn đẳng trương","C. Natri hydrocarbonat","D. Magiesium hydroxyd"],"correct":2,"explanation":"Đáp án đúng là: Natri hydrocarbonat Vì: vì Natri hydrocarbonat giải phóng CO2, gây chướng bụng và thủng dạ dày.","reference":"Mục 2.1"},{"id":284,"text":"Mẫu bệnh phẩm nào cần thiết để phát hiện chất độc qua đường tiêu hóa?","answers":["A. Tóc","B. Nước tiểu","C. Chất chứa dạ dày","D. Máu"],"correct":2,"explanation":"Đáp án đúng là: Chất chứa dạ dày Vì: là nguồn thông tin trực tiếp về chất độc qua đường tiêu hóa.","reference":"Mục 1.3"},{"id":285,"text":"Khí nào có thể dùng để bảo quản thức ăn, ngăn ngừa nấm mốc ở nồng độ thấp?","answers":["A. Khí clo","B. Khí ozon","C. Khí hydro","D. Khí heli"],"correct":1,"explanation":"Đáp án đúng là: Khí ozon Vì: Ozon có tính oxi hóa mạnh, tiêu diệt nấm mốc hiệu quả","reference":"Mục 3.1"},{"id":286,"text":"Dạng nào của Hg có khả năng gây độc cao nhất?","answers":["A. Methyl thủy ngân (CH3-Hg)","B. Hỗn hợp vô cơ-hữu cơ","C. Thủy ngân vô cơ","D. Thủy ngân kim loại"],"correct":0,"explanation":"Đáp án đúng là: Methyl thủy ngân (CH3-Hg) Vì: Methyl thủy ngân rất bền vững, qua được hàng rào máu não và nhau thai gây độc cao.","reference":"Mục 2.1.8"},{"id":287,"text":"Loài ong nào có thể gây tử vong cho gia súc nếu bị đốt nhiều lần?","answers":["A. Ong rừng (Apis mellifera)","B. Ong vò vẽ nhỏ","C. Ong cắt lá","D. Ong mật nuôi"],"correct":0,"explanation":"Đáp án đúng là: Ong rừng (Apis mellifera) Vì: Ong rừng đốt nhiều gây shock, tụt huyết áp, dung huyết dẫn đến tử vong.","reference":"Mục 2.1.5"},{"id":288,"text":"Cơ chế gây độc của DDT chủ yếu là gì?","answers":["A. Kích thích receptor GABA","B. Ức chế histamin","C. Ức chế bơm Na+, K+ ATPase","D. Tăng tổng hợp acetylcholine"],"correct":2,"explanation":"Đáp án đúng là: Ức chế bơm Na+, K+ ATPase Vì: DDT ức chế bơm Na+/K+ ATPase và calmodulin, gây rối loạn dẫn truyền thần kinh.","reference":"Mục 2.3.4"},{"id":289,"text":"Đường hô hấp có diện tích hấp thu chất độc như thế nào?","answers":["A. Bằng diện tích da","B. Nhỏ hơn da","C. Rất lớn, khoảng 100 m2","D. Bằng diện tích ruột non"],"correct":2,"explanation":"Đáp án đúng là: Rất lớn, khoảng 100 m2 Vì: Niêm mạc đường hô hấp có diện tích lớn giúp hấp thu nhanh chất độc.","reference":"Mục 2.3.1"},{"id":290,"text":"Nguyên nhân thường gặp gây ngộ độc cá nóc là gì?","answers":["A. Ăn cá để lâu trong tủ lạnh","B. Ăn cá còn sống","C. Ăn cá nấu chưa chín","D. Ăn cá chết, dập, độc tố ngấm vào thịt"],"correct":3,"explanation":"Đáp án đúng là: Ăn cá chết, dập, độc tố ngấm vào thịt Vì: Khi cá chết, nội tạng vỡ, độc tố ngấm vào thịt gây ngộ độc.","reference":"Mục 2.2.1"},{"id":291,"text":"Khi dùng acid oxalic, ngoài trung hòa acid cần làm gì?","answers":["A. Dùng lợi tiểu","B. Tiêm kháng sinh","C. Truyền dextran","D. Bổ sung canxi"],"correct":3,"explanation":"Đáp án đúng là: Bổ sung canxi Vì: Oxalic tạo muối không tan với canxi → cần bổ sung canxi.","reference":"Mục 2.2"},{"id":292,"text":"Chất độc vô cơ có thể gây hại chủ yếu thông qua đâu?","answers":["A. Ô nhiễm môi trường và thực phẩm","B. Tính không bền của chất","C. Tương tác hóa học","D. Tính dễ cháy nổ"],"correct":0,"explanation":"Đáp án đúng là: Ô nhiễm môi trường và thực phẩm Vì: Ô nhiễm môi trường và thực phẩm là con đường phổ biến để chất độc vô cơ đi vào cơ thể.","reference":"Mục 1.1"},{"id":293,"text":"Tác dụng chính của Natri bicarbonat trong điều trị ngộ độc acid?","answers":["A. Hạ áp","B. Trung hòa acid","C. Gây nôn","D. Làm tăng hấp thu thuốc"],"correct":1,"explanation":"Đáp án đúng là: Trung hòa acid Vì: Natri bicarbonat trung hòa acid, giảm toan huyết.","reference":"Mục 2.2"},{"id":294,"text":"Liều gây chết của ZnSO4 ở động vật là bao nhiêu?","answers":["A. 1-3 g","B. 10-20 g","C. 5-10 g","D. 3-5 g"],"correct":2,"explanation":"Đáp án đúng là: 5-10 g Vì: Liều 5-10 g ZnSO4 đã có thể gây chết, đặc biệt ở thể cấp tính.","reference":"Mục 2.1.6"},{"id":295,"text":"Ngộ độc thuốc mê nên dùng thuốc nào để điều trị?","answers":["A. Thuốc kháng sinh","B. Thuốc kích thích thần kinh trung ương","C. Thuốc lợi tiểu","D. Thuốc gây ngủ"],"correct":1,"explanation":"Đáp án đúng là: Thuốc kích thích thần kinh trung ương Vì: Kích thích thần kinh giúp đối kháng tác dụng của thuốc mê.","reference":"Mục 1.2"},{"id":296,"text":"Độc tính của kẽm phụ thuộc vào yếu tố nào?","answers":["A. Đặc điểm cơ địa","B. Nguồn kẽm","C. Loại thức ăn","D. Môi trường sống"],"correct":1,"explanation":"Đáp án đúng là: Nguồn kẽm Vì: Độc tính của kẽm phụ thuộc vào nguồn kẽm, mức ăn, thời gian ăn và các khoáng trong khẩu phần.","reference":"Mục 2.1.6"},{"id":297,"text":"Triệu chứng nào không xuất hiện khi thiếu Se?","answers":["A. Hoại tử gan","B. Chảy máu nội tạng","C. Miễn dịch kém","D. Suy giảm sinh sản"],"correct":0,"explanation":"Đáp án đúng là: Hoại tử gan Vì: Thiếu Se gây hoại tử gan, giảm sinh sản và miễn dịch kém, không có triệu chứng chảy máu nội tạng.","reference":"Mục 2.1.7"},{"id":298,"text":"Tác dụng chính của than hoạt trong điều trị ngộ độc?","answers":["A. Hấp phụ chất độc","B. Trung hòa chất độc","C. Giảm đau","D. Làm tan chất độc"],"correct":0,"explanation":"Đáp án đúng là: Hấp phụ chất độc Vì: vì than hoạt hấp phụ phần lớn chất độc trong dạ dày và ruột.","reference":"Mục 2.1"},{"id":299,"text":"Biện pháp cấp cứu đầu tiên khi chó bị ngộ độc do cóc là gì?","answers":["A. Cạo lưỡi","B. Rửa sạch mõm, mũi bằng nước","C. Cho uống sữa","D. Tiêm vitamin K"],"correct":1,"explanation":"Đáp án đúng là: Rửa sạch mõm, mũi bằng nước Vì: Rửa sạch để loại bỏ nhựa độc bám ở niêm mạc.","reference":"Mục 2.1.3"},{"id":300,"text":"Nếu tiêm Penicilin có thể gây sốc phản vệ cho?","answers":["A. Chó","B. Mèo","C. Tất cả các loài","D. Lợn"],"correct":2,"explanation":"Đáp án đúng là: Tất cả các loài Vì: Penicilin có thể gây sốc phản vệ cho tất cả các loài","reference":"Mục 2.1"}];
</script>

<script>
(function () {
  var LETTERS = "ABCDEFGHIJ";
  var container = document.getElementById("questionContainer");
  var noResults = document.getElementById("noResults");
  var searchInput = document.getElementById("searchInput");
  var searchClear = document.getElementById("searchClear");
  var countEl = document.getElementById("searchCount");
  var total = QUESTIONS.length;

  /* ── Escape HTML ── */
  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  /* ── Highlight từ khóa ── */
  function highlight(text, term) {
    if (!term) return esc(text);
    var safe = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return esc(text).replace(
      new RegExp("(" + safe.replace(/&amp;/g, "&amp;amp;") + ")", "gi"),
      "<mark>$1</mark>"
    );
  }

  /* ── Render 1 câu hỏi ── */
  function renderQ(q, term) {
    var answersHtml = q.answers.map(function (ans, i) {
      var isCorrect = i === q.correct;
      var cls = "answer-item" + (isCorrect ? " correct" : "");
      var check = isCorrect ? '<span class="check-mark">&#10003;</span>' : "";
      return (
        '<div class="' + cls + '">' +
        '<span class="answer-letter">' + (LETTERS[i] || i + 1) + ".</span>" +
        '<span class="answer-text">' + highlight(ans, term) + "</span>" +
        check +
        "</div>"
      );
    }).join("");

    var feedbackHtml = "";
    if (q.explanation || q.reference) {
      feedbackHtml =
        '<div class="feedback-section">' +
        (q.explanation
          ? "<p><strong>Vì: </strong>" + esc(q.explanation) + "</p>"
          : "") +
        (q.reference
          ? "<p><strong>Tham khảo: </strong>" + esc(q.reference) + "</p>"
          : "") +
        "</div>";
    }

    return (
      '<div class="question-block" id="q' + q.id + '">' +
      '<div class="question-header">' +
      '<span class="q-badge">Câu ' + q.id + "</span>" +
      "</div>" +
      '<div class="question-text">' + highlight(q.text, term) + "</div>" +
      '<div class="answers">' + answersHtml + "</div>" +
      feedbackHtml +
      "</div>"
    );
  }

  /* ── Render danh sách câu hỏi ── */
  function renderList(filtered, term) {
    // Xóa các block cũ (giữ lại #noResults)
    var old = container.querySelectorAll(".question-block");
    old.forEach(function (el) { el.remove(); });

    if (filtered.length === 0) {
      noResults.style.display = "block";
    } else {
      noResults.style.display = "none";
      var frag = document.createDocumentFragment();
      filtered.forEach(function (q) {
        var div = document.createElement("div");
        div.innerHTML = renderQ(q, term);
        frag.appendChild(div.firstChild);
      });
      container.appendChild(frag);
    }

    countEl.innerHTML =
      "<strong>" + filtered.length + "</strong> / " + total + " câu";
  }

  /* ── Lọc câu hỏi ── */
  function doSearch(term) {
    var t = term.trim().toLowerCase();
    var filtered = t
      ? QUESTIONS.filter(function (q) {
          return (
            q.text.toLowerCase().includes(t) ||
            q.answers.some(function (a) { return a.toLowerCase().includes(t); })
          );
        })
      : QUESTIONS;

    searchClear.style.display = term ? "block" : "none";
    renderList(filtered, term.trim());
  }

  /* ── Khởi tạo ── */
  renderList(QUESTIONS, "");

  searchInput.addEventListener("input", function () {
    doSearch(this.value);
  });
  searchClear.addEventListener("click", function () {
    searchInput.value = "";
    doSearch("");
    searchInput.focus();
  });

  /* ── Scroll to top ── */
  var scrollBtn = document.getElementById("scrollTopBtn");
  window.addEventListener("scroll", function () {
    scrollBtn.style.display = window.scrollY > 320 ? "flex" : "none";
  }, { passive: true });
  scrollBtn.addEventListener("click", function (e) {
    e.preventDefault();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
})();
</script>
</body>
</html>
