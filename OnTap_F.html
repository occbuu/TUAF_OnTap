rs":["A. Phổi, chủ, nửa lẻ","B. Chủ trước, sau, nửa lẻ","C. Chủ trước, vành, nửa lẻ","D. Chủ sau, vành, nửa lẻ"],"correct":1,"explanation":"Đáp án đúng là: Chủ trước, sau, nửa lẻ Vì: Xoang tâm nhĩ thu hồi máu từ tĩnh mạch chủ trước và sau, tĩnh mạch lẻ hoặc nửa lẻ","reference":"Mục 7.2.3"},{"id":167,"text":"Hệ mạch gồm mấy loại?","answers":["A. 2","B. 1","C. 4","D. 3"],"correct":0,"explanation":"Đáp án đúng là: 2 Vì: Hệ mạch gồm 2 loại: hệ mạch máu và hệ mạch bạch huyết","reference":"Mục 7.3"},{"id":168,"text":"Hệ mạch máu gồm mấy loại?","answers":["A. 4","B. 3","C. 2","D. 5"],"correct":1,"explanation":"Đáp án đúng là: 3 Vì: Hệ mạch máu có 3 loại: động mạch, tĩnh mạch, mao mạch.","reference":"Mục 7.3.1"},{"id":169,"text":"Trọng lượng tim của ngựa là?","answers":["A. 0,55 - 0,6%","B. 0,5%","C. 0,4 - 0,45%","D. 0,42 - 0,45%"],"correct":0,"explanation":"Đáp án đúng là: 0,55 - 0,6% Vì: Trọng lượng tim của ngựa là 0,55 - 0,6%","reference":"Mục 7.2.5"},{"id":170,"text":"Đỉnh tim thuộc phần nào của tim?","answers":["A. Tâm nhĩ phải","B. Tâm thất trái","C. Tâm nhĩ trái","D. Tâm thất phải"],"correct":1,"explanation":"Đáp án đúng là: Tâm thất trái Vì: Đỉnh tim thuộc phần tâm thất trái","reference":"Mục 7."},{"id":171,"text":"Tâm thất phải của tim có?","answers":["A. 4-6 lỗ thông","B. Thành dày","C. Van 2 lá","D. Thành trước mỏng, lõm, thành sau lồi"],"correct":3,"explanation":"Đáp án đúng là: Thành trước mỏng, lõm, thành sau lồi Vì: Tâm thất phải của tim có thành trước mỏng, lõm, thành sau lồi","reference":"Mục 7.2.3"},{"id":172,"text":"Phía trong của tim được chia làm 4 xoang nhờ…?","answers":["A. Van","B. Vách ngăn","C. Rãnh","D. Thành tim"],"correct":1,"explanation":"Đáp án đúng là: Vách ngăn Vì: Phía trong của tim được chia làm 4 xoang nhờ vách ngăn","reference":"Mục 7.2.3"},{"id":173,"text":"Đỉnh tâm thất phải không đi đến đỉnh tim và cách đỉnh tim…?","answers":["A. 2 - 3 cm","B. 4 - 5 cm","C. 3 - 5 cm","D. 1 - 2 cm"],"correct":0,"explanation":"Đáp án đúng là: 2 - 3 cm Vì: Đỉnh tâm thất phải không đi đến đỉnh tim và cách đỉnh tim 2 - 3cm.","reference":"Mục 7.2.3"},{"id":174,"text":"Điền vào chỗ trống: “Thần kinh thực vật bao quanh động mạch như ….”","answers":["A. Hình mắt lưới","B. Đám rối","C. Mạch quản","D. Nhánh bên"],"correct":0,"explanation":"Đáp án đúng là: Hình mắt lưới Vì: Thần kinh thực vật bao quanh động mạch như hình mắt lưới.","reference":"Mục 7.3.1"},{"id":175,"text":"Điền vào chỗ trống: “Thành động mạch .…, …., không bị xẹp khi không có máu”.","answers":["A. Dày, mềm","B. Mỏng, mềm","C. Mỏng, cứng","D. Dày, cứng"],"correct":3,"explanation":"Đáp án đúng là: Dày, cứng Vì: Thành động mạch dày, cứng, không bị xẹp khi không có máu.","reference":"Mục 7.3.1"},{"id":176,"text":"Điền vào chỗ trống trong câu sau đây: “Thận là cơ quan...quan trọng nhất của động vật. Thận thực hiện....công việc bài xuất.”","answers":["A. Thải nước tiểu, 50%","B. Bài xuất, 50%","C. Tiết niệu, 75%","D. Đào thải, 65%"],"correct":2,"explanation":"Đáp án đúng là: Tiết niệu, 75% Vì: Thận là cơ quan tiết niệu quan trọng nhất của động vật. Thận thực hiện 75% công việc bài xuất","reference":"Mục 8.2.1"},{"id":177,"text":"Ống dẫn niệu của gia súc có đường kính bao nhiêu?","answers":["A. 1,5 - 4mm","B. 1 - 3mm","C. 2 - 3mm","D. 2 - 4mm"],"correct":0,"explanation":"Đáp án đúng là: 1,5 - 4mm Vì: Ống dẫn niệu của gia súc có đường kính 1,5 - 4mm","reference":"Mục 8.2.2"},{"id":178,"text":"Điền vào chỗ trống trong câu sau đây: “Mỗi đơn vị thận được khởi nguồn trong vùng vỏ bằng các…. Trong tiểu thể có quản cầu Malpighi, …và hệ thống ống sinh niệu, cuối cùng là ống góp chọc sâu vào tuỷ thận qua đỉnh tháp Malpighi đổ vào xoang thận (bể thận)”.","answers":["A. Nang Bowman, tiểu thể Malpighi","B. Tiểu thể Malpighi, nang Bowman","C. Tiểu thể Malpighi, tháp Pheranh","D. Tháp Pheranh, tiểu thể Malpighi"],"correct":1,"explanation":"Đáp án đúng là: Tiểu thể Malpighi, nang Bowman Vì: Mỗi đơn vị thận được khởi nguồn trong vùng vỏ bằng các tiểu thể Malpighi. Trong tiểu thể có quản cầu Malpighi, nang Bowman và hệ thống ống sinh niệu, cuối cùng là ống góp chọc sâu vào tuỷ thận qua đỉnh tháp Malpighi đổ vào xoang thận (bể thận)”.","reference":"Mục 8.2.1"},{"id":179,"text":"Vùng vỏ của thận có màu?","answers":["A. Nâu đỏ","B. Nâu thẫm","C. Đậm","D. Nhạt"],"correct":1,"explanation":"Đáp án đúng là: Nâu thẫm Vì: Vùng vỏ của thận có màu có nhiều chấm vì có nhiều mạch máu và các vi thể thận","reference":"Mục 8.2.1"},{"id":180,"text":"Những sản phẩm thừa chứa nito của quá trình trao đổi chất ở mô bào do quá trình phân hủy liên tục protein và axit nucleic ở thận là…?","answers":["A. Urê, uric, acid amin, protein...","B. Urê, uric, glucose, lipit...","C. Urê, uric, creatinin, amoniac...","D. Glucose, lipit, vitamin..."],"correct":2,"explanation":"Đáp án đúng là: Urê, uric, creatinin, amoniac... Vì: Những sản phẩm thừa chứa nito của quá trình trao đổi chất ở mô bào do quá trình phân hủy liên tục protein và axit nucleic ở thận là: Urê, uric, creatinin, amoniac...","reference":"Mục 8.2.1"},{"id":181,"text":"Trên tiết diện cắt dọc, thận được chia làm mấy vùng chính?","answers":["A. 2","B. 3","C. 1","D. 4"],"correct":0,"explanation":"Đáp án đúng là: 2 Vì: Trên tiết diện cắt dọc thận được chia làm 2 vùng chính: Vùng vỏ, vùng tủy","reference":"Mục 8.2.1"},{"id":182,"text":"Thận được giữ trong xoang bụng bởi....?","answers":["A. Tổ chức liên kết và mạch quản thần kinh","B. Một cân mạc nối từ phúc mạc","C. Màng phúc mạc","D. Tổ chức liên kết"],"correct":1,"explanation":"Đáp án đúng là: Một cân mạc nối từ phúc mạc Vì: Thận được giữ trong xoang bụng bởi một cân mạc nối từ phúc mạc và từ cân mạc này nó tách ra làm 2 lá bọc lấy mỗi quả thận như 2 cái túi.","reference":"Mục 8.2.1"},{"id":183,"text":"Điền vào chỗ trống trong câu sau đây: “Dây thần kinh giao cảm có tác dụng làm….cơ bàng quang,…cơ cổ”.","answers":["A. Co, giãn","B. Giãn, co","C. Giãn, co thắt","D. Co, co thắt"],"correct":2,"explanation":"Đáp án đúng là: Giãn, co thắt Vì: Dây thần kinh giao cảm có tác dụng làm giãn cơ bàng quang, co thắt cơ cổ","reference":"Mục 8.2.3"},{"id":184,"text":"Điền vào chỗ trống trong câu sau đây: “Thận được bọc ngoài cùng là một … gọi là màng sợi xốp liên kết với nhu mô của thận”.","answers":["A. Màng dày","B. Lớp tổ chức liên kết","C. Màng mỏng","D. Màng chắc"],"correct":3,"explanation":"Đáp án đúng là: Màng chắc Vì: Thận được bọc ngoài cùng là một màng chắc gọi là màng sợi xốp liên kết với nhu mô của thận","reference":"Mục 8.2.1"},{"id":185,"text":"Phía cuối của cổ bóng đái cấu tạo bởi cơ gì?","answers":["A. Cơ tim","B. Cơ vân","C. Cơ thắt","D. Cơ trơn"],"correct":1,"explanation":"Đáp án đúng là: Cơ vân Vì: Bóng đái có dạng hình bóng điện, đầu trước gọi là thân tạo thành manh nang, đầu sau thon lại thành cổ, cổ có 2 lớp cơ thắt, cuối cổ có cơ vân.","reference":"Mục 8.2.3"},{"id":186,"text":"Cấu tạo của bóng đái?","answers":["A. Ngoài là lớp phúc mạc, trong là lớp cơ vân, trong cùng là niêm mạc nhăn nheo","B. Ngoài là lớp tương mạc, trong là lớp cơ vân, trong cùng là niêm mạc nhăn nheo","C. Ngoài là lớp phúc mạc, trong là lớp cơ trơn, trong cùng là niêm mạc nhăn nheo","D. Ngoài là lớp tương mạc, trong là lớp cơ trơn, trong cùng là niêm mạc nhăn nheo"],"correct":3,"explanation":"Đáp án đúng là: Ngoài là lớp tương mạc, trong là lớp cơ trơn, trong cùng là niêm mạc nhăn nheo Vì: Cấu tạo bóng đái: Ngoài là lớp tương mạc, trong là lớp cơ trơn, trong cùng là niêm mạc nhăn nheo.","reference":"Mục 8.2.3"},{"id":187,"text":"Gia súc nào thận không có bể thận?","answers":["A. Chó","B. Trâu, bò","C. Ngựa","D. Lợn"],"correct":1,"explanation":"Đáp án đúng là: Trâu, bò Vì: Thận trâu bò không có bể thận vì thận được cấu tạo bởi khoảng 20 thuỳ thận ghép với nhau nên bề mặt ngoài của thận gồ ghề, mỗi thuỳ thận (múi thận) tương ứng với một thận nhỏ .","reference":"Mục 8.2.1"},{"id":188,"text":"Bóng đái của gia súc có dạng?","answers":["A. Hình ovan","B. Hình tròn","C. Hình bóng điện","D. Hình bầu dục"],"correct":2,"explanation":"Đáp án đúng là: Hình bóng điện Vì: Bóng đái có dạng hình bóng điện, đầu trước gọi là thân tạo thành manh nang, đầu sau thon lại thành cổ","reference":"Mục 8.2.3"},{"id":189,"text":"Vùng tủy của thận có khoảng bao nhiêu tháp malpighi?","answers":["A. 10 - 20","B. 20 - 25","C. 15 - 20","D. 18 - 22"],"correct":3,"explanation":"Đáp án đúng là: 18 - 22 Vì: Vùng tủy của thận có khoảng 18 - 22 tháp malpighi","reference":"Mục 8.2.1"},{"id":190,"text":"Điền vào chỗ trống trong câu sau đây: “Thận đóng một vai trò rất quan trọng chọn lọc những chất ... thải ra ngoài. Người ta coi thận như một ... đặt trên đường đi của động mạnh”?","answers":["A. Thừa, người bảo vệ","B. Độc, trạm gác","C. Cặn bã, nhà máy lọc","D. Bị phân hủy, nhà máy"],"correct":2,"explanation":"Đáp án đúng là: Cặn bã, nhà máy lọc Vì: Thận đóng một vai trò rất quan trọng chọn lọc những chất cặn bã thải ra ngoài. Người ta coi thận như một nhà máy lọc đặt trên đường đi của động mạnh.","reference":"Mục 8.2.1"},{"id":191,"text":"Cấu tạo của ống dẫn niệu gồm mấy lớp?","answers":["A. 3","B. 5","C. 4","D. 2"],"correct":0,"explanation":"Đáp án đúng là: 3 Vì: cấu tạo có 3 lớp: Ngoài là lớp tương mạc, giữa là cơ trơn 2 dọc, 1 vòng giữa, trong cùng là niêm mạc nhăn nheo.","reference":"Mục 8.2.2"},{"id":192,"text":"Mỗi quả thận có bao nhiêu đơn vị thận?","answers":["A. Hàng trăm","B. Hàng vạn","C. Hàng triệu","D. Hàng ngàn"],"correct":2,"explanation":"Đáp án đúng là: Hàng triệu Vì: Mỗi quả thận có hàng triệu đơn vị thận.","reference":"Mục 8.2.1"},{"id":193,"text":"Gia súc nào có 2 quả thận có hình dạng khác nhau, thận bên phải có hình con cơ?","answers":["A. Trâu, bò","B. Lợn","C. Ngựa","D. Chó"],"correct":2,"explanation":"Đáp án đúng là: Ngựa Vì: Ngựa có 2 thận hình dạng khác nhau, ngoài trơn nhẵn, có bể thận. Thận phải hình con cơ...","reference":"Mục 8.2.1"},{"id":194,"text":"Mỗi chu kỳ tim đập có bao nhiêu lượng máu từ tâm thất trái tới thận?","answers":["A. 20 - 25%","B. 10 - 20%","C. 15 - 20%","D. 15 - 25%"],"correct":2,"explanation":"Đáp án đúng là: 15 - 20% Vì: Mỗi chu kỳ tim đập có 15 - 20% lượng máu từ tâm thất trái tới thận","reference":"Mục 8.2.1"},{"id":195,"text":"Niệu đạo có chức năng gì?","answers":["A. Niệu đạo dẫn nước tiểu từ bóng đái ra ngoài theo ống dẫn niệu.","B. Niệu đạo dẫn nước tiểu từ thận đến bàng quang.","C. Niệu đạo dẫn nước tiểu từ bể thận đến bóng đái.","D. Niệu đạo dẫn nước tiểu từ bóng đái ra ngoài có liên quan đến đường sinh dục."],"correct":3,"explanation":"Đáp án đúng là: Niệu đạo dẫn nước tiểu từ bóng đái ra ngoài có liên quan đến đường sinh dục. Vì: Niệu đạo dẫn nước tiểu từ bóng đái ra ngoài có liên quan đến đường sinh dục.","reference":"Mục 8.2.4"},{"id":196,"text":"Thận của gia súc nằm ở...?","answers":["A. Trong xoang bụng và ngoài xoang phúc mạc","B. Trong xoang phế mạc","C. Trong xoang bụng","D. Trong xoang phúc mạc"],"correct":0,"explanation":"Đáp án đúng là: Trong xoang bụng và ngoài xoang phúc mạc Vì: Trong xoang bụng và ngoài xoang phúc mạc","reference":"Mục 8.2.1"},{"id":197,"text":"Thận của gia súc gồm:....?","answers":["A. 2 dải thận ở 2 bên cột sống lưng, hông...","B. 3 quả thận ở hai bên cột sống lưng, hông...","C. 1 quả thận ở dưới cột sống lưng, hông...","D. 2 quả thận ở hai bên cột sống lưng, hông..."],"correct":3,"explanation":"Đáp án đúng là: 2 quả thận ở hai bên cột sống lưng, hông... Vì: 2 quả thận ở hai bên cột sống lưng, hông...","reference":"Mục 8.2.1"},{"id":198,"text":"Điền vào chỗ trống trong câu sau đây: “ Ống dẫn niệu đi từ … đến … . Sau khi chọc thủng màng thận nó đi về sau theo tĩnh mạch chủ sau , đến xoang chậu thì chui qua … , trèo lên trên bóng đái đổ vào gần cổ bóng đái qua van Lieutan ”.","answers":["A. Bể thận, bóng đái, phúc mạc","B. Bóng đái, niệu đạo, phúc mạc","C. Bể thận, bóng đái, phế mạc","D. Bóng đái, niệu đạo, bụng"],"correct":0,"explanation":"Đáp án đúng là: Bể thận, bóng đái, phúc mạc Vì: Ống dẫn niệu đi từ bể thận đến bóng đái . Sau khi chọc thủng màng thận nó đi về sau theo tĩnh mạch chủ sau , đến xoang chậu thì chui qua phúc mạc , trèo lên trên bóng đái đổ vào gần cổ bóng đái qua van Lieutan","reference":"Mục 8.2.2"},{"id":199,"text":"Thận của gia súc nào chia làm nhiều thùy?","answers":["A. Ngựa","B. Chó","C. Lợn","D. Trâu, bò"],"correct":3,"explanation":"Đáp án đúng là: Trâu, bò Vì: Thận của Trâu, bò chia nhiều thùy","reference":"Mục 8.2.1"},{"id":200,"text":"Điền vào chỗ trống trong câu sau đây: “Bóng đái còn gọi là …, nằm trước của chậu hông, … âm đạo, cổ tử cung con cái, dưới … của con đực”.","answers":["A. Bàng quang, dưới, tuyến sinh dục phụ","B. Bàng quang, dưới, dương vật","C. Bàng quang, trên, tuyến sinh dục phụ","D. Bể thận, dưới, tuyến sinh dục phụ"],"correct":0,"explanation":"Đáp án đúng là: Bàng quang, dưới, tuyến sinh dục phụ Vì: Bóng đái còn gọi là bàng quang, nằm trước của chậu hông, dưới âm đạo, cổ tử cung con cái, dưới tuyến sinh dục phụ của con đực","reference":"Mục 8.2.3"},{"id":201,"text":"Gia súc nào có dịch hoàn phụ phát triển nhất?","answers":["A. Lợn","B. Chó","C. Ngựa","D. Trâu, bò"],"correct":2,"explanation":"Đáp án đúng là: Ngựa Vì: Phụ dịch hoàn của ngựa phát triển hơn trâu bò, lợn…","reference":"Mục 9.2.3"},{"id":202,"text":"Tuyến Cowper có tác dụng gì?","answers":["A. Tiết ra chất nhờn rửa sạch niệu đạo và âm đạo lúc giao phối","B. Tiết ra dịch nhờn và dính trộn với tinh trùng thành tinh dịch","C. Nút cổ tử cung sau khi giao phối","D. Pha loãng tinh dịch, làm tăng hoạt lực tinh trùng"],"correct":0,"explanation":"Đáp án đúng là: Tiết ra chất nhờn rửa sạch niệu đạo và âm đạo lúc giao phối Vì: Tuyến có tác dụng tiết ra chất nhờn rửa sạch niệu đạo và âm đạo lúc giao phối","reference":"Mục 9.2.7"},{"id":203,"text":"Khi cơ thể gia súc phát triển gần hoàn hảo thì dịch hoàn?","answers":["A. Di chuyển vào bao dịch hoàn","B. Nằm thẳng đứng trong bao dịch hoàn","C. Nằm trong xoang bụng","D. Nằm chếch từ trước ra sau"],"correct":0,"explanation":"Đáp án đúng là: Di chuyển vào bao dịch hoàn Vì: Khi cơ thể gia súc phát triển gần hoàn hảo thì dịch hoàn di chuyển vào bao dịch hoàn","reference":"Mục 9.2.2"},{"id":204,"text":"Niệu đạo của con đực là ống dùng để làm gì?","answers":["A. Thải nước tiểu","B. Dùng chung cho cả phóng tinh và thải nước tiểu","C. Phóng tinh","D. Chứa đựng nước tiểu"],"correct":1,"explanation":"Đáp án đúng là: Dùng chung cho cả phóng tinh và thải nước tiểu Vì: Niệu đạo của con đực là ống dùng để dùng chung cho cả phóng tinh và thải nước tiểu.","reference":"Mục 9.2.5"},{"id":205,"text":"Điền vào chỗ trống trong câu sau: “Dịch hoàn có dạng hình … dẹp, hai mặt trong ngoài …, trơn, một cạnh cong lồi, một cạnh hơi thẳng bị thượng dịch hoàn trùm che”.","answers":["A. Cầu, tròn","B. Trứng, tròn","C. Cầu, nhẵn","D. Trứng, nhẵn"],"correct":1,"explanation":"Đáp án đúng là: Trứng, tròn Vì: “Dịch hoàn có dạng hình trứng dẹp, hai mặt trong ngoài tròn, trơn, một cạnh cong lồi, một cạnh hơi thẳng bị thượng dịch hoàn trùm che”.","reference":"Mục 9.2.2"},{"id":206,"text":"Tuyến tiền liệt có tác dụng gì?","answers":["A. Tiết ra dịch nhờn và dính trộn với tinh trùng thành tinh dịch","B. Pha loãng tinh dịch, làm tăng hoạt lực tinh trùng…","C. Nút cổ tử cung sau khi giao phối","D. Tiết ra chất nhờn rửa sạch niệu đạo và âm đạo lúc giao phối"],"correct":1,"explanation":"Đáp án đúng là: Pha loãng tinh dịch, làm tăng hoạt lực tinh trùng… Vì: Pha loãng tinh dịch, làm tăng hoạt lực tinh trùng…","reference":"Mục 9.2.7"},{"id":207,"text":"Phụ dịch hoàn có chức năng gì?","answers":["A. Tiết ra hormon testosteron","B. Vận chuyển tinh trùng","C. Sản sinh ra tinh trùng","D. Dự trữ và nuôi dưỡng tinh trùng"],"correct":3,"explanation":"Đáp án đúng là: Dự trữ và nuôi dưỡng tinh trùng Vì: Phụ dịch hoàn có chức năng dự trữ và nuôi dưỡng tinh trùng","reference":"Mục 9.2.3"},{"id":208,"text":"Điền vào chỗ trống trong câu sau: “Phụ dịch hoàn là một thể … gồm 2 đầu, một thân ôm lấy … và cạnh ngắn (thẳng) của dịch hoàn. Phụ dịch hoàn cũng có màng trắng bao bọc, lớp mô chính từ các ống sinh tinh của dịch hoàn đi ra, các ống này lớn và gấp khúc cuộn lại gọi là ống cuộn hay là ống mào tinh”.","answers":["A. Dẹp, hai đầu","B. Hình dải dài, đầu","C. Dẹp, đầu","D. Hình dải dài, hai đầu"],"correct":0,"explanation":"Đáp án đúng là: Dẹp, hai đầu Vì: Phụ dịch hoàn là một thể dẹp gồm 2 đầu, một thân ôm lấy hai đầu và cạnh ngắn (thẳng) của dịch hoàn. Phụ dịch hoàn cũng có màng trắng bao bọc, lớp mô chính từ các ống sinh tinh của dịch hoàn đi ra, các ống này lớn và gấp khúc cuộn lại gọi là ống cuộn hay là ống mào tinh","reference":"Mục 9.2.3"},{"id":209,"text":"Bao dịch hoàn có tác dụng?","answers":["A. Chứa  dịch hoàn và dịch hoàn phụ","B. Thể hiện đặc tính sinh dục của con đực","C. Chứa dịch hoàn phụ","D. Chứa dịch hoàn"],"correct":0,"explanation":"Đáp án đúng là: Chứa  dịch hoàn và dịch hoàn phụ Vì: Bao dịch hoàn có tác dụng chứa  dịch hoàn và dịch hoàn phụ","reference":"Mục 9.2.1"},{"id":210,"text":"Tuyến tinh nang có tác dụng gì?","answers":["A. Pha loãng tinh dịch, làm tăng hoạt lực tinh trùng…","B. Trung hoà CO 2 do tinh trùng sản sinh ra trong quá trình hoạt động, trung hoà môi trường axit trong âm đạo","C. Tiết ra dịch nhờn và dính trộn với tinh trùng thành tinh dịch, nút cổ tử cung sau khi giao phối","D. Tiết ra chất nhờn rửa sạch niệu đạo và âm đạo lúc giao phối"],"correct":2,"explanation":"Đáp án đúng là: Tiết ra dịch nhờn và dính trộn với tinh trùng thành tinh dịch, nút cổ tử cung sau khi giao phối Vì: Tiết ra dịch nhờn và dính trộn với tinh trùng thành tinh dịch, nút cổ tử cung sau khi giao phối","reference":"Mục 9.2.7"},{"id":211,"text":"Điền vào chỗ trống trong câu sau: “Khi thành thục về tính, đầu bao quy đầu….để quy đầu… khi cương cứng”.","answers":["A. Co thắt, thò ra","B. Mở rộng, thò ra","C. Mở rông, kéo lùi","D. Co thắt, kéo lùi"],"correct":1,"explanation":"Đáp án đúng là: Mở rộng, thò ra Vì: Khi thành thục về tính, đầu bao quy đầu mở rộng để quy đầu thò ra khi cương cứng","reference":"Mục 9.2.6"},{"id":212,"text":"Trước khi đổ vào gò tinh, phần cuối của ống dẫn tinh phình to dài bao nhiêu?","answers":["A. 1 - 2,5cm","B. 1,5 - 2cm","C. 2,5 - 3,5cm","D. 2 - 3cm"],"correct":1,"explanation":"Đáp án đúng là: 1,5 - 2cm Vì: Trước khi đổ vào gò tinh, phần cuối của ống dẫn tinh phình to dài 1,5 - 2cm.","reference":"Mục 9.2.4"},{"id":213,"text":"Vị trí của dịch hoàn trong giai đoạn phát triển của bào thai?","answers":["A. Trong ống bẹn","B. Trong xoang chậu","C. Trong xoang bụng","D. Trong bao dịch hoàn"],"correct":2,"explanation":"Đáp án đúng là: Trong xoang bụng Vì: Vị trí của dịch hoàn trong giai đoạn phát triển của bào thai là ở trong xoang bụng","reference":"Mục 9.2.2"},{"id":214,"text":"Cấu tạo dương vật của gia súc trên tiết diện cắt ngang từ ngoài vào trong gồm mấy lớp?","answers":["A. 2","B. 4","C. 3","D. 5"],"correct":2,"explanation":"Đáp án đúng là: 3 Vì: Cấu tạo dương vật của gia súc trên tiết diện cắt ngang từ ngoài vào trong gồm: lớp da, lớp màng sợi, lớp thể hổng","reference":"Mục 9.2.6"},{"id":215,"text":"Điền vào chỗ trống trong câu sau: “Niệu đạo nối tiếp sau… đi về phía sau vòng quanh vòng cung ngồi, ra ngoài chậu hông nằm dưới rãnh thể hổng dương vật đến tận …qui đầu”.","answers":["A. Cổ bóng đái, đầu","B. Thân bóng đái, thân","C. Cổ bóng đái, thân","D. Thân bóng đái, đầu"],"correct":0,"explanation":"Đáp án đúng là: Cổ bóng đái, đầu Vì: Niệu đạo nối tiếp sau cổ bóng đái đi về phía sau vòng quanh vòng cung ngồi, ra ngoài chậu hông nằm dưới rãnh thể hổng dương vật đến tận đầu qui đầu","reference":"Mục 9.2.5"},{"id":216,"text":"Điền vào chỗ trống trong câu sau: “ Quy đầu là phần cuối … được bọc bởi bao qui đ ầ u , có lỗ thông ra của niệu đạo , cuối bao qui đầu có lỗ thông ra ngoài , khi dương vật cương cứng qui đầu …” .","answers":["A. Tự do, thò ra","B. Cùng, thò ra","C. Tự do, được đẩy ra","D. Gắn chặt ở dưới da, thò ra"],"correct":0,"explanation":"Đáp án đúng là: Tự do, thò ra Vì: Quy đầu là phần cuối tự do được bọc bởi bao qui đ ầ u , có lỗ thông ra của niệu đạo , cuối bao qui đầu có lỗ thông ra ngoài , khi dương vật cương cứng qui đầu thò ra","reference":"Mục 9.2.6"},{"id":217,"text":"Ống dẫn tinh to bằng ống rạ, có đường kính bằng?","answers":["A. 0,3 - 0,6cm","B. 0,4 - 0,6cm","C. 0,1 - 0,3cm","D. 0,2 - 0,4cm"],"correct":3,"explanation":"Đáp án đúng là: 0,2 - 0,4cm Vì: Ống dẫn tinh to bằng ống rạ, có đường kính bằng 0,2 - 0,4cm.","reference":"Mục 9.2.4"},{"id":218,"text":"Điền vào chỗ trống trong câu sau: “Ống dẫn tinh bắt đầu từ …nối tiếp ống mào tinh đi lên xoang bụng qua ống bẹn cùng động mạch, thần kinh vào dịch hoàn làm thành thừng dịch hoàn đi lên… rồi trèo lên trên bóng đái đổ vào niệu đạo ở hai bên gò tinh”","answers":["A. Đuôi thượng dịch hoàn, xoang chậu","B. Đuôi thượng dịch hoàn, xoang bụng","C. Đuôi thượng dịch hoàn, cửa chậu","D. Đầu thượng dịch hoàn, cửa chậu"],"correct":2,"explanation":"Đáp án đúng là: Đuôi thượng dịch hoàn, cửa chậu Vì: Ống dẫn tinh bắt đầu từ đuôi thượng dịch hoàn nối tiếp ống mào tinh đi lên xoang bụng qua ống bẹn cùng động mạch, thần kinh vào dịch hoàn làm thành thừng dịch hoàn đi lên cửa chậu rồi trèo lên trên bóng đái đổ vào niệu đạo ở hai bên gò tinh","reference":"Mục 9.2.4"},{"id":219,"text":"Cấu tạo của bao dịch hoàn gồm… lớp?","answers":["A. 5","B. 3","C. 2","D. 4"],"correct":3,"explanation":"Đáp án đúng là: 4 Vì: Lớp ngoài cùng là lớp da, lớp màng bóc, lớp cơ, lớp màng giáp mạc","reference":"Mục 9.2.1"},{"id":220,"text":"Dịch hoàn/tinh hoàn nằm ở?","answers":["A. Trong bao dịch hoàn","B. Trong xoang chậu","C. Trong xoang bụng","D. Trong cơ thể"],"correct":0,"explanation":"Đáp án đúng là: Trong bao dịch hoàn Vì: Dịch hoàn/tinh hoàn nằm ở trong bao dịch hoàn","reference":"Mục 9.2.2"},{"id":221,"text":"Dịch hoàn có chức năng gì?","answers":["A. Sản sinh ra tinh trùng và tiết hormon testosteron","B. Sản sinh ra tế bào trứng và tiết hormon oestrogen","C. Sản sinh ra tinh trùng và tiết hormon oestrogen"],"correct":0,"explanation":"Đáp án đúng là: Sản sinh ra tinh trùng và tiết hormon testosteron Vì: Dịch hoàn có chức năng sản sinh ra tinh trùng và tiết hormon testosteron","reference":"Mục 9.2.2"},{"id":222,"text":"Lớp màng bóc của bao dịch hoàn có tác dụng gì?","answers":["A. Bảo vệ dịch hoàn","B. Co giãn bao dịch hoàn, điều hòa nhiệt độ phù hợp","C. Tiết ra dịch nhờn làm lông, da luôn trơn bóng","D. Giữ dịch hoàn cố định trong bao dịch hoàn"],"correct":1,"explanation":"Đáp án đúng là: Co giãn bao dịch hoàn, điều hòa nhiệt độ phù hợp Vì: Lớp màng bóc của bao dịch hoàn có tác dụng làm co giãn bao dịch hoàn, điều hòa nhiệt độ phù hợp","reference":"Mục 9.2.1"},{"id":223,"text":"Điền vào chỗ trống trong câu sau: “ Dương vật nối tiếp từ sau … bóng đái , từ … vòng qua vùng Perener đi xuống dưới về phía trước giữa hai dịch hoàn đến sát vùng sau rốn ” .","answers":["A. Thân, xương ngồi","B. Cổ, xương ngồi","C. Cổ, u ngồi","D. Thân, u ngồi"],"correct":1,"explanation":"Đáp án đúng là: Cổ, xương ngồi Vì: Dương vật nối tiếp từ sau cổ bóng đái , từ xương ngồi vòng qua vùng Perener đi xuống dưới về phía trước giữa hai dịch hoàn đến sát vùng sau rốn","reference":"Mục 9.2.6"},{"id":224,"text":"Điền vào chỗ trống trong câu sau: “","answers":["A. Lựa chọn và kiến nghị những mục tiêu ưu tiên cho từng giai đoạn","B. Phân tích lợi ích – chi phí","C. Đánh giá nguyên nhân và lý do phải có chính sách","D. Lựa chọn tiêu chí đánh giá"],"correct":3,"explanation":"Đáp án đúng là: Lựa chọn tiêu chí đánh giá Vì: Phân tích giải pháp gồm bốn bước: Lựa chọn tiêu chí đánh giá; Xác định các phương án chính sách; Đánh giá các phương án chính sách; Nêu kiến nghị hoàn thiện chính sách","reference":"Mục 9.1.4.2"},{"id":225,"text":"Điền vào chỗ trống trong câu sau: “Lớp thể hổng dương vật: bị vách ngăn chia thành nhiều … trong đó có nhiều mạch quản đến nuôi dưỡng và nhiều tổ chức …”","answers":["A. Hốc, cương cứng","B. Hang hốc, cương cứng","C. Hang hốc, co rút","D. Tổ chức, cương cứng"],"correct":1,"explanation":"Đáp án đúng là: Hang hốc, cương cứng Vì: Lớp thể hổng dương vật: bị vách ngăn chia thành nhiều hang hốc trong đó có nhiều mạch quản đến nuôi dưỡng và nhiều tổ chức cương cứng.","reference":"Mục 9.2.6"},{"id":226,"text":"Cơ trơn tử cung có đặc điểm gì?","answers":["A. Có khả năng co giãn","B. Rất phát triển, dày, khỏe, có cấu tạo phức tạp","C. Kém phát triển, lỏng lẻo","D. Có khả năng tiết dịch nhờn để bôi trơn"],"correct":1,"explanation":"Đáp án đúng là: Rất phát triển, dày, khỏe, có cấu tạo phức tạp Vì: Cơ trơn rất phát triển, dày, khoẻ có cấu tạo phức tạp phù hợp với chức năng chứa thai phát triển và đẩy thai khi đẻ","reference":"Mục 10.2.3"},{"id":227,"text":"Ống dẫn trứng của gia súc được chia làm mấy phần?","answers":["A. 3","B. 2","C. 5","D. 4"],"correct":1,"explanation":"Đáp án đúng là: 2 Vì: gồm phần trước tự do có hình phễu loe ra gọi là loa vòi (loa kèn) và phần sau thon nhỏ nối với sừng tử cung.","reference":"Mục 10.2.2"},{"id":228,"text":"Cổ tử cung của ngựa có hình?","answers":["A. Chữ T","B. Ngoằn ngoèo như ruột non","C. Chữ Y","D. Chữ V"],"correct":0,"explanation":"Đáp án đúng là: Chữ T Vì: Sừng tử cung ngắn, dài 2 - 4cm choãi ra hai bên như chữ T","reference":"Mục 10.2.3"},{"id":229,"text":"Số lượng tuyến vú của ngựa là bao nhiêu đôi?","answers":["A. 4","B. 2","C. 3","D. 1"],"correct":3,"explanation":"Đáp án đúng là: 1 Vì: Ngựa có 1 đôi vú ở bẹn","reference":"Mục 10.2.6"},{"id":230,"text":"Điền từ vào chỗ trống sau: “Buồng trứng gồm … nằm dưới hông, trước cửa vào …. và được giữ bởi dây chằng rộng. Trên bề mặt buồng trứng sần sùi”?","answers":["A. Một đôi. xoang bụng","B. Hai đôi, xoang bụng","C. Hai đôi, xoang chậu","D. Một đôi, xoang chậu"],"correct":3,"explanation":"Đáp án đúng là: Một đôi, xoang chậu Vì: “Buồng trứng gồm một đôi nằm dưới hông, trước cửa vào xoang chậu và được giữ bởi dây chằng rộng. Trên bề mặt buồng trứng sần sùi”","reference":"Mục 10.2.1"},{"id":231,"text":"Cổ tử cung của lợn có hình?","answers":["A. Chữ T","B. Ngoằn ngoèo như ruột non","C. Chữ V","D. Chữ Y"],"correct":1,"explanation":"Đáp án đúng là: Ngoằn ngoèo như ruột non Vì: Sừng tử cung dài ngoằn ngoèo như ruột non, dài 30 - 50cm","reference":"Mục 10.2.3"},{"id":232,"text":"Điền vào chỗ trống trong câu sau: “Âm đạo là đoạn nối tiếp sau cổ tử cung, … âm hộ. Đây là nơi tiếp nhận dương vật khi giao phối, phía trên là …., phía dưới là …, nó được ngăn cách với âm hộ bởi màng trinh”.","answers":["A. Và, trực tràng, bóng đái","B. Trước, trực tràng, bóng đái","C. Trước, ruột già, bóng đái","D. Và, ruột già, bóng đái"],"correct":1,"explanation":"Đáp án đúng là: Trước, trực tràng, bóng đái Vì: Âm đạo là đoạn nối tiếp sau cổ tử cung, trước âm hộ. Đây là nơi tiếp nhận dương vật khi giao phối, phía trên là trực tràng, phía dưới là bóng đái, nó được ngăn cách với âm hộ bởi màng trinh","reference":"Mục 10.2.4"},{"id":233,"text":"Hình thái ngoài buồng trứng của ngựa như thế nào?","answers":["A. Trên bề mặt nhẵn và có vết lõm tạo thành hố rụng trứng","B. Trên bề mặt trơn nhẵn","C. Trên bề mặt sần sùi","D. Trên bề mặt nổi lên các tế bào trứng"],"correct":0,"explanation":"Đáp án đúng là: Trên bề mặt nhẵn và có vết lõm tạo thành hố rụng trứng Vì: Trên bề mặt nhẵn và có vết lõm tạo thành hố rụng trứng","reference":"Mục 10.2.1"},{"id":234,"text":"Phần trước tự do của ống dẫn trứng có tác dụng gì?","answers":["A. Nơi phân chia tế bào của phôi","B. Làm tổ cho thai","C. Hứng tế bào trứng chín rụng","D. Trứng và tinh trùng gặp nhau tạo thành hợp tử"],"correct":2,"explanation":"Đáp án đúng là: Hứng tế bào trứng chín rụng Vì: Phần trước tự do có hình phễu loe ra gọi là loa vòi (loa kèn) có tác dụng hứng tế bào trứng chín rụng, đầu này mở ra trong xoang phúc mạc","reference":"Mục 10.2.2"},{"id":235,"text":"Loài gia súc nào thai làm tổ ở thân tử cung?","answers":["A. Ngựa","B. Chó","C. Trâu bò","D. Lợn"],"correct":0,"explanation":"Đáp án đúng là: Ngựa Vì: Ngựa là loài gia súc thai làm tổ ở thân tử cung","reference":"Mục 10.2.3"},{"id":236,"text":"Loài vật nào không có xoang sữa (bể sữa)?","answers":["A. Trâu, bò","B. Dê, cừu","C. Ngữa","D. Lợn"],"correct":3,"explanation":"Đáp án đúng là: Lợn Vì: Lợn không có bể sửa, động mạch cung cấp máu cho tuyến vú là động mạch thẹn và động mạch ngực","reference":"Mục 10.2.6"},{"id":237,"text":"Buồng trứng của trâu bò có hình dạng như thế nào?","answers":["A. Bầu dục hơi dẹp, bề mặt sần sùi","B. Bề mặt nhẵn","C. Bầu dục, có vết lõm tạo thành hố rụng trứng","D. Bề mặt có nhiều u nổi lên"],"correct":0,"explanation":"Đáp án đúng là: Bầu dục hơi dẹp, bề mặt sần sùi Vì: Buồng trứng có hình bầu dục hơi dẹp. Trên bề mặt buồng trứng sần sùi","reference":"Mục 10.2.1"},{"id":238,"text":"Điền từ vào chỗ còn thiếu sau: “Niêm mạc bên trong ống dẫn trứng có nhiều ……... Niêm mạc không có tuyến?","answers":["A. Có nhiều u thịt","B. Nhăn nheo","C. Nhẵn","D. Gấp nếp chạy dọc"],"correct":3,"explanation":"Đáp án đúng là: Gấp nếp chạy dọc Vì: Trong là niêm mạc có nhiều gấp nếp chạy dọc. Niêm mạc không có tuyến","reference":"Mục 10.2.2"},{"id":239,"text":"Lớp giữa của ống dẫn trứng được cấu tạo bới các loại cơ nào?","answers":["A. Cơ vòng ở trong, cơ dọc ở giữa, cơ chéo ở ngoài","B. Cơ thẳng ở trong, cơ vòng ở ngoài","C. Cơ vòng ở trong, cơ thẳng ở ngoài","D. Cơ vòng ở trong, cơ dọc ở giữa, cơ thẳng ở ngoài"],"correct":2,"explanation":"Đáp án đúng là: Cơ vòng ở trong, cơ thẳng ở ngoài Vì: Cơ vòng ở trong, cơ thẳng ở ngoài","reference":"Mục 10.2.2"},{"id":240,"text":"Tế bào trứng chín sẽ xảy ra ở phần nào?","answers":["A. Phần trước","B. Phần tủy","C. Phần sau","D. Phần vỏ"],"correct":3,"explanation":"Đáp án đúng là: Phần vỏ Vì: Phần vỏ đặc biệt quan trọng với chức năng sinh dục. Quá trình tế bào trứng chín xảy ra tại phần này","reference":"Mục 10.2.1"},{"id":241,"text":"Cổ tử cung của trâu, bò có đặc điểm?","answers":["A. Có những gấp nếp nhăn nheo theo chiều dọc","B. Có 3-4 gấp nếp hoa nở","C. Có những u thịt đan xen cài răng lược","D. Có 1 lần hoa nở"],"correct":1,"explanation":"Đáp án đúng là: Có 3-4 gấp nếp hoa nở Vì: Niêm mạc cổ tử cung dày nhô vào trong lòng cổ tử cung và âm đạo những nếp gấp gọi là hoa nở, có 3 - 4 gấp nếp hoa nở","reference":"Mục 10.2.3"},{"id":242,"text":"Quá trình thụ tinh xảy ra ở đâu?","answers":["A. Tử cung","B. Âm hộ","C. Ống dẫn trứng","D. Âm đạo"],"correct":2,"explanation":"Đáp án đúng là: Ống dẫn trứng Vì: Quá trình thụ tinh xảy ra ở ống dẫn trứng (1/3 phía trên ống dẫn trứng)","reference":"Mục 10.2.2"},{"id":243,"text":"Niêm mạc tử cung của loài gia súc nào phát triển nhất?","answers":["A. Trâu, bò","B. Lợn","C. Chó","D. Ngựa"],"correct":0,"explanation":"Đáp án đúng là: Trâu, bò Vì: Niêm mạc thân sừng tử cung có nhiều gấp nếp dạng củ tròn hoặc bầu dục nhô vào lòng sừng, thân tử cung làm chỗ bám cho nhau thai","reference":"Mục 10.2.3"},{"id":244,"text":"Buồng trứng có chức năng gì?","answers":["A. Sản sinh ra các nang trứng sơ cấp và tiết ra hormone Estrogen","B. Sản sinh ra các noãn nang nguyên thủy và tiết ra hormone Estrogen","C. Sản sinh ra tế bào trứng và tiết ra hormone Estrogen","D. Sản sinh ra tế bào trứng và tiết ra hormone Testosteron"],"correct":2,"explanation":"Đáp án đúng là: Sản sinh ra tế bào trứng và tiết ra hormone Estrogen Vì: Buồng trứng có chức năng sản sinh ra tế bào trứng và tiết ra hormone Estrogen","reference":"Mục 10.2.1"},{"id":245,"text":"Điền các từ còn thiếu vào chỗ trống: “Âm hộ nằm dưới hậu môn và được thông ra ngoài bởi một khe thẳng đứng gọi là ….”.","answers":["A. Âm hộ","B. Âm đạo","C. Âm môn","D. Âm vật"],"correct":2,"explanation":"Đáp án đúng là: Âm môn Vì: Âm hộ nằm dưới hậu môn và được thông ra ngoài bởi một khe thẳng đứng gọi là âm môn.","reference":"Mục 10.2.5"},{"id":246,"text":"Điền các từ còn thiếu vào chỗ trống: “Âm môn là một khe thẳng đứng dưới hậu môn, có … nối với nhau bởi …”.","answers":["A. 2 môi, mép","B. Môi lớn và môi bé, 2 mép","C. 2 môi, 2 mép","D. Môi, mép"],"correct":2,"explanation":"Đáp án đúng là: 2 môi, 2 mép Vì: Âm môn là một khe thẳng đứng dưới hậu môn, có 2 môi nối với nhau bởi 2 mép.","reference":"Mục 10.2.5"},{"id":247,"text":"Điền từ vào chỗ trống sau: “Dưới tác dụng của kích tố đặc biệt là … tuyến yên, trứng chín sẽ rụng. Sau khi trứng rụng phần còn lại của noãn bao biến thành …”?","answers":["A. Kích tố sinh dục, bao noãn chín","B. Kích tố sinh dục, thể vàng","C. Kích tố trợ sản, thể vàng","D. Hormon, thể vàng"],"correct":1,"explanation":"Đáp án đúng là: Kích tố sinh dục, thể vàng Vì: Dưới tác dụng của kích tố đặc biệt là kích tố sinh dục tuyến yên, trứng chín sẽ rụng. Sau khi trứng rụng phần còn lại của noãn bao biến thành thể vàng","reference":"Mục 10.2.1"},{"id":248,"text":"Điền từ vào chỗ thiếu sau: “Tử cung là nơi … và phát triển của thai. Tử cung nằm trong …., dưới trực tràng, trên bóng đái”","answers":["A. Chứa đựng, xoang chậu","B. Cung cấp dinh dưỡng, xoang chậu","C. Cung cấp dinh dưỡng, xoang bụng","D. Chứa đựng, xoang bụng"],"correct":1,"explanation":"Đáp án đúng là: Cung cấp dinh dưỡng, xoang chậu Vì: Tử cung là nơi cung cấp dinh dưỡng và phát triển của thai. Tử cung nằm trong xoang chậu, dưới trực tràng, trên bóng đái","reference":"Mục 10.2.3"},{"id":249,"text":"Âm đạo của gia súc cái có khả năng co giãn như thế nào?","answers":["A. Không có khả năng co giãn","B. Kém","C. Co giãn ở mức độ nhất định","D. Rất lớn"],"correct":3,"explanation":"Đáp án đúng là: Rất lớn Vì: Âm đạo có khả nãng co giãn rất lớn và là đường đi ra của thai.","reference":"Mục 10.2.4"},{"id":250,"text":"Thân tử cung của lợn có đặc điểm gì?","answers":["A. Dài, hình trụ, niêm mạc có nhiều nếp gấp nhăn nheo theo chiều dọc","B. Ngắn, niêm mạc có nhiều nếp gấp nhăn nheo theo chiều dọc","C. Ngắn, niêm mạc có nhiều nếp gấp dạng củ tròn hoặc bầu dục nhô bào lòng sừng","D. Dài, rộng, niêm mạc có nhiều nếp gấp nhăn nheo theo chiều dọc"],"correct":1,"explanation":"Đáp án đúng là: Ngắn, niêm mạc có nhiều nếp gấp nhăn nheo theo chiều dọc Vì: Thân tử cung ngắn, niêm mạc thân, sừng tử cung là những gấp nếp nhăn nheo theo chiều dọc.","reference":"Mục 10.2.3"},{"id":251,"text":"Prostatgladin được tiết ra ở nhau thai có tác dụng gì?","answers":["A. Xuất hiện đặc tính sinh dục thứ cấp","B. Co bóp cơ trơn tử cung khi đẻ","C. An thai","D. Sụt hông, sụt mông"],"correct":1,"explanation":"Đáp án đúng là: Co bóp cơ trơn tử cung khi đẻ Vì: Prostatgladin được tiết ra ở nhau thai có tác dụng co bóp cơ trơn tử cung khi đẻ","reference":"Mục 11.2.8"},{"id":252,"text":"Thùy sau của tuyến yên tiết ra chất tiết?","answers":["A. Progesteron","B. Oxytoxin","C. Cocticorteroit","D. Thyroxin"],"correct":1,"explanation":"Đáp án đúng là: Oxytoxin Vì: Thùy sau của tuyến yên tiết ra chất tiết là Oxytoxin","reference":"Mục 11.2.1"},{"id":253,"text":"Chất tiết của tuyến nội tiết được gọi là?","answers":["A. Nước tiểu","B. Hormone","C. Bài tiết","D. Mồ hôi"],"correct":1,"explanation":"Đáp án đúng là: Hormone Vì: Chất tiết được gọi là kích tố hay Hormone","reference":"Mục 11.1"},{"id":254,"text":"Điền từ còn thiếu vào chỗ trống: “Tuyến ức được bao bọc bởi … mỏng phát vách vào trong chia tuyến thành … thuỳ nhỏ. Phần ngoài (Vỏ) của tuyến màu thẫm, phần trong (Tuỷ) của tuyến màu sáng”.","answers":["A. Màng liên kết, nhiều","B. Màng sợi, 2","C. Màng liên kết, 2","D. Màng sợi, nhiều"],"correct":0,"explanation":"Đáp án đúng là: Màng liên kết, nhiều Vì: Tuyến ức được bao bọc bởi màng liên kết mỏng phát vách vào trong chia tuyến thành nhiều thuỳ nhỏ. Phần ngoài (Vỏ) của tuyến màu thẫm, phần trong (Tuỷ) của tuyến màu sáng","reference":"Mục 11.2.5"},{"id":255,"text":"Buồng trứng sản sinh ra hormone nào?","answers":["A. Relaxin","B. Oestrogen","C. Prolan A, B","D. Testosteron"],"correct":1,"explanation":"Đáp án đúng là: Oestrogen Vì: Buồng trứng sản sinh ra kích tố Oestradiol (Oestrogen) làm xuất hiện đặc tính thứ cấp ở con cái, điều hoà chu kỳ kinh nguyệt....","reference":"Mục 11.2.8"},{"id":256,"text":"Thiểu năng tuyến giáp trạng dẫn đến bệnh gì?","answers":["A. Rối loạn trao đổi chất","B. Bướu cổ","C. Bazedo","D. Co giật"],"correct":1,"explanation":"Đáp án đúng là: Bướu cổ Vì: Thiểu năng tuyến giáp trạng dẫn đến bệnh bướu cổ","reference":"Mục 11.2.3"},{"id":257,"text":"Cocticorteroit được sản sinh ra ở tuyến nào?","answers":["A. Vỏ thận","B. Bể thận","C. Miền tủy của tuyến thượng thận","D. Miền vỏ của tuyến thượng thận"],"correct":3,"explanation":"Đáp án đúng là: Miền vỏ của tuyến thượng thận Vì: Miền vỏ sản sinh các kích tố dạng Cocticorteroit kích thích chuyển hoá protít, điều hoà trao đổi Na, K, phát triển dấu hiệu sinh dục đực","reference":"Mục 11.2.6"},{"id":258,"text":"Tuyến tụy sản sinh ra kích tố nào?","answers":["A. Testosteron","B. Insuline","C. Adrenalin","D. Corticosteroit"],"correct":1,"explanation":"Đáp án đúng là: Insuline Vì: Tuyến tụy sản sinh ra kích tố Insuline có nhiệm vụ điều hoà trao đổi gluxit","reference":"Mục 11.2.7"},{"id":259,"text":"Tuyến nào dưới đây là tuyến vừa nội tiết, vừa ngoại tiết?","answers":["A. Tuyến giáp trạng","B. Tuyến thượng thận","C. Tuyến yên","D. Tuyến sinh dục"],"correct":3,"explanation":"Đáp án đúng là: Tuyến sinh dục Vì: Tuyến sinh dục vừa sản sinh hormone quyết định đặc tính sinh dục vừa sản sinh ra tế bào trứng (ở con cái), tế bào tinh trùng (ở con đực)","reference":"Mục 11.2"},{"id":260,"text":"Miền tủy của tuyến thượng thận sản sinh ra kích tố nào?","answers":["A. Testosteron","B. Adrenalin","C. Corticosteroit","D. Insuline"],"correct":1,"explanation":"Đáp án đúng là: Adrenalin Vì: Miển tuỷ sản sinh kích tố dạng Adrenalin liên quan đến hoạt động tim mạch.","reference":"Mục 11.2.6"},{"id":261,"text":"Tuyến nội tiết là tuyến như thế nào?","answers":["A. Không tập trung một chỗ","B. Tuyến có ống dẫn","C. Tuyến không có ống dẫn","D. Tập trung một chỗ"],"correct":2,"explanation":"Đáp án đúng là: Tuyến không có ống dẫn Vì: Tuyến nội tiết là tuyến không có ống dẫn, chất tiết được gọi là kích tố hay Hormone. Chất tiết này được đổ thẳng vào máu hoặc dịch não tuỷ và được vận chuyển tới các cơ quan .","reference":"Mục 11.1"},{"id":262,"text":"Tuyến ức của gia súc gồm có ấy phần?","answers":["A. 5","B. 3","C. 4","D. 2"],"correct":3,"explanation":"Đáp án đúng là: 2 Vì: Tuyến ức gồm có 2 phần là phần cổ và phần ngực","reference":"Mục 11.2.5"},{"id":263,"text":"Testosteron của con đực được tiết ra ở tế bào nào?","answers":["A. Tế bào kẽ (Laydic)","B. Tế bào tuyến giáp","C. Tế bào thần kinh","D. Tế bào biểu bì"],"correct":0,"explanation":"Đáp án đúng là: Tế bào kẽ (Laydic) Vì: Testosteron của con đực được tiết ra ở tế bào kẽ (laydic)","reference":"Mục 11.2.8"},{"id":264,"text":"Các tuyến nội tiết trong cơ thể gia súc thường phân bố như thế nào?","answers":["A. Phân bố không đều","B. Chỉ ở một số vị trí nhất định","C. Phân tán nhiều nơi","D. Tập trung một chỗ"],"correct":2,"explanation":"Đáp án đúng là: Phân tán nhiều nơi Vì: Trong cơ thể, các tuyến nội tiết không tập trung một chỗ mà phân tán ở nhiều nơi, hình dáng kích thước của tuyến cũng khác nhau","reference":"Mục 11.1"},{"id":265,"text":"Hormone chủ yếu của tuyến giáp trạng là?","answers":["A. Progesteron","B. Cocticorteroit","C. Parathyrocine","D. Thyroxin"],"correct":3,"explanation":"Đáp án đúng là: Thyroxin Vì: Hormone chủ yếu của tuyến giáp trạng là Thyroxin","reference":"Mục 11.2.3"},{"id":266,"text":"Điền từ còn thiếu vào chỗ còn trống: “Tuyến yên là một …. hình trứng nằm ở lõm yên của thân xương bướm phía dưới hộp sọ. Tuyến yên có liên hệ với não …..”?","answers":["A. Tuyến kép, tủy","B. Tuyến lẻ, tủy","C. Tuyến lẻ, trung gian","D. Tuyến kép, trung gian"],"correct":2,"explanation":"Đáp án đúng là: Tuyến lẻ, trung gian Vì: Tuyến yên là một tuyến lẻ hình trứng nằm ở lõm yên của thân xương bướm phía dưới hộp sọ. Tuyến yên có liên hệ với não trung gian.","reference":"Mục 11.2.1"},{"id":267,"text":"Điền từ còn thiếu vào chỗ trống: “ Tuyến giáp trạng nằm … thanh quản và … các sụn khí quản đầu tiên , gồm có … thuỳ , tuỳ theo loài động vật mà có eo nối to hay nhỏ khác nhau ” .","answers":["A. Sau, trên, 2","B. Trước, sau, 2","C. Trước, dưới, 2","D. Sau, trước, 2"],"correct":3,"explanation":"Đáp án đúng là: Sau, trước, 2 Vì: Tuyến giáp trạng nằm sau thanh quản và trước các sụn khí quản đầu tiên, gồm có 2 thuỳ, tuỳ theo loài động vật mà có eo nối to hay nhỏ khác nhau .","reference":"Mục 11.2.3"},{"id":268,"text":"Kích tố thể vàng progesteron có tác dụng gì?","answers":["A. Xuất hiện đặc tính sinh dục thứ cấp","B. Tăng cường co bóp cơ trơn","C. An thai","D. Tăng cường trao đổi chất"],"correct":2,"explanation":"Đáp án đúng là: An thai Vì: Kích tố thể vàng Progesteron được tiết ra sau khi trứng chín rụng, tác dụng an thai (tiết theo chu kỳ), tăng mối quan hệ mẹ con","reference":"Mục 11.2.8"},{"id":269,"text":"Tuyến ức phát triển mạnh nhất khi con vật ở giai đoạn nào?","answers":["A. Thời kỳ bú mẹ","B. Trưởng thành","C. Trong bào thai và thời kỳ bú mẹ","D. Trong bào thai và mới sinh"],"correct":2,"explanation":"Đáp án đúng là: Trong bào thai và thời kỳ bú mẹ Vì: Tuyến ức phát triển mạnh khi con vật còn trong bào thai và khi còn non (thời kỳ bú mẹ). Ở con vật trưởng thành tuyến ức teo biến","reference":"Mục 11.2.5"},{"id":270,"text":"Kích sinh dục tố (GSH) có tác dụng gì?","answers":["A. Kích thích tuyến vú phát triển","B. Kích thích cơ thể sinh trưởng phát triển","C. Kích thích phát triển và biến đổi cơ quan sinh dục con đực và con cái","D. Kích thích miền vỏ tuyến thượng thận"],"correct":2,"explanation":"Đáp án đúng là: Kích thích phát triển và biến đổi cơ quan sinh dục con đực và con cái Vì: Kích sinh dục tố: Gonado stimulin hormone (GSH): Kích sinh dục tố này có: Kích noãn bào tố: Folliculo stimulin hormone (FSH) và kích hoàng thể tố: Luteino stimulin hormone (LH)     Kích thích phát triển và biến đổi cơ quan sinh dục con đực và con cái","reference":"Mục 11.1.2"},{"id":271,"text":"Chất tiết của tuyến cận giáp trạng có chức phận gì?","answers":["A. Điều hòa sự trao đổi canxi và photpho","B. Điều hòa sự trao đổi glucose","C. Điều hòa sự trao đổi khoáng","D. Điều hòa sự trao đổi lipit"],"correct":0,"explanation":"Đáp án đúng là: Điều hòa sự trao đổi canxi và photpho Vì: Chất tiết của tuyến cận giáp trạng có chức phận điều hòa sự trao đổi canxi và photpho","reference":"Mục 11.2.4"},{"id":272,"text":"Tuyến tùng còn có tên gọi khác là gì?","answers":["A. Tuyến mấu não trên","B. Não trung gian","C. Tuyến mấu não giữa","D. Tuyến mấu não dưới"],"correct":0,"explanation":"Đáp án đúng là: Tuyến mấu não trên Vì: Tuyến tùng còn có tên gọi khác là tuyến mấu não trên","reference":"Mục 11.2.2"},{"id":273,"text":"Tuyến yên được chia làm mấy thùy?","answers":["A. 4","B. 5","C. 3","D. 2"],"correct":2,"explanation":"Đáp án đúng là: 3 Vì: Thùy trước, thùy giữa, thùy sau","reference":"Mục 11.2.1"},{"id":274,"text":"Tuyến nào dưới đây là tuyến hoàn toàn nội tiết?","answers":["A. Tuyến thượng thận","B. Tuyến tụy","C. Tuyến sinh dục","D. Tuyến gan"],"correct":0,"explanation":"Đáp án đúng là: Tuyến thượng thận Vì: tuyến thượng thận chỉ có chức năng nội tiết","reference":"Mục 11.2"},{"id":275,"text":"Điền từ còn thiếu vào chỗ trống: “Tuyến thượng thận gồm … nằm phía trước 2 quả thận …, cấu tạo chia thành 2 vùng có nguồn gốc từ những lá phôi bì khác nhau và có chức năng khác nhau”.","answers":["A. Thể dẹp, hai bên cột sống","B. 2 thể dẹp, hai bên cột sống","C. 2 thể dẹp, màu nâu","D. Thể dẹp, màu nâu"],"correct":1,"explanation":"Đáp án đúng là: 2 thể dẹp, hai bên cột sống Vì: Tuyến thượng thận gồm gồm 2 thể dẹp nằm phía trước 2 quả thận hai bên cột sống, cấu tạo chia thành 2 vùng có nguồn gốc từ những lá phôi bì khác nhau và có chức năng khác nhau","reference":"Mục 11.2.6"},{"id":276,"text":"Tủy sống còn là trung khu của thần kinh nào?","answers":["A. Ngoại biên","B. Động vật","C. Trung ương","D. Thực vật"],"correct":3,"explanation":"Đáp án đúng là: Thực vật Vì: Tuỷ sống còn là trung khu của thần kinh thực vật","reference":"Mục 12.2.1"},{"id":277,"text":"Hệ thần kinh được chia làm mấy phần chính?","answers":["A. 3","B. 2","C. 5","D. 4"],"correct":1,"explanation":"Đáp án đúng là: 2 Vì: Phần thần kinh có tính động vật và phần thần kinh có tính thực vật","reference":"Mục 12.1"},{"id":278,"text":"Điền vào chỗ còn trống: “Củ não sinh tư nằm trên trước….não, dưới và sau tầng thị giác, khuất dưới…”","answers":["A. Cuống, tiểu não","B. Tiểu não, hành não","C. Hành, đại não","D. Cuống, bán cầu não"],"correct":3,"explanation":"Đáp án đúng là: Cuống, bán cầu não Vì: Củ não sinh tư nằm trên trước cuống não, dưới và sau tầng thị giác, khuất dưới bán cầu não","reference":"Mục 12.2.1"},{"id":279,"text":"Điền vào chỗ còn thiếu: “Cùng não hay còn gọi là …, đó là phần lớn nhất của não, nó chiếm … xoang sọ”.","answers":["A. Não cuối, 3/4","B. Não trước, 3/4","C. Não cuối, 1/2","D. Não giữa, 3/4"],"correct":0,"explanation":"Đáp án đúng là: Não cuối, 3/4 Vì: Cùng não hay còn gọi là não cuối, đó là phần lớn nhất của não, nó chiếm 3/4 xoang sọ","reference":"Mục 12.2.1"},{"id":280,"text":"Điền các từ còn thiếu vào chỗ trống: “Các dây phó giao cảm xuất phát từ .... mượn đường đi của các dây thần kinh ....”","answers":["A. Não bộ, động vật","B. Hành não, động vật","C. Não bộ, thực vật","D. Hành não, thực vật"],"correct":0,"explanation":"Đáp án đúng là: Não bộ, động vật Vì: Các dây phó giao cảm xuất phát từ não bộ mượn đường đi của các dây thần kinh động vật","reference":"Mục 12.3.4"},{"id":281,"text":"Thần kinh giao cảm có chức năng chủ yếu là gì?","answers":["A. Bảo vệ, giảm hoạt động của tim và hô hấp","B. Dinh dưỡng, tăng cường oxi hóa, giảm hoạt động của tim và hô hấp","C. Bảo vệ, tăng hoạt động của tim và hô hấp","D. Dinh dưỡng, tăng cường oxi hóa, tăng hoạt động của tim và hô hấp"],"correct":3,"explanation":"Đáp án đúng là: Dinh dưỡng, tăng cường oxi hóa, tăng hoạt động của tim và hô hấp Vì: Dinh dưỡng, tăng cường oxi hóa, tăng hoạt động của tim và hô hấp","reference":"Mục 12.3.3"},{"id":282,"text":"Buồng não gồm có bao nhiêu buồng?","answers":["A. 2","B. 5","C. 4","D. 3"],"correct":2,"explanation":"Đáp án đúng là: 4 Vì: Buồng não gồm có 4 buồng. Trong các buồng não có dịch não tuỷ (gồm buồng não 1, buồng não 2, buồng não 3, buồng não 4)","reference":"Mục 12.2.1"},{"id":283,"text":"Hành não có chức năng gì?","answers":["A. Là trung khu sinh mệnh của cơ thể","B. Trung khu phản xạ thị và thính giác","C. Tham gia vào quá trình trao đổi chất","D. Giữ thăng bằng và phối hợp vận động"],"correct":0,"explanation":"Đáp án đúng là: Là trung khu sinh mệnh của cơ thể Vì: Là trung khu sinh mệnh của cơ thể","reference":"Mục 12.2.1"},{"id":284,"text":"Đơn vị cấu tạo cơ bản của hệ thần kinh là?","answers":["A. Mô thần kinh","B. Tế bào dẫn truyền","C. Neuron","D. Tế bào thần kinh đệm"],"correct":2,"explanation":"Đáp án đúng là: Neuron Vì: Đơn vị cấu tạo cơ bản của hệ thần kinh là tế bào thần kinh hay Neuron. Mỗi Neuron đều có kiểu cấu trúc chung cơ bản là thân và các nhánh. Thân trong đó có nhân, nhánh có 2 loại: Nhánh dài gọi là sợi trục, nhánh ngắn tua ra gọi là nhánh sợi gai.","reference":"Mục 12.1"},{"id":285,"text":"Trong 5 phần của bộ não thì phần nào là quan trọng nhất?","answers":["A. Trung não","B. Hậu não","C. Gian não","D. Cùng não","E. Hành não"],"correct":4,"explanation":"Đáp án đúng là: Hành não Vì: Hành não là trung khu sinh mệnh của cơ thể","reference":"Mục 12.2.1"},{"id":286,"text":"Chức năng của thần kinh phó giao cảm?","answers":["A. Dinh dưỡng, tăng cường ô xy hoá, tăng cường hoạt động của tim, hô hấp","B. Dinh dưỡng, tăng cường ô xy hoá, làm giảm hoạt động của tim","C. Bảo vệ, co hẹp đồng tử (con ngươi), tăng cường hoạt động của tim, hô hấp","D. Bảo vệ, co hẹp đồng tử (con ngươi), làm giảm hoạt động của tim"],"correct":0,"explanation":"Đáp án đúng là: Dinh dưỡng, tăng cường ô xy hoá, tăng cường hoạt động của tim, hô hấp Vì: Chức năng của thần kinh phó giao cảm là dinh dưỡng, tăng cường ô xy hoá, tăng cường hoạt động của tim, hô hấp","reference":"Mục 12.3.2"},{"id":287,"text":"Thần kinh ngoại biên được phân loại làm mấy loại?","answers":["A. 2","B. 4","C. 3","D. 5"],"correct":0,"explanation":"Đáp án đúng là: 2 Vì: Thần kinh thực vật phân loại có 2 phần là Thần kinh giao cảm và thần kinh phó giao cảm","reference":"Mục 12.3.2"},{"id":288,"text":"5 phần của não bộ gồm?","answers":["A. Hành não, hậu não, trung não, gian não, đại não","B. Hành não, hậu não, gian não, cùng não, đại não","C. Hành não, hậu não, trung não, gian não, cùng não","D. Hành não, hậu não, trung não, gian não, tiểu não"],"correct":2,"explanation":"Đáp án đúng là: Hành não, hậu não, trung não, gian não, cùng não Vì: 5 phần của não bộ gồm : Hành não, hậu não, trung não, gian não, cùng não","reference":"Mục 12.2.1"},{"id":289,"text":"Màng não có?","answers":["A. Màng cứng sọ, màng nhện, màng nuôi","B. Màng cứng, màng nhện, màng nuôi","C. Màng cứng sọ, màng cứng tủy sống, màng nhện","D. Màng cứng sọ, màng nhện, màng mạch"],"correct":1,"explanation":"Đáp án đúng là: Màng cứng, màng nhện, màng nuôi Vì: Màng não có màng cứng, màng nhện, màng nuôi","reference":"Mục 12.2.1"},{"id":290,"text":"Màng mạch còn có tên gọi khác là?","answers":["A. Màng liên kết","B. Màng cứng","C. Màng nuôi","D. Màng nhện"],"correct":2,"explanation":"Đáp án đúng là: Màng nuôi Vì: Màng mạch còn có tên gọi khác là màng nuôi","reference":"Mục 12.2.1"},{"id":291,"text":"Điền vào chỗ trống trong câu sau: “Trung ương thần kinh là .... nằm trong não bộ và tuỷ sống”","answers":["A. Hành não","B. Nhân xám","C. Đại não","D. Não bộ"],"correct":1,"explanation":"Đáp án đúng là: Nhân xám Vì: Trung ương thần kinh là nhân xám nằm trong não bộ và tuỷ sống","reference":"Mục 12.3.1"},{"id":292,"text":"Điền từ vào chỗ trống: “Thần kinh thực vật còn gọi là thần kinh .......... vì nó điều kiển các cơ quan nội quan thực hiện các chức năng của cơ thể như dinh dưỡng, sinh sản, tuần hoàn, thể dịch... hoàn toàn chủ động ..........”.","answers":["A. Tự chủ, không theo ý muốn","B. Không tự chủ, không theo ý muốn","C. Tự chủ, theo ý muốn","D. Không tự chủ, theo ý muốn"],"correct":0,"explanation":"Đáp án đúng là: Tự chủ, không theo ý muốn Vì: Thần kinh thực vật còn gọi là thần kinh tự chủ vì nó điều kiển các cơ quan nội quan thực hiện các chức năng của cơ thể như dinh dưỡng, sinh sản, tuần hoàn, thể dịch... hoàn toàn chủ động không theo ý muốn","reference":"Mục 12.3"},{"id":293,"text":"Dây thần kinh não bộ có bao nhiêu đôi?","answers":["A. 11","B. 13","C. 10","D. 12"],"correct":3,"explanation":"Đáp án đúng là: 12 Vì: Dây thần kinh não bộ có 12 đôi dây thần kinh","reference":"Mục 12.2.2"},{"id":294,"text":"Thần kinh có tính thực vật có thể điều khiển sự hoạt động của cơ nào?","answers":["A. Cơ tim","B. Cơ trơn","C. Cơ vân","D. Cơ xương"],"correct":1,"explanation":"Đáp án đúng là: Cơ trơn Vì: Phần thần kinh có tính thực vật điều khiển sự hoạt động của cơ trơn các nội quan (Tiêu hoá, hô hấp, tuần hoàn, tiết niệu, sinh dục...). Hoạt động không tự chủ hay còn gọi là không theo ý muốn.","reference":"Mục 12.1"},{"id":295,"text":"Bán cầu đại não có mấy cực?","answers":["A. 2","B. 3","C. 5","D. 4"],"correct":1,"explanation":"Đáp án đúng là: 3 Vì: Bán cầu đại não có 3 cực lớn, đó là cực trán ở phía trước (Polus ữontalis), cực chẩm ớ phía sau (Polus occipitalis), cực thái dương ờ bên ngoài (Polus temporalis).","reference":"Mục 12.2.1"},{"id":296,"text":"Dây thần kinh tuỷ sống chia ra làm mấy vùng?","answers":["A. 5 vùng: Cổ, ngực, lưng, hông, khum","B. 5 vùng: Cổ, ngực, lưng, khum, đuôi","C. 4 vùng: Cổ, ngực, lưng, hông","D. 4 vùng: Cổ, ngực, lưng, khum"],"correct":3,"explanation":"Đáp án đúng là: 4 vùng: Cổ, ngực, lưng, khum Vì: Dây thần kinh tuỷ sống chia ra làm 4 vùng: Cổ, ngực, lưng, khum","reference":"Mục 12.2.2"},{"id":297,"text":"Thần kinh có tính động vật có thể điều khiển sự hoạt động của cơ nào?","answers":["A. Cơ xương","B. Cơ trơn","C. Cơ tim","D. Cơ vân"],"correct":3,"explanation":"Đáp án đúng là: Cơ vân Vì: Thần kinh có tính động vật có thể điều khiển sự hoạt động của cơ vân, gây nên sự hoạt động cơ, xương và một số cơ quan trong cơ thể như: Lưỡi, hầu, thanh quản. Loại này còn gọi là thần kinh tự chủ.","reference":"Mục 12.1"},{"id":298,"text":"Não bộ của gia súc gồm mấy phần?","answers":["A. 5","B. 4","C. 7","D. 6"],"correct":0,"explanation":"Đáp án đúng là: 5 Vì: Não bộ của gia súc gồm 5 phần: Hành não, hậu não, trung não, gian não, cùng não","reference":"Mục 12.2.1"},{"id":299,"text":"Điền từ còn thiếu vào chỗ trống: “Trung khu của thần kinh giao cảm nằm ở sừng bên chất xám tuỷ sống từ đốt ... (cổ 8) đến đốt ..., từ trung khu các sợi giao cảm đi ra ngoài tuỷ sống tạo thành chuỗi hạch giao cảm”.","answers":["A. Lưng 1, hông 4","B. Lưng 1, lưng 12","C. Lưng 1, lưng 4","D. Lưng 1, hông 1"],"correct":0,"explanation":"Đáp án đúng là: Lưng 1, hông 4 Vì: Trung khu của thần kinh giao cảm nằm ở sừng bên chất xám tuỷ sống từ đốt lưng 1 (cổ 8) đến đốt hông 4, từ trung khu các sợi giao cảm đi ra ngoài tuỷ sống tạo thành chuỗi hạch giao cảm","reference":"Mục 12.3.3"},{"id":300,"text":"Điền các từ còn thiếu: “... có tác dụng điều hoá áp lực trong hộp sọ, làm giảm chấn động ngoài hộp sọ; hoà và dẫn các kích tố, làm môi trường chuyển các chất do quá trình trao đổi chất của não sinh ra, duy trì các thành phần các loại muối khoáng và áp suất thẩm thấu của ...”.","answers":["A. Não tuỷ, hệ thần kinh","B. Dịch não tuỷ, hệ thần kinh","C. Dịch não tuỷ, hệ thần kinh trung ương","D. Não tuỷ, hệ thần kinh trung ương"],"correct":2,"explanation":"Đáp án đúng là: Dịch não tuỷ, hệ thần kinh trung ương Vì: Dịch não tuỷ có tác dụng điều hoá áp lực trong hộp sọ, làm giảm chấn động ngoài hộp sọ; hoà và dẫn các kích tố, làm môi trường chuyển các chất do quá trình trao đổi chất của não sinh ra, duy trì các thành phần các loại muối khoáng và áp suất thẩm thấu của hệ thần kinh trung ương","reference":"Mục 12.2.1"}];
</script>

<script>
(function () {
  var LETTERS = "ABCDEFGHIJ";
  var container = document.getElementById("questionContainer");
  var noResults = document.getElementById("noResults");
  var searchInput = document.getElementById("searchInput");
  var searchClear = document.getElementById("searchClear");
  var countEl = document.getElementById("searchCount");
  var total = QUESTIONS.length;

  /* ── Escape HTML ── */
  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  /* ── Highlight từ khóa ── */
  function highlight(text, term) {
    if (!term) return esc(text);
    var safe = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return esc(text).replace(
      new RegExp("(" + safe.replace(/&amp;/g, "&amp;amp;") + ")", "gi"),
      "<mark>$1</mark>"
    );
  }

  /* ── Render 1 câu hỏi ── */
  function renderQ(q, term) {
    var answersHtml = q.answers.map(function (ans, i) {
      var isCorrect = i === q.correct;
      var cls = "answer-item" + (isCorrect ? " correct" : "");
      var check = isCorrect ? '<span class="check-mark">&#10003;</span>' : "";
      return (
        '<div class="' + cls + '">' +
        '<span class="answer-letter">' + (LETTERS[i] || i + 1) + ".</span>" +
        '<span class="answer-text">' + highlight(ans, term) + "</span>" +
        check +
        "</div>"
      );
    }).join("");

    var feedbackHtml = "";
    if (q.explanation || q.reference) {
      feedbackHtml =
        '<div class="feedback-section">' +
        (q.explanation
          ? "<p><strong>Vì: </strong>" + esc(q.explanation) + "</p>"
          : "") +
        (q.reference
          ? "<p><strong>Tham khảo: </strong>" + esc(q.reference) + "</p>"
          : "") +
        "</div>";
    }

    return (
      '<div class="question-block" id="q' + q.id + '">' +
      '<div class="question-header">' +
      '<span class="q-badge">Câu ' + q.id + "</span>" +
      "</div>" +
      '<div class="question-text">' + highlight(q.text, term) + "</div>" +
      '<div class="answers">' + answersHtml + "</div>" +
      feedbackHtml +
      "</div>"
    );
  }

  /* ── Render danh sách câu hỏi ── */
  function renderList(filtered, term) {
    // Xóa các block cũ (giữ lại #noResults)
    var old = container.querySelectorAll(".question-block");
    old.forEach(function (el) { el.remove(); });

    if (filtered.length === 0) {
      noResults.style.display = "block";
    } else {
      noResults.style.display = "none";
      var frag = document.createDocumentFragment();
      filtered.forEach(function (q) {
        var div = document.createElement("div");
        div.innerHTML = renderQ(q, term);
        frag.appendChild(div.firstChild);
      });
      container.appendChild(frag);
    }

    countEl.innerHTML =
      "<strong>" + filtered.length + "</strong> / " + total + " câu";
  }

  /* ── Lọc câu hỏi ── */
  function doSearch(term) {
    var t = term.trim().toLowerCase();
    var filtered = t
      ? QUESTIONS.filter(function (q) {
          return (
            q.text.toLowerCase().includes(t) ||
            q.answers.some(function (a) { return a.toLowerCase().includes(t); })
          );
        })
      : QUESTIONS;

    searchClear.style.display = term ? "block" : "none";
    renderList(filtered, term.trim());
  }

  /* ── Khởi tạo ── */
  renderList(QUESTIONS, "");

  searchInput.addEventListener("input", function () {
    doSearch(this.value);
  });
  searchClear.addEventListener("click", function () {
    searchInput.value = "";
    doSearch("");
    searchInput.focus();
  });

  /* ── Scroll to top ── */
  var scrollBtn = document.getElementById("scrollTopBtn");
  window.addEventListener("scroll", function () {
    scrollBtn.style.display = window.scrollY > 320 ? "flex" : "none";
  }, { passive: true });
  scrollBtn.addEventListener("click", function (e) {
    e.preventDefault();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
})();
</script>
</body>
</html>
