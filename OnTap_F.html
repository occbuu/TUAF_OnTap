<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn Tập - Giải phẫu động vật  (300 câu)</title>
<style>
:root {
  --blue:      #2563eb;
  --blue-dark: #1e40af;
  --blue-bg:   #eff6ff;
  --green:     #16a34a;
  --green-bg:  #f0fdf4;
  --green-bd:  #86efac;
  --yellow-bg: #fefce8;
  --yellow-bd: #fde047;
  --gray:      #6b7280;
  --gray-lt:   #f3f4f6;
  --border:    #e5e7eb;
  --text:      #111827;
  --radius:    12px;
  --shadow:    0 1px 4px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f1f5f9; color: var(--text);
  line-height: 1.65; font-size: 15px;
}

/* ── HEADER ── */
.page-header {
  background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%);
  color: #fff; padding: 28px 20px 22px; text-align: center;
  position: relative;
}
.page-header h1 { font-size: clamp(1.1em, 4vw, 1.7em); font-weight: 700; margin-bottom: 5px; }
.page-header p  { opacity: .85; font-size: .88em; }
.back-btn {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,.18); border: 1.5px solid rgba(255,255,255,.35);
  color: #fff; padding: 6px 13px; border-radius: 7px;
  text-decoration: none; font-size: .82em; font-weight: 600;
  white-space: nowrap; transition: background .15s; line-height: 1.4;
}
.back-btn:hover { background: rgba(255,255,255,.3); }
@media (max-width: 480px) {
  .back-btn { position: static; transform: none; display: inline-block;
              margin-bottom: 10px; font-size: .8em; }
  .page-header { padding-top: 16px; }
}

/* ── SEARCH BAR ── */
.search-wrap {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
.search-inner {
  max-width: 860px; margin: 0 auto;
  display: flex; align-items: center; gap: 10px;
}
.search-box { flex: 1; position: relative; }
.search-box input {
  width: 100%; padding: 9px 36px 9px 38px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: .95em; outline: none; background: var(--gray-lt);
  transition: border-color .15s, background .15s;
  -webkit-appearance: none;
}
.search-box input:focus { border-color: var(--blue); background: #fff; }
.search-icon {
  position: absolute; left: 11px; top: 50%;
  transform: translateY(-50%); color: var(--gray);
  pointer-events: none; font-size: 1em;
}
.search-clear {
  position: absolute; right: 9px; top: 50%;
  transform: translateY(-50%); background: none; border: none;
  cursor: pointer; color: var(--gray); font-size: 1.1em;
  padding: 2px 4px; display: none; line-height: 1; border-radius: 50%;
}
.search-clear:hover { color: #111; background: var(--gray-lt); }
.search-count {
  white-space: nowrap; font-size: .88em; color: var(--gray);
  min-width: 90px; text-align: right;
}
.search-count strong { color: var(--blue-dark); }

/* ── CONTAINER ── */
.container {
  max-width: 860px; margin: 18px auto;
  padding: 0 14px 80px;
}

/* ── QUESTION CARD ── */
.question-block {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 16px;
  border-left: 4px solid var(--blue);
  overflow: hidden;
  transition: box-shadow .15s;
}
.question-block:hover {
  box-shadow: 0 2px 8px rgba(0,0,0,.12), 0 6px 20px rgba(0,0,0,.08);
}

.question-header {
  display: flex; align-items: center; gap: 8px;
  background: var(--blue-bg); padding: 8px 14px;
  border-bottom: 1px solid #dbeafe;
}
.q-badge {
  background: var(--blue); color: #fff;
  border-radius: 20px; padding: 1px 9px;
  font-size: .78em; font-weight: 700; letter-spacing: .3px;
}

.question-text {
  padding: 14px 16px 8px;
  font-size: 1em; font-weight: 500; color: #1e293b;
}
.question-text mark {
  background: #fef08a; color: inherit;
  border-radius: 3px; padding: 0 2px;
}

/* ── ANSWERS ── */
.answers {
  padding: 4px 16px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.answer-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 12px; border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--gray-lt);
}
.answer-item.correct {
  background: var(--green-bg);
  border-color: var(--green-bd);
  font-weight: 600;
}
.answer-letter {
  font-weight: 700; font-size: .9em;
  width: 22px; flex-shrink: 0; padding-top: 1px; color: var(--gray);
}
.answer-item.correct .answer-letter { color: var(--green); }
.answer-text {
  flex: 1; color: #374151; font-size: .95em;
}
.answer-item.correct .answer-text { color: #14532d; }
.answer-text mark {
  background: #bbf7d0; color: inherit;
  border-radius: 3px; padding: 0 2px;
}
.check-mark {
  flex-shrink: 0; margin-left: auto; padding-left: 6px;
  color: var(--green); font-weight: 700;
}

/* ── FEEDBACK ── */
.feedback-section {
  background: var(--yellow-bg);
  border-top: 1.5px solid var(--yellow-bd);
  padding: 10px 16px; font-size: .875em; color: #44403c;
}
.feedback-section p { margin: 3px 0; }
.feedback-section strong { color: #1c1917; }

/* ── EMPTY STATE ── */
#noResults {
  display: none; text-align: center;
  padding: 60px 20px; color: var(--gray);
}
#noResults .nr-icon { font-size: 2.5em; margin-bottom: 12px; }
#noResults p { font-size: .95em; }

/* ── SCROLL TOP ── */
#scrollTopBtn {
  position: fixed; bottom: 20px; right: 16px;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--blue); color: #fff; border: none;
  font-size: 1.3em; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 3px 10px rgba(37,99,235,.4);
  transition: background .15s, transform .15s;
  z-index: 200; text-decoration: none;
  line-height: 44px; text-align: center;
}
#scrollTopBtn:hover { background: var(--blue-dark); transform: translateY(-2px); }

/* ── MOBILE ── */
@media (max-width: 600px) {
  body { font-size: 14px; }
  .page-header { padding: 18px 14px 14px; }
  .container { margin: 12px auto; padding: 0 10px 80px; }
  .question-text { padding: 12px 12px 6px; }
  .answers { padding: 4px 12px 10px; gap: 5px; }
  .answer-item { padding: 7px 10px; }
  .feedback-section { padding: 9px 12px; }
  .search-count { display: none; }
}
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-btn">&#8592; Trang ch&#7911;</a>
  <h1>Ôn Tập Giải phẫu động vật </h1>
  <p>Câu hỏi trắc nghiệm có đáp án &mdash; Nguồn: </p>
</div>

<div class="search-wrap">
  <div class="search-inner">
    <div class="search-box">
      <span class="search-icon">&#128269;</span>
      <input type="search" id="searchInput"
             placeholder="Tìm câu hỏi hoặc đáp án..." autocomplete="off">
      <button class="search-clear" id="searchClear" title="Xóa">&#10005;</button>
    </div>
    <div class="search-count" id="searchCount">
      <strong>300</strong> / 300 câu
    </div>
  </div>
</div>

<div class="container" id="questionContainer">
  <div id="noResults">
    <div class="nr-icon">&#128269;</div>
    <p>Không tìm thấy câu hỏi phù hợp.</p>
  </div>
</div>

<a href="#" id="scrollTopBtn" title="Lên đầu trang">&#8679;</a>

<script>
const QUESTIONS = [{"id":1,"text":"Loại xương nào dưới đây được xếp vào nhóm xương dài?","answers":["A. Xương đốt sống","B. Xương đùi","C. Xương sườn","D. Xương ức"],"correct":1,"explanation":"Đáp án đúng là: Xương đùi Vì: Là xương dài, có 1 thân và 2 đầu","reference":"Mục 1.2.1"},{"id":2,"text":"Hệ xương của động vật phát sinh từ?","answers":["A. Nội bì của phôi","B. Trung bì của phôi","C. Ngoại bì","D. Biểu bì"],"correct":1,"explanation":"Đáp án đúng là : Trung bì của phôi Vì: Trung bì phôi là tế các bào phát triển thành xương, cơ, thận và hệ sinh sản","reference":"Mục 1.1"},{"id":3,"text":"Khớp nào có khả năng hoạt động cao?","answers":["A. Khớp toàn động","B. Khớp bất động","C. Khớp tự động","D. Khớp bán động"],"correct":0,"explanation":"Đáp án đúng là: Khớp toàn động Vì: là khớp có khả năng cử động linh hoạt/ hoạt động cao tạo nên sự di chuyển của con vật","reference":"Mục 1.3"},{"id":4,"text":"Điền vào chỗ trống sau đây: “Xương bướm nằm ở…., ở giữa là…. Mặt dưới có…. làm chỗ bám cho cơ thẳng trước đầu, ở đường trung tuyến có mào sắc”?","answers":["A. Đáy sọ, thân, 2 củ","B. Đáy sọ, thân, 4 củ","C. Đáy sọ, đầu, 4 củ","D. Đỉnh sọ, đầu, 2 củ"],"correct":0,"explanation":"Đáp án đúng là: Đáy sọ, thân, 2 củ Vì: Xương bướm nằm ở đáy sọ, ở giữa là thân. Mặt dưới có 2 củ làm chỗ bám cho cơ thẳng trước đầu, ở đường trung tuyến có mào sắc.","reference":"Mục 1.5.1"},{"id":5,"text":"Xương thiệt là bộ phận ….. nằm trong quãng nội hàm có tác dụng đỡ gốc lưỡi, hầu và thanh quản?","answers":["A. Cấu tạo bằng xương","B. Cấu tạo bằng xương và cơ","C. Vừa xương, vừa sụn","D. Cấu tạo bằng sụn"],"correct":2,"explanation":"Đáp án đúng là: Vừa xương, vừa sụn Vì: Xương thiệt là bộ phận vừa xương, vừa sụn nằm trong quãng nội hàm có tác dụng đỡ gốc lưỡi, hầu và thanh quản","reference":"Mục 1.5.2"},{"id":6,"text":"Điền vào chỗ trống sau đây: “Xương thái dương ở 2 bên phía dưới thành bên xoang sọ, gồm …. mảnh dính vào nhau là:…..”?","answers":["A. 3, Mảnh trai, bóng nhĩ, mảnh đá","B. 2, Mảnh nhĩ, mảnh đá","C. 2, Mảnh trai, mảnh đá","D. 3, Mảnh trai , mảnh nhĩ , mảnh đá"],"correct":3,"explanation":"Đáp án đúng là: 3, Mảnh trai, mảnh nhĩ, mảnh đá Vì: Xương thái dương ở 2 bên phía dưới thành bên xoang sọ, gồm có 3 mảnh dính vào nhau là mảnh trai, mảnh nhĩ, mảnh đá.","reference":"Mục 1.5.1"},{"id":7,"text":"Thân trước xương hàm dưới có …. chân răng cửa?","answers":["A. 4 lỗ","B. 6 lỗ","C. 7 lỗ","D. 8 lỗ"],"correct":1,"explanation":"Đáp án đúng là: 6 lỗ Vì: Thân trước xương hàm có 6 lỗ chân răng cửa","reference":"Mục 1.5.2"},{"id":8,"text":"Khẳng định nào dưới đây về “xương ống cuộn” là đúng?","answers":["A. Là phiến xương mỏng, bám vào mặt trong xương hàm","B. Là những phiến xương mỏng, nằm ở giữa đường trung tuyến của xoang mũi","C. Là phiến xương mỏng, bám vào đường sống chạy dài mặt trong xương mũi","D. Là những phiến xương mỏng, cuộn lại nằm trong xoang mũi"],"correct":3,"explanation":"Đáp án đúng là: Là những phiến xương mỏng, cuộn lại nằm trong xoang mũi Vì: Xương ống cuộn là những phiến xương mỏng, cuộn lại nằm trong xoang mũi.","reference":"Mục 1.5.2"},{"id":9,"text":"Vị trí của xương sàng?","answers":["A. Nằm ở đáy sọ, ở giữa là thân","B. Nằm sau giữa sọ và mặt, trước xương bướm","C. Nằm sau giữa sọ và mặt, sau xương bướm","D. Nằm ở đáy sọ, trước xương bướm"],"correct":1,"explanation":"Đáp án đúng là: Nằm sau giữa sọ và mặt, trước xương bướm Vì: Xương sàng nằm sau giữa sọ và mặt, trước xương bướm, gồm có 2 phiến: Thẳng đứng (nằm chính giữa) và nằm ngang (ngăn cách xoang mũi và xoang sọ)","reference":"Mục 1.5.1"},{"id":10,"text":"Màng xương có vai trò quan trọng trong việc gì?","answers":["A. Cốt hóa và dự trữ","B. Cốt hóa và sản sinh hồng cầu","C. Cốt hóa và cung cấp dinh dưỡng","D. Cốt hóa và tái tạo xương"],"correct":3,"explanation":"Đáp án đúng là: Cốt hóa và tái tạo xương Vì: ở lớp màng trong có nhiều tế bào tạo cốt bào (tế bào sinh xương) có khả năng đảm bảo cho xương phát triển","reference":"Mục 1.2.2"},{"id":11,"text":"Theo thiết diện cắt ngang từ ngoài vào, xương dài có các lớp?","answers":["A. Màng trong, xương đặc, tủy xương","B. Màng ngoài, xương đặc, tủy xương","C. Màng xương, màng trong, tủy xương","D. Màng xương, màng trong, xương đặc"],"correct":1,"explanation":"Đáp án đúng là: Màng ngoài, xương đặc, tủy xương Vì: Cấu tạo từ ngoài vào trong gồm 3 lớp lần lượt từ lớp màng ngoài sau đó đến chất xương đặc và ở chính giữa có ống tủy để chứa tủy sống bên trong","reference":"Mục 1.2.2"},{"id":12,"text":"Xương nào sau đây không thuộc vùng sọ?","answers":["A. Xương chẩm","B. Xương bướm","C. Xương đỉnh","D. Xương gò má"],"correct":3,"explanation":"Đáp án đúng là: Xương gò má Vì: là xương nằm ở vùng mặt của gia súc","reference":"Mục 1.5.1"},{"id":13,"text":"Thành phần hóa học của xương?","answers":["A. Chủ yếu là chất vô cơ và chất hữu cơ với tỷ lệ không thay đổi theo giai đoạn tuổi","B. Chủ yếu là chất vô cơ và chất hữu cơ với tỷ lệ thay đổi theo giai đoạn tuổi","C. Chủ yếu là chất vô cơ","D. Chủ yếu là chất hữu cơ"],"correct":1,"explanation":"Đáp án đúng là: Chủ yếu là chất vô cơ và chất hữu cơ với tỷ lệ thay đổi theo giai đoạn tuổi Vì: Chất hữu cơ và vô cơ trong xương phân bố không đồng đều. Sự phối hợp về mặt cấu tạo và thành phần hoá học làm cho xương có tính chất vừa rắn, vừa đàn hồi, chịu được lực nén cao và thay đổi theo giai đoạn tuổi","reference":"Mục 1.2.3"},{"id":14,"text":"Căn cứ vào hình dạng của xương người ta phân ra làm?","answers":["A. 5 loại hình dạng","B. 3 loại hình dạng","C. 4 loại hình dạng","D. 6 loại hình dạng"],"correct":0,"explanation":"Đáp án đúng là: 5 loại hình dạng Vì: xương dài, xương dài cong, xương dẹt, xương ngắn, xương hỗn hợp","reference":"Mục 1.2.1"},{"id":15,"text":"Điền vào chỗ trống sau đây: “Xương trán rất....., chiếm.... mặt trên đầu và phía trước kéo dài tới ..... hốc mũi, xương trán có 2 lớp, lớp trong và ngoài cách nhau bởi một khoảng trống gọi là.....”","answers":["A. To, 2/3, 1/2, xoang trán","B. Lớn, phần lớn, trên, xoang trán","C. Lớn, phía, gần, xoang trán","D. To, 1/2, tận, xoang trán"],"correct":0,"explanation":"Đáp án đúng là: To, 2/3, 1/2, xoang trán Vì: Xương trán rất to, chiếm 2/3 mặt trên đầu và phía trước kéo dài tới 1/2 hốc mũi, xương trán có 2 lớp, lớp trong và ngoài cách nhau bởi một khoảng trống gọi là xoang trán","reference":"Mục 1.5.1"},{"id":16,"text":"Thành phần khoáng ở trong xương gia súc chiếm?","answers":["A. 21-22%","B. 12%","C. 50%","D. 15%"],"correct":0,"explanation":"Đáp án đúng là: 21-22% Vì: Ngoài nước thì thành phần cấu thành nên xương chủ yếu là canxi và photpho nên tỷ lệ % khoáng là 21-22%","reference":"Mục 1.2.3"},{"id":17,"text":"Điền vào chỗ trống sau đây: “Gò hàm cùng phiến thẳng đứng của xương khẩu cái giới hạn một hố cánh hàm sau mà đáy có….từ trên xuống dưới, từ trước ra sau là: ……?","answers":["A. 3 lỗ; lỗ bướm khẩu cái, lỗ sau ống răng trên, lỗ sau khẩu cái","B. Hướng, lỗ sau ống răng","C. Chiều, lỗ bướm khẩu cái","D. 2 lỗ, lỗ bướm khẩu cái, lỗ sau ống răng trên"],"correct":0,"explanation":"Đáp án đúng là: 3 lỗ; lỗ bướm khẩu cái, lỗ sau ống răng trên, lỗ sau khẩu cái Vì: Gò hàm cùng phiến thẳng đứng của xương khẩu cái giới hạn một hố cánh hàm sau mà đáy có 3 lỗ từ trên xuống dưới, từ trước ra sau là: lỗ bướm khẩu cái, lỗ sau ống răng trên, lỗ sau khẩu cái","reference":"Mục 1.5.2"},{"id":18,"text":"Xương dài có đặc điểm?","answers":["A. Có hình dài, dẹt","B. Có cấu tạo phức tạp","C. Có một thân hai đầu","D. Có hình hộp 6 mặt"],"correct":2,"explanation":"Đáp án đúng là : Có một thân hai đầu Vì: xương có hình thái dài, có đầu trên (trước) và đầu dưới (sau), thân xương có chứa ống tủy.","reference":"Mục 1.2.1"},{"id":19,"text":"Vùng xương sọ cấu tạo gồm?","answers":["A. 12 xương","B. 6 xương","C. 10 xương","D. 8 xương"],"correct":1,"explanation":"Đáp án đúng là: 6 xương Vì: 6 xương tạo thành sọ để chứa não và một số khí quan khác như thị giác, thính giác, khứu giác gồm (xương chẩm, xương đỉnh, xương thái dương, xương trán, xương sàng và xương bướm).","reference":"Mục 1.5.1"},{"id":20,"text":"Sự phát sinh phát triển của xương trải qua các giai đoạn?","answers":["A. Mô liên kết cốt hóa thành xương","B. Cốt hóa sơ cấp, cốt hóa thứ cấp","C. Mô liên kết thành sụn, sụn cốt hóa thành xương","D. Cốt hóa màng, cốt hóa sụn"],"correct":2,"explanation":"Đáp án đúng là: Mô liên kết thành sụn, sụn cốt hóa thành xương Vì: Từ mô liên kết xuất hiện các tế bào sinh xương tạo thành những tấm xương nhỏ. Từ thỏi sụn có màng sụn ở ngoài, mao mạch bao bọc ở ngoài dẫn khoáng tạo điều kiện cho tế bào sinh xương phát triển làm thành xương dày ra, thay thế tế bào sụn, dần dần tế bào sụn được cốt hóa tạo thành xương.","reference":"Mục 1.4"},{"id":21,"text":"Bộ xương của cơ thể có vai trò chính nào sau đây?","answers":["A. Là cơ quan vận động của cơ thể","B. Là nơi sản sinh ra hồng cầu","C. Là nơi sản xuất ra canxi","D. Là giá đỡ cho toàn bộ cơ thể"],"correct":3,"explanation":"Đáp án đúng là: Là giá đỡ cho toàn bộ cơ thể Vì: xương là bộ phận giúp cho cơ và các cơ quan bộ phận bám vào các vị trí của xương để tạo nên hình dáng cơ thể, hỗ trợ cơ thể thực hiện các hoạt động sống…","reference":"Mục 1.1"},{"id":22,"text":"Ở giữa 2 mặt khớp có đệm sụn có chức năng gì?","answers":["A. Làm liên kết giữa 2 đầu xương","B. Làm giảm độ chắc của khớp","C. Làm tăng độ chắc của khớp","D. Làm giảm ma sát khi hoạt động"],"correct":3,"explanation":"Đáp án đúng là: Làm giảm ma sát khi hoạt động Vì: hỗ trợ làm tăng tiếp xúc, giảm ma sát cho quá trình hoạt động","reference":"Mục 1.2.2"},{"id":23,"text":"Xương ống cuộn là những phiến xương mỏng, cuộn lại nằm trong xoang mũi, có…. xương. Là những xương nào?","answers":["A. 2 xương, ống cuộn trên, ống cuộn dưới","B. 1 xương, ống cuộn","C. 3 xương, ống cuộn trên, ống cuộn giữa, ống cuộn dưới","D. 4 xương, ống cuộn trên, ống cuộn giữa, ống cuộn dưới, ống cuộn cùng"],"correct":2,"explanation":"Đáp án đúng là: 3 xương, ống cuộn trên, ống cuộn giữa, ống cuộn dưới Vì: Xương ống cuộn là những phiến xương mỏng, cuộn lại nằm trong xoang mũi, có 3 xương. Gồm ống cuộn trên, ống cuộn giữa, ống cuộn dưới","reference":"Mục 1.5.2"},{"id":24,"text":"Ngoài xoang mũi giúp hô hấp, phần đầu còn có mấy xoang?","answers":["A. 4 xoang","B. 5 xoang","C. 3 xoang","D. 6 xoang"],"correct":1,"explanation":"Đáp án đúng là: 5 xoang Vì: gồm có xoang sọ, xoang trán, xoang hàm trên, xoang sàng, xoang bướm","reference":"Mục 1.5.3"},{"id":25,"text":"Điền vào chỗ trống sau đây: “Xương liên hàm trên có hai phần thân không dính chặt vào nhau mà cách một khe hở gọi là khe cửa. Xương này có…?","answers":["A. Mỏm mũi","B. Mỏm mũi, mỏm khẩu cái","C. Mỏm răng","D. Mỏm khẩu cái"],"correct":1,"explanation":"Đáp án đúng là: Mỏm mũi, mỏm khẩu cái Vì: Xương liên hàm trên có hai phần thân không dính chặt vào nhau mà cách một khe hở gọi là khe cửa. Xương này có mỏm mũi, mỏm khẩu cái.","reference":"Mục 1.5.2"},{"id":26,"text":"Đốt sống vùng lưng có……?","answers":["A. Mỏm ngang dẹp, bè ra như cánh máy bay","B. Mỏm ngang nhọn, chỉ về phía sau","C. Mỏm gai vuông góc với thân","D. Mỏm gai cao dần từ đốt 1 đến đốt 4"],"correct":3,"explanation":"Đáp án đúng là: Mỏm gai cao dần từ đốt 1 đến đốt 4 Vì: Mỏm gai cao dần từ đốt 1 đến đốt 4.","reference":"Mục 2.1.1"},{"id":27,"text":"Điền vào chỗ trống sau đây: “Xương mác….chỉ còn lại 2 đầu: đầu trên giống… bám vào gò ngoài, đầu dưới biến thành…, nằm phía ngoài đầu dưới xương chày, trên xương gót”.","answers":["A. Thoái hóa, cái trâm, xương mắt cá","B. Thoái hóa, cái trâm, mào chày","C. Thoái hóa, hình tháp lộn ngược, xương mắt cá","D. Biến đổi, cái trâm, xương mắt cá"],"correct":0,"explanation":"Đáp án đúng là: Thoái hóa, cái trâm, xương mắt cá Vì: Xương mác thoái hóa chỉ còn lại 2 đầu: đầu trên giống cái trâm bám vào gò ngoài, đầu dưới biến thành xương mắt cá, nằm phía ngoài đầu dưới xương chày, trên xương gót.","reference":"Mục 2.2.2"},{"id":28,"text":"Xương ngón chân của gia súc có trung bình..... đốt?","answers":["A. 5","B. 3","C. 2","D. 4"],"correct":1,"explanation":"Đáp án đúng là: 3 Vì: Xương ngón chân của gia súc có trung bình 3 đốt (đốt cầu, đốt quán, đốt móng)","reference":"Mục 2.2.1"},{"id":29,"text":"Cột sống của trâu, bò có số thứ tự các đốt sống từ cổ, lưng, hông, khum, đuôi là?","answers":["A. 7, 18, 6, 5, 19-20","B. 7, 13, 6, 5, 18-20","C. 7, 13, 6-7, 19-20","D. 7, 13, 6, 5, 20-22"],"correct":1,"explanation":"Đáp án đúng là: 7, 13, 6, 5, 18-20 Vì: Số thứ tự các đốt sống từ cổ, lưng, hông, khum, đuôi của trâu bò lần lượt là 7, 13, 6, 5, 18-20.","reference":"Mục 2.1.1"},{"id":30,"text":"Điền vào chỗ trống sau đây: “Xương cánh tay là xương… đi chéo…., trước ra sau, gần áp sát phía dưới thành ngực, có một thân hai đầu”.","answers":["A. Dài, từ trên xuống dưới","B. Dài, từ trái sang phải","C. Ngắn, từ trên xuống dưới","D. Dài, từ phải sang trái"],"correct":0,"explanation":"Đáp án đúng là: Dài, từ trên xuống dưới Vì: Xương cánh tay là xương dài đi chéo từ trên xuống dưới, trước ra sau, gần áp sát phía dưới thành ngực, có một thân hai đầu.","reference":"Mục 2.2.1"},{"id":31,"text":"Xương sườn của gia súc gồm có?","answers":["A. 7 đôi xương sườn thật, 2 đôi xương sườn trôi và x đôi xương sườn giả","B. 7 đôi xương sườn thật, 1 đôi xương sườn trôi và x đôi xương sườn giả","C. 8 đôi xương sườn thật, 1 đôi xương sườn trôi và x đôi xương sườn giả","D. 8 đôi xương sườn thật, 2 đôi xương sườn trôi và x đôi xương sườn giả"],"correct":2,"explanation":"Đáp án đúng là: 8 đôi xương sườn thật, 1 đôi xương sườn trôi và x đôi xương sườn giả Vì: Mỗi loài có số lượng xương sườn khác nhau nhưng có 8 đôi xương sườn thật, 1 đôi xương sườn trôi và còn lại là số đôi xương sườn giả.","reference":"Mục 2.1.2"},{"id":32,"text":"Đốt sống cổ 7 còn gọi là đốt?","answers":["A. Axis","B. Gồ","C. Atlat","D. Cổ"],"correct":1,"explanation":"Đáp án đúng là: Gồ Vì: mỏm gai cao nhất.","reference":"Mục 2.1.1"},{"id":33,"text":"Lồng ngực được kết hợp giữa các xương?","answers":["A. Xương sống vùng lưng hông, xương sườn, xương ức","B. Xương sống vùng lưng, xương sườn, xương ức","C. Xương sườn, xương ức","D. Xương  sống vùng lưng, xương sườn"],"correct":1,"explanation":"Đáp án đúng là: Xương sống vùng lưng, xương sườn, xương ức Vì: Để tạo thành khung chứa đựng và bảo vệ các cơ quan nội tạng trong xoang ngực thì cần có sự kết hợp giữa các xương sống vùng lưng, xương sườn, xương ức","reference":"Mục 2.1.1"},{"id":34,"text":"Xương chày là một xương thuộc phần….?","answers":["A. Cẳng chân","B. Cánh tay","C. Cẳng tay","D. Đùi"],"correct":0,"explanation":"Đáp án đúng là: cẳng chân Vì: Xương cẳng chân gồm có 3 xương: xương bánh chè, xương chày, xương mác.","reference":"Mục 2.3"},{"id":35,"text":"Điền vào chỗ trống sau đây: “Xương đùi là một xương dài đi chéo từ… (hơi chếch ra ngoài), xương có một thân hai đầu”.","answers":["A. Trên xuống dưới, từ sau ra trước","B. Trên xuống dưới, từ trước ra sau","C. Trên xuống dưới, từ phải sang trái","D. Trên xuống dưới, từ trái sang phải"],"correct":0,"explanation":"Đáp án đúng là: Trên xuống dưới, từ sau ra trước Vì: Xương đùi là một xương dài đi chéo từ trên xuống dưới, từ sau ra trước (hơi chếch ra ngoài), xương có một thân hai đầu","reference":"Mục 2.2.2"},{"id":36,"text":"Điền vào chỗ trống sau đây: “Các đốt sống khum…với nhau…gồm có 2 mặt, 1 đáy, 1 đỉnh”.","answers":["A. Khớp, thành một khối","B. Khớp, tạo thành","C. Dính liền, cấu tạo","D. Dính liền, thành một khối"],"correct":3,"explanation":"Đáp án đúng là: Dính liền, thành một khối Vì: Các đốt sống khum dính liền với nhau thành một khối gồm có 2 mặt, 1 đáy, 1 đỉnh","reference":"Mục 2.1.1"},{"id":37,"text":"Xương sườn trôi có đặc điểm?","answers":["A. Có đầu dưới gắn trực tiếp với xương ức","B. Có đầu dưới ngắn nằm lơ lửng","C. Có đầu dưới gắn với xương ức qua sụn sườn","D. Có đầu dưới tự do"],"correct":3,"explanation":"Đáp án đúng là: Có đầu dưới tự do Vì: Có đầu dưới tự do không gắn với thân xương ức","reference":"Mục 2.1.2"},{"id":38,"text":"Vùng đai chậu được tạo thành bởi xương?","answers":["A. Xương háng, xương ngồi, xương đùi","B. Xương cánh chậu, xương háng, xương đùi","C. Xương cánh chậu, xương ngồi, xương đùi","D. Xương cánh chậu, xương háng, xương ngồi"],"correct":3,"explanation":"Đáp án đúng là: Xương cánh chậu, xương háng, xương ngồi Vì: Vùng đai chậu được tạo thành bởi 3 xương: xương cánh chậu, xương háng, xương ngồi","reference":"Mục 2.2.2"},{"id":39,"text":"Điền vào chỗ trống sau đây: “Xương chậu, … cùng các … tạo thành xoang chậu chứa trực tràng, cơ quan sinh dục, niệu đạo. Cửa sau của … là cửa đi ra của cơ quan tiêu hoá, tiết niệu - sinh dục”.","answers":["A. Xương ngồi, xương đuôi, xoang chậu","B. Xương ngồi, xương đùi, xoang chậu","C. Xương đuôi, xương đùi, xoang chậu","D. Xương khum, đốt xương đuôi đầu, xoang chậu"],"correct":3,"explanation":"Đáp án đúng là: Xương khum, đốt xương đuôi đầu, xoang chậu Vì: Xương chậu, xương khum cùng các đốt xương đuôi đầu tạo thành xoang chậu chứa trực tràng, cơ quan sinh dục, niệu đạo. Cửa sau của xoang chậu là cửa đi ra của cơ quan tiêu hoá, tiết niệu - sinh dục.","reference":"Mục 2.2.2"},{"id":40,"text":"Cấu tạo nên một đốt sống gồm có…. phần?","answers":["A. 7 phần","B. 5 phần","C. 4 phần","D. 6 phần"],"correct":0,"explanation":"Đáp án đúng là: 7 phần Vì: 7 phần gồm: thân, cung, mỏm gai, mỏm ngang, mẻ (khuyết), mỏm khớp, lỗ tủy sống..","reference":"Mục 2.1.1"},{"id":41,"text":"Đốt sống hông có?","answers":["A. Mỏm ngang nhọn, chỉ về phía sau","B. Mỏm ngang dẹp, bè ra như cánh máy bay","C. Mỏm gai cao dần từ đốt 1 đến đốt 4","D. Mỏm ngang ngắn như một ụ"],"correct":1,"explanation":"Đáp án đúng là: Mỏm ngang dẹp, bè ra như cánh máy bay Vì: Thân dài, mỏm ngang dẹp, bè ra như cánh máy bay dài từ đốt 1-4","reference":"Mục 2.1.1"},{"id":42,"text":"Đốt sống cổ 1 ngoài tên gọi là đốt đôi thì còn có tên gọi khác là gì?","answers":["A. Đốt gồ","B. Đốt sống","C. Đốt Atlat","D. Đốt trục Axis"],"correct":2,"explanation":"Đáp án đúng là: Đốt Atlat Vì: Gọi là đốt Atlat hay đốt đôi, không có thân do hai cung tạo thành, đầu trước có hõm hình trứng khớp với lồi cầu chẩm, đầu sau là một khớp hình yên ngựa. Cung trên có u Atlat làm chỗ bám cho dây chằng cổ, cung dưới có u, hai bên cung có lỗ giáp (lỗ thông vào ống tuỷ)","reference":"Mục 2.1.1"},{"id":43,"text":"Hàng trên của xương cổ tay gia súc gồm có các xương nào?","answers":["A. Xương đậu, xương tháp, xương mấu, xương thuyền","B. Xương đậu, xương tháp, xương bán nguyệt, xương thuyền","C. Xương đậu, xương tháp, xương bán nguyệt, xương cả thê","D. Xương đậu, xương tháp, xương mấu, xương cả thê"],"correct":1,"explanation":"Đáp án đúng là: Xương đậu, xương tháp, xương bán nguyệt, xương thuyền Vì: Xương cổ tay gồm có 2 hàng xương. Hàng trên gồm 4 xương Xương đậu, xương tháp, xương bán nguyệt, xương thuyền.","reference":"Mục 2.2.1"},{"id":44,"text":"Điền vào chỗ trống sau đây: “Xương trụ dài hình tháp nằm…. mặt sau xương quay”.","answers":["A. 1/3 phía trước","B. 1/3 phía sau","C. 1/3 phía ngoài","D. 1/3 phía trong"],"correct":2,"explanation":"Đáp án đúng là: 1/3 phía ngoài Vì: Xương trụ dài hình tháp nằm 1/3 phía ngoài mặt sau xương quay.","reference":"Mục 2.2.1"},{"id":45,"text":"Xương ức gồm có…………………?","answers":["A. Mỏm khí quản, mỏm kiếm xương ức","B. Mỏm khí quản, thân xương ức, mỏm kiếm xương ức","C. Mỏm khí quản, thân xương","D. Mỏm khí quản, thân xương ức, mỏm kiếm xương ức, mỏm gai"],"correct":1,"explanation":"Đáp án đúng là: Mỏm khí quản, thân xương ức, mỏm kiếm xương ức Vì: Xương ức có cấu tạo bởi 3 phần: Mỏm khí quản, thân xương ức, mỏm kiếm xương ức.","reference":"Mục 2.1.2"},{"id":46,"text":"Xương cẳng tay gồm có?","answers":["A. Xương trụ và xương quay","B. Xương quay và xương cánh tay","C. Xương trụ và xương cánh tay","D. Xương trụ, xương quay và xương cánh tay"],"correct":0,"explanation":"Đáp án đúng là: Xương trụ và xương quay Vì: Xương trụ và xương quay.","reference":"Mục 2.2.1"},{"id":47,"text":"Phân biệt đốt sống hông với các đốt sống vùng khác thông qua đặc điểm gì?","answers":["A. Thân có hố khớp sườn","B. Mỏm gai nhô lên cao","C. Mỏm gai thấp và chéo dần chĩa về phía sau","D. Mỏm ngang dẹp, bè ra như cánh máy bay"],"correct":3,"explanation":"Đáp án đúng là: Mỏm ngang dẹp, bè ra như cánh máy bay Vì: Thân dài, mỏm ngang dẹp, bè ra như cánh máy bay dài từ đốt 1-4, đốt 4 dài bằng đốt 5 và ngắn lại ở đốt 6, mỏm gai cao đểu nhau vuông góc với thân, mỏm khớp trước lõm vào trong, mỏm khớp sau lồi ra ngoài. Thân không có hố khớp sườn.","reference":"Mục 2.1.1"},{"id":48,"text":"Điền vào chỗ trống sau đây: “Xương ức giống như…nằm giữa đường…. phía dưới ngực làm chỗ dựa cho sụn sườn”.","answers":["A. Cái vòm, thẳng","B. Cái thuyền, trung tuyến","C. Cái vòm, trung tuyến","D. Cái thuyền, thẳng"],"correct":1,"explanation":"Đáp án đúng là: Cái thuyền, trung tuyến Vì: Xương ức giống như cái thuyền nằm giữa đường trung tuyến phía dưới ngực làm chỗ dựa cho sụn sườn.","reference":"Mục 2.1.2"},{"id":49,"text":"Xương bả vai của gia súc có chiều hướng đi....?","answers":["A. Chéo từ trên xướng dưới, từ sau ra trước","B. Chéo từ trên xướng dưới, từ trong ra ngoài","C. Chéo từ trên xướng dưới, từ trước ra sau","D. Chéo từ trên xướng dưới, từ ngoài vào trong"],"correct":0,"explanation":"Đáp án đúng là: Chéo từ trên xướng dưới, từ sau ra trước Vì: Xương bả vai là xương dẹp nằm áp sát vào bên lồng ngực đi chéo từ trên xướng dưới, từ sau ra trước","reference":"Mục 2.2"},{"id":50,"text":"Cột sống của ngựa có số thứ tự các đốt sống từ cổ, lưng, hông, khum, đuôi là?","answers":["A. 7, 18, 6, 5, 19-20","B. 7, 13, 6-7, 3, 17-20","C. 7, 18, 6, 5, 17-20","D. 7, 13, 6, 5, 17-20"],"correct":2,"explanation":"Đáp án đúng là: 7, 18, 6, 5, 17-20 Vì: Số thứ tự các đốt sống từ cổ, lưng, hông, khum, đuôi của ngựa lần lượt là 7, 18, 6, 5, 17-20.","reference":"Mục 2.1.1"},{"id":51,"text":"Hãy cho biết: Cân mạc…?","answers":["A. Giúp cơ trượt trên đầu mút của xương","B. Là tổ chức liên kết phủ quanh cơ","C. Có lưới mao mạch chi phối bao bọc","D. Làm giảm ma sát khi gân cơ hoạt động"],"correct":1,"explanation":"Đáp án đúng là: Là tổ chức liên kết phủ quanh cơ Vì: Cân mạc là tổ chức liên kết phủ quanh cơ giúp cho cơ vận động dễ dàng","reference":"Mục 3.2.2"},{"id":52,"text":"Nhóm cơ vùng bụng tham gia vào các hoạt động sống nào của gia súc?","answers":["A. Hô hấp, tiêu hóa, tiết niệu","B. Hô hấp, tuần hoàn, tiêu hóa, tiết niệu, sinh dục","C. Hô hấp, tiết niệu, sinh dục","D. Hô hấp, tiêu hóa, tiết niệu, sinh dục"],"correct":3,"explanation":"Đáp án đúng là: Hô hấp, tiêu hóa, tiết niệu, sinh dục Vì: Các hoạt động sống của gia súc đều cần đến sự tham gia của nhóm cơ vùng bụng để hỗ trợ quá trình hô hấp (thở thể bụng), tiêu hóa (khi ăn no giãn cơ vùng bụng), tiết niệu (tác động vào cơ vùng bàng quang để hỗ trợ đào thải nước tiểu), sinh dục (co thắt hỗ trợ rặn đẻ và phóng tinh)...","reference":"Mục 3.3.2"},{"id":53,"text":"Nhóm cơ vùng mặt có tác dụng?","answers":["A. Làm thay đổi nét mặt, thiệt cốt, nhăn da trán","B. Nhai, nhăn da trán, làm thay đổi nét mặt","C. Làm thay đổi nét mặt, nhăn da trán, thiệt cốt","D. Làm thay đổi nét mặt, nhai, thiệt cốt"],"correct":3,"explanation":"Đáp án đúng là: Làm thay đổi nét mặt, nhai, thiệt cốt Vì: Các nhóm cơ này ở vùng mặt, nên khi có các cử động sẽ làm thay đổi nét mặt, tác động vào quá trình nhai nghiền thức ăn và hỗ trợ vùng thiệt cốt đưa thức ăn xuống thực quản…","reference":"Mục 3.3.1"},{"id":54,"text":"Điền vào chỗ trống sau đây: “Cơ vùng sống lưng, hông có tác dụng: Khi hai bên co thì...xương cổ, lưng, hông. Khi một bên co thì... cột sống về một bên”.","answers":["A. Kéo, kéo nghiêng","B. Dãn, đẩy nghiêng","C. Duỗi, kéo nghiêng","D. Co, đẩy nghiêng"],"correct":2,"explanation":"Đáp án đúng là: Duỗi, kéo nghiêng Vì: Cơ vùng sống lưng, hông có tác dụng: Khi hai bên co thì duỗi xương cổ, lưng, hông. Khi một bên co thì kéo nghiêng cột sống về một bên","reference":"Mục 3.3.2"},{"id":55,"text":"Các cơ tác dụng vào khớp khoeo gồm có nhóm cơ nào?","answers":["A. Nhóm cơ kéo, nhóm cơ đẩy","B. Nhóm cơ khép, nhóm cơ quay","C. Nhóm cơ kéo, nhóm cơ xoay","D. Nhóm cơ duỗi, nhóm cơ gấp"],"correct":3,"explanation":"Đáp án đúng là: Nhóm cơ duỗi, nhóm cơ gấp Vì: Các cơ tác dụng vào khớp khoeo gồm có nhóm cơ: Nhóm cơ duỗi, nhóm cơ gấp .","reference":"Mục 3.3.3"},{"id":56,"text":"Cơ lệ còn có tên gọi khác là?","answers":["A. Cơ khép mi","B. Cơ hạ mi dưới","C. Cơ nâng mi","D. Cơ vòng mi"],"correct":1,"explanation":"Đáp án đúng là: Cơ hạ mi dưới Vì: Đây là cơ mỏng, ở phía dưới mi dưới đi chéo xuống nối liền với cơ gò má, cơ màng mũi.","reference":"Mục 3.3.1"},{"id":57,"text":"Điền vào chỗ trống sau đây: “Cơ đường trắng có tác dụng… cho cơ vùng bụng và….cho cơ quan nội tạng ở vị trí cố định”.","answers":["A. Nâng đỡ, giữ","B. Co rút, bảo vệ","C. Làm chỗ bám, giữ","D. Nâng đỡ, bảo vệ"],"correct":2,"explanation":"Đáp án đúng là: Làm chỗ bám, giữ Vì: Cơ đường trắng có tác dụng làm chỗ bám cho cơ vùng bụng và giữ cho cơ quan nội tạng ở vị trí cố định","reference":"Mục 3.3.2"},{"id":58,"text":"Cơ cân căng cân mạc đùi có tác dụng gì?","answers":["A. Làm xoay ngoài chi sau","B. Đẩy cơ thể vể phía trước","C. Bịt chặt các cơ mông và đùi để có thể hợp tác với nhau khi kéo chạy","D. Gập cột sống vùng hông, làm cho cơ xoang chậu rủ xuống"],"correct":2,"explanation":"Đáp án đúng là: Bịt chặt các cơ mông và đùi để có thể hợp tác với nhau khi kéo chạy. Vì: Cơ cân căng cân mạc đùi có tác dụng bịt chặt các cơ mông và đùi để có thể hợp tác với nhau khi kéo chạy.","reference":"Mục 3.3.3"},{"id":59,"text":"Cơ vân thường phân bố ở đâu trên cơ thể gia súc?","answers":["A. Cơ quan nội tạng","B. Quả tim","C. Cơ quan nội tạng và tim","D. Khắp bề ngoài cơ thể"],"correct":3,"explanation":"Đáp án đúng là: Khắp bề ngoài cơ thể Vì: Cơ vân phân bố khắp bề ngoài cơ thể, bám vào xương (còn gọi là cơ xương)","reference":"Mục 3.1.1"},{"id":60,"text":"Loại cơ nào ở cơ thể gia súc có khả năng hoạt động chủ động và không mỏi?","answers":["A. Cơ vân, cơ trơn","B. Cơ vân, cơ tim","C. Cơ trơn, cơ tim","D. Cơ xương, cơ tim"],"correct":2,"explanation":"Đáp án đúng là: Cơ trơn, cơ tim Vì: Cơ thể gia súc có cơ trơn, cơ tim hoạt động không theo ý muốn, luôn hoạt động chủ động và chịu sự chỉ đạo của thần kinh thực vật nên không mệt mỏi.","reference":"Mục 3.1"},{"id":61,"text":"Vùng sọ có cơ nào dưới đây?","answers":["A. Cơ trán","B. Cơ thái dương","C. Cơ đỉnh","D. Cơ chẩm"],"correct":0,"explanation":"Đáp án đúng là: Cơ trán Vì: Vùng sọ chỉ có duy nhất cơ trán là bó cơ rộng, dẹp, bám sát da từ cầu hố mắt đến cơ vòng mi có tác dụng làm nhăn da trán.","reference":"Mục 3.3.1"},{"id":62,"text":"Cơ trơn có đặc điểm:","answers":["A. Hoạt động theo ý muốn","B. Co rút xương","C. Khả năng co giãn lớn","D. Sợi cơ có màu đỏ hoặc hồng"],"correct":2,"explanation":"Đáp án đúng là: Khả năng co giãn lớn Vì: Khả năng co giãn lớn và hoạt động do thần kinh thực vật trực tiếp điều khiển","reference":"Mục 3.1.2"},{"id":63,"text":"Trong cơ thể gia súc, nhóm cơ nào có tác dụng tham gia chính vào việc di chuyển?","answers":["A. Cơ vùng lưng","B. Cơ vùng chi","C. Cơ vùng cổ","D. Cơ vùng bụng"],"correct":1,"explanation":"Đáp án đúng là: Cơ vùng chi Vì: Mục tiêu chung của các chính sách xã hội: là đạt được hiệu quả xã hội như công bằng xã hội, ổn định xã hội, an toàn xã hội, phát triển và tiến bộ xã hội,...","reference":"Mục 3.3.1"},{"id":64,"text":"Nước trong cơ của cơ thể gia súc bình thường chiếm….?","answers":["A. 80-95%","B. 80-83%","C. 65-75%","D. 75-80%"],"correct":2,"explanation":"Đáp án đúng là: 65-75% Vì: Nước có trong cơ từ 65-75%","reference":"Mục 3.2.1"},{"id":65,"text":"Các cơ tác dụng khớp ngón có các nhóm nào?","answers":["A. Nhóm cơ duỗi ngón, nhóm cơ gấp bàn","B. Nhóm cơ duỗi ngón, nhóm cơ gấp ngón","C. Nhóm cơ duỗi ngón, nhóm cơ gấp ngón, nhóm cơ gấp bàn, nhóm cơ duỗi bàn","D. Nhóm cơ duỗi ngón, nhóm cơ gấp ngón, nhóm cơ gấp bàn"],"correct":1,"explanation":"Đáp án đúng là: Nhóm cơ duỗi ngón, nhóm cơ gấp ngón Vì: Các cơ tác dụng khớp ngón có các nhóm cơ duỗi ngón, nhóm cơ gấp ngón.","reference":"Mục 3.3.3"},{"id":66,"text":"Điền vào chỗ trống sau đây: “Các cơ có tác dụng hít vào có tác dụng ....về phía trước khi hít vào”.","answers":["A. Kéo xương sườn","B. Kéo xương ức","C. Kéo cơ vùng sống lưng","D. Kéo cơ gian sườn"],"correct":0,"explanation":"Đáp án đúng là: Kéo xương sườn Vì: Các cơ có tác dụng hít vào có tác dụng kéo xương sườn về phía trước khi hít vào","reference":"Mục 3.3.2"},{"id":67,"text":"Nhóm cơ vùng mông gồm các cơ nào?","answers":["A. Cơ mông nông, cơ mông trung, cơ mông sâu","B. Cơ mông nông, cơ mông trung, cơ mông sâu, cơ nhị đầu","C. Cơ mông cơ bán mạc, cơ nhị đầu","D. Cơ mông nông, cơ mông trung, cơ mông sâu, cơ bán mạc"],"correct":0,"explanation":"Đáp án đúng là: Cơ mông nông, cơ mông trung, cơ mông sâu Vì: Nhóm cơ vùng mông gồm các cơ mông nông, cơ mông trung, cơ mông sâu","reference":"Mục 3.3.3"},{"id":68,"text":"Thành phần bổ trợ cơ gồm:","answers":["A. Gân, cân mạc, mạch quản thần kinh","B. Gân, dây chằng, mạch quản thần kinh","C. Gân, dây chằng, cân mạc, mạch quản thần kinh","D. Dây chằng, cân mạc, mạch quản thần kinh"],"correct":0,"explanation":"Đáp án đúng là: Gân, cân mạc, mạch quản thần kinh Vì: Gân do màng cơ thạo thành bó dai chắc nối giữa cơ và xương, cân mạc là tổ chức liên kết phủ quanh cơ giúp cho cơ vận động dễ dàng, mạch quản thần kinh có hệ thống lưới mao mạch và chi phối các sợi thần kinh.","reference":"Mục 3.2.2"},{"id":69,"text":"Vùng ngực có các nhóm cơ?","answers":["A. Có tác dụng hít vào, có tác dụng thở ra","B. Có tác dụng thở ra và thay đổi dung tích lồng ngực","C. Có tác dụng thay đổi dung tích lồng ngực","D. Có tác dụng hít vào và thay đổi dung tích lồng ngực"],"correct":0,"explanation":"Đáp án đúng là: Có tác dụng hít vào, có tác dụng thở ra Vì: Các cơ này có tác dụng kéo xương sườn về phía trước khi hít vào và co rút làm hẹp lồng ngực khi thở ra.","reference":"Mục 3.3.2"},{"id":70,"text":"Có mấy cách gọi tên cơ?","answers":["A. 4","B. 2","C. 5","D. 3"],"correct":2,"explanation":"Đáp án đúng là: 5 Vì: Có 5 cách gọi tên: theo hình dạng cơ, theo vị trí bám, theo số bó cơ, theo hướng đi và theo tính chất.","reference":"Mục 3.2.3"},{"id":71,"text":"Cơ Delta ở cánh tay có tác dụng?","answers":["A. Kéo gấp xương cánh tay và hơi ra ngoài","B. Cùng cơ tròn lớn kéo gấp cánh tay","C. Kéo gấp xương cánh tay và hơi vào ngoài","D. Kéo cánh tay vào trong"],"correct":0,"explanation":"Đáp án đúng là: Kéo gấp xương cánh tay và hơi ra ngoài Vì: Cơ delta nằm gọn trong góc vai, đầu trên gồm có 2 phần hợp thành hình tam giác bám vào u delta xương cánh tay có tác dụng: Kéo gấp xương cánh tay và hơi ra ngoài.","reference":"Mục 3.3.3"},{"id":72,"text":"Lớp cơ nào nằm sâu nhất ở vùng bụng của gia súc?","answers":["A. Cơ thẳng bụng","B. Cơ chéo bụng trong","C. Cơ chéo bụng ngoài","D. Cơ ngang bụng"],"correct":3,"explanation":"Đáp án đúng là: Cơ ngang bụng Vì: Là cơ nằm ở lớp sâu nhất tại vùng bụng, sát mặt trong cơ thẳng bụng, sợi cơ đi ngang, bắt đầu ở dưới xương sườn cuối (xương sườn thật) mặt trong sụn sườn xương sườn giả và mỏm ngang đốt sống hông, tận cùng ở sụn mỏm kiếm và đường trắng bằng cân mạc.","reference":"Mục 3.3.2"},{"id":73,"text":"Điền vào chỗ trống: “Cơ tứ đầu đùi là một cơ ... khoẻ ở khớp đầu gối xương ..., nó có thể kéo duỗi... nhờ xương bánh chè và các dây chằng của nó”.","answers":["A. Duỗi, cẳng chân, cẳng chân","B. Duỗi, bánh chè, cẳng chân","C. Co, đầu gối, cẳng chân","D. Co, cẳng chân, cẳng chân"],"correct":1,"explanation":"Đáp án đúng là: Duỗi, bánh chè, cẳng chân Vì: Cơ tứ đầu đùi là một cơ duỗi khoẻ ở khớp đầu gối xương bánh chè, nó có thể kéo duỗi cẳng chân nhờ xương bánh chè và các dây chằng của nó","reference":"Mục 3.3.3"},{"id":74,"text":"Điền vào chỗ trống sau đây: “Tác dụng của cơ vùng bụng: Nâng đỡ,..., áp chặt các cơ quan vùng bụng và trong ổ bụng. Cơ co rút làm… áp lực (phúc áp) giúp hoạt động sinh lý đào thải, đại, tiểu tiện, hô hấp, đẻ”.","answers":["A. Bao bọc, giảm","B. Bảo vệ, giảm","C. Bảo vệ, tăng","D. Bám, tăng"],"correct":2,"explanation":"Đáp án đúng là: Bảo vệ, tăng Vì: Tác dụng của cơ vùng bụng: Nâng đỡ, bảo vệ, áp chặt các cơ quan vùng bụng và trong ổ bụng. Cơ co rút làm tăng áp lực (phúc áp) giúp hoạt động sinh lý đào thải, đại, tiểu tiện, hô hấp, đẻ.","reference":"Mục 3.3.2"},{"id":75,"text":"Điền vào chỗ trống sau đây: “Các cơ có tác dụng thở ra khi co rút làm.....”.","answers":["A. Giãn lồng ngực","B. Hẹp lồng ngực","C. Thay đổi dung tích","D. Mở rộng lồng ngực"],"correct":1,"explanation":"Đáp án đúng là: Hẹp lồng ngực Vì: Các cơ có tác dụng thở ra khi co rút làm hẹp lồng ngực.","reference":"Mục 3.3.2"},{"id":76,"text":"Tuyến dưới lưỡi là tuyến có các ống tiết?","answers":["A. Rivinus, Bartholin, Wharton","B. Rivinus, Bartholin","C. Rivinus, Wharton","D. Bartholin, Wharton"],"correct":0,"explanation":"Đáp án đúng là: Rivinus, Bartholin Vì: Tuyến dưới lưỡi là tuyến có các ống tiết: Rivinus, Bartholin.","reference":"Mục 4.2.4"},{"id":77,"text":"Điền vào chỗ trống: “Bộ máy tiêu hoá là một ống thông dài từ … đến …, trên đó có nhiều đoạn gấp cuộn và … khác nhau phù hợp với chức năng sinh lý riêng của từng vùng”?","answers":["A. Miệng, hậu môn, phình to nhỏ","B. Sau hầu, hậu môn, to nhỏ","C. Thực quản, hậu môn, to nhỏ","D. Miệng, ruột già, phình to nhỏ"],"correct":0,"explanation":"Đáp án đúng là: Miệng, hậu môn, phình to nhỏ Vì: Bộ máy tiêu hoá là một ống thông dài từ miệng đến hậu môn, trên đó có nhiều đoạn gấp cuộn và phình to nhỏ khác nhau phù hợp với chức năng sinh lý riêng của từng vùng","reference":"Mục 4.1"},{"id":78,"text":"Bộ máy tiêu hóa được chia làm….phần chính?","answers":["A. 5","B. 4","C. 2","D. 3"],"correct":3,"explanation":"Đáp án đúng là: 3 Vì: Bộ máy tiêu hóa được chia làm 3 phần chính: phần trước, phần giữa, phần sau.","reference":"Mục 4.1"},{"id":79,"text":"Thực quản được cấu tạo bằng?","answers":["A. Tổ chức cơ trơn","B. Tổ chức cơ trơn và cơ vân","C. Tổ chức cơ tim","D. Tổ chức cơ vân"],"correct":1,"explanation":"Đáp án đúng là: Tổ chức cơ trơn và cơ vân Vì: Thực quản được cấu tạo bằng tổ chức cơ trơn và cơ vân.","reference":"Mục 4.2.3"},{"id":80,"text":"Hầu có:…?","answers":["A. 3 phần, 7 lỗ thông","B. 3 phần, 5 lỗ thông","C. 2 phần, 5 lỗ thông","D. 2 phần, 7 lỗ thông"],"correct":0,"explanation":"Đáp án đúng là: 3 phần, 7 lỗ thông Vì: Hầu có 3 phần, 7 lỗ thông: (phần ti hầu, khẩu hầu, thanh hầu với các lỗ thông; 2 lỗ lên mũi, 2 lỗ lên tai, 1 lỗ ra xoang miệng, 1 lỗ xuống thực quản và 1 lỗ vào thanh quản xuống phổi).","reference":"Mục 4.2.2"},{"id":81,"text":"Trong bộ máy tiêu hóa thường diễn ra các quá trình tiêu hóa nào?","answers":["A. Hóa học, vi sinh vật học","B. Cơ học, hóa học, vi sinh vật học","C. Cơ học, vi sinh vật học","D. Cơ học, hóa học"],"correct":1,"explanation":"Đáp án đúng là: Cơ học, hóa học, vi sinh vật học Vì: Trong bộ máy tiêu hóa thường diễn ra các quá trình tiêu hóa: Cơ học, hóa học, vi sinh vật học để tiêu hóa và hấp thu thức ăn.","reference":"Mục 4.1"},{"id":82,"text":"Cấu tạo môi của gia súc từ ngoài vào trong gồm các lớp?","answers":["A. Lớp da, lớp cơ vòng môi, lớp tuyến môi không hoàn toàn","B. Lớp da, lớp cơ vòng môi, lớp niêm mạc","C. Lớp da, lớp cơ vòng môi, lớp tuyến môi không hoàn toàn, lớp niêm mạc","D. Lớp da, tuyến môi không hoàn toàn, lớp niêm mạc"],"correct":2,"explanation":"Đáp án đúng là: Lớp da, lớp cơ vòng môi, lớp tuyến môi không hoàn toàn, lớp niêm mạc Vì: Cấu tạo môi của gia súc từ ngoài vào trong gồm các lớp: Lớp da, lớp cơ vòng môi, lớp tuyến môi không hoàn toàn, lớp niêm mạc.","reference":"Mục 4.2.1"},{"id":83,"text":"Tác dụng của vòm khẩu cái là:…?","answers":["A. Lót mặt dưới, giữa xương răng hàm trên, từ sau răng cửa đến trước màng khẩu cái","B. Hướng thức ăn vào trong","C. Làm điểm tựa cho lưỡi khi nuốt thức ăn","D. Làm điểm tựa cho lưỡi khi nuốt thức ăn, hướng thức ăn vào trong"],"correct":3,"explanation":"Đáp án đúng là: Làm điểm tựa cho lưỡi khi nuốt thức ăn, hướng thức ăn vào trong Vì: Tác dụng của vòm khẩu cái là: Làm điểm tựa cho lưỡi khi nuốt thức ăn, hướng thức ăn vào trong","reference":"Mục 4.2.1"},{"id":84,"text":"Thực quản ở đoạn cổ….?","answers":["A. Phía trước nằm dưới thanh quản và khí quản","B. Phía trước nằm trước thanh quản và khí quản","C. Phía trước nằm trên thanh quản và khí quản","D. Phía trước nằm sau thanh quản và khí quản"],"correct":2,"explanation":"Đáp án đúng là: Phía trước nằm trên thanh quản và khí quản Vì: Thực quản ở đoạn cổ phía trước nằm trên thanh quản và khí quản.","reference":"Mục 4.2.3"},{"id":85,"text":"Xoang miệng của gia súc gồm:…?","answers":["A. Môi, má, vòm khẩu cái, màng khẩu cái, lưỡi, răng, xương hàm","B. Môi, má, vòm khẩu cái, màng khẩu cái, lưỡi, răng","C. Môi, má, vòm khẩu cái, lưỡi, răng, hầu","D. Môi, má, vòm khẩu cái, lưỡi, răng, xương hàm"],"correct":0,"explanation":"Đáp án đúng là: Môi, má, vòm khẩu cái, màng khẩu cái, lưỡi, răng Vì: Xoang miệng của gia súc gồm các bộ phận: Môi, má, vòm khẩu cái, màng khẩu cái, lưỡi, răng","reference":"Mục 4.2"},{"id":86,"text":"Điền vào chỗ còn trống: “Thực quản đoạn cổ có vị trí từ sau hầu đến cửa vào lồng ngực. Phần này phía trước, thực quản nằm … thanh quản và khí quản, đến … phía sau ngang đốt cổ 5 thì nó bẻ quặt sang … khí quản đến cửa vào lồng ngực”.","answers":["A. Trên, 1/3, bên phải","B. Trên, 1/3, bên trái","C. Dưới, 1/3, bên phải","D. Dưới, 1/3, bên trái"],"correct":1,"explanation":"Đáp án đúng là: Trên, 1/3, bên trái Vì: Thực quản đoạn cổ có vị trí từ sau hầu đến cửa vào lồng ngực. Phần này phía trước, thực quản nằm trên thanh quản và khí quản, đến 1/3 phía sau ngang đốt cổ 5 thì nó bẻ quặt sang bên trái khí quản đến cửa vào lồng ngực.","reference":"Mục 4.2.3"},{"id":87,"text":"Lưỡi của trâu bò có mặt trên….?","answers":["A. Thô ráp","B. Phẳng","C. Mềm mịn","D. Hơi ráp"],"correct":0,"explanation":"Đáp án đúng là: Thô ráp Vì: Lưỡi của trâu bò có mặt trên thô ráp do lấy thức ăn (cỏ, rơm, rạ…) bằng lưỡi.","reference":"Mục 4.2.1"},{"id":88,"text":"Cấu tạo từ ngoài vào trong của răng có 4 lớp theo thứ tự sau?","answers":["A. Chất men răng, chất vỏ răng, chất ngà răng, tủy răng","B. Chất vỏ răng, chất ngà răng, chất men răng, tủy răng","C. Chất men răng, chất vỏ răng,  chất ngà răng, tủy răng","D. Chất vỏ răng, chất men răng, chất ngà răng, tủy răng"],"correct":3,"explanation":"Đáp án đúng là: Chất vỏ răng, chất men răng, chất ngà răng, tủy răng Vì: Cấu tạo từ ngoài vào trong của răng có 4 lớp theo thứ tự sau: Chất vỏ răng, chất men răng, chất ngà răng, tủy răng","reference":"Mục 4.2.1"},{"id":89,"text":"Điền vào chỗ trống: “Thực quản của gia súc được chia làm…đoạn là….”?","answers":["A. 3, đoạn cổ - đoạn trong lồng ngực - đoạn ngoài lồng ngực","B. 2, đoạn cổ - đoạn bụng","C. 2, đoạn cổ - đoạn trong lồng ngực","D. 3, đoạn cổ - đoạn trong lồng ngực - đoạn bụng"],"correct":3,"explanation":"Đáp án đúng là: 3, đoạn cổ - đoạn trong lồng ngực - đoạn bụng Vì: Thực quản của gia súc được chia làm 3 đoạn là đoạn cổ - đoạn trong lồng ngực - đoạn bụng","reference":"Mục 4.2.3"},{"id":90,"text":"Các giai đoạn phát triển răng của gia súc lần lượt là?","answers":["A. Thay răng, hình thành vệt sỉ tinh, mòn răng, mọc răng","B. Mọc răng sữa, thay răng, mòn răng","C. Thay răng, hình thành vệt sỉ tinh, mòn răng","D. Mọc răng sữa, thay răng, hình thành vệt sỉ tinh, mòn răng"],"correct":3,"explanation":"Đáp án đúng là: Mọc răng sữa, thay răng, hình thành vệt sỉ tinh, mòn răng Vì: Các giai đoạn phát triển răng của gia súc lần lượt là: Mọc răng sữa, thay răng, hình thành vệt sỉ tinh, mòn răng.","reference":"Mục 4.2.1"},{"id":91,"text":"Vòm khẩu cái của gia súc nhai lại có đặc điểm?","answers":["A. Các gờ phân bố tương đối đều từ đấu đến cuối","B. Các gờ phân bố 1/3 phía trước và sát với phía sau","C. Không có các gờ trên vòm khẩu cái","D. Các gờ phân bố 2/3 phía trước và sát với phía sau"],"correct":3,"explanation":"Đáp án đúng là: Các gờ phân bố 2/3 phía trước và sát với phía sau Vì: Vòm khẩu cái của gia súc nhai lại có đặc điểm: Các gờ phân bố 2/3 phía trước và sát với phía sau.","reference":"Mục 4.2.1"},{"id":92,"text":"Điền vào nội dung còn trống: “Hầu là một … sau xoang miệng và được ngăn cách xoang miệng bởi ... Hầu nằm … thanh quản và cửa trước thực quản?","answers":["A. Xoang, họng, sau","B. Xoang hẹp, màng khẩu cái, sau","C. Xoang hẹp, màng khẩu cái, trước","D. Xoang rộng, màng khẩu cái, trước"],"correct":2,"explanation":"Đáp án đúng là: Xoang hẹp, màng khẩu cái, trước Vì: Hầu là một xoang hẹp sau xoang miệng và được ngăn cách xoang miệng bởi màng khẩu cái. Hầu nằm trước thanh quản và cửa trước thực quản.","reference":"Mục 4.2.2"},{"id":93,"text":"Phần ti hầu có 4 lỗ thông trong đó:…?","answers":["A. 1 lỗ thông ra miệng, 1 lỗ thông vào thực quản, 2 lỗ thông lên mũi","B. 2 lỗ thông lên mũi, 2 lỗ thông lên tai","C. 1 lỗ thông vào thanh quản, 1 lỗ thông vào thực quản, 2 lỗ thông lên tai","D. 1 lỗ thông vào thanh quản, 1 lỗ thông vào thực quản, 2 lỗ thông lên mũi"],"correct":1,"explanation":"Đáp án đúng là: 2 lỗ thông lên mũi, 2 lỗ thông lên tai Vì: Phần ti hầu có 4 lỗ thông trong đó: 2 lỗ thông lên mũi, 2 lỗ thông lên tai.","reference":"Mục 4.2.2"},{"id":94,"text":"Điền vào chỗ trống: “Tuyến mang tai là tuyến … màu vàng nhạt, nằm giữa …. của xương hàm dưới và cánh xương Atlat, trùm lên một phần mặt ngoài cạnh sau cơ hàm”.","answers":["A. Khá to, vòng cung nhánh đứng","B. Nhỏ, vòng cung nhánh đứng","C. Khá to, nhánh đứng","D. Nhỏ, nhánh đứng"],"correct":2,"explanation":"Đáp án đúng là: Khá to, nhánh đứng Vì: Tuyến mang tai là tuyến khá to màu vàng nhạt, nằm giữa nhánh đứng của xương hàm dưới và cánh xương Atlat, trùm lên một phần mặt ngoài cạnh sau cơ hàm.","reference":"Mục 4.1"},{"id":95,"text":"Điền từ vào chỗ trống: “Tuyến nước bọt là tuyến … phần trước của đường tiêu hoá. Tuyến tiết dịch đổ vào … có tác dụng tẩm ướt làm mềm thức ăn, tăng mùi vị thức ăn, làm cho con vật dễ …”.","answers":["A. Tiêu hóa phụ, xoang miệng, tiêu hóa thức ăn","B. Tiêu hóa phụ, thức ăn, nuốt","C. Tiêu hóa, xoang miệng, tiêu hóa","D. Tiêu hóa phụ, xoang miệng, nuốt"],"correct":3,"explanation":"Đáp án đúng là: Tiêu hóa phụ, xoang miệng, nuốt Vì: Tuyến nước bọt là tuyến tiêu hoá phụ phần trước của đường tiêu hoá. Tuyến tiết dịch đổ vào xoang miệng có tác dụng tẩm ướt làm mềm thức ăn, tăng mùi vị thức ăn, làm cho con vật dễ nuốt.","reference":"Mục 4.2.4"},{"id":96,"text":"Điền nội dung còn thiếu: “Màng khẩu cái làm giới hạn trên của cửa họng, cạnh trên (đáy) của màng khẩu cái có 2 nếp gấp dày gọi là chân cầu. Gần chỗ 2 nếp gấp mỗi bên có một lõm gọi là … trong đó có chứa …, lỗ thông của tuyến này nhỏ, mở ra phía sau chân cầu của màng”","answers":["A. Hố Amindan, tuyến Amidan","B. Hố sâu, hạch lâm ba","C. Nếp gấp, hạch","D. Hạch Amidan, dịch"],"correct":0,"explanation":"Đáp án đúng là: Hố Amindan, tuyến Amidan Vì: Màng khẩu cái làm giới hạn trên của cửa họng, cạnh trên (đáy) của màng khẩu cái có 2 nếp gấp dày gọi là chân cầu. Gần chỗ 2 nếp gấp mỗi bên có một lõm gọi là hố Amidan trong đó có chứa tuyến Amidan, lỗ thông của tuyến này nhỏ, mở ra phía sau chân cầu của màng.","reference":"Mục 4.2.1"},{"id":97,"text":"Niêm mạc má của loài nào có gai thịt hình nón, bổ xiên về phía sau?","answers":["A. Trâu, bò","B. Ngựa","C. Lợn","D. Chó"],"correct":0,"explanation":"Đáp án đúng là: Trâu, bò Vì: Niêm mạc má của trâu bò (gia súc nhai lại) có gai thịt hình nón,bổ xiên về phía sau để hướng thức ăn về phía sau.","reference":"Mục 4.2.1"},{"id":98,"text":"Màng khẩu cái….?","answers":["A. Nằm trong quãng nội hàm như trong lòng máng, phần sau bám vào mỏm lưỡi của thiệt cốt","B. Ở hai bên miệng từ mép đến màng khẩu cái","C. Lót mặt dưới, giữa xương răng hàm trên, từ sau răng cửa đến trước màng khẩu cái, đó là một vòm sụn","D. Có hình tam giác đỉnh dưới tự do thông xuống ngăn cách giữa miệng và yết hầu"],"correct":3,"explanation":"Đáp án đúng là: Có hình tam giác đỉnh dưới tự do thông xuống ngăn cách giữa miệng và yết hầu Vì: Màng khẩu cái: Có hình tam giác đỉnh dưới tự do thông xuống ngăn cách giữa miệng và yết hầu","reference":"Mục 4.2.1"},{"id":99,"text":"Màng khẩu cái có tác dụng?","answers":["A. Bịt đường lên mũi khi nuốt thức ăn","B. Tạo tế bào Lympho","C. Ngăn thức ăn không xuống thực quan","D. Hướng thức ăn vào trong"],"correct":0,"explanation":"Đáp án đúng là: Bịt đường lên mũi khi nuốt thức ăn Vì: Màng khẩu cái có tác dụng: Bịt đường lên mũi khi nuốt thức ăn","reference":"Mục 4.2.1"},{"id":100,"text":"Lưỡi của trâu, bò có…?","answers":["A. Mềm mịn, có 2 lỗ Morgani","B. Mềm, ít ráp, thân lưỡi dày to tạo thành u lưỡi","C. Mặt trên thô ráp, thân lưỡi dày to tạo thành u lưỡi","D. Mềm, ít ráp, có 2 lỗ Morgani"],"correct":2,"explanation":"Đáp án đúng là: Mặt trên thô ráp, thân lưỡi dày to tạo thành u lưỡi Vì: Lưỡi của trâu, bò có: Mặt trên thô ráp, thân lưỡi dày to tạo thành u lưỡi","reference":"Mục 4.2.1"},{"id":101,"text":"Đường cong nhỏ của ruột non…?","answers":["A. Có lỗ thông với ống dẫn mật và ống dẫn tụy","B. Có nhiều mạch quản thần kinh và nhiều nang kín bạch huyết","C. Được nối với màng treo ruột, trên màng có nhiều mạch quản thần kinh, phần thót nhỏ của màng có nhiều hạch lâm ba","D. Được nối với màng treo ruột và hạch lâm ba"],"correct":2,"explanation":"Đáp án đúng là: Được nối với màng treo ruột, trên màng có nhiều mạch quản thần kinh, phần thót nhỏ của màng có nhiều hạch lâm ba Vì: Được nối với màng treo ruột, trên màng có nhiều mạch quản thần kinh, phần thót nhỏ của màng có nhiều hạch lâm ba để tăng cường vận chuyển chất dinh dưỡng được hấp thu thông qua lông nhung, vi nhung.","reference":"Mục 5.1.2"},{"id":102,"text":"Niêm mạc trong của dạ lá sách có…?","answers":["A. Nhiều gai thịt","B. Nhiều hình đa giác giống tổ ong","C. Nhiều gấp nếp cong hình lưỡi liềm","D. Nhiều chân cầu"],"correct":2,"explanation":"Đáp án đúng là: Nhiều gấp nếp cong hình lưỡi liềm Vì: Phía trong của dạ lá sách có nhiều gấp nếp, phiến lá cong hình lưỡi liềm. Các phiến lá chiếm toàn bộ trong lòng dạ lá sách, phiến lá mỏng, chân phiến lá bám theo đường cong lớn từ lỗ thông dạ tổ ong đến lỗ thông dạ múi khế","reference":"Mục 5.1.2"},{"id":103,"text":"Rãnh thực quản có tác dụng…?","answers":["A. Nhận thức ăn từ dạ cỏ để đưa xuống dạ lá sách, múi khế","B. Tiêu hóa bằng hình thức hóa học","C. Tiêu hóa bằng hình thức cơ học","D. Chuyển thức ăn lỏng xuống dạ lá sách, múi khế mà không phải qua dạ cỏ"],"correct":3,"explanation":"Đáp án đúng là: Chuyển thức ăn lỏng xuống dạ lá sách, múi khế mà không phải qua dạ cỏ Vì: Có đặc điểm cấu tạo giống thực quản, rãnh này có tác dụng chuyển thức ăn lỏng xuống dạ lá sách, múi khế mà không phải qua dạ cỏ.","reference":"Mục 5.1.2"},{"id":104,"text":"Điền từ vào chỗ trông: “Hậu môn là … của đường tiêu hoá, sau trực tràng, nó giống … thắt lại nhăn nheo, ở con béo hậu môn lồi ra, con gầy, già hậu môn tụt vào trong”.","answers":["A. Cửa sau, miệng túi","B. Cửa trước, miệng túi","C. Cửa sau, manh nang","D. Cửa trên, băng thắt"],"correct":0,"explanation":"Đáp án đúng là: Cửa sau, miệng túi Vì: Hậu môn là cửa sau của đường tiêu hoá, sau trực tràng, nó giống miệng túi thắt lại nhăn nheo, ở con béo hậu môn lồi ra, con gầy, già hậu môn tụt vào trong","reference":"Mục 5.2.2"},{"id":105,"text":"Tuyến tụy là tuyến?","answers":["A. Nội tiết","B. Ngoại tiết","C. Tuyến kép","D. Tuyến đơn"],"correct":2,"explanation":"Đáp án đúng là: Tuyến kép Vì: Tuyến tụy là tuyến kép vừa có chức năng nội tiết (tiết Insulin và Glucagon) vừa có chức năng ngoại tiết (tiết dịch tụy).","reference":"Mục 5.1.4"},{"id":106,"text":"Tuyến tụy nằm ở…?","answers":["A. Quai chữ u của tá tràng","B. Hạ vị dạ dày","C. Tá tràng ruột non","D. Sát lách và thận trái"],"correct":0,"explanation":"Đáp án đúng là: Quai chữ u của tá tràng Vì: Tuyến tụy nằm ở quai chữ u của tá tràng ruột non","reference":"Mục 5.1.4"},{"id":107,"text":"Dạ dày nào của loài nhai lại tham gia vào quá trình tiêu hóa hóa học?","answers":["A. Dạ múi khế","B. Dạ tổ ong","C. Dạ lá sách","D. Dạ cỏ"],"correct":0,"explanation":"Đáp án đúng là: Dạ múi khế Vì: Đây là túi tiết ra dịch vị nên có khả năng tiêu hóa hóa học thức ăn như dạ dày đơn và dạ dày trung gian","reference":"Mục 5.1.2"},{"id":108,"text":"Dạ lá sách nằm ngang khoảng gian sườn thứ…….trên đường kẻ song song với cột sống từ khớp bả vai cánh tay kéo dài về phía sau?","answers":["A. 6-11","B. 9-11","C. 6-8","D. 7-10"],"correct":3,"explanation":"Đáp án đúng là: 7-10 Vì: Dạ lá sách là một túi hơi tròn, nằm giữa dạ tổ ong và dạ múi khế, bên phải đường trung tuyến của xương ức, sát vùng sườn bên phải ngang khoảng gian sườn thứ 7 - 10, trên đường kẻ song song với cột sống từ khớp bả vai - cánh tay kéo dài về phía sau.","reference":"Mục 5.1.2"},{"id":109,"text":"Ruột già lớn gấp…. ruột non?","answers":["A. 2-3 lần","B. 2 lần","C. 2-5 lần","D. 3 lần"],"correct":0,"explanation":"Đáp án đúng là: 2-3 lần Vì: Ruột già lớn gấp 2-3 lần ruột non","reference":"Mục 5.2.1"},{"id":110,"text":"Dạ dày đơn tiêu hóa bằng hình thức?","answers":["A. Cơ học, hóa học, vi sinh vật học","B. Hóa học, vi sinh vật học","C. Cơ học, hóa học","D. Cơ học, vi sinh vật học"],"correct":0,"explanation":"Đáp án đúng là: Cơ học, hóa học Vì: Chỉ có chức năng nhào trộn co bóp (tiêu hóa cơ học) và tiết men để tiêu hóa hóa học, khác với dạ dày đơn và dạ dày trung gian.","reference":"Mục 5.1.2"},{"id":111,"text":"Đoạn nào của ruột là nơi hấp thụ triệt để nhất?","answers":["A. Không tràng","B. Kết tràng","C. Tá tràng","D. Hồi tràng"],"correct":0,"explanation":"Đáp án đúng là: Không tràng Vì: Đây là phần dài nhất của ruột non, bên trong niêm mạc có nhiều lông nhung, vi nhung tăng cường diện tích tiếp xúc với thức ăn nên đây là nơi hấp thu mạnh nhất.","reference":"Mục 5.1.2"},{"id":112,"text":"Dạ dày đơn có ở…?","answers":["A. Gia súc nhai lại và lợn","B. Lợn","C. Trâu, bò, dê, cừu","D. Ngựa, thỏ và loài ăn thịt"],"correct":3,"explanation":"Đáp án đúng là: Ngựa, thỏ và loài ăn thịt Vì: Ngựa, thỏ và loài ăn thịt có dạ dày 1 túi (có 2 mặt, 2 cạnh, 2 đầu) thực hiện chức năng tiêu hóa cơ học và hóa học","reference":"Mục 5.1.2"},{"id":113,"text":"Xoang phúc mạc là xoang nằm trong….?","answers":["A. Xoang ngực và xoang bụng","B. Xoang bụng","C. Xoang ngực","D. Xoang chậu"],"correct":0,"explanation":"Đáp án đúng là: Xoang bụng Vì: Xoang phúc mạc nằm trong xoang bụng, bọc sát cơ quan nội tạng (trừ thận). Khi còn ở thời kỳ phôi thai, ống tiêu hoá nằm ngoài phúc mạc, khi thai phát triển lớn, ống tiêu hoá đẩy phúc mạc vào xoang bụng nên màng phúc mạc tạo thành 2 lá","reference":"Mục 5.1.1"},{"id":114,"text":"Khu có tuyến trên niêm mạc dạ dày đơn của loài nào lớn nhất?","answers":["A. Lợn","B. Chó","C. Thỏ","D. Ngựa"],"correct":1,"explanation":"Đáp án đúng là: Chó Vì: Khu có tuyến trên niêm mạc dạ dày đơn của loài chó lớn nhất vì đây là loài ăn thịt, khả năng tiêu hóa bằng hình thức hóa học diễn ra mạnh nhất. Do vậy khu có tuyến trên niêm mạc dạ dày lớn nhất","reference":"Mục 5.1.2"},{"id":115,"text":"Không được sử dụng thuốc gây nôn cho ngựa vì…?","answers":["A. Cơ vòng lỗ thượng vị chắc chắn","B. Cơ vòng lỗ thượng vị lỏng lẻo","C. Thành dạ dày dày","D. Thành dạ dày mỏng"],"correct":0,"explanation":"Đáp án đúng là: Cơ vòng lỗ thượng vị chắc chắn Vì: Cơ vòng lỗ thượng vị chắc chắn nên ngựa không thể nôn mà chỉ đặt ống thông ở ngựa","reference":"Mục 5.1.2"},{"id":116,"text":"Dạ dày trung gian có đặc điểm?","answers":["A. Đường cong lớn gần thượng vị hình thành một manh nang hay túi mù","B. Là dạ trung gian nằm giữa dạ dày đơn và dạ dày kép","C. Phần không tuyến chiếm gần nửa dạ dày","D. Cơ vòng thượng vị chắc chắn"],"correct":0,"explanation":"Đáp án đúng là: Đường cong lớn gần thượng vị hình thành một manh nang hay túi mù Vì: Dạ dày trung gian có hình thái giống dạ dày đơn nhưng tại đường cong lớn gần thượng vị hình thành một manh nang hay túi mù, tại đó có hình thức tiêu hóa bằng vi sinh vật nên có điểm trung gian giữa dạ dày đơn và dạ dày kép.","reference":"Mục 5.1.2"},{"id":117,"text":"Loài gia súc nào dưới đây không có túi mật","answers":["A. Ngựa","B. Lợn","C. Trâu, bò","D. Chó"],"correct":0,"explanation":"Đáp án đúng là: Ngựa Vì: Cấu tạo gan của ngựa không có túi mật, khi tiêu hóa dịch mật được sản xuất và đổ thẳng vào ống dẫn để đến tá tràng của ruột non","reference":"Mục 5.1.4"},{"id":118,"text":"Vị trí của dạ tổ ong nằm ngang khoảng xương sườn?","answers":["A. 6-8","B. 10-13","C. 6-9","D. 7-10"],"correct":0,"explanation":"Đáp án đúng là: 6-8 Vì: Dạ tổ ong nằm sau cơ hoành, giáp với túi trái dạ cỏ, phía dưới nằm đè lên sụn mỏm kiếm xương ức ngang khoảng gian sườn 6 - 8. Bên phải dạ tổ ong giáp gan và vòng cung dưới của cơ hoành.","reference":"Mục 5.1.2"},{"id":119,"text":"Dạ cỏ nằm sau cơ hoành, chiếm….?","answers":["A. Giáp vùng sườn bên phải","B. Toàn bộ nửa phải xoang bụng","C. Giáp vùng sườn bên trái","D. Toàn bộ nửa trái xoang bụng"],"correct":3,"explanation":"Đáp án đúng là: Toàn bộ nửa trái xoang bụng Vì: Dạ cỏ nằm sau cơ hoành, chiếm toàn bộ nửa trái xoang bụng từ khoảng gian sườn thứ 6 đến cửa chậu hông. Vì vậy khi con vật bị chướng hơi thì dạ cỏ căng làm cho xoang bụng bên trái phình to, lõm hông trái phồng căng lên.","reference":"Mục 5.1.2"},{"id":120,"text":"Mặt trong (sau) phía trên bên phải của gan có….?","answers":["A. Tình mạch cửa gan","B. Thùy phụ spygel","C. Rốn gan","D. Túi mật"],"correct":1,"explanation":"Đáp án đúng là: Thùy phụ spygel Vì: Mặt trong (sau) phía trên bên phải của gan có Thùy phụ spygel","reference":"Mục 5.1.4"},{"id":121,"text":"Khi trâu, bò chướng hơi dạ cỏ thì….?","answers":["A. Xoang bụng bên phải phình to, hõm hông phải phồng căng lên","B. Xoang bụng bên trái phình to, hõm hông trái phồng căng lên","C. Xoang bụng bên trái phình to","D. Xoang bụng bên phải phình to"],"correct":1,"explanation":"Đáp án đúng là: Xoang bụng bên trái phình to, hõm hông trái phồng căng lên Vì: Vì dạ cỏ nằm hoàn toàn bên trái xoang bụng từ sau cơ hoành đến cửa vào chậu hông nên khi chướng hơi dạ cỏ thì dạ cỏ căng phồng chứa đầy hơi sẽ chèn ép làm xoang bụng bên trái phình to, hõm hông trái phồng căng lên","reference":"Mục 5.1.2"},{"id":122,"text":"Dạ tổ ong có dung tích…?","answers":["A. 5-8 lít","B. 4-6 lít","C. 3-5 lít","D. 3-8 lít"],"correct":0,"explanation":"Đáp án đúng là: 5-8 lít Vì: Dạ tổ ong là cái túi nhỏ nhất nằm phía trước 3 túi kia","reference":"Mục 5.1.2"},{"id":123,"text":"Gan của ngựa có…?","answers":["A. 4 thùy chính, 1 thùy phụ, có túi mật","B. 3 thùy chính, 1 thùy phụ, không có túi mật","C. 4 thùy chính, 1 thùy phụ, không có túi mật","D. 3 thùy chính, 1 thùy phụ, có túi mật"],"correct":1,"explanation":"Đáp án đúng là: 3 thùy chính, 1 thùy phụ, không có túi mật Vì: gan của ngựa được chia thành 3 thùy chính, 1 thùy phụ, không có túi mật","reference":"Mục 5.1.4"},{"id":124,"text":"Xoang bụng bao bọc….?","answers":["A. Xoang phúc mạc và một số cơ quan nội tạng","B. Xoang phúc mạc","C. Một số cơ quan nội tạng","D. Xoang phế mạc và một số cơ quan nội tạng"],"correct":0,"explanation":"Đáp án đúng là: Xoang phúc mạc và một số cơ quan nội tạng Vì: Xoang bụng bao bọc xoang phúc mạc và một số cơ quan nội tạng trong xoang bụng","reference":"Mục 5.1.1"},{"id":125,"text":"Gan lợn gồm có…?","answers":["A. 5 thùy chính, 1 thùy phụ","B. 3 thùy chính, 1 thùy phụ","C. Không phân thùy","D. 4 thùy chính, 1 thùy phụ"],"correct":3,"explanation":"Đáp án đúng là: 4 thùy chính, 1 thùy phụ Vì: gan của lợn được chia thành 4 thùy chính, 1 thùy phụ.","reference":"Mục 5.1.4"},{"id":126,"text":"Cơ quan làm nhiệm vụ dẫn khí là?","answers":["A. Xoang mũi, phế quản, thanh quản","B. Khí quản, phế quản, thanh quản, phế nang","C. Xoang mũi, thanh quản, khí quản, phế quản","D. Xoang mũi, khí quản, phế quản, phế nang"],"correct":2,"explanation":"Đáp án đúng là: Xoang mũi, thanh quản, khí quản, phế quản Vì: Cơ quan làm nhiệm vụ dẫn khí là Xoang mũi, thanh quản, khí quản, phế quản.","reference":"Mục 6.2"},{"id":127,"text":"Xoang ngực bao trùm?","answers":["A. Xoang phúc mạc","B. Xoang phế mạc","C. Xoang phế mạc và cơ quan bộ phận trong xoang ngực","D. Cơ quan trong xoang ngực"],"correct":2,"explanation":"Đáp án đúng là: Xoang phế mạc và cơ quan bộ phận trong xoang ngực Vì: Xoang ngực bao trùm Xoang phế mạc và cơ quan bộ phận trong xoang ngực","reference":"Mục 6.4"},{"id":128,"text":"Điền vào chỗ trống: “Đoạn khí quản ở vùng cổ nằm … thực quản, … phía sau nằm bên … thực quản giữa các cơ dài cổ, ức thiệt cốt, ức giáp trạng, ức đầu, động mạch cổ và thần kinh 10”.","answers":["A. Trên, 1/3, trái","B. Dưới, 1/3, phải","C. Dưới, 1/3, trái","D. Trên, 1/3, phải"],"correct":1,"explanation":"Đáp án đúng là: Dưới, 1/3, phải Vì: Đoạn khí quản ở vùng cổ nằm dưới thực quản, 1/3 phía sau nằm bên phải thực quản giữa các cơ dài cổ, ức thiệt cốt, ức giáp trạng, ức đầu, động mạch cổ và thần kinh 10","reference":"Mục 6.2.3"},{"id":129,"text":"Xoang mũi là do các xương nào tạo nên?","answers":["A. Xương mũi, xương gò má, xương trán, xương sàng, xương lá mía","B. Xương mũi, xương hàm trên, xương ống cuộn, xương sàng, xương lá mía","C. Xương hàm trên, xương gò má, xương trán, xương sàng, xương lá mía","D. Xương mũi, xương hàm trên, xương trán, xương sàng, xương lá mía"],"correct":3,"explanation":"Đáp án đúng là: Xương mũi, xương hàm trên, xương trán, xương sàng, xương lá mía Vì: Cấu tạo xoang mũi là do xương mũi, xương hàm trên, xương trán, xương sàng, xương lá mía tạo nên.","reference":"Mục 6.2.1"},{"id":130,"text":"Điền vào chỗ trống: “Thanh quản là … nằm giữa … và khí quản, ở dưới thiệt cốt và phần đầu … gồm có cốt sụn, cơ”.","answers":["A. Xoang hẹp, yết hầu, khí quản","B. Xoang ngắn, yết hầu, thực quản","C. Xoang rộng, xoang miệng, thực quản","D. Xoang hẹp, yết hầu, thực quản"],"correct":1,"explanation":"Đáp án đúng là: Xoang ngắn, yết hầu, thực quản Vì: Thanh quản là xoang ngắn nằm giữa yết hầu và khí quản, ở dưới thiệt cốt và phần đầu thực quản gồm có cốt sụn, cơ","reference":"Mục 6.2.2"},{"id":131,"text":"Phế quản gốc là phế quản?","answers":["A. Từ ngã ba đến rốn phổi","B. Từ rốn phổi đến phế nang","C. Từ thanh quản đến cửa vào lồng ngực","D. Từ ngã ba của khí quản"],"correct":0,"explanation":"Đáp án đúng là: Từ ngã ba đến rốn phổi Vì: Phế quản gốc là phế quản từ ngã ba đến rốn phổi.","reference":"Mục 6.2.4"},{"id":132,"text":"Xương lá mía có đặc điểm?","answers":["A. Là mặt trong của xương liên hàm và xương hàm trên","B. Giáp với xương sàng và thông với yết hầu","C. Là mặt trên của xương vòm khẩu cái","D. Ngăn giữa mũi, kéo từ phiến thẳng đứng của xương sàng đến đầu mũi và tựa vào phiến sụn đầu mũi"],"correct":3,"explanation":"Đáp án đúng là: Ngăn giữa mũi, kéo từ phiến thẳng đứng của xương sàng đến đầu mũi và tựa vào phiến sụn đầu mũi Vì: Xương lá mía ngăn giữa mũi, kéo từ phiến thẳng đứng của xương sàng đến đầu mũi và tựa vào phiến sụn đầu mũi","reference":"Mục 6.2.1"},{"id":133,"text":"Các cơ quan có chức phận hô hấp riêng biệt gồm:….?","answers":["A. Thanh quản - khí quản - phế quản - phổi","B. Xoang mũi - thanh quản - khí quản - phế quản - phổi","C. Xoang mũi - khí quản - phế quản - phổi","D. Xoang mũi - thanh quản - khí quản - phế quản"],"correct":1,"explanation":"Đáp án đúng là: Xoang mũi - thanh quản - khí quản - phế quản - phổi Vì: Các cơ quan có chức phận hô hấp riêng biệt gồm: Xoang mũi - thanh quản - khí quản - phế quản - phổi","reference":"Mục 6.1"},{"id":134,"text":"Xoang phế mạc nằm trong…?","answers":["A. Xoang chậu","B. Xoang sọ","C. Xoang ngực","D. Xoang phúc mạc"],"correct":2,"explanation":"Đáp án đúng là: Xoang ngực Vì: Xoang phế mạc nằm trong xoang ngực","reference":"Mục 6.4.2"},{"id":135,"text":"Quá trình nuốt - thở gồm các cơ quan nào tham gia?","answers":["A. Sụn tiểu thiệt, sụn nhẫn, sụn giáp trạng, sụn phễu","B. Sụn tiểu thiệt, sụn phễu, sụn giáp trạng, màng khẩu cái","C. Sụn tiểu thiệt, sụn nhẫn, sụn giáp trạng, vòm khẩu cái","D. Sụn tiểu thiệt, sụn nhẫn, sụn giáp trạng, màng khẩu cái"],"correct":1,"explanation":"Đáp án đúng là: Sụn tiểu thiệt, sụn phễu, sụn giáp trạng, màng khẩu cái Vì: Quá trình nuốt - thở gồm sựu tham gia của các cơ quan: Sụn tiểu thiệt, sụn phễu, sụn giáp trạng, màng khẩu cái","reference":"Mục 6.2.2"},{"id":136,"text":"Điền vào chỗ trống: “Các cơ vùng thanh quản đều là …, sợi cơ co làm đổi vận động các sụn và thay đổi độ mở của cửa thanh quản, làm căng dây âm thanh”","answers":["A. Cơ vân","B. Cơ trơn","C. Tổ chức liên kết","D. Cơ tim"],"correct":0,"explanation":"Đáp án đúng là: Cơ vân Vì: Các cơ vùng thanh quản đều là cơ vân, sợi cơ co làm đổi vận động các sụn và thay đổi độ mở của cửa thanh quản, làm căng dây âm thanh","reference":"Mục 6.2.2"},{"id":137,"text":"Điền vào chỗ trống: “Niêm mạc lót mặt trong phế quản … hơn khí quản và có nhiều …”","answers":["A. Nhạy cảm, tuyến nhày","B. Dễ kích ứng, lông nhung chuyển động","C. Dễ kích ứng, tuyến nhày","D. Nhạy cảm, lông nhung chuyển động"],"correct":0,"explanation":"Đáp án đúng là: Nhạy cảm, tuyến nhày Vì: Niêm mạc lót mặt trong phế quản nhạy cảm hơn khí quản và có nhiều tuyến nhầy","reference":"Mục 6.2.4"},{"id":138,"text":"Điền vào chỗ trống: “Khí quản là … lớn nối tiếp từ sau thanh quản cho đến … tạo thành 2 phế quản gốc”.","answers":["A. Ống dẫn khí, ngã ba phân nhánh","B. Một ống, phế quản","C. Ống dẫn khí, phế quản","D. Một đoạn, dưới thực quản"],"correct":0,"explanation":"Đáp án đúng là: Ống dẫn khí, ngã ba phân nhánh Vì: Khí quản là ống dẫn khí lớn nối tiếp từ sau thanh quản cho đến ngã ba phân nhánh tạo thành 2 phế quản gốc.","reference":"Mục 6.2.3"},{"id":139,"text":"Tỷ lệ lá phổi phải với lá phổi trái là?","answers":["A. 1,0 - 1,4/1","B. 1,2 - 1,4/1","C. 1,2/1","D. 1,0 - 1,2/1"],"correct":1,"explanation":"Đáp án đúng là: 1,2 - 1,4/1 Vì: Tỷ lệ lá phổi phải với lá phổi trái là 1,2 - 1,4/1.","reference":"Mục 6.3.2"},{"id":140,"text":"Nơi làm nhiệm vụ trao đổi khí chính của Phổi là?","answers":["A. Phế nang","B. Khí quản","C. Thanh quản","D. Phế quản"],"correct":0,"explanation":"Đáp án đúng là: Phế nang Vì: Nơi làm nhiệm vụ trao đổi khí chính của Phổi là Phế nang","reference":"Mục 6.3.3"},{"id":141,"text":"Điền vào chỗ trống: “Phía ngoài lỗ mũi có 2 cánh mũi …, tròn đính nhau ở 2 mép, gắn liền phía trên …”.","answers":["A. Dày, mép","B. Dày, môi trên","C. Mỏng, mép","D. Mỏng, môi trên"],"correct":1,"explanation":"Đáp án đúng là: Dày, môi trên Vì: Phía ngoài lỗ mũi có 2 cánh mũi dày, tròn đính nhau ở 2 mép, gắn liền phía trên môi trên","reference":"Mục 6.2.1"},{"id":142,"text":"Niêm mạc ở vùng nào của hầu có cảm giác cao?","answers":["A. Phần cửa hầu","B. Phần trước cửa hầu","C. Phần giữa hầu","D. Phần sau cửa hầu"],"correct":1,"explanation":"Đáp án đúng là: Phần trước cửa hầu Vì: Niêm mạc ở phần trước cửa hầu có cảm giác cao, nên chỉ vật lạ nhỏ rơi vào cũng gây ho mạnh làm vật văng ra.","reference":"Mục 6.2.2"},{"id":143,"text":"Thanh quản có thể thay đổi rộng hẹp tuỳ theo lượng khí vào nhiều hay ít khi hô hấp. Khi cơ co rút bị liệt sẽ gây bệnh gì?","answers":["A. Bệnh ho","B. Bệnh khó thở","C. Bệnh ngứa thanh quản","D. Bệnh viêm thanh quẩn"],"correct":1,"explanation":"Đáp án đúng là: Bệnh khó thở Vì: Thanh quản có thể thay đổi rộng hẹp tuỳ theo lượng khí vào nhiều hay ít khi hô hấp. Khi cơ co rút bị liệt sẽ gây bệnh khó thở","reference":"Mục 6.2.2"},{"id":144,"text":"Lỗ mũi của lợn có đặc điểm?","answers":["A. Cử động nhiều","B. Gắn với môi trên, hơi tròn, ít cử động","C. Hình dấu hỏi, khoảng cách gần nhau","D. Hình trứng, khoảng cách xa nhau"],"correct":1,"explanation":"Đáp án đúng là: Gắn với môi trên, hơi tròn, ít cử động Vì: Lỗ mũi của lợn có đặc điểm: Gắn với môi trên, hơi tròn, ít cử động.","reference":"Mục 6.2.1"},{"id":145,"text":"Sụn trên hầu còn gọi là?","answers":["A. Sụn giáp trạng","B. Sụn phễu","C. Sụn nhẫn","D. Sụn tiểu thiệt"],"correct":3,"explanation":"Đáp án đúng là: Sụn tiểu thiệt Vì: Sụn trên hầu còn gọi là sụn tiểu thiệt","reference":"Mục 6.2.2"},{"id":146,"text":"Lợn có số lượng vòng sụn khí quản là?","answers":["A. 50 vòng","B. 32-36 vòng","C. 48-60 vòng","D. 80 vòng"],"correct":1,"explanation":"Đáp án đúng là: 32-36 vòng Vì: Lợn có số lượng vòng sụn khí quản là 32-36 vòng.","reference":"Mục 6.2.3"},{"id":147,"text":"Thanh quản được cấu tạo bởi….?","answers":["A. 4 mảnh sụn và 3 loại cơ","B. 4 mảnh sụn và 8 loại cơ","C. 4 mảnh sụn và 2 loại cơ","D. 3 mảnh sụn và 2 loại cơ"],"correct":2,"explanation":"Đáp án đúng là: 4 mảnh sụn và 2 loại cơ Vì: Thanh quản được cấu tạo bởi 4 mảnh sụn và 2 loại cơ","reference":"Mục 6.2.2"},{"id":148,"text":"Phế quản gốc phải có đặc điểm?","answers":["A. To và đi dốc hơn phế quản gốc trái","B. Bằng và đi dốc hơn phế quản gốc trái","C. Bé và đi dốc hơn phế quản gốc trái","D. Nhỏ và đi dốc hơn phế quản gốc trái"],"correct":0,"explanation":"Đáp án đúng là: To và đi dốc hơn phế quản gốc trái Vì: Phế quản gốc phải to và đi dốc hơn phế quản gốc trái.","reference":"Mục 6.2.4"},{"id":149,"text":"Phổi là bộ phận quan trọng của cơ quan hô hấp, có nhiệm vụ trao đổi khí …. giữa máu và môi trường ngoài.","answers":["A. Gián đoạn","B. Trực tiếp","C. Gián tiếp","D. O 2 và CO 2"],"correct":1,"explanation":"Đáp án đúng là: Trực tiếp Vì: Phổi là bộ phận quan trọng của cơ quan hô hấp, có nhiệm vụ trao đổi khí trực tiếp giữa máu và môi trường ngoài.","reference":"Mục 6.3"},{"id":150,"text":"Cấu tạo của khí quản gồm các….?","answers":["A. Các tổ chức liên kết và cơ","B. Cơ trơn và cơ vân","C. Vòng sụn gồm nhiều mảnh sụn ghép với nhau","D. Vòng sụn không khép kín (vòng có dạng chữ C, phần hở ngửa lên thực quản)"],"correct":3,"explanation":"Đáp án đúng là: Vòng sụn không khép kín (vòng có dạng chữ C, phần hở ngửa lên thực quản) Vì: Vòng sụn không khép kín (vòng có dạng chữ C, phần hở ngửa lên thực quản)","reference":"Mục 6.2.3"},{"id":151,"text":"Tim nằm trong lồng ngực theo chiều hướng từ ….?","answers":["A. Phải sang trái","B. Trái sang phải","C. Sau ra trước","D. Dưới lên trên"],"correct":0,"explanation":"Đáp án đúng là: Phải sang trái Vì: Tim là một khối có dạng hình nón lộn ngược, nằm trong lồng ngực, chiều hướng đi từ trên xuống dưới, từ trước ra sau, từ phải sang trái.","reference":"Mục 7.2.1"},{"id":152,"text":"Điền vào chỗ trống: “Động mạch phổi xuất phát từ đáy tâm thất phải sau …, hướng lên trên về sau, được bọc bằng một bao chung với nguyên động mạch”.","answers":["A. Van tăng mạo","B. Van 2 lá","C. Van tổ chim","D. Van 3 lá"],"correct":3,"explanation":"Đáp án đúng là: Van 3 lá Vì: Động mạch phổi xuất phát từ đáy tâm thất phải sau van 3 lá, hướng lên trên về sau, được bọc bằng một bao chung với nguyên động mạch","reference":"Mục 7.3.3"},{"id":153,"text":"Lách của trâu bò có hình dạng như thế nào?","answers":["A. Hình bầu dục dài, có màu xanh xấm ở con cái, màu nâu đỏ ở con đực","B. Hình cầ, màu nâu đỏ","C. Hình lưỡi liềm, màu xanh hồng","D. Dài, nhỏ, màu hồng"],"correct":0,"explanation":"Đáp án đúng là: Hình bầu dục dài, có màu xanh xấm ở con cái, màu nâu đỏ ở con đực Vì: Lách của trâu bò có hình dạng: hình bầu dục dài, có màu xanh xấm ở con cái, màu nâu đỏ ở con đực","reference":"Mục 7.5.2"},{"id":154,"text":"Điền vào chỗ trống: “ Nguyên động mạch là một thân chung xuất phát từ đáy tâm thất trái trước … và phía trên mặt sau vách liên thất, từ đó nó đi chéo lên trên hơi chếch về phía trước dài độ … ”","answers":["A. Van 2 lá, 5 - 6 cm","B. Van tăng mạo, 5 - 6 cm","C. Van 3 lá, 5 - 6 cm","D. Van tổ chim, 5 - 6 cm"],"correct":0,"explanation":"Đáp án đúng là: Van 2 lá, 5 - 6 cm Vì: Nguyên động mạch là một thân chung xuất phát từ đáy tâm thất trái trước van 2 lá và phía trên mặt sau vách liên thất, từ đó nó đi chéo lên trên hơi chếch về phía trước dài độ 5 - 6 cm .","reference":"Mục 7.3.3"},{"id":155,"text":"Điền từ vào chỗ trống: “Vòng tuần hoàn lớn: Máu xuất phát từ…. mang O 2 , các chất dinh dưỡng (máu đỏ tươi) đi đến tất cả các cơ quan, sau đó trở về bằng tĩnh mạch (máu thẫm) chứa nhiều CO 2 và sản phẩm thừa của quá trình trao đổi chất về tâm nhĩ phải”","answers":["A. Tâm thất phải theo động mạch phổi","B. Động mạch chủ đổ về tâm nhĩ phải","C. Tâm thất trái theo động mạch chủ trước và chủ sau","D. Tĩnh mạch phổi đổ về tâm nhĩ trái"],"correct":2,"explanation":"Đáp án đúng là: Tâm thất trái theo động mạch chủ trước và chủ sau Vì: Vòng tuần hoàn lớn: Máu xuất phát từ tâm thất trái theo động mạch chủ trước và chủ sau mang O 2 , các chất dinh dưỡng (máu đỏ tươi) đi đến tất cả các cơ quan, sau đó trở về bằng tĩnh mạch (máu thẫm) chứa nhiều CO 2 và sản phẩm thừa của quá trình trao đổi chất về tâm nhĩ phải","reference":"Mục 7.1"},{"id":156,"text":"Điền vào chỗ trống: “Hạch bạch huyết có hình … hay hình …., hình trứng, có màu xám hay hồng, kích thước thay đổi từ 0,2 đến 20cm, số lượng thay đối tuỳ loài”.","answers":["A. Tròn, hạt đậu","B. Tròn, cầu","C. Bầu dục, tròn","D. Bầu dục, hạt đậu"],"correct":3,"explanation":"Đáp án đúng là: Bầu dục, hạt đậu Vì: Hạch bạch huyết có hình bầu dục hay hình hạt đậu, hình trứng, có màu xám hay hồng, kích thước thay đổi từ 0,2 đến 20cm, số lượng thay đối tuỳ loài","reference":"Mục 7.4.3"},{"id":157,"text":"Tim của trâu bò có đặc điểm như thế nào?","answers":["A. Dài, nhỏ hơn tim ngựa, cơ vòng nhẫn có cốt sụn tạo thành xương tim","B. Hơi tròn, đỉnh tù, có rãnh dọc phụ bên trái và phải","C. Không lớn lắm, tâm nhĩ có nhiều mẻ sâu chia như mào gà","D. Ngắn, rộng, xoang tim lớn"],"correct":0,"explanation":"Đáp án đúng là: Dài, nhỏ hơn tim ngựa, cơ vòng nhẫn có cốt sụn tạo thành xương tim Vì: Tim của trâu bò có đặc điểm: dài, nhỏ hơn tim ngựa, cơ vòng nhẫn có cốt sụn tạo thành xương tim","reference":"Mục 7.2.5"},{"id":158,"text":"Điền vào chỗ trống: “Tĩnh mạch là những mạch quản dẫn máu từ…”","answers":["A. Phổi đến các cơ quan","B. Tim trở về các cơ quan","C. Các cơ quan trở về tim","D. Phổi trở về tim"],"correct":2,"explanation":"Đáp án đúng là: Các cơ quan trở về tim Vì: Tĩnh mạch là những mạch quản dẫn máu từ các cơ quan trở về tim.","reference":"Mục 7.3.1"},{"id":159,"text":"Điền vào chỗ trống: “Thành mao mạch rất …, chỉ gồm … tầng tế bào nội mô dẹt, khả năng co giãn kém”","answers":["A. Mỏng, một","B. Mỏng, hai","C. Dày, một","D. Dày, hai"],"correct":0,"explanation":"Đáp án đúng là: Mỏng, một Vì: Thành mao mạch rất mỏng, chỉ gồm một tầng tế bào nội mô dẹt, khả năng co giãn kém","reference":"Mục 7.3.2"},{"id":160,"text":"Cấu tạo từ ngoài vào trong của tim có mấy lớp?","answers":["A. 3","B. 5","C. 4","D. 2"],"correct":0,"explanation":"Đáp án đúng là: 3 Vì: Cấu tạo từ ngoài vào trong của tim có 3 lớp: Bao tim, cơ tim và lớp màng lót trong","reference":"Mục 7.2.4"},{"id":161,"text":"Điền vào chỗ trống: “Động mạch bao giờ cũng đi sâu ở lớp trong của cơ thể, động mạch càng to càng đi … trong xoang cơ thể, tránh được tác nhân gây tổn thương”","answers":["A. Vào lớp sâu","B. Ở lớp nông","C. Tránh","D. Xa"],"correct":0,"explanation":"Đáp án đúng là: Vào lớp sâu Vì: “Động mạch bao giờ cũng đi sâu ở lớp trong của cơ thể, động mạch càng to càng đi vào lớp sâu trong xoang cơ thể, tránh được tác nhân gây tổn thương”.","reference":"Mục 7.3.1"},{"id":162,"text":"Trong cơ thể lượng máu lưu thông trong mạch là?","answers":["A. 46%","B. 70%","C. 54%","D. 20%"],"correct":2,"explanation":"Đáp án đúng là: 54% Vì: Trong cơ thể có 54% (khoảng 1/2) lượng máu lưu thông trong mạch, còn lại khoảng 46% được dự trữ, ở gan: 20%, lách 16%, da 10%.","reference":"Mục 7.1"},{"id":163,"text":"Hệ tim mạch bao gồm:…?","answers":["A. Tim, hệ mạch máu, hệ mạch bạch huyết, cơ quan tạo huyết","B. Tim, hệ mạch bạch huyết","C. Tim, hệ mạch máu, hệ mạch bạch huyết, dịch bạch huyết","D. Tim, hệ mạch máu, hệ mạch bạch huyết"],"correct":0,"explanation":"Đáp án đúng là: Tim, hệ mạch máu, hệ mạch bạch huyết Vì: Nhu cầu xã hội về chính sách là một đòi hỏi của cộng đồng, được thể hiện dưới hình thức này hay hình thức khác, yêu cầu nhà nước phải giải quyết.","reference":"Mục 7.1"},{"id":164,"text":"Số lượng tĩnh mạch nhiều gấp mấy lần động mạch?","answers":["A. 2 lần","B. 1,5 lần","C. 2,5 lần","D. 3 lần"],"correct":0,"explanation":"Đáp án đúng là: 2 lần Vì: Số lượng tĩnh mạch nhiều gấp 2 lần lần động mạch.","reference":"Mục 7.3.1"},{"id":165,"text":"Điền vào chỗ trống: “Động mạch vành nhận … lượng máu từ tâm thất trái đi vào động mạch chủ”","answers":["A. 20%","B. 10%","C. 15%","D. 5%"],"correct":1,"explanation":"Đáp án đúng là: 10% Vì: Động mạch vành nhận 10% lượng máu từ tâm thất trái đi vào động mạch chủ","reference":"Mục 7.2.4"},{"id":166,"text":"Điền từ còn thiếu: “Xoang tâm nhĩ thu hồi máu từ tĩnh mạch … và …, tĩnh mạch lẻ hoặc …”","answe
