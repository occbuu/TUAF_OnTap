<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn Tập - Ký sinh trùng thú y (150 câu)</title>
<style>
:root {
  --blue:      #2563eb;
  --blue-dark: #1e40af;
  --blue-bg:   #eff6ff;
  --green:     #16a34a;
  --green-bg:  #f0fdf4;
  --green-bd:  #86efac;
  --yellow-bg: #fefce8;
  --yellow-bd: #fde047;
  --gray:      #6b7280;
  --gray-lt:   #f3f4f6;
  --border:    #e5e7eb;
  --text:      #111827;
  --radius:    12px;
  --shadow:    0 1px 4px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f1f5f9; color: var(--text);
  line-height: 1.65; font-size: 15px;
}

/* ── HEADER ── */
.page-header {
  background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%);
  color: #fff; padding: 28px 20px 22px; text-align: center;
  position: relative;
}
.page-header h1 { font-size: clamp(1.1em, 4vw, 1.7em); font-weight: 700; margin-bottom: 5px; }
.page-header p  { opacity: .85; font-size: .88em; }
.back-btn {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,.18); border: 1.5px solid rgba(255,255,255,.35);
  color: #fff; padding: 6px 13px; border-radius: 7px;
  text-decoration: none; font-size: .82em; font-weight: 600;
  white-space: nowrap; transition: background .15s; line-height: 1.4;
}
.back-btn:hover { background: rgba(255,255,255,.3); }
@media (max-width: 480px) {
  .back-btn { position: static; transform: none; display: inline-block;
              margin-bottom: 10px; font-size: .8em; }
  .page-header { padding-top: 16px; }
}

/* ── SEARCH BAR ── */
.search-wrap {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
.search-inner {
  max-width: 860px; margin: 0 auto;
  display: flex; align-items: center; gap: 10px;
}
.search-box { flex: 1; position: relative; }
.search-box input {
  width: 100%; padding: 9px 36px 9px 38px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: .95em; outline: none; background: var(--gray-lt);
  transition: border-color .15s, background .15s;
  -webkit-appearance: none;
}
.search-box input:focus { border-color: var(--blue); background: #fff; }
.search-icon {
  position: absolute; left: 11px; top: 50%;
  transform: translateY(-50%); color: var(--gray);
  pointer-events: none; font-size: 1em;
}
.search-clear {
  position: absolute; right: 9px; top: 50%;
  transform: translateY(-50%); background: none; border: none;
  cursor: pointer; color: var(--gray); font-size: 1.1em;
  padding: 2px 4px; display: none; line-height: 1; border-radius: 50%;
}
.search-clear:hover { color: #111; background: var(--gray-lt); }
.search-count {
  white-space: nowrap; font-size: .88em; color: var(--gray);
  min-width: 90px; text-align: right;
}
.search-count strong { color: var(--blue-dark); }

/* ── CONTAINER ── */
.container {
  max-width: 860px; margin: 18px auto;
  padding: 0 14px 80px;
}

/* ── QUESTION CARD ── */
.question-block {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 16px;
  border-left: 4px solid var(--blue);
  overflow: hidden;
  transition: box-shadow .15s;
}
.question-block:hover {
  box-shadow: 0 2px 8px rgba(0,0,0,.12), 0 6px 20px rgba(0,0,0,.08);
}

.question-header {
  display: flex; align-items: center; gap: 8px;
  background: var(--blue-bg); padding: 8px 14px;
  border-bottom: 1px solid #dbeafe;
}
.q-badge {
  background: var(--blue); color: #fff;
  border-radius: 20px; padding: 1px 9px;
  font-size: .78em; font-weight: 700; letter-spacing: .3px;
}

.question-text {
  padding: 14px 16px 8px;
  font-size: 1em; font-weight: 500; color: #1e293b;
}
.question-text mark {
  background: #fef08a; color: inherit;
  border-radius: 3px; padding: 0 2px;
}

/* ── ANSWERS ── */
.answers {
  padding: 4px 16px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.answer-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 12px; border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--gray-lt);
}
.answer-item.correct {
  background: var(--green-bg);
  border-color: var(--green-bd);
  font-weight: 600;
}
.answer-letter {
  font-weight: 700; font-size: .9em;
  width: 22px; flex-shrink: 0; padding-top: 1px; color: var(--gray);
}
.answer-item.correct .answer-letter { color: var(--green); }
.answer-text {
  flex: 1; color: #374151; font-size: .95em;
}
.answer-item.correct .answer-text { color: #14532d; }
.answer-text mark {
  background: #bbf7d0; color: inherit;
  border-radius: 3px; padding: 0 2px;
}
.check-mark {
  flex-shrink: 0; margin-left: auto; padding-left: 6px;
  color: var(--green); font-weight: 700;
}

/* ── FEEDBACK ── */
.feedback-section {
  background: var(--yellow-bg);
  border-top: 1.5px solid var(--yellow-bd);
  padding: 10px 16px; font-size: .875em; color: #44403c;
}
.feedback-section p { margin: 3px 0; }
.feedback-section strong { color: #1c1917; }

/* ── EMPTY STATE ── */
#noResults {
  display: none; text-align: center;
  padding: 60px 20px; color: var(--gray);
}
#noResults .nr-icon { font-size: 2.5em; margin-bottom: 12px; }
#noResults p { font-size: .95em; }

/* ── SCROLL TOP ── */
#scrollTopBtn {
  position: fixed; bottom: 20px; right: 16px;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--blue); color: #fff; border: none;
  font-size: 1.3em; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 3px 10px rgba(37,99,235,.4);
  transition: background .15s, transform .15s;
  z-index: 200; text-decoration: none;
  line-height: 44px; text-align: center;
}
#scrollTopBtn:hover { background: var(--blue-dark); transform: translateY(-2px); }

/* ── MOBILE ── */
@media (max-width: 600px) {
  body { font-size: 14px; }
  .page-header { padding: 18px 14px 14px; }
  .container { margin: 12px auto; padding: 0 10px 80px; }
  .question-text { padding: 12px 12px 6px; }
  .answers { padding: 4px 12px 10px; gap: 5px; }
  .answer-item { padding: 7px 10px; }
  .feedback-section { padding: 9px 12px; }
  .search-count { display: none; }
}
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-btn">&#8592; Trang ch&#7911;</a>
  <h1>Ôn Tập Ký sinh trùng thú yc</h1>
  <p>Câu hỏi trắc nghiệm có đáp án </p>
</div>

<div class="search-wrap">
  <div class="search-inner">
    <div class="search-box">
      <span class="search-icon">&#128269;</span>
      <input type="search" id="searchInput"
             placeholder="Tìm câu hỏi hoặc đáp án..." autocomplete="off">
      <button class="search-clear" id="searchClear" title="Xóa">&#10005;</button>
    </div>
    <div class="search-count" id="searchCount">
      <strong>150</strong> / 150 câu
    </div>
  </div>
</div>

<div class="container" id="questionContainer">
  <div id="noResults">
    <div class="nr-icon">&#128269;</div>
    <p>Không tìm thấy câu hỏi phù hợp.</p>
  </div>
</div>

<script>
const QUESTIONS = [{"id":1,"text":"Môi trường sống chung của ký sinh trùng là:","answers":["A. Môi trường ký chủ mà ký sinh trùng ký sinh","B. Một vài yếu tố ngoại cảnh và một vài loài ký chủ","C. Môi trường ngoại cảnh: thời tiết, khí hậu, đất đai","D. Ngoại cảnh và ký chủ"],"correct":3,"explanation":"Đáp án đúng là: Ngoại cảnh và ký chủ Vì: Môi trường sống chung của ký sinh trùng là ngoại cảnh và ký chủ do liên quan đến quá trình sống của ký sinh trùng. Tham khảo: Mục 1.4.4","reference":""},{"id":2,"text":"Hiện tượng ký sinh là.......................... giữa hai sinh vật.","answers":["A. Mối quan hệ đơn giản","B. Mối quan hệ khác nhau","C. Mối quan hệ cộng sinh","D. Mối quan hệ lẫn nhau phức tạp"],"correct":3,"explanation":"Đáp án đúng là: Mối quan hệ lẫn nhau phức tạp Vì: Đây là mối quan hệ lẫn nhau phức tạp do 1 sinh vật là ký sinh trùng sống trên cơ thể ký chủ chiếm đoạt chất dinh dưỡng để sống và phát triển. Tham khảo: Mục 1.1","reference":""},{"id":3,"text":"Chu kỳ phát triển của ký sinh trùng là:","answers":["A. Từ khi ký sinh trùng trưởng thành cho đến khi có khả năng sinh sản","B. Toàn bộ quá trình từ lúc sinh ra cho đến khi ký sinh trùng chết đi","C. Toàn bộ quá trình từ lúc ký sinh trùng được sinh ra cho đến khi có khả năng sản sinh ra thế hệ mới","D. Toàn bộ quá trình sống của ký sinh trùng"],"correct":2,"explanation":"Đáp án đúng là: Toàn bộ quá trình từ lúc ký sinh trùng được sinh ra cho đến khi có khả năng sản sinh ra thế hệ mới Vì: Chu kỳ phát triển là toàn bộ quá trình từ lúc ký sinh trùng được sinh ra cho đến khi có khả năng sinh ra thế hệ mới. Tham khảo: Mục 1.4.4","reference":""},{"id":4,"text":"Tại sao một số loài ký sinh trùng cần ký chủ trung gian bổ sung:","answers":["A. Vì các loài này bắt buộc phải vào cơ thể ký chủ trung gian để phát triển","B. Vì các loài này có vòng đời phức tạp hơn những loài khác","C. Vì các loài này ra khỏi ký chủ trung gian 1 nhưng chưa gặp được ký chủ cuối cùng thích hợp","D. Vì các loài này đã qua ký chủ trung gian 1 nhưng chưa hoàn thành sự phát dục của ấu trùng"],"correct":3,"explanation":"Đáp án đúng là: Vì các loài này đã qua ký chủ trung gian 1 nhưng chưa hoàn thành sự phát dục của ấu trùng Vì: Một số loài ký sinh trùng cần ký chủ trung gian bổ sung vì các loài này đã qua ký chủ trung gian 1 nhưng vẫn chưa hoàn thành sự phát dục của ấu trùng. Tham khảo: Mục 1.3.2","reference":""},{"id":5,"text":"Những vùng hoàn toàn khô cạn thì không có:","answers":["A. Sán dây và bệnh sán dây","B. Sán lá và bệnh sán lá","C. Ký sinh trùng và bệnh ký sinh trùng","D. Giun tròn và bệnh giun tròn"],"correct":1,"explanation":"Đáp án đúng là: Sán lá và bệnh sán lá Vì: Những vùng hoàn toàn khô cạn thì không có sán lá và bệnh sán lá do một phần giai đoạn phát triển cần có môi trường nước. Tham khảo: Mục 1.4.4","reference":""},{"id":6,"text":"Tại sao ký sinh trùng có sự biến động theo mùa ?","answers":["A. Do đặc điểm cuẩ ký sinh trùng trong quá trình sống cần biến động","B. Do cả 3 lý do trên","C. Do môi trường ngoại cảnh ảnh hưởng đến ký sinh trùng","D. Do phương thức sống của ký sinh trùng"],"correct":2,"explanation":"Đáp án đúng là: Do môi trường ngoại cảnh ảnh hưởng đến ký sinh trùng Vì: Ký sinh trùng có sự biến động theo mùa là do môi trường ngoại cảnh ảnh hưởng đến ký sinh trùng. Tham khảo: Mục 1.4.4","reference":""},{"id":7,"text":"Ký sinh trùng xâm nhập vào một sinh vật không phải là ký chủ bình thường của nó, mặc dù không phát triển nhưng nó vẫn tồn tại đượSinh vật này được gọi là:","answers":["A. Ký chủ dự trữ","B. Ký chủ trung gian","C. Ký chủ trung gian bổ sung","D. Ký chủ đường cùng"],"correct":0,"explanation":"Đáp án đúng là: Ký chủ dự trữ Vì: Ký sinh trùng xâp nhập vào một sinh vật không phải là ký chủ bình thường của nó, mặc dù không phát triển nhưng nó vẫn tồn tại đượSinh vật này được gọi là ký chủ dự trữ. Tham khảo: Mục 1.3.2","reference":""},{"id":8,"text":"Ký sinh trùng có thể có:","answers":["A. Một ký chủ thích hợp","B. Nhiều ký chủ thích hợp","C. Một vài ký chủ thích hợp","D. Một hoặc nhiều ký chủ thích hợp"],"correct":3,"explanation":"Đáp án đúng là: Một hoặc nhiều ký chủ thích hợp Vì: Ký sinh trùng có thể có một hoặc nhiều ký chủ thích hợp do sự thích nghi của chúng. Tham khảo: Mục 1.3.2","reference":""},{"id":9,"text":"Trong quá trình sống, nếu thiếu ký chủ thì:","answers":["A. Ký sinh trùng sẽ không hoàn thành được vòng đời","B. Ký sinh trùng sẽ không chiếm đoạt chất dinh dưỡng","C. Ký sinh trùng sẽ khó chiếm đoạt chất dinh dưỡng","D. Ký sinh trùng sẽ khó hoàn thành được vòng đời"],"correct":0,"explanation":"Đáp án đúng là: Ký sinh trùng sẽ không hoàn thành được vòng đời Vì: Trong quá trình sống, nếu thiếu ký chủ thì ký sinh trùng sẽ không hoàn thành được vòng đời. Tham khảo: Mục 1.4.4","reference":""},{"id":10,"text":"Trong những câu sau, câu nào sai ?","answers":["A. Ký sinh trùng có hình thức sinh sản khá phong phú nên sinh sản nhiều và dễ dàng","B. Ký sinh trùng có khả năng thích nghi với điều kiện môi trường sống thay đổi","C. Ký sinh trùng sống phụ thuộc vào các yếu tố ngoại cảnh","D. Ký sinh trùng sẽ bị chết khi sống trong môi trường sống tối thiểu"],"correct":3,"explanation":"Đáp án đúng là: Ký sinh trùng sẽ bị chết khi sống trong môi trường sống tối thiểu Vì: Ký sinh trùng sẽ bị chết khi sống trong môi trường tối thiểu. Tham khảo: Mục 1.4.4","reference":""},{"id":11,"text":"Ký sinh trùng có hình thái:","answers":["A. Rất kỳ lạ","B. Tương đối đồng nhất","C. Rất khác các sinh vật khác","D. Rất đa dạng và phong phú"],"correct":3,"explanation":"Đáp án đúng là: Rất đa dạng và phong phú Vì: Ký sinh trùng có hình thái rất đa dạng và phong phú do mỗi ký sinh trùng có hình thái khác nhau. Tham khảo: Mục 1.4.1","reference":""},{"id":12,"text":"Ký chủ là những sinh vật đang sống...................... và bị chiếm đoạt chất dinh dưỡng.","answers":["A. Cùng với sinh vật khác","B. Bị sinh vật khác sống hoại sinh trong cơ thể","C. Bị ký sinh trùng sống nhờ tạm thời hay lâu dài","D. Cho sinh vật khác sống nhờ"],"correct":2,"explanation":"Đáp án đúng là: Bị ký sinh trùng sống nhờ tạm thời hay lâu dài Vì: Ký chủ là những sinh vật đang sống bị ký sinh trùng sống nhờ tạm thời hay lâu dài và bị ký sinh trùng chiếm đoạt chất dinh dưỡng để sống và phát triển. Tham khảo: Mục 1.3.2","reference":""},{"id":13,"text":"Ký chủ dự trữ là:","answers":["A. Ký chủ mà ký sinh trùng phòng bị để có chỗ ký sinh","B. Ký chủ mà ký sinh trùng chọn lọc ngẫu nhiên để sống ký sinh","C. Ký chủ mà ký sinh trùng sống nhờ và chiếm đoạt chất dinh dưỡng","D. Ký chủ mà ký sinh trùng ký sinh tạm thời để chờ gặp ký chủ thích hợp"],"correct":3,"explanation":"Đáp án đúng là: Ký chủ mà ký sinh trùng ký sinh tạm thời để chờ gặp ký chủ thích hợp Vì: Ký chủ dự trữ là ký chủ mà ký sinh trùng ký sinh tạm thời để chờ gặp ký chủ thích hợp. Tham khảo: Mục 1.3.2","reference":""},{"id":14,"text":"Ký chủ cuối cùng là sinh vật...... và phát dục đến lúc thành thục về tính biệt.","answers":["A. Để ký sinh trùng sống nhờ","B. Để ký sinh trùng sống ký sinh trong giai đoạn ấu trùng","C. Để ký sinh trùng sống cố định","D. Để ký sinh trùng sống ký sinh tạm thời"],"correct":0,"explanation":"Đáp án đúng là: Để ký sinh trùng sống nhờ Vì: Ký chủ cuối cùng là sinh vật sống nhờ do chúng cần lấy dinh dưỡng từ ký chủ. Tham khảo: Mục 1.3.2","reference":""},{"id":15,"text":"Tại sao ốc nước ngọt là ký chủ trung gian của sán lá gan ?","answers":["A. Vì ốc nước ngọt có đủ điều kiện thích hợp cho sán lá gan sống","B. Vì ốc nước ngọt là ký chủ của sán lá gan","C. Vì ốc nước ngọt để cho sán lá gan sống nhờ một thời gian","D. Vì ốc nước ngọt là sinh vật để sán lá gan sống nhờ và phát triển trong giai đoạn ấu trùng"],"correct":3,"explanation":"Đáp án đúng là: Vì ốc nước ngọt là sinh vật để sán lá gan sống nhờ và phát triển trong giai đoạn ấu trùng Vì: Ốc nước ngọt là ký chủ trung gian của sán lá gan do là sinh vật để sán lá gan sống nhờ và phát triển trong giai đoạn là ấu trùng. Tham khảo: Mục 1.3.2","reference":""},{"id":16,"text":"Một trong những khó khăn cho việc khống chế bệnh ký sinh trùng là:","answers":["A. Ký sinh trùng có sức đề kháng cao","B. Ký sinh trùng có nhiều giống, loài","C. Vòng đời của ký sinh trùng rất phức tạp","D. Ký sinh trùng sinh sản nhanh và nhiều"],"correct":3,"explanation":"Đáp án đúng là: Ký sinh trùng sinh sản nhanh và nhiều Vì: Một trong những khó khăn cho việc khống chế bệnh ký sinh trùng là do ký sinh trùng sinh sản nhanh và nhiều. Tham khảo: Mục 1.4.3","reference":""},{"id":17,"text":"Ngoại ký sinh trùng là:","answers":["A. Ký sinh trùng sống tự do lâu dài ở ngoại cảnh","B. Ký sinh trùng sống vĩnh viễn trên cơ thể gia súc, gia cầm","C. Ký sinh trùng có giai đoạn sống ở ngoại cảnh, có giai đoạn sống ký sinh trên cơ thể ký chủ.","D. Ký sinh trùng ký sinh ở bề mặt cơ thể"],"correct":2,"explanation":"Đáp án đúng là: Ký sinh trùng có giai đoạn sống ở ngoại cảnh, có giai đoạn sống ký sinh trên cơ thể ký chủ. Vì: Ngoại ký sinh trùng là ký sinh trùng có giai đoạn sống ở ngoại cảnh, có giai đoạn sống ký sinh trên cơ thể ký chủ do cách sống của chúng. Tham khảo: Mục 1.3.1","reference":""},{"id":18,"text":"Ký sinh trùng xâm nhập vào một sinh vật hoàn toàn không phải là ký chủ bình thường của nó, nhưng nó vẫn tồn tại được trong một khoảng thời gian rất ngắn, sau đó sẽ bị chết. Sinh vật này được gọi là:","answers":["A. Ký chủ trung gian","B. Ký chủ dự trữ","C. Ký chủ đường cùng","D. Ký chủ trung gian bổ sung"],"correct":2,"explanation":"Đáp án đúng là: Ký chủ đường cùng Vì: Ký sinh trùng xâm nhập vào một sinh vật hoàn toàn không phải là ký chủ bình thường của nó, nhưng nó vẫn tồn tại được trong một khoảng thời gian rất ngắn, sau đó sẽ bị chết. Sinh vật này được gọi là ký chủ đường cùng. Tham khảo: Mục 1.3.2","reference":""},{"id":19,"text":"Tại sao ký sinh trùng có thể đến được vị trí ký sinh thich hợp ?","answers":["A. Do ký sinh trùng có phân tích quan","B. Do ký sinh trùng có hướng tính","C. Do ký sinh trùng có sự thích nghi với vị trí đó","D. Do đặc điểm sống của ký sinh trùng"],"correct":0,"explanation":"Đáp án đúng là: Do ký sinh trùng có phân tích quan Vì: Ký sinh trùng có thể đến được vị trí ký sinh thích hợp do có phân tích quan. Tham khảo: Mục 1.4.2","reference":""},{"id":20,"text":"Sự thoái hóa các cơ quan của ký sinh trùng thấy rõ hơn ở:","answers":["A. Nội ký sinh trùng","B. Ngoại ký sinh trùng","C. Cả nội và ngoại ký sinh trùng","D. Ký sinh trùng tạm thời"],"correct":0,"explanation":"Đáp án đúng là: Nội ký sinh trùng Vì: Sự thoái hóa các cơ quan của ký sinh trùng thấy rõ hơn ở nội ký sinh trùng do chúng sống trong cơ thể vật chủ. Tham khảo: Mục 1.4.2","reference":""},{"id":21,"text":"Ký sinh trùng sinh sản bằng nhiều hình thức:","answers":["A. Sinh sản vô tính xen kẽ sinh sản hữu tính","B. Sinh sản vô tính và hữu tính","C. Tự giao phối hoặc giao phối chéo","D. Đẻ trứng hoặc ấu trùng"],"correct":1,"explanation":"Đáp án đúng là: Sinh sản vô tính và hữu tính Vì: Ký sinh trùng sinh sản bằng hình thức vô tính và hữu tính. Tham khảo: Mục 1.4.3","reference":""},{"id":22,"text":"Ký sinh trùng là những.................., chiếm đoạt chất dinh dưỡng của sinh vật đó để sống và phát triển.","answers":["A. Sinh vật sống tạm thời vào sinh vật khác","B. Sinh vật sống trên sinh vật khác","C. Sinh vật sống cố định vào sinh vật khác","D. Sinh vật sống nhờ vào sinh vật khác đang sống"],"correct":3,"explanation":"Đáp án đúng là: Sinh vật sống nhờ vào sinh vật khác đang sống Vì: Ký sinh trùng là những sinh vật sống nhờ vào sinh vật khác đang sống do ký sinh trùng cần lấy chất dinh dưỡng từ những sinh vật đang sống khác. Tham khảo: Mục 1.3.1","reference":""},{"id":23,"text":"........... để ký sinh trùng sống nhờ và phát dục trong giai đoạn ấu trùng","answers":["A. Ký chủ cuối cùng","B. Ký chủ dự trữ","C. Ký chủ trung gian","D. Ký chủ chuyên tính"],"correct":2,"explanation":"Đáp án đúng là: Ký chủ trung gian Vì: Ký chủ trung gian để ký sinh trùng sống nhờ và phát dục trong giai đoạn ấu trùng là do ký chủ trung gian là môi trường thích hợp để các dạng ấu trùng phát triển. Tham khảo: Mục 1.3.2","reference":""},{"id":24,"text":"Phải nắm được chu kỳ phát triển (vòng đời) của ký sinh trùng để:","answers":["A. Chăn thả luân phiên đồng cỏ","B. Biết các kiểu chu kỳ phát triển của chúng","C. Phân biệt được kiểu chu kỳ đơn giản và phức tạp","D. Có biện pháp phá vỡ chu kỳ phát triển của ký sinh trùng"],"correct":3,"explanation":"Đáp án đúng là: Có biện pháp phá vỡ chu kỳ phát triển của ký sinh trùng Vì: Nắm được chu kỳ phát triển của ký sinh trùng để có biện pháp phá vỡ chu kỳ phát triển của ký sinh trùng. Tham khảo: Mục 1.4.4","reference":""},{"id":25,"text":"Ký sinh trùng sống trong cơ thể là:","answers":["A. Ký sinh trùng định kỳ","B. Nội ký sinh trùng","C. Ký sinh trùng cố định","D. Ký sinh trùng vĩnh viễn"],"correct":1,"explanation":"Đáp án đúng là: Nội ký sinh trùng Vì: Ký sinh trùng sống trong cơ thể là nội ký sinh trùng do nơi cư trú của chúng nằm trong cơ thể vật chủ. Tham khảo: Mục 1.3.1","reference":""},{"id":26,"text":"Muốn chẩn đoán chính xác con vật có bị nhiễm ký sinh trùng hay không, phải:","answers":["A. Tìm thấy căn bệnh trong bệnh phẩm xét nghiệm","B. Quan sát thấy ký sinh trùng trong phân con vật","C. Tìm thấy căn bệnh trong phân con vật","D. Quan sát thấy con vật có triệu chứng lâm sàng"],"correct":0,"explanation":"Đáp án đúng là: Tìm thấy căn bệnh trong bệnh phẩm xét nghiệm Vì: Muốn chẩn đoán chính xác con vật có bị nhiễm ký sinh trùng không cần tìm thấy căn bệnh trong bệnh phẩm xét nghiệm. Tham khảo: Mục 2.1.1.","reference":""},{"id":27,"text":"Hiện tượng ấu trùng giun, sán theo máu đi qua gan, phổi rồi đến ruột gọi là:","answers":["A. Vòng di chuyển lim phô– phổi - ruột","B. Vòng di chuyển gan – phổi - ruột","C. Vòng di chuyển lim phô - tim","D. Vòng di chuyển lim phô - phổi"],"correct":1,"explanation":"Đáp án đúng là: Vòng di chuyển gan – phổi - ruột Vì: Hiện tượng ấu trùng giun, san theo máu đi qua gan, phổi đến ruột gọi là vòng di chuyển gan - phổi - ruột. Tham khảo: Mục 1.5.1","reference":""},{"id":28,"text":"Dinh dưỡng của ký sinh trùng là:","answers":["A. Máu, dưỡng chấp, dịch tổ chức, tế bào ký chủ","B. Dưỡng chấp, dịch tế bào, tổ chức ký chủ","C. Máu, dưỡng chấp, dịch các xoang","D. Dưỡng chấp, máu, tế bào ký chủ"],"correct":0,"explanation":"Đáp án đúng là: Máu, dưỡng chấp, dịch tổ chức, tế bào ký chủ Vì: Dinh dưỡng của ký sinh trùng là máu, dưỡng chấp, dịch tổ chức, tế bào của ký chủ. Tham khảo: Mục 1.5.1","reference":""},{"id":29,"text":"Độc tố của ký sinh trùng đối với ký chủ trong quá trình ký sinh gồm:","answers":["A. Các chất bài tiết của ký sinh trùng","B. Chất độc do ký sinh trùng tiết ra","C. Cả 3 phương án","D. Xác chết của ký sinh trùng bị phân hủy"],"correct":2,"explanation":"Đáp án đúng là: Cả 3 phương án Vì: Độc tố của ký sinh trùng đối với ký chủ trong quá trình ký sinh gồm chất độc do ký sinh trùng tiết ra, các chất bài tiết của ký sinh trùng và xác chết của ký sinh trùng bị phân hủy. Tham khảo: Mục 1.5.1","reference":""},{"id":30,"text":"Biến loạn thấy rõ ở ký chủ do độc tố của ký sinh trùng gây ra, đó là:","answers":["A. Biến loạn về tiêu hóa và hấp thu","B. Biến loạn về chức  năng hệ thần kinh","C. Biến loạn về hô hấp và tuần hoàn","D. Biến loạn về thần kinh và hệ thống máu"],"correct":3,"explanation":"Đáp án đúng là: Biến loạn về thần kinh và hệ thống máu Vì: Biến loạn thấy rõ ở ký chủ do độc tố của ký sinh trùng gây ra đó là biến loạn về thần kinh và thống máu. Tham khảo: Mục 1.5.1","reference":""},{"id":31,"text":"Diệt giun sán trưởng thành bằng cách:","answers":["A. Dùng thuốc đặc hiệu diệt ký sinh trùng","B. Cho uống thuốc tẩy ký sinh trùng","C. Tiêm thuốc tẩy ký sinh trùng","D. Phun thuốc đặc hiệu diệt ký sinh trùng"],"correct":0,"explanation":"Đáp án đúng là: Dùng thuốc đặc hiệu diệt ký sinh trùng Vì: Diệt giun sán trưởng thành bằng cách dùng thuốc đặc hiệu diệt ký sinh trùng. Tham khảo: Mục 2.1.3","reference":""},{"id":32,"text":"Ký sinh trùng có thể mang những loại mầm bệnh khác vào cơ thể ký chủ, đó là:","answers":["A. Vi khuẩn, ký sinh trùng","B. Vi khuẩn, vi rút","C. Vi rút, ký sinh trùng","D. Vi khuẩn, vi rút, ký sinh trùng"],"correct":3,"explanation":"Đáp án đúng là: Vi khuẩn, vi rút, ký sinh trùng Vì: Ký sinh trùng có thể mang vi khuẩn, vi rút, ký sinh trùng vào cơ thể ký chủ. Tham khảo: Mục 1.5.1","reference":""},{"id":33,"text":"Nếu ký sinh trùng ký sinh ở một cơ quan khác vị trí ký sinh thích hợp của nó thì gọi là:","answers":["A. Ký sinh trùng lạc loài","B. Ký sinh trùng lạc chủ","C. Ký sinh trùng lạc chỗ","D. Ký sinh trùng lạc đường"],"correct":2,"explanation":"Đáp án đúng là: Ký sinh trùng lạc chỗ Vì: Nếu ký sinh trùng ký sinh ở một cơ quan khác vị trí ký sinh thích hợp của nó thì gọi là ký sinh trùng lạc chỗ Tham khảo: Mục 1.5.1.","reference":""},{"id":34,"text":"Không nên phòng bệnh ký sinh trùng bằng cách giết tất cả gia súc, gia cầm mắc bệnh, vì:","answers":["A. Bệnh ký sinh trùng không lây lan nhanh và có thể dùng các biện pháp phòng bệnh khác","B. Bệnh ký sinh trùng lây lan chậm và ít làm chết gia súc, gia cầm","C. Có thể dùng các biện pháp phòng bệnh khác","D. Thiệt hại lớn về kinh tế"],"correct":0,"explanation":"Đáp án đúng là: Bệnh ký sinh trùng không lây lan nhanh và có thể dùng các biện pháp phòng bệnh khác Vì: Không nên phòng bệnh ký sinh trùng và có thể dùng các biện pháp phòng bệnh khác do bệnh ký sinh trùng không làm lây lan nhanh và có thể dùng các biện pháp phòng bệnh khác. Tham khảo: Mục 2.1.4","reference":""},{"id":35,"text":"Ủ phân theo phương pháp nhiệt sinh vật học dựa trên nguyên lý:","answers":["A. Trứng và ấu trùng giun sán chết ở nhiệt độ cao","B. Là phương pháp diệt trứng và ấu trùng giun sán tốt nhất","C. Hệ vi sinh vật phân giải chất hữu cơ, làm nhiệt độ của phân tăng lên","D. Là phương pháp có tính khả thi cao"],"correct":2,"explanation":"Đáp án đúng là: Hệ vi sinh vật phân giải chất hữu cơ, làm nhiệt độ của phân tăng lên Vì: Ủ phân theo phương pháp nhiệt sinh vật học dựa trên nguyên lý là hệ vi sinh vật phân giải chất hữu cơ, làm nhiệt độ của phân tăng lên. Tham khảo: Mục 2.2.2.","reference":""},{"id":36,"text":"Tiên lượng bệnh ký sinh trùng căn cứ vào:","answers":["A. Số lượng ký sinh trùng ký sinh","B. Tỷ lệ gia súc, gia cầm chết do ký sinh trùng","C. Cả 3 phương án","D. Khả năng lây lan và truyền các bệnh khác"],"correct":2,"explanation":"Đáp án đúng là: Cả 3 phương án Vì: Tiên lượng bệnh ký sinh trùng căn cứ vào: tỷ lệ gia súc, gia cầm chết do ký sinh trùng, khả năng lây lan và truyền các bệnh khác, số lượng ký sinh trùng ký sinh. Tham khảo: Mục 2.1.2","reference":""},{"id":37,"text":"Ký sinh trùng gây tác động nào là tác động có chủ ý:","answers":["A. Tác động mang trùng","B. Tác động do độc tố","C. Tác động chiếm đoạt chất dinh dưỡng","D. Tác động cơ giới"],"correct":2,"explanation":"Đáp án đúng là: Tác động chiếm đoạt chất dinh dưỡng Vì: Ký sinh trùng có thể có một hoặc nhiều ký chủ thích hợp do sự thích nghi của chúng. Tham khảo: Mục 1.5.1","reference":""},{"id":38,"text":"Ký chủ phản ứng lại tác động kích thích của ký sinh trùng bằng cách:","answers":["A. Cả 3 phương án","B. Sản sinh các enzym","C. Sản sinh kháng thể","D. Sản sinh các tế bào thực bào"],"correct":0,"explanation":"Đáp án đúng là: Cả 3 phương án Vì: Ký chủ phản ứng lại tác động kích thích của ký sinh trùng bằng cách sản sinh các tế bào thực bào, sản sinh các enzym, sản sinh kháng thể. Tham khảo: Mục 1.5.2","reference":""},{"id":39,"text":"Ký sinh trùng gây ra tác động cơ giới là do:","answers":["A. Dùng cơ quan bám bám vào vị trí ký sinh","B. Cả 3 phương án","C. Ấu trùng di hành qua các cơ quan","D. Số lượng ký sinh trùng ký sinh nhiều tại các cơ quan"],"correct":1,"explanation":"Đáp án đúng là: Cả 3 phương án Vì: Ký sinh trùng gây tác động cơ giới là do ấu trùng di hành qua các cơ quan, dùng cơ quan bám bám vào vị trí ký sinh và số lượng ký sinh trùng ký sinh nhiều tại các cơ quan. Tham khảo: Mục 1.5.1.","reference":""},{"id":40,"text":"Cách sinh bệnh do ký sinh trùng gây ra là:","answers":["A. Gây tổn thương, lấy dinh dưỡng, đầu độc và truyền bệnh khác cho ký chủ","B. Ký sinh và chiếm đoạt dinh dưỡng của ký chủ","C. Bám vào vị trí ký sinh, hút chất dinh dưỡng và tiết độc tố","D. Ký sinh trùng di chuyển để đến vị trí ký sinh thích hợp"],"correct":0,"explanation":"Đáp án đúng là: Gây tổn thương, lấy dinh dưỡng, đầu độc và truyền bệnh khác cho ký chủ Vì: Cách sinh bệnh do ký sinh trùng gây ra là gây tổn thương, lấy dinh dưỡng, đầu độc và truyền bệnh khác cho ký chủ. Tham khảo: Mục 1.5.1","reference":""},{"id":41,"text":"Phòng trừ tổng hợp bệnh ký sinh trùng gồm mấy biện pháp:","answers":["A. 6 biện pháp","B. 3 biện pháp","C. 5 biện pháp","D. 4 biện pháp"],"correct":2,"explanation":"Đáp án đúng là: 5 biện pháp Vì: Phòng trừ tổng hợp bệnh ký sinh gồm 05 biện pháp. Tham khảo: Mục 2.1.4.","reference":""},{"id":42,"text":"Tại sao chẩn đoán bệnh ký sinh trùng cần nhìn thấy căn bệnh ?:","answers":["A. Vì phải nhìn thấy hình thái của giun sán để xác định rõ giống loài","B. Vì căn bệnh là căn cứ duy nhất để chẩn đoán bệnh","C. Vì triệu chứng của bệnh ký sinh trùng rất giống nhau và giống nhiều bệnh khác","D. Vì bệnh ký sinh trùng có triệu chứng gần giống nhau"],"correct":2,"explanation":"Đáp án đúng là: Vì triệu chứng của bệnh ký sinh trùng rất giống nhau và giống nhiều bệnh khác Vì: Chẩn đoán bệnh ký sinh trùng cần nhìn thấy căn bệnh vì triệu chứng của bệnh ký sinh trùng rất giống nhau và giống nhiều bệnh khác. Tham khảo: Mục 2.1.1","reference":""},{"id":43,"text":"Điều trị bệnh giun sán cho con vật bị bệnh cũng là:","answers":["A. Chữa bệnh cho những con vật khác","B. Làm hạn chế khả năng lây lan bệnh","C. Khống chế mầm bệnh","D. Phòng bệnh cho những con vật khác"],"correct":3,"explanation":"Đáp án đúng là: Phòng bệnh cho những con vật khác Vì: Điều trị bệnh giun sán cho con vật bị bệnh cũng là phòng bệnh cho những con vật khác Tham khảo: Mục 2.1.3","reference":""},{"id":44,"text":"Ấu trùng của ký sinh trùng di hành phức tạp thường gây ra:","answers":["A. Tác động cơ giới, tác động chiếm đoạt chất dinh dưỡng","B. Tác động cơ giới, tác động mang trùng","C. Tác động do độc tố, tác động mang trùng","D. Tác động mang trùng, tác động chiếm đoạt chất dinh dưỡng"],"correct":1,"explanation":"Đáp án đúng là: Tác động cơ giới, tác động mang trùng Vì: Ấu trùng của ký sinh trùng di hành phức tạp thường gây ra tác động cơ giới và tác động mang trùng. Tham khảo: Mục 1.5.1.","reference":""},{"id":45,"text":"Kiểu ấu trùng giun, sán di chuyển tự do trong cơ thể gọi là:","answers":["A. Di chuyển toàn thân","B. Di chuyển toàn thân – nội tạng","C. Di chuyển nội tạng","D. Di chuyển nội tạng – toàn thân"],"correct":0,"explanation":"Đáp án đúng là: Di chuyển toàn thân Vì: Kiểu ấu trùng giun, sán di chuyern tự do trong cơ thể goin là di chuyển toàn thân. Tham khảo: Mục 1.5.1","reference":""},{"id":46,"text":"Tác động cơ học của ký sinh trùng là:","answers":["A. Làm tắc khí quan","B. Gây tổn thương xuất huyết","C. Cả 3 đáp án","D. Gây chèn ép các khí quan"],"correct":2,"explanation":"Đáp án đúng là: Cả 3 đáp án Vì: Tác động cơ học của ký sinh trùng là làm tắc khí quan, gây chèn ép các khí quan, gây tổn thương xuất huyết. Tham khảo: Mục 1.5.1","reference":""},{"id":47,"text":"Chẩn đoán thí nghiệm bệnh ký sinh trùng được thực hiện khi:","answers":["A. Các phương pháp chẩn đoán xét nghiệm chưa tìm thấy căn bệnh hoặc ký sinh trùng nằm sâu trong các cơ quan, tổ chức","B. Ký sinh trùng nằm trong các xoang trong cơ thể","C. Không có phương pháp chẩn đoán xét nghiệm phù hợp","D. Cả 3 phương án"],"correct":0,"explanation":"Đáp án đúng là: Các phương pháp chẩn đoán xét nghiệm chưa tìm thấy căn bệnh hoặc ký sinh trùng nằm sâu trong các cơ quan, tổ chức Vì: Chẩn đoán thí nghiệm bệnh ký sinh trùng được thực hiện khi các phương pháp chẩn đoán xét nghiệm chưa tìm thấy căn bệnh hoặc ký sinh trùng nằm sâu trong các cơ quan, tổ chức. Tham khảo: Mục 2.1.1.","reference":""},{"id":48,"text":"Diệt trứng và ấu trùng giun sán ở ngoại cảnh nhằm:","answers":["A. Để ngoại cảnh sạch mầm bệnh","B. Để cắt đứt một khâu trong vòng đời của ký sinh trùng","C. Để phòng bệnh giun sán cho gia súc, gia cầm","D. Để ngoại cảnh không bị ô nhiễm"],"correct":2,"explanation":"Đáp án đúng là: Để phòng bệnh giun sán cho gia súc, gia cầm Vì: Diệt trứng và ấu trùng giun sán ở ngoại cảnh nhằm để phòng bệnh giun sán cho gia súc, gia cầm. Tham khảo: Mục 2.2.2","reference":""},{"id":49,"text":"Bệnh phẩm dùng để xét nghiệm chẩn đoán bệnh ký sinh trùng gồm:","answers":["A. Mẫu phân, mẫu máu, mẫu nước tiểu, chất ngoài da","B. Mẫu phân, mẫu máu, mẫu dịch trong xoang","C. Mẫu phân, mẫu cơ quan nội tạng","D. Mẫu phân, mẫu nước tiểu, các mụn trên da"],"correct":0,"explanation":"Đáp án đúng là: Mẫu phân, mẫu máu, mẫu nước tiểu, chất ngoài da Vì: Bệnh phẩm dùng để xét nghiệm chẩn đoán bệnh ký sinh trùng gồm mẫu phân, mẫu máu, mẫu nước tiểu, chất ngoài da. Tham khảo: Mục 2.1.1","reference":""},{"id":50,"text":"Không thể dựa vào triệu chứng lâm sàng để kết luận về một bệnh giun sán nào đó vì:","answers":["A. Không có đủ căn cứ","B. Bệnh giun sán không có triệu chứng điển hình","C. Bệnh giun sán thường có triệu chứng giống nhau và giống nhiều loại bệnh khác","D. Bệnh giun sán có triệu chứng rất mờ nhạt, không rõ rệt là bệnh gì"],"correct":2,"explanation":"Đáp án đúng là: Bệnh giun sán thường có triệu chứng giống nhau và giống nhiều loại bệnh khác Vì: Không thể dựa vào triệu chứng lâm sàng để kết luận về một phân giun sán nào đó vì bệnh giun sán thường có triệu chứng giống nhau và giống nhiều loại bệnh khác. Tham khảo: Mục 2.1.1.","reference":""},{"id":51,"text":"Phương pháp mổ khám giun sán nào được sử dụng để xác định tỷ lệ nhiễm các loại giun sán ở ruột non lợn ?","answers":["A. Phương pháp mổ khám phi toàn diện","B. Phương pháp mổ khám toàn diện","C. Tất cả các phương án","D. Phương pháp mổ khám toàn diện một cơ quan"],"correct":3,"explanation":"Đáp án đúng là: Phương pháp mổ khám toàn diện một cơ quan Vì: Phương pháp mổ khám toàn diện một cơ quan được sử dụng để xác định tỷ ệ nhiễm các loại giun sán ở ruột non lợn. Tham khảo: Mục 3.3.2","reference":""},{"id":52,"text":"Để thực hiện phương pháp Darling và Cherbovich cần mấy lần ly tâm:","answers":["A. 3 lần","B. 2 lần","C. 5 lần","D. 4 lần"],"correct":1,"explanation":"Đáp án đúng là: 2 lần Vì: Để thực hiện phương pháp Darling và Cherbovich cần 2 lần ly tâm. Tham khảo: Mục 3.2.2","reference":""},{"id":53,"text":"Phương pháp mổ khám giun sán phi toàn diện nhằm mục đích:","answers":["A. Xác định sự di chuyển của giun sán trong cơ thể","B. Tìm tất cả các loại giun sán ký sinh trong cơ thể","C. Tìm tất cả các loại giun sán ký sinh ở một cơ quan nào đó trong cơ thể","D. Tìm một loại giun sán nào đó ký sinh trong cơ thể"],"correct":3,"explanation":"Đáp án đúng là: Tìm một loại giun sán nào đó ký sinh trong cơ thể Vì: Phương pháp mổ khám giun sán phi toàn diện nhằm mục đích tìm một loại giun sán nào đó ký sinh trong cơ thể. Tham khảo: Mục 3.3.2","reference":""},{"id":54,"text":"Phương pháp mổ khám giun sán toàn diện một cơ quan nhằm mục đích:","answers":["A. Tìm một loại giun sán nào đó ký sinh trong cơ thể","B. Tìm tất cả các loại giun sán ký sinh ở một cơ quan nào đó trong cơ thể","C. Tìm tất cả các loại giun sán ký sinh trong cơ thể","D. Xác định sự di chuyển của giun sán trong cơ thể"],"correct":1,"explanation":"Đáp án đúng là: Tìm tất cả các loại giun sán ký sinh ở một cơ quan nào đó trong cơ thể Vì: Phương pháp mổ khám giun sán toàn diện một cơ quan nhằm mục đích tìm tất cả các loại giun sán ký sinh ở một cơ quan nào đó trong cơ thể Tham khảo: Mục 3.3.2","reference":""},{"id":55,"text":"Trong ngành sán dẹp, có 2 lớp quan trọng đối với chăn nuôi thú y, đó là:","answers":["A. Lớp Trematoda và lớp Nematoda","B. Lớp Nematoda và lớp Cestoda","C. Lớp Trematoda và lớp Acanthocephala","D. Lớp Trematoda và lớp Cestoda"],"correct":3,"explanation":"Đáp án đúng là: Lớp Trematoda và lớp Cestoda Vì: Trong ngành sán dẹp, có 2 lớp quan trọng đối với chăn nuôi thú y, đó là: lớp Trematoda và lớp Cestoda. Tham khảo: Mục 3.1.2","reference":""},{"id":56,"text":"Dung dịch bảo quản giun tròn và ấu trùng giun tròn là :","answers":["A. Barbagallo","B. Formol 38%","C. Cồn 70o","D. NaCl"],"correct":0,"explanation":"Đáp án đúng là: Barbagallo Vì: Dung dịch bảo quản sán giun tròn và ấu trùng giun tròn là Barbagallo Tham khảo: Mục 3.3.2","reference":""},{"id":57,"text":"Phương pháp nào làm nổi trứng giun sán ?","answers":["A. Phương pháp Benedek","B. Phương pháp trực tiếp","C. Phương pháp Darling","D. Phương pháp MMaster"],"correct":2,"explanation":"Đáp án đúng là: Phương pháp Darling Vì: Phương pháp làm nổi trứng giun sán là phương pháp Darling. Tham khảo: Mục 3.3.1","reference":""},{"id":58,"text":"Khi nào gia súc, gia cầm được gọi là mang giun sán ?","answers":["A. Khi có nhiều giun sán ký sinh và có triệu chứng của bệnh giun sán","B. Khi nhiễm giun sán nhẹ và không có triệu chứng lâm sàng của bệnh giun sán","C. Khi có biểu hiện của bệnh giun sán","D. Khi có giun sán ký sinh và có triệu chứng lâm sàng"],"correct":1,"explanation":"Đáp án đúng là: Khi nhiễm giun sán nhẹ và không có triệu chứng lâm sàng của bệnh giun sán Vì: Gia súc, gia cầm được gọi là mang giun sán khi nhiễm giun sán nhẹ và không có triệu chứng lâm sàng của bệnh giun sán. Tham khảo: Mục 3.2.2","reference":""},{"id":59,"text":"Sự khác nhau cơ bản của phương pháp Darling và phương pháp Cherbovich là:","answers":["A. Cách tiến hành của hai phương pháp này","B. Dung dịch bão hòa để làm nổi trứng","C. Mục đích tiến hành của hai phương pháp này","D. Nguyên lý và cách pha dung dịch bão hòa"],"correct":1,"explanation":"Đáp án đúng là: Dung dịch bão hòa để làm nổi trứng Vì: Sự khác nhau cơ bản của phương pháp Darling và Cherbovich là dung dịch bão hòa để làm nổi trứng. Tham khảo: Mục 3.3.1","reference":""},{"id":60,"text":"Bệnh giun sán truyền qua đất (trực tiếp) là bệnh giun sán:","answers":["A. Trong vòng đời của giun sán không cần ký chủ trung gian","B. Trong vòng đời của giun sán cần ký chủ trung gian bổ sung","C. Trong vòng đời của giun sán không cần ký chủ trung gian bổ sung","D. Trong vòng đời của giun sán cần ký chủ trung gian"],"correct":0,"explanation":"Đáp án đúng là: Trong vòng đời của giun sán không cần ký chủ trung gian Vì: Bệnh giun sán truyền qua đất (trực tiếp) là bệnh giun sán mà trong vòng đời của giun sán không cần ký chủ trung gian. Tham khảo: Mục 3.2.2","reference":""},{"id":61,"text":"Phương pháp mổ khám giun sán toàn diện nhằm mục đích:","answers":["A. Tìm một loại giun sán nào đó ký sinh trong cơ thể","B. Tìm tất cả các loại giun sán ký sinh ở một cơ quan nào đó trong cơ thể","C. Tìm tất cả các loại giun sán ký sinh trong cơ thể","D. Xác định sự di chuyển của giun sán trong cơ thể"],"correct":2,"explanation":"Đáp án đúng là: Tìm tất cả các loại giun sán ký sinh trong cơ thể Vì: Phương pháp mổ khám giun sán toàn diện nhằm mục đích tìm tất cả các loại giun sán ký sinh trong cơ thể. Tham khảo: Mục 3.3.2","reference":""},{"id":62,"text":"Khi nào gia súc, gia cầm được gọi là bị bệnh giun sán ?","answers":["A. Khi có biểu hiện của bệnh giun sán","B. Khi có giun sán ký sinh và có triệu chứng lâm sàng","C. Khi có nhiều giun sán ký sinh và có triệu chứng của bệnh giun sán","D. Khi có giun sán ký sinh"],"correct":2,"explanation":"Đáp án đúng là: Khi có nhiều giun sán ký sinh và có triệu chứng của bệnh giun sán Vì: Gia súc, gia cầm được gọi là bị bệnh giun sán khi có nhiều giun sán ký sinh và có triệu chứng của bệnh giun sán Tham khảo: Mục 3.2.2.","reference":""},{"id":63,"text":"Sự khác nhau cơ bản của phương pháp Fulleborn và phương pháp Darling là:","answers":["A. Mục đích tiến hành của hai phương pháp này","B. Dung dịch bão hòa để làm nổi trứng","C. Nguyên lý và cách pha dung dịch bão hòa","D. Cách tiến hành của hai phương pháp này"],"correct":3,"explanation":"Đáp án đúng là: Cách tiến hành của hai phương pháp này Vì: Sự khác nhau cơ bản của phương pháp Fulleborn và phương pháp Darling là cách tiến hành của hai phương pháp này. Tham khảo: Mục 3.3.1.","reference":""},{"id":64,"text":"Tại sao phương pháp trực tiếp ít được sử dụng trong chẩn đoán:","answers":["A. Cần dụng cụ và hóa chất phức tạp","B. Không tìm thấy trứng của các loài giun tròn","C. Độ chính xác thấp","D. Thao tác thực hiện phương pháp phức tạp"],"correct":2,"explanation":"Đáp án đúng là: Độ chính xác thấp Vì: Phương pháp trực tiếp ít được sử dụng trong chẩn đoán do độ chính xác thấp. Tham khảo: Mục 3.2.2","reference":""},{"id":65,"text":"Nguyên lý chung của các phương pháp phù nổi trong chẩn đoán bệnh giun sán là:","answers":["A. Dùng dung dịch bão hòa có tỷ trọng lớn để làm nổi trứng giun sán","B. Dùng dung dịch NaCl bão hòa làm nổi trứng giun sán","C. Tìm trứng của các loài giun tròn và noãn nang cầu trùng","D. Dùng dung dịch bão hòa tùy theo mục đích chẩn đoán để làm nổi trứng giun tròn"],"correct":0,"explanation":"Đáp án đúng là: Dùng dung dịch bão hòa có tỷ trọng lớn để làm nổi trứng giun sán Vì: Nguyên lý chung của các phương pháp phù nổi trong chẩn đoán bệnh giun sán là dùng dung dịch bão hòa có tỷ trọng lớn để làm nổi trứng giun sán. Tham khảo: Mục 3.3.1","reference":""},{"id":66,"text":"Có thể dùng phương pháp phù nổi để tìm trứng của tất cả các loài sán lá không?","answers":["A. Có","B. Không thể","C. Có thể","D. Tùy từng loài sán lá"],"correct":1,"explanation":"Đáp án đúng là: Không thể Vì: Không thể dùng phương pháp phù nổi để tìm trứng của tất cả các loài sán lá. Tham khảo: Mục 3.3.1","reference":""},{"id":67,"text":"Lấy mẫu phân gia súc, gia cầm bằng phương pháp nào có độ chính xác nhất:","answers":["A. Từ trực tràng","B. Từ hậu môn","C. Phân lấy vào lúc sáng sớm","D. Phân lấy vào chiều tối"],"correct":0,"explanation":"Đáp án đúng là: Từ trực tràng Vì: Lấy mẫu phân gia súc, gia cầm trực tiếp từ trực tràng có độ chính xác nhất. Tham khảo: Mục 3.3.1","reference":""},{"id":68,"text":"Dung dịch bảo quản sán dây và ấu trùng sán dây là :","answers":["A. NaCl","B. Formol 38%","C. Cồn 70 o" a sa lắng là không phát hiện được trứng giun sán có tỷ trọng thấp. Tham khảo: Mục 3.3.1.","reference":""},{"id":76,"text":"Trứng sán nào có đặc điểm: hình bầu dục hơi dài, một đầu to và một đầu nhỏ, màu tro nhạt, phôi bào to nhỏ không đều ?","answers":["A. Trứng sán lá dạ cỏ","B. Trứng sán lá cơ quan sinh sản gia cầm","C. Trứng sán lá ruột lợn","D. Trứng sán lá gan"],"correct":0,"explanation":"Đáp án đúng là: Trứng sán lá dạ cỏ Vì: Trứng sán lá dạ cỏ có đặc điểm: hình bầu dục hơi dài, một đầu to và một đầu nhỏ, màu tro nhạt, phôi bào to nhỏ không đều Tham khảo: Mục 4.2.2.","reference":""},{"id":77,"text":"Sán lá có hệ tuần hoàn và hô hấp","answers":["A. Rất phát triển","B. Tương đối phát triển","C. Kém phát triển","D. Tiêu giảm hoàn toàn"],"correct":3,"explanation":"Đáp án đúng là: Tiêu giảm hoàn toàn Vì: Sán lá có hệ tuần hoàn và hô hấp tiêu giảm hoàn toàn. Tham khảo: Mục 4.1.1","reference":""},{"id":78,"text":"Về hình thái, sán lá Fasciola có đặc điểm khác các sán lá khác:","answers":["A. Có sự phân nhánh ở nhiều bộ phận nhất","B. Có bộ phận sinh dục phát triển mạnh","C. Có 2 giác bám ở rất gần nhau","D. Có vai"],"correct":0,"explanation":"Đáp án đúng là: Có sự phân nhánh ở nhiều bộ phận nhất Vì: Về hình thái, sán lá Fasciola có đặc điểm khác các sán lá khác là có sự phân nhánh ở nhiều bộ phận nhất. Tham khảo: Mục 4.2.1","reference":""},{"id":79,"text":"Sán lá dạ cỏ gây bệnh chủ yếu do:","answers":["A. Di chuyển trong cơ thể và gây tổn thương cơ học nặng cho ký chủ","B. Ký sinh và lấy dinh dưỡng của ký chủ","C. Chiếm đoạt dinh dưỡng và tiết độc tố","D. Ký sinh, chiếm đoạt dinh dưỡng và phá hủy các cơ quan tổ chức"],"correct":0,"explanation":"Đáp án đúng là: Di chuyển trong cơ thể và gây tổn thương cơ học nặng cho ký chủ Vì: Sán lá dạ cỏ Nơi cư trú của sán Prosthogonimus sp. là túi fabricius, ống dẫn trứng, ổ nhớp Tham khảo: Mục 4.2.4.1","reference":""},{"id":113,"text":"Để lợn không bị nhiễm Fasciolopsis buski, cần:","answers":["A. Định kỳ tẩy, ủ phân, vệ sinh thức ăn nước uống","B. Định kỳ tẩy, ủ phân, diệt ký chủ trung gian","C. Định kỳ tẩy, diệt ký chủ trung gian, vệ sinh thức ăn nước uống","D. Định kỳ tẩy, ủ phân, ăn thức ăn chín và uống nước sạch"],"correct":3,"explanation":"Đáp án đúng là: Định kỳ tẩy, ủ phân, ăn thức ăn chín và uống nước sạch Vì: Để lợn không bị nhiễm Fasciolopsis buski, cần: định kỳ tẩy, ủ phân, ăn thức ăn chín và uống nước sạch Tham khảo: Mục 4.2.3.10","reference":""},{"id":114,"text":"Sán lá nào gây bệnh sán lá ruột lợn:","answers":["A. Prosthogonimus ovatus","B. Fasciola gigantica","C. Fasciolopsis buski","D. Paramphistomum cervi"],"correct":2,"explanation":"Đáp án đúng là: Fasciolopsis buski Vì: Sán lá Fasciolopsis buski gây bệnh sán lá ruột lợn. Tham khảo: Mục 4.2.3.1","reference":""},{"id":115,"text":"Về cấu tạo sán dây không có :","answers":["A. Hệ tiêu hóa, hệ hô hấp, hệ tuần hoàn","B. Hệ bài tiết, hệ hô hấp, hệ tuần hoàn","C. Hệ thần kinh, hệ bài tiết, hệ tiêu hóa","D. Lá môi, rãnh bám, móc bám"],"correct":0,"explanation":"Đáp án đúng là: Hệ tiêu hóa, hệ hô hấp, hệ tuần hoàn Vì: Về cấu tạo sán dây không có hệ tiêu hóa, hệ hô hấp, hệ tuần hoàn. Tham khảo: Mục 4.1.2","reference":""},{"id":116,"text":"Sán lá ruột lợn có kích thước:","answers":["A. Dài 20 – 60 mm, rộng 0,7 – 1,0 cm","B. Dài 25 – 75 mm, rộng 0,5 – 1,0 cm","C. Dài 20 – 70 mm, rộng 0,8 – 2,0 cm","D. Dài 30- 50 mm, rộng 0,7 – 1,2 cm"],"correct":2,"explanation":"Đáp án đúng là: Dài 20 – 70 mm, rộng 0,8 – 2,0 cm Vì: Sán lá ruột lợn có kích thước dài 20 - 70 mm, rộng 0,8 - 2,0 cm. Tham khảo: Mục 4.2.3.2.","reference":""},{"id":117,"text":"Sán lá nào có đặc điểm: hai giác bám gần nhau, manh tràng gồm hai nhánh, tinh hoàn phân nhiều nhánh, buồng trứng phân nhánh, tuyến noãn hoàng phân nhánh","answers":["A. Sán lá tuyến tụy","B. Sán lá ruột lợn","C. Sán lá gan","D. Sán lá dạ cỏ"],"correct":1,"explanation":"Đáp án đúng là: Sán lá ruột lợn Vì: Sán lá ruột lợn có đặc điểm: hai giác bám gần nhau, manh tràng gồm hai nhánh, tinh hoàn phân nhiều nhánh, buồng trứng phân nhánh, tuyến noãn hoàng phân nhánh. Tham khảo: Mục 4.2.3.2","reference":""},{"id":118,"text":"Các dạng ấu trùng của sán lá cơ quan sinh sản gia cầm là:","answers":["A. Miracidium, Redia, Cercaria, Adolescaria","B. Miracidium, Sporocyst, Cercaria, Metacercaria","C. Miracidium, Sporocyst, Redia, Cercaria, Metacercaria","D. Miracidium, Sporocyst, Redia, Cercaria, Adolescaria"],"correct":1,"explanation":"Đáp án đúng là: Miracidium, Sporocyst, Cercaria, Metacercaria Vì: Các dạng ấu trùng của sán lá cơ quan sinh sản gia cầm là: Miracidium, Sporocyst, Cercaria, Metacercaria Tham khảo: Mục 4.2.4.3","reference":""},{"id":119,"text":"Bệnh sán lá sinh sản gia cầm có khả năng lan rộng là do:","answers":["A. Ngoài gà, vịt, ngan, ngỗng, các loài chim hoang dã cũng mắc bệnh này","B. Mầm bệnh có khả năng tồn tại lâu ở ngoại cảnh","C. Bệnh phân bố ở khắp các vùng","D. Gia cầm mọi lứa tuổi đều nhiễm sán"],"correct":0,"explanation":"Đáp án đúng là: Ngoài gà, vịt, ngan, ngỗng, các loài chim hoang dã cũng mắc bệnh này Vì: Sán lá dạ cỏ gây bệnh chủ yếu do di chuyển trong cơ thể và gây tổn thương cơ học nặng cho ký chủ Tham khảo: Mục 4.2.2","reference":""},{"id":120,"text":"Bệnh tích chính của bệnh sán lá sinh sản gia cầm là:","answers":["A. Viêm ống dẫn trứng, trong ống dẫn trứng có nhiều sán lá","B. Viêm ống dẫn trứng, niêm mạc ống dẫn trứng tơi xốp và có nhiều sán lá","C. Viêm ống dẫn trứng, niêm mạc ống dẫn trứng tơi xốp","D. Viêm phúc mạc, có nhiều dịch viêm trong xoang bụng"],"correct":1,"explanation":"Đáp án đúng là: Viêm ống dẫn trứng, niêm mạc ống dẫn trứng tơi xốp và có nhiều sán lá Vì: Bệnh tích chính của bệnh sán lá sinh sản gia cầm là: viêm ống dẫn trứng, niêm mạc ống dẫn trứng tơi xốp và có nhiều sán lá Tham khảo: Mục 4.2.4.7","reference":""},{"id":121,"text":"Sán lá sinh sản gia cầm gây triệu chứng đẻ không bình thường ở gia cầm là do:","answers":["A. Sán phá hủy chức năng của tuyến tạo vỏ trứng","B. Sán kích thích làm ống dẫn trứng co bóp không bình thường","C. Cả 3 nguyên nhân","D. Sán phá hủy chức năng tuyến Albumin, làm Albumin tiết ra quá nhiều"],"correct":2,"explanation":"Đáp án đúng là: Cả 3 nguyên nhân Vì: Sán lá sinh sản gia cầm gây triệu chứng đẻ không bình thường ở gia cầm là do: sán kích thích làm ống dẫn trứng co bóp không bình thường, sán phá hủy chức năng tuyến Albumin, làm Albumin tiết ra quá nhiều, sán phá hủy chứ Tham khảo: Mục 4.2.4.5","reference":""},{"id":122,"text":"Lợn mắc bệnh sán lá ruột là do:","answers":["A. Ăn phải ấu trùng sán lá ruột","B. Ăn thức ăn có ấu trùng sán lá ruột lợn có sức gây bệnh","C. Uống nước có ấu trùng sán lá ruột có sức gây bệnh","D. Uống nước và ăn thức ăn có ấu trùng sán lá ruột"],"correct":1,"explanation":"Đáp án đúng là: Ăn thức ăn có ấu trùng sán lá ruột lợn có sức gây bệnh Vì: Lợn mắc bệnh sán lá ruột là do ăn thức ăn có ấu trùng sán lá ruột lợn có sức gây bệnh. Tham khảo: Mục 4.2.3.3","reference":""},{"id":123,"text":"Để dùng thuốc tẩy sán lá sinh sản gia cầm có hiệu quả, cần phải:","answers":["A. Dùng thuốc đặc hiệu","B. Dùng sớm (khi gia cầm mới xuất hiện triệu chứng)","C. Dùng phối hợp với thuốc trợ sức, trợ lực","D. Tăng cường chăm sóc, nuôi dưỡng gia cầm"],"correct":1,"explanation":"Đáp án đúng là: Dùng sớm (khi gia cầm mới xuất hiện triệu chứng) Vì: Để dùng thuốc tẩy sán lá sinh sản gia cầm có hiệu quả, cần phải Dùng sớm (khi gia cầm mới xuất hiện triệu chứng). Tham khảo: Mục 4.2.4.9.","reference":""},{"id":124,"text":"Sán Fasciolopsis buski trưởng thành dùng ......... bám vào ruột non làm ruột bị viêm loét:","answers":["A. Giác bám","B. Móc bám","C. Rãnh bám","D. Lá môi"],"correct":0,"explanation":"Đáp án đúng là: Giác bám Vì: Sán Fasciolopsis buski trưởng thành dùng giác bám bám vào ruột non làm ruột bị viêm loét. Tham khảo: Mục 4.2.3.5","reference":""},{"id":125,"text":"Cách lấy dinh dưỡng của sán dây là:","answers":["A. Bám vào những nơi ký sinh và hút chất dinh dưỡng của ký chủ","B. Vừa hút dinh dưỡng, vừa thẩm thấu dinh dưỡng qua bề mặt cơ thể","C. Bám vào nơi ký sinh và dùng lỗ miệng hút dinh dưỡng của ký chủ","D. Bám vào nơi ký sinh và thẩm thấu chất dinh dưỡng qua bề mặt cơ thể"],"correct":3,"explanation":"Đáp án đúng là: Bám vào nơi ký sinh và thẩm thấu chất dinh dưỡng qua bề mặt cơ thể Vì: Cách lấy dinh dưỡng của sán dây là bám vào nơi ký sinh và thẩm thấu chất dinh dưỡng qua bề mặt cơ thể. Tham khảo: Mục 5.1.1","reference":""},{"id":126,"text":"Sán dây Moniezia ký sinh ở:","answers":["A. Ruột non của gia súc nhai lại","B. Ở cơ của gia súc nhai lại","C. Ruột non và ruột già của gia súc nhai lại","D. Ruột non, ruột già và thậm chí cả ở cơ của gia súc nhai lại"],"correct":0,"explanation":"Đáp án đúng là: Ruột non của gia súc nhai lại Vì: Sán dây Moniezia ký sinh ở ruột non của gia súc nhai lại Tham khảo: Mục 5.2.1.1","reference":""},{"id":127,"text":"Thời gian “gạo” hình thành đầy đủ ở ký chủ là:","answers":["A. 80 ngày","B. 70 ngày","C. 90 ngày","D. 60 ngày"],"correct":3,"explanation":"Đáp án đúng là: 60 ngày Vì: Thời gi :"Sán dây Raillietina gây tác hại cho ký chủ bằng:","answers":["A. Tác động cơ giới ở ruột non và chiếm đoạt dinh dưỡng","B. Tác động cơ giới, chiếm đoạt dinh dưỡng và tiết độc tố","C. Tác động cơ giới, tiết độc tố","D. Tác động cơ giói, chiếm đoạt dinh dưỡng, tiết độc tố và mang trùng"],"correct":1,"explanation":"Đáp án đúng là: Tác động cơ giới, chiếm đoạt dinh dưỡng và tiết độc tố Vì: Sán dây Raillietina gây tác hại cho ký chủ bằng tác động cơ giới, chiếm đoạt dinh dưỡng và tiết độc tố. Tham khảo: Mục 5.2.2.5","reference":""},{"id":132,"text":"Đối với lợn còn sống, việc chẩn đoán bệnh do Cysticercus cellulosae rất.........:","answers":["A. đơn giản vì dễ quan sát được triệu chứng lâm sàng của lợn bị bệnh","B. 3 phương án trên đều sai","C. dễ vì có thể nhìn thấy ấu trùng","D. khó khăn vì không nhìn thấy ấu trùng"],"correct":3,"explanation":"Đáp án đúng là: khó khăn vì không nhìn thấy ấu trùng Vì: Đối với lợn còn sống, việc chẩn đoán bệnh do Cysticercus cellulosae rất khó khăn vì không nhìn thấy ấu trùng. Tham khảo: Mục 5.2.3.8","reference":""},{"id":133,"text":"Chẩn đoán bằng điều trị bệnh do sán Moniezia là:","answers":["A. Dùng thuốc tẩy, xét nghiệm thấy trứng trong phân","B. Dùng thuốc tẩy phòng, thấy không bị bệnh thì kết luận","C. Dùng thuốc tẩy sán dây, thấy sán bị tẩy ra thì kết luận bị bệnh sán dây","D. Dùng một loại thuốc được sản xuất với mục đích chẩn đoán"],"correct":2,"explanation":"Đáp án đúng là: Dùng thuốc tẩy sán dây, thấy sán bị tẩy ra thì kết luận bị bệnh sán dây Vì: Chẩn đoán bằng điều trị bệnh do sán Moniezia là dùng thuốc tẩy sán dây, thấy sán bị tẩy ra thì kết luận bị bệnh sán dây. Tham khảo: Mục 5.2.1.8","reference":""},{"id":134,"text":"Sán dây Raillietina có:","answers":["A. 18 – 32 tinh hoàn ở mỗi đốt","B. Vài chục anation":"Đáp án đúng là: Gà bị bệnh sán dây Vì: Mổ khám gà thấy niêm mạc ruột bị viêm, phủ chất nhờn đặc màu đỏ hoặc vàng nhạt, trên niêm mạc có nhiều ký sinh trùng dài 25 cm, rộng 1 – 4 mm, thì kết luận: gà bị bệnh sán dây. Tham khảo: Mục 5.2.2.2.","reference":""},{"id":139,"text":"Trong khi xét nghiệm phân gà có thể tìm thấy trứng sán dây Raillietina bằng cách:","answers":["A. Xét nghiệm bằng phương pháp Fulleborn","B. Nghiền các đốt sán dây","C. Xét nghiệm bằng phương pháp trực tiếp","D. Xét nghiệm bằng phương pháp Benedek"],"correct":1,"explanation":"Đáp án đúng là: Nghiền các đốt sán dây Vì: Trong khi xét nghiệm phân gà có thể tìm thấy trứng sán dây Raillietina bằng cách nghiền các đốt sán dây. Tham khảo: Mục 5.2.2.2","reference":""},{"id":140,"text":"Ký chủ trung gian của sán dây Taenia solium là:","answers":["A. Động vật không xương sống: kiến, nhện đất và một số côn trùng khác","B. Không phải các loại trên","C. Một số bọ cánh cứng như bọ hung,...","D. Động vật có xương sống: lợn, người và một số động vật khác"],"correct":3,"explanation":"Đáp án đúng là: Động vật có xương sống: lợn, người và một số động vật khác Vì: Ký chủ trung gian của sán dây Taenia solium là động vật có xương sống: lợn, người và một số động vật khác. Tham khảo: Mục 5.2.3.1","reference":""},{"id":141,"text":"Căn bệnh gây bệnh gạo lợn ký sinh ở:","answers":["A. Ruột non của người","B. Cơ của lợn","C. Tổ chức tring cơ thể lợn","D. Ruột non của lợn, bò"],"correct":1,"explanation":"Đáp án đúng là: Cơ của lợn Vì: Căn bệnh gây bệnh gạo lợn ký sinh ở cơ của lợn Tham khảo: Mục 5.2.3.1","reference":""},{"id":142,"text":"Gà bị bệnh sán dây có triệu chứng:","answers":["A. Gày, lông xù, kiết lỵ, phân có đốt sán","B. Phân có đốt sán, triệu chứng khác không rõ","C. Còi cọc, tiêu chảy, ăn kém, xã cá </script>

<script>
(function () {
  var LETTERS = "ABCDEFGHIJ";
  var container = document.getElementById("questionContainer");
  var noResults = document.getElementById("noResults");
  var searchInput = document.getElementById("searchInput");
  var searchClear = document.getElementById("searchClear");
  var countEl = document.getElementById("searchCount");
  var total = QUESTIONS.length;

  /* ── Escape HTML ── */
  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  /* ── Highlight từ khóa ── */
  function highlight(text, term) {
    if (!term) return esc(text);
    var safe = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return esc(text).replace(
      new RegExp("(" + safe.replace(/&amp;/g, "&amp;amp;") + ")", "gi"),
      "<mark>$1</mark>"
    );
  }

  /* ── Render 1 câu hỏi ── */
  function renderQ(q, term) {
    var answersHtml = q.answers.map(function (ans, i) {
      var isCorrect = i === q.correct;
      var cls = "answer-item" + (isCorrect ? " correct" : "");
      var check = isCorrect ? '<span class="check-mark">&#10003;</span>' : "";
      return (
        '<div class="' + cls + '">' +
        '<span class="answer-letter">' + (LETTERS[i] || i + 1) + ".</span>" +
        '<span class="answer-text">' + highlight(ans, term) + "</span>" +
        check +
        "</div>"
      );
    }).join("");

    var feedbackHtml = "";
    if (q.explanation || q.reference) {
      feedbackHtml =
        '<div class="feedback-section">' +
        (q.explanation
          ? "<p><strong>Vì: </strong>" + esc(q.explanation) + "</p>"
          : "") +
        (q.reference
          ? "<p><strong>Tham khảo: </strong>" + esc(q.reference) + "</p>"
          : "") +
        "</div>";
    }

    return (
      '<div class="question-block" id="q' + q.id + '">' +
      '<div class="question-header">' +
      '<span class="q-badge">Câu ' + q.id + "</span>" +
      "</div>" +
      '<div class="question-text">' + highlight(q.text, term) + "</div>" +
      '<div class="answers">' + answersHtml + "</div>" +
      feedbackHtml +
      "</div>"
    );
  }

  /* ── Render danh sách câu hỏi ── */
  function renderList(filtered, term) {
    // Xóa các block cũ (giữ lại #noResults)
    var old = container.querySelectorAll(".question-block");
    old.forEach(function (el) { el.remove(); });

    if (filtered.length === 0) {
      noResults.style.display = "block";
    } else {
      noResults.style.display = "none";
      var frag = document.createDocumentFragment();
      filtered.forEach(function (q) {
        var div = document.createElement("div");
        div.innerHTML = renderQ(q, term);
        frag.appendChild(div.firstChild);
      });
      container.appendChild(frag);
    }

    countEl.innerHTML =
      "<strong>" + filtered.length + "</strong> / " + total + " câu";
  }

  /* ── Lọc câu hỏi ── */
  function doSearch(term) {
    var t = term.trim().toLowerCase();
    var filtered = t
      ? QUESTIONS.filter(function (q) {
          return (
            q.text.toLowerCase().includes(t) ||
            q.answers.some(function (a) { return a.toLowerCase().includes(t); })
          );
        })
      : QUESTIONS;

    searchClear.style.display = term ? "block" : "none";
    renderList(filtered, term.trim());
  }

  /* ── Khởi tạo ── */
  renderList(QUESTIONS, "");

  searchInput.addEventListener("input", function () {
    doSearch(this.value);
  });
  searchClear.addEventListener("click", function () {
    searchInput.value = "";
    doSearch("");
    searchInput.focus();
  });

  /* ── Scroll to top ── */
  var scrollBtn = document.getElementById("scrollTopBtn");
  window.addEventListener("scroll", function () {
    scrollBtn.style.display = window.scrollY > 320 ? "flex" : "none";
  }, { passive: true });
  scrollBtn.addEventListener("click", function (e) {
    e.preventDefault();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
})();
</script>
</body>
</html>
