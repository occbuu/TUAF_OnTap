<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn Tập - Kỹ Thuật Bào Chế Sinh Dược Học (174 câu)</title>
<style>
:root {
  --blue:      #2563eb;
  --blue-dark: #1e40af;
  --blue-bg:   #eff6ff;
  --green:     #16a34a;
  --green-bg:  #f0fdf4;
  --green-bd:  #86efac;
  --yellow-bg: #fefce8;
  --yellow-bd: #fde047;
  --gray:      #6b7280;
  --gray-lt:   #f3f4f6;
  --border:    #e5e7eb;
  --text:      #111827;
  --radius:    12px;
  --shadow:    0 1px 4px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f1f5f9; color: var(--text);
  line-height: 1.65; font-size: 15px;
}

/* ── HEADER ── */
.page-header {
  background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%);
  color: #fff; padding: 28px 20px 22px; text-align: center;
  position: relative;
}
.page-header h1 { font-size: clamp(1.1em, 4vw, 1.7em); font-weight: 700; margin-bottom: 5px; }
.page-header p  { opacity: .85; font-size: .88em; }
.back-btn {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,.18); border: 1.5px solid rgba(255,255,255,.35);
  color: #fff; padding: 6px 13px; border-radius: 7px;
  text-decoration: none; font-size: .82em; font-weight: 600;
  white-space: nowrap; transition: background .15s; line-height: 1.4;
}
.back-btn:hover { background: rgba(255,255,255,.3); }
@media (max-width: 480px) {
  .back-btn { position: static; transform: none; display: inline-block;
              margin-bottom: 10px; font-size: .8em; }
  .page-header { padding-top: 16px; }
}

/* ── SEARCH BAR ── */
.search-wrap {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
.search-inner {
  max-width: 860px; margin: 0 auto;
  display: flex; align-items: center; gap: 10px;
}
.search-box { flex: 1; position: relative; }
.search-box input {
  width: 100%; padding: 9px 36px 9px 38px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: .95em; outline: none; background: var(--gray-lt);
  transition: border-color .15s, background .15s;
  -webkit-appearance: none;
}
.search-box input:focus { border-color: var(--blue); background: #fff; }
.search-icon {
  position: absolute; left: 11px; top: 50%;
  transform: translateY(-50%); color: var(--gray);
  pointer-events: none; font-size: 1em;
}
.search-clear {
  position: absolute; right: 9px; top: 50%;
  transform: translateY(-50%); background: none; border: none;
  cursor: pointer; color: var(--gray); font-size: 1.1em;
  padding: 2px 4px; display: none; line-height: 1; border-radius: 50%;
}
.search-clear:hover { color: #111; background: var(--gray-lt); }
.search-count {
  white-space: nowrap; font-size: .88em; color: var(--gray);
  min-width: 90px; text-align: right;
}
.search-count strong { color: var(--blue-dark); }

/* ── CONTAINER ── */
.container {
  max-width: 860px; margin: 18px auto;
  padding: 0 14px 80px;
}

/* ── QUESTION CARD ── */
.question-block {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 16px;
  border-left: 4px solid var(--blue);
  overflow: hidden;
  transition: box-shadow .15s;
}
.question-block:hover {
  box-shadow: 0 2px 8px rgba(0,0,0,.12), 0 6px 20px rgba(0,0,0,.08);
}

.question-header {
  display: flex; align-items: center; gap: 8px;
  background: var(--blue-bg); padding: 8px 14px;
  border-bottom: 1px solid #dbeafe;
}
.q-badge {
  background: var(--blue); color: #fff;
  border-radius: 20px; padding: 1px 9px;
  font-size: .78em; font-weight: 700; letter-spacing: .3px;
}

.question-text {
  padding: 14px 16px 8px;
  font-size: 1em; font-weight: 500; color: #1e293b;
}
.question-text mark {
  background: #fef08a; color: inherit;
  border-radius: 3px; padding: 0 2px;
}

/* ── ANSWERS ── */
.answers {
  padding: 4px 16px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.answer-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 12px; border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--gray-lt);
}
.answer-item.correct {
  background: var(--green-bg);
  border-color: var(--green-bd);
  font-weight: 600;
}
.answer-letter {
  font-weight: 700; font-size: .9em;
  width: 22px; flex-shrink: 0; padding-top: 1px; color: var(--gray);
}
.answer-item.correct .answer-letter { color: var(--green); }
.answer-text {
  flex: 1; color: #374151; font-size: .95em;
}
.answer-item.correct .answer-text { color: #14532d; }
.answer-text mark {
  background: #bbf7d0; color: inherit;
  border-radius: 3px; padding: 0 2px;
}
.check-mark {
  flex-shrink: 0; margin-left: auto; padding-left: 6px;
  color: var(--green); font-weight: 700;
}

/* ── FEEDBACK ── */
.feedback-section {
  background: var(--yellow-bg);
  border-top: 1.5px solid var(--yellow-bd);
  padding: 10px 16px; font-size: .875em; color: #44403c;
}
.feedback-section p { margin: 3px 0; }
.feedback-section strong { color: #1c1917; }

/* ── EMPTY STATE ── */
#noResults {
  display: none; text-align: center;
  padding: 60px 20px; color: var(--gray);
}
#noResults .nr-icon { font-size: 2.5em; margin-bottom: 12px; }
#noResults p { font-size: .95em; }

/* ── SCROLL TOP ── */
#scrollTopBtn {
  position: fixed; bottom: 20px; right: 16px;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--blue); color: #fff; border: none;
  font-size: 1.3em; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 3px 10px rgba(37,99,235,.4);
  transition: background .15s, transform .15s;
  z-index: 200; text-decoration: none;
  line-height: 44px; text-align: center;
}
#scrollTopBtn:hover { background: var(--blue-dark); transform: translateY(-2px); }

/* ── MOBILE ── */
@media (max-width: 600px) {
  body { font-size: 14px; }
  .page-header { padding: 18px 14px 14px; }
  .container { margin: 12px auto; padding: 0 10px 80px; }
  .question-text { padding: 12px 12px 6px; }
  .answers { padding: 4px 12px 10px; gap: 5px; }
  .answer-item { padding: 7px 10px; }
  .feedback-section { padding: 9px 12px; }
  .search-count { display: none; }
}
</style>
</head>

    <div class="search-box">
      <span class="search-icon">&#128269;</span>
      <input type="search" id="searchInput"
             placeholder="Tìm câu hỏi hoặc đáp án..." autocomplete="off">
      <button class="search-clear" id="searchClear" title="Xóa">&#10005;</button>
    </div>
    <div class="search-count" id="searchCount">
      <strong>174</strong> / 174 câu

</div>

<div class="container" id="questionContainer">

</div>

hăn"],"correct":2,"explanation":"Đáp án đúng là: Tất cả đáp án đều đúng Vì: Thiếu nước sẽ làm cho vận chuyển thức ăn khó khăn; vận chuyển chất dinh dưỡng khó khăn; Rối loạn trao đổi chất Tham khảo: Xem mục 1.1 bài giảng text 1","reference":""},{"id":8,"text":"Căn cứ vào thành phần hóa học, protit chia thành mấy loại?","answers":["A. 4","B. 5","C. 2","D. 3"],"correct":2,"explanation":"Đáp án đúng là: 2 Vì: Căn cứ vào thành phần hóa học, protit chia thành 2 loại: Protit đơn giản và protit phức tạp Tham khảo: Xem mục 1.2 bài giảng text 1","reference":""},{"id":9,"text":"Có bao nhiêu gam nito trong 220gam protit?","answers":["A. 30,2","B. 28,5","C. 35,2","D. 32,5"],"correct":2,"explanation":"Đáp án đúng là: 35,2 Vì: Trong 220 gam protit sẽ có (220x16)/100 bằng 35,2 gam nito Tham khảo: Xem mục 1.2 bài giảng text 1","reference":""},{"id":10,"text":"Nước trong cơ thể chiếm bao nhiêu %?","answers":["A. 0,95","B. 0,7","C. 0,8","D. 0,9"],"correct":1,"explanation":"Đáp án đúng là: 0,7 Vì: Nước trong cơ thể động vật chiếm 70% Tham khảo: Xem mục 1.1 bài giảng text 1","reference":""},{"id":11,"text":"Tại sao mất nước lại dẫn tới khó vận chuyển chất dinh dưỡng?","answers":["A. Do thức ăn không tiêu hóa được","B. Do ngưng tiết nước bọt","C. Do máu đông đặc lại","D. Do cơ thể thiếu nước"],"correct":2,"explanation":"Đáp án đúng là: Do máu đông đặc lại Vì: Khi mất nước sẽ làm máu có hiện tượng động đặc lại, dẫn đến vận chuyển dinh dưỡng khó khăn Tham khảo: Xem mục 1.1 bài giảng text 1","reference":""},{"id":12,"text":"Axit amin là đơn phân cấu tạo nên chất gì?","answers":["A. Hydratcacbon","B. Lipit","C. Nito Phi Protit","D. Protit"],"correct":2,"explanation":"Đáp án đúng là: Protit Vì: Axit amin là đơn phân cấu tạo nên protit Tham khảo: Xem mục 1.2 bài giảng text 1","reference":""},{"id":13,"text":"Tỷ lệ protein trong khẩu phần ăn của trâu bò thịt?","answers":["A. 20-22%","B. 16-18%","C. 18-20%","D. 14-16%"],"correct":1,"explanation":"Đáp án đúng là: 16-18% Vì: Tỷ lệ protein trong kh  tiêu hóa","B. Khối lượng thức ăn quá cao làm giảm tỷ lệ tiêu hóa","C. Khối lượng thức ăn cao tăng tỷ lệ tiêu hóa","D. Khối lượng thức ăn thấp làm giảm tytr lệ tiêu hóa"],"correct":1,"explanation":"Đáp án đúng là: Khối lượng thức ăn quá cao làm giảm tỷ lệ tiêu hóa Vì: Khối lượng thức ăn quá cao làm giảm tỷ lệ tiêu hóa","reference":"Mục 2.2.2"},{"id":101,"text":"Phương pháp thử mức tiêu hóa một loại thức ăn trong khẩu phần là gì?","answers":["A. Thay thế hoàn toàn bằng thức ăn thí nghiệm","B. So sánh thức ăn thí nghiệm với thức ăn đã sử dụng","C. Thay thế (20 - 30%) khẩu phần bằng thức ăn thí nghiệm","D. Bổ sung thêm thức ăn thí nghiệm"],"correct":2,"explanation":"Đáp án đúng là: Thay thế (20 - 30%) khẩu phần bằng thức ăn thí nghiệm Vì: Phương pháp thử mức tiêu hóa một loại thức ăn trong khẩu phần là thay thế 20 - 30% thức ăn thí nghiệm vào khẩu phần","reference":"Mục 2.2.2"},{"id":102,"text":"Phương pháp thử mức tiêu hóa một khẩu phần xác định tỷ lệ tiêu hóa như thế nào?","answers":["A. Dinh dưỡng hấp thu và dinh dưỡng thải ra","B. Dinh dưỡng phân tích","C. Không xác định được","D. Dinh dưỡng thu nhận và dinh dưỡng thải ra"],"correct":3,"explanation":"Đáp án đúng là: Dinh dưỡng thu nhận và dinh dưỡng thải ra Vì: Phương pháp thử mức tiêu hóa một khẩu phần xác định tỷ lệ tiêu hóa thông qua dinh dưỡng thu nhận và dinh dưỡng thải ra","reference":"Mục 2.2.2"},{"id":103,"text":"Năng lượng thô là gì?","answers":["A. Là nhiệt năng tỏa ra","B. Là năng lượng khi vật nuôi tiêu hóa","C. Là năng lượng khi đốt cháy toàn bộ vật chất hữu cơ thức ăn","D. Là năng lượng sử dụng cho trao đổi chất"],"correct":2,"explanation":"Đáp án đúng là: Là năng lượng khi đốt cháy toàn bộ vật chất hữu cơ thức ăn Vì: Năng lượng thô: là năng lượng nhận được khi đốt cháy toàn bộ vật chất hữu cơ của thức ăn.","reference":"Mục 2.2.5"},{"id":104,"text":"Tỷ lệ protein ảnh hưởng đến tỷ lệ tiêu hóa như thế nào?","answers":["A. Tỷ lệ protein tăng càng cao tăng tỷ lệ tiêu hóa","B. Tỷ lệ protein càng thấp càng ệ chất dinh dưỡng tiêu hóa","D. Tỷ lệ chất dinh dưỡng thu nhận/chất dinh dưỡng thải ra"],"correct":1,"explanation":"Đáp án đúng là: Tỷ lệ chất dinh dưỡng tiêu hóa/chất dinh dưỡng thu nhận Vì: Tỷ lệ tiêu hóa là tỷ lệ giữa chất dinh dưỡng tiêu hóa so với chất dinh dưỡng thu nhận của vật nuôi","reference":"Mục 2.2.2"},{"id":109,"text":"Khắc phục phương pháp thử nghiệm mức tiêu hóa một khẩu phần?","answers":["A. Thử nghiệm nhiều lần","B. Thay đổi phương pháp","C. Trộn chất chỉ thị không tiêu hóa được","D. Sử dụng thiết bị chuyên dụng"],"correct":2,"explanation":"Đáp án đúng là: Trộn chất chỉ thị không tiêu hóa được Vì: Khắc phục phương pháp thử nghiệm mức tiêu hóa một khẩu phần bằng cách trộn chất chỉ thị không tiêu hóa được","reference":"Mục 2.2.2"},{"id":110,"text":"Phương pháp cân bằng nito, cân bằng nito bằng không trong trường hợp nào?","answers":["A. N TĂ < N phân + N nước tiểu + N sản phẩm","B. N TĂ = N phân + N nước tiểu + N sản phẩm","C. Không xác định được","D. N TĂ > N phân + N nước tiểu + N sản phẩm"],"correct":1,"explanation":"Đáp án đúng là: N TĂ = N phân + N nước tiểu + N sản phẩm Vì: Phương pháp cân bằng nito, cân bằng nito bằng không khi N TĂ = N phân + N nước tiểu + N sản phẩm","reference":"Mục 2.2.4"},{"id":111,"text":"Phương pháp phân tích thức ăn nhằm mục đích gì?","answers":["A. Đánh giá khả năng tiêu hóa","B. Đánh giá tỷ lệ tiêu hóa","C. Biết được hàm lượng chất dinh dưỡng trong thức ăn","D. Đánh giá thức ăn tốt, xấu"],"correct":2,"explanation":"Đáp án đúng là: Biết được hàm lượng chất dinh dưỡng trong thức ăn Vì: Phương pháp phân tích để biết được hàm lượng các chất dinh dưỡng trong thức ăn","reference":"Mục 2.2.1"},{"id":112,"text":"Nhược điểm của phương pháp thử mức tiêu hóa một khẩu phần?","answers":["A. Rất vất vả, không phù hợp thực tế","B. Thử nghiệm nhiều lần","C. Chịu ảnh hưởng từ môi trường","D. Cần trang thiết bị hiện đại"],"correct":0,"explanation":"Đáp án đúng là: Rất vất vả, không phù hợp thực tế Vì: Nhược điểm của phương pháp thử mức tiêu hóa một khẩu phần là rất vất vả và không thực tế","reference":"Mục 2.2.2"},{"id":113,"text":"Năng lượng tiêu hóa là gì?","answers":["A. Là năng lượng tiêu hóa được","B. Là năng lượng trao đổi chất","C. Là nhiệt năng tỏa ra","D. Là năng lượng thức ăn"],"correct":0,"explanation":"Đáp án đúng là: Là năng lượng tiêu hóa được Vì: Năng lượng tiêu hoá: là năng lượng của các vật chất dinh dưỡng tiêu hoá được","reference":"Mục 2.2.5"},{"id":114,"text":"Giá trị dinh dưỡng cao khi tỷ lệ chất dinh dưỡng nào cao?","answers":["A. Tỷ lệ nước","B. Tỷ lệ VCK","C. Tỷ lệ protein, tỷ lệ đường","D. Tỷ lệ Xơ"],"correct":2,"explanation":"Đáp án đúng là: Tỷ lệ protein, tỷ lệ đường Vì: Giá trị dinh dưỡng cao ở những thức ăn có tỷ lệ protein và đường cao","reference":"Mục 2.2.1"},{"id":115,"text":"Nhược điểm của phương pháp phân tích dinh dưỡng thức ăn là gì?","answers":["A. Không đánh giá được tỷ lệ tiêu hóa","B. Không đánh giá được tỷ lệ VCK","C. Không đánh giá được tỷ lệ xơ","D. Không đánh giá được tỷ lệ protein"],"correct":0,"explanation":"Đáp án đúng là: Không đánh giá được tỷ lệ tiêu hóa Vì: Nhược điểm của phương pháp phân tích là không đánh giá được tỷ lệ tiêu hóa","reference":"Mục 2.2.1"},{"id":116,"text":"Năng lượng thuần là gì?","answers":["A. Là năng lượng thức ăn","B. Là năng lượng trao đổi trừ đi phần năng lượng tăng nhiệt độ","C. Là năng lượng trao đổi chất","D. Là năng lượng tiêu hóa được"],"correct":1,"explanation":"Đáp án đúng là: Là năng lượng trao đổi trừ đi phần năng lượng tăng nhiệt độ Vì: Năng lượng thuần: Là năng lượng trao đổi trừ đi phần năng lượng tăng nhiệt độ","reference":"Mục 2.2.5"},{"id":117,"text":"Năng lượng trao đổi là gì?","answers":["A. là năng lượng tiêu hoá trừ đi phần năng lượng thải ra trừ ở phân","B. Là năng lượng trao đổi chất","C. Là năng lượng thức ăn","D. Là năng lượng tiêu hóa được"],"correct":0,"explanation":"Đáp án đúng là: là năng lượng tiêu hoá trừ đi phần năng lượng thải ra trừ ở phân Vì: Năng lượng trao đổi: là năng lượng tiêu hoá trừ đi phần năng lượng thải ra trong nước tiểu, khí đường tiêu hoá và khí do ợ hơi ra","reference":"Mục 2.2.5"},{"id":118,"text":"Tỷ lệ tiêu hóa của khẩu phần ăn cho lợn khi ăn 200 g protein, thải ra theo phân 40 g?","answers":["A. 0,6","B. 0,7","C. 0,8","D. 0,9"],"correct":2,"explanation":"Đáp án đúng là: 0,8 Vì: Tỷ lệ tiêu hóa của khẩu phần ăn cho lợn khi ăn 200 g protein, thải ra theo phân 40 g là 80%","reference":"Mục 2.2.2"},{"id":119,"text":"Phương pháp cân bằng nito, cân bằng nito dương trong trường hợp nào?","answers":["A. Không xác định được","B. N TĂ > N phân + N nước tiểu + N sản phẩm","C. N TĂ < N phân + N nước tiểu + N sản phẩm","D. N TĂ = N phân + N nước tiểu + N sản phẩm"],"correct":1,"explanation":"Đáp án đúng là: N TĂ > N phân + N nước tiểu + N sản phẩm Vì: Phương pháp cân bằng nito, cân bằng nito dương khi N TĂ > N phân + N nước tiểu + N sản phẩm","reference":"Mục 2.2.4"},{"id":120,"text":"Ảnh hưởng của lứa tuổi đến tỷ lệ tiêu hóa như thế nào?","answers":["A. Lứa tuổi khác nhau tỷ lệ tiêu hóa khác nhau","B. Tỷ lệ tiêu hóa phụ thuộc vào cá thể","C. Không có ảnh hưởng đến tỷ lệ tiêu hóa","D. Tỷ lệ tiêu hóa thay đổi theo mùa vụ"],"correct":0,"explanation":"Đáp án đúng là: Lứa tuổi khác nhau tỷ lệ tiêu hóa khác nhau Vì: Ảnh hưởng của lứa tuổi khác nhau dẫn đến tỷ lệ tiêu hóa khác nhau","reference":"Mục 2.2.2"},{"id":121,"text":"Hai loại thức ăn có thành phần hóa học tương tự nhau, chỉ tiêu đánh giá thức ăn tốt là gì?","answers":["A. Tỷ lệ tiêu hóa","B. Tỷ lệ nước","C. Tỷ lệ xơ","D. Tỷ lệ hấp thu"],"correct":0,"explanation":"Đáp án đúng là: Tỷ lệ tiêu hóa Vì: Tỷ lệ tiêu hóa của các thức ăn có thành phần hóa học tương tự nhau cao hơn thì thức ăn đó tốt hơn","reference":"Mục 2.2.2"},{"id":122,"text":"Phương pháp giết mổ so sánh đánh giá chỉ tiêu nào?","answers":["A. Phân tích protein và lipit","B. Phân tích khoáng trong thịt","C. Phân tích chất lượng thịt","D. Đánh giá sức sản xuất thịt"],"correct":0,"explanation":"Đáp án đúng là: Phân tích protein và lipit Vì: Giết mổ vật nuôi trước khi thí nghiệm và khi kết thúc thí nghiệm để tiến hành phân tích protein, lipit","reference":"Mục 2.2.3"},{"id":123,"text":"Nhược điểm của phương pháp thử nghiệm mức tiêu hóa một loại thức ăn trong khẩu phần?","answers":["A. Các chất trong đường tiêu hóa ảnh hưởng đến tỷ lệ tiêu hóa","B. Không xác định chính xác tỷ lệ tiêu hóa","C. Yêu cầu thời gian kéo dài","D. Yêu cầu trang thiết bị hiện đại"],"correct":0,"explanation":"Đáp án đúng là: Các chất trong đường tiêu hóa ảnh hưởng đến tỷ lệ tiêu hóa Vì: Nhược điểm của phương pháp thử nghiệm mức tiêu hóa một loại thức ăn trong khẩu phần do các chất trong đường tiêu hóa","reference":"Mục 2.2.2"},{"id":124,"text":"Phương pháp cân bằng nito, cân bằng nito âm trong trường hợp nào?","answers":["A. N TĂ = N phân + N nước tiểu + N sản phẩm","B. N TĂ > N phân + N nước tiểu + N sản phẩm","C. Không xác định được","D. N TĂ < N phân + N nước tiểu + N sản phẩm"],"correct":3,"explanation":"Đáp án đúng là: N TĂ < N phân + N nước tiểu + N sản phẩm Vì: Phương pháp cân bằng nito, cân bằng nito âm khi N TĂ < N phân + N nước tiểu + N sản phẩm","reference":"Mục 2.2.4"},{"id":125,"text":"Tính NLTĐ cho gia cầm 1971, hệ số lipit tiêu hóa?","answers":["A. 9,2","B. 9,3","C. 9,4","D. 9,5"],"correct":3,"explanation":"Đáp án đúng là: 9,5 Vì: Tính NLTĐ cho gia cầm 1971, hệ số lipit tiêu hóa bằng 9,5","reference":"Mục 2.3.2"},{"id":126,"text":"Tính NLTĐ cho lợn (Axelson, 1930), hệ số lipit tiêu hóa của thức ăn tinh?","answers":["A. 4,4","B. 8,3","C. 4,6","D. 7,8"],"correct":1,"explanation":"Đáp án đúng là: 8,3 Vì: Hệ số lipit tiêu hóa của thức ăn tinh trong công thức Axelson, 1930 là 8,3","reference":"Mục 2.3.2"},{"id":127,"text":"Tính NLTĐ cho gia cầm 1971, hệ số xơ tiêu hóa?","answers":["A. 4,23","B. 4,32","C. 4,26","D. 4,33"],"correct":0,"explanation":"Đáp án đúng là: 4,23 Vì: Tính NLTĐ cho gia cầm 1971, hệ số xơ tiêu hóa bằng 4,23","reference":"Mục 2.3.2"},{"id":128,"text":"Xác định các giá trị NLTH, NLTĐ, NL thuần dựa của thức ăn","answers":["A. Năng lượng tạo sản phẩm","B. Xác định đơn giản","C. Năng lượng sinh trưởng","D. Đại lượng không đổi"],"correct":3,"explanation":"Đáp án đúng là: Đại lượng không đổi Vì: Giá trị năng lượng của thức ăn được đo bằng năng lượng trao đổi vì năng lượng trao đổi hầu như là đại lượng không đổi","reference":"Mục 2.3.2"},{"id":149,"text":"Tính NLTĐ cho lợn (Axelson, 1930), hệ số Xơ thô tiêu hóa?","answers":["A. 4,1","B. 4,4","C. 3,5","D. 4,6"],"correct":2,"explanation":"Đáp án đúng là: 3,5 Vì: Hệ số xơ tiêu hóa của thức ăn theo công thức Axelson, 1930 là 3,5","reference":"Mục 2.3.2"},{"id":150,"text":"Sinh trưởng là gì?","answers":["A. Khả năng sinh sản","B. Tăng lên về thể chất","C. Tăng lên về khối lượng","D. Tăng lên về thức ăn"],"correct":2,"explanation":"Đáp án đúng là: Tăng lên về khối lượng Vì: Sinh trưởng là quá trình tăng lên về khối lượng của vật nuôi","reference":"Mục 3.2.1"},{"id":151,"text":"Nhu cầu duy trì là nhu cầu dinh dưỡng như thế nào?","answers":["A. Không chịu ảnh hưởng của môi trường","B. Ở mức thấp nhất","C. Ở trạng thái thay đổi","D. Ở mức cao nhất"],"correct":1,"explanation":"Đáp án đúng là: Ở mức thấp nhất Vì: Nhu cầu duy trì là nhu cầu dinh dưỡng ở mức thấp nhất","reference":"Mục 3.1.1"},{"id":152,"text":"Khẩu phần duy trì tác động đến sinh trưởng vật nuôi như thế nào?","answers":["A. Tăng khối lượng","B. Giảm khối lượng","C. Không tăng không giảm","D. Không xác định"],"correct":2,"explanation":"Đáp án đúng là: Không tăng không giảm Vì: Khẩu phần duy trì không làm cho con vât tăng hoặc giảm khối lượng","reference":"Mục 3.1.2"},{"id":153,"text":"Nhu cầu protein của sinh trưởng diễn ra như thế nào?","answers":["A. Không thay đổi","B. Giảm dần theo tuổi","C. Phụ thuộc vào nhiệt độ","D. Tăng dần theo tuổi"],"correct":1,"explanation":"Đáp án đúng là: Giảm dần theo tuổi Vì: Nhu cầu protein cho sinh trưởng giảm dần theo tuổi","reference":"Mục 3.2.2"},{"id":154,"text":"Nhu cầu duy trì đảm bảo quá trình trao đổi chất diễn ra như thế nào?","answers":["A. Cân bằng âm","B. Không xác định","C. Cân bằng dưỡng","D. Cân bằng"],"correct":0,"explanation":"Đáp án đúng là: Cân bằng Vì: Nhu cầu duy trì đảm bảo quá trình trao đổi chất của con vật ở thế cân bằng","reference":"Mục 3.1.1"},{"id":155,"text":"Năng lượng cho vận động của các cơ quan xác định như thế nào?","answers":["A. 15% năng lượng trao đổi cơ bản","B. 20% năng lượng trao đổi cơ bản","C. 10% năng lượng trao đổi cơ bản","D. 25% năng lượng trao đổi cơ bản"],"correct":2,"explanation":"Đáp án đúng là: 10% năng lượng trao đổi cơ bản Vì: Năng lượng cho vận động của các cơ quan thường bằng 10% năng lượng trao đổi cơ bản","reference":"Mục 3.1.2"},{"id":156,"text":"Tỷ lệ khoáng Ca/P thích hợp cho gia súc non?","answers":["A. 1,5 - 2/1","B. 1 - 1,2/1","C. 1/1","D. 0,5/1"],"correct":0,"explanation":"Đáp án đúng là: 1,5 - 2/1 Vì: Đối với gia súc non tỷ lệ Ca/P thích hợp là 1,5 - 2/1","reference":"Mục 3.2.4"},{"id":157,"text":"Xác định nhu cầu duy trì có vai trò gì?","answers":["A. Nâng cao hiệu quả kinh tế","B. Xác định nhu câu cho sản xuất","C. Giảm tiêu thụ thức ăn","D. Tính lượng thức ăn cung cấp"],"correct":1,"explanation":"Đáp án đúng là: Xác định nhu câu cho sản xuất Vì: Việc xác định nhu cầu duy trì rất cần thiết, vì nó là cơ sở để xác định nhu cầu dinh dưỡng cho sản xuất","reference":"Mục 3.1.1"},{"id":158,"text":"Nhu cầu protein cho sinh trưởng đối với gia cầm tính như thế nào?","answers":["A. Nhu cầu duy trì, sinh trưởng, lông","B. Nhu cầu sinh trưởng","C. Nhu cầu sinh trưởng, lông","D. Nhu cầu duy trì"],"correct":0,"explanation":"Đáp án đúng là: Nhu cầu duy trì, sinh trưởng, lông Vì: Nhu cầu protein cho sinh trưởng của gia cầm bao gồm nhu cầu duy trì, nhu cầu cho tăng trọng và cho phát triển lông.","reference":"Mục 3.2.2"},{"id":159,"text":"Nhu cầu năng lượng cho 1kg thịt nạc của lợn là bao nhiêu?","answers":["A. 20MJ DE/kg","B. 15MJ DE/kg","C. 30MJ DE/kg","D. 25MJ DE/kg"],"correct":1,"explanation":"Đáp án đúng là: 15MJ DE/kg Vì: Nhu cầu năng lượng cho tăng trưởng cho thịt nạc của lợn là 15MJ DE/kg","reference":"Mục 3.2.3"},{"id":160,"text":"Đối với các loại vật nuôi khác nhau, NL duy trì/khối lượng trao đổi?","answers":["A. Phụ thuộc vào khối lượng cơ thể","B. Phụ thuộc vào lứa tuổi","C. Khác nhau","D. Tương đương nhau"],"correct":3,"explanation":"Đáp án đúng là: Tương đương nhau Vì: Trên cùng một đơn vị khối lượng trao đổi thì năng lượng dùng cho duy trì là tương đương nhau ở tất cả các loài gia súc, gia cầm.","reference":"Mục 3.1.2"},{"id":161,"text":"Đối với động vật nhai lại, protein mất đi theo phân cho duy trì là bao nhiêu?","answers":["A. 15 g/kg VCK của thức ăn","B. 10 g/kg VCK của thức ăn","C. 20 g/kg VCK của thức ăn","D. 25 g/kg VCK của thức ăn"],"correct":0,"explanation":"Đáp án đúng là: 15 g/kg VCK của thức ăn Vì: Đối với động vật nhai lại lượng protein mất đi theo phân: 15 g/kg vật chất khô của thức ăn","reference":"Mục 3.1.2"},{"id":162,"text":"Phương pháp nuôi dưỡng xác định nhu cầu duy trì bằng cách nào?","answers":["A. Nuôi nhiều khẩu phần khác nhau","B. Tính cân bằng năng lượng","C. Dựa vào năng lượng thô","D. Giết mổ so sánh"],"correct":0,"explanation":"Đáp án đúng là: Nuôi nhiều khẩu phần khác nhau Vì: Nuôi vật nuôi sống trong nhiều khẩu phần khác nhau","reference":"Mục 3.1.2"},{"id":163,"text":"Mối quan hệ giữa năng lượng duy trì và khối lượng trao đổi là gì?","answers":["A. Tỷ lệ thuận","B. Tương đương nhau","C. Không liên quan","D. Tỷ lệ nghịch"],"correct":0,"explanation":"Đáp án đúng là: Tỷ lệ thuận Vì: Năng lượng cho duy trì tỷ lệ thuận với khối lượng trao đổi (W0,75).","reference":"Mục 3.1.2"},{"id":164,"text":"Đối với động vật nhai lại, protein mất đi theo nước tiểu cho duy trì là bao nhiêu?","answers":["A. 0,938 g/ngày/kg W 0,75","B. 0,938 g/ngày/kg W","C. 0,98 g/ngày/kg W 0,75","D. 0,93 g/ngày/kg W 0,75"],"correct":0,"explanation":"Đáp án đúng là: 0,938 g/ngày/kg W 0,75 Vì: Đối với động vật nhai lại lượng protein mất đi theo nước tiểu: 0,938 g/ngày/kg W 0,75.","reference":"Mục 3.1.2"},{"id":165,"text":"Trao đổi cơ bản là nhu cầu dinh dưỡng để con vật làm gì?","answers":["A. duy trì sự sống","B. Sinh sản","C. Sinh trưởng","D. Vận động lao tác"],"correct":0,"explanation":"Đáp án đúng là: duy trì sự sống Vì: Nhu cầu trao đổi cơ bản là nhu cầu dinh dưỡng duy trì sự sống cho vật nuôi","reference":"Mục 3.1.1"},{"id":166,"text":"Khối lượng trao đổi là gì?","answers":["A. W 0,75","B. W 0,7","C. W 0,85","D. W"],"correct":0,"explanation":"Đáp án đúng là: W 0,75 Vì: Khối lượng trao đổi: W 0,75","reference":"Mục 3.1.2"},{"id":167,"text":"Nhu cầu năng lượng cho 1kg thịt mỡ của lợn là bao nhiêu?","answers":["A. 40MJ DE/kg","B. 50MJ DE/kg","C. 55MJ DE/kg","D. 45MJ DE/kg"],"correct":1,"explanation":"Đáp án đúng là: 50MJ DE/kg Vì: Nhu cầu năng lượng cho tăng trưởng cho thịt mỡ của lợn là 50MJ DE/kg","reference":"Mục 3.2.3"},{"id":168,"text":"Phương pháp cân bằng năng lượng xác định khẩu phần duy trì?","answers":["A. Cân bằng âm","B. Căn bằng bằng không","C. Cân bằng dương","D. Không xác định"],"correct":1,"explanation":"Đáp án đúng là: Căn bằng bằng không Vì: Khẩu phần nào có cân bằng năng lượng bằng không, thì đó là khẩu phần duy trì.","reference":"Mục 3.1.2"},{"id":169,"text":"Động vật nhai lại trưởng thành cho nhất thiết cung cấp protein hoàn hảo?","answers":["A. Tùy từng giai đoạn","B. Không tăng không giảm","C. Có","D. Không xác định"],"correct":1,"explanation":"Đáp án đúng là: Không tăng không giảm Vì: Động vật nhai lại khi bộ máy tiêu hoá đã phát triển hoàn thiện, hệ vi sinh vật dạ cỏ đã hoàn chỉnh thì không cần thiết phải cung cấp protit hoàn hảo","reference":"Mục 3.2.2"},{"id":170,"text":"Đối với lợn, protein chiếm bao nhiêu % khối lượng cơ thể?","answers":["A. 0,15","B. 0,2","C. 0,3","D. 0,25"],"correct":0,"explanation":"Đáp án đúng là: 0,15 Vì: Protein chiếm 15% khối lượng cơ thể lợn","reference":"Mục 3.1.2"},{"id":171,"text":"Trang thái duy trì xảy ra trong trường hợp nào?","answers":["A. Trạng thái nghỉ ngơi","B. Khi sinh sản","C. khối lượng cơ thể tăng","D. Trạng thái lao tác"],"correct":0,"explanation":"Đáp án đúng là: Trạng thái nghỉ ngơi Vì: Trạng thái duy trì là một trường hợp đặc biệt trong đời sống của con vật khi cơ thể ở trạng thái nghỉ ngơi.","reference":"Mục 3.1.1"},{"id":172,"text":"Công thức tính nhu cầu duy trì cho lợn dựa vào NLTĐ?","answers":["A. ME dt = 0,5.W 0,75","B. ME dt = 0,458.W","C. ME dt = 0,458.W 0,75","D. ME dt = 0,396.W 0,75"],"correct":2,"explanation":"Đáp án đúng là: ME dt = 0,458.W 0,75 Vì: Công thức tính ME cho nhu cầu năng lượng duy trì: ME dt = 0,458.W 0,75","reference":"Mục 3.1.2"},{"id":173,"text":"Chuyển hóa cơ bản xảy ra khi nào?","answers":["A. Khi con vật trưởng thành","B. Khi con vật con non","C. Khi con vật được ăn no","D. Khi con vật đang đói"],"correct":3,"explanation":"Đáp án đúng là: Khi con vật đang đói Vì: Chuyển hoá cơ bản là quá trình chuyển hoá, trao đổi xảy ra trong cơ thể con vật khi đói.","reference":"Mục 3.1.1"},{"id":174,"text":"Trong thịt nạc của lợn có bao nhiêu % là protein?","answers":["A. 0,22","B. 0,2","C. 0,21","D. 0,23"],"correct":0,"explanation":"Đáp án đúng là: 0,22 Vì: Trong thịt nạc lợn có 22 % protein","reference":"Mục 3.2.3"}];
</script>

<script>
(function () {
  var LETTERS = "ABCDEFGHIJ";
  var container = document.getElementById("questionContainer");
  var noResults = document.getElementById("noResults");
  var searchInput = document.getElementById("searchInput");
  var searchClear = document.getElementById("searchClear");
  var countEl = document.getElementById("searchCount");
  var total = QUESTIONS.length;

  /* ── Escape HTML ── */
  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  /* ── Highlight từ khóa ── */
  function highlight(text, term) {
    if (!term) return esc(text);
    var safe = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return esc(text).replace(
      new RegExp("(" + safe.replace(/&amp;/g, "&amp;amp;") + ")", "gi"),
      "<mark>$1</mark>"
    );
  }

  /* ── Render 1 câu hỏi ── */
  function renderQ(q, term) {
    var answersHtml = q.answers.map(function (ans, i) {
      var isCorrect = i === q.correct;
      var cls = "answer-item" + (isCorrect ? " correct" : "");
      var check = isCorrect ? '<span class="check-mark">&#10003;</span>' : "";
      return (
        '<div class="' + cls + '">' +
        '<span class="answer-letter">' + (LETTERS[i] || i + 1) + ".</span>" +
        '<span class="answer-text">' + highlight(ans, term) + "</span>" +
        check +
        "</div>"
      );
    }).join("");

    var feedbackHtml = "";
    if (q.explanation || q.reference) {
      feedbackHtml =
        '<div class="feedback-section">' +
        (q.explanation
          ? "<p><strong>Vì: </strong>" + esc(q.explanation) + "</p>"
          : "") +
        (q.reference
          ? "<p><strong>Tham khảo: </strong>" + esc(q.reference) + "</p>"
          : "") +
        "</div>";
    }

    return (
      '<div class="question-block" id="q' + q.id + '">' +
      '<div class="question-header">' +
      '<span class="q-badge">Câu ' + q.id + "</span>" +
      "</div>" +
      '<div class="question-text">' + highlight(q.text, term) + "</div>" +
      '<div class="answers">' + answersHtml + "</div>" +
      feedbackHtml +
      "</div>"
    );
  }

  /* ── Render danh sách câu hỏi ── */
  function renderList(filtered, term) {
    // Xóa các block cũ (giữ lại #noResults)
    var old = container.querySelectorAll(".question-block");
    old.forEach(function (el) { el.remove(); });

    if (filtered.length === 0) {
      noResults.style.display = "block";
    } else {
      noResults.style.display = "none";
      var frag = document.createDocumentFragment();
      filtered.forEach(function (q) {
        var div = document.createElement("div");
        div.innerHTML = renderQ(q, term);
        frag.appendChild(div.firstChild);
      });
      container.appendChild(frag);
    }

    countEl.innerHTML =
      "<strong>" + filtered.length + "</strong> / " + total + " câu";
  }

  /* ── Lọc câu hỏi ── */
  function doSearch(term) {
    var t = term.trim().toLowerCase();
    var filtered = t
      ? QUESTIONS.filter(function (q) {
          return (
            q.text.toLowerCase().includes(t) ||
            q.answers.some(function (a) { return a.toLowerCase().includes(t); })
          );
        })
      : QUESTIONS;

    searchClear.style.display = term ? "block" : "none";
    renderList(filtered, term.trim());
  }

  /* ── Khởi tạo ── */
  renderList(QUESTIONS, "");

  searchInput.addEventListener("input", function () {
    doSearch(this.value);
  });
  searchClear.addEventListener("click", function () {
    searchInput.value = "";
    doSearch("");
    searchInput.focus();
  });

  /* ── Scroll to top ── */
  var scrollBtn = document.getElementById("scrollTopBtn");
  window.addEventListener("scroll", function () {
    scrollBtn.style.display = window.scrollY > 320 ? "flex" : "none";
  }, { passive: true });
  scrollBtn.addEventListener("click", function (e) {
    e.preventDefault();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
})();
</script>
</body>
</html>
