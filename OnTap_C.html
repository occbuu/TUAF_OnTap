<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn Tập - Đổi mới sáng tạo & Khởi nghiệp (198 câu)</title>
<style>
:root {
  --blue:      #2563eb;
  --blue-dark: #1e40af;
  --blue-bg:   #eff6ff;
  --green:     #16a34a;
  --green-bg:  #f0fdf4;
  --green-bd:  #86efac;
  --yellow-bg: #fefce8;
  --yellow-bd: #fde047;
  --gray:      #6b7280;
  --gray-lt:   #f3f4f6;
  --border:    #e5e7eb;
  --text:      #111827;
  --radius:    12px;
  --shadow:    0 1px 4px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f1f5f9; color: var(--text);
  line-height: 1.65; font-size: 15px;
}

/* ── HEADER ── */
.page-header {
  background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%);
  color: #fff; padding: 28px 20px 22px; text-align: center;
  position: relative;
}
.page-header h1 { font-size: clamp(1.1em, 4vw, 1.7em); font-weight: 700; margin-bottom: 5px; }
.page-header p  { opacity: .85; font-size: .88em; }

/* ── SEARCH BAR ── */
.search-wrap {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
.search-inner {
  max-width: 860px; margin: 0 auto;
  display: flex; align-items: center; gap: 10px;
}
.search-box { flex: 1; position: relative; }
.search-box input {
  width: 100%; padding: 9px 36px 9px 38px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: .95em; outline: none; background: var(--gray-lt);
  transition: border-color .15s, background .15s;
  -webkit-appearance: none;
}
.search-box input:focus { border-color: var(--blue); background: #fff; }
.search-icon {
  position: absolute; left: 11px; top: 50%;
  transform: translateY(-50%); color: var(--gray);
  pointer-events: none; font-size: 1em;
}
.search-clear {
  position: absolute; right: 9px; top: 50%;
  transform: translateY(-50%); background: none; border: none;
  cursor: pointer; color: var(--gray); font-size: 1.1em;
  padding: 2px 4px; display: none; line-height: 1; border-radius: 50%;
}
.search-clear:hover { color: #111; background: var(--gray-lt); }
.search-count {
  white-space: nowrap; font-size: .88em; color: var(--gray);
  min-width: 90px; text-align: right;
}
.search-count strong { color: var(--blue-dark); }

/* ── CONTAINER ── */
.container {
  max-width: 860px; margin: 18px auto;
  padding: 0 14px 80px;
}

/* ── QUESTION CARD ── */
.question-block {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 16px;
  border-left: 4px solid var(--blue);
  overflow: hidden;
  transition: box-shadow .15s;
}
.question-block:hover {
  box-shadow: 0 2px 8px rgba(0,0,0,.12), 0 6px 20px rgba(0,0,0,.08);
}

.question-header {
  display: flex; align-items: center; gap: 8px;
  background: var(--blue-bg); padding: 8px 14px;
  border-bottom: 1px solid #dbeafe;
}
.q-badge {
  background: var(--blue); color: #fff;
  border-radius: 20px; padding: 1px 9px;
  font-size: .78em; font-weight: 700; letter-spacing: .3px;
}

.question-text {
  padding: 14px 16px 8px;
  font-size: 1em; font-weight: 500; color: #1e293b;
}
.question-text mark {
  background: #fef08a; color: inherit;
  border-radius: 3px; padding: 0 2px;
}

/* ── ANSWERS ── */
.answers {
  padding: 4px 16px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.answer-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 12px; border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--gray-lt);
}
.answer-item.correct {
  background: var(--green-bg);
  border-color: var(--green-bd);
  font-weight: 600;
}
.answer-letter {
  font-weight: 700; font-size: .9em;
  width: 22px; flex-shrink: 0; padding-top: 1px; color: var(--gray);
}
.answer-item.correct .answer-letter { color: var(--green); }
.answer-text {
  flex: 1; color: #374151; font-size: .95em;
}
.answer-item.correct .answer-text { color: #14532d; }
.answer-text mark {
  background: #bbf7d0; color: inherit;
  border-radius: 3px; padding: 0 2px;
}
.check-mark {
  flex-shrink: 0; margin-left: auto; padding-left: 6px;
  color: var(--green); font-weight: 700;
}

/* ── FEEDBACK ── */
.feedback-section {
  background: var(--yellow-bg);
  border-top: 1.5px solid var(--yellow-bd);
  padding: 10px 16px; font-size: .875em; color: #44403c;
}
.feedback-section p { margin: 3px 0; }
.feedback-section strong { color: #1c1917; }

/* ── EMPTY STATE ── */
#noResults {
  display: none; text-align: center;
  padding: 60px 20px; color: var(--gray);
}
#noResults .nr-icon { font-size: 2.5em; margin-bottom: 12px; }
#noResults p { font-size: .95em; }

/* ── SCROLL TOP ── */
#scrollTopBtn {
  position: fixed; bottom: 20px; right: 16px;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--blue); color: #fff; border: none;
  font-size: 1.3em; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 3px 10px rgba(37,99,235,.4);
  transition: background .15s, transform .15s;
  z-index: 200; text-decoration: none;
  line-height: 44px; text-align: center;
}
#scrollTopBtn:hover { background: var(--blue-dark); transform: translateY(-2px); }

/* ── MOBILE ── */
@media (max-width: 600px) {
  body { font-size: 14px; }
  .page-header { padding: 18px 14px 14px; }
  .container { margin: 12px auto; padding: 0 10px 80px; }
  .question-text { padding: 12px 12px 6px; }
  .answers { padding: 4px 12px 10px; gap: 5px; }
  .answer-item { padding: 7px 10px; }
  .feedback-section { padding: 9px 12px; }
  .search-count { display: none; }
}

.page-header { text-align: center; position: relative; }
.back-btn {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,.18); border: 1.5px solid rgba(255,255,255,.35);
  color: #fff; padding: 6px 13px; border-radius: 7px;
  text-decoration: none; font-size: .82em; font-weight: 600;
  white-space: nowrap; transition: background .15s; line-height: 1.4;
}
.back-btn:hover { background: rgba(255,255,255,.3); }
@media (max-width: 480px) {
  .back-btn { position: static; transform: none; display: inline-block;
              margin-bottom: 10px; font-size: .8em; }
  .page-header { padding-top: 16px; }
}
</style>
</head>

<div class="page-header">
  <a href="index.html" class="back-btn">&#8592; Trang chủ</a>
  <h1>Ôn Tập Đổi mới sáng tạo & Khởi nghiệp</h1>
  <p>Câu hỏi trắc nghiệm có đáp án &mdash; Nguồn: LT_C01 – LT_C09</p>
</div>

<div class="search-wrap">
  <div class="search-inner">
    <div class="search-box">
      <span class="search-icon">&#128269;</span>
      <input type="search" id="searchInput"
             placeholder="Tìm câu hỏi hoặc đáp án..." autocomplete="off">
      <button class="search-clear" id="searchClear" title="Xóa">&#10005;</button>
    </div>
    <div class="search-count" id="searchCount">
      <strong>198</strong> / 198 câu
    </div>
  </div>
</div>

<div class="container" id="questionContainer">
  <div id="noResults">
    <div class="nr-icon">&#128269;</div>
    <p>Không tìm thấy câu hỏi phù hợp.</p>
  </div>
</div>

<script>
const QUESTIONS = [{"id":1,"text":"Yếu tố nào không phải là đặc điểm của nhóm sáng tạo?","answers":["A. Sự linh hoạt","B. Suy nghĩ bất đồng","C. Đa dạng về kỹ năng","D. Làm việc độc lập không có sự hợp tác"],"correct":3,"explanation":"Đáp án đúng là: Làm việc độc lập không có sự hợp tác Vì: Nhóm sáng tạo thường cần hợp tác để tối ưu hóa ý tưởng và phát triển giải pháp.","reference":"Mục 1.2"},{"id":2,"text":"Doanh nghiệp nào áp dụng thành công ĐMST trong quản lý hàng tồn kho?","answers":["A. McDonald's","B. Apple","C. Walmart","D. Tesla"],"correct":2,"explanation":"Đáp án đúng là: Walmart Vì: Walmart đã tiên phong trong quản lý hàng tồn kho bằng công nghệ RFID, giúp giảm chi phí và tăng hiệu quả.","reference":"Mục 1.2"},{"id":3,"text":"Sản phẩm là gì theo định nghĩa của Kotler và Keller (2016)?","answers":["A. Bất cứ thứ gì có thể đáp ứng nhu cầu hoặc mong muốn của khách hàng","B. Chỉ là một thứ hữu hình","C. Chỉ bao gồm hàng hóa vật lý","D. Chỉ tồn tại trong lĩnh vực thương mại"],"correct":0,"explanation":"Đáp án đúng là: Bất cứ thứ gì có thể đáp ứng nhu cầu hoặc mong muốn của khách hàng Vì: Theo Kotler & Keller, sản phẩm có thể là hàng hóa, dịch vụ, trải nghiệm, ý tưởng hoặc bất cứ thứ gì đáp ứng nhu cầu khách hàng.","reference":"Mục 3.1"},{"id":4,"text":"Yếu tố nào không ảnh hưởng đến sáng tạo cá nhân?","answers":["A. Sự lặp lại nhiều lần một công việc","B. Động lực cá nhân","C. Kỹ năng tư duy sáng tạo","D. Sự thông thạo"],"correct":0,"explanation":"Đáp án đúng là: Sự lặp lại nhiều lần một công việc Vì: Lặp lại một công việc không giúp thúc đẩy sáng tạo.","reference":"Mục 1.2"},{"id":5,"text":"Một trong những khó khăn của phát triển sản phẩm mới là gì?","answers":["A. Chi phí cao và rủi ro thất bại","B. Không cần khảo sát khách hàng","C. Không cần đầu tư vào nghiên cứu","D. Không có đối thủ cạnh tranh"],"correct":0,"explanation":"Đáp án đúng là: Chi phí cao và rủi ro thất bại Vì: Phát triển sản phẩm mới tốn kém chi phí và có rủi ro thất bại nếu sản phẩm không đáp ứng được nhu cầu thị trường.","reference":"Mục 3.2"},{"id":6,"text":"Một cách để tìm kiếm ý tưởng kinh doanh là gì?","answers":["A. Phân tích xu hướng thị trường","B. Không cần nghiên cứu thị trường","C. Chờ đợi cơ hội đến","D. Sao chép mô hình kinh doanh có sẵn"],"correct":0,"explanation":"Đáp án đúng là: Phân tích xu hướng thị trường Vì: Phân tích xu hướng thị trường giúp xác định cơ hội kinh doanh tiềm năng, trong khi chờ đợi cơ hội hay sao chép ý tưởng không đảm bảo thành công.","reference":"Mục 2.1"},{"id":7,"text":"Nhà đầu tư thiên thần thường đầu tư vào giai đoạn nào của startup?","answers":["A. Giai đoạn đầu (Pre-seed, Seed)","B. Giai đoạn tăng trưởng mạnh","C. Khi công ty đã niêm yết trên sàn chứng khoán","D. Khi startup đã có thị phần lớn"],"correct":0,"explanation":"Đáp án đúng là: Giai đoạn đầu (Pre-seed, Seed) Vì: Nhà đầu tư thiên thần thường rót vốn ở giai đoạn đầu khi startup mới hình thành, giúp doanh nghiệp có nguồn lực để phát triển sản phẩm và tìm kiếm thị trường.","reference":"Mục 1.3"},{"id":8,"text":"Đâu là một trong những yếu tố quan trọng của hệ sinh thái khởi nghiệp?","answers":["A. Không có sự hỗ trợ từ chính phủ","B. Không có sự kết nối với doanh nghiệp khác","C. Thiếu vốn đầu tư","D. Nhà đầu tư thiên thần, quỹ đầu tư mạo hiểm"],"correct":3,"explanation":"Đáp án đúng là: Nhà đầu tư thiên thần, quỹ đầu tư mạo hiểm Vì: Nhà đầu tư thiên thần và quỹ đầu tư mạo hiểm đóng vai trò quan trọng trong việc cấp vốn, hỗ trợ tài chính, cố vấn chiến lược cho các startup non trẻ.","reference":"Mục 1.4"},{"id":9,"text":"Tại sao khởi nghiệp sáng tạo có mức độ rủi ro cao?","answers":["A. Vì không được thị trường quan tâm","B. Vì chưa có tiền lệ, dễ gặp khó khăn về vốn và cạnh tranh","C. Vì không có bất kỳ kế hoạch kinh doanh nào","D. Vì không có sản phẩm cụ thể"],"correct":1,"explanation":"Đáp án đúng là: Vì chưa có tiền lệ, dễ gặp khó khăn về vốn và cạnh tranh Vì: Do chưa có mô hình rõ ràng, startup sáng tạo phải đối mặt với rủi ro tài chính, thách thức thị trường và cạnh tranh khốc liệt.","reference":"Mục 1.3"},{"id":10,"text":"Phương pháp nào không thuộc phân tích thị trường?","answers":["A. Phân tích dữ liệu doanh số","B. Quan sát hành vi mua sắm","C. Phỏng vấn khách hàng","D. Đánh giá cảm tính dựa trên kinh nghiệm cá nhân"],"correct":3,"explanation":"Đáp án đúng là: Đánh giá cảm tính dựa trên kinh nghiệm cá nhân Vì: Phân tích thị trường phải dựa trên dữ liệu thực tế, không thể dựa vào cảm tính.","reference":"Mục 3.3"},{"id":11,"text":"Một ví dụ về chiến lược phát triển sản phẩm mới là gì?","answers":["A. Không thay đổi bất kỳ sản phẩm nào trong 10 năm","B. Ngừng sản xuất một dòng sản phẩm mà không có sự thay thế","C. Apple ra mắt iPhone mới với công nghệ tiên tiến","D. Giảm giá mạnh sản phẩm cũ"],"correct":2,"explanation":"Đáp án đúng là: Apple ra mắt iPhone mới với công nghệ tiên tiến Vì: Phát triển sản phẩm mới là quá trình cải tiến hoặc tạo ra sản phẩm mới để duy trì vị thế cạnh tranh. Apple liên tục ra mắt iPhone mới với công nghệ tiên tiến để đáp ứng nhu cầu thị trường.","reference":"Mục 3.2"},{"id":12,"text":"ĐMST có vai trò gì đối với doanh nghiệp?","answers":["A. Tạo ra sản phẩm mới, tối ưu quy trình, mở rộng quy mô","B. Chỉ giúp nâng cao thương hiệu","C. Không có tác động rõ ràng","D. Chỉ giúp cắt giảm chi phí"],"correct":0,"explanation":"Đáp án đúng là: Tạo ra sản phẩm mới, tối ưu quy trình, mở rộng quy mô Vì: ĐMST giúp doanh nghiệp tối ưu hóa hoạt động và nâng cao khả năng cạnh tranh.","reference":"Mục 1.1"},{"id":13,"text":"Tại sao các công ty lớn vẫn liên tục phát triển sản phẩm mới?","answers":["A. Vì họ muốn giảm chi phí sản xuất","B. Vì họ không có sản phẩm cũ","C. Vì họ không cần khách hàng trung thành","D. Để duy trì sự cạnh tranh và đáp ứng nhu cầu thay đổi của thị trường"],"correct":3,"explanation":"Đáp án đúng là: Để duy trì sự cạnh tranh và đáp ứng nhu cầu thay đổi của thị trường Vì: Công ty lớn phải liên tục đổi mới để không bị tụt hậu so với đối thủ và thích ứng với xu hướng tiêu dùng thay đổi.","reference":"Mục 3.2"},{"id":14,"text":"Đâu không phải là thành phần chính của hệ sinh thái khởi nghiệp?","answers":["A. Doanh nghiệp khởi nghiệp","B. Chính phủ","C. Các tập đoàn đa quốc gia","D. Nhà đầu tư và quỹ đầu tư"],"correct":2,"explanation":"Đáp án đúng là: Các tập đoàn đa quốc gia Vì: Các tập đoàn đa quốc gia không phải là thành phần cốt lõi của hệ sinh thái khởi nghiệp. Dù họ có thể đóng vai trò đối tác, nhưng hệ sinh thái khởi nghiệp chủ yếu bao gồm startup, chính phủ, nhà đầu tư và các tổ chức hỗ trợ.","reference":"Mục 1.4"},{"id":15,"text":"Yếu tố nào giúp nhận diện cơ hội kinh doanh từ thị trường?","answers":["A. Chỉ dựa vào kinh nghiệm cá nhân","B. Nhu cầu chưa được đáp ứng","C. Sao chép ý tưởng từ nước ngoài","D. Không cần quan tâm đến khách hàng"],"correct":1,"explanation":"Đáp án đúng là: Nhu cầu chưa được đáp ứng Vì: Khi thị trường có nhu cầu chưa được đáp ứng, doanh nghiệp có thể khai thác để tạo ra sản phẩm/dịch vụ phù hợp.","reference":"Mục 2.2"},{"id":16,"text":"Một bản kế hoạch kinh doanh cần có phần nào?","answers":["A. Chỉ có kế hoạch marketing","B. Không đề cập đến mục tiêu kinh doanh","C. Tóm tắt, sản phẩm/dịch vụ, thị trường, chiến lược, tài chính","D. Không cần kế hoạch tài chính"],"correct":2,"explanation":"Đáp án đúng là: Tóm tắt, sản phẩm/dịch vụ, thị trường, chiến lược, tài chính Vì: Một kế hoạch kinh doanh đầy đủ phải có thông tin tổng quan, chiến lược và tài chính chi tiết.","reference":"Mục 2.3"},{"id":17,"text":"Một cách khác để tạo ý tưởng kinh doanh là gì?","answers":["A. Không cần đánh giá tính khả thi","B. Sao chép mô hình nước ngoài mà không điều chỉnh","C. Dựa vào sở thích và thế mạnh cá nhân","D. Chỉ quan tâm đến lợi nhuận"],"correct":2,"explanation":"Đáp án đúng là: Dựa vào sở thích và thế mạnh cá nhân Vì: Khi dựa vào sở thích và thế mạnh cá nhân, doanh nhân sẽ có động lực cao hơn và dễ phát triển ý tưởng thành công.","reference":"Mục 2.1"},{"id":18,"text":"Đặc điểm chính của giai đoạn giới thiệu sản phẩm là gì?","answers":["A. Đối thủ cạnh tranh giảm dần","B. Doanh thu và lợi nhuận cao","C. Sản phẩm đã đạt độ phổ biến cao trên thị trường","D. Chi phí sản xuất và marketing cao, doanh thu tăng chậm"],"correct":3,"explanation":"Đáp án đúng là: Chi phí sản xuất và marketing cao, doanh thu tăng chậm Vì: Doanh nghiệp phải chi mạnh cho quảng cáo, phân phối, nghiên cứu thị trường trong khi doanh thu chưa cao.","reference":"Mục 3.1"},{"id":19,"text":"Một trong những lỗi phổ biến khi lập kế hoạch kinh doanh là gì?","answers":["A. Không trình bày chiến lược marketing","B. Không đề cập đến đối thủ cạnh tranh","C. Có quá nhiều dữ liệu thị trường","D. Đánh giá thấp rủi ro"],"correct":3,"explanation":"Đáp án đúng là: Đánh giá thấp rủi ro Vì: Đánh giá thấp rủi ro có thể dẫn đến kế hoạch kinh doanh không thực tế và khó triển khai.","reference":"Mục 2.3"},{"id":20,"text":"Mô hình nào giúp startup mở rộng quy mô nhanh chóng?","answers":["A. Mô hình doanh nghiệp gia đình","B. Mô hình kinh doanh có thể nhân rộng (scalability)","C. Mô hình nhượng quyền","D. Mô hình bán hàng truyền thống"],"correct":1,"explanation":"Đáp án đúng là: Mô hình kinh doanh có thể nhân rộng (scalability) Vì: Startup cần mô hình có khả năng nhân rộng để tăng trưởng nhanh chóng, tận dụng công nghệ và quy trình tối ưu nhằm mở rộng thị phần.","reference":"Mục 1.3"},{"id":21,"text":"Thương mại hóa sản phẩm mới là gì?","answers":["A. Ngừng sản xuất sản phẩm cũ","B. Tăng chi phí sản xuất","C. Cải tiến sản phẩm sau khi đã ra mắt","D. Đưa sản phẩm mới ra thị trường"],"correct":3,"explanation":"Đáp án đúng là: Đưa sản phẩm mới ra thị trường Vì: Thương mại hóa là bước cuối cùng trong quy trình phát triển sản phẩm, bao gồm sản xuất hàng loạt, tiếp thị và phân phối.","reference":"Mục 3.2"},{"id":22,"text":"Hoạt động nào sau đây là cần thiết để kiểm tra tính khả thi\ncủa cơ hội kinh doanh?","answers":["A. Đợi đối thủ triển khai trước","B. Thử nghiệm ý tưởng trên quy mô nhỏ","C. Phụ thuộc hoàn toàn vào may mắn","D. Chỉ tham khảo ý kiến người thân"],"correct":1,"explanation":"Đáp án đúng là: Thử nghiệm ý tưởng trên quy mô nhỏ Vì: “Thử nghiệm ý tưởng trên quy mô nhỏ”\nlà cách phổ biến và hiệu quả để kiểm chứng thực tế trước khi mở rộng. Giúp đánh giá: Khách hàng có sẵn sàng\ntrả tiền không? Sản phẩm/dịch vụ có giải quyết đúng nhu cầu không? Có những rủi\nro, hạn chế gì khi triển khai?","reference":"Mục 2.2"},{"id":23,"text":"Một ý tưởng kinh doanh tốt cần có yếu tố nào?","answers":["A. Tạo ra lợi thế cạnh tranh","B. Càng độc đáo càng tốt, dù không có nhu cầu thị trường","C. Không cần quan tâm đến khách hàng","D. Chỉ cần có vốn đầu tư"],"correct":0,"explanation":"Đáp án đúng là: Tạo ra lợi thế cạnh tranh Vì: Lợi thế cạnh tranh giúp doanh nghiệp nổi bật trên thị trường và thu hút khách hàng, điều này quan trọng hơn sự độc đáo đơn thuần.","reference":"Mục 2.1"},{"id":24,"text":"Nội dung nào thường có trong một bản kế hoạch kinh doanh?","answers":["A. Không cần kế hoạch tài chính","B. Chiến lược kinh doanh, tài chính, tiếp thị, rủi ro","C. Không cần nghiên cứu thị trường","D. Chỉ cần liệt kê danh sách sản phẩm"],"correct":1,"explanation":"Đáp án đúng là: Chiến lược kinh doanh, tài chính, tiếp thị, rủi ro Vì: Một kế hoạch kinh doanh toàn diện phải có chiến lược, tài chính, marketing và quản lý rủi ro.","reference":"Mục 2.3"},{"id":25,"text":"Yếu tố nào không phải tiêu chí đánh giá ý tưởng kinh doanh?","answers":["A. Số lượng nhân viên trong doanh nghiệp","B. Tiềm năng phát triển","C. Nhu cầu thị trường","D. Lợi thế cạnh tranh"],"correct":0,"explanation":"Đáp án đúng là: Số lượng nhân viên trong doanh nghiệp Vì: Số lượng nhân viên không liên quan trực tiếp đến chất lượng ý tưởng kinh doanh, trong khi các yếu tố khác giúp xác định khả năng thành công của ý tưởng.","reference":"Mục 2.1"},{"id":26,"text":"Giai đoạn nào được coi là \"Kích hoạt\" trong hệ sinh thái khởi nghiệp đổi mới sáng tạo ở Việt Nam?","answers":["A. 2017 - 2020","B. 2010 - 2013","C. 2021 - 2023","D. 2013 - 2016"],"correct":3,"explanation":"Đáp án đúng là: 2013 - 2016 Vì: Giai đoạn 2013 - 2016 đánh dấu sự khởi động mạnh mẽ của hệ sinh thái khởi nghiệp Việt Nam với sự ra đời của các quỹ đầu tư, vườn ươm, chương trình hỗ trợ từ Chính phủ và khu vực tư nhân.","reference":"Mục 1.4"},{"id":27,"text":"Đâu không phải là yếu tố trong phân khúc nhân khẩu học?","answers":["A. Độ tuổi","B. Thu nhập","C. Hành vi tiêu dùng","D. Giới tính"],"correct":2,"explanation":"Đáp án đúng là: Hành vi tiêu dùng Vì: Phân khúc nhân khẩu học dựa trên các yếu tố như độ tuổi, giới tính, thu nhập, nhưng không bao gồm hành vi tiêu dùng (thuộc phân khúc hành vi).","reference":"Mục 3.3"},{"id":28,"text":"Khi nào một cơ hội kinh doanh trở nên hấp dẫn?","answers":["A. Khi có thể mở rộng và phát triển","B. Khi không có lợi nhuận","C. Khi chưa ai làm trước đó","D. Khi không cần đầu tư nhiều"],"correct":0,"explanation":"Đáp án đúng là: Khi có thể mở rộng và phát triển Vì: Một cơ hội kinh doanh hấp dẫn khi có khả năng phát triển bền vững và mở rộng quy mô.","reference":"Mục 2.2"},{"id":29,"text":"Ý tưởng kinh doanh là gì?","answers":["A. Một chiến lược marketing","B. Một dự án hoặc concept tạo ra sản phẩm/dịch vụ có giá trị và tiềm năng sinh lời","C. Một ý tưởng bất kỳ mà không cần đánh giá thị trường","D. Một kế hoạch kinh doanh chi tiết"],"correct":1,"explanation":"Đáp án đúng là: Một dự án hoặc concept tạo ra sản phẩm/dịch vụ có giá trị và tiềm năng sinh lời Vì: Ý tưởng kinh doanh là nền tảng ban đầu của một doanh nghiệp, tập trung vào việc phát triển sản phẩm/dịch vụ đáp ứng nhu cầu thị trường và có khả năng sinh lời.","reference":"Mục 2.1"},{"id":30,"text":"Rào cản lớn nhất đối với tư duy sáng tạo là gì?","answers":["A. Khả năng làm việc nhóm","B. Sự linh hoạt trong suy nghĩ","C. Khả năng sáng tạo bẩm sinh","D. Sợ thất bại"],"correct":3,"explanation":"Đáp án đúng là: Sợ thất bại Vì: Sợ thất bại khiến con người ngại thử nghiệm những ý tưởng mới, kìm hãm sự sáng tạo.","reference":"Mục 1.2"},{"id":31,"text":"Yếu tố nào ảnh hưởng đến tính khả thi của cơ hội kinh doanh?","answers":["A. Cảm hứng sáng tạo","B. Nhu cầu thị trường và khả năng cung ứng","C. Độ tuổi của doanh nhân","D. Sự ổn định tài chính cá nhân"],"correct":1,"explanation":"Đáp án đúng là: Nhu cầu thị trường và khả năng cung ứng Vì: Vì nếu không có nhu cầu hoặc không đủ nguồn lực cung ứng, cơ hội sẽ không khả thi.","reference":"Mục 2.2"},{"id":32,"text":"Theo Báo cáo GII năm 2023, Việt Nam xếp hạng bao nhiêu về chỉ số đổi mới sáng tạo toàn cầu?","answers":["A. 50","B. 46","C. 30","D. 60"],"correct":1,"explanation":"Đáp án đúng là: 46 Vì: Theo Global Innovation Index (GII) 2023, Việt Nam xếp hạng 46, cho thấy sự cải thiện đáng kể về đổi mới sáng tạo so với các năm trước.","reference":"Mục 1.4"},{"id":33,"text":"Ví dụ nào sau đây là khởi nghiệp sáng tạo?","answers":["A. Phát triển một nền tảng AI giúp học tập thông minh","B. Bán hàng qua mạng xã hội","C. Kinh doanh theo mô hình nhượng quyền","D. Mở một quán cà phê theo mô hình truyền thống"],"correct":0,"explanation":"Đáp án đúng là: Phát triển một nền tảng AI giúp học tập thông minh Vì: Khởi nghiệp sáng tạo liên quan đến việc áp dụng công nghệ hoặc mô hình kinh doanh mới để giải quyết vấn đề theo cách khác biệt.","reference":"Mục 1.3"},{"id":34,"text":"Đâu không phải là ưu điểm của thị trường sao chép?","answers":["A. Tận dụng kinh nghiệm từ thị trường trước","B. Không có rủi ro trong kinh doanh","C. Chi phí nhận diện sản phẩm thấp hơn","D. Có thể gặp rào cản văn hóa và ngôn ngữ"],"correct":1,"explanation":"Đáp án đúng là: Không có rủi ro trong kinh doanh Vì: Dù thị trường sao chép có lợi thế học hỏi từ thị trường trước, nhưng vẫn tồn tại rủi ro cạnh tranh, văn hóa và pháp lý.","reference":"Mục 3.4"},{"id":35,"text":"Các phương pháp định giá sản phẩm phổ biến gồm những gì?","answers":["A. Định giá dựa vào chi phí, định giá theo giá trị cảm nhận, định giá cạnh tranh","B. Định giá ngẫu nhiên","C. Định giá theo số lượng nhân viên công ty","D. Định giá theo sở thích cá nhân"],"correct":0,"explanation":"Đáp án đúng là: Định giá dựa vào chi phí, định giá theo giá trị cảm nhận, định giá cạnh tranh Vì: Đây là ba phương pháp định giá phổ biến: Dựa vào chi phí: Cộng thêm tỷ lệ lợi nhuận mong muốn. Theo giá trị cảm nhận: Định giá dựa vào sự đánh giá của khách hàng. Theo cạnh tranh: Xác định giá dựa trên mức giá của đối thủ.","reference":"Mục 3.4"},{"id":36,"text":"Thị trường có sẵn là gì?","answers":["A. Thị trường chưa có sản phẩm nào trước đó","B. Thị trường dành riêng cho sản phẩm cao cấp","C. Thị trường mà sản phẩm tương tự đã tồn tại","D. Thị trường không có đối thủ cạnh tranh"],"correct":2,"explanation":"Đáp án đúng là: Thị trường mà sản phẩm tương tự đã tồn tại Vì: Thị trường có sẵn là nơi đã có các sản phẩm tương tự, doanh nghiệp phải tìm cách cạnh tranh để chiếm thị phần.","reference":"Mục 3.4"},{"id":37,"text":"Sản phẩm mới theo Crawford (2014) là gì?","answers":["A. Một sản phẩm có mẫu mã đẹp hơn sản phẩm cũ","B. Một sản phẩm có thiết kế hoàn toàn khác biệt","C. Một sản phẩm mà công ty cần một phương thức marketing mới","D. Một sản phẩm chỉ dành cho một phân khúc khách hàng cụ thể"],"correct":2,"explanation":"Đáp án đúng là: Một sản phẩm mà công ty cần một phương thức marketing mới Vì: Theo Crawford, sản phẩm mới không chỉ là thiết kế mới mà còn có thể là một sản phẩm cần chiến lược tiếp thị khác.","reference":"Mục 3.1"},{"id":38,"text":"\"Lean Startup\" là gì?","answers":["A. Chỉ phù hợp với doanh nghiệp lớn","B. Phương pháp thử nghiệm nhỏ trước khi đầu tư lớn","C. Không liên quan đến khởi nghiệp","D. Một mô hình kinh doanh truyền thống"],"correct":1,"explanation":"Đáp án đúng là: Phương pháp thử nghiệm nhỏ trước khi đầu tư lớn Vì: \"Lean Startup\" là phương pháp khởi nghiệp tinh gọn, giúp doanh nghiệp thử nghiệm ý tưởng với chi phí thấp, thu thập phản hồi trước khi đầu tư lớn.","reference":"Mục 2.1"},{"id":39,"text":"Bước đầu tiên trong quy trình phát triển sản phẩm mới là gì?","answers":["A. Hình thành ý tưởng","B. Thử nghiệm sản phẩm","C. Thương mại hóa","D. Phát triển sản phẩm mẫu"],"correct":0,"explanation":"Đáp án đúng là: Hình thành ý tưởng Vì: Hình thành ý tưởng là giai đoạn đầu tiên, trong đó doanh nghiệp thu thập và tạo ra nhiều ý tưởng sản phẩm mới.","reference":"Mục 3.2"},{"id":40,"text":"Phân tích kinh doanh trong phát triển sản phẩm mới giúp gì cho doanh nghiệp?","answers":["A. Đánh giá mức độ sáng tạo của sản phẩm","B. Xác định khách hàng mục tiêu","C. Chỉ tập trung vào chiến lược marketing","D. Dự báo doanh thu, chi phí và lợi nhuận của sản phẩm mới"],"correct":3,"explanation":"Đáp án đúng là: Dự báo doanh thu, chi phí và lợi nhuận của sản phẩm mới Vì: Phân tích kinh doanh giúp doanh nghiệp xác định khả năng tài chính của sản phẩm trước khi đầu tư phát triển.","reference":"Mục 3.2"},{"id":41,"text":"Vai trò của ĐMST đối với xã hội là gì?","answers":["A. Chỉ tác động đến lĩnh vực công nghệ","B. Không ảnh hưởng đến nền kinh tế","C. Thúc đẩy tăng trưởng kinh tế, nâng cao chất lượng cuộc sống","D. Chỉ giúp doanh nghiệp tăng lợi nhuận"],"correct":2,"explanation":"Đáp án đúng là: Thúc đẩy tăng trưởng kinh tế, nâng cao chất lượng cuộc sống Vì: ĐMST thúc đẩy phát triển kinh tế và nâng cao chất lượng cuộc sống nhờ cải tiến liên tục.","reference":"Mục 1.1"},{"id":42,"text":"Tại sao việc cải tiến sản phẩm/dịch vụ hiện có dễ dàng hơn phát minh mới?","answers":["A. Vì đã có nền tảng khách hàng và thị trường","B. Vì không cần thử nghiệm","C. Vì không cần đầu tư nhiều vốn","D. Vì không cần đổi mới công nghệ"],"correct":0,"explanation":"Đáp án đúng là: Vì đã có nền tảng khách hàng và thị trường Vì: Khi cải tiến sản phẩm/dịch vụ hiện có, doanh nghiệp đã có khách hàng mục tiêu, dữ liệu thị trường và kênh phân phối sẵn có, giúp giảm rủi ro so với phát minh hoàn toàn mới.","reference":"Mục 2.1"},{"id":43,"text":"Một cách để doanh nghiệp giảm rủi ro khi phát triển sản phẩm mới là gì?","answers":["A. Bỏ qua nghiên cứu khách hàng","B. Tiến hành thử nghiệm thị trường trước khi ra mắt","C. Tăng chi phí sản xuất ngay từ đầu","D. Định giá sản phẩm cao hơn đối thủ"],"correct":1,"explanation":"Đáp án đúng là: Tiến hành thử nghiệm thị trường trước khi ra mắt Vì: Thử nghiệm thị trường giúp doanh nghiệp đánh giá phản ứng của khách hàng và điều chỉnh sản phẩm trước khi tung ra chính thức, giảm thiểu rủi ro thất bại.","reference":"Mục 3.2"},{"id":44,"text":"Một trong những đặc điểm quan trọng của startup thành công là gì?","answers":["A. Không có chiến lược mở rộng","B. Có khả năng tăng trưởng nhanh và mở rộng quy mô","C. Không cần kế hoạch dài hạn","D. Không cần quan tâm đến khách hàng"],"correct":1,"explanation":"Đáp án đúng là: Có khả năng tăng trưởng nhanh và mở rộng quy mô Vì: Startup thành công cần có mô hình kinh doanh có thể mở rộng để thu hút đầu tư và phát triển bền vững.","reference":"Mục 1.3"},{"id":45,"text":"SCAMPER là phương pháp gì?","answers":["A. Kỹ thuật phân tích tài chính","B. Mô hình quản lý doanh nghiệp","C. Phương pháp sáng tạo ý tưởng bằng cách thay đổi, kết hợp, biến đổi sản phẩm/dịch vụ","D. Cách xây dựng kế hoạch kinh doanh"],"correct":2,"explanation":"Đáp án đúng là: Phương pháp sáng tạo ý tưởng bằng cách thay đổi, kết hợp, biến đổi sản phẩm/dịch vụ Vì: SCAMPER là công cụ giúp phát triển ý tưởng kinh doanh bằng cách đặt câu hỏi về cách thay đổi hoặc cải tiến sản phẩm/dịch vụ hiện có.","reference":"Mục 2.1"},{"id":46,"text":"Giai đoạn đầu tiên trong hành vi mua hàng là gì?","answers":["A. Tìm kiếm thông tin","B. Quyết định mua","C. Đánh giá phương án","D. Nhận biết nhu cầu"],"correct":3,"explanation":"Đáp án đúng là: Nhận biết nhu cầu Vì: Khi khách hàng nhận thấy có nhu cầu, họ mới bắt đầu tìm kiếm giải pháp.","reference":"Mục 3.3"},{"id":47,"text":"Bước đầu tiên trong việc xác định thị trường mục tiêu là gì?","answers":["A. Phát triển sản phẩm mới","B. Xây dựng ma trận đánh giá thị trường","C. Tạo chiến lược giá cả","D. Phân tích đối thủ cạnh tranh"],"correct":1,"explanation":"Đáp án đúng là: Xây dựng ma trận đánh giá thị trường Vì: Ma trận đánh giá thị trường giúp doanh nghiệp phân tích và lựa chọn phân khúc tiềm năng trước khi xây dựng chiến lược kinh doanh.","reference":"Mục 3.4"},{"id":48,"text":"Ví dụ nào thể hiện ĐMST tổ chức?","answers":["A. Cải tiến cách làm việc, tái cấu trúc mô hình doanh nghiệp","B. Không thay đổi chiến lược quản lý","C. Chỉ tập trung vào cắt giảm nhân sự","D. Giữ nguyên bộ máy quản lý trong 10 năm"],"correct":0,"explanation":"Đáp án đúng là: Cải tiến cách làm việc, tái cấu trúc mô hình doanh nghiệp Vì: ĐMST tổ chức liên quan đến cải thiện quy trình làm việc và cơ cấu tổ chức để nâng cao hiệu suất.","reference":"Mục 1.2"},{"id":49,"text":"Khi nào một doanh nghiệp nên trì hoãn việc thương mại hóa sản phẩm mới?","answers":["A. Khi đã có đủ khách hàng đặt hàng trước","B. Khi sản phẩm đã hoàn thiện 100%","C. Khi nền kinh tế đang suy thoái","D. Khi không có đối thủ cạnh tranh"],"correct":2,"explanation":"Đáp án đúng là: Khi nền kinh tế đang suy thoái Vì: Trong thời kỳ suy thoái kinh tế, người tiêu dùng có xu hướng cắt giảm chi tiêu, làm giảm cơ hội thành công của sản phẩm mới.","reference":"Mục 3.2"},{"id":50,"text":"Phân tích thị trường là gì?","answers":["A. Lựa chọn phân khúc khách hàng một cách ngẫu nhiên","B. Chỉ tập trung vào nghiên cứu đối thủ cạnh tranh","C. Quá trình thu thập và phân tích dữ liệu để hiểu về thị trường","D. Xác định giá sản phẩm dựa trên cảm tính"],"correct":2,"explanation":"Đáp án đúng là: Quá trình thu thập và phân tích dữ liệu để hiểu về thị trường Vì: Phân tích thị trường giúp doanh nghiệp nắm bắt xu hướng, nhu cầu khách hàng và cạnh tranh hiệu quả.","reference":"Mục 3.3"},{"id":51,"text":"Tại sao nghiên cứu thị trường quan trọng trong kinh doanh?","answers":["A. Không ảnh hưởng đến doanh thu","B. Giúp xác định nhu cầu và xu hướng tiêu dùng","C. Không cần thiết khi kinh doanh","D. Không giúp tăng lợi nhuận"],"correct":1,"explanation":"Đáp án đúng là: Giúp xác định nhu cầu và xu hướng tiêu dùng Vì: Nghiên cứu thị trường giúp doanh nghiệp hiểu khách hàng, dự đoán xu hướng và đưa ra quyết định kinh doanh chính xác.","reference":"Mục 2.2"},{"id":52,"text":"Trong mô hình Canvas, \"Kênh phân phối\" có ý nghĩa gì?","answers":["A. Nguồn tài chính của doanh nghiệp","B. Phương pháp nghiên cứu thị trường","C. Cách doanh nghiệp tiếp cận khách hàng","D. Cách doanh nghiệp quản lý rủi ro"],"correct":2,"explanation":"Đáp án đúng là: Cách doanh nghiệp tiếp cận khách hàng Vì: \"Kênh phân phối\" mô tả cách doanh nghiệp đưa sản phẩm/dịch vụ đến khách hàng.","reference":"Mục 2.3"},{"id":53,"text":"Tại sao phân tích thị trường quan trọng đối với sản phẩm mới?","answers":["A. Giúp xác định khách hàng tiềm năng và đánh giá nhu cầu","B. Giúp loại bỏ hoàn toàn rủi ro trong kinh doanh","C. Chỉ để tìm kiếm nhà cung cấp nguyên liệu","D. Không ảnh hưởng đến chiến lược kinh doanh"],"correct":0,"explanation":"Đáp án đúng là: Giúp xác định khách hàng tiềm năng và đánh giá nhu cầu Vì: Nếu không phân tích, doanh nghiệp có thể đưa ra sản phẩm không đáp ứng nhu cầu thị trường.","reference":"Mục 3.3"},{"id":54,"text":"Mục đích của việc phân khúc thị trường là gì?","answers":["A. Tăng giá sản phẩm để tối đa lợi nhuận","B. Xác định nhóm khách hàng có nhu cầu và hành vi tương đồng","C. Xây dựng thương hiệu cá nhân","D. Giảm chi phí sản xuất"],"correct":1,"explanation":"Đáp án đúng là: Xác định nhóm khách hàng có nhu cầu và hành vi tương đồng Vì: Phân khúc thị trường giúp doanh nghiệp tối ưu hóa chiến lược tiếp thị và bán hàng.","reference":"Mục 3.3"},{"id":55,"text":"Yếu tố nào không phải là rào cản tư duy sáng tạo?","answers":["A. Luôn thử nghiệm cái mới","B. Chấp nhận sự sẵn có","C. Lối mòn tư duy","D. Sợ thất bại"],"correct":0,"explanation":"Đáp án đúng là: Luôn thử nghiệm cái mới Vì: Việc thử nghiệm cái mới giúp thúc đẩy tư duy sáng tạo.","reference":"Mục 1.2"},{"id":56,"text":"Đặc điểm nào không thuộc cơ hội kinh doanh?","answers":["A. Không cần tính khả thi","B. Có tính đổi mới","C. Khả năng mở rộng","D. Xuất phát từ nhu cầu thị trường"],"correct":0,"explanation":"Đáp án đúng là: Không cần tính khả thi Vì: Vì cơ hội kinh doanh phải khả thi, nếu không sẽ khó triển khai và thành công.","reference":"Mục 2.2"},{"id":57,"text":"Khi nào một sản phẩm được chuyển sang giai đoạn phát triển?","answers":["A. Khi đã có sẵn hệ thống phân phối","B. Khi đã có thị phần ổn định","C. Khi đã xác định được ý tưởng sản phẩm tốt nhất","D. Khi đã hoàn thành chiến lược marketing"],"correct":2,"explanation":"Đáp án đúng là: Khi đã xác định được ý tưởng sản phẩm tốt nhất Vì: Chỉ những ý tưởng có tiềm năng thực sự mới được chuyển sang giai đoạn phát triển sản phẩm.","reference":"Mục 3.2"},{"id":58,"text":"Vì sao việc đánh giá nhu cầu thị trường quan trọng?","answers":["A. Để đảm bảo có đủ khách hàng tiềm năng","B. Không cần quan tâm đến khách hàng","C. Vì thị trường luôn ổn định","D. Vì khách hàng sẽ mua bất kỳ sản phẩm nào"],"correct":0,"explanation":"Đáp án đúng là: Để đảm bảo có đủ khách hàng tiềm năng Vì: Nếu không có đủ khách hàng tiềm năng, sản phẩm/dịch vụ có thể thất bại ngay cả khi ý tưởng ban đầu rất hay.","reference":"Mục 2.1"},{"id":59,"text":"Ý tưởng kinh doanh có thể hình thành từ đâu?","answers":["A. Không cần dựa vào nhu cầu thị trường","B. Chỉ xuất phát từ xu hướng công nghệ","C. Sao chép mô hình kinh doanh khác mà không thay đổi gì","D. Phát minh mới hoặc cải tiến sản phẩm/dịch vụ đã có"],"correct":3,"explanation":"Đáp án đúng là: Phát minh mới hoặc cải tiến sản phẩm/dịch vụ đã có Vì: Ý tưởng kinh doanh có thể xuất phát từ việc tạo ra sản phẩm hoàn toàn mới hoặc cải tiến sản phẩm hiện có để đáp ứng tốt hơn nhu cầu khách hàng.","reference":"Mục 2.1"},{"id":60,"text":"Giai đoạn tăng trưởng của vòng đời sản phẩm có đặc điểm gì?","answers":["A. Cạnh tranh giảm dần","B. Doanh thu và lợi nhuận bắt đầu tăng mạnh","C. Chi phí sản xuất tăng cao","D. Sản phẩm bị thị trường từ chối"],"correct":1,"explanation":"Đáp án đúng là: Doanh thu và lợi nhuận bắt đầu tăng mạnh Vì: Ở giai đoạn này, sản phẩm đã được thị trường đón nhận, nhu cầu tăng lên nhanh chóng.","reference":"Mục 3.1"},{"id":61,"text":"Thị trường mục tiêu có thể chia thành mấy loại?","answers":["A. 5","B. 3","C. 4","D. 2"],"correct":1,"explanation":"Đáp án đúng là: 3 Vì: Có ba loại chính: thị trường đại chúng, thị trường ngách và thị trường nội địa/quốc tế.","reference":"Mục 3.4"},{"id":62,"text":"Ma trận sản phẩm - thị trường của Ansoff giúp xác định điều gì?","answers":["A. Chiến lược tuyển dụng nhân sự","B. Chiến lược mở rộng thương hiệu","C. Chiến lược phát triển sản phẩm và thị trường","D. Chiến lược giảm chi phí sản xuất"],"correct":2,"explanation":"Đáp án đúng là: Chiến lược phát triển sản phẩm và thị trường Vì: Ma trận Ansoff giúp doanh nghiệp lựa chọn giữa 4 chiến lược: Thâm nhập thị trường, Phát triển thị trường, Phát triển sản phẩm, Đa dạng hóa.","reference":"Mục 3.1"},{"id":63,"text":"Công cụ nào giúp xác định xu hướng thị trường?","answers":["A. Dự đoán dựa trên cảm tính","B. Hỏi ý kiến bạn bè","C. Google Trends, Social Listening, Báo cáo thị trường","D. Không cần công cụ, chỉ cần kinh nghiệm"],"correct":2,"explanation":"Đáp án đúng là: Google Trends, Social Listening, Báo cáo thị trường Vì: Các công cụ như Google Trends, Social Listening và báo cáo thị trường giúp thu thập dữ liệu khách quan về xu hướng tiêu dùng, giúp doanh nghiệp đưa ra quyết định chính xác hơn.","reference":"Mục 2.1"},{"id":64,"text":"Một trong những nguyên nhân chính khiến kế hoạch kinh doanh thất bại là gì?","answers":["A. Quá chú trọng vào marketing","B. Có quá nhiều đối tác","C. Chiến lược tài chính chi tiết","D. Thiếu nghiên cứu thị trường"],"correct":3,"explanation":"Đáp án đúng là: Thiếu nghiên cứu thị trường Vì: Thiếu nghiên cứu thị trường dẫn đến việc đưa ra các quyết định kinh doanh không phù hợp.","reference":"Mục 2.3"},{"id":65,"text":"Trong SCAMPER, \"Substitute\" có nghĩa là gì?","answers":["A. Loại bỏ những yếu tố không cần thiết","B. Kết hợp hai mô hình kinh doanh","C. Thay đổi khách hàng mục tiêu","D. Thay thế nguyên liệu, công nghệ, quy trình"],"correct":3,"explanation":"Đáp án đúng là: Thay thế nguyên liệu, công nghệ, quy trình Vì: \"Substitute\" có nghĩa là thay thế một phần hoặc toàn bộ thành phần của sản phẩm/dịch vụ nhằm cải tiến hoặc tạo ra sản phẩm mới.","reference":"Mục 2.1"},{"id":66,"text":"Hình thức nào không phải là kênh huy động vốn phổ biến của startup?","answers":["A. Nhà đầu tư thiên thần","B. Crowdfunding","C. Gọi vốn từ bạn bè","D. Quỹ bảo hiểm xã hội"],"correct":3,"explanation":"Đáp án đúng là: Quỹ bảo hiểm xã hội Vì: Quỹ bảo hiểm xã hội chủ yếu phục vụ cho an sinh xã hội, không phải là nguồn vốn phổ biến cho startup, trong khi các hình thức như crowdfunding, nhà đầu tư thiên thần và huy động từ bạn bè thường được sử dụng để khởi động doanh nghiệp.","reference":"Mục 1.3"},{"id":67,"text":"Phần nào của kế hoạch kinh doanh giúp xác định khách hàng tiềm năng?","answers":["A. Kế hoạch tài chính","B. Chiến lược giá cả","C. Phân khúc khách hàng","D. Tầm nhìn doanh nghiệp"],"correct":2,"explanation":"Đáp án đúng là: Phân khúc khách hàng Vì: \"Phân khúc khách hàng\" giúp xác định nhóm khách hàng mục tiêu mà doanh nghiệp hướng đến.","reference":"Mục 2.3"},{"id":68,"text":"Điều nào đúng về ĐMST sản phẩm?","answers":["A. Chỉ áp dụng cho ngành công nghệ","B. Có thể là cải tiến đáng kể từ sản phẩm cũ","C. Luôn tạo ra sản phẩm hoàn toàn mới","D. Không ảnh hưởng đến lợi nhuận"],"correct":1,"explanation":"Đáp án đúng là: Có thể là cải tiến đáng kể từ sản phẩm cũ Vì: ĐMST sản phẩm không chỉ tạo ra sản phẩm mới mà còn có thể cải tiến sản phẩm cũ để tăng giá trị.","reference":"Mục 1.2"},{"id":69,"text":"Việc sáng tạo ra công nghệ mới giúp doanh nghiệp có lợi thế gì?","answers":["A. Tăng giá thành sản phẩm","B. Không ảnh hưởng đến lợi thế cạnh tranh","C. Giảm năng suất lao động","D. Nâng cao năng suất, giảm chi phí, cải thiện chất lượng"],"correct":3,"explanation":"Đáp án đúng là: Nâng cao năng suất, giảm chi phí, cải thiện chất lượng Vì: Công nghệ giúp tối ưu quy trình sản xuất, giảm chi phí và nâng cao chất lượng sản phẩm, từ đó giúp doanh nghiệp cạnh tranh tốt hơn.","reference":"Mục 2.1"},{"id":70,"text":"ĐMST giúp doanh nghiệp cạnh tranh như thế nào?","answers":["A. Chỉ giúp tăng doanh thu","B. Giúp tạo sự khác biệt và thu hút khách hàng","C. Không có tác động lớn","D. Không cần thiết nếu doanh nghiệp đã thành công"],"correct":1,"explanation":"Đáp án đúng là: Giúp tạo sự khác biệt và thu hút khách hàng Vì: ĐMST giúp doanh nghiệp duy trì lợi thế cạnh tranh và đáp ứng nhu cầu thị trường.","reference":"Mục 1.1"},{"id":71,"text":"Giai đoạn phát triển sản phẩm bao gồm những gì?","answers":["A. Xây dựng nguyên mẫu và thử nghiệm sản phẩm","B. Lập kế hoạch tài chính","C. Quảng bá sản phẩm rộng rãi","D. Ký hợp đồng với nhà phân phối"],"correct":0,"explanation":"Đáp án đúng là: Xây dựng nguyên mẫu và thử nghiệm sản phẩm Vì: Phát triển sản phẩm là giai đoạn biến ý tưởng thành một sản phẩm thực tế thông qua việc tạo nguyên mẫu và tiến hành thử nghiệm để kiểm tra chất lượng.","reference":"Mục 3.2"},{"id":72,"text":"Tại sao cần đánh giá ý tưởng kinh doanh?","answers":["A. Để đảm bảo ý tưởng có tính khả thi","B. Vì ý tưởng nào cũng có thể thành công","C. Vì khách hàng luôn chấp nhận sản phẩm mới","D. Không cần đánh giá nếu có vốn lớn"],"correct":0,"explanation":"Đáp án đúng là: Để đảm bảo ý tưởng có tính khả thi Vì: Đánh giá giúp xác định tính khả thi của ý tưởng trước khi triển khai, tránh rủi ro thất bại.","reference":"Mục 2.1"},{"id":73,"text":"Điều gì khiến một kế hoạch kinh doanh có tính khả thi cao?","answers":["A. Không cần phân tích rủi ro","B. Không cần tính toán tài chính","C. Dựa trên dữ liệu thực tế và có chiến lược rõ ràng","D. Dựa hoàn toàn vào ý tưởng sáng tạo"],"correct":2,"explanation":"Đáp án đúng là: Dựa trên dữ liệu thực tế và có chiến lược rõ ràng Vì: Kế hoạch khả thi cần dựa trên dữ liệu thực tế và có chiến lược rõ ràng để triển khai hiệu quả.","reference":"Mục 2.3"},{"id":74,"text":"Xu hướng xã hội nào giúp mở ra cơ hội kinh doanh?","answers":["A. Giảm nhu cầu tiêu dùng","B. Sự thu hẹp thị trường thương mại điện tử","C. Sự giảm sử dụng công nghệ","D. Sự gia tăng của làm việc từ xa"],"correct":3,"explanation":"Đáp án đúng là: Sự gia tăng của làm việc từ xa Vì: Làm việc từ xa thúc đẩy nhu cầu về công nghệ hỗ trợ như phần mềm họp trực tuyến, không gian làm việc linh hoạt, và dịch vụ giao hàng.","reference":"Mục 2.2"},{"id":75,"text":"Một ví dụ về startup thành công tại Việt Nam là gì?","answers":["A. MoMo","B. Vingroup","C. Vinamilk","D. Vietcombank"],"correct":0,"explanation":"Đáp án đúng là: MoMo Vì: MoMo là một startup trong lĩnh vực fintech (công nghệ tài chính), tiên phong trong thanh toán điện tử và ví điện tử tại Việt Nam.","reference":"Mục 1.4"},{"id":76,"text":"Theo Nghị định 94 năm 2020 của Chính phủ, cá nhân khởi nghiệp sáng tạo là ai?","answers":["A. Người có kinh nghiệm trong lĩnh vực tài chính","B. Người nghiên cứu, phát triển ý tưởng và kinh doanh sản phẩm mới","C. Người thành lập doanh nghiệp mà không có yếu tố đổi mới","D. Người chỉ đầu tư vào các công ty khởi nghiệp"],"correct":1,"explanation":"Đáp án đúng là: Người nghiên cứu, phát triển ý tưởng và kinh doanh sản phẩm mới Vì: Theo Nghị định 94/2020/NĐ-CP, cá nhân khởi nghiệp sáng tạo là người hoạt động nghiên cứu, phát triển ý tưởng và kinh doanh sản phẩm, dịch vụ, mô hình kinh doanh mới. Tham khảo: Nghị định 94/2020/NĐ-CP","reference":""},{"id":77,"text":"Cơ hội kinh doanh thường gắn liền với điều gì?","answers":["A. Không cần phát triển sản phẩm","B. Sao chép sản phẩm có sẵn","C. Đổi mới hoặc khác biệt","D. Mô hình kinh doanh truyền thống"],"correct":2,"explanation":"Đáp án đúng là: Đổi mới hoặc khác biệt Vì: Vì sự khác biệt giúp doanh nghiệp cạnh tranh và thu hút khách hàng.","reference":"Mục 2.2"},{"id":78,"text":"Phát minh mới có thể gặp khó khăn gì khi đưa vào kinh doanh?","answers":["A. Không cần thử nghiệm trước khi bán","B. Không cần bằng sáng chế","C. Thường không có nhu cầu thực tế từ thị trường","D. Luôn thành công nếu có vốn đầu tư"],"correct":2,"explanation":"Đáp án đúng là: Thường không có nhu cầu thực tế từ thị trường Vì: Nhiều phát minh mới không đáp ứng nhu cầu thực tế của thị trường, dẫn đến thất bại dù có công nghệ tiên tiến.","reference":"Mục 2.1"},{"id":79,"text":"Đổi mới sáng tạo (ĐMST) là gì?","answers":["A. Chỉ bao gồm việc phát minh ra sản phẩm mới","B. Việc lặp lại những cách làm cũ nhưng hiệu quả hơn","C. Không liên quan đến công nghệ và quản lý","D. Quá trình tạo ra, áp dụng những ý tưởng mới vào tổ chức"],"correct":3,"explanation":"Đáp án đúng là: Quá trình tạo ra, áp dụng những ý tưởng mới vào tổ chức Vì: ĐMST không chỉ là phát minh mà còn là việc áp dụng hiệu quả những ý tưởng vào thực tế.","reference":"Mục 1.1"},{"id":80,"text":"Công cụ nào có thể giúp đánh giá mức độ hấp dẫn của thị trường?","answers":["A. Lý thuyết Maslow","B. Ma trận BCG","C. Ma trận đánh giá phân khúc thị trường","D. Ma trận SWOT"],"correct":2,"explanation":"Đáp án đúng là: Ma trận đánh giá phân khúc thị trường Vì: Ma trận đánh giá phân khúc thị trường giúp doanh nghiệp lựa chọn phân khúc tiềm năng dựa trên các tiêu chí như quy mô, tăng trưởng và lợi nhuận.","reference":"Mục 3.4"},{"id":81,"text":"Một trong những vai trò chính của vườn ươm khởi nghiệp là gì?","answers":["A. Hỗ trợ không gian làm việc, đào tạo và kết nối đầu tư","B. Không ảnh hưởng đến sự phát triển của startup","C. Cung cấp tài liệu lý thuyết về khởi nghiệp","D. Chỉ hỗ trợ các doanh nghiệp lớn"],"correct":0,"explanation":"Đáp án đúng là: Hỗ trợ không gian làm việc, đào tạo và kết nối đầu tư Vì: Vườn ươm khởi nghiệp giúp các startup phát triển bằng cách cung cấp không gian làm việc, chương trình đào tạo, tư vấn chiến lược và kết nối với các nhà đầu tư.","reference":"Mục 1.4"},{"id":82,"text":"Vai trò của kế hoạch kinh doanh trong quản lý tài chính là gì?","answers":["A. Giúp dự báo chi phí, doanh thu và lợi nhuận","B. Chỉ phục vụ mục đích gọi vốn","C. Không cần thiết trong kinh doanh","D. Giúp doanh nghiệp tránh mọi rủi ro"],"correct":0,"explanation":"Đáp án đúng là: Giúp dự báo chi phí, doanh thu và lợi nhuận Vì: Kế hoạch kinh doanh giúp doanh nghiệp quản lý tài chính bằng cách dự báo doanh thu, chi phí và lợi nhuận.","reference":"Mục 2.3"},{"id":83,"text":"Chiến lược phát triển thị trường trong ma trận Ansoff là gì?","answers":["A. Tăng giá sản phẩm","B. Đưa sản phẩm hiện tại vào thị trường mới","C. Phát triển sản phẩm mới cho thị trường hiện tại","D. Giảm chi phí sản xuất"],"correct":1,"explanation":"Đáp án đúng là: Đưa sản phẩm hiện tại vào thị trường mới Vì: Phát triển thị trường là mở rộng phạm vi kinh doanh bằng cách bán sản phẩm hiện tại cho nhóm khách hàng mới hoặc khu vực địa lý mới.","reference":"Mục 3.1"},{"id":84,"text":"Yếu tố nào giúp nhận diện cơ hội kinh doanh?","answers":["A. Sao chép mô hình kinh doanh khác","B. Sự ngẫu nhiên","C. Không cần phân tích khách hàng","D. Xu hướng thị trường"],"correct":3,"explanation":"Đáp án đúng là: Xu hướng thị trường Vì: Vì nắm bắt xu hướng giúp xác định cơ hội kinh doanh có tiềm năng phát triển.","reference":"Mục 2.2"},{"id":85,"text":"Theo tiêu chuẩn ISO 9001:2015, sản phẩm là gì?","answers":["A. Một dịch vụ hỗ trợ khách hàng","B. Một sản phẩm có giá trị thương mại","C. Một mặt hàng được bán trên thị trường","D. Đầu ra của một tổ chức mà không cần thực hiện giao dịch với khách hàng"],"correct":3,"explanation":"Đáp án đúng là: Đầu ra của một tổ chức mà không cần thực hiện giao dịch với khách hàng Vì: Theo tiêu chuẩn ISO 9001:2015, \"sản phẩm\" được định nghĩa là đầu ra của một quá trình. Điều này có nghĩa là bất kỳ thứ gì được tạo ra hoặc cung cấp bởi một tổ chức đều có thể được coi là sản phẩm.","reference":"Mục 3.1"},{"id":86,"text":"Tại sao kế hoạch kinh doanh lại quan trọng với nhà đầu tư?","answers":["A. Chỉ để xem doanh nghiệp có bao nhiêu nhân viên","B. Để theo dõi hoạt động nội bộ doanh nghiệp","C. Giúp họ đánh giá tính khả thi và lợi nhuận","D. Không có ý nghĩa đặc biệt"],"correct":2,"explanation":"Đáp án đúng là: Giúp họ đánh giá tính khả thi và lợi nhuận Vì: Nhà đầu tư cần kế hoạch kinh doanh để đánh giá tiềm năng sinh lời và tính khả thi của dự án.","reference":"Mục 2.3"},{"id":87,"text":"Khởi nghiệp sáng tạo là gì?","answers":["A. Quá trình tạo ra doanh nghiệp mới dựa trên ý tưởng đổi mới và công nghệ","B. Chỉ áp dụng trong lĩnh vực thương mại điện tử","C. Khởi nghiệp bằng cách cải tiến mô hình kinh doanh có sẵn","D. Khởi nghiệp không liên quan đến công nghệ"],"correct":0,"explanation":"Đáp án đúng là: Quá trình tạo ra doanh nghiệp mới dựa trên ý tưởng đổi mới và công nghệ Vì: Khởi nghiệp sáng tạo sử dụng công nghệ và ý tưởng đổi mới để tạo ra doanh nghiệp có khả năng tăng trưởng cao.","reference":"Mục 1.3"},{"id":88,"text":"Có bao nhiêu tiêu chí đánh giá thị trường mục tiêu?","answers":["A. 4","B. 3","C. 5","D. 6"],"correct":0,"explanation":"Đáp án đúng là: 4 Vì: Bốn tiêu chí chính gồm: quy mô thị trường, mức độ tăng trưởng, mức độ cạnh tranh và khả năng tiếp cận.","reference":"Mục 3.4"},{"id":89,"text":"Một ví dụ về gọi vốn cộng đồng là gì?","answers":["A. Chỉ dựa vào vốn tự có","B. Vay vốn ngân hàng","C. Kêu gọi vốn từ nhiều cá nhân thông qua nền tảng trực tuyến","D. Chỉ huy động vốn từ một nhà đầu tư lớn"],"correct":2,"explanation":"Đáp án đúng là: Kêu gọi vốn từ nhiều cá nhân thông qua nền tảng trực tuyến Vì: Gọi vốn cộng đồng (Crowdfunding) là hình thức huy động vốn từ nhiều người thông qua các nền tảng trực tuyến như Kickstarter, GoFundMe hoặc Indiegogo.","reference":"Mục 1.3"},{"id":90,"text":"Một kế hoạch kinh doanh chi tiết giúp gì cho doanh nghiệp?","answers":["A. Không có ý nghĩa trong thực tế","B. Không cần quan tâm đến thị trường","C. Định hướng phát triển và kiểm soát rủi ro","D. Giúp doanh nghiệp hoạt động không cần điều chỉnh"],"correct":2,"explanation":"Đáp án đúng là: Định hướng phát triển và kiểm soát rủi ro Vì: Kế hoạch kinh doanh giúp doanh nghiệp có hướng đi rõ ràng và chuẩn bị cho các rủi ro có thể xảy ra.","reference":"Mục 2.3"},{"id":91,"text":"Công nghệ có ảnh hưởng gì đến cơ hội kinh doanh?","answers":["A. Giảm khả năng mở rộng thị trường","B. Không cần quan tâm đến công nghệ","C. Giúp tạo ra sản phẩm và dịch vụ mới","D. Không liên quan đến kinh doanh"],"correct":2,"explanation":"Đáp án đúng là: Giúp tạo ra sản phẩm và dịch vụ mới Vì: Công nghệ thúc đẩy đổi mới, giúp doanh nghiệp phát triển sản phẩm/dịch vụ đáp ứng nhu cầu mới của khách hàng.","reference":"Mục 2.2"},{"id":92,"text":"Một kế hoạch kinh doanh hiệu quả cần có yếu tố nào?","answers":["A. Chỉ tập trung vào chiến lược tài chính","B. Tính thực tiễn, tính linh hoạt, tính đo lường được","C. Càng dài càng tốt","D. Không cần dữ liệu thực tế"],"correct":1,"explanation":"Đáp án đúng là: Tính thực tiễn, tính linh hoạt, tính đo lường được Vì: Một kế hoạch kinh doanh tốt phải thực tế, có thể điều chỉnh và đo lường kết quả.","reference":"Mục 2.3"},{"id":93,"text":"Tại sao đổi mới sáng tạo lại quan trọng đối với doanh nghiệp?","answers":["A. Chỉ giúp cải thiện hình ảnh thương hiệu","B. Không có tác động dài hạn","C. Giúp doanh nghiệp cạnh tranh, tăng trưởng và mở rộng thị trường","D. Chỉ cần thiết với doanh nghiệp lớn"],"correct":2,"explanation":"Đáp án đúng là: Giúp doanh nghiệp cạnh tranh, tăng trưởng và mở rộng thị trường Vì: ĐMST giúp doanh nghiệp duy trì lợi thế cạnh tranh, phát triển bền vững và thích ứng với thay đổi thị trường","reference":"Mục 1.1"},{"id":94,"text":"Yếu tố nào giúp doanh nghiệp thu hút đầu tư?","answers":["A. Không cần kế hoạch kinh doanh","B. Phụ thuộc hoàn toàn vào xu hướng thị trường","C. Một kế hoạch kinh doanh chặt chẽ và khả thi","D. Sản phẩm giá rẻ"],"correct":2,"explanation":"Đáp án đúng là: Một kế hoạch kinh doanh chặt chẽ và khả thi Vì: Nhà đầu tư cần một kế hoạch rõ ràng, khả thi để đánh giá tiềm năng sinh lời của doanh nghiệp.","reference":"Mục 2.3"},{"id":95,"text":"Tính sáng tạo là gì?","answers":["A. Chỉ dành cho người có năng khiếu đặc biệt","B. Không có vai trò trong đổi mới sáng tạo","C. Việc tạo ra những ý tưởng mới lạ hoặc cách tiếp cận độc đáo","D. Khả năng lặp lại những gì đã có"],"correct":2,"explanation":"Đáp án đúng là: Việc tạo ra những ý tưởng mới lạ hoặc cách tiếp cận độc đáo Vì: Sáng tạo là việc tạo ra những ý tưởng mới chứ không phải lặp lại cái cũ.","reference":"Mục 1.1"},{"id":96,"text":"Phát triển sản phẩm mới giúp doanh nghiệp gì?","answers":["A. Duy trì vị thế cạnh tranh","B. Tránh mọi rủi ro trong kinh doanh","C. Giảm chi phí sản xuất","D. Giữ nguyên sản phẩm cũ mà không cần đổi mới"],"correct":0,"explanation":"Đáp án đúng là: Duy trì vị thế cạnh tranh Vì: Nếu không đổi mới, doanh nghiệp dễ bị tụt hậu so với đối thủ trên thị trường.","reference":"Mục 3.2"},{"id":97,"text":"Kỹ thuật nào được sử dụng để sàng lọc ý tưởng sản phẩm mới?","answers":["A. Phân tích PESTEL","B. Tất cả các đáp án đều đúng","C. Phân tích SWOT","D. Ma trận các yếu tố nội bộ IFE"],"correct":1,"explanation":"Đáp án đúng là: Tất cả các đáp án đều đúng Vì: Các phương pháp như SWOT, PESTEL, IFE giúp đánh giá ý tưởng sản phẩm từ nhiều góc độ khác nhau.","reference":"Mục 3.2"},{"id":98,"text":"Tại sao thời điểm quan trọng trong kinh doanh?","answers":["A. Vì mọi ý tưởng đều có thể thành công","B. Vì khách hàng luôn sẵn sàng mua hàng","C. Vì không có sự cạnh tranh","D. Vì thị trường luôn thay đổi"],"correct":3,"explanation":"Đáp án đúng là: Vì thị trường luôn thay đổi Vì: Nếu không chọn đúng thời điểm, sản phẩm có thể mất cơ hội tiếp cận khách hàng.","reference":"Mục 2.2"},{"id":99,"text":"Một doanh nghiệp đổi mới sáng tạo thành công khi nào?","answers":["A. Khi chỉ tập trung vào giảm chi phí","B. Khi sản phẩm có tính mới và mang lại giá trị gia tăng","C. Khi sản phẩm không có tính khác biệt","D. Khi có nhiều ý tưởng nhưng chưa ứng dụng"],"correct":1,"explanation":"Đáp án đúng là: Khi sản phẩm có tính mới và mang lại giá trị gia tăng Vì: Thành công trong ĐMST phụ thuộc vào việc sản phẩm có tính mới và mang lại giá trị thực tiễn.","reference":"Mục 1.2"},{"id":100,"text":"Khi nào một doanh nghiệp cần lập kế hoạch kinh doanh?","answers":["A. Khi gặp khó khăn tài chính","B. Chỉ khi gọi vốn","C. Trước khi bắt đầu hoạt động và trong suốt quá trình kinh doanh","D. Chỉ khi muốn thay đổi sản phẩm"],"correct":2,"explanation":"Đáp án đúng là: Trước khi bắt đầu hoạt động và trong suốt quá trình kinh doanh Vì: Doanh nghiệp cần có kế hoạch từ đầu và cập nhật liên tục để thích nghi với thị trường.","reference":"Mục 2.3"},{"id":101,"text":"Một ví dụ về chiến lược phát triển thị trường là gì?","answers":["A. Coca-Cola cải tiến công thức sản phẩm","B. Apple ra mắt iPhone mới","C. Nike mở rộng sang thị trường Trung Quốc","D. Samsung giảm giá sản phẩm"],"correct":2,"explanation":"Đáp án đúng là: Nike mở rộng sang thị trường Trung Quốc Vì: Nike sử dụng chiến lược phát triển thị trường khi mở rộng hoạt động kinh doanh sang một quốc gia mới với sản phẩm hiện tại.","reference":"Mục 3.1"},{"id":102,"text":"Đâu là yếu tố quan trọng khi phân tích thị trường?","answers":["A. Đối thủ cạnh tranh","B. Tất cả các đáp án đều đúng","C. Xu hướng thị trường","D. Khách hàng tiềm năng"],"correct":1,"explanation":"Đáp án đúng là: Tất cả các đáp án đều đúng Vì: Phân tích thị trường cần xem xét đối thủ, khách hàng và xu hướng để có chiến lược kinh doanh hiệu quả.","reference":"Mục 3.3"},{"id":103,"text":"Điều gì không phải là lợi ích của lập kế hoạch kinh doanh?","answers":["A. Giúp doanh nghiệp xác định rõ mục tiêu","B. Cung cấp hướng dẫn chi tiết để thực hiện chiến lược","C. Giúp doanh nghiệp tránh hoàn toàn mọi rủi ro","D. Giúp thu hút vốn đầu tư"],"correct":2,"explanation":"Đáp án đúng là: Giúp doanh nghiệp tránh hoàn toàn mọi rủi ro Vì: Kế hoạch kinh doanh giúp giảm rủi ro nhưng không thể loại bỏ hoàn toàn chúng.","reference":"Mục 2.3"},{"id":104,"text":"Giai đoạn phát triển khái niệm sản phẩm là gì?","answers":["A. Tạo mẫu thử sản phẩm","B. Biến ý tưởng ban đầu thành mô tả chi tiết về sản phẩm","C. Đưa sản phẩm ra thị trường","D. Tiến hành sản xuất hàng loạt"],"correct":1,"explanation":"Đáp án đúng là: Biến ý tưởng ban đầu thành mô tả chi tiết về sản phẩm Vì: Khái niệm sản phẩm giúp doanh nghiệp xác định rõ ràng đặc điểm, công dụng và lợi ích của sản phẩm.","reference":"Mục 3.2"},{"id":105,"text":"Yếu tố nào không phải là tiêu chí chọn thị trường mục tiêu?","answers":["A. Sở thích cá nhân của chủ doanh nghiệp","B. Mức độ cạnh tranh","C. Khả năng tiếp cận khách hàng","D. Quy mô thị trường"],"correct":0,"explanation":"Đáp án đúng là: Sở thích cá nhân của chủ doanh nghiệp Vì: Lựa chọn thị trường mục tiêu cần dựa trên dữ liệu khách quan, không phụ thuộc vào sở thích cá nhân.","reference":"Mục 3.4"},{"id":106,"text":"\"Phương pháp chấm điểm\" trong đánh giá ý tưởng là gì?","answers":["A. Không cần đánh giá theo tiêu chí cụ thể","B. Chỉ dựa vào cảm tính của chủ doanh nghiệp","C. Cho điểm từng tiêu chí và chọn ý tưởng có tổng điểm cao nhất","D. Bỏ phiếu chọn ý tưởng ngẫu nhiên"],"correct":2,"explanation":"Đáp án đúng là: Cho điểm từng tiêu chí và chọn ý tưởng có tổng điểm cao nhất Vì: Phương pháp chấm điểm giúp đánh giá ý tưởng một cách khách quan dựa trên các tiêu chí như tính khả thi, lợi thế cạnh tranh và tiềm năng phát triển.","reference":"Mục 2.1"},{"id":107,"text":"Bước đầu tiên trong quy trình lập kế hoạch kinh doanh là gì?","answers":["A. Xây dựng chiến lược giá cả","B. Xác định đối tượng khách hàng","C. Nắm rõ ngành kinh doanh và mục tiêu","D. Lập kế hoạch marketing"],"correct":2,"explanation":"Đáp án đúng là: Nắm rõ ngành kinh doanh và mục tiêu Vì: Trước khi lập kế hoạch, doanh nghiệp cần hiểu rõ ngành nghề và xác định mục tiêu phù hợp.","reference":"Mục 2.3"},{"id":108,"text":"Khi nào sản phẩm bước vào giai đoạn suy thoái?","answers":["A. Khi công ty tăng giá sản phẩm","B. Khi nhu cầu khách hàng giảm và thị trường bị thu hẹp","C. Khi sản phẩm được đổi mới công nghệ","D. Khi doanh số tăng mạnh"],"correct":1,"explanation":"Đáp án đúng là: Khi nhu cầu khách hàng giảm và thị trường bị thu hẹp Vì: Sản phẩm trở nên lỗi thời, bị thay thế bởi sản phẩm mới hoặc thị hiếu thay đổi.","reference":"Mục 3.1"},{"id":109,"text":"Đề án nào của Chính phủ Việt Nam hỗ trợ hệ sinh thái khởi nghiệp đổi mới sáng tạo đến năm 2025?","answers":["A. Đề án 505","B. Đề án 2020","C. Đề án 112","D. Đề án 844"],"correct":3,"explanation":"Đáp án đúng là: Đề án 844 Vì: Đề án 844 (hay còn gọi là Đề án Hỗ trợ hệ sinh thái khởi nghiệp đổi mới sáng tạo quốc gia) do Chính phủ ban hành nhằm thúc đẩy sự phát triển của các startup đổi mới sáng tạo.","reference":"Mục 1.4"},{"id":110,"text":"Một chiến lược marketing quan trọng khi ra mắt sản phẩm mới là gì?","answers":["A. Không cần đầu tư vào quảng cáo","B. Giảm ngân sách marketing để tiết kiệm chi phí","C. Xây dựng nhận thức thương hiệu và tiếp cận khách hàng mục tiêu","D. Chỉ bán sản phẩm qua kênh truyền thống"],"correct":2,"explanation":"Đáp án đúng là: Xây dựng nhận thức thương hiệu và tiếp cận khách hàng mục tiêu Vì: Marketing hiệu quả giúp tăng nhận diện thương hiệu, tiếp cận khách hàng tiềm năng và thúc đẩy doanh số khi sản phẩm mới ra mắt.","reference":"Mục 3.2"},{"id":111,"text":"Đặc điểm nổi bật nhất của ĐMST là gì?","answers":["A. Tính ổn định","B. Tính kế thừa","C. Tính lặp lại","D. Tính mới"],"correct":3,"explanation":"Đáp án đúng là: Tính mới Vì: ĐMST đòi hỏi sự khác biệt so với cách làm cũ để mang lại giá trị.","reference":"Mục 1.2"},{"id":112,"text":"Tại sao doanh nghiệp cần nghiên cứu thị trường trước khi phát triển sản phẩm?","answers":["A. Để sao chép chiến lược của đối thủ","B. Để xác định nhu cầu của khách hàng","C. Để giảm số lượng nhân viên","D. Để giảm chi phí sản xuất"],"correct":1,"explanation":"Đáp án đúng là: Để xác định nhu cầu của khách hàng Vì: Nghiên cứu thị trường giúp doanh nghiệp hiểu khách hàng thực sự cần gì, tránh sản xuất những sản phẩm không có nhu cầu.","reference":"Mục 3.2"},{"id":113,"text":"Yếu tố nào có thể phá vỡ rào cản sáng tạo?","answers":["A. Luôn làm theo quy trình cũ","B. Không sợ thất bại","C. Tin vào kinh nghiệm","D. Chấp nhận sự sẵn có"],"correct":1,"explanation":"Đáp án đúng là: Không sợ thất bại Vì: Sự dũng cảm thử nghiệm và chấp nhận thất bại giúp cá nhân và tổ chức vượt qua rào cản sáng tạo.","reference":"Mục 1.2"},{"id":114,"text":"Cơ hội kinh doanh là gì?","answers":["A. Một sản phẩm sẵn có trên thị trường","B. Một kế hoạch tài chính cho doanh nghiệp","C. Một ý tưởng bất kỳ không cần đánh giá thị trường","D. Thời cơ thuận lợi để cá nhân/tổ chức bắt đầu kinh doanh"],"correct":3,"explanation":"Đáp án đúng là: Thời cơ thuận lợi để cá nhân/tổ chức bắt đầu kinh doanh Vì: Vì cơ hội kinh doanh là điều kiện thuận lợi để khởi nghiệp, không chỉ là một ý tưởng hay kế hoạch tài chính.","reference":"Mục 2.2"},{"id":115,"text":"Ma trận đánh giá thị trường giúp gì cho doanh nghiệp?","answers":["A. Không có tác dụng thực tế","B. Chỉ tập trung vào marketing","C. Giảm chi phí sản xuất","D. Xác định phân khúc thị trường tiềm năng"],"correct":3,"explanation":"Đáp án đúng là: Xác định phân khúc thị trường tiềm năng Vì: Ma trận này giúp doanh nghiệp đánh giá các yếu tố như quy mô, tiềm năng tăng trưởng và mức độ cạnh tranh để lựa chọn phân khúc phù hợp.","reference":"Mục 3.4"},{"id":116,"text":"ĐMST có phải là quá trình liên tục không?","answers":["A. Chỉ xảy ra khi có nhu cầu cấp bách","B. Không, chỉ xảy ra một lần","C. Không có tính kế thừa","D. Có, luôn được cải tiến theo thời gian"],"correct":3,"explanation":"Đáp án đúng là: Có, luôn được cải tiến theo thời gian Vì: ĐMST là một quá trình liên tục, không ngừng được cải tiến để thích ứng với sự thay đổi.","reference":"Mục 1.2"},{"id":117,"text":"Sản phẩm mở rộng dòng sản phẩm hiện có là gì?","answers":["A. Một sản phẩm dành riêng cho thị trường ngách","B. Một sản phẩm bổ sung trong danh mục sản phẩm hiện có của công ty","C. Một sản phẩm thay thế sản phẩm cũ","D. Một sản phẩm hoàn toàn mới chưa từng có"],"correct":1,"explanation":"Đáp án đúng là: Một sản phẩm bổ sung trong danh mục sản phẩm hiện có của công ty Vì: Sản phẩm mở rộng dòng là sản phẩm được thêm vào danh mục hiện có để đáp ứng nhu cầu khác nhau của khách hàng.","reference":"Mục 3.1"},{"id":118,"text":"Chiến lược phát triển sản phẩm trong ma trận Ansoff là gì?","answers":["A. Tăng doanh số trên thị trường hiện tại","B. Giảm giá sản phẩm để cạnh tranh","C. Chỉ tập trung vào quảng cáo","D. Phát triển sản phẩm mới cho thị trường hiện tại"],"correct":3,"explanation":"Đáp án đúng là: Phát triển sản phẩm mới cho thị trường hiện tại Vì: Phát triển sản phẩm là khi doanh nghiệp tạo ra sản phẩm mới để đáp ứng nhu cầu của khách hàng hiện có.","reference":"Mục 3.1"},{"id":119,"text":"Khi nào doanh nghiệp nên chọn chiến lược thị trường mới?","answers":["A. Khi sản phẩm có tính đột phá cao","B. Khi thị trường hiện tại không còn tăng trưởng","C. Khi không có ngân sách quảng cáo","D. Khi có quá nhiều đối thủ cạnh tranh"],"correct":0,"explanation":"Đáp án đúng là: Khi sản phẩm có tính đột phá cao Vì: Nếu sản phẩm có tính đột phá, doanh nghiệp có thể tạo ra thị trường mới, thay vì cạnh tranh trên thị trường cũ.","reference":"Mục 3.4"},{"id":120,"text":"Một ví dụ về sản phẩm tái định vị là gì?","answers":["A. Thuốc lá Marlboro từ sản phẩm cho nữ giới sang sản phẩm cho nam giới","B. Máy tính bảng thế hệ mới","C. Coca-Cola Zero Sugar","D. Đồng hồ thông minh với cảm biến nhịp tim"],"correct":0,"explanation":"Đáp án đúng là: Thuốc lá Marlboro từ sản phẩm cho nữ giới sang sản phẩm cho nam giới Vì: Ban đầu, Marlboro được quảng bá cho phụ nữ nhưng sau đó tái định vị để trở thành thương hiệu dành cho nam giới.","reference":"Mục 3.1"},{"id":121,"text":"Một trong những yếu tố quan trọng trong thương mại hóa sản phẩm là gì?","answers":["A. Lựa chọn đúng thời điểm ra mắt","B. Chỉ cần đầu tư vào sản xuất","C. Giảm giá sản phẩm ngay lập tức","D. Không cần chiến lược marketing"],"correct":0,"explanation":"Đáp án đúng là: Lựa chọn đúng thời điểm ra mắt Vì: Nếu ra mắt sản phẩm quá sớm hoặc quá muộn, doanh nghiệp có thể đánh mất cơ hội trên thị trường.","reference":"Mục 3.2"},{"id":122,"text":"Chiến lược đa dạng hóa trong ma trận Ansoff là gì?","answers":["A. Phát triển sản phẩm mới cho thị trường hiện tại","B. Phát triển sản phẩm mới cho thị trường mới","C. Tăng giá sản phẩm để tối ưu lợi nhuận","D. Đưa sản phẩm hiện tại vào thị trường mới"],"correct":1,"explanation":"Đáp án đúng là: Phát triển sản phẩm mới cho thị trường mới Vì: Đa dạng hóa là chiến lược rủi ro cao nhất, vì doanh nghiệp bước vào thị trường mới với sản phẩm hoàn toàn mới.","reference":"Mục 3.1"},{"id":123,"text":"Sản phẩm mới với công ty nhưng không mới với thị trường được gọi là gì?","answers":["A. Sản phẩm cải tiến","B. Sản phẩm mới đối với toàn thế giới","C. Sản phẩm tái định vị","D. Mặt hàng mới (mới với công ty)"],"correct":3,"explanation":"Đáp án đúng là: Mặt hàng mới (mới với công ty) Vì: Khi một công ty sản xuất một sản phẩm đã có trên thị trường nhưng mới với chính họ, đó là \"mặt hàng mới\".","reference":"Mục 3.1"},{"id":124,"text":"Đặc điểm nào sau đây không phải là đặc điểm của khởi nghiệp?","answers":["A. Luôn thành công nếu có vốn đầu tư","B. Tính rủi ro cao","C. Xuất phát từ ý tưởng sáng tạo","D. Có khả năng mở rộng nhanh"],"correct":0,"explanation":"Đáp án đúng là: Luôn thành công nếu có vốn đầu tư Vì: Vốn đầu tư không đảm bảo thành công vì khởi nghiệp còn phụ thuộc vào mô hình kinh doanh, chiến lược và sự đổi mới.","reference":"Mục 1.3"},{"id":125,"text":"Tại sao doanh nghiệp cần xác định quy mô thị trường?","answers":["A. Để biết tiềm năng doanh thu và khả năng mở rộng","B. Để tối ưu hóa chi phí vận hành","C. Để tăng giá sản phẩm","D. Để loại bỏ đối thủ cạnh tranh"],"correct":0,"explanation":"Đáp án đúng là: Để biết tiềm năng doanh thu và khả năng mở rộng Vì: Xác định quy mô thị trường giúp doanh nghiệp dự đoán doanh thu tiềm năng và lên kế hoạch phát triển hợp lý.","reference":"Mục 3.4"},{"id":126,"text":"Lợi thế cạnh tranh của ý tưởng kinh doanh có thể đến từ đâu?","answers":["A. Không cần có lợi thế cạnh tranh vẫn có thể thành công","B. Giảm giá sản phẩm thấp hơn đối thủ","C. Chỉ từ chiến lược marketing","D. Sử dụng công nghệ mới, mô hình kinh doanh mới"],"correct":3,"explanation":"Đáp án đúng là: Sử dụng công nghệ mới, mô hình kinh doanh mới Vì: Ứng dụng công nghệ hoặc sáng tạo mô hình kinh doanh giúp doanh nghiệp tạo sự khác biệt bền vững, trong khi giảm giá không phải là chiến lược lâu dài.","reference":"Mục 2.1"},{"id":127,"text":"Nguồn ý tưởng phát triển sản phẩm mới có thể đến từ đâu?","answers":["A. Tất cả các đáp án đều đúng","B. Khách hàng, đối thủ cạnh tranh","C. Nhà phân phối, nhà cung cấp","D. Nội bộ doanh nghiệp"],"correct":0,"explanation":"Đáp án đúng là: Tất cả các đáp án đều đúng Vì: Ý tưởng có thể đến từ bên trong (nghiên cứu & phát triển, nhân viên) và bên ngoài (khách hàng, nhà cung cấp, đối thủ cạnh tranh).","reference":"Mục 3.2"},{"id":128,"text":"Điều gì giúp một sản phẩm mới thành công trên thị trường?","answers":["A. Chỉ tập trung vào giảm giá bán","B. Không cần thử nghiệm trước khi ra mắt","C. Chỉ dựa vào sáng tạo mà không cần nghiên cứu thị trường","D. Đáp ứng đúng nhu cầu khách hàng và có chiến lược kinh doanh hợp lý"],"correct":3,"explanation":"Đáp án đúng là: Đáp ứng đúng nhu cầu khách hàng và có chiến lược kinh doanh hợp lý Vì: Một sản phẩm chỉ thành công khi nó giải quyết được vấn đề của khách hàng và có chiến lược kinh doanh phù hợp.","reference":"Mục 3.2"},{"id":129,"text":"Lợi thế khi xác định khoảng trống thị trường là gì?","answers":["A. Giúp doanh nghiệp tìm được phân khúc ít cạnh tranh","B. Không ảnh hưởng đến kinh doanh","C. Giảm nhu cầu khách hàng","D. Tăng chi phí vận hành"],"correct":0,"explanation":"Đáp án đúng là: Giúp doanh nghiệp tìm được phân khúc ít cạnh tranh Vì: Xác định đúng khoảng trống giúp doanh nghiệp nhắm đến khách hàng tiềm năng với ít đối thủ hơn.","reference":"Mục 2.2"},{"id":130,"text":"Xu hướng nào có thể tạo ra cơ hội kinh doanh mới?","answers":["A. Sự suy giảm công nghệ","B. Giảm số lượng người dùng internet","C. Sự phát triển của thương mại điện tử","D. Không có sự thay đổi trong xã hội"],"correct":2,"explanation":"Đáp án đúng là: Sự phát triển của thương mại điện tử Vì: Xu hướng công nghệ như thương mại điện tử mở ra nhiều cơ hội kinh doanh trong bán lẻ, vận chuyển, và thanh toán số.","reference":"Mục 2.2"},{"id":131,"text":"Mục đích chính của việc lập kế hoạch kinh doanh là gì?","answers":["A. Đảm bảo doanh nghiệp không có rủi ro","B. Đưa ra dự đoán chính xác về doanh thu","C. Giúp doanh nghiệp hoạt động mà không cần thay đổi","D. Xác định chiến lược và thu hút đầu tư"],"correct":3,"explanation":"Đáp án đúng là: Xác định chiến lược và thu hút đầu tư Vì: Một kế hoạch kinh doanh giúp doanh nghiệp có chiến lược rõ ràng và thu hút vốn từ nhà đầu tư.","reference":"Mục 2.3"},{"id":132,"text":"Sai lầm bỏ sót (Drop-error) trong sàng lọc ý tưởng là gì?","answers":["A. Khi doanh nghiệp không theo dõi phản hồi khách hàng","B. Khi doanh nghiệp chấp nhận một ý tưởng tồi","C. Khi doanh nghiệp đánh giá thấp và loại bỏ những ý tưởng thực sự có tiềm năng","D. Khi doanh nghiệp không thử nghiệm sản phẩm"],"correct":2,"explanation":"Đáp án đúng là: Khi doanh nghiệp đánh giá thấp và loại bỏ những ý tưởng thực sự có tiềm năng Vì: Drop-error xảy ra khi một ý tưởng có tiềm năng nhưng bị loại bỏ do đánh giá sai lầm.","reference":"Mục 3.2"},{"id":133,"text":"Chiến lược thâm nhập thị trường trong ma trận Ansoff là gì?","answers":["A. Phát triển sản phẩm mới cho thị trường mới","B. Tăng doanh số trên thị trường hiện tại với sản phẩm hiện có","C. Phát triển sản phẩm mới cho thị trường hiện tại","D. Đưa sản phẩm hiện tại vào thị trường mới"],"correct":1,"explanation":"Đáp án đúng là: Tăng doanh số trên thị trường hiện tại với sản phẩm hiện có Vì: Thâm nhập thị trường là chiến lược tăng cường bán hàng bằng cách tối ưu hóa marketing, cải tiến dịch vụ hoặc điều chỉnh giá nhưng không thay đổi sản phẩm hay thị trường.","reference":"Mục 3.1"},{"id":134,"text":"Mục tiêu chính của khởi nghiệp sáng tạo là gì?","answers":["A. Không cần quan tâm đến khách hàng","B. Tạo ra giá trị khác biệt trên thị trường","C. Cạnh tranh với các doanh nghiệp truyền thống","D. Chỉ tập trung vào lợi nhuận"],"correct":1,"explanation":"Đáp án đúng là: Tạo ra giá trị khác biệt trên thị trường Vì: Khởi nghiệp sáng tạo tập trung vào việc tạo ra sản phẩm/dịch vụ có tính đột phá để đáp ứng nhu cầu thị trường.","reference":"Mục 1.3"},{"id":135,"text":"Trong mô hình kinh doanh Canvas, phân khúc khách hàng giúp xác định điều gì?","answers":["A. Chiến lược giá cả","B. Chi phí vận hành","C. Đối tượng khách hàng mục tiêu","D. Đối tác kinh doanh"],"correct":2,"explanation":"Đáp án đúng là: Đối tượng khách hàng mục tiêu Vì: Xác định phân khúc khách hàng giúp doanh nghiệp tập trung vào nhóm khách hàng tiềm năng.","reference":"Mục 2.3"},{"id":136,"text":"Một cơ hội kinh doanh bền vững cần có điều kiện gì?","answers":["A. Phải có mô hình sao chép từ đối thủ","B. Không cần có chiến lược phát triển dài hạn","C. Không quan tâm đến nhu cầu thị trường","D. Tạo ra giá trị cho khách hàng"],"correct":3,"explanation":"Đáp án đúng là: Tạo ra giá trị cho khách hàng Vì: Vì doanh nghiệp chỉ có thể tồn tại lâu dài khi mang lại giá trị thực tế cho khách hàng.","reference":"Mục 2.2"},{"id":137,"text":"Một sản phẩm/dịch vụ có tính khả thi khi nào?","answers":["A. Khi chủ doanh nghiệp cảm thấy hứng thú","B. Khi có ý tưởng độc đáo nhưng không có thị trường","C. Khi đáp ứng nhu cầu thị trường và có mô hình doanh thu rõ ràng","D. Khi không có đối thủ cạnh tranh"],"correct":2,"explanation":"Đáp án đúng là: Khi đáp ứng nhu cầu thị trường và có mô hình doanh thu rõ ràng Vì: Sản phẩm/dịch vụ chỉ khả thi khi có nhu cầu thị trường và có mô hình kinh doanh bền vững, giúp doanh nghiệp có lợi nhuận.","reference":"Mục 2.1"},{"id":138,"text":"Một trong những phương pháp thử nghiệm sản phẩm là gì?","answers":["A. Định giá thấp hơn đối thủ","B. Phân phối sản phẩm ngay lập tức","C. Loại bỏ phản hồi tiêu cực từ khách hàng","D. Tiếp thị thử nghiệm"],"correct":3,"explanation":"Đáp án đúng là: Tiếp thị thử nghiệm Vì: Tiếp thị thử nghiệm (test marketing) là phương pháp tung sản phẩm ra một nhóm khách hàng nhỏ trước khi mở rộng quy mô.","reference":"Mục 3.2"},{"id":139,"text":"Phân tích SWOT giúp đánh giá ý tưởng bằng cách nào?","answers":["A. Xác định điểm mạnh, điểm yếu, cơ hội, thách thức","B. Chỉ áp dụng cho doanh nghiệp lớn","C. Tập trung vào lợi nhuận trước mắt","D. Không cần phân tích yếu tố bên ngoài"],"correct":0,"explanation":"Đáp án đúng là: Xác định điểm mạnh, điểm yếu, cơ hội, thách thức Vì: SWOT (Strengths, Weaknesses, Opportunities, Threats) giúp doanh nghiệp hiểu rõ lợi thế, rủi ro và cơ hội trong thị trường để điều chỉnh chiến lược phù hợp.","reference":"Mục 2.1"},{"id":140,"text":"Khởi nghiệp là gì?","answers":["A. Chỉ áp dụng cho các công ty công nghệ","B. Một mô hình kinh doanh cố định","C. Chỉ đơn thuần là mở một cửa hàng kinh doanh","D. Việc bắt đầu một doanh nghiệp hoặc hoạt động kinh doanh mới"],"correct":3,"explanation":"Đáp án đúng là: Việc bắt đầu một doanh nghiệp hoặc hoạt động kinh doanh mới Vì: Khởi nghiệp không chỉ là mở cửa hàng, mà là quá trình xây dựng một doanh nghiệp mới với các hoạt động kinh doanh riêng biệt.","reference":"Mục 1.3"},{"id":141,"text":"Động não nhóm (Brainstorming) giúp ích gì trong việc tìm kiếm ý tưởng?","answers":["A. Chỉ áp dụng trong môi trường doanh nghiệp lớn","B. Không phù hợp với startup","C. Tạo ra nhiều ý tưởng sáng tạo từ nhiều góc nhìn","D. Chỉ tập trung vào một hướng đi cố định"],"correct":2,"explanation":"Đáp án đúng là: Tạo ra nhiều ý tưởng sáng tạo từ nhiều góc nhìn Vì: Brainstorming khuyến khích sự sáng tạo và giúp nhóm tìm ra nhiều ý tưởng khả thi.","reference":"Mục 2.1"},{"id":142,"text":"Khi nào một doanh nghiệp nên tận dụng cơ hội kinh doanh?","answers":["A. Khi không có lợi nhuận","B. Khi không có đủ vốn đầu tư","C. Khi thị trường đang có nhu cầu cao","D. Khi chưa có ai làm trước đó"],"correct":2,"explanation":"Đáp án đúng là: Khi thị trường đang có nhu cầu cao Vì: Một cơ hội kinh doanh tốt là khi thị trường có nhu cầu lớn, đảm bảo tiềm năng lợi nhuận và phát triển.","reference":"Mục 2.2"},{"id":143,"text":"Một trong những lợi ích của việc phát triển sản phẩm mới là gì?","answers":["A. Giúp công ty không cần đầu tư vào nghiên cứu","B. Giúp công ty loại bỏ đối thủ","C. Giúp công ty dẫn đầu thị trường","D. Giúp công ty giảm chi phí lao động"],"correct":2,"explanation":"Đáp án đúng là: Giúp công ty dẫn đầu thị trường Vì: Sản phẩm mới giúp công ty tạo lợi thế cạnh tranh, thu hút khách hàng và củng cố vị thế trên thị trường.","reference":"Mục 3.1"},{"id":144,"text":"Tại sao ý tưởng kinh doanh cần có lợi thế cạnh tranh?","answers":["A. Vì mọi doanh nghiệp đều thành công như nhau","B. Để có thể tồn tại và phát triển trên thị trường","C. Vì không cần quan tâm đến khách hàng","D. Vì không cần đổi mới sản phẩm"],"correct":1,"explanation":"Đáp án đúng là: Để có thể tồn tại và phát triển trên thị trường Vì: Lợi thế cạnh tranh giúp doanh nghiệp khác biệt và chiếm ưu thế trên thị trường, từ đó phát triển bền vững.","reference":"Mục 2.1"},{"id":145,"text":"Một cơ hội kinh doanh tốt phải có yếu tố nào?","answers":["A. Phù hợp với sở thích cá nhân","B. Không có đối thủ cạnh tranh","C. Khả năng triển khai thực tế và mang lại lợi nhuận","D. Không cần đổi mới"],"correct":2,"explanation":"Đáp án đúng là: Khả năng triển khai thực tế và mang lại lợi nhuận Vì: Vì cơ hội chỉ có giá trị nếu có thể thực hiện và đem lại lợi nhuận.","reference":"Mục 2.2"},{"id":146,"text":"\"Học hỏi từ mô hình kinh doanh thành công\" có nghĩa là gì?","answers":["A. Chỉ tập trung vào mô hình trong nước","B. Sao chép y nguyên mà không điều chỉnh","C. Mua nhượng quyền thương hiệu, bản địa hóa mô hình","D. Không cần phân tích thị trường"],"correct":2,"explanation":"Đáp án đúng là: Mua nhượng quyền thương hiệu, bản địa hóa mô hình Vì: Việc học hỏi cần đi kèm với điều chỉnh phù hợp với thị trường địa phương để đạt hiệu quả cao nhất.","reference":"Mục 2.1"},{"id":147,"text":"Tại sao doanh nghiệp cần sàng lọc ý tưởng sản phẩm mới?","answers":["A. Để đảm bảo tất cả các ý tưởng được thực hiện","B. Để có nhiều ý tưởng sản phẩm nhất có thể","C. Để giảm chi phí phát triển những ý tưởng không khả thi","D. Để loại bỏ hoàn toàn mọi rủi ro"],"correct":2,"explanation":"Đáp án đúng là: Để giảm chi phí phát triển những ý tưởng không khả thi Vì: Sàng lọc ý tưởng giúp doanh nghiệp loại bỏ các ý tưởng kém khả thi để tiết kiệm thời gian và nguồn lực.","reference":"Mục 3.2"},{"id":148,"text":"Cộng đồng khởi nghiệp đóng vai trò gì trong hệ sinh thái khởi nghiệp?","answers":["A. Kết nối doanh nhân, startup, nhà đầu tư","B. Hoạt động độc lập, không có sự tương tác","C. Chỉ tập trung vào lý thuyết kinh doanh","D. Không liên quan đến sự phát triển của startup"],"correct":0,"explanation":"Đáp án đúng là: Kết nối doanh nhân, startup, nhà đầu tư Vì: Cộng đồng khởi nghiệp giúp kết nối các doanh nhân, startup, nhà đầu tư, cố vấn và tổ chức hỗ trợ, tạo ra môi trường hợp tác, học hỏi và phát triển.","reference":"Mục 1.4"},{"id":149,"text":"Khách hàng và người tiêu dùng khác nhau ở điểm nào?","answers":["A. Người tiêu dùng luôn là khách hàng","B. Khách hàng là người trả tiền, người tiêu dùng là người sử dụng sản phẩm","C. Khách hàng không liên quan đến doanh nghiệp","D. Không có sự khác biệt giữa hai khái niệm này"],"correct":1,"explanation":"Đáp án đúng là: Khách hàng là người trả tiền, người tiêu dùng là người sử dụng sản phẩm Vì: Ví dụ, cha mẹ mua sữa cho con – cha mẹ là khách hàng, con là người tiêu dùng.","reference":"Mục 3.3"},{"id":150,"text":"ĐMST có thể được phân loại theo yếu tố nào?","answers":["A. Không có sự phân loại cụ thể","B. Chỉ dựa vào công nghệ","C. Loại hình, cấp độ, yếu tố bên trong và bên ngoài","D. Chỉ dựa trên sản phẩm mới"],"correct":2,"explanation":"Đáp án đúng là: Loại hình, cấp độ, yếu tố bên trong và bên ngoài Vì: ĐMST có nhiều phân loại giúp hiểu rõ phạm vi và mức độ tác động của nó.","reference":"Mục 1.2"},{"id":151,"text":"Đặc điểm nào sau đây đúng với quỹ đầu tư mạo hiểm?","answers":["A. Đầu tư vào startup có tiềm năng tăng trưởng cao","B. Chỉ đầu tư vào các công ty lâu đời","C. Không liên quan đến hệ sinh thái khởi nghiệp","D. Chỉ đầu tư vào doanh nghiệp nhà nước"],"correct":0,"explanation":"Đáp án đúng là: Đầu tư vào startup có tiềm năng tăng trưởng cao Vì: Quỹ đầu tư mạo hiểm (Venture Capital) rót vốn vào các startup có tiềm năng phát triển mạnh, nhưng chưa có lợi nhuận hoặc doanh thu ổn định, với kỳ vọng thu được lợi nhuận lớn trong tương lai.","reference":"Mục 1.3"},{"id":152,"text":"Ví dụ nào thể hiện đổi mới sáng tạo trong kinh doanh?","answers":["A. Không áp dụng công nghệ mới","B. Giữ nguyên mô hình kinh doanh trong 10 năm","C. Mở rộng số lượng chi nhánh mà không thay đổi cách vận hành","D. Tạo ra sản phẩm mới hoặc tối ưu quy trình sản xuất"],"correct":3,"explanation":"Đáp án đúng là: Tạo ra sản phẩm mới hoặc tối ưu quy trình sản xuất Vì: ĐMST không chỉ là mở rộng mà còn phải thay đổi để nâng cao hiệu quả.","reference":"Mục 1.2"},{"id":153,"text":"Điều nào sau đây không phải là lợi ích của mô hình kinh doanh Canvas?","answers":["A. Giúp doanh nghiệp phân tích yếu tố bên ngoài","B. Tăng cường khả năng đổi mới sáng tạo","C. Đơn giản hóa các kế hoạch kinh doanh phức tạp","D. Giúp doanh nghiệp xây dựng mô hình kinh doanh trực quan"],"correct":0,"explanation":"Đáp án đúng là: Giúp doanh nghiệp phân tích yếu tố bên ngoài Vì: Mô hình Canvas tập trung vào nội bộ doanh nghiệp, không chuyên sâu về phân tích môi trường bên ngoài.","reference":"Mục 2.3"},{"id":154,"text":"Khái niệm đổi mới sáng tạo theo OECD bao gồm yếu tố nào?","answers":["A. Chỉ liên quan đến sản phẩm vật lý","B. Bao gồm sản phẩm, quy trình, phương pháp tiếp thị, tổ chức","C. Chỉ tập trung vào công nghệ","D. Chỉ áp dụng cho doanh nghiệp lớn"],"correct":1,"explanation":"Đáp án đúng là: Bao gồm sản phẩm, quy trình, phương pháp tiếp thị, tổ chức Vì: OECD định nghĩa ĐMST bao gồm cả sản phẩm, quy trình, tiếp thị và tổ chức.","reference":"Mục 1.1"},{"id":155,"text":"Giai đoạn nào là giai đoạn dài nh
