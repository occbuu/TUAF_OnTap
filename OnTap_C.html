ất trong vòng đời sản phẩm?","answers":["A. Tăng trưởng","B. Trưởng thành","C. Giới thiệu","D. Suy thoái"],"correct":1,"explanation":"Đáp án đúng là: Trưởng thành Vì: Đây là giai đoạn doanh thu và lợi nhuận ổn định, cạnh tranh mạnh, doanh nghiệp phải tìm cách duy trì lợi thế.","reference":"Mục 3.1"},{"id":156,"text":"Quy trình thiết kế và phát triển sản phẩm mới gồm bao nhiêu bước theo Kotler và Armstrong (2014)?","answers":["A. 8 bước","B. 7 bước","C. 5 bước","D. 6 bước"],"correct":0,"explanation":"Đáp án đúng là: 8 bước Vì: Kotler & Armstrong (2014) đã đề xuất quy trình phát triển sản phẩm mới gồm 8 bước, bao gồm: Hình thành ý tưởng Sàng lọc ý tưởng Phát triển và thử nghiệm khái niệm sản phẩm Chiến lược marketing Phân tích kinh doanh Phát triển sản phẩm Thử nghiệm thị trường","reference":"Mục 3.2"},{"id":157,"text":"Ví dụ nào là cơ hội kinh doanh tốt?","answers":["A. Kinh doanh mà không nghiên cứu thị trường","B. Bán hàng không có kế hoạch cụ thể","C. Bán sản phẩm mà thị trường đã bão hòa","D. Mở quán cà phê tại khu vực có nhu cầu cao nhưng ít đối thủ"],"correct":3,"explanation":"Đáp án đúng là: Mở quán cà phê tại khu vực có nhu cầu cao nhưng ít đối thủ Vì: Vì kinh doanh hiệu quả khi có nhu cầu lớn và ít cạnh tranh.","reference":"Mục 2.2"},{"id":158,"text":"Áp lực nào buộc doanh nghiệp phải phát triển sản phẩm mới?","answers":["A. Chỉ áp lực từ khách hàng","B. Không có áp lực nào cả","C. Áp lực từ công nghệ, thị trường và thời gian","D. Chỉ áp lực từ nhà đầu tư"],"correct":2,"explanation":"Đáp án đúng là: Áp lực từ công nghệ, thị trường và thời gian Vì: Công nghệ thay đổi nhanh chóng, thị trường luôn biến động, đòi hỏi doanh nghiệp phải sáng tạo liên tục.","reference":"Mục 3.1"},{"id":159,"text":"Ai là người chịu trách nhiệm lập kế hoạch kinh doanh trong doanh nghiệp?","answers":["A. Chỉ có bộ phận marketing","B. Chủ doanh nghiệp hoặc các cấp quản lý liên quan","C. Chỉ có giám đốc điều hành","D. Chỉ có kế toán trưởng"],"correct":1,"explanation":"Đáp án đúng là: Chủ doanh nghiệp hoặc các cấp quản lý liên quan Vì: Kế hoạch kinh doanh cần sự tham gia của chủ doanh nghiệp và các bộ phận liên quan để đảm bảo tính khả thi.","reference":"Mục 2.3"},{"id":160,"text":"Một kế hoạch kinh doanh tốt cần đảm bảo điều gì?","answers":["A. Không cần theo dõi và đánh giá","B. Không cần nghiên cứu thị trường","C. Chỉ tập trung vào tài chính","D. Có mục tiêu rõ ràng và chiến lược phù hợp"],"correct":3,"explanation":"Đáp án đúng là: Có mục tiêu rõ ràng và chiến lược phù hợp Vì: Kế hoạch kinh doanh phải có mục tiêu rõ ràng và chiến lược thực hiện cụ thể để đạt hiệu quả.","reference":"Mục 2.3"},{"id":161,"text":"Hệ sinh thái khởi nghiệp đổi mới sáng tạo có tác động gì đến nền kinh tế?","answers":["A. Thúc đẩy tăng trưởng kinh tế, tạo việc làm","B. Chỉ tập trung vào công nghệ","C. Không có ảnh hưởng đáng kể","D. Chỉ giúp cá nhân làm giàu"],"correct":0,"explanation":"Đáp án đúng là: Thúc đẩy tăng trưởng kinh tế, tạo việc làm Vì: Hệ sinh thái khởi nghiệp đổi mới sáng tạo giúp nền kinh tế phát triển bằng cách tạo ra doanh nghiệp mới, thúc đẩy công nghệ, tạo việc làm và thu hút đầu tư.","reference":"Mục 1.4"},{"id":162,"text":"Đâu không phải là loại hình ĐMST theo OECD?","answers":["A. ĐMST marketing","B. ĐMST trong kỹ thuật xây dựng","C. ĐMST quy trình","D. ĐMST sản phẩm"],"correct":1,"explanation":"Đáp án đúng là: ĐMST trong kỹ thuật xây dựng Vì: OECD không phân loại \"ĐMST trong kỹ thuật xây dựng\" như một loại hình chính thức.","reference":"Mục 1.2"},{"id":163,"text":"Một yếu tố quan trọng trong khai thác cơ hội kinh doanh là gì?","answers":["A. Không cần kế hoạch kinh doanh","B. Không cần quan tâm đến xu hướng","C. Không cần nghiên cứu sản phẩm","D. Lựa chọn đúng thị trường và khách hàng mục tiêu"],"correct":3,"explanation":"Đáp án đúng là: Lựa chọn đúng thị trường và khách hàng mục tiêu Vì: Xác định đúng thị trường và khách hàng giúp doanh nghiệp tiếp cận nhóm đối tượng phù hợp, tăng khả năng thành công.","reference":"Mục 2.2"},{"id":164,"text":"Theo Nguyễn Ngọc Huyền (2020), ý tưởng kinh doanh là gì?","answers":["A. Một kế hoạch tài chính để vận hành doanh nghiệp","B. Một mô hình doanh nghiệp có sẵn","C. Suy nghĩ, tính toán, cân nhắc về sản phẩm/dịch vụ có thể cung cấp cho thị trường","D. Chỉ liên quan đến sản phẩm công nghệ"],"correct":2,"explanation":"Đáp án đúng là: Suy nghĩ, tính toán, cân nhắc về sản phẩm/dịch vụ có thể cung cấp cho thị trường Vì: Theo Nguyễn Ngọc Huyền (2020), ý tưởng kinh doanh xuất phát từ việc nghiên cứu, đánh giá nhu cầu thị trường để xác định sản phẩm hoặc dịch vụ phù hợp.","reference":"Mục 2.1"},{"id":165,"text":"Một sản phẩm mới có thể thất bại nếu doanh nghiệp không làm gì?","answers":["A. Không hợp tác với đối thủ cạnh tranh","B. Không thuê nhiều nhân viên","C. Không nghiên cứu thị trường kỹ lưỡng","D. Không tăng giá bán"],"correct":2,"explanation":"Đáp án đúng là: Không nghiên cứu thị trường kỹ lưỡng Vì: Nếu không hiểu thị trường, doanh nghiệp có thể tung ra sản phẩm không phù hợp, dẫn đến thất bại.","reference":"Mục 3.2"},{"id":166,"text":"Kế hoạch kinh doanh là gì?","answers":["A. Một văn bản mô tả các hoạt động kinh doanh của doanh nghiệp trong tương lai","B. Một tài liệu chỉ dành cho nhà đầu tư","C. Một bảng tổng hợp doanh thu","D. Một danh sách các sản phẩm doanh nghiệp sẽ bán"],"correct":0,"explanation":"Đáp án đúng là: Một văn bản mô tả các hoạt động kinh doanh của doanh nghiệp trong tương lai Vì: Kế hoạch kinh doanh là tài liệu quan trọng mô tả mô hình hoạt động, chiến lược và mục tiêu của doanh nghiệp.","reference":"Mục 2.3"},{"id":167,"text":"Thị trường mục tiêu lý tưởng phải đáp ứng điều kiện nào?","answers":["A. Có nhu cầu cao, ít cạnh tranh và doanh nghiệp có khả năng phục vụ tốt","B. Chỉ cần sản phẩm có giá thấp hơn đối thủ","C. Chỉ cần có số lượng khách hàng lớn","D. Không cần nghiên cứu thị trường"],"correct":0,"explanation":"Đáp án đúng là: Có nhu cầu cao, ít cạnh tranh và doanh nghiệp có khả năng phục vụ tốt Vì: Một thị trường mục tiêu tốt cần có nhu cầu lớn, mức độ cạnh tranh hợp lý và doanh nghiệp có thể cung cấp sản phẩm/dịch vụ hiệu quả.","reference":"Mục 3.4"},{"id":168,"text":"Nguồn vốn nào không phổ biến đối với startup?","answers":["A. Quỹ hưu trí cá nhân","B. Nhà đầu tư thiên thần","C. Gọi vốn cộng đồng","D. Vốn đầu tư mạo hiểm"],"correct":0,"explanation":"Đáp án đúng là: Quỹ hưu trí cá nhân Vì: Startup thường cần nguồn vốn có mức độ rủi ro cao, như vốn đầu tư mạo hiểm (VC - Venture Capital), gọi vốn cộng đồng (Crowdfunding) hoặc nhà đầu tư thiên thần (Angel Investors), những nguồn này sẵn sàng rót vốn vào các doanh nghiệp mới với kỳ vọng lợi nhu","reference":"Mục 1.3"},{"id":169,"text":"Đâu không phải là yếu tố ảnh hưởng đến quyết định mua của khách hàng?","answers":["A. Thu nhập cá nhân","B. Giá trị cảm nhận từ sản phẩm","C. Màu sắc của website bán hàng","D. Số lượng nhân viên của công ty"],"correct":3,"explanation":"Đáp án đúng là: Số lượng nhân viên của công ty Vì: Quyết định mua bị ảnh hưởng bởi giá trị sản phẩm, thu nhập cá nhân, trải nghiệm mua sắm, nhưng không liên quan đến số lượng nhân viên của công ty.","reference":"Mục 3.3"},{"id":170,"text":"Lý do quan trọng để doanh nghiệp thiết kế và phát triển sản phẩm mới là gì?","answers":["A. Để thu hút nhà đầu tư","B. Để duy trì sự cạnh tranh và đáp ứng nhu cầu thị trường","C. Để giảm chi phí sản xuất","D. Chỉ để tăng lợi nhuận"],"correct":1,"explanation":"Đáp án đúng là: Để duy trì sự cạnh tranh và đáp ứng nhu cầu thị trường Vì: Nếu không đổi mới, doanh nghiệp có thể bị tụt hậu trước đối thủ cạnh tranh.","reference":"Mục 3.1"},{"id":171,"text":"Sản phẩm cải tiến là gì?","answers":["A. Một sản phẩm được phát triển với chất lượng hoặc tính năng tốt hơn","B. Một sản phẩm hoàn toàn mới trên thị trường","C. Một sản phẩm cũ với giá thấp hơn","D. Một sản phẩm thay đổi hoàn toàn về hình thức"],"correct":0,"explanation":"Đáp án đúng là: Một sản phẩm được phát triển với chất lượng hoặc tính năng tốt hơn Vì: Sản phẩm cải tiến là sản phẩm cũ nhưng có sự nâng cấp về chất lượng, tính năng hoặc công nghệ.","reference":"Mục 3.1"},{"id":172,"text":"Ví dụ nào thể hiện xu hướng xã hội tạo ra cơ hội kinh\ndoanh?","answers":["A. Sự phát triển của năng lượng mặt trời","B. Phát minh ra công nghệ in 3D","C. Ban hành Luật Doanh nghiệp mới","D. Sự gia tăng sử dụng mạng xã hội như Facebook, TikTok"],"correct":3,"explanation":"Đáp án đúng là: Sự gia tăng sử dụng mạng xã hội như Facebook, TikTok Vì: Xu hướng xã hội được hiểu là sự thay đổi trong lối sống, hành\nvi, thói quen, giá trị và nhu cầu của con người trong xã hội; Sự gia tăng sử\ndụng mạng xã hội như Facebook, TikTok” là một thay đổi trong hành vi xã hội. Nó phản ánh nhu cầu giao tiếp nhanh chóng, kết nối tức thời\nvà chia sẻ thông tin, giải trí trong cộng đồng. \nXu hướng này tạo ra cơ hội kinh doanh rất lớn: phát triển nền tảng mạng\nxã hội mới, dịch vụ quảng cáo số, thương mại điện tử qua livestream,\nKOL/Influencer marketing…","reference":"Mục 2.2"},{"id":173,"text":"Nhận diện vấn đề trong xã hội giúp gì cho kinh doanh?","answers":["A. Không cần thiết nếu đã có sản phẩm","B. Tạo ra giải pháp và cơ hội kinh doanh","C. Không có tác động đến kinh doanh","D. Chỉ làm tăng chi phí"],"correct":1,"explanation":"Đáp án đúng là: Tạo ra giải pháp và cơ hội kinh doanh Vì: Khi giải quyết một vấn đề xã hội, doanh nghiệp có thể tạo ra sản phẩm/dịch vụ có giá trị thực tiễn.","reference":"Mục 2.2"},{"id":174,"text":"Chiến lược kinh doanh là gì?","answers":["A. Cách doanh nghiệp đạt được mục tiêu kinh doanh","B. Một danh sách nhiệm vụ","C. Một báo cáo tài chính","D. Chỉ là cách tiếp cận khách hàng"],"correct":0,"explanation":"Đáp án đúng là: Cách doanh nghiệp đạt được mục tiêu kinh doanh Vì: Chiến lược kinh doanh bao gồm các phương pháp và kế hoạch để đạt được mục tiêu dài hạn.","reference":"Mục 2.3"},{"id":175,"text":"Tại sao thử nghiệm sản phẩm lại quan trọng?","answers":["A. Giúp tăng giá bán sản phẩm","B. Giúp tránh mọi rủi ro trong kinh doanh","C. Giúp doanh nghiệp tiết kiệm thời gian phát triển","D. Giúp kiểm tra phản ứng của thị trường trước khi sản xuất hàng loạt"],"correct":3,"explanation":"Đáp án đúng là: Giúp kiểm tra phản ứng của thị trường trước khi sản xuất hàng loạt Vì: Thử nghiệm sản phẩm giúp doanh nghiệp thu thập phản hồi của khách hàng, từ đó điều chỉnh sản phẩm trước khi sản xuất quy mô lớn.","reference":"Mục 3.2"},{"id":176,"text":"Cơ hội kinh doanh có thể đến từ đâu?","answers":["A. Mô hình kinh doanh thất bại","B. Một thị trường không có khách hàng","C. Sự thay đổi công nghệ","D. Một sản phẩm đã lỗi thời"],"correct":2,"explanation":"Đáp án đúng là: Sự thay đổi công nghệ Vì: Công nghệ mới có thể tạo ra các ngành nghề mới hoặc cải tiến sản phẩm/dịch vụ hiện có.","reference":"Mục 2.2"},{"id":177,"text":"ĐMST trong marketing bao gồm yếu tố nào?","answers":["A. Liên quan đến thiết kế, quảng bá, kênh phân phối","B. Không quan trọng trong kinh doanh","C. Không ảnh hưởng đến doanh thu","D. Chỉ thay đổi về giá sản phẩm"],"correct":0,"explanation":"Đáp án đúng là: Liên quan đến thiết kế, quảng bá, kênh phân phối Vì: ĐMST trong marketing không chỉ thay đổi giá mà còn tạo ra phương thức tiếp cận thị trường hiệu quả hơn.","reference":"Mục 1.2"},{"id":178,"text":"Một trong những đặc điểm quan trọng của khởi nghiệp sáng tạo là gì?","answers":["A. Không cần huy động vốn từ bên ngoài","B. Luôn đảm bảo thành công","C. Không chịu ảnh hưởng của công nghệ","D. Ứng dụng công nghệ mới để tạo ra sự khác biệt"],"correct":3,"explanation":"Đáp án đúng là: Ứng dụng công nghệ mới để tạo ra sự khác biệt Vì: Khởi nghiệp sáng tạo thường tận dụng công nghệ mới để tạo ra lợi thế cạnh tranh và khác biệt hóa sản phẩm/dịch vụ.","reference":"Mục 1.3"},{"id":179,"text":"Một cách nhận diện cơ hội kinh doanh là gì?","answers":["A. Quan sát sự thay đổi trong thói quen tiêu dùng","B. Sao chép ý tưởng nước ngoài mà không điều chỉnh","C. Kinh doanh theo sở thích cá nhân","D. Không cần quan tâm đến khách hàng"],"correct":0,"explanation":"Đáp án đúng là: Quan sát sự thay đổi trong thói quen tiêu dùng Vì: Khi thói quen tiêu dùng thay đổi, nhu cầu mới xuất hiện, mở ra cơ hội cho các sản phẩm/dịch vụ phù hợp.","reference":"Mục 2.2"},{"id":180,"text":"Thử nghiệm khái niệm sản phẩm có mục đích gì?","answers":["A. Chỉ để kiểm tra chất lượng sản phẩm","B. Thực hiện sản xuất hàng loạt ngay lập tức","C. Đánh giá phản ứng của khách hàng tiềm năng","D. Không cần thiết nếu đã có ý tưởng tốt"],"correct":2,"explanation":"Đáp án đúng là: Đánh giá phản ứng của khách hàng tiềm năng Vì: Thử nghiệm khái niệm giúp kiểm tra phản hồi của khách hàng trước khi tiếp tục phát triển sản phẩm.","reference":"Mục 3.2"},{"id":181,"text":"Hành vi mua của người tiêu dùng bao gồm mấy giai đoạn chính?","answers":["A. 5","B. 6","C. 3","D. 4"],"correct":0,"explanation":"Đáp án đúng là: 5 Vì: Quy trình gồm 5 bước: nhận biết nhu cầu → tìm kiếm thông tin → đánh giá phương án → quyết định mua → đánh giá sau mua.","reference":"Mục 3.3"},{"id":182,"text":"Vòng đời sản phẩm có bao nhiêu giai đoạn chính?","answers":["A. 6","B. 3","C. 4","D. 5"],"correct":2,"explanation":"Đáp án đúng là: 4 Vì: Theo mô hình vòng đời sản phẩm, một sản phẩm thường trải qua 4 giai đoạn chính: Giới thiệu, Tăng trưởng, Trưởng thành, Suy thoái.","reference":"Mục 3.1"},{"id":183,"text":"Đâu là lợi ích chính của đổi mới quy trình?","answers":["A. Không liên quan đến lợi nhuận","B. Chỉ thay đổi bộ máy nhân sự","C. Giảm chi phí, tăng hiệu suất sản xuất","D. Không có tác động lớn"],"correct":2,"explanation":"Đáp án đúng là: Giảm chi phí, tăng hiệu suất sản xuất Vì: Đổi mới quy trình giúp doanh nghiệp tối ưu hóa hoạt động, giảm chi phí và nâng cao năng suất.","reference":"Mục 1.1"},{"id":184,"text":"Ví dụ nào không phải là cơ hội kinh doanh?","answers":["A. Đầu tư vào năng lượng tái tạo khi nhu cầu tăng","B. Phát triển ứng dụng giao hàng trong khu vực đô thị","C. Sản xuất thực phẩm hữu cơ khi người tiêu dùng quan tâm sức khỏe","D. Mở nhà hàng khi xu hướng ăn uống tại nhà tăng cao"],"correct":3,"explanation":"Đáp án đúng là: Mở nhà hàng khi xu hướng ăn uống tại nhà tăng cao Vì: Khi xu hướng ăn tại nhà tăng, mở nhà hàng truyền thống sẽ gặp nhiều khó khăn hơn là một cơ hội kinh doanh hấp dẫn.","reference":"Mục 2.2"},{"id":185,"text":"Thị trường mới có đặc điểm gì?","answers":["A. Chưa có sản phẩm tương tự","B. Độ nhận diện thương hiệu cao","C. Đã có nhiều đối thủ cạnh tranh","D. Khách hàng đã quen thuộc với sản phẩm"],"correct":0,"explanation":"Đáp án đúng là: Chưa có sản phẩm tương tự Vì: Thị trường mới chưa có sản phẩm tương tự, nên doanh nghiệp có cơ hội tiên phong nhưng cũng gặp nhiều rủi ro.","reference":"Mục 3.4"},{"id":186,"text":"Cơ hội kinh doanh xuất phát từ đâu?","answers":["A. Nhu cầu thị trường","B. Yếu tố may mắn","C. Sở thích cá nhân","D. Sản phẩm có sẵn"],"correct":0,"explanation":"Đáp án đúng là: Nhu cầu thị trường Vì: Vì kinh doanh thành công khi đáp ứng nhu cầu thực tế của thị trường, không chỉ dựa vào sở thích hay may mắn.","reference":"Mục 2.2"},{"id":187,"text":"Mục đích chính của phần \"Dòng doanh thu\" trong mô hình Canvas là gì?","answers":["A. Xác định nguồn vốn đầu tư","B. Đưa ra phương pháp nghiên cứu thị trường","C. Đưa ra chiến lược marketing","D. Xác định nguồn thu nhập của doanh nghiệp"],"correct":3,"explanation":"Đáp án đúng là: Xác định nguồn thu nhập của doanh nghiệp Vì: Phần \"Dòng doanh thu\" giúp xác định cách doanh nghiệp tạo ra lợi nhuận từ khách hàng.","reference":"Mục 2.3"},{"id":188,"text":"Sản phẩm mới đối với toàn thế giới là gì?","answers":["A. Một sản phẩm mới nhưng không có đổi mới công nghệ","B. Một sản phẩm được cải tiến từ sản phẩm cũ","C. Một sản phẩm chưa từng xuất hiện trên thị trường","D. Một sản phẩm chỉ mới đối với công ty"],"correct":2,"explanation":"Đáp án đúng là: Một sản phẩm chưa từng xuất hiện trên thị trường Vì: Đây là loại sản phẩm mang tính đột phá, chưa từng có trên thị trường trước đó.","reference":"Mục 3.1"},{"id":189,"text":"Chính sách nào của Chính phủ giúp hỗ trợ khởi nghiệp?","answers":["A. Yêu cầu startup phải hợp tác với doanh nghiệp nhà nước","B. Giảm thuế, cung cấp quỹ hỗ trợ","C. Không hỗ trợ startup","D. Tăng thuế đối với startup"],"correct":1,"explanation":"Đáp án đúng là: Giảm thuế, cung cấp quỹ hỗ trợ Vì: Chính phủ thường đưa ra chính sách như miễn giảm thuế, cung cấp quỹ hỗ trợ tài chính, tạo môi trường pháp lý thuận lợi để thúc đẩy khởi nghiệp và đổi mới sáng tạo.","reference":"Mục 1.4"},{"id":190,"text":"MVP (Minimum Viable Product) giúp ích gì cho startup?","answers":["A. Thử nghiệm ý tưởng với chi phí thấp","B. Giảm rủi ro pháp lý","C. Không liên quan đến phát triển sản phẩm","D. Không cần thử nghiệm, triển khai ngay"],"correct":0,"explanation":"Đáp án đúng là: Thử nghiệm ý tưởng với chi phí thấp Vì: MVP giúp doanh nghiệp kiểm tra phản ứng thị trường trước khi đầu tư nhiều tài nguyên vào sản phẩm hoàn chỉnh.","reference":"Mục 2.1"},{"id":191,"text":"Sản phẩm tái định vị là gì?","answers":["A. Một sản phẩm mới hoàn toàn","B. Một sản phẩm được giới thiệu với một phân khúc thị trường mới","C. Một sản phẩm có giá thấp hơn để thu hút khách hàng","D. Một sản phẩm thay thế sản phẩm cũ"],"correct":1,"explanation":"Đáp án đúng là: Một sản phẩm được giới thiệu với một phân khúc thị trường mới Vì: Sản phẩm tái định vị là sản phẩm cũ nhưng được tiếp cận thị trường mới hoặc thay đổi cách tiếp thị.","reference":"Mục 3.1"},{"id":192,"text":"Điều gì giúp thúc đẩy đổi mới sáng tạo trong doanh nghiệp?","answers":["A. Chỉ tập trung vào sản phẩm cũ","B. Chỉ cần cắt giảm chi phí","C. Không cần quan tâm đến xu hướng thị trường","D. Tinh thần sáng tạo, đầu tư vào R&D"],"correct":3,"explanation":"Đáp án đúng là: Tinh thần sáng tạo, đầu tư vào R&D Vì: Đầu tư vào nghiên cứu và phát triển (R&D) giúp doanh nghiệp duy trì sự đổi mới và tăng tính cạnh tranh.","reference":"Mục 1.1"},{"id":193,"text":"Giai đoạn đầu tiên trong vòng đời sản phẩm là gì?","answers":["A. Giới thiệu","B. Suy thoái","C. Trưởng thành","D. Tăng trưởng"],"correct":0,"explanation":"Đáp án đúng là: Giới thiệu Vì: Đây là giai đoạn sản phẩm vừa được đưa ra thị trường, doanh thu thường thấp do khách hàng chưa quen thuộc.","reference":"Mục 3.1"},{"id":194,"text":"ĐMST đột phá có đặc điểm gì?","answers":["A. Cải tiến nhỏ lẻ","B. Không thay đổi nhiều so với sản phẩm cũ","C. Không có tính ứng dụng thực tế","D. Tạo ra những sản phẩm, mô hình kinh doanh hoàn toàn mới"],"correct":3,"explanation":"Đáp án đúng là: Tạo ra những sản phẩm, mô hình kinh doanh hoàn toàn mới Vì: ĐMST đột phá tạo ra thay đổi lớn và mở ra thị trường mới.","reference":"Mục 1.2"},{"id":195,"text":"Điều nào không phải là một yếu tố chính trong mô hình kinh doanh Canvas?","answers":["A. Kênh phân phối","B. Chiến lược phát triển cá nhân","C. Dòng doanh thu","D. Phân khúc khách hàng"],"correct":1,"explanation":"Đáp án đúng là: Chiến lược phát triển cá nhân Vì: Mô hình Canvas tập trung vào kinh doanh, không bao gồm yếu tố phát triển cá nhân.","reference":"Mục 2.3"},{"id":196,"text":"Kế hoạch tài chính trong kế hoạch kinh doanh bao gồm gì?","answers":["A. Dự báo doanh thu, lợi nhuận, chi phí","B. Không cần kế hoạch tài chính","C. Chỉ có báo cáo doanh thu","D. Chỉ có lương nhân viên"],"correct":0,"explanation":"Đáp án đúng là: Dự báo doanh thu, lợi nhuận, chi phí Vì: Kế hoạch tài chính giúp dự đoán thu nhập, chi phí và lợi nhuận để đảm bảo sự bền vững.","reference":"Mục 2.3"},{"id":197,"text":"Theo Booz, Allen và Hamilton (1982), có bao nhiêu loại sản phẩm mới?","answers":["A. 3","B. 6","C. 4","D. 5"],"correct":1,"explanation":"Đáp án đúng là: 6 Vì: Booz, Allen & Hamilton phân loại sản phẩm mới thành 6 nhóm, bao gồm sản phẩm mới hoàn toàn, dòng sản phẩm mới, mở rộng dòng sản phẩm, cải tiến sản phẩm, tái định vị và giảm chi phí.","reference":"Mục 3.1"},{"id":198,"text":"Phương pháp \"Pain Point\" dùng để làm gì?","answers":["A. Xác định các vấn đề chưa có giải pháp để kinh doanh","B. Sao chép ý tưởng của đối thủ","C. Tìm cách giảm chi phí kinh doanh","D. Dự đoán xu hướng trong tương lai"],"correct":0,"explanation":"Đáp án đúng là: Xác định các vấn đề chưa có giải pháp để kinh doanh Vì: \"Pain Point\" là phương pháp xác định những khó khăn mà khách hàng đang gặp phải, từ đó đưa ra giải pháp kinh doanh phù hợp.","reference":"Mục 2.1"}];
</script>

<script>
(function () {
  var LETTERS = "ABCDEFGHIJ";
  var container = document.getElementById("questionContainer");
  var noResults = document.getElementById("noResults");
  var searchInput = document.getElementById("searchInput");
  var searchClear = document.getElementById("searchClear");
  var countEl = document.getElementById("searchCount");
  var total = QUESTIONS.length;

  /* ── Escape HTML ── */
  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  /* ── Highlight từ khóa ── */
  function highlight(text, term) {
    if (!term) return esc(text);
    var safe = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return esc(text).replace(
      new RegExp("(" + safe.replace(/&amp;/g, "&amp;amp;") + ")", "gi"),
      "<mark>$1</mark>"
    );
  }

  /* ── Render 1 câu hỏi ── */
  function renderQ(q, term) {
    var answersHtml = q.answers.map(function (ans, i) {
      var isCorrect = i === q.correct;
      var cls = "answer-item" + (isCorrect ? " correct" : "");
      var check = isCorrect ? '<span class="check-mark">&#10003;</span>' : "";
      return (
        '<div class="' + cls + '">' +
        '<span class="answer-letter">' + (LETTERS[i] || i + 1) + ".</span>" +
        '<span class="answer-text">' + highlight(ans, term) + "</span>" +
        check +
        "</div>"
      );
    }).join("");

    var feedbackHtml = "";
    if (q.explanation || q.reference) {
      feedbackHtml =
        '<div class="feedback-section">' +
        (q.explanation
          ? "<p><strong>Vì: </strong>" + esc(q.explanation) + "</p>"
          : "") +
        (q.reference
          ? "<p><strong>Tham khảo: </strong>" + esc(q.reference) + "</p>"
          : "") +
        "</div>";
    }

    return (
      '<div class="question-block" id="q' + q.id + '">' +
      '<div class="question-header">' +
      '<span class="q-badge">Câu ' + q.id + "</span>" +
      "</div>" +
      '<div class="question-text">' + highlight(q.text, term) + "</div>" +
      '<div class="answers">' + answersHtml + "</div>" +
      feedbackHtml +
      "</div>"
    );
  }

  /* ── Render danh sách câu hỏi ── */
  function renderList(filtered, term) {
    // Xóa các block cũ (giữ lại #noResults)
    var old = container.querySelectorAll(".question-block");
    old.forEach(function (el) { el.remove(); });

    if (filtered.length === 0) {
      noResults.style.display = "block";
    } else {
      noResults.style.display = "none";
      var frag = document.createDocumentFragment();
      filtered.forEach(function (q) {
        var div = document.createElement("div");
        div.innerHTML = renderQ(q, term);
        frag.appendChild(div.firstChild);
      });
      container.appendChild(frag);
    }

    countEl.innerHTML =
      "<strong>" + filtered.length + "</strong> / " + total + " câu";
  }

  /* ── Lọc câu hỏi ── */
  function doSearch(term) {
    var t = term.trim().toLowerCase();
    var filtered = t
      ? QUESTIONS.filter(function (q) {
          return (
            q.text.toLowerCase().includes(t) ||
            q.answers.some(function (a) { return a.toLowerCase().includes(t); })
          );
        })
      : QUESTIONS;

    searchClear.style.display = term ? "block" : "none";
    renderList(filtered, term.trim());
  }

  /* ── Khởi tạo ── */
  renderList(QUESTIONS, "");

  searchInput.addEventListener("input", function () {
    doSearch(this.value);
  });
  searchClear.addEventListener("click", function () {
    searchInput.value = "";
    doSearch("");
    searchInput.focus();
  });

  /* ── Scroll to top ── */
  var scrollBtn = document.getElementById("scrollTopBtn");
  window.addEventListener("scroll", function () {
    scrollBtn.style.display = window.scrollY > 320 ? "flex" : "none";
  }, { passive: true });
  scrollBtn.addEventListener("click", function (e) {
    e.preventDefault();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
})();
</script>
</body>
</html>
