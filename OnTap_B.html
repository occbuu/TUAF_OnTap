; cấm cư trú; quản chế; tước một số quyền công dân; tịch thu tài sản, phạt tiền, trục xuất. Tham khảo: Tham khảo trong BG Text 7","reference":""},{"id":149,"text":"Thời hiệu truy cứu trách nhiệm hình sự đối với nhóm tội ít nghiêm trọng là:","answers":["A. 10 năm","B. 2 năm","C. 1 năm","D. 5 năm"],"correct":3,"explanation":"Đáp án đúng là: 5 năm Tham khảo: Tham khảo trong mục 6.2.1","reference":""},{"id":150,"text":"Trong quy phạm pháp luật: “Cá nhân có quyền có quốc tịch.” bộ phận quy định là:","answers":["A. Không có bộ phận quy định","B. Cá nhân có quyền có quốc tịch","C. Có quyền có quốc tịch","D. Cá nhân có quyền"],"correct":1,"explanation":"Đáp án đúng là: Có quyền có quốc tịch Vì: Trong quy phạm pháp luật: “Cá nhân có quyền có quốc tịch.” bộ phận quy định là: Có quyền có quốc tịch","reference":"Mục 1.3"},{"id":151,"text":"Xác định hình thức thực hiện pháp luật trong trường hợp A không thực hiện hành vi cướp giật tài sản của người khác","answers":["A. Thi hành pháp luật","B. Tuân thủ pháp luật","C. Áp dụng pháp luật","D. Sử dụng pháp luật"],"correct":1,"explanation":"Đáp án đúng là: Tuân thủ pháp luật Vì: Tuân thủ pháp luật: Là hình thức thực hiện pháp luật, trong đó các chủ thể pháp luật kiềm chế không tiến hành những hoạt động mà pháp luật ngăn cấm.","reference":"Mục 1.5"},{"id":152,"text":"Bộ luật hình sự nước ta quy định tuổi chịu trách nhiệm đối với mọi hành vi phạm tội là","answers":["A. Đủ 14 tuổi trở lên","B. Từ 16 tuổi trở lên","C. Từ 14 tuổi trở lên","D. Đủ 16 tuổi trở lên"],"correct":3,"explanation":"Đáp án đúng là: Đủ 16 tuổi trở lên Tham khảo: Tham khảo trong mục 6.2.1","reference":""},{"id":153,"text":"“Hình thức thực hiện pháp luật, trong đó các chủ thể pháp luật thực hiện quyền chủ thể của mình” là khái niệm để chỉ:","answers":["A. Áp dụng pháp luật","B. Thi hành pháp luật","C. Tuân thủ pháp luật","D. Sử dụng pháp luật"],"correct":3,"explanation":"Đáp án đúng là: Sử dụng pháp luật Vì: đây là khái niệm của hình thức sử dụng pháp luật","reference":"Mục 1.5"},{"id":154,"text":"Việt Nam đã có mấy bản Hiến pháp được ban hành","answers":["A. 4 bản","B. 6 bản","C. 5 bản","D. 3 bản"],"correct":2,"explanation":"Đáp án đúng là: 5 bản Vì: Việt Nam có 05 bản Hiến pháp, đó là: - Hiến pháp năm 1946 - Hiến pháp năm 1959 - Hiến pháp năm 1980 - Hiến pháp năm 1992, sửa đổi, bổ sung năm 2001 - Hiến pháp năm 2013.","reference":""},{"id":155,"text":"Hậu quả pháp lý bất lợi mà cá nhân, tổ chức, pháp nhân hoặc các chủ thể khác có hành vi vi phạm hành chính phải gánh chịu trước Nhà nước là","answers":["A. Trách nhiệm hành chính","B. Khách thể của vi phạm hành chính","C. Mục đích của vi phạm","D. Mặt khách quan của vi phạm hành chính"],"correct":0,"explanation":"Đáp án đúng là: Trách nhiệm hành chính Vì: Trách nhiệm hành chính là hậu quả pháp lý bất lợi mà cá nhân, tổ chức, pháp nhân hoặc các chủ thể khác có hành vi vi phạm hành chính phải gánh chịu trước nhà nước.","reference":"Mục 4.2.2"},{"id":156,"text":"Cho tình huống: A lấy B sinh được C và D; C lấy E sinh được G. Trước khi chết, A lập di chúc để lại toàn bộ tài sản cho E. Di chúc được coi là hợp pháp. Chỉ ra người được hưởng thừa kế của A?","answers":["A. E","B. E, D, C","C. E, B, D,C","D. E, B"],"correct":2,"explanation":"Đáp án đúng là: E, B Vì: Người thừa kế theo pháp luật được quy định theo thứ tự hàng thừa kế thứ nhất","reference":"Mục 5.2.3"},{"id":157,"text":"Chánh án toà án nhân dân tối cao có thẩm quyền ban hành những văn bản quy phạm pháp luật nào","answers":["A. Quyết định, chỉ thị, thông tư","B. Quyết định, chỉ thị","C. Quyết định, thông tư","D. Thông tư"],"correct":0,"explanation":"Đáp án đúng là: Thông tư Vì: Theo quy định của Luật ban hành văn bản quy phạm pháp luật","reference":"Mục 2.3.2"},{"id":158,"text":"Trong bộ máy Nhà nước Việt Nam hiện nay, Chủ tịch nước là người đứng đầu và thay mặt nhà nước về:","answers":["A. Đối nội và đối ngoại","B. Hoạt động ngoại giao","C. Điều hành mọi hoạt động của đất nước","D. Quyết định những vấn đề quan trọng của đất nước"],"correct":0,"explanation":"Đáp án đúng là: Đối nội và đối ngoại Vì: Chủ tịch nước là người đứng đầu Nhà nước CHXHCN Việt Nam, có quyền thay mặt Nhà nước về đối nội và đối ngoại Tham khảo: Chương 3, Bài 4","reference":""},{"id":159,"text":"Lỗi của chủ thể được chia làm mấy loại cơ bản","answers":["A. 3 loại","B. 4 loại","C. 5 loại","D. 6 loại"],"correct":1,"explanation":"Đáp án đúng là: 4 loại Vì: Lỗi được chia làm 4 loại là cố ý trực tiếp, cố ý gián tiếp, vô ý do cẩu thả, vô ý vì quá tự tin","reference":"Mục 1.6"},{"id":160,"text":"Cho tình huống: A trộm cắp 1 chiếc xe máy của B. Tội phạm trong tình huống này được xác định là:","answers":["A. Chiếc xe máy","B. A","C. Hành vi trộm cắp xe máy","D. B"],"correct":2,"explanation":"Đáp án đúng là: Hành vi trộm cắp xe máy Tham khảo: Tham khảo trong BG Text số 7","reference":""},{"id":161,"text":"Lựa chọn nào sau đây không phải tài sản riêng của vợ, chồng","answers":["A. Tài sản mỗi người có trước khi kết hôn","B. Tài sản phát sinh do dùng tài sản chung đầu tư","C. Tài sản được cho riêng trong thời kỳ hôn nhân","D. Đồ dùng, tư trang cá nhân"],"correct":1,"explanation":"Đáp án đúng là: Tài sản phát sinh do dùng tài sản chung đầu tư Tham khảo: Tham khảo trong BG text 8","reference":""},{"id":162,"text":"Trong quy phạm pháp luật: “Người nào đối xử tàn ác, thường xuyên ức hiếp, ngược đãi hoặc làm nhục người lệ thuộc mình làm người đó tự sát, thì bị phạt tù từ 02 năm đến 07 năm.” bộ phận quy định là:","answers":["A. Người nào đối xử tàn ác, thường xuyên ức hiếp, ngược đãi hoặc làm nhục người lệ thuộc mình làm người đó tự sát","B. Không có bộ phận quy định","C. Không được đối xử tàn ác, ức hiếp, ngược đãi hoặc làm nhục người lệ thuộc mình","D. Bị phạt tù từ 02 năm đến 07 năm"],"correct":2,"explanation":"Đáp án đúng là: Không được đối xử tàn ác, ức hiếp, ngược đãi hoặc làm nhục người lệ thuộc mình Vì: Đây là bộ phận nêu lên quy tắc xử sự mà Nhà nước đặt ra","reference":"Mục 1.3"},{"id":163,"text":"Nguồn của Luật Hành chính không bao gồm yếu tố nào dưới đây","answers":["A. Nghị quyết của Hội đồng nhân dân các cấp","B. Quyết định của Tổng Bí thư","C. Thông tư của Bộ trưởng","D. Hiến pháp, Luật, Bộ luật, Nghị quyết của Quốc hội"],"correct":1,"explanation":"Đáp án đúng là: Quyết định của Tổng Bí thư Vì: Nguồn của ngành luật Hành chính bao gồm những văn bản chứa đựng các quy phạm pháp luật hành chính được các chủ thể có thẩm quyền ban hành và sử dụng nhằm điều chỉnh các quan hệ xã hội thuộc lĩnh vực quản lý hành chính nhà nước. Cụ thể: - Hiến pháp, luật, bộ luật, nghị quyết của Quốc hội; - Pháp lệnh, nghị quyết của Ủy ban Thường vụ Quốc hội; - Lệnh, quyết định của Chủ tịch nước; - Nghị định của Chính phủ, quyết định của Thủ tướng Chính phủ; - Thông tư của Bộ trưởng, Thủ trưởng cơ quan ngang Bộ; - Nghị quyết của Hội đồng nhân dân các cấp; - Quyết định của Ủy ban nhân dân các cấp; - Các văn bản của cơ quan nhà nước ban hành để thực hiện chức năng quản lý nội bộ.","reference":"Mục 4.1.4"},{"id":164,"text":"Lựa chọn nào sau đây không chỉ một trong các điều kiện cơ bản để hợp đồng dân sự có hiệu lực:","answers":["A. Sự tự nguyện","B. Hình thức của hợp đồng phù hợp với quy định của pháp luật","C. Nội dung của hợp đồng phù hợp với ý chí của các bên","D. Chủ thể có năng lực hành vi dân sự"],"correct":2,"explanation":"Đáp án đúng là: Nội dung của hợp đồng phù hợp với ý chí của các bên Vì: Hợp đồng dân sự phát sinh hiệu lực từ thời điểm giao kết, trừ trường hợp có thỏa thuận khác hoặc pháp luật có quy định khác.","reference":"Mục 5.2.2"},{"id":165,"text":"Cho tình huống: “A lấy B sinh được C và D. C lấy E sinh được F. C chết”. Những người được hưởng thừa kế theo pháp luật của C gồm:","answers":["A. A, B, E và F","B. A, B, F và D","C. A, B, E, D và F","D. E và F"],"correct":0,"explanation":"Đáp án đúng là: A, B, E và F Vì: Những người thừa kế theo pháp luật được quy định theo thứ tự các hàng thừa kế, bao gồm: + Hàng thừa kế thứ nhất: Vợ, chồng, cha đẻ, mẹ đẻ, cha nuôi, mẹ nuôi, con đẻ, con nuôi của người chết. + Hàng thừa kế thứ hai: Ông nội, bà nội, ông ngoại, bà ngoại, anh ruột, chị ruột, em ruột của người chết; cháu ruột của người chết mà người chết là ông nội, bà nội, ông ngoại, bà ngoại. + Hàng thừa kế thứ ba: Cụ nội, cụ ngoại của người chết; bác ruột, chú ruột, cậu ruột, cô ruột, dì ruột của người chết; cháu ruột của người chết mà người chết là bác ruột, chú ruột, cậu ruột, cô ruột, dì ruột; chắt ruột của người chết mà người chết là cụ nội, cụ ngoại.","reference":"Mục 5.2.3"},{"id":166,"text":"Trường hợp nam nữ chung sống với nhau như vợ chồng, sau đó mới thực hiện việc đăng ký kết hôn thì quan hệ hôn nhân được xác lập từ thời điểm","answers":["A. Từ khi chung sống","B. Thời điểm do các bên thỏa thuận","C. Đăng ký kết hôn","D. Thời điểm có tài sản chung hoặc có con chung"],"correct":2,"explanation":"Đáp án đúng là: Đăng ký kết hôn Tham khảo: Tham khảo trong BG text 8","reference":""},{"id":167,"text":"Trường hợp nào sau đây Tòa án không được hạn chế quyền của cha mẹ trong việc chăm sóc, nuôi dưỡng con chưa thành niên","answers":["A. Cha mẹ có hành vi ép buộc con làm những việc trái pháp luật","B. Cha mẹ có hành vi phá tán tài sản của con","C. Cha, mẹ có hành vi cố ý xâm phạm sức khoẻ, nhân phẩm, danh dự của con","D. Cha mẹ có hành vi vi phạm nghiêm trọng nghĩa vụ trông nom, chăm sóc, nuôi dưỡng, giáo dục con,"],"correct":2,"explanation":"Đáp án đúng là: Cha, mẹ có hành vi cố ý xâm phạm sức khoẻ, nhân phẩm, danh dự của con Tham khảo: Tham khảo trong BG text 8","reference":""},{"id":168,"text":"Chức danh nào sau đây do Quốc hội trực tiếp bầu ra","answers":["A. Thủ trưởng cơ quan ngang Bộ","B. Bộ trưởng","C. Phó Chánh án Tòa án nhân dân tối cao","D. Tổng kiểm toán Nhà nước"],"correct":3,"explanation":"Đáp án đúng là: Tổng kiểm toán Nhà nước Tham khảo: Chương 3","reference":""},{"id":169,"text":"Hệ thống cơ quan nhà nước nào hiện nay có quyền thực hành quyền công tố","answers":["A. Viện kiểm sát","B. Chính phủ","C. Ủy ban nhân dân","D. Tòa án"],"correct":0,"explanation":"Đáp án đúng là: Viện kiểm sát","reference":"Mục 3.2.4.5"},{"id":170,"text":"Hiến pháp đầu tiên của nước ta được ban hành năm","answers":["A. 1980","B. 1992","C. 1946","D. 1959"],"correct":2,"explanation":"Đáp án đúng là: 1946 Vì: Hiến pháp đầu tiên của nước ta được ban hành ngày 9/11/1946 tại kỳ quốc hội khóa I Tham khảo: Chương 3","reference":""},{"id":171,"text":"Chủ thể có thẩm quyền ban hành Hiến pháp ở nước ta là","answers":["A. Hệ thống cơ quan quyền lực nhà nước","B. Cơ quan quyền lực nhà nước cao nhất","C. Hệ thống cơ quan nhà nước ở trung ương","D. Cơ quan hành chính nhà nước cao nhất"],"correct":1,"explanation":"Đáp án đúng là: Cơ quan quyền lực nhà nước cao nhất Vì: Quốc hội là cơ quan đại biểu cao nhất của Nhân dân, cơ quan quyền lực nhà nước cao nhất của nước Cộng hòa xã hội chủ nghĩa Việt Nam.","reference":"Mục 3.2.4"},{"id":172,"text":"Sở Tài nguyên và Môi trường là cơ quan nhà nước thuộc hệ thống cơ quan:","answers":["A. Hệ thống cơ quan quyền lực nhà nước","B. Hệ thống cơ quan xét xử","C. Hệ thống cơ quan quản lý hành chính nhà nước","D. Hệ thống cơ quan Kiểm sát"],"correct":2,"explanation":"Đáp án đúng là: Hệ thống cơ quan quản lý hành chính nhà nước","reference":"Mục 3.2.4.3"},{"id":173,"text":"Trong trường hợp nào sau đây quan hệ hôn nhân chưa chấm dứt","answers":["A. Có quyết định công nhận thuận tình ly hôn của Uỷ ban nhân dân xã","B. Có bản án của toà án xử cho ly hôn","C. Có quyết định của toà án tuyên bố người vợ hoặc người chồng chết","D. Khi vợ hoặc chồng chết"],"correct":0,"explanation":"Đáp án đúng là: Có quyết định công nhận thuận tình ly hôn của Uỷ ban nhân dân xã Tham khảo: Tham khảo trong BG text 8","reference":""},{"id":174,"text":"Ông A xây nhà lấn vào phần diện tích đất thuộc quyền sử dụng của ông B. Ông A phải chịu trách nhiệm gì","answers":["A. Trách nhiệm dân sự","B. Trách nhiệm vật chất","C. Trách nhiệm hành chính","D. Trách nhiệm hình sự"],"correct":0,"explanation":"Đáp án đúng là: Trách nhiệm dân sự Vì: Trách nhiệm dân sự: Do toà án hoặc các chủ thể khác được phép áp dụng đối với các chủ thể có hành vi vi phạm pháp luật dân sự. Các chế tài trách nhiệm dân sự chủ yếu mang tính chất bồi thường thiệt hại.","reference":"Mục 1.6"},{"id":175,"text":"Trong quy phạm pháp luật: “Mọi người có quyền bất khả xâm phạm về đời sống riêng tư, bí mật cá nhân và bí mật gia đình; có quyền bảo vệ danh dự, uy tín của mình”, bộ phận quy định là:","answers":["A. Có quyền bất khả xâm phạm","B. Mọi người có quyền","C. Có quyền bất khả xâm phạm về đời sống riêng tư, bí mật cá nhân và bí mật gia đình; có quyền bảo vệ danh dự, uy tín của mình","D. Có quyền bất khả xâm phạm về đời sống riêng tư, bí mật cá nhân và bí mật gia đình"],"correct":2,"explanation":"Đáp án đúng là: Có quyền bất khả xâm phạm về đời sống riêng tư, bí mật cá nhân và bí mật gia đình; có quyền bảo vệ danh dự, uy tín của mình Vì: Đây là bộ phận nêu lên quyu tắc xử sự do Nhà nước đặt ra","reference":"Mục 1.3"},{"id":176,"text":"Chủ sở hữu có thể khai thác được công dụng của tài sản là nhờ vào","answers":["A. Quyền nắm giữ tài sản","B. Quyền chiếm hữu","C. Quyền sử dụng","D. Quyền định đoạt"],"correct":2,"explanation":"Đáp án đúng là: Quyền sử dụng Vì: Quyền sử dụng là quyền khai thác công dụng, hưởng hoa lợi, lợi tức từ tài sản (Điều 192 Bộ luật Dân sự","reference":"Mục 5.2.1"},{"id":177,"text":"Cá nhân có đầy đủ năng lực hành vi trong lĩnh vực hình sự khi đạt độ tuổi","answers":["A. Đủ 18 tuổi trở lên","B. Đủ 16 tuổi trở lên","C. Từ 18 tuổi trở lên","D. Từ 16 tuổi trở lên"],"correct":1,"explanation":"Đáp án đúng là: Đủ 16 tuổi trở lên Vì: Khoản 1, Điều 12 BLHS quy định về tuổi chịu trách nhiệm hình sự như sau: “Người từ đủ 16 tuổi trở lên” phải chịu trách nhiệm hình sự về mọi tội phạm, trừ những tội phạm mà Bộ luật này có quy định khác. Tham khảo: Bộ luật Hình sự 2015, sửa đổi bổ sung 2017","reference":""},{"id":178,"text":"Chủ thể là yếu tố được thể hiện trong bộ phận nào của quy phạm pháp luật","answers":["A. Chế tài","B. Không được thể hiện","C. Quy định","D. Giả định"],"correct":3,"explanation":"Đáp án đúng là: Giả định Vì: Chủ thể là yếu tố được thể hiện trong bộ phận giả định của quy phạm pháp luật","reference":"Mục 1.3"},{"id":179,"text":"Cơ sở để truy cứu trách nhiệm pháp lý các chủ thể là","answers":["A. Tính chất phạm tội","B. Khả năng nhận thức của chủ thể","C. Vi phạm pháp luật","D. Mức độ gây thiệt hại của hành vi vi phạm"],"correct":2,"explanation":"Đáp án đúng là: Vi phạm pháp luật Vì: Căn cứ vào các đặc điểm cơ bản của trách nhiệm pháp lý","reference":"Mục 1.6"},{"id":180,"text":"Có mấy nhóm hình phạt được đặt ra trong Bộ luật Hình sự Việt Nam:","answers":["A. 5 nhóm","B. 2 nhóm","C. 3 nhóm","D. 4 nhóm"],"correct":1,"explanation":"Đáp án đúng là: 2 nhóm Tham khảo: Tham khảo trong mục 6.2.3","reference":""},{"id":181,"text":"Văn bản nào sau đây không phải là văn bản quy phạm pháp luật","answers":["A. Bộ luật Hình sự","B. Nghị quyết của Ủy ban Thường vụ Quốc hội","C. Quyết định của Thủ tướng Chính phủ","D. Quyết định xử phạt hành chính của Chủ tịch Ủy ban nhân dân cấp tỉnh"],"correct":3,"explanation":"Đáp án đúng là: Quyết định xử phạt hành chính của Chủ tịch Ủy ban nhân dân cấp tỉnh Vì: Theo quy định của Luật ban hành văn bản quy phạm pháp luật","reference":"Mục 2.3.2"},{"id":182,"text":"Yếu tố nào sau đây không nằm trong mặt khách quan của vi phạm pháp luật?","answers":["A. Mục đích vi phạm","B. Thời gian, địa điểm thực hiện vi phạm","C. Hậu quả do hành vi trái pháp luật gây ra","D. Hành vi trái pháp luật"],"correct":0,"explanation":"Đáp án đúng là: Mục đích vi phạm Vì: 3 đáp án còn lại là những yếu tố khách quan cấu thành vi phạm pháp luật","reference":"Mục 1.6"},{"id":183,"text":"Lựa chọn nào sau đây để chỉ một trong những điều kiện để có 1 ngành luật độc lập","answers":["A. Điều kiện của chủ thể","B. Phương pháp điều chỉnh","C. Quy phạm pháp luật","D. Các quyền và nghĩa vụ của chủ thể"],"correct":1,"explanation":"Đáp án đúng là: Phương pháp điều chỉnh Vì: Phương pháp điều chỉnh là một trong các yếu tố cơ bản để chứng minh ngành luật độc lập","reference":"Mục 2.4"},{"id":184,"text":"Lựa chọn nào dưới đây không để chỉ một yếu tố cấu thành tội phạm","answers":["A. Hình phạt","B. Khách thể","C. Chủ thể","D. Mặt khách quan"],"correct":0,"explanation":"Đáp án đúng là: Hình phạt Vì: Tham khảo: Tham khảo trong mục 6.2.1","reference":""},{"id":185,"text":"Thông qua yếu tố nào dưới đây, ta có thể thấy được rõ nhất tính chất, mức độ nguy hiểm của tội phạm","answers":["A. Chủ thể của tội phạm","B. Mặt khách quan của tội phạm","C. Mặt chủ quan của tội phạm","D. Khách thể của tội phạm"],"correct":1,"explanation":"Đáp án đúng là: Mặt khách quan của tội phạm Tham khảo: Tham khảo trong BG Text 7","reference":""},{"id":186,"text":"Cơ quan chấp hành của Quốc hội theo quy định của Hiến pháp hiện hành là:","answers":["A. Viện kiểm sát nhân dân","B. Hội đồng nhân dân","C. Toà án nhân dân","D. Chính phủ"],"correct":3,"explanation":"Đáp án đúng là: Chính phủ Vì: Điều 94 Hiến pháp 2013 quy định Chính phủ là cơ quan hành chính nhà nước cao nhất của nước Cộng hòa xã hội chủ nghĩa Việt Nam, thực hiện quyền hành pháp, là cơ quan chấp hành của Quốc hội.","reference":"Mục 3.2.4.3"},{"id":187,"text":"Trong quan hệ pháp luật “A thuê B trông giữ một chiếc xe máy với số tiền 5000đ/lượt”. Nghĩa vụ của A là","answers":["A. Giao xe máy cho B","B. Giao xe và trả tiền cho B","C. Trả tiền cho B","D. Thuê B trông xe"],"correct":1,"explanation":"Đáp án đúng là: Giao xe và trả tiền cho B Vì: Nghĩa vụ là cách xử sự mà pháp luật bắt buộc một bên của quan hệ pháp luật phải tiến hành nhằm đáp ứng quyền chủ thể của bên kia.","reference":"Mục 1.4.3"},{"id":188,"text":"Phương điều chỉnh của ngành luật nhà nước là","answers":["A. Phương pháp định nghĩa bắt buộc và phương pháp quyền uy","B. Phương pháp quyền uy","C. Phương pháp thoả thuận","D. Phương pháp mệnh lệnh phục tùng và phương pháp thoả thuận"],"correct":0,"explanation":"Đáp án đúng là: Phương pháp định nghĩa bắt buộc và phương pháp quyền uy Vì: Ngành Luật Hiến pháp thường sử dụng phương pháp quyền uy và phương pháp định nghĩa bắt buộc để điều chỉnh các quan hệ xã hội thuộc đối tượng điều chỉnh của ngành luật đó.","reference":"Mục 3.1.3"},{"id":189,"text":"Cơ quan quản lý hành chính nhà nước cao nhất ở Việt Nam là","answers":["A. Quốc hội","B. Chính phủ","C. Chủ tịch nước","D. Tòa án"],"correct":1,"explanation":"Đáp án đúng là: Chính phủ Vì: Điều 94 Hiến pháp 2013 quy định Chính phủ là cơ quan hành chính nhà nước cao nhất của nước Cộng hòa xã hội chủ nghĩa Việt Nam, thực hiện quyền hành pháp, là cơ quan chấp hành của Quốc hội.","reference":"Mục 3.2.4.3"},{"id":190,"text":"Hành vi điều khiển xe mô tô khi chưa có giấy phép lái xe thuộc loại vi phạm nào sau đây:","answers":["A. Vi phạm kỷ luật","B. Vi phạm dân sự","C. Vi phạm hình sự","D. Vi phạm hành chính"],"correct":3,"explanation":"Đáp án đúng là: Vi phạm hành chính Vì: Vi phạm hành chính là hành vi do cá nhân, tổ chức thực hiện một cách cố ý hoặc vô ý, xâm phạm các quy tắc quản lý Nhà nước và theo quy định của pháp luật phải bị xử phạt hành chính.","reference":"Mục 1.6"},{"id":191,"text":"Anh A là công an xã H, huyện G, trong lúc làm việc, do không làm chủ được cảm xúc, anh đã có hành vi đánh đập anh B. Anh B có thể tố cáo hành vi của anh A tại:","answers":["A. UBND huyện G","B. UBND xã H","C. Trưởng công an xã H","D. Tòa án huyện G"],"correct":2,"explanation":"Đáp án đúng là: Trưởng công an xã H Vì: Tố cáo là việc công dân báo cho cơ quan, tổ chức có thẩm quyền biết về hành vi vi phạm pháp luật của bất cứ cơ quan, tổ chức nào gây thiệt hại hoặc đe dọa gây thiệt hại lợi ích của nhà nước, quyền, lợi ích hợp pháp của công dân, cơ quan, tổ chức","reference":"Mục 4.2.3"},{"id":192,"text":"Loại trách nhiệm pháp lý nghiêm khắc nhất là:","answers":["A. Trách nhiệm hành chính","B. Trách nhiệm dân sự","C. Trách nhiệm hình sự","D. Trách nhiệm kỷ luật"],"correct":2,"explanation":"Đáp án đúng là: Trách nhiệm hình sự Vì: Trách nhiệm hình sự: Được tòa án áp dụng đối với những người có hành vi phạm tội được quy định trong Bộ luật Hình sự. Các chế tài trách nhiệm hình sự là nghiêm khắc nhất như cải tạo không giam giữ, tù có thời hạn, tù chung thân, tử hình...","reference":"Mục 1.6.2"},{"id":193,"text":"Lựa chọn nào sau đây không để chỉ một điều kiện kết hôn ở Việt Nam:","answers":["A. Điều kiện về sự tự nguyện","B. Điều kiện về độ tuổi kết hôn","C. Điều kiện về thu nhập","D. Điều kiện về năng lực hành vi dân sự"],"correct":2,"explanation":"Đáp án đúng là: Điều kiện về thu nhập Tham khảo: Tham khảo trong mục 7.2.1","reference":""},{"id":194,"text":"“ 1 nhóm các quy phạm điều chỉnh một nhóm các quan hệ xã hội có đặc điểm giống nhau và có quan hệ mật thiết với nhau trong cùng một loại” là khái niệm về:","answers":["A. Văn bản pháp luật","B. Quy phạm pháp luật","C. Ngành luật","D. Chế định pháp luật"],"correct":3,"explanation":"Đáp án đúng là: Chế định pháp luật Vì: Chế định pháp luật là một nhóm các quy phạm pháp luật điều chỉnh một nhóm các quan hệ xã hội có tính chất, đặc điểm giống nhau. Các quan hệ xã hội này mang tính tương đồng, có mối quan hệ mật thiết với nhau, cùng bị ảnh hưởng, chi phối bởi các điều kiện nhất định.","reference":"Mục 2.2.2"},{"id":195,"text":"Khi tìm hiểu về quyền và nghĩa vụ tài sản của vợ, chồng thì khẳng định nào sau đây chính xác","answers":["A. Vợ, chồng có trách nhiệm ngang nhau đối với tài sản chung và tài sản riêng của vợ, chồng","B. Khi ly hôn thì toàn bộ tài sản của vợ, chồng phải chia đôi","C. Vợ, chồng có quyền có tài sản riêng","D. Vợ, chồng có quyền ủy quyền cho nhau trong mọi vấn đề"],"correct":2,"explanation":"Đáp án đúng là: Vợ, chồng có quyền có tài sản riêng Vì: Đây là nhận định chính xác","reference":"Mục 7.2.2.2"},{"id":196,"text":"Lựa chọn nào không phải là một trường hợp mà cá nhân, tổ chức có thể hưởng thừa kế tài sản của người chết","answers":["A. Tổ chức tồn tại vào thời điểm mở thừa kế","B. Cá nhân còn sống vào thời điểm mở thừa kế","C. Cá nhân sinh ra sau thời điểm mở thừa kế","D. Tổ chức bị giải thể sau thời điểm mở thừa kế"],"correct":2,"explanation":"Đáp án đúng là: Cá nhân sinh ra sau thời điểm mở thừa kế Vì: Người thừa kế là cá nhân phải còn sống vào thời điểm mở thừa kế hoặc sinh ra và còn sống sau thời điểm mở thừa kế nhưng đã thành thai trước khi người để lại di sản chết.","reference":"Mục 5.2.3"},{"id":197,"text":"Ngành luật điều chỉnh các quan hệ tài sản và quan hệ nhân thân phát sinh giữa các chủ thể là ngành luật:","answers":["A. Ngành luật Dân sự","B. Ngành luật Đất đai","C. Ngành luật Hình sự","D. Ngành luật Hiến pháp"],"correct":0,"explanation":"Đáp án đúng là: Ngành luật Dân sự Vì: Đối tượng điều chỉnh của Ngành luật Dân sự là những quan hệ tài sản và những quan hệ nhân thân trong quan hệ dân sự, hôn nhân gia đình, kinh doanh thương mại và lao động.","reference":"Mục 5.1.2"},{"id":198,"text":"Chủ thể nào có thẩm quyền giải quyết khiếu nại lần 2","answers":["A. Cơ quan quản lý trực tiếp của người giải quyết khiếu nại lần 1","B. Thủ trưởng cấp trên trực tiếp của cơ quan giải quyết khiếu nại lần 1","C. Cơ quan cấp trên của cơ quan giải quyết khiếu nại lần 1","D. Người giải quyết khiếu nại lần 1"],"correct":1,"explanation":"Đáp án đúng là: Thủ trưởng cấp trên trực tiếp của cơ quan giải quyết khiếu nại lần 1 Vì: Trường hợp người khiếu nại không đồng ý với quyết định giải quyết lần đầu hoặc quá thời hạn quy định mà khiếu nại không được giải quyết thì có quyền khiếu nại lần hai đến Thủ trưởng cấp trên trực tiếp của người có thẩm quyền giải quyết khiếu nại lần đầu hoặc khởi kiện vụ án hành chính tại Tòa án theo quy định của Luật tố tụng hành chính. Tham khảo: Luật Khiếu nại 2011","reference":""},{"id":199,"text":"Yếu tố đặc trưng trong quan hệ dân sự là yếu tố","answers":["A. Tài sản","B. Tình cảm","C. Quyền và nghĩa vụ","D. Trách nhiệm"],"correct":0,"explanation":"Đáp án đúng là: Tài sản Tham khảo: Chương 5","reference":""},{"id":200,"text":"Lựa chọn nào sau đây để chỉ một yếu tố cấu thành khái niệm hệ thống pháp luật","answers":["A. Quan hệ pháp luật","B. Quy phạm pháp luật","C. Trách nhiệm pháp lý","D. Thực hiện pháp luật"],"correct":1,"explanation":"Đáp án đúng là: Quy phạm pháp luật Vì: Hệ thống pháp luật là tổng thể các quy phạm pháp luật có mối liên hệ nội tại thống nhất với nhau, được phân định thành những chế định pháp luật, các ngành luật và được thể hiện trong các văn bản pháp luật.","reference":"Mục 2.1.1"},{"id":201,"text":"A thực hiện hành vi cướp một chiếc xe máy của B. Khách thể của vi phạm pháp luật này là:","answers":["A. Quyền sở hữu tài sản của B","B. Quyền chiếm hữu xe máy của B","C. Chiếc xe máy","D. Quyền sử dụng xe máy của B"],"correct":0,"explanation":"Đáp án đúng là: Quyền sở hữu tài sản của B Vì: Khách thể của quan hệ pháp luật là những lợi ích vật chất hoặc phi vật chất và các lợi ích khác mà các chủ thể mong muốn đạt được nhằm thoả mãn nhu cầu của mình khi tham gia vào các quan hệ nhất định.","reference":"Mục 1.4.3"},{"id":202,"text":"Lựa chọn nào sau đây không phải là một căn cứ xem xét cho li hôn","answers":["A. Người vợ bị tuyên bố mất tích","B. Tình trạng trầm trọng, đời sống chung không thể kéo dài, mục đích của hôn nhân không đạt được","C. Người vợ đang nuôi con dưới 12 tháng tuổi","D. Bố, mẹ, người thân thích của vợ hoặc chồng yêu cầu khi vợ hoặc chồng bị bệnh tâm thần"],"correct":2,"explanation":"Đáp án đúng là: Người vợ đang nuôi con dưới 12 tháng tuổi Tham khảo: Tham khảo trong BG text 8","reference":""},{"id":203,"text":"Trong quy phạm pháp luật: “Giao dịch dân sự của người chưa đủ sáu tuổi do người đại diện theo pháp luật của người đó xác lập, thực hiện” bộ phận quy định là:","answers":["A. “của người đó xác lập, thực hiện”","B. “do người đại diện theo pháp luật của người đó xác lập, thực hiện”","C. Không có bộ phận quy định","D. “Giao dịch dân sự của người chưa đủ sáu tuổi do người đại diện theo pháp luật của người đó xác lập, thực hiện”"],"correct":1,"explanation":"Đáp án đúng là: “do người đại diện theo pháp luật của người đó xác lập, thực hiện” Vì: Đây là bộ phận nêu lên quy tắc xử sự mà Nhà nước đặt ra","reference":"Mục 1.3"},{"id":204,"text":"Bộ luật dân sự của nước ta hiện đang có hiệu lực là Bộ luật được Quốc hội thông qua năm","answers":["A. 2015","B. 2013","C. 1995","D. 2005"],"correct":0,"explanation":"Đáp án đúng là: 2015 Vì: Bộ Luật Dân sự số 91/2015/QH13, ngày 24/11/2015 của Quốc hội, hiệu lực thi hành từ ngày 01/01/2017","reference":""},{"id":205,"text":"Lựa chọn nào sau đây không chỉ một ngành luật độc lập ở Việt Nam hiện nay:","answers":["A. Luật Doanh nghiệp","B. Luật Hành chính","C. Luật Thương mại","D. Luật Kinh tế"],"correct":0,"explanation":"Đáp án đúng là: Luật Doanh nghiệp Vì: Các ngành luật còn lại là 1 trong số các ngành luật độc lập ở Việt Nam","reference":"Mục 2.4.2"},{"id":206,"text":"Hành vi nào sau đây không phải là hành vi vi phạm sự tự nguyện khi kết hôn","answers":["A. Cản trở hôn nhân tự nguyện, tiến bộ","B. Lừa dối để kết hôn","C. Cưỡng ép kết hôn","D. Cầu hôn"],"correct":3,"explanation":"Đáp án đúng là: Cầu hôn Tham khảo: Tham khảo trong mục 7.2.1","reference":""},{"id":207,"text":"Hành vi trái pháp luật nào sau đây là dạng hành vi hành động","answers":["A. Không cứu giúp người đang ở trong tình trạng nguy hiểm đến tính mạng","B. Không thực hiện nghĩa vụ nộp thuế","C. Không tố giác tội phạm","D. Cướp tài sản"],"correct":3,"explanation":"Đáp án đúng là: Cướp tài sản Vì: các hành vi còn lại thuộc dạng hành vi không hành động Tham khảo: Chương 1, Bài 2","reference":""},{"id":208,"text":"Lựa chọn nào sau đây không phải để chỉ một loại văn bản pháp luật ở Việt Nam","answers":["A. Văn bản thi hành pháp luật","B. Văn bản hành chính thông thường","C. Văn bản áp dụng pháp luật","D. Văn bản quy phạm pháp luật"],"correct":0,"explanation":"Đáp án đúng là: Văn bản thi hành pháp luật Vì: Cả 3 đáp án còn lại đều là một trong những loại văn bản pháp luật ở Việt Nam","reference":"Mục 2.3"},{"id":209,"text":"“Chủ thể không nhận thấy trước hành vi của mình là nguy hiểm, trong khi pháp luật yêu cầu họ cần phải thấy trước điều đó” là dấu hiệu của loại lỗi:","answers":["A. Lỗi vô ý do cẩu thả","B. Lỗi cố ý gián tiếp","C. Lỗi vô ý vì quá tự tin","D. Lỗi cố ý trực tiếp"],"correct":0,"explanation":"Đáp án đúng là: Lỗi vô ý do cẩu thả Vì: Lỗi vô ý vì cẩu thả: Là chủ thể không nhận thấy trước hậu quả thiệt hại cho xã hội do hành vi mình gây ra, mặc dù có thể nhận thấy hoặc cần phải nhận thấy trước.","reference":"Mục 1.6.1"},{"id":210,"text":"Lựa chọn nào sau đây không để chỉ một trong bốn bộ phận cấu thành của vi phạm hành chính","answers":["A. Động cơ vi phạm","B. Khách thể vi phạm","C. Mặt khách quan của vi phạm","D. Chủ thể vi phạm"],"correct":0,"explanation":"Đáp án đúng là: Động cơ vi phạm Vì: Vi phạm hành chính được cấu thành từ bốn bộ phận, gồm: - Mặt khách quan của vi phạm hành chính - Mặt chủ quan của vi phạm hành chính - Chủ thể thực hiện hành vi vi phạm hành chính - Khách thể của vi phạm hành chính.","reference":"Mục 4.2.2"},{"id":211,"text":"Mặt khách quan, mặt chủ quan, chủ thể, khách thể là những bộ phận cấu thành","answers":["A. Sự kiện pháp lý","B. Quy phạm pháp luật","C. Quan hệ pháp luật","D. Vi phạm pháp luật"],"correct":3,"explanation":"Đáp án đúng là: Vi phạm pháp luật Vì: Đây là các bộ phận cấu thành của vi phạm pháp luật","reference":"Mục 1.6"},{"id":212,"text":"Về hình thức, hệ thống pháp luật được thể hiện qua yếu tố nào dưới đây:","answers":["A. Quy phạm pháp luật","B. Chế định pháp luật","C. Ngành luật","D. Văn bản quy phạm pháp luật"],"correct":3,"explanation":"Đáp án đúng là: Văn bản quy phạm pháp luật Vì: Văn bản quy phạm pháp luật là văn bản do cơ quan nhà nước có thẩm quyền ban hành theo trình tự, thủ tục nhất định, chứa đựng các quy tắc xử sự chung, được nhà nước đảm bảo thực hiện nhằm điều chỉnh các quan hệ xã hội.","reference":"Mục 2.3.1"},{"id":213,"text":"Hình phạt bổ sung được áp dụng như thế nào?","answers":["A. Độc lập","B. Chỉ áp dụng cho tội phạm nghiêm trọng, rất nghiêm trọng","C. Không có hình phạt bổ sung nào được áp dụng","D. Đi kèm theo hình phạt chính"],"correct":3,"explanation":"Đáp án đúng là: Đi kèm theo hình phạt chính Tham khảo: Tham khảo trong BG Text 7","reference":""},{"id":214,"text":"Lựa chọn nào sau đây không phải để chỉ một biện pháp xử lý vi phạm hành chính","answers":["A. Cải tạo không giam giữ","B. Quản chế hành chính","C. Đưa vào cơ sở chữa bệnh","D. Cảnh cáo"],"correct":0,"explanation":"Đáp án đúng là: Cải tạo không giam giữ Vì: Đây là một loại hình phạt trong Bộ luật Hình sự","reference":"Mục 4.2.2"},{"id":215,"text":"Lựa chọn nào không để chỉ đối tượng của khiếu nại","answers":["A. Quyết định hành chính","B. Hành vi hành chính","C. Quyết định kỷ luật cán bộ","D. Hành vi vi phạm pháp luật của chủ thể"],"correct":3,"explanation":"Đáp án đúng là: Hành vi vi phạm pháp luật của chủ thể Tham khảo: : Mục 4.2.3 trong bg text","reference":""},{"id":216,"text":"Lựa chọn nào sau đây không để chỉ điều kiện để chủ thể có năng lực hành vi","answers":["A. Độ tuổi","B. Khả năng nhận thức","C. Được sinh ra","D. Khả năng điều khiển hành vi"],"correct":2,"explanation":"Đáp án đúng là: Được sinh ra Vì: Đây không phải là điều kiện để chủ thể có năng lực hành vi","reference":"Mục 1.4"},{"id":217,"text":"Nhà nước quy định quyền và nghĩa vụ của công dân để","answers":["A. Bảo vệ quyền và xác định nghĩa vụ cho họ","B. Buộc họ thực hiện nghĩa vụ của mình","C. Những người khác không được xâm phạm quyền lợi của họ","D. Đảm bảo họ được hưởng quyền lợi hợp pháp của mình"],"correct":0,"explanation":"Đáp án đúng là: Bảo vệ quyền và xác định nghĩa vụ cho họ Vì: Nhà nước quy định quyền và nghĩa vụ của công dân để bảo vệ quyền và xác định nghĩa vụ cho họ","reference":"Mục 1.2.3"},{"id":218,"text":"Trong những khẳng định sau khẳng định nào không chính xác","answers":["A. Viện kiểm sát nhân dân tối cao là cơ quan nhà nước thực hành quyền công tố và kiểm sát các hoạt động tư pháp","B. Tòa án nhân dân là cơ quan xét xử duy nhất  ở Việt Nam","C. Chính phủ là cơ Nhà nước và người phạm tội và các chủ thể liên quan.","reference":"Mục 2.4.2"}];
</script>

<script>
(function () {
  var LETTERS = "ABCDEFGHIJ";
  var container = document.getElementById("questionContainer");
  var noResults = document.getElementById("noResults");
  var searchInput = document.getElementById("searchInput");
  var searchClear = document.getElementById("searchClear");
  var countEl = document.getElementById("searchCount");
  var total = QUESTIONS.length;

  /* ── Escape HTML ── */
  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  /* ── Highlight từ khóa ── */
  function highlight(text, term) {
    if (!term) return esc(text);
    var safe = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return esc(text).replace(
      new RegExp("(" + safe.replace(/&amp;/g, "&amp;amp;") + ")", "gi"),
      "<mark>$1</mark>"
    );
  }

  /* ── Render 1 câu hỏi ── */
  function renderQ(q, term) {
    var answersHtml = q.answers.map(function (ans, i) {
      var isCorrect = i === q.correct;
      var cls = "answer-item" + (isCorrect ? " correct" : "");
      var check = isCorrect ? '<span class="check-mark">&#10003;</span>' : "";
      return (
        '<div class="' + cls + '">' +
        '<span class="answer-letter">' + (LETTERS[i] || i + 1) + ".</span>" +
        '<span class="answer-text">' + highlight(ans, term) + "</span>" +
        check +
        "</div>"
      );
    }).join("");

    var feedbackHtml = "";
    if (q.explanation || q.reference) {
      feedbackHtml =
        '<div class="feedback-section">' +
        (q.explanation
          ? "<p><strong>Vì: </strong>" + esc(q.explanation) + "</p>"
          : "") +
        (q.reference
          ? "<p><strong>Tham khảo: </strong>" + esc(q.reference) + "</p>"
          : "") +
        "</div>";
    }

    return (
      '<div class="question-block" id="q' + q.id + '">' +
      '<div class="question-header">' +
      '<span class="q-badge">Câu ' + q.id + "</span>" +
      "</div>" +
      '<div class="question-text">' + highlight(q.text, term) + "</div>" +
      '<div class="answers">' + answersHtml + "</div>" +
      feedbackHtml +
      "</div>"
    );
  }

  /* ── Render danh sách câu hỏi ── */
  function renderList(filtered, term) {
    // Xóa các block cũ (giữ lại #noResults)
    var old = container.querySelectorAll(".question-block");
    old.forEach(function (el) { el.remove(); });

    if (filtered.length === 0) {
      noResults.style.display = "block";
    } else {
      noResults.style.display = "none";
      var frag = document.createDocumentFragment();
      filtered.forEach(function (q) {
        var div = document.createElement("div");
        div.innerHTML = renderQ(q, term);
        frag.appendChild(div.firstChild);
      });
      container.appendChild(frag);
    }

    countEl.innerHTML =
      "<strong>" + filtered.length + "</strong> / " + total + " câu";
  }

  /* ── Lọc câu hỏi ── */
  function doSearch(term) {
    var t = term.trim().toLowerCase();
    var filtered = t
      ? QUESTIONS.filter(function (q) {
          return (
            q.text.toLowerCase().includes(t) ||
            q.answers.some(function (a) { return a.toLowerCase().includes(t); })
          );
        })
      : QUESTIONS;

    searchClear.style.display = term ? "block" : "none";
    renderList(filtered, term.trim());
  }

  /* ── Khởi tạo ── */
  renderList(QUESTIONS, "");

  searchInput.addEventListener("input", function () {
    doSearch(this.value);
  });
  searchClear.addEventListener("click", function () {
    searchInput.value = "";
    doSearch("");
    searchInput.focus();
  });

  /* ── Scroll to top ── */
  var scrollBtn = document.getElementById("scrollTopBtn");
  window.addEventListener("scroll", function () {
    scrollBtn.style.display = window.scrollY > 320 ? "flex" : "none";
  }, { passive: true });
  scrollBtn.addEventListener("click", function (e) {
    e.preventDefault();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
})();
</script>
</body>
</html>
