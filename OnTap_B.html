<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn Tập - Pháp luật đại cương (221 câu)</title>
<style>
:root {
  --blue:      #2563eb;
  --blue-dark: #1e40af;
  --blue-bg:   #eff6ff;
  --green:     #16a34a;
  --green-bg:  #f0fdf4;
  --green-bd:  #86efac;
  --yellow-bg: #fefce8;
  --yellow-bd: #fde047;
  --gray:      #6b7280;
  --gray-lt:   #f3f4f6;
  --border:    #e5e7eb;
  --text:      #111827;
  --radius:    12px;
  --shadow:    0 1px 4px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f1f5f9; color: var(--text);
  line-height: 1.65; font-size: 15px;
}

/* ── HEADER ── */
.page-header {
  background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%);
  color: #fff; padding: 28px 20px 22px; text-align: center;
  position: relative;
}
.page-header h1 { font-size: clamp(1.1em, 4vw, 1.7em); font-weight: 700; margin-bottom: 5px; }
.page-header p  { opacity: .85; font-size: .88em; }

/* ── SEARCH BAR ── */
.search-wrap {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
.search-inner {
  max-width: 860px; margin: 0 auto;
  display: flex; align-items: center; gap: 10px;
}
.search-box { flex: 1; position: relative; }
.search-box input {
  width: 100%; padding: 9px 36px 9px 38px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: .95em; outline: none; background: var(--gray-lt);
  transition: border-color .15s, background .15s;
  -webkit-appearance: none;
}
.search-box input:focus { border-color: var(--blue); background: #fff; }
.search-icon {
  position: absolute; left: 11px; top: 50%;
  transform: translateY(-50%); color: var(--gray);
  pointer-events: none; font-size: 1em;
}
.search-clear {
  position: absolute; right: 9px; top: 50%;
  transform: translateY(-50%); background: none; border: none;
  cursor: pointer; color: var(--gray); font-size: 1.1em;
  padding: 2px 4px; display: none; line-height: 1; border-radius: 50%;
}
.search-clear:hover { color: #111; background: var(--gray-lt); }
.search-count {
  white-space: nowrap; font-size: .88em; color: var(--gray);
  min-width: 90px; text-align: right;
}
.search-count strong { color: var(--blue-dark); }

/* ── CONTAINER ── */
.container {
  max-width: 860px; margin: 18px auto;
  padding: 0 14px 80px;
}

/* ── QUESTION CARD ── */
.question-block {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 16px;
  border-left: 4px solid var(--blue);
  overflow: hidden;
  transition: box-shadow .15s;
}
.question-block:hover {
  box-shadow: 0 2px 8px rgba(0,0,0,.12), 0 6px 20px rgba(0,0,0,.08);
}

.question-header {
  display: flex; align-items: center; gap: 8px;
  background: var(--blue-bg); padding: 8px 14px;
  border-bottom: 1px solid #dbeafe;
}
.q-badge {
  background: var(--blue); color: #fff;
  border-radius: 20px; padding: 1px 9px;
  font-size: .78em; font-weight: 700; letter-spacing: .3px;
}

.question-text {
  padding: 14px 16px 8px;
  font-size: 1em; font-weight: 500; color: #1e293b;
}
.question-text mark {
  background: #fef08a; color: inherit;
  border-radius: 3px; padding: 0 2px;
}

/* ── ANSWERS ── */
.answers {
  padding: 4px 16px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.answer-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 12px; border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--gray-lt);
}
.answer-item.correct {
  background: var(--green-bg);
  border-color: var(--green-bd);
  font-weight: 600;
}
.answer-letter {
  font-weight: 700; font-size: .9em;
  width: 22px; flex-shrink: 0; padding-top: 1px; color: var(--gray);
}
.answer-item.correct .answer-letter { color: var(--green); }
.answer-text {
  flex: 1; color: #374151; font-size: .95em;
}
.answer-item.correct .answer-text { color: #14532d; }
.answer-text mark {
  background: #bbf7d0; color: inherit;
  border-radius: 3px; padding: 0 2px;
}
.check-mark {
  flex-shrink: 0; margin-left: auto; padding-left: 6px;
  color: var(--green); font-weight: 700;
}

/* ── FEEDBACK ── */
.feedback-section {
  background: var(--yellow-bg);
  border-top: 1.5px solid var(--yellow-bd);
  padding: 10px 16px; font-size: .875em; color: #44403c;
}
.feedback-section p { margin: 3px 0; }
.feedback-section strong { color: #1c1917; }

/* ── EMPTY STATE ── */
#noResults {
  display: none; text-align: center;
  padding: 60px 20px; color: var(--gray);
}
#noResults .nr-icon { font-size: 2.5em; margin-bottom: 12px; }
#noResults p { font-size: .95em; }

/* ── SCROLL TOP ── */
#scrollTopBtn {
  position: fixed; bottom: 20px; right: 16px;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--blue); color: #fff; border: none;
  font-size: 1.3em; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 3px 10px rgba(37,99,235,.4);
  transition: background .15s, transform .15s;
  z-index: 200; text-decoration: none;
  line-height: 44px; text-align: center;
}
#scrollTopBtn:hover { background: var(--blue-dark); transform: translateY(-2px); }

/* ── MOBILE ── */
@media (max-width: 600px) {
  body { font-size: 14px; }
  .page-header { padding: 18px 14px 14px; }
  .container { margin: 12px auto; padding: 0 10px 80px; }
  .question-text { padding: 12px 12px 6px; }
  .answers { padding: 4px 12px 10px; gap: 5px; }
  .answer-item { padding: 7px 10px; }
  .feedback-section { padding: 9px 12px; }
  .search-count { display: none; }
}

.page-header { text-align: center; position: relative; }
.back-btn {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,.18); border: 1.5px solid rgba(255,255,255,.35);
  color: #fff; padding: 6px 13px; border-radius: 7px;
  text-decoration: none; font-size: .82em; font-weight: 600;
  white-space: nowrap; transition: background .15s; line-height: 1.4;
}
.back-btn:hover { background: rgba(255,255,255,.3); }
@media (max-width: 480px) {
  .back-btn { position: static; transform: none; display: inline-block;
              margin-bottom: 10px; font-size: .8em; }
  .page-header { padding-top: 16px; }
}
</style>
</head>

<div class="page-header">
  <a href="Index.html" class="back-btn">&#8592; Trang chủ</a>

</div>

<div class="search-wrap">
  <div class="search-inner">
    <div class="search-box">
      <span class="search-icon">&#128269;</span>
      <input type="search" id="searchInput"
             placeholder="Tìm câu hỏi hoặc đáp án..." autocomplete="off">
      <button class="search-clear" id="searchClear" title="Xóa">&#10005;</button>
    </div>
    <div class="search-count" id="searchCount">
      <strong>221</strong> / 221 câu
    </div>
  </div>
</div>

<div class="container" id="questionContainer">
  <div id="noResults">
    <div class="nr-icon">&#128269;</div>
    <p>Không tìm thấy câu hỏi phù hợp.</p>
  </div>
</div>

<script>
const QUESTIONS = [{"id":1,"text":"Hình phạt chính được áp dụng như thế nào","answers":["A. Đi kèm hình phạt bổ sung","B. Chỉ áp dụng với những tội phạm rất nghiêm trọng hoặc đặc biệt nghiêm trọng","C. Độc lập","D. Có thể được áp dụng hoặc không được áp dụng"],"correct":2,"explanation":"Đáp án đúng là: Độc lập Tham khảo: Tham khảo trong BG Text 7","reference":""},{"id":2,"text":"Theo quy định, Hiến pháp ở Việt Nam sẽ do chủ thể nào công bố","answers":["A. Chính phủ","B. Ủy ban Thường vụ Quốc hội","C. Chủ tịch nước","D. Quốc hội"],"correct":2,"explanation":"Đáp án đúng là: Chủ tịch nước","reference":"Mục 3.2.4"},{"id":3,"text":"Ngành luật đóng vai trò là cơ sở chỉ đạo cho các ngành luật khác hình thành và phát triển là:","answers":["A. Luật Dân sự","B. Luật Hình sự","C. Luật Hành chính","D. Luật Hiến pháp"],"correct":3,"explanation":"Đáp án đúng là: Luật Hiến pháp Vì: Luật Hiến pháp là hệ thống các quy phạm pháp luật điều chỉnh các quan hệ xã hội quan trọng nhất gắn liền với việc tổ chức quyền lực nhà nước của nước Cộng hòa xã hội chủ nghĩa Việt Nam.","reference":"Mục 2.4.2"},{"id":4,"text":"Văn bản luật là loại văn bản do","answers":["A. Chính phủ ban hành","B. Quốc hội ban hành","C. Cơ quan nhà nước có thẩm quyền ban hành","D. Ủy ban Thường vụ Quốc hội ban hành"],"correct":1,"explanation":"Đáp án đúng là: Quốc hội ban hành Vì: Văn bản luật là văn bản do Quốc hội - Cơ quan quyền lực cao nhất của nước Cộng hoà xã hội chủ nghĩa Việt Nam ban hành theo trình tự, thủ tục và hình thức do Hiến pháp và pháp luật hiện hành quy định","reference":"Mục 2.3.2"},{"id":5,"text":"Nhóm tội ít nghiêm trọng có mức cao nhất của khung hình phạt dành cho tội đó là:","answers":["A. Đến 5 năm tù","B. Đến 7 năm tù","C. Đến 2 năm tù","D. Đến 3 năm tù"],"correct":3,"explanation":"Đáp án đúng là: Đến 3 năm tù Vì: Nhóm tội ít nghiêm trọng là nhóm tội gây nguy hiểm không lớn cho xã hội và mức cao nhất của khung hình phạt dành cho tội đó là đến 3 năm tù.","reference":"Mục 6.2.1.3"},{"id":6,"text":"Cơ quan có quyền thay mặt nhân dân để thực hiện quyền lực nhà nước là cơ quan nào:","answers":["A. Chính phủ","B. Hội đồng nhân dân","C. Tòa án nhân dân","D. Viện kiểm sát nhân dân"],"correct":1,"explanation":"Đáp án đúng là: Hội đồng nhân dân Vì: Hiến pháp 2013 quy định Hội đồng nhân dân là cơ quan quyền lực nhà nước ở địa phương, đại diện cho ý chí, nguyện vọng và quyền làm chủ của nhân dân, do nhân dân địa phương bầu ra, chịu trách nhiệm trước nhân dân địa phương và cơ quan nhà nước cấp trên.","reference":"Mục 3.2.4.1"},{"id":7,"text":"Hành vi nào sau đây là vi phạm pháp luật hình sự","answers":["A. Vượt đèn đỏ khi tham gia giao thông","B. Xây dựng nhà trái phép","C. Lạm dụng tín nhiệm chiếm đoạt tài sản","D. Điều khiển xe ô tô khi trong cơ thể có nồng độ cồn"],"correct":2,"explanation":"Đáp án đúng là: Lạm dụng tín nhiệm chiếm đoạt tài sản Vì: Đây là hành vi trái pháp luật xâm hại đến các quan hệ xã hội được pháp luật Hình sự bảo vệ.","reference":"Mục 1.6"},{"id":8,"text":"Chức danh nào sau đây không phải do Quốc hội bầu","answers":["A. Chủ tịch Quốc hội","B. Phó chủ tịch Quốc hội","C. Phó Viện trưởng Viện kiểm sát nhân dân tối cao","D. Viện trưởng viện kiểm sát nhân dân tối cao"],"correct":2,"explanation":"Đáp án đúng là: Phó Viện trưởng Viện kiểm sát nhân dân tối cao Vì: Phó chủ tịch Quốc hội, Chủ tịch Quốc hội, Viện trưởng viện kiểm sát nhân dân tối cao sẽ do Quốc hội bầu","reference":"Mục 3.2"},{"id":9,"text":"Khẳng định nào sau đây chính xác:","answers":["A. Những giao dịch liên quan đến tài sản chung có giá trị lớn của vợ chồng do một bên vợ hoặc chồng thực hiện đều bị coi là vô hiệu","B. Quan hệ nuôi con nuôi chỉ chấm dứt khi có sự thỏa thuận của cha mẹ nuôi và con nuôi","C. Khi vợ hoặc chồng thực hiện những giao dịch phục vụ cho nhu cầu thiết yếu của gia đình mà không có sự đồng ý của bên kia thì người thực hiện giao dịch đó phải thanh toán bằng tài sản riêng của mình","D. Nam tròn 20 tuổi, nữ tròn 18 tuổi trở lên mới được đăng ký kết hôn"],"correct":0,"explanation":"Đáp án đúng là: Những giao dịch liên quan đến tài sản chung có giá trị lớn của vợ chồng do một bên vợ hoặc chồng thực hiện đều bị coi là vô hiệu Vì: Đây là nhận định đúng Tham khảo: Luật Hôn nhân gia đình năm 2014","reference":""},{"id":10,"text":"Hệ thống cơ quan có nhiệm vụ trực tiếp tổ chức thực hiện pháp luật là:","answers":["A. Hệ thống cơ quan kiểm sát","B. Hệ thống cơ quan quản lý hành chính nhà nước","C. Hệ thống cơ quan quyền lực nhà nước","D. Hệ thống cơ quan xét xử"],"correct":1,"explanation":"Đáp án đúng là: Hệ thống cơ quan quản lý hành chính nhà nước Vì: Hệ thống cơ quan quản lý hành chính là nơi trực tiếp tổ chức việc thực thi pháp luật, trực tiếp thực hiện các chức năng quản lý, điều hành mọi công việc trên tất cả các lĩnh vực của đời sống xã hội.","reference":"Mục 3.2.4"},{"id":11,"text":"Lựa chọn nào sau đây thể hiện quan điểm của Nhà nước ta về hôn nhân đồng giới","answers":["A. Nghiêm cấm việc kết hôn giữa những người cùng giới tính","B. Không thể hiện rõ quan điểm","C. Không thừa nhận việc kết hôn giữa những người cùng giới tính","D. Cho phép việc kết hôn giữa những người cùng giới tính"],"correct":2,"explanation":"Đáp án đúng là: Không thừa nhận việc kết hôn giữa những người cùng giới tính Vì: Nhà nước không thừa nhận hôn nhân giữa những người cùng giới tính. Tham khảo: Luật Hôn nhân gia đình năm 2014 (Điều 8)","reference":""},{"id":12,"text":"Cá nhân có năng lực trách nhiệm hình sự một phần khi đạt độ tuổi","answers":["A. Từ đủ 9 tuổi đến dưới 13 tuổi","B. Từ đủ 16 tuổi đến dưới 18 tuổi","C. Từ đủ 14 tuổi đến dưới 18 tuổi","D. Từ đủ 14 tuổi đến dưới 16 tuổi"],"correct":3,"explanation":"Đáp án đúng là: Từ đủ 14 tuổi đến dưới 16 tuổi Tham khảo: Tham khảo trong BG Text 7","reference":""},{"id":13,"text":"Yếu tố nào thuộc mặt chủ quan của vi phạm hành chính","answers":["A. Mối quan hệ nhân quả giữa hành vi và hậu quả","B. Lỗi","C. Chủ thể vi phạm","D. Hậu quả nguy hiểm"],"correct":1,"explanation":"Đáp án đúng là: Lỗi Vì: Vi phạm hành chính là hành vi có lỗi (cố ý hoặc vô ý)","reference":"Mục 4.2.2"},{"id":14,"text":"Theo quy định của pháp luật, độ tuổi để con được tự quản lý tài sản riêng là","answers":["A. Từ đủ 9 tuổi trở lên","B. Từ đủ 16 tuổi trở lên","C. Từ đủ 15 tuổi trở lên","D. Từ đủ 18 tuổi trở lên"],"correct":2,"explanation":"Đáp án đúng là: Từ đủ 15 tuổi trở lên Tham khảo: Tham khảo trong BG text 8","reference":""},{"id":15,"text":"Theo quy định của pháp luật, cơ quan có thẩm quyền xử cho vợ chồng ly hôn là:","answers":["A. Viện kiểm sát","B. Hội đồng nhân dân","C. Tòa án","D. Ủy ban nhân dân"],"correct":2,"explanation":"Đáp án đúng là: Tòa án Tham khảo: Tham khảo trong mục 7.2.4","reference":""},{"id":16,"text":"A đánh B gây thương tích 15%, A phải chịu trách nhiệm pháp lý gì về hành vi vi phạm đó","answers":["A. Trách nhiệm vật chất","B. Trách nhiệm dân sự","C. Trách nhiệm hình sự","D. Trách nhiệm hành chính"],"correct":2,"explanation":"Đáp án đúng là: Trách nhiệm hình sự Vì: Theo quy định của pháp luật, hành vi vi phạm này phải chịu trách nhiệm hình sự","reference":"Mục 1.6"},{"id":17,"text":"Nhờ có vai trò nào mà pháp luật có thể bảo đảm tính ổn định trước sự phát triển không ngừng của cuộc sống","answers":["A. Pháp luật là phương tiện để nhà nước quản lý mọi mặt đời sống xã hội","B. Pháp luật là cơ sở để thiết lập, củng cố và tăng cường quyền lực nhà nước","C. Pháp luật góp phần tạo dựng mối quan hệ mới","D. Pháp luật tạo ra môi trường ổn định cho việc thiết lập mối quan hệ bang giao giữa các quốc gia"],"correct":2,"explanation":"Đáp án đúng là: Pháp luật góp phần tạo dựng mối quan hệ mới Vì: Pháp luật góp phần tạo dựng mối quan hệ mới đóng vai trò khiến pháp luật có thể bảo đảm tính ổn định trước sự phát triển không ngừng của cuộc sống","reference":"Mục 1.2"},{"id":18,"text":"“Chủ thể vi phạm nhận thức rõ hành vi của mình là nguy hiểm cho xã hội, thấy trước được hậu quả của hành vi đó, tuy không mong muốn song có ý thức để mặc cho hậu quả đó xảy ra” là dấu hiệu của lỗi:","answers":["A. Vô ý vì quá tự tin","B. Cố ý gián tiếp","C. Cố ý trực tiếp","D. Vô ý do cẩu thả"],"correct":1,"explanation":"Đáp án đúng là: Cố ý gián tiếp Vì: Lỗi cố ý gián tiếp: Là chủ thể vi phạm nhận thức rõ hành vi của mình là nguy hiểm cho xã hội, thấy trước được hậu quả của hành vi đó, tuy không mong muốn song có ý thức để mặc cho hậu quả đó xảy ra.","reference":"Mục 1.6.1"},{"id":19,"text":"Chủ thể nào sau đây có thẩm quyền ban hành văn bản quy phạm pháp luật là Nghị quyết","answers":["A. Chủ tịch nước","B. Chính phủ","C. Ủy ban nhân dân các cấp","D. Ủy ban Thường vụ Quốc hội"],"correct":3,"explanation":"Đáp án đúng là: Ủy ban Thường vụ Quốc hội Vì: theo quy định của Luật ban hành văn bản quy phạm pháp luật","reference":"Mục 3.3.2"},{"id":20,"text":"Khẳng định nào sau đây chính xác","answers":["A. Các quan hệ pháp luật có sự tham gia của cơ quan hành chính nhà nước đều là quan hệ pháp luật hành chính","B. Vi phạm hành chính chỉ do chủ thể là cá nhân thực hiện","C. Xử phạt hành chính chỉ được tiến hành khi có vi phạm hành chính","D. Chủ thể đạt đủ tuổi theo quy định sẽ có đầy đủ năng lực hành vi hành chính"],"correct":2,"explanation":"Đáp án đúng là: Xử phạt hành chính chỉ được tiến hành khi có vi phạm hành chính Vì: Xử phạt vi phạm hành chính được áp dụng đối với các cá nhân, cơ quan, tổ chức có hành vi cố ý hoặc vô ý vi phạm các quy định của pháp luật về quản lý nhà nước mà không phải là tội phạm và theo quy định của pháp luật phải bị xử phạt hành chính","reference":"Mục 4.2.2"},{"id":21,"text":"“Cách thức, biện pháp mà bộ máy hành chính nhà nước tiến hành để thực hiện chức năng, nhiệm vụ của mình và những cách thức, biện pháp tác động lên các đối tượng quản lý nhằm yêu cầu các đối tượng đó có những hành vi xử sự cần thiết” là khái niệm để chỉ:","answers":["A. Trách nhiệm hành chính","B. Phương pháp điều chỉnh của ngành luật Hành chính","C. Phương pháp quản lý hành chính nhà nước","D. Nguyên tắc cơ bản trong quản lý hành chính nhà nước"],"correct":2,"explanation":"Đáp án đúng là: Phương pháp quản lý hành chính nhà nước","reference":"Mục 4.2.1"},{"id":22,"text":"Thời hiệu khởi kiện để yêu cầu chia di sản thừa kế là:","answers":["A. 10 năm","B. 7 năm","C. 20 năm","D. 3 năm"],"correct":0,"explanation":"Đáp án đúng là: 10 năm Vì: Thời hiệu để người thừa kế yêu cầu chia di sản là 30 năm đối với bất động sản, 10 năm đối với động sản, kể từ thời điểm mở thừa kế Tham khảo: Bộ Luật dân sự (Điều 623)","reference":""},{"id":23,"text":"Lựa chọn nào sau đây không phải là nguồn của Luật Hành chính","answers":["A. Quyết định của cơ quan có thẩm quyền xử phạt anh A về hành vi vượt đèn đỏ","B. Luật xử lý vi phạm hành chính","C. Nghị định của Chính phủ","D. Hiến pháp"],"correct":0,"explanation":"Đáp án đúng là: Quyết định của cơ quan có thẩm quyền xử phạt anh A về hành vi vượt đèn đỏ Vì: Nguồn của ngành luật Hành chính bao gồm: - Hiến pháp, luật, bộ luật, nghị quyết của Quốc hội; - Pháp lệnh, nghị quyết của Ủy ban Thường vụ Quốc hội; - Lệnh, quyết định của Chủ tịch nước; - Nghị định của Chính phủ, quyết định của Thủ tướng Chính phủ; - Thông tư của Bộ trưởng, Thủ trưởng cơ quan ngang Bộ; - Nghị quyết của Hội đồng nhân dân các cấp; - Quyết định của Ủy ban nhân dân các cấp; - Các văn bản của cơ quan nhà nước ban hành để thực hiện chức năng quản lý nội bộ.","reference":"Mục 4.1.4"},{"id":24,"text":"Lựa chọn nào sau đây không để chỉ dấu hiệu của vi phạm hành chính","answers":["A. Chủ thể phải chịu trách nhiệm do hành vi của mình gây ra","B. Là hành vi do chủ thể có năng lực trách nhiệm pháp lý thực hiện","C. Là hành vi có lỗi","D. Là hành vi ít nguy hiểm hơn so với tội phạm hình sự"],"correct":0,"explanation":"Đáp án đúng là: Chủ thể phải chịu trách nhiệm do hành vi của mình gây ra Vì: Vi phạm hành chính có các dấu hiệu sau: - Vi phạm hành chính là hành vi trái pháp luật xâm phạm các quy tắc quản lý nhà nước trong các lĩnh vực khác nhau của đời sống xã hội - Vi phạm hành chính là hành vi ít nguy hiểm cho xã hội hơn so với tội phạm hình sự - Vi phạm hành chính là hành vi có lỗi (cố ý hoặc vô ý) - Vi phạm hành chính là hành vi do các chủ thể có năng lực trách nhiệm pháp lý thực hiện - Theo quy định của pháp luật, hành vi vi phạm đó phải bị xử lý hành chính.","reference":"Mục 4.2.2"},{"id":25,"text":"Đối tượng của tố cáo là","answers":["A. Hành vi hành chính","B. Quyết định xử lý kỷ luật viên chức","C. Quyết định hành chính","D. Hành vi vi phạm pháp luật của bất kỳ ai"],"correct":3,"explanation":"Đáp án đúng là: Hành vi vi phạm pháp luật của bất kỳ ai Vì: Tố cáo là việc công dân báo cho cơ quan, tổ chức, cá nhân có thẩm quyền biết về hành vi vi phạm pháp luật của bất cứ cơ quan, tổ chức, cá nhân nào gây thiệt hại hoặc đe dọa gây thiệt hại lợi ích của nhà nước, quyền, lợi ích hợp pháp của công dân, cơ quan, tổ chức Tham khảo: 4.2.3 trong bg text","reference":""},{"id":26,"text":"Bộ phận nào trong quy phạm pháp luật trả lời câu hỏi “làm như thế nào?”","answers":["A. Quy định và chế tài","B. Chế tài","C. Giả định","D. Quy định"],"correct":0,"explanation":"Đáp án đúng là: Quy định Vì: Bộ phận quy định trong quy phạm pháp luật trả lời câu hỏi “làm như thế nào?”","reference":"Mục 1.3"},{"id":27,"text":"Trong quy phạm pháp luật: “Người ngồi trên xe mô tô, xe gắn máy khi tham gia giao thông phải đội mũ bảo hiểm”, bộ phận giả định là","answers":["A. Người ngồi trên xe mô tô, xe gắn máy khi tham gia giao thông","B. Người ngồi trên xe mô tô, xe gắn máy khi tham gia giao thông phải đội mũ bảo hiểm","C. Không có phần giả định","D. Người ngồi trên xe mô tô, xe gắn máy"],"correct":0,"explanation":"Đáp án đúng là: Người ngồi trên xe mô tô, xe gắn máy khi tham gia giao thông Vì: Trong quy phạm pháp luật: “Người ngồi trên xe mô tô, xe gắn máy khi tham gia giao thông phải đội mũ bảo hiểm”, bộ phận giả định là: Người ngồi trên xe mô tô, xe gắn máy khi tham gia giao thông","reference":"Mục 1.3"},{"id":28,"text":"Điểm khác biệt cơ bản nhất của pháp luật với tập quán là","answers":["A. Tính hệ thống","B. Tính bắt buộc thi hành","C. Thể hiện lợi ích chung của cộng đồng","D. Là quy tắc xử sự"],"correct":1,"explanation":"Đáp án đúng là: Tính bắt buộc thi hành Vì: Tính bắt buộc thi hành là điểm khác biệt cơ bản nhất của pháp luật với tập quán Tham khảo: Chương 2","reference":""},{"id":29,"text":"Chủ thể luôn luôn tham gia vào quan hệ pháp luật hành chính là","answers":["A. Công dân Việt Nam","B. Người nước ngoài, người không quốc tịch","C. Cơ quan nhà nước hoặc tổ chức xã hội được nhà nước trao quyền","D. Tổ chức xã hội"],"correct":2,"explanation":"Đáp án đúng là: Cơ quan nhà nước hoặc tổ chức xã hội được nhà nước trao quyền","reference":"Mục 4.1"},{"id":30,"text":"Cơ quan chấp hành của Hội đồng nhân dân tỉnh là","answers":["A. Viện kiểm sát nhân dân tỉnh","B. Các Sở, ban, ngành khối tỉnh","C. Tòa án nhân dân tỉnh","D. Ủy ban nhân dân tỉnh"],"correct":3,"explanation":"Đáp án đúng là: Ủy ban nhân dân tỉnh Vì: Ủy ban nhân dân là cơ quan chấp hành của Hội đồng nhân dân cùng cấp Tham khảo: Chương 3, Bài 4","reference":""},{"id":31,"text":"Lựa chọn nào sau đây không để chỉ một loại hình phạt chính:","answers":["A. Tước một số quyền công dân","B. Phạt tiền","C. Cải tạo không giam giữ","D. Phạt tù có thời hạn"],"correct":0,"explanation":"Đáp án đúng là: Tước một số quyền công dân Vì: Hình phạt chính: Là hình phạt cơ bản được áp dụng cho một tội phạm và được tuyên độc lập, một tội phạm chỉ có một hình phạt chính như: Cảnh cáo, phạt tiền, trục xuất, cải tạo không giam giữ, tù có thời hạn, tù chung thân, tử hình.","reference":"Mục 6.2.2"},{"id":32,"text":"Thông qua pháp luật, nhà nước cho phép người dân được làm gì, không được làm gì hay bắt buộc họ phải làm gì, làm như thế nào,…Nội dung trên thể hiện đặc trưng nào của pháp luật","answers":["A. Pháp luật có tính quy phạm phổ biến","B. Pháp luật có tính hệ thống","C. Pháp luật có tính quyền lực","D. Pháp luật có tính xác định về hình thức"],"correct":2,"explanation":"Đáp án đúng là: Pháp luật có tính quyền lực Vì: Đây là đặc trưng thể hiện yếu tố quyền lực của pháp luật","reference":"Mục 1.2"},{"id":33,"text":"Xác định hình thức thực hiện pháp luật trong tình huống: “Tòa án nhân dân huyện A tuyên án anh B 5 năm tù vì hành vì cướp tài sản”","answers":["A. Sử dụng pháp luật","B. Thi hành pháp luật","C. Tuân thủ pháp luật","D. Áp dụng pháp luật"],"correct":3,"explanation":"Đáp án đúng là: Áp dụng pháp luật Vì: Áp dụng pháp luật: Là việc Nhà nước thông qua các cơ quan có thẩm quyền hoặc nhà chức trách tổ chức cho các chủ thể pháp luật thực hiện những quy định của pháp luật, hoặc tự mình căn cứ vào các quy định của pháp luật ra các quyết định áp dụng pháp luật vào những trường hợp cụ thể của đời sống xã hội.","reference":"Mục 1.5"},{"id":34,"text":"“Quyền nắm giữ, quản lý tài sản của chủ thể” là khái niệm để chỉ","answers":["A. Quyền chiếm hữu tài sản","B. Quyền sở hữu tài sản","C. Quyền sử dụng tài sản","D. Quyền định đoạt tài sản"],"correct":0,"explanation":"Đáp án đúng là: Quyền chiếm hữu tài sản Vì: Quyền chiếm hữu là quyền nắm giữ, quản lý tài sản (Điều 182 Bộ luật Dân sự); có thể là chiếm hữu có căn cứ pháp luật hoặc chiếm hữu không có căn cứ pháp luật.","reference":"Mục 5.2.1"},{"id":35,"text":"Đâu là phương pháp quản lý hành chính nhà nước","answers":["A. Phương pháp cưỡng chế","B. Phương pháp thỏa thuận","C. Phương pháp mệnh lệnh","D. Phương pháp bình đẳng"],"correct":0,"explanation":"Đáp án đúng là: Phương pháp cưỡng chế Vì: Phương pháp cưỡng chế là biện pháp mà chủ thể quản lý áp dụng đối với đối tượng quản lý nhằm bắt buộc đối tượng quản lý phải tuân thủ pháp luật, theo đó họ phải thực hiện hoặc không được thực hiện một hay nhiều hành vi nhất định.","reference":"Mục 4.2.1.2"},{"id":36,"text":"Bộ phận nào trong quy phạm pháp luật trả lời câu hỏi “hoàn cảnh, điều kiện nào?”","answers":["A. Quy định","B. Giả định","C. Chế tài","D. Giả định và quy định"],"correct":1,"explanation":"Đáp án đúng là: Giả định Vì: Bộ phận giả định trong quy phạm pháp luật trả lời câu hỏi “hoàn cảnh, điều kiện nào?”","reference":"Mục 1.3.3"},{"id":37,"text":"Chủ thể nào sau đây không thuộc hàng thừa kế thứ 3 của người chết","answers":["A. Cụ nội","B. Cậu ruột","C. Chị ruột","D. Cô ruột"],"correct":2,"explanation":"Đáp án đúng là: Chị ruột Vì: Hàng thừa kế thứ ba: Cụ nội, cụ ngoại của người chết; bác ruột, chú ruột, cậu ruột, cô ruột, dì ruột của người chết; cháu ruột của người chết mà người chết là bác ruột, chú ruột, cậu ruột, cô ruột, dì ruột; chắt ruột của người chết mà người chết là cụ nội, cụ ngoại.","reference":"Mục 5.2.3"},{"id":38,"text":"Xác định hình thức thực hiện pháp luật trong tình huống: “A phối hợp cùng lực lượng công an để bắt giữ đối tượng gây mất trật tự công cộng tại địa phương”","answers":["A. Sử dụng pháp luật","B. Thi hành pháp luật","C. Tuân thủ pháp luật","D. Áp dụng pháp luật"],"correct":1,"explanation":"Đáp án đúng là: Thi hành pháp luật Vì: Thi hành pháp luật: Là hình thức thực hiện pháp luật, trong đó các chủ thể pháp luật thực hiện nghĩa vụ pháp lý của mình bằng hành động tích cực.","reference":"Mục 1.5"},{"id":39,"text":"Chủ thể nào sau đây có thể làm đơn tố cáo","answers":["A. Công dân","B. Viên chức","C. Tổ chức","D. Công chức"],"correct":0,"explanation":"Đáp án đúng là: Công dân Vì: Tố cáo là việc công dân báo cho cơ quan, tổ chức, cá nhân có thẩm quyền biết về hành vi vi phạm pháp luật của bất cứ cơ quan, tổ chức, cá nhân nào gây thiệt hại hoặc đe dọa gây thiệt hại lợi ích của nhà nước, quyền, lợi ích hợp pháp của công dân, cơ quan, tổ chức.","reference":"Mục 4.2.3"},{"id":40,"text":"Chủ thể nào sau đây không ban hành văn bản quy phạm pháp luật là nghị quyết:","answers":["A. Hội đồng nhân dân các cấp","B. Chính phủ","C. Quốc hội","D. Ủy ban Thường vụ Quốc hội"],"correct":1,"explanation":"Đáp án đúng là: Chính phủ Vì: theo quy định của Luật ban hành văn bản quy phạm pháp luật","reference":"Mục 2.3.2"},{"id":41,"text":"Đối tượng điều chỉnh của ngành luật Hôn nhân và gia đình là","answers":["A. Các quan hệ hôn nhân","B. Quan hệ tài sản","C. Các quan hệ nhân thân và quan hệ tài sản giữa các thành viên trong gia đình","D. Quan hệ nhân thân"],"correct":2,"explanation":"Đáp án đúng là: Các quan hệ nhân thân và quan hệ tài sản giữa các thành viên trong gia đình Tham khảo: Tham khảo trong mục 7.1.2","reference":""},{"id":42,"text":"Lựa chọn nào sau đây không phải là một đặc trưng cơ bản của pháp luật:","answers":["A. Tính tự nguyện, tự giác","B. Tính quy phạm phổ biến","C. Tính ý chí","D. Tính xã hội"],"correct":0,"explanation":"Đáp án đúng là: Tính tự nguyện, tự giác Vì: Tính tự nguyện, tự giác không phải là một đặc trưng cơ bản của pháp luật","reference":"Mục 1.2"},{"id":43,"text":"“Tổng thể các quy phạm pháp luật có mối liên hệ nội tại, thống nhất với nhau, được phân chia thành các chế định pháp luật và các ngành luật” là khái niệm để chỉ","answers":["A. Cấu trúc của hệ thống pháp luật","B. Văn bản pháp luật","C. Pháp luật","D. Hệ thống pháp luật"],"correct":0,"explanation":"Đáp án đúng là: Cấu trúc của hệ thống pháp luật Vì: Hệ thống pháp luật là tổng thể các quy phạm pháp luật có mối liên hệ nội tại thống nhất với nhau, được phân định thành những chế định pháp luật, các ngành luật và được thể hiện trong các văn bản pháp luật.","reference":"Mục 2.1"},{"id":44,"text":"Lựa chọn nào sau đây là vi phạm pháp luật hành chính","answers":["A. Vượt đèn đỏ","B. Nghỉ học quá số buổi quy định","C. Lừa đảo chiếm đoạt 10.000.000đ","D. Cướp giật điện thoại"],"correct":0,"explanation":"Đáp án đúng là: Vượt đèn đỏ Vì: Luật Hành chính là một ngành luật độc lập trong hệ thống pháp luật Việt Nam, bao gồm tổng hợp những quy phạm pháp luật do nhà nước ban hành hoặc thừa nhận, nhằm điều chỉnh những quan hệ xã hội phát sinh trong quá trình quản lý hành chính nhà nước của các cơ quan nhà nước có thẩm quyền, các tổ chức, cá nhân được nhà nước trao quyền.","reference":"Mục 4.1.1"},{"id":45,"text":"Xác định hình thức thực hiện pháp luật trong tình huống: “A mang tiền đi nộp thuế tại cơ quan có thẩm quyền”","answers":["A. Thi hành pháp luật","B. Tuân thủ pháp luật","C. Sử dụng pháp luật","D. Áp dụng pháp luật"],"correct":0,"explanation":"Đáp án đúng là: Thi hành pháp luật Vì: Thi hành pháp luật: Là hình thức thực hiện pháp luật, mà các chủ thể pháp luật thực hiện nghĩa vụ pháp lý của mình","reference":"Mục 1.5"},{"id":46,"text":"Trong quy phạm pháp luật: “Công dân có quyền tự do đi lại và cư trú ở trong nước, có quyền ra nước ngoài và từ nước ngoài về nước”, bộ phận giả định là","answers":["A. Công dân có quyền tự do đi lại và cư trú ở trong nước, có quyền ra nước ngoài và từ nước ngoài về nước","B. Công dân có quyền","C. Công dân có quyền tự do đi lại và cư trú ở trong nước","D. Công dân"],"correct":0,"explanation":"Đáp án đúng là: Công dân Vì: Giả định bao gồm các điều kiện, hoàn cảnh có thể xảy ra trong thực tế đời sống và chủ thể trong điều kiện và hoàn cảnh đó. Tương ứng với việc trả lời cho hai câu hỏi: Ai?, trong điều kiện nào, tình huống nào?","reference":"Mục 1.3.3"},{"id":47,"text":"Khẳng định nào sau đây không chính xác","answers":["A. Nhà nước không thể tồn tại thiếu pháp luật","B. Nhu cầu về pháp luật là nhu cầu tự thân của bộ máy nhà nước","C. Pháp luật do nhà nước ban hành, là kết qủa của tư duy chủ quan của giai cấp thống trị","D. Pháp luật không thể phát huy hiệu lực của mình nếu không có sức mạnh của bộ máy nhà nước"],"correct":2,"explanation":"Đáp án đúng là: Pháp luật do nhà nước ban hành, là kết qủa của tư duy chủ quan của giai cấp thống trị Vì: Pháp luật thể hiện ý chí của giai cấp thống trị và yêu cầu khách quan của xã hội","reference":"Mục 1.1"},{"id":48,"text":"Trong một vụ án, A được xác định có lỗi cố ý trực tiếp khi thực hiện hành vi nguy hiểm, vậy lỗi của A thuộc bộ phận nào của vi phạm pháp luật?","answers":["A. Khách thể của vi phạm pháp luật","B. Mặt chủ quan của vi phạm pháp luật","C. Mặt khách quan của vi phạm pháp luật","D. Chủ thể vi phạm pháp luật"],"correct":1,"explanation":"Đáp án đúng là: Mặt chủ quan của vi phạm pháp luật Vì: Mặt chủ quan gồm các yếu tố: lỗi, động cơ, mục đích","reference":"Mục 1.6.1"},{"id":49,"text":"Theo quy định của Luật hôn nhân và gia đình hiện hành, độ tuổi được phép kết hôn đối với nữ là","answers":["A. Đủ 20 tuổi trở lên","B. Đủ 18 tuổi trở lên","C. 18 tuổi trở lên","D. 20 tuổi trở lên"],"correct":1,"explanation":"Đáp án đúng là: Đủ 18 tuổi trở lên Tham khảo: Tham khảo trong mục 7.2.1","reference":""},{"id":50,"text":"Lựa chọn nào sau đây không để chỉ tài sản chung của vợ chồng","answers":["A. Tài sản được thừa kế chung","B. Quyền sử dụng đất do bố mẹ để lại cho người vợ","C. Thu nhập do lao động của vợ, chồng trong thời kỳ hôn nhân","D. Tài sản có trước thời kỳ hôn nhân được vợ chồng thỏa thuận là tài sản chung"],"correct":1,"explanation":"Đáp án đúng là: Quyền sử dụng đất do bố mẹ để lại cho người vợ Tham khảo: Tham khảo trong BG text 8","reference":""},{"id":51,"text":"Trong quan hệ pháp luật “A cho B thuê 1 chiếc xe máy với giá 20.000đ/giờ”, khách thể là","answers":["A. Quyền sử dụng xe máy và 20.000đ","B. A và B","C. B","D. Xe máy"],"correct":0,"explanation":"Đáp án đúng là: Quyền sử dụng xe máy và 20.000đ Vì: đây là lợi ích mà các bên tham gia quan hệ pháp luật hướng tới","reference":"Mục 1.4"},{"id":52,"text":"Trong vi phạm pháp luật: A cướp một chiếc xe máy của B. Lỗi của A là:","answers":["A. Cố ý trực tiếp","B. Cố ý gián tiếp","C. Vô ý do cẩu thả","D. Vô ý vì quá tự tin"],"correct":0,"explanation":"Đáp án đúng là: Cố ý trực tiếp Tham khảo: Tham khảo trong BG Text 7","reference":""},{"id":53,"text":"Trường hợp nào sau đây không bị cầm kết hôn ở Việt Nam","answers":["A. Con riêng của vợ với con riêng của chồng","B. Chú ruột với cháu ruột","C. Người đã từng là bố dượng với con riêng của vợ","D. Cha nuôi với con nuôi"],"correct":0,"explanation":"Đáp án đúng là: Con riêng của vợ với con riêng của chồng Tham khảo: Tham khảo trong BG text 8","reference":""},{"id":54,"text":"Giả định, quy định, chế tài là những bộ phận cấu thành nên","answers":["A. Sự kiện pháp lý","B. Quy phạm pháp luật","C. Quan hệ pháp luật","D. Vi phạm pháp luật"],"correct":1,"explanation":"Đáp án đúng là: Quy phạm pháp luật Vì: Giả định, quy định, chế tài là những bộ phận cấu thành nên quy phạm pháp luật","reference":"Mục 1.3"},{"id":55,"text":"Khẳng định nào sau đây chưa chính xác:","answers":["A. Tổ chức, cá nhân có quyền hưởng di sản thừa kế do người khác để lại, đồng thời có quyền để lại tài sản của mình cho người khác thừa kế trước khi chết","B. Thừa kế là việc chuyển dịch tài sản của người chết cho những người còn sống","C. Cá nhân thuộc hàng thừa kế thứ nhất của người chết vẫn có thể sẽ không được hưởng thừa kế của người chết","D. Tổ chức chỉ có quyền hưởng di sản thừa kế theo di chúc mà người chết để lại"],"correct":0,"explanation":"Đáp án đúng là: Tổ chức, cá nhân có quyền hưởng di sản thừa kế do người khác để lại, đồng thời có quyền để lại tài sản của mình cho người khác thừa kế trước khi chết","reference":"Mục 5.2.3"},{"id":56,"text":"Trong xử phạt vi phạm hành chính, mức cao nhất của khung phạt tiền đối với cá nhân hiện nay là","answers":["A. 100 triệu đồng","B. 1 tỷ đồng","C. 500 triệu đồng","D. 2 tỷ đồng"],"correct":1,"explanation":"Đáp án đúng là: 1 tỷ đồng Tham khảo: Luật xử phạt hành chính (Điều 23)","reference":""},{"id":57,"text":"Bộ Tài nguyên và Môi trường có quyền ban hành văn bản quy phạm pháp luật nào dưới đây","answers":["A. Luật đất đai","B. Nghị quyết","C. Thông tư","D. Nghị định"],"correct":2,"explanation":"Đáp án đúng là: Thông tư Vì: Thông tư là một loại văn bản dưới luật, nhưng không phải do Quốc Hội ban hành. Thông tư có thể do Bộ trưởng, Chánh án Tòa án nhân dân tối cao, Viện trưởng Viện kiểm sát nhân dân tối cao,.. ban hành","reference":"Mục 2.3.2"},{"id":58,"text":"“Khả năng xử sự mà pháp luật cho phép chủ thể được tiến hành khi tham gia vào một quan hệ pháp luật nhất định và được nhà n ước bảo vệ bằng sự cưỡng chế” là khái niệm để chỉ","answers":["A. Quyền chủ chủ thể","B. Nghĩa vụ của chủ thể","C. Năng lực pháp luật","D. Năng lực hành vi"],"correct":0,"explanation":"Đáp án đúng là: Quyền chủ chủ thể Vì: Quyền của chủ thể: Là khả năng xử sự mà pháp luật cho phép chủ thể được tiến hành khi tham gia vào một quan hệ pháp luật nhất định và được nhà nước bảo vệ bằng sự cưỡng chế.","reference":"Mục 1.4"},{"id":59,"text":"Chủ thể nào sau đây có năng lực pháp luật và năng lực hành vi xuất hiện không cùng một thời điểm?","answers":["A. Tổ chức","B. Cá nhân","C. Pháp nhân","D. Nhà nước"],"correct":1,"explanation":"Đáp án đúng là: Cá nhân Vì: Năng lực pháp luật của cá nhân xuất hiện khi cá nhân đó được sinh ra, còn năng lực hành vi của cá nhân xuất hiện khi cá nhân đó đạt đầy đủ các điều kiện do pháp luật quy định Tham khảo: Chương 1, Bài 2","reference":""},{"id":60,"text":"Lựa chọn nào sau đây không chỉ một chế định cơ bản trong ngành luật nhà nước:","answers":["A. Chế độ kinh tế, chính trị, văn hoá, xã hội,…","B. Quyền và nghĩa vụ cơ bản của công dân","C. Tổ chức và hoạt động của bộ máy nhà nước Việt","D. Các biện pháp tư pháp trong ngành luật nhà nước"],"correct":3,"explanation":"Đáp án đúng là: Các biện pháp tư pháp trong ngành luật nhà nước","reference":"Mục 3.2"},{"id":61,"text":"Chủ thể nào sau đây không thuộc đối tượng luôn được hưởng di sản thừa kế của người chết","answers":["A. Con dâu","B. Con đẻ chưa thành niên","C. Con nuôi đã thành niên mắc bệnh tâm thần","D. Cha nuôi"],"correct":0,"explanation":"Đáp án đúng là: Con dâu Vì: + Hàng thừa kế thứ nhất: Vợ, chồng, cha đẻ, mẹ đẻ, cha nuôi, mẹ nuôi, con đẻ, con nuôi của người chết. + Hàng thừa kế thứ hai: Ông nội, bà nội, ông ngoại, bà ngoại, anh ruột, chị ruột, em ruột của người chết; cháu ruột của người chết mà người chết là ông nội, bà nội, ông ngoại, bà ngoại. + Hàng thừa kế thứ ba: Cụ nội, cụ ngoại của người chết; bác ruột, chú ruột, cậu ruột, cô ruột, dì ruột của người chết; cháu ruột của người chết mà người chết là bác ruột, chú ruột, cậu ruột, cô ruột, dì ruột; chắt ruột của người chết mà người chết là cụ nội, cụ ngoại.","reference":"Mục 5.2.3"},{"id":62,"text":"Cho tình huống: “A lấy B sinh được C và D, C lấy E sinh được G. C chết.” Hãy xác định những người được hưởng thừa kế theo pháp luật của C?","answers":["A. A,B,D","B. A,B,D,E,G","C. E,G","D. A,B,E,G"],"correct":3,"explanation":"Đáp án đúng là: A,B,E,G Vì: Những người thừa kế theo pháp luật được quy định theo thứ tự 3 hàng thừa kế","reference":"Mục 5.2.3"},{"id":63,"text":"Lựa chọn nào để chỉ ngành luật độc lập trong hệ thống pháp luật Việt Nam","answers":["A. Luật Cạnh tranh","B. Luật Thương mại","C. Luật Đầu tư","D. Luật Đấu thầu"],"correct":1,"explanation":"Đáp án đúng là: Luật Thương mại Vì: Luật thương mại đảm bảo các điều kiện của 1 ngành luật độc lập","reference":"Mục 2.4.2"},{"id":64,"text":"Năng lực pháp luật của cá nhân trong lĩnh vực dân sự có khi cá nhân đó:","answers":["A. Đủ 15 tuổi trở lên","B. Được sinh ra","C. Đủ 18 tuổi trở lên","D. Đủ 6 tuổi trở lên"],"correct":1,"explanation":"Đáp án đúng là: Được sinh ra Vì: Năng lực pháp luật dân sự của cá nhân có từ khi người đó sinh ra và chấm dứt khi người đó chết . Tham khảo: Bộ Luật dân sự (Điều 16)","reference":""},{"id":65,"text":"Lựa chọn nào sau đây là đặc trưng cơ bản của các quy phạm xã hội:","answers":["A. Mang tính tản mạn, lẻ tẻ","B. Được nhà nước bảo đảm thực hiện","C. Có tính quyền lực","D. Thể hiện ý chí của nhà nước"],"correct":0,"explanation":"Đáp án đúng là: Mang tính tản mạn, lẻ tẻ Vì: Mang tính tản mạn, lẻ tẻ là đặc trưng cơ bản của các quy phạm xã hội","reference":"Mục 1.1"},{"id":66,"text":"Trường hợp nào sau đây hôn nhân chưa chấm dứt","answers":["A. Vợ chết","B. Có quyết định xử cho ly hôn của Tòa án đã có hiệu lực pháp luật","C. Chồng chết","D. Có quyết định của Tòa án tuyên bố về việc vợ hoặc chồng mất tích"],"correct":3,"explanation":"Đáp án đúng là: Có quyết định của Tòa án tuyên bố về việc vợ hoặc chồng mất tích Tham khảo: Tham khảo trong BG text 8","reference":""},{"id":67,"text":"Chủ thể nào sau đây không thuộc đối tượng luôn được hưởng thừa kế của người chết","answers":["A. Vợ của người chết","B. Cha đẻ của người chết","C. Con nuôi chưa thành niên của người chết","D. Con đẻ đã thành niên của người chết"],"correct":3,"explanation":"Đáp án đúng là: Con đẻ đã thành niên của người chết Vì: Theo Điều 644 Bộ luật Dân sự năm 2015 những người thừa kế không phụ thuộc nội dung của di chúc như sau: Những người sau đây vẫn được hưởng phần di sản bằng hai phần ba suất của một người thừa kế theo pháp luật nếu di sản được chia theo pháp luật, trong trường hợp họ không được người lập di chúc cho hưởng di sản hoặc chỉ cho hưởng phần di sản ít hơn hai phần ba suất đó: - Con chưa thành niên, cha, mẹ, vợ, chồng; - Con thành niên mà không có khả năng lao động. Tham khảo: Bộ luật Dân sự năm 2015","reference":""},{"id":68,"text":"Theo quy định của Luật hôn nhân và gia đình hiện hành, độ tuổi được phép kết hôn đối với nam là","answers":["A. Đủ 20 tuổi trở lên","B. Đủ 18 tuổi trở lên","C. 20 tuổi trở lên","D. 18 tuổi trở lên"],"correct":0,"explanation":"Đáp án đúng là: Đủ 20 tuổi trở lên Tham khảo: Tham khảo trong mục 7.2.1","reference":""},{"id":69,"text":"Lựa chọn nào sau đây không để chỉ một loại cơ quan trong hệ thống cơ quan xét xử ở Việt Nam","answers":["A. Tòa án nhân dân cấp xã","B. Tòa án nhân dân tối cao","C. Tòa án nhân dân cấp huyện","D. Tòa án quân sự khu vực"],"correct":0,"explanation":"Đáp án đúng là: Tòa án nhân dân cấp xã Vì: Hệ thống tòa án ở Việt Nam gồm: - Tòa án nhân dân : Tòa án nhân dân tối cao; Tòa án nhân dân cấp cao; Tòa án nhân dân tỉnh, thành phố trực thuộc trung ương; Tòa án nhân dân huyện, quận, thị xã, thành phố thuộc tỉnh và tương đương. - Tòa án quân sự: Tòa án quân sự trung ương; Tòa án quân sự quân khu; Tòa án quân sự khu vực.","reference":"Mục 3.2.4.4"},{"id":70,"text":"Yếu tố nào sau đây không nằm trong cấu trúc của hệ thống pháp luật","answers":["A. Quy phạm pháp luật","B. Chế định pháp luật","C. Ngành luật","D. Văn bản pháp luật"],"correct":3,"explanation":"Đáp án đúng là: Văn bản pháp luật Vì: Hệ thống cấu trúc của pháp luật Việt Nam bao gồm: Quy phạm pháp luật, Chế định pháp luật, ngành luật","reference":"Mục 2.2"},{"id":71,"text":"Lựa chọn nào sau đây không để chỉ một loại văn bản dưới luật","answers":["A. Nghị định của Chính phủ","B. Thông tư của Bộ","C. Nghị quyết của Quốc hội","D. Pháp lệnh của Ủy ban Thường vụ Quốc hội"],"correct":2,"explanation":"Đáp án đúng là: Nghị quyết của Quốc hội Vì: Nghị quyết của Quốc hội là văn bản luật","reference":"Mục 2.3.2"},{"id":72,"text":"Lựa chọn nào sau đây không phải để chỉ một hình phạt chính được quy định trong Bộ luật Hình sự hiện hành","answers":["A. Cải tạo không giam giữ","B. Trục xuất","C. Án treo","D. Phạt tiền"],"correct":2,"explanation":"Đáp án đúng là: Án treo Tham khảo: Tham khảo trong BG Text 7","reference":""},{"id":73,"text":"Lựa chọn nào sau đây không phải là một hình thức sở hữu theo quy định của Hiến pháp và Bộ luật Dân sự hiện hành","answers":["A. Sở hữu theo phần","B. Sở hữu tập thể","C. Sở hữu Nhà nước","D. Sở hưu tư nhân"],"correct":0,"explanation":"Đáp án đúng là: Sở hữu theo phần Vì: Các hình thức sở hữu được Ngành luật Dân sự và Ngành luật Hiến pháp thừa nhận ở nước ta hiện nay gồm: Sở hữu nhà nước; sở hữu tập thể (sở hữu của các tổ chức chính trị, tổ chức Chính trị - Xã hội, sở hữu của các tổ chức xã hội, tổ chức xã hội - nghề nghiệp, tổ chức chính trị xã hội - nghề nghiệp); sở hữu tư nhân; sở hữu chung.","reference":"Mục 6.2.1"},{"id":74,"text":"Chỉ ra bộ phận chế tài của quy phạm pháp luật sau: “Người nào nhằm chống chính quyền nhân dân mà phá hoại việc thực hiện các chính sách kinh tế - xã hội, thì bị phạt tù từ 07 năm đến 15 năm”","answers":["A. Người nào nhằm chống chính quyền nhân dân mà phá hoại việc thực hiện các chính sách kinh tế - xã hội","B. Bị phạt tù từ 07 năm đến 15 năm","C. Không có chế tài","D. Mà phá hoại việc thực hiện các chính sách kinh tế - xã hội, thì bị phạt tù từ 07 năm đến 15 năm"],"correct":1,"explanation":"Đáp án đúng là: Bị phạt tù từ 07 năm đến 15 năm Vì: Đây là bộ phận nêu lên biện pháp xử lý của Nhà nước","reference":"Mục 1.3"},{"id":75,"text":"Lựa chọn nào sau đây không chỉ một hình thức xử phạt bổ sung","answers":["A. Đình chỉ hoạt động có thời hạn","B. Tước quyền sử dụng giấy phép","C. Cảnh cáo","D. Trục xuất"],"correct":2,"explanation":"Đáp án đúng là: Cảnh cáo Vì: Hình thức phạt bổ sung: + Tước quyền sử dụng giấy phép, chứng chỉ hành nghề hoặc đình chỉ hoạt động có thời hạn. + Tịch thu tang vật, phương tiện vi phạm hành chính. + Trục xuất.","reference":"Mục 4.2.2"},{"id":76,"text":"Nhóm tội rất nghiêm trọng có mức cao nhất của khung hình phạt dành cho tội đó là:","answers":["A. Đến 20 năm tù","B. Đến 15 năm tù","C. Đến 7 năm tù","D. Đến 2 năm tù"],"correct":1,"explanation":"Đáp án đúng là: Đến 15 năm tù Vì: Nhóm tội rất nghiêm trọng là những tội gây nguy hại rất lớn cho xã hội, và mức cao nhất của khung hình phạt là đến 15 năm tù;","reference":"Mục 6.2.1"},{"id":77,"text":"Bộ phận nào trong quy phạm pháp luật trả lời câu hỏi “phải gánh chịu hậu quả gì?”","answers":["A. Quy định","B. Quy định và chế tài","C. Chế tài","D. Giả định"],"correct":1,"explanation":"Đáp án đúng là: Chế tài Vì: Bộ phận chế tài trong quy phạm pháp luật trả lời câu hỏi “phải gánh chịu hậu quả gì?","reference":"Mục 1.3.3"},{"id":78,"text":"Thủ tướng Chính phủ có thẩm quyền ban hành các loại văn bản quy phạm pháp luật nào dưới đây:","answers":["A. Quyết định","B. Nghị định","C. Thông tư","D. Quyết định, chỉ thị, thông tư"],"correct":0,"explanation":"Đáp án đúng là: Quyết định Vì: Theo quy định của Luật ban hành văn bản quy phạm pháp luật","reference":"Mục 2.3.2"},{"id":79,"text":"Trong quy phạm: “Người mẹ nào do ảnh hưởng nặng nề của tư tưởng lạc hậu hoặc trong hoàn cảnh khách quan đặc biệt mà giết con do mình đẻ ra trong 07 ngày tuổi, thì bị phạt tù từ 06 tháng đến 03 năm.” Bộ phận giả định được xác định là:","answers":["A. Người mẹ nào","B. Người mẹ nào do ảnh hưởng nặng nề của tư tưởng lạc hậu hoặc trong hoàn cảnh khách quan đặc biệt mà giết con do mình đẻ ra trong 07 ngày tuổi","C. Người mẹ nào do ảnh hưởng nặng nề của tư tưởng lạc hậu hoặc trong hoàn cảnh khách quan đặc biệt","D. Không có giả định"],"correct":1,"explanation":"Đáp án đúng là: Người mẹ nào do ảnh hưởng nặng nề của tư tưởng lạc hậu hoặc trong hoàn cảnh khách quan đặc biệt mà giết con do mình đẻ ra trong 07 ngày tuổi Vì: Đây là bộ phận nêu lên chủ thể, hoàn cảnh, điều kiện","reference":"Mục 1.3"},{"id":80,"text":"Cá nhân có năng lực hành vi hành chính một phần khi đạt độ tuổi:","answers":["A. Từ đủ 6 tuổi đến dưới 14 tuổi","B. Từ đủ 6 tuổi đến dưới 18 tuổi","C. Từ đủ 9 tuổi đến dưới 15 tuổi","D. Từ đủ 14 tuổi đến dưới 16 tuổi"],"correct":3,"explanation":"Đáp án đúng là: Từ đủ 14 tuổi đến dưới 16 tuổi Vì: Người từ đủ 14 tuổi đến dưới 16 tuổi bị xử phạt vi phạm hành chính về vi phạm hành chính do cố ý. Tham khảo: Luật xử phạt hành chính (Điều 5)","reference":""},{"id":81,"text":"Lựa chọn nào sau đây để chỉ một hình phạt chính trong quy định của Bộ luật Hình sự hiện hành?","answers":["A. Tịch thu vật","B. Bắt buộc chữa bệnh","C. Phạt tiền","D. Bồi thường thiệt hại"],"correct":2,"explanation":"Đáp án đúng là: Phạt tiền Tham khảo: Tham khảo trong BG Text 7","reference":""},{"id":82,"text":"Anh A là nhân viên công ty X. Anh A có thể thực hiện việc khiếu nại trong trường hợp nào sau đây:","answers":["A. Hành vi vi phạm nồng độ cồn khi tham gia giao thông của anh C (là hàng xóm của anh A)","B. Quyết định bổ nhiệm anh D làm giám đốc công ty X","C. Quyết định xử phạt hành chính anh A vì có hành vi vượt đèn đỏ","D. Hành vi đánh anh A của bảo vệ công ty X sau giờ làm việc"],"correct":2,"explanation":"Đáp án đúng là: Quyết định xử phạt hành chính anh A vì có hành vi vượt đèn đỏ","reference":"Mục 4.2.3"},{"id":83,"text":"Cơ quan nào thuộc cơ cấu của Quốc hội","answers":["A. Hội đồng quốc phòng an ninh","B. Ủy ban dân tộc","C. Ủy ban quốc phòng an ninh","D. Hội đồng dân tộc"],"correct":3,"explanation":"Đáp án đúng là: Hội đồng dân tộc Tham khảo: Chương 3","reference":""},{"id":84,"text":"Cá nhân có năng lực hành vi hình sự một phần khi đạt độ tuổi:","answers":["A. Từ đủ 6 tuổi đến dưới 14 tuổi","B. Từ đủ 9 tuổi đến dưới 15 tuổi","C. Từ đủ 6 tuổi đến dưới 18 tuổi","D. Từ đủ 14 tuổi đến dưới 16 tuổi"],"correct":3,"explanation":"Đáp án đúng là: Từ đủ 14 tuổi đến dưới 16 tuổi Vì: Năng lực hành vi hình sự của nhóm người từ đủ 14 tuổi đến dưới 16 tuổi thể hiện ở việc họ phải chịu trách nhiệm hình sự đối với một số tội phạm cụ thể được quy định trong BLHS.","reference":"Mục 6.2"},{"id":85,"text":"Quyền và nghĩa vụ cơ bản của công dân được quy định trong ngành luật nào sau đây","answers":["A. Luật Hình sự","B. Luật Hôn nhân và gia đình","C. Luật Hiến pháp","D. Luật Dân sự"],"correct":2,"explanation":"Đáp án đúng là: Luật Hiến pháp Vì: Quyền con người, quyền và nghĩa vụ cơ bản của công dân là một chế định của ngành luật Hiến pháp","reference":"Mục 2.4.2"},{"id":86,"text":"Tội phạm theo quy định của Bộ luật Hình sự hiện hành được chia thành mấy nhóm?","answers":["A. 4 nhóm tội","B. 5 nhóm tội","C. 3 nhóm tội","D. 6 nhóm tội"],"correct":0,"explanation":"Đáp án đúng là: 4 nhóm tội Tham khảo: Tham khảo trong mục 6.2.1","reference":""},{"id":87,"text":"Cơ quan có thẩm quyền áp dụng hình phạt đối với người đã thực hiện hành vi phạm tội là:","answers":["A. Ủy ban nhân dân","B. Tòa án","C. Chính phủ","D. Viện kiểm sát"],"correct":1,"explanation":"Đáp án đúng là: Tòa án Tham khảo: Tham khảo trong BG Text 7","reference":""},{"id":88,"text":"Chế định quyền con người được quy định trong","answers":["A. Bộ luật Dân sự","B. Bộ luật Hình sự","C. Hiến pháp","D. Luật Hôn nhân và gia đình"],"correct":2,"explanation":"Đáp án đúng là: Hiến pháp Vì: Chế định quyền con người, quyền và nghĩa vụ cơ bản của công dân được quy định tại Chương 2 Hiến pháp 2013.","reference":"Mục 3.2.2"},{"id":89,"text":"Cho tình huống “A lấy B sinh được C và D. C lấy E sinh được F. A và C chết cùng thời điểm”. Những người được hưởng thừa kế theo pháp luật của A","answers":["A. B, D và E","B. B, D, E và F","C. B, D và F","D. B, C và D"],"correct":2,"explanation":"Đáp án đúng là: B, D và F Vì: Những người thừa kế theo pháp luật được quy định theo thứ tự các hàng thừa kế, bao gồm: + Hàng thừa kế thứ nhất: Vợ, chồng, cha đẻ, mẹ đẻ, cha nuôi, mẹ nuôi, con đẻ, con nuôi của người chết. + Hàng thừa kế thứ hai: Ông nội, bà nội, ông ngoại, bà ngoại, anh ruột, chị ruột, em ruột của người chết; cháu ruột của người chết mà người chết là ông nội, bà nội, ông ngoại, bà ngoại. + Hàng thừa kế thứ ba: Cụ nội, cụ ngoại của người chết; bác ruột, chú ruột, cậu ruột, cô ruột, dì ruột của người chết; cháu ruột của người chết mà người chết là bác ruột, chú ruột, cậu ruột, cô ruột, dì ruột; chắt ruột của người chết mà người chết là cụ nội, cụ ngoại.","reference":"Mục 5.2.3"},{"id":90,"text":"Lỗi của chủ thể nằm trong bộ phận nào của vi phạm pháp luật","answers":["A. Mặt chủ quan của vi phạm pháp luật","B. Chủ thể vi phạm pháp luật","C. Mặt khách quan của vi phạm pháp luật","D. Khách thể của vi phạm pháp luật"],"correct":0,"explanation":"Đáp án đúng là: Mặt chủ quan của vi phạm pháp luật Vì: Lỗi là yếu tố thuộc mặt chủ quan của vi phạm pháp luật","reference":"Mục 1.6"},{"id":91,"text":"Cá nhân có năng lực hành vi dân sự một phần khi đạt độ tuổi:","answers":["A. Dưới 6 tuổi","B. Từ đủ 6 tuổi đến dưới 18 tuổi","C. Từ đủ 9 tuổi đến dưới 18 tuổi","D. Từ đủ 6 tuổi đến dưới 15 tuổi"],"correct":1,"explanation":"Đáp án đúng là: Từ đủ 6 tuổi đến dưới 18 tuổi Vì: Điều 21. Người chưa thành niên 1. Người chưa thành niên là người chưa đủ mười tám tuổi. 2. Giao dịch dân sự của người chưa đủ sáu tuổi do người đại diện theo pháp luật của người đó xác lập, thực hiện. 3. Người từ đủ sáu tuổi đến chưa đủ mười lăm tuổi khi xác lập, thực hiện giao dịch dân sự phải được người đại diện theo pháp luật đồng ý, trừ giao dịch dân sự phục vụ nhu cầu sinh hoạt hàng ngày phù hợp với lứa tuổi. 4. Người từ đủ mười lăm tuổi đến chưa đủ mười tám tuổi tự mình xác lập, thực hiện giao dịch dân sự, trừ giao dịch dân sự liên quan đến bất động sản, động sản phải đăng ký và giao dịch dân sự khác theo quy định của luật phải được người đại diện theo pháp luật đồng ý. Tham khảo: Bộ Luật Dân sự 2015","reference":""},{"id":92,"text":"Quan hệ giữa vợ và chồng sau khi kết hôn là khái niệm để chỉ:","answers":["A. Hôn nhân","B. Kết hôn","C. Tình cảm","D. Gia đình"],"correct":0,"explanation":"Đáp án đúng là: Hôn nhân Tham khảo: Tham khảo trong BG text 8","reference":""},{"id":93,"text":"Khẳng định nào sau đây chưa chính xác","answers":["A. Vi phạm hành chính chỉ phát sinh trên cơ sở trách nhiệm hành chính","B. Vi phạm hành chính là hành vi trái pháp luật xâm phạm các quy tắc quản lý nhà nước trong các lĩnh vực của đời sống xã hội","C. Vi phạm hành chính là hành vi ít nguy hiểm hơn so với tội phạm hình sự","D. Trách nhiệm hành chính của cá nhân, pháp nhân không phụ thuộc vào việc đã gây thiệt hại hay chưa gây thiệt hại"],"correct":0,"explanation":"Đáp án đúng là: Vi phạm hành chính chỉ phát sinh trên cơ sở trách nhiệm hành chính Vì: - Vi phạm hành chính là hành vi trái pháp luật xâm phạm các quy tắc quản lý nhà nước trong các lĩnh vực khác nhau của đời sống xã hội - Vi phạm hành chính là hành vi ít nguy hiểm cho xã hội hơn so với tội phạm hình sự - Vi phạm hành chính là hành vi có lỗi (cố ý hoặc vô ý) - Vi phạm hành chính là hành vi do các chủ thể có năng lực trách nhiệm pháp lý thực hiện","reference":"Mục 4.2.2"},{"id":94,"text":"Dấu hiệu quan trọng nhất giúp phân biệt hành vi vi phạm hành chính với các loại vi phạm pháp luật khác là:","answers":["A. Là hành vi ít nguy hiểm hơn so với tội phạm","B. Có lỗi của chủ thể","C. Phải bị xử lý hành chính","D. Hành vi xâm phạm các quy tắc quản lý hành chính"],"correct":2,"explanation":"Đáp án đúng là: Phải bị xử lý hành chính","reference":"Mục 4.2.2"},{"id":95,"text":"Ngành luật bao gồm những quy phạm pháp luật xác định phạm vi những hành vi nguy hiểm cho xã hội là tội phạm, loại và mức hình phạt áp dụng đối với từng loại tội phạm là:","answers":["A. Ngành luật Tố tụng Hình sự","B. Ngành luật Hiến pháp","C. Ngành luật Hình sự","D. Ngành luật Hành chính"],"correct":2,"explanation":"Đáp án đúng là: Ngành luật Hình sự Vì: Đối tượng điều chỉnh của Luật Hình sự là những quan hệ xã hội phát sinh giữa nhà nước và người phạm tội khi người đó thực hiện một hành vi mà nhà nước coi đó là tội phạm.","reference":"Mục 6.1"},{"id":96,"text":"Trong xã hội Cộng sản nguyên thuỷ, các hành vi của con người được điều chỉnh chủ yếu bằng","answers":["A. Quy phạm tôn giáo","B. Quy phạm xã hội","C. Quy phạm pháp luật","D. Pháp luật"],"correct":1,"explanation":"Đáp án đúng là: Quy phạm xã hội Vì: Xã hội Cộng sản nguyên thuỷ, các hành vi của con người được điều chỉnh chủ yếu bằng quy phạm xã hội","reference":"Mục 1.1.1"},{"id":97,"text":"Cho tình huống: “A lấy B sinh được C, D, E. C lấy G sinh được F và K. D lấy H sinh được I. F chết.” Hãy xác định những người thuộc hàng thừa kế thứ 2 của F?","answers":["A. A,B,D,E","B. A,B,K","C. C,G","D. A,B,C,G"],"correct":1,"explanation":"Đáp án đúng là: A,B,K Vì: Hàng thừa kế thứ hai: Ông nội, bà nội, ông ngoại, bà ngoại, anh ruột, chị ruột, em ruột của người chết; cháu ruột của người chết mà người chết là ông nội, bà nội, ông ngoại, bà ngoại.","reference":"Mục 5.2.3"},{"id":98,"text":"Cơ quan có thẩm quyền tuyên bố một người mất năng lực hành vi dân sự là","answers":["A. Bệnh viện","B. Viện kiểm sát","C. Tòa án","D. UBND"],"correct":2,"explanation":"Đáp án đúng là: Tòa án Tham khảo: Tham khảo trong BG text 8","reference":""},{"id":99,"text":"Lựa chọn nào sau đây không để chỉ dấu hiệu của tội phạm","answers":["A. Là hành vi được quy định trong Bộ luật Hình sự","B. Là hành vi được thực hiện bởi cá nhân ở mọi lứa tuổi","C. Là hành vi được thực hiện với lỗi cố ý hoặc vô ý","D. Là hành vi nguy hiểm cho xã hội"],"correct":1,"explanation":"Đáp án đúng là: Là hành vi được thực hiện bởi cá nhân ở mọi lứa tuổi Tham khảo: Tham khảo trong BG Text 7","reference":""},{"id":100,"text":"Khi đăng ký kết hôn, hai bên nam nữ có bắt buộc phải có mặt không","answers":["A. Có thể vắng mặt những phải có giấy ủy quyền cho người khác","B. Tùy từng trường hợp cụ thể để xem xét việc có mặt hay không","C. Bắt buộc phải có mặt","D. Không bắt buộc phải có mặt"],"correct":2,"explanation":"Đáp án đúng là: Bắt buộc phải có mặt Tham khảo: Tham khảo trong mục 7.2.1","reference":""},{"id":101,"text":"“Những quan hệ xã hội được pháp luật điều chỉnh có chung tính chất, phát sinh trong một lĩnh vực hoạt động nhất định của đời sống xã hội” là khái niệm để chỉ:","answers":["A. Phương pháp điều chỉnh của ngành luật","B. Đối tượng điều chỉnh của ngành luật","C. Khách thể của quan hệ pháp luật","D. Chế định pháp luật"],"correct":1,"explanation":"Đáp án đúng là: Đối tượng điều chỉnh của ngành luật Vì: Đối tượng điều chỉnh của ngành luật là những quan hệ xã hội được pháp luật điều chỉnh có chung tính chất (cùng loại), phát sinh trong một lĩnh vực hoạt động nhất định của đời sống xã hội.","reference":"Mục 2.4.1"},{"id":102,"text":"Bộ máy nhà nước Việt Nam có bao nhiêu hệ thống cơ quan nhà nước","answers":["A. 3 hệ thống cơ quan","B. 5 hệ thống cơ quan","C. 6 hệ thống cơ quan","D. 4 hệ thống cơ quan"],"correct":1,"explanation":"Đáp án đúng là: 5 hệ thống cơ quan Vì: Có 5 hệ thống cơ quan nhà nước, bao gồm: - Hệ thống cơ quan quyền lực - Chủ tịch nước - Hệ thống cơ quan quản lý hành chính nhà nước - Hệ thống cơ quan xét xử - Hệ thống cơ quan kiểm sát","reference":"Mục 3.2.4"},{"id":103,"text":"Lựa chọn nào sau đây không chính xác khi nói về Hiến pháp:","answers":["A. Quy định những vấn đề cơ bản nhất, quan trọng nhất của nhà nước","B. Do Quốc hội – cơ quan quyền lực nhà nước cao nhất ban hành","C. Có giá trị pháp lý cao nhất","D. Chứa đựng các quy tắc xử sự chung hoặc các mệnh lệnh áp dụng quy phạm pháp luật"],"correct":3,"explanation":"Đáp án đúng là: Chứa đựng các quy tắc xử sự chung hoặc các mệnh lệnh áp dụng quy phạm pháp luật Vì: Hiến pháp là văn bản quy phạm pháp luật nên sẽ chỉ chứa đứng các quy tắc xử sự chung","reference":"Mục 2.3.1"},{"id":104,"text":"Lựa chọn nào sau đây chính xác","answers":["A. Người thành niên có thể tự mình xác lập mọi quan hệ pháp luật dân sự","B. Tùy vào mức độ nhận thức mà cá nhân sẽ có năng lực pháp luật dân sự khác nhau","C. Các cá nhân đều có năng lực pháp luật dân sự ngoại trừ những người mắc bệnh tâm thần","D. Mọi cá nhân đều có năng lực pháp luật dân sự"],"correct":3,"explanation":"Đáp án đúng là: Mọi cá nhân đều có năng lực pháp luật dân sự Tham khảo: Chương 5","reference":""},{"id":105,"text":"Chủ tịch UBND xã A, huyện D ra quyết định xử lý hành vi gây rối trật tự công cộng của anh B. Anh B có thể khiếu nại quyết định trên đến đâu","answers":["A. UBND xã A","B. UBND huyện M","C. HĐND xã A","D. HĐND huyện M"],"correct":0,"explanation":"Đáp án đúng là: UBND xã A Vì: Theo luật Khiếu nại 2011, khi có căn cứ cho rằng quyết định hành chính, hành vi hành chính là trái pháp luật, xâm phạm trực tiếp đến quyền, lợi ích hợp pháp của mình thì người khiếu nại khiếu nại lần đầu đến “người đã ra quyết định hành chính” hoặc cơ quan có người có hành vi hành chính hoặc khởi kiện vụ án hành chính tại Tòa án theo quy định của Luật tố tụng hành chính.","reference":"Mục 4.2.3"},{"id":106,"text":"Đối với cùng một hành vi vi phạm hành chính thì","answers":["A. Mức phạt tiền đối với tổ chức bằng mức phạt tiền đối với cá nhân","B. Mức phạt tiền đối với tổ chức bằng 04 lần mức phạt tiền đối với cá nhân","C. Mức phạt tiền đối với tổ chức bằng 02 lần mức phạt tiền đối với cá nhân","D. Mức phạt tiền đối với tổ chức bằng 03 lần mức phạt tiền đối với cá nhân"],"correct":2,"explanation":"Đáp án đúng là: Mức phạt tiền đối với tổ chức bằng 02 lần mức phạt tiền đối với cá nhân Vì: Đối với cùng một hành vi vi phạm hành chính thì mức phạt tiền đối với tổ chức bằng 02 lần mức phạt tiền đối với cá nhân Tham khảo: Luật xử phạt hành chính (Điều 3)","reference":""},{"id":107,"text":"Theo quy định của Hiến pháp hiện hành, chức danh đứng đầu và thống lĩnh các lực lượng vũ trang nhân dân ở Việt Nam là:","answers":["A. Chủ tịch Quốc hội","B. Thủ tướng Chính phủ","C. Bộ trưởng Bộ Quốc phòng","D. Chủ tịch nước"],"correct":3,"explanation":"Đáp án đúng là: Chủ tịch nước Vì: Hiến pháp 2013","reference":"Mục 3.2.4"},{"id":108,"text":"Dấu hiệu đầu tiên là căn cứ để xác định có vi phạm pháp luật xảy ra là","answers":["A. Có hành vi nguy hiểm cho xã hội","B. Chủ thể có năng lực trách nhiệm pháp lý","C. Chủ thể đạt độ tuổi quy định","D. Có lỗi của chủ thể"],"correct":0,"explanation":"Đáp án đúng là: Có hành vi nguy hiểm cho xã hội Vì: Đặc điểm của vi phạm pháp luật: - Vi phạm pháp luật là hành vi nguy hiểm cho xã hội. - Vi phạm pháp luật là hành vi trái pháp luật và xâm hại tới các quan hệ xã hội được pháp luật bảo vệ. - Vi phạm pháp luật là hành vi có lỗi của chủ thể. - Chủ thể vi phạm pháp luật có năng lực trách nhiệm pháp lý.","reference":"Mục 1.6"},{"id":109,"text":"Hiến pháp hiện hành ở Việt nam là bản Hiến pháp được Quốc hội thông qua năm","answers":["A. 1992","B. 2015","C. 2013","D. 1999"],"correct":2,"explanation":"Đáp án đúng là: 2013 Tham khảo: Chương 3","reference":""},{"id":110,"text":"Lựa chọn nào dưới đây không chính xác khi nói về ngành luật Hình sự","answers":["A. Là một văn bản trong hệ thống pháp luật của Việt Nam","B. Là một ngành luật độc lập trong hệ thống pháp luật Việt Nam","C. Bao gồm hệ thống những quy phạm pháp luật do Nhà nước ban hành","D. Xác định những hành vi nguy hiểm cho xã hội là tội phạm, loại và mức hình pạt áp dụng với từng loại tội phạm"],"correct":0,"explanation":"Đáp án đúng là: Là một văn bản trong hệ thống pháp luật của Việt Nam Tham khảo: Tham khảo trong BG Text 7","reference":""},{"id":111,"text":"Quan hệ giữa cha mẹ nuôi và con nuôi sẽ chấm dứt khi","answers":["A. Có quyết định của UBND xã có hiệu lực pháp luật","B. Cha mẹ nuôi và con nuôi thỏa thuận chấm dứt mối quan hệ","C. Có quyết định của Toà án có hiệu lực pháp luật","D. Cha mẹ đẻ nhận lại con của mình"],"correct":2,"explanation":"Đáp án đúng là: Có quyết định của Toà án có hiệu lực pháp luật Tham khảo: Tham khảo trong BG text 8","reference":""},{"id":112,"text":"Chỉ ra bộ phận chế tài của quy phạm pháp luật sau: Người nào đe dọa sẽ dùng vũ lực hoặc có thủ đoạn khác uy hiếp tinh thần người khác nhằm chiếm đoạt tài sản, thì bị phạt tù từ 01 năm đến 05 năm.","answers":["A. thì bị phạt tù từ 01 năm đến 05 năm","B. Từ 01 năm đến 05 năm.","C. dùng vũ lực hoặc có thủ đoạn khác uy hiếp tinh thần người khác nhằm chiếm đoạt tài sản,","D. đe dọa sẽ dùng vũ lực hoặc có thủ đoạn khác uy hiếp tinh thần người khác nhằm chiếm đoạt tài sản, thì bị phạt tù từ 01 năm đến 05 năm."],"correct":0,"explanation":"Đáp án đúng là: thì bị phạt tù từ 01 năm đến 05 năm Vì: Đây là bộ phận nêu lên biện pháp xử lý của Nhà nước","reference":"Mục 1.3"},{"id":113,"text":"Bộ luật hình sự của nước Cộng hoà XHCN Việt Nam hiện nay đang có hiệu lực là bộ luật được Quốc hội thông qua năm","answers":["A. 1999 sửa đổi năm 2009","B. 2013","C. 2015 sửa đổi năm 2017","D. 2001"],"correct":2,"explanation":"Đáp án đúng là: 2015 sửa đổi năm 2017 Tham khảo: Tham khảo trong BG Text 7","reference":""},{"id":114,"text":"Luật Hôn nhân và gia đình hiện hành được Quốc hội ban hành năm nào","answers":["A. 2027","B. 2018","C. 2015","D. 2014"],"correct":3,"explanation":"Đáp án đúng là: 2014 Tham khảo: Tham khảo trong BG text 8","reference":""},{"id":115,"text":"Lựa chọn nào sau đây không chỉ 1 trường hợp cấm kết hôn theo quy định của Luật hôn nhân gia đình hiện hành:","answers":["A. Cấm những người có họ trong phạm vi ba đời kết hôn với nhau","B. Cấm kết hôn giữa những người đã từng là bố chồng với con dâu","C. Cấm người đang có vợ, có chồng kết hôn với người khác","D. Cấm hôn nhân đồng giới"],"correct":3,"explanation":"Đáp án đúng là: Cấm hôn nhân đồng giới Vì: Các trường hợp cấm kết hôn - Cấm người đang có vợ, có chồng mà kết hôn hoặc chung sống như vợ chồng với người khác hoặc chưa có vợ, chưa có chồng mà kết hôn hoặc chung sống như vợ chồng với người đang có chồng, có vợ. - Cấm kết hôn hoặc chung sống như vợ chồng giữa những người cùng dòng máu về trực hệ; giữa những người có họ trong phạm vi ba đời. - Cấm kết hôn giữa những người có quan hệ cha, mẹ nuôi với con nuôi; giữa những người đã từng là cha, mẹ nuôi với con nuôi, bố chồng với con dâu, mẹ vợ với con rể, bố dượng với con riêng của vợ, mẹ kế với con riêng của chồng.","reference":"Mục 7.2.1"},{"id":116,"text":"Trường hợp nào sau đây bị cấm kết hôn ở Việt Nam","answers":["A. Người đã từng là bố chồng với con dâu","B. Đã từng là cháu dâu với bác ruột của chồng","C. Vợ, chồng đã ly hôn","D. Anh, chị, em được bố mẹ nhận nuôi"],"correct":0,"explanation":"Đáp án đúng là: Người đã từng là bố chồng với con dâu Tham khảo: Tham khảo trong BG text 8","reference":""},{"id":117,"text":"Lựa chọn nào sau đây để chỉ một trường hợp mà chủ thể vẫn có quyền được hưởng di sản thừa kế của người chết","answers":["A. Có hành vi hành hạ người để lại di sản","B. Đã bị kết án về hành vi cố ý gây thương tích cho người cùng thừa kế với mình","C. Có hành vi sửa chữa di chúc nhằm hưởng di sản của người đó","D. Đã bị kết án về hành vi giết người để lại di sản thừa kế"],"correct":1,"explanation":"Đáp án đúng là: Đã bị kết án về hành vi cố ý gây thương tích cho người cùng thừa kế với mình Vì: 3 trường hợp còn lại là 1 trong những trường hợp không được quyền hưởng di sản thừa kế, bao gồm: + Người bị kết án về hành vi cố ý xâm phạm tính mạng, sức khoẻ hoặc về hành vi ngược đãi nghiêm trọng, hành hạ người để lại di sản, xâm phạm nghiêm trọng danh dự, nhân phẩm của người đó. + Người vi phạm nghiêm trọng nghĩa vụ nuôi dưỡng người để lại di sản. + Người bị kết án về hành vi cố ý xâm phạm tính mạng người thừa kế khác nhằm ảnh hưởng một phần hoặc toàn bộ phần di sản mà người thừa kế đó có quyền hưởng. + Người có hành vi lừa dối, cưỡng ép hoặc ngăn cản người để lại di sản trong việc lập di chúc; giả mạo di chúc, sửa chữa di chúc, huỷ di chúc nhằm hưởng một phần hoặc toàn bộ di sản trái với ý chí của người để lại di sản.","reference":"Mục 5.2.3"},{"id":118,"text":"Hành vi trái pháp luật nào sau đây là dạng hành vi không hành động","answers":["A. Tiêu thụ tài sản do người khác phạm tội mà có","B. Không tố giác tội phạm","C. Dụ dỗ người khác tham gia hành vi phạm tội","D. Đe dọa giết người"],"correct":1,"explanation":"Đáp án đúng là: Không tố giác tội phạm Vì: Không tố giác tội phạm là hành vi biểu hiện ở dạng không hành động","reference":"Mục 1.6.1"},{"id":119,"text":"Cá nhân phải chịu trách nhiệm về mọi hành vi vi phạm hành chính khi đạt độ tuổi:","answers":["A. Đủ 18 tuổi trở lên","B. Đủ 16 tuổi trở lên","C. 18 tuổi trở lên","D. 16 tuổi trở lên"],"correct":1,"explanation":"Đáp án đúng là: Đủ 16 tuổi trở lên Vì: Người từ đủ 16 tuổi trở lên bị xử phạt vi phạm hành chính về mọi vi phạm hành chính. Tham khảo: Luật xử phạt hành chính (Điều 5)","reference":""},{"id":120,"text":"Năng lực pháp luật của cá nhân trong lĩnh vực hình sự có khi cá nhân đó:","answers":["A. Đủ 9 tuổi trở lên","B. Được sinh ra","C. Đủ 16 tuổi trở lên","D. Đủ 14 tuổi trở lên"],"correct":1,"explanation":"Đáp án đúng là: Được sinh ra Tham khảo: Tham khảo trong BG Text 7","reference":""},{"id":121,"text":"Nhiệm kỳ của Viện trưởng Viện kiểm sát nhân dân tối cao theo nhiệm kỳ của cơ quan nào sau đây:","answers":["A. Chính phủ","B. Tòa án nhân dân tối cao","C. Viện kiểm sát nhân dân tối cao","D. Quốc hội"],"correct":3,"explanation":"Đáp án đúng là: Quốc hội Tham khảo: Chương 3","reference":""},{"id":122,"text":"“Quyền chuyển giao quyền sở hữu tài sản hoặc quyền từ bỏ quyền sở hữu tài sản” là khái niệm để chỉ","answers":["A. Quyền sở hữu tài sản","B. Quyền chiếm hữu tài sản","C. Quyền định đoạt tài sản","D. Quyền sử dụng tài sản"],"correct":2,"explanation":"Đáp án đúng là: Quyền định đoạt tài sản Vì: Quyền định đoạt là quyền chuyển giao quyền sở hữu tài sản hoặc từ bỏ quyền sở hữu đó (Điều 195 Bộ luật Dân sự).","reference":"Mục 5.2.1"},{"id":123,"text":"Thời hiệu truy cứu trách nhiệm hình sự đối với nhóm tội rất nghiêm trọng là:","answers":["A. 10 năm","B. 5 năm","C. 20 năm","D. 15 năm"],"correct":3,"explanation":"Đáp án đúng là: 15 năm Vì: Thời hiệu truy cứu trách nhiệm hình sự được quy định như sau: Năm năm đối với các tội phạm ít nghiêm trọng; mười năm đối với các tội phạm nghiêm trọng; mười lăm năm đối với các tội phạm rất nghiêm trọng; hai mươi năm đối với các tội phạm đặc biệt nghiêm trọng.","reference":"Mục 6.2.1"},{"id":124,"text":"Theo quy định của Hiến pháp hiện hành thì tội nào được xác định là tội nặng nhất","answers":["A. Tội phản bội tổ quốc","B. Tội buôn bán ma túy","C. Tội giết người","D. Tội nhận hối lộ"],"correct":0,"explanation":"Đáp án đúng là: Tội phản bội tổ quốc Tham khảo: Hiến pháp 2013 (Điều 44)","reference":""},{"id":125,"text":"Hành vi nào sau đây là hành vi vi phạm pháp luật","answers":["A. Vi phạm Điều lệ Đoàn thanh niên","B. Vi phạm Điều lệ Đảng","C. Vi phạm tín điều tôn giáo","D. Vi phạm nội quy, quy chế trường học"],"correct":3,"explanation":"Đáp án đúng là: Vi phạm nội quy, quy chế trường học Vì: Đây là hành vi vi phạm kỷ luật","reference":"Mục 1.6"},{"id":126,"text":"Khẳng định nào sau đây không chính xác khi nói về ngành luật Hình sự","answers":["A. Xác định những hành vi nguy hiểm nào cho xã hội là tội phạm, đồng thời quy định hình phạt đối với những tội phạm ấy","B. Bao gồm hệ thống các quy phạm pháp luật do nhà nước ban hành","C. Là một ngành luật độc lập trong hệ thống pháp luật Việt Nam","D. Xác định các hành vi vi phạm pháp luật và xử lý vi phạm pháp luật"],"correct":3,"explanation":"Đáp án đúng là: Xác định các hành vi vi phạm pháp luật và xử lý vi phạm pháp luật Vì: Đây là khẳng định sai Tham khảo: tham khảo trong nội dung Bài giảng text 7","reference":""},{"id":127,"text":"Trong quan hệ pháp luật: A bán cho B một chiếc điện thoại di động có giá trị 20 triệu đồng. Chủ thể của quan hệ pháp luật này là:","answers":["A. A","B. B","C. A, B và Nhà nước","D. A và B"],"correct":3,"explanation":"Đáp án đúng là: A và B Vì: A và B là chủ thể tham gia vào quan hệ pháp luật mua bán tài sản Tham khảo: Chương 1, Bài 2","reference":""},{"id":128,"text":"Cá nhân có đầy đủ năng lực hành vi dân sự khi đạt độ tuổi","answers":["A. Đủ 18 tuổi trở lên","B. 18 tuổi trở lên","C. Đủ 16 tuổi trở lên","D. 16 tuổi trở lên"],"correct":0,"explanation":"Đáp án đúng là: Đủ 18 tuổi trở lên Vì: Người thành niên là người từ đủ mười tám tuổi trở lên. Tham khảo: Bộ Luật dân sự (Điều 20)","reference":""},{"id":129,"text":"Quan hệ giữa các bên tham gia trong ngành luật hành chính là","answers":["A. Quan hệ quyền lực - phục tùng","B. Quan hệ đối kháng","C. Quan hệ bình đẳng – thoả thuận","D. Quan hệ mệnh lệnh"],"correct":0,"explanation":"Đáp án đúng là: Quan hệ quyền lực - phục tùng Vì: Quyền uy mệnh lệnh trên cơ sở mối quan hệ quyền lực - phục tùng của các chủ thể trong quan hệ pháp luật hành chính.","reference":"Mục 2.4.2"},{"id":130,"text":"Lựa chọn nào sau đây không để chỉ một chế định cơ bản của ngành luật Hình sự:","answers":["A. Tội phạm","B. Quyền sở hữu tài sản","C. Hình phạt","D. Các biện pháp tư pháp trong ngành luật Hình sự"],"correct":1,"explanation":"Đáp án đúng là: Quyền sở hữu tài sản Tham khảo: Tham khảo trong BG Text 7","reference":""},{"id":131,"text":"Trong xã hội có giai cấp đã tồn tại mấy kiểu pháp luật","answers":["A. 4 kiểu","B. 6 kiểu","C. 5 kiểu","D. 3 kiểu"],"correct":0,"explanation":"Đáp án đúng là: 4 kiểu Vì: Trong xã hội có giai cấp đã tồn tại 4 kiểu pháp luật","reference":"Mục 1.2"},{"id":132,"text":"Lựa chọn nào sau đây là chủ thể của Luật Hình sự:","answers":["A. Người làm chứng","B. Người thực hiện hành vi phạm tội","C. Người bào chữa","D. Người bị hại"],"correct":1,"explanation":"Đáp án đúng là: Người thực hiện hành vi phạm tội Tham khảo: Tham khảo trong mục 6.1.3","reference":""},{"id":133,"text":"Lựa chọn nào sau đây không phải chỉ một yếu tố của hệ thống pháp luật:","answers":["A. Chế định pháp luật","B. Văn bản pháp luật","C. Quan hệ pháp luật","D. Quy phạm pháp luật"],"correct":2,"explanation":"Đáp án đúng là: Quan hệ pháp luật Vì: Hệ thống pháp luật là tổng thể các quy phạm pháp luật có mối liên hệ nội tại thống nhất với nhau, được phân định thành những chế định pháp luật, các ngành luật và được thể hiện trong các văn bản pháp luật.","reference":"Mục 2.1.1"},{"id":134,"text":"Vợ chồng đã ly hôn, nay muốn kết hôm lại thì","answers":["A. Không cần đăng ký kết hôn","B. Phải đăng ký kết hôn","C. Không cần đăng ký nhưng phải báo cáo với Toàn án đã xử cho ly hôn","D. Không cần đăng ký nhưng phải báo cáo với UBND xã"],"correct":1,"explanation":"Đáp án đúng là: Phải đăng ký kết hôn Tham khảo: Tham khảo trong BG text 8","reference":""},{"id":135,"text":"Hành vi đánh bạn của học sinh lớp 12 trong trường học, gây ra thương tích 40% thuộc loại vi phạm nào sau đây:","answers":["A. Vi phạm dân sự","B. Vi phạm hành chính","C. Vi phạm kỷ luật","D. Vi phạm hình sự"],"correct":3,"explanation":"Đáp án đúng là: Vi phạm hình sự Vì: Chủ thể là người từ đủ 16 tuổi trở lên, có hành vi cố ý gây thương tích cho người khác mà tỉ lệ thương tật trên 11% có thể bị xử lý theo Điều 134, BLHS về \"Tội cố ý gây thương tích hoặc gây tổn hại cho sức khỏe của người khác\"","reference":"Mục 1.6.2"},{"id":136,"text":"Cơ quan nào sau đây không phải cơ quan hành chính nhà nước ở Trung ương","answers":["A. Thanh tra Chính phủ","B. Ủy ban nhân dân cấp tỉnh","C. Văn phòng Chính phủ","D. Ủy ban Dân tộc"],"correct":1,"explanation":"Đáp án đúng là: Ủy ban nhân dân cấp tỉnh Vì: Ủy ban nhân dân cấp tỉnh không phải cơ quan hành chính nhà nước ở Trung ương mà đây là cơ quan hành chính nhà nước ở địa phương","reference":"Mục 3.2"},{"id":137,"text":"Quan hệ dân sự giữa các bên được xác lập dựa trên nguyên tắc","answers":["A. Công khai, minh bạch","B. Bình đẳng, thỏa thuận","C. Nhanh chóng, kịp thời","D. Mệnh lệnh, phục tùng"],"correct":1,"explanation":"Đáp án đúng là: Bình đẳng, thỏa thuận Vì: Luật Dân sự là một ngành luật độc lập trong hệ thống pháp luật Việt Nam, bao gồm tổng hợp những quy phạm pháp luật dân sự do nhà nước ban hành hoặc thừa nhận, nhằm điều chỉnh các quan hệ tài sản và các quan hệ nhân thân dựa trên nguyên tắc bình đẳng thoả thuận của các chủ thể tham gia vào các quan hệ đó.","reference":"Mục 5.1.1"},{"id":138,"text":"Pháp luật về khiếu nại và tố cáo nhằm mục đích gì","answers":["A. Xử lý các chủ thể vi phạm","B. Giảm bớt thiệt hại của hành vi vi phạm","C. Bảo vệ quyền và lợi ích hợp pháp của công dân, cơ quan, tổ chức","D. Khen ngợi cơ quan, tổ chức, cá nhân"],"correct":2,"explanation":"Đáp án đúng là: Bảo vệ quyền và lợi ích hợp pháp của công dân, cơ quan, tổ chức","reference":"Mục 4.2.3"},{"id":139,"text":"Trường hợp nào sau đây không phải là một căn cứ để Tòa án giải quyết cho vợ chồng li hôn","answers":["A. Khi bố, mẹ, người thân thích khác yêu cầu tòa án giải quyết li hôn vì vợ chồng có mâu thuẫn, xung đột lợi ích với nhau","B. Khi vợ hoặc chồng bị Toà án tuyên bố mất tích","C. Khi vợ hoặc chồng của người bị tòa án tuyên bố mất tích yêu cầu li hôn","D. Khi vợ hoặc chồng yêu cầu li hôn mà hòa giải tại tòa án không thành"],"correct":0,"explanation":"Đáp án đúng là: Khi bố, mẹ, người thân thích khác yêu cầu tòa án giải quyết li hôn vì vợ chồng có mâu thuẫn, xung đột lợi ích với nhau Tham khảo: Tham khảo trong BG text 8","reference":""},{"id":140,"text":"Khi nghiên cứu về bản chất của pháp luật thì khẳng định nào sau đây không chính xác","answers":["A. Pháp luật bao giờ cũng thể hiện ban chất giai cấp rõ nét hơn bản chất xã hội","B. Pháp luật là ý chí của giai cấp thống trị được đề lên thành luật","C. Pháp luật vừa mang tính chủ quan lại vừa mang tính khách quan","D. Pháp luật là hiện tượng vừa mang tính giai cấp vừa mang tính xã hội"],"correct":0,"explanation":"Đáp án đúng là: Pháp luật bao giờ cũng thể hiện ban chất giai cấp rõ nét hơn bản chất xã hội Vì: Nội dung của pháp luật thể hiện ý chí của giai cấp thống trị, đồng thời thể hiện ý chí và lợi ích của các tầng lớp, giai cấp khác trong xã hội.","reference":"Mục 1.2"},{"id":141,"text":"Trong quan hệ pháp luật “A tặng cho B một chiếc xe máy có giá trị 50 triệu đồng”. Khách thể được xác định là:","answers":["A. B","B. Không có khách thể","C. Chiếc xe máy","D. 50 triệu đồng"],"correct":2,"explanation":"Đáp án đúng là: Chiếc xe máy Vì: Khách thể của quan hệ pháp luật là những lợi ích vật chất hoặc phi vật chất và các lợi ích khác mà các chủ thể mong muốn đạt được nhằm thoả mãn nhu cầu của mình khi tham gia vào các quan hệ nhất định.","reference":"Mục 1.4.3"},{"id":142,"text":"Dấu hiệu nào sau đây là quan trọng hơn cả để xác định một hành vi là tội phạm","answers":["A. Bị xử lý bằng hình phạt","B. Là hành vi có lỗi","C. Do chủ thể có năng lực trách nhiệm hình sự thực hiện","D. Được quy định trong Bộ luật hình sự"],"correct":3,"explanation":"Đáp án đúng là: Được quy định trong Bộ luật hình sự Vì: Tham khảo: Tham khảo trong BG Text 7","reference":""},{"id":143,"text":"Chế định trung tâm, quan trọng nhất trong Ngành luật Dân sự là","answers":["A. Chế định quyền sở hữu trí tuệ","B. Chế định hợp đồng dân sự","C. Chế định quyền sở hữu tài sản","D. Chế định quyền thừa kế tài sản"],"correct":2,"explanation":"Đáp án đúng là: Chế định quyền sở hữu tài sản Vì: Chế định về quyền sở hữu là chế định trung tâm, quan trọng nhất không những chỉ riêng cho Ngành luật Dân sự mà còn cho cả hệ thống pháp luật. Các hình thức sở hữu được Ngành luật Dân sự và Ngành luật Hiến pháp thừa nhận ở nước ta hiện nay gồm: Sở hữu nhà nước; sở hữu tập thể (sở hữu của các tổ chức chính trị, tổ chức Chính trị - Xã hội, sở hữu của các tổ chức xã hội, tổ chức xã hội - nghề nghiệp, tổ chức chính trị xã hội - nghề nghiệp); sở hữu tư nhân; sở hữu chung.","reference":"Mục 5.2.1"},{"id":144,"text":"Khẳng định nào sau đây không chính xác:","answers":["A. Quyền sở hữu là một phạm trù kinh tế tồn tại khách quan","B. Quyền sở hữu là một chế định pháp lý của ngành luật Dân sự","C. Trong quan hệ pháp luật sở hữu, chủ thể có thể chỉ có quyền mà không có nghĩa vụ","D. Quan hệ sở hữu bao gồm 2 yếu tố là chủ thể và khách thể"],"correct":3,"explanation":"Đáp án đúng là: Quan hệ sở hữu bao gồm 2 yếu tố là chủ thể và khách thể Vì: Quyền sở hữu bao gồm quyền chiếm hữu, quyền sử dụng và quyền định đoạt tài sản của chủ sở hữu theo quy định của pháp luật (Điều 164 Bộ luật Dân sự).","reference":"Mục 5.2.1"},{"id":145,"text":"Chức danh nào sau đây không cần phải là đại biểu Quốc hội","answers":["A. Chánh án Tòa án nhân dân tối cao","B. Chủ tịch nước","C. Bộ trưởng","D. Phó chủ tịch nước"],"correct":2,"explanation":"Đáp án đúng là: Bộ trưởng Tham khảo: Chương 3","reference":""},{"id":146,"text":"Độ tuổi được phép kết hôn của nam theo quy định của Luật Hôn nhân và gia đình hiện hành là:","answers":["A. Đủ 18 tuổi trở lên","B. Từ 18 tuổi trở lên","C. Từ 20 tuổi trở lên","D. Đủ 20 tuổi trở lên"],"correct":3,"explanation":"Đáp án đúng là: Đủ 20 tuổi trở lên Vì: Tuổi kết hôn được quy định “Nam từ đủ 20 tuổi trở lên, nữ từ đủ 18 tuổi trở lên” (Điều 8, Luật Hôn nhân và gia đình năm 2014).","reference":"Mục 7.2.1"},{"id":147,"text":"Chủ thể nào sau đây không thuộc hàng thừa kế thứ hai của người chết","answers":["A. Em ruột","B. Con nuôi","C. Bà nội","D. Anh ruột"],"correct":1,"explanation":"Đáp án đúng là: Con nuôi Vì: Hàng thừa kế thứ 2 của người chết gồm: Ông nội, bà nội, ông ngoại, bà ngoài của người chết; cháu ruột mà người chết là ông nội, bà nội, ông ngoại, bà ngoại; anh, chị, em ruột của người chết","reference":"Mục 5.2.3"},{"id":148,"text":"Hình phạt nào sau đây có thể là hình phạt chính, cũng có thể là hình phạt bổ sung","answers":["A. Quản chế","B. Cải tạo không giam giữ","C. Phạt tiền","D. Phạt tù"],"correct":2,"explanation":"Đáp án đúng là: Phạt tiền Vì: Các hình phạt chính gồm: Cảnh cáo, phạt tiền, trục xuất, cải tạo không giam giữ, tù có thời hạn, tù chung thân, tử hình. Các hình phạt bổ sung gồm: Cấm đảm nhiệm những chức vụ, cấm làm những nghề hoặc công việc nhất định
