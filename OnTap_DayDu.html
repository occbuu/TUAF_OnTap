eference":"Mục 16.3"},{"id":249,"text":"Thuốc tiêm có dược chất không ổn định trong môi trường nước thường được bào chế dưới dạng gì?","answers":["A. Bột pha tiêm","B. Hỗn dịch tiêm","C. Thuốc tiêm dạng gel","D. Dung dịch tiêm"],"correct":0,"explanation":"Đáp án đúng là: Bột pha tiêm Vì: Quy trình công nghệ với bột pha tiêm","reference":"Mục 10.3"},{"id":250,"text":"Tá dược nào được dùng để tăng độ trơn của viên nén và làm giảm ma sát giữa các hạt?","answers":["A. Sodium starch glycolat","B. Dicalci phosphat","C. Tinh bột","D. Magie stearat"],"correct":3,"explanation":"Đáp án đúng là: Magie stearat Vì: Thành phần thuốc viên nén","reference":"Mục 13.4"},{"id":251,"text":"Quá trình chuyển hóa thuốc chủ yếu diễn ra ở đâu trong cơ thể?","answers":["A. Thận","B. Gan","C. Phổi","D. Ruột"],"correct":1,"explanation":"Đáp án đúng là: Gan Vì: Yếu tố sinh học ảnh hưởng đến SKD","reference":"Mục 3.2"},{"id":252,"text":"Dược chất là gì?","answers":["A. Là chất giúp bào chế các dạng thuốc","B. Là thành phần có tác dụng kéo dài độ ổn định của thuốc","C. Là thành phần chính của dạng thuốc, tạo ra tác dụng dược lý để điều trị, phòng hay chẩn đoán bệnh","D. Là chất phụ gia không ảnh hưởng đến tác dụng của thuốc"],"correct":2,"explanation":"Đáp án đúng là: Là thành phần chính của dạng thuốc, tạo ra tác dụng dược lý để điều trị, phòng hay chẩn đoán bệnh Vì: Theo khái niệm dược chất Tham khảo:","reference":"mục 1.3"},{"id":253,"text":"Ưu điểm nào sau đây của viên nén giúp việc sử dụng thuốc trở nên thuận tiện hơn?","answers":["A. Thể tích gọn nhẹ, dễ vận chuyển và dễ mang theo người","B. Dược chất ổn định","C. Che giấu mùi vị khó chịu của dược chất","D. Khả năng phân liều tương đối chính xác"],"correct":0,"explanation":"Đáp án đúng là: Thể tích gọn nhẹ, dễ vận chuyển và dễ mang theo người Vì: Ưu nhược điểm của thuốc viên nén","reference":"Mục 13.2"},{"id":254,"text":"Chất gây thấm trong thuốc tiêm hỗn dịch có tác dụng gì?","answers":["A. Tăng khả năng tan của dược chất","B. Tăng tính đồng nhất của hỗn dịch","C. Làm thuốc dễ tiêm hơn","D. Giảm độ nhớt của thuốc tiêm"],"correct":1,"explanation":"Đáp án đúng là: Tăng tính đồng nhất của hỗn dịch Vì: Các thành phần của thuốc tiêm","reference":"Mục 8.3"},{"id":255,"text":"Khi dùng thuốc tiêm, điều nào sau đây cần phải lưu ý?","answers":["A. Đảm bảo thuốc tiêm vô khuẩn","B. Chỉ tiêm thuốc khi bệnh nhân đã ăn no","C. Tiêm thuốc vào mọi bộ phận cơ thể","D. Không cần chú ý đến thể tích tiêm"],"correct":0,"explanation":"Đáp án đúng là: Đảm bảo thuốc tiêm vô khuẩn Vì: Dung môi thuốc tiêm","reference":"Mục 8.3.2"},{"id":256,"text":"Ở phương pháp ép khuôn, màng gelatin được làm đông cứng bằng cách nào?","answers":["A. Sấy ở nhiệt độ cao","B. Để khô tự nhiên","C. Nhúng vào dung dịch hóa dẻo","D. Làm lạnh trên trống quay"],"correct":3,"explanation":"Đáp án đúng là: Làm lạnh trên trống quay Vì: Theo phương pháp bào chế nang mềm gelatin","reference":"Mục 16.2"},{"id":257,"text":"Cơ chế nào dưới đây giúp cải thiện sự hấp thu thuốc qua đường tiêu hóa?","answers":["A. Sử dụng thuốc ở dạng muối","B. Sử dụng thuốc dưới dạng vô định hình","C. Cải thiện tính thấm của màng ruột","D. Tất cả các đáp án"],"correct":3,"explanation":"Đáp án đúng là: Tất cả các đáp án Vì: Yếu tố sinh học ảnh hưởng đến SKD","reference":"Mục 3.2"},{"id":258,"text":"Khi pha chế dung dịch tiêm Phenobarbital, cần bổ sung gì để khắc phục sự thuỷ phân của dược chất?","answers":["A. Sử dụng hỗn hợp dung môi như propylen glycol và alcol ethylic","B. Thêm chất bảo quản","C. Dùng dung dịch natrihydroxyd","D. Thêm chất làm tăng độ thấm"],"correct":0,"explanation":"Đáp án đúng là: Sử dụng hỗn hợp dung môi như propylen glycol và alcol ethylic Vì: các khắc phục tương kỵ hóa học","reference":"Mục 4.3"},{"id":259,"text":"Thuốc viên nang được phân loại dựa theo yếu tố nào sau đây?","answers":["A. Màu sắc của viên nang","B. Cách sử dụng của viên nang","C. Hình dạng của viên nang","D. Thành phần của vỏ nang"],"correct":3,"explanation":"Đáp án đúng là: Thành phần của vỏ nang Vì: Theo phân loại thuốc viên nang","reference":"Mục 15.1"},{"id":260,"text":"Theo mục đích sử dụng, thuốc mỡ không bao gồm loại nào sau đây?","answers":["A. Thuốc mỡ bảo vệ da và niêm mạc","B. Thuốc mỡ có tác dụng làm trắng da","C. Thuốc mỡ gây tác dụng điều trị tại chỗ","D. Thuốc mỡ gây hấp thu hoặc tác dụng toàn thân"],"correct":1,"explanation":"Đáp án đúng là: Thuốc mỡ có tác dụng làm trắng da Vì: Theo phân loại thuốc mỡ","reference":"Mục 11.2"},{"id":261,"text":"Viên nang có thể chứa các dạng dược chất nào sau đây?","answers":["A. Chỉ vi hạt và viên nang nhỏ","B. Bột, cốm, vi hạt, vi nang, viên nang nhỏ, viên nén hoặc phối hợp các dạng này","C. Chỉ viên nén và vi nang","D. Chỉ bột thuốc và cốm"],"correct":1,"explanation":"Đáp án đúng là: Bột, cốm, vi hạt, vi nang, viên nang nhỏ, viên nén hoặc phối hợp các dạng này Vì: Theo ưu, nhược điểm của viên nén","reference":"Mục 15.2"},{"id":262,"text":"Tương đương sinh học: Chỉ 2 hay nhiều chế phẩm bào chế có tốc độ và mức độ hấp thu dược chất như nhau…..?","answers":["A. trên 2 đối tượng ở cùng điều kiện thử nghiệm","B. trên cùng đối tượng ở 2 điều kiện thử nghiệm khác nhau","C. trên 2 đối tượng ở 2 điều kiện thử nghiệm khác nhau","D. trên cùng đối tượng và điều kiện thử nghiệm"],"correct":3,"explanation":"Đáp án đúng là: trên cùng đối tượng và điều kiện thử nghiệm Vì: Theo khái niệm các loại tương đương","reference":"Mục 2.1"},{"id":263,"text":"Quá trình lọc là gì?","answers":["A. Quá trình loại các chất trong dung dịch bằng cách cho dung dịch đi qua một loại vật liệu","B. Quá trình cho dung dịch đi qua một loại vật liệu để thu được dung dịch trong","C. Quá trình loại tiểu phần chất rắn không tan trong dung dịch","D. Quá trình loại tiểu phần chất rắn không tan trong dung dịch bằng cách cho dung dịch đi qua một loại vật liệu để thu được dung dịch trong"],"correct":3,"explanation":"Đáp án đúng là: Quá trình loại tiểu phần chất rắn không tan trong dung dịch bằng cách cho dung dịch đi qua một loại vật liệu để thu được dung dịch trong Vì: quá trình lọc","reference":"Mục 7.3"},{"id":264,"text":"Tại sao quy trình sản xuất phải được kiểm soát chặt chẽ ngay từ đầu?","answers":["A. Để giảm chi phí sản xuất","B. Để đảm bảo thuốc có màu sắc đẹp","C. Để đảm bảo tá dược không bị thay đổi tính chất","D. Để đảm bảo chất lượng sản phẩm và đề ra các chỉ tiêu kiểm tra"],"correct":3,"explanation":"Đáp án đúng là: Để đảm bảo chất lượng sản phẩm và đề ra các chỉ tiêu kiểm tra Vì: Nguyên tắc lựa chọn tá dược xây dựng công thức dập viên","reference":"Mục 14.2"},{"id":265,"text":"Nang mềm có đặc điểm nào sau đây?","answers":["A. Chỉ được sử dụng để chứa thuốc dạng rắn","B. Vỏ nang cứng, giòn, dễ vỡ","C. Không chứa chất hóa dẻo trong vỏ nang","D. Có nhiều hình dạng và kích thước khác nhau"],"correct":3,"explanation":"Đáp án đúng là: Có nhiều hình dạng và kích thước khác nhau Vì: Theo phân loại thuốc viên nang","reference":"Mục 15.1"},{"id":266,"text":"Viên nén được sản xuất bằng phương pháp xát hạt tầng sôi có đặc điểm nào?","answers":["A. Cần nhiều tá dược dính hơn xát hạt ướt","B. Viên dễ bị biến dạng khi bảo quản","C. Khó kiểm soát kích thước hạt","D. Viên có độ xốp cao và dễ rã và dễ hòa tan"],"correct":3,"explanation":"Đáp án đúng là: Viên có độ xốp cao và dễ rã và dễ hòa tan Vì: Nguyên tắc lựa chọn phương pháp tạo hạt dập viên","reference":"Mục 14.3"},{"id":267,"text":"Viên nén sủi bọt có đặc điểm gì?","answers":["A. Không có phản ứng với nước và chỉ tan trong dịch dạ dày","B. Là viên bao chứa acid và không phản ứng với nước","C. Chứa các acid và carbonat hoặc hydrocarbonat, giải phóng CO2 khi gặp nước","D. Giải phóng dược chất từ từ khi tiếp xúc với nước"],"correct":2,"explanation":"Đáp án đúng là: Chứa các acid và carbonat hoặc hydrocarbonat, giải phóng CO2 khi gặp nước Vì: Các loại viên nén","reference":"Mục 13.3"},{"id":268,"text":"Loại dược chất nào thường được sử dụng trong hệ trị liệu qua da?","answers":["A. Các thuốc kháng sinh phổ rộng","B. Các thuốc điều trị dạ dày","C. Vitamin tổng hợp","D. Các thuốc giảm đau, chống co thắt"],"correct":3,"explanation":"Đáp án đúng là: Các thuốc giảm đau, chống co thắt Vì: Theo phân loại thuốc mỡ","reference":"Mục 11.2"},{"id":269,"text":"Vì sao không nên nghiền dược chất quá mịn trong sản xuất viên nén?","answers":["A. Khiến dược chất bị phân hủy ngay lập tức","B. Làm giảm sinh khả dụng của thuốc","C. Làm tăng độ tan quá mức cần thiết","D. Gây khó khăn trong quá trình trộn do lực hút tĩnh điện"],"correct":3,"explanation":"Đáp án đúng là: Gây khó khăn trong quá trình trộn do lực hút tĩnh điện Vì: Đặc điểm của quá trình khảo sát các tính chất lý hoá của dược chất","reference":"Mục 14.1"},{"id":270,"text":"Tốc độ hoà tan của dược chất phụ thuộc vào bề mặt tiếp xúc giữa tiểu phần rắn và …....?","answers":["A. Môi trường không bão hoà","B. Môi trường bão hoà","C. Môi trường lỏng","D. Môi trường hoà tan"],"correct":3,"explanation":"Đáp án đúng là: Môi trường hoà tan Vì: Tính chất về tốc độ hòa tan của dược chất","reference":"Mục 3.1"},{"id":271,"text":"Điều kiện để chất điện hoạt có tác dụng làm tăng độ tan của 1 chất khác là gì?","answers":["A. tạo được nồng độ lớn hơn nồng độ micelle tới hạn","B. dùng với lượng nhỏ","C. dùng với lượng đủ lớn tạo được nồng độ lớn hơn nồng độ micelle tới hạn","D. dùng với lượng đủ lớn"],"correct":2,"explanation":"Đáp án đúng là: dùng với lượng đủ lớn tạo được nồng độ lớn hơn nồng độ micelle tới hạn Vì: quá trình hòa tan","reference":"Mục 7.2"},{"id":272,"text":"Bao bì lý tưởng của thuốc tiêm phải có đặc điểm gì?","answers":["A. Có thể bị ảnh hưởng bởi nhiệt độ cao","B. Không ảnh hưởng đến chất lượng của thuốc tiêm","C. Có thể làm hỏng dược chất khi bảo quản lâu dài","D. Không có khả năng bảo vệ thuốc khỏi ánh sáng"],"correct":1,"explanation":"Đáp án đúng là: Không ảnh hưởng đến chất lượng của thuốc tiêm Vì: Bao bì của thuốc tiêm","reference":"Mục 8.4"},{"id":273,"text":"Đặc điểm nào dưới đây liên quan đến sự hấp thu của thuốc qua màng tiêu hóa?","answers":["A. Thuốc chỉ hấp thu khi có tác động của acid dạ dày","B. Thuốc có phân tử khối cao sẽ hấp thu nhanh hơn","C. Tốc độ hấp thu phụ thuộc vào hệ số phân bố lipid/nước","D. Màng tiêu hóa chỉ hấp thu thuốc dưới dạng ion hóa"],"correct":2,"explanation":"Đáp án đúng là: Tốc độ hấp thu phụ thuộc vào hệ số phân bố lipid/nước Vì: Các tính chất lý hóa của dược chất ảnh hưởng đến SKD","reference":"Mục 3.1"},{"id":274,"text":"Sản phẩm bào chế nói chung của 1 hoặc nhiều dược chất được gọi là gì?","answers":["A. Biệt dược","B. Dạng thuốc","C. Chế phẩm","D. Hỗn hợp dược chất"],"correct":2,"explanation":"Đáp án đúng là: Chế phẩm Vì: Theo khái niệm về chế phẩm Tham khảo:","reference":"mục 1.3"},{"id":275,"text":"Ở phương pháp nhỏ giọt, dung dịch dược chất được đóng vào nang ở giai đoạn nào?","answers":["A. Sau khi nang đã khô hoàn toàn","B. Cùng lúc với quá trình tạo vỏ nang","C. Trước khi tạo vỏ nang","D. Sau khi tạo vỏ nang"],"correct":1,"explanation":"Đáp án đúng là: Cùng lúc với quá trình tạo vỏ nang Vì: Theo phương pháp bào chế nang mềm gelatin","reference":"Mục 16.2"},{"id":276,"text":"Nhiệt độ da cao sẽ ảnh hưởng như thế nào đến sự hấp thu thuốc qua da?","answers":["A. Không thay đổi","B. Không thể hấp thu được nữa","C. Giảm mạnh","D. Làm tăng tốc độ hấp thu"],"correct":3,"explanation":"Đáp án đúng là: Làm tăng tốc độ hấp thu Vì: Các yếu tố ảnh hưởng đến sự hấp thu thuốc qua da","reference":"Mục 12.4"},{"id":277,"text":"Sự khác nhau giữa các dạng tinh thể của một dược chất có thể ảnh hưởng đến yếu tố nào sau đây?","answers":["A. Màu sắc của viên thuốc","B. Độ tan và sự hấp thu thuốc","C. Giá thành sản xuất","D. Độ bền cơ học của viên nén"],"correct":1,"explanation":"Đáp án đúng là: Độ tan và sự hấp thu thuốc Vì: Đặc điểm của quá trình khảo sát các tính chất lý hoá của dược chất","reference":"Mục 14.1"},{"id":278,"text":"Sử dụng các chất trung gian hoà tan hoặc chất làm tăng độ tan trong các dung dịch thuốc khi nào?","answers":["A. Cần làm mất kết tủa","B. Dược chất không thể hoà tan bình thường được","C. Dược chất có thể hoà tan bình thường được","D. Có quá nhiều dược chất"],"correct":1,"explanation":"Đáp án đúng là: Dược chất không thể hoà tan bình thường được Vì: các khắc phục tương kỵ hóa học","reference":"Mục 4.3"},{"id":279,"text":"Quá trình giải phóng dược chất khỏi chế phẩm thuốc phụ thuộc vào yếu tố nào?","answers":["A. Cấu trúc phân tử dược chất","B. Tá dược và kỹ thuật bào chế","C. Nồng độ dược chất","D. Đặc điểm sinh học của bệnh súc"],"correct":1,"explanation":"Đáp án đúng là: Tá dược và kỹ thuật bào chế Vì: Theo khái niệm quá trình sinh dược học","reference":"Mục 2.1"},{"id":280,"text":"Chọn đáp án sai về tính chất của các halogenid kiềm hay kiềm thổ","answers":["A. có phản ứng trung hòa với acid","B. có tính kiềm","C. háo ẩm mạnh","D. trơ về mặt hoá học"],"correct":3,"explanation":"Đáp án đúng là: trơ về mặt hoá học Vì: tính chất của halogenid kiềm và kiềm thổ","reference":"Mục 5.1"},{"id":281,"text":"Khi pha chế thuốc tiêm, yêu cầu đối với bao bì là gì?","answers":["A. Bao bì phải dễ dàng mở ra","B. Bao bì không quan trọng","C. Bao bì cần đảm bảo an toàn và không phản ứng với thuốc","D. Bao bì có thể là bất kỳ vật liệu nào"],"correct":2,"explanation":"Đáp án đúng là: Bao bì cần đảm bảo an toàn và không phản ứng với thuốc Vì: Bao bì của thuốc tiêm","reference":"Mục 8.4"},{"id":282,"text":"Nguyên nhân chính gây ra tương kỵ trong bào chế thuốc là gì?","answers":["A. Chọn dược chất và tá dược không hợp lý; Quy trình sản xuất không chính xác; Sử dụng thuốc không đúng cách.","B. Sử dụng thuốc không đúng cách.","C. Quy trình sản xuất không chính xác; Sử dụng thuốc không đúng cách.","D. Chọn dược chất và tá dược không hợp lý; Quy trình sản xuất không chính xác"],"correct":0,"explanation":"Đáp án đúng là: Chọn dược chất và tá dược không hợp lý; Quy trình sản xuất không chính xác; Sử dụng thuốc không đúng cách. Vì: Nguyên nhân tương kỵ","reference":"Mục 4.1"},{"id":283,"text":"Phương pháp điều chế thuốc mỡ bằng phương pháp hòa tan chủ yếu áp dụng cho dược chất nào?","answers":["A. Dược chất dễ bay hơi","B. Dược chất hoà tan trong tá dược hoặc trong dung dịch trung gian","C. Dược chất không tan trong tá dược","D. Dược chất không thể hòa tan trong bất kỳ tá dược nào"],"correct":1,"explanation":"Đáp án đúng là: Dược chất hoà tan trong tá dược hoặc trong dung dịch trung gian Vì: Theo quy trình điều chế thuốc mỡ bằng phương pháp hòa tan","reference":"Mục 12.1"},{"id":284,"text":"Khi tuổi của động vật càng cao, khả năng hấp thu thuốc như nào?","answers":["A. Giảm","B. Tăng","C. Không thay đổi","D. Tăng tùy từng trường hợp"],"correct":0,"explanation":"Đáp án đúng là: Giảm Vì: Yếu tố sinh học ảnh hưởng đến SKD","reference":"Mục 3.2"},{"id":285,"text":"Để khắc phục tương kỵ vật lý do dược chất ngậm nước, ta có thể làm gì?","answers":["A. Giảm độ ẩm trong môi trường sản xuất","B. Thay thế dược chất ngậm nước bằng dược chất khan","C. Tăng lượng tá dược trong công thức","D. Sử dụng dược chất hòa tan trong nước"],"correct":1,"explanation":"Đáp án đúng là: Thay thế dược chất ngậm nước bằng dược chất khan Vì: Biện pháp khắc phục tương kỵ vật lý","reference":"Mục 5.1"},{"id":286,"text":"Chất sát khuẩn chỉ được sử dụng trong thuốc tiêm đơn liều khi nào?","answers":["A. Khi thuốc không cần tiệt khuẩn","B. Khi thuốc có thể bị ô nhiễm vi khuẩn trong suốt quá trình bảo quản","C. Khi thuốc được pha chế và tiệt khuẩn bằng nhiệt","D. Khi thuốc được sản xuất bằng kỹ thuật vô khuẩn"],"correct":3,"explanation":"Đáp án đúng là: Khi thuốc được sản xuất bằng kỹ thuật vô khuẩn Vì: Các thành phần của thuốc tiêm","reference":"Mục 8.3"},{"id":287,"text":"Chất bảo quản nào có thể gây tương kỵ với gôm arabic?","answers":["A. Paraben","B. Acid sorbic","C. Thiomersal","D. Benzakolium chloride"],"correct":1,"explanation":"Đáp án đúng là: Acid sorbic Vì: nguyên nhân của tương kỵ hóa học","reference":"Mục 5.2"},{"id":288,"text":"Sinh khả dụng invivo có thể đánh giá giai đoạn nào trong quá trình sinh dược học của 1 dạng thuốc?","answers":["A. Hấp thu dược chất","B. Hoà tan dược chất","C. Tất cả các ý đã nêu đều đúng","D. Giải phóng dược chất"],"correct":0,"explanation":"Đáp án đúng là: Hấp thu dược chất Vì: Theo khái niệm SKD invivo","reference":"Mục 2.2"},{"id":289,"text":"Phản ứng oxy hóa khử trong dược phẩm có thể gây ra điều gì?","answers":["A. Tăng tính ổn định của thuốc","B. Sự phân hủy dược chất","C. Tạo ra chất có tác dụng mạnh hơn","D. Không có tác dụng"],"correct":1,"explanation":"Đáp án đúng là: Sự phân hủy dược chất Vì: nguyên nhân của tương kỵ hóa học","reference":"Mục 5.2"},{"id":290,"text":"Với chất điện li yếu, ảnh hưởng của PH dung dịch đến độ tan được xem xét trong những trường hợp nào?","answers":["A. chất tan là acid yếu, bazo mạnh","B. chất tan là acid yếu, bazo yếu và lưỡng tính","C. chất tan là acid mạnh, bazo mạnh và lưỡng tính","D. chất tan là acid yếu, bazơ mạnh"],"correct":1,"explanation":"Đáp án đúng là: chất tan là acid yếu, bazo yếu và lưỡng tính Vì: quá trình hòa tan","reference":"Mục 7.2"},{"id":291,"text":"Biểu hiện chung của tương kỵ hoá học do phản ứng thuỷ phân là gì?","answers":["A. cả 3 ý đã nêu đều đúng","B. tăng các sản phẩm khác của phản ứng thuỷ phân","C. giảm nồng độ dược chất","D. vẩn đục, kết tủa dung dịch thuốc"],"correct":0,"explanation":"Đáp án đúng là: cả 3 ý đã nêu đều đúng Vì: biểu hiện của tương kỵ hóa học","reference":"Mục 5.2"},{"id":292,"text":"Tá dược nào có tính chịu nén cao và thường được sử dụng trong viên nén dập thẳng?","answers":["A. Glucose","B. Tinh bột","C. Lactose","D. Mannitol"],"correct":3,"explanation":"Đáp án đúng là: Mannitol Vì: Thành phần thuốc viên nén","reference":"Mục 13.4"},{"id":293,"text":"Dung môi nào được dùng phổ biến trong điều chế thuốc tiêm?","answers":["A. Ethanol","B. Dầu thực vật","C. Cồn","D. Nước"],"correct":3,"explanation":"Đáp án đúng là: Nước Vì: các loại dung môi","reference":"Mục 6.3"},{"id":294,"text":"Dược chất nào dễ gây kích ứng khi dùng dưới dạng thô?","answers":["A. amoxicillin","B. penicillin","C. natri bromid, natri iodid, cloral hydrat","D. Iodine"],"correct":2,"explanation":"Đáp án đúng là: natri bromid, natri iodid, cloral hydrat Vì: Nhược điểm của thuốc dạng dung dịch","reference":"Mục 6.2"},{"id":295,"text":"Thành phần nào chiếm tỷ lệ cao nhất trong vỏ nang tinh bột?","answers":["A. Tinh bột","B. Glycerin","C. Gelatin","D. Nước"],"correct":3,"explanation":"Đáp án đúng là: Nước Vì: Theo phương pháp bào chế nang tinh bột","reference":"Mục 16.1"},{"id":296,"text":"Sự hấp thu nước trong tá dược độn có thể ảnh hưởng đến viên nén như thế nào?","answers":["A. Độ bền cơ học của viên nén","B. Độ mài mòn của viên nén","C. Màu sắc của viên nén","D. Quá trình phân tán hoạt chất"],"correct":0,"explanation":"Đáp án đúng là: Độ bền cơ học của viên nén Vì: Thành phần thuốc viên nén","reference":"Mục 13.4"},{"id":297,"text":"Trong công thức pha chế thuốc tiêm Sulfamethoxazol - Trimethoprim, cần bổ sung dung môi nào để hoà tan dược chất?","answers":["A. Glycerin","B. Propylen glycol","C. Acid boric","D. Dung dịch kiềm"],"correct":3,"explanation":"Đáp án đúng là: Dung dịch kiềm Vì: các khắc phục tương kỵ hóa học","reference":"Mục 4.3"},{"id":298,"text":"Để tăng tốc độ lọc dung dịch, trong phương pháp lọc nào người ta dùng biện pháp hút chân không phía sau vật liệu lọc?","answers":["A. Lọc dưới áp suất nén","B. Lọc với áp suất cao","C. Lọc dưới áp suất giảm","D. Lọc dưới áp suất thuỷ tĩnh"],"correct":2,"explanation":"Đáp án đúng là: Lọc dưới áp suất giảm Vì: quá trình lọc","reference":"Mục 7.3"},{"id":299,"text":"Độ phân cực của dung môi và chất tan phụ thuộc vào yếu tố gì?","answers":["A. công thức cấu tạo của các chất","B. kiểu liên kết của các nguyên tử và sự sắp xếp của các nhóm nguyên tử trong phân tử","C. tính chất hóa học của các chất","D. sự sắp xếp của các nhóm nguyên tử trong phân tử"],"correct":1,"explanation":"Đáp án đúng là: kiểu liên kết của các nguyên tử và sự sắp xếp của các nhóm nguyên tử trong phân tử Vì: Phân loại chất tan và dung môi theo độ phân cực","reference":"Mục 6.3"},{"id":300,"text":"Khi dùng giấy lọc xám cần chú ý điều gì?","answers":["A. phải ngâm nước trước khi dùng","B. phải rửa kỹ bằng nước cất","C. phải rửa kỹ bằng nước cất đun sôi","D. phải rửa kỹ bằng nước lạnh"],"correct":2,"explanation":"Đáp án đúng là: phải rửa kỹ bằng nước cất đun sôi Vì: quá trình lọc","reference":"Mục 7.3"},{"id":301,"text":"Thuốc Penicillin được phát hiện năm nào?","answers":["A. 1928","B. 1945","C. 1799","D. 1885"],"correct":0,"explanation":"Đáp án đúng là: 1928 Vì: Năm 1928: Alexander Fleming phát hiện ra Penicillin Tham khảo:","reference":"mục 1.2"},{"id":302,"text":"Tá dược trong thuốc mỡ điều trị tại các tổ chức sâu hoặc có tác dụng toàn thân cần có đặc tính gì?","answers":["A. Luôn chứa các chất diệt khuẩn mạnh","B. Chỉ cần bảo vệ da, không cần giải phóng thuốc nhanh","C. Có khả năng thấm cao và giải phóng nhanh dược chất","D. Giữ chặt dược chất để thuốc không thấm vào da"],"correct":2,"explanation":"Đáp án đúng là: Có khả năng thấm cao và giải phóng nhanh dược chất Vì: Theo đặc điểm thành phần của thuốc mỡ","reference":"Mục 11.4"},{"id":303,"text":"Đặc tính nào dưới đây không ảnh hưởng đến SKD của thuốc?","answers":["A. Tình trạng bệnh lý của động vật dùng thuốc","B. Tốc độ hòa tan","C. Nồng độ thuốc trong cơ thể","D. Dạng bào chế"],"correct":2,"explanation":"Đáp án đúng là: Nồng độ thuốc trong cơ thể Vì: Yếu tố sinh học ảnh hưởng đến SKD","reference":"Mục 3.2"},{"id":304,"text":"Máy dập viên nén đã được phát minh vào năm nào?","answers":["A. 1932","B. 1843","C. 1874","D. 1950"],"correct":2,"explanation":"Đáp án đúng là: 1874 Vì: Quá trình phát triển của việc sản xuất viên nén","reference":"Mục 13.1"},{"id":305,"text":"Quy trình sản xuất viên nén được mô tả chính thức lần đầu tiên vào năm nào?","answers":["A. 1843","B. 1950","C. 1874","D. 1932"],"correct":0,"explanation":"Đáp án đúng là: 1843 Vì: Quá trình phát triển của việc sản xuất viên nén","reference":"Mục 13.1"},{"id":306,"text":"Thuốc nang là dạng thuốc uống có đặc điểm nào sau đây?","answers":["A. Chứa hoạt chất trong vỏ nang cứng hoặc mềm, với nhiều kiểu dáng và kích thước khác nhau","B. Chỉ chứa hoạt chất ở dạng rắn như bột và cốm","C. Chỉ có vỏ nang cứng làm từ gelatin","D. Chỉ được bào chế dưới dạng nang mềm"],"correct":0,"explanation":"Đáp án đúng là: Chứa hoạt chất trong vỏ nang cứng hoặc mềm, với nhiều kiểu dáng và kích thước khác nhau Vì: Theo khái niệm thuốc nang","reference":"Mục 15.1"},{"id":307,"text":"Thuốc nào dưới đây có thể \"tăng hấp thu thuốc khi động vật dùng thuốc tổn thương niêm mạc ruột\"?","answers":["A. Penicillin","B. Corticosteroid","C. Amoxicillin","D. Tetracyclin"],"correct":3,"explanation":"Đáp án đúng là: Tetracyclin Vì: Yếu tố sinh học ảnh hưởng đến SKD","reference":"Mục 3.2"},{"id":308,"text":"Yếu tố quan trọng nhất cần lưu ý trong phương pháp dập trực tiếp là gì?","answers":["A. Lưu tính của khối bột và khả năng kết dính","B. Kích thước viên nén","C. Độ ẩm của tá dược","D. Màu sắc của viên"],"correct":0,"explanation":"Đáp án đúng là: Lưu tính của khối bột và khả năng kết dính Vì: Nguyên tắc lựa chọn phương pháp tạo hạt dập viên","reference":"Mục 14.3"},{"id":309,"text":"Trong các đường đưa thuốc sau, đường nào thuốc có sinh khả dụng cao nhất?","answers":["A. Tiêm bắp","B. Uống","C. Tiêm dưới da","D. Tiêm tĩnh mạch"],"correct":3,"explanation":"Đáp án đúng là: Tiêm tĩnh mạch Vì: Yếu tố sinh học ảnh hưởng đến SKD","reference":"Mục 3.2"},{"id":310,"text":"Theo kích thước của các tiểu phần, hệ phân tán được chia thành những loại nào?","answers":["A. 3 loại là hệ đồng thể, hệ dị thể, hệ siêu vi dị thể","B. 4 loại là hệ đồng thể, hệ dị thể, hệ siêu vi dị thể và hệ phân tán keo","C. 2 loại là hệ đồng thể, hệ dị thể","D. 2 loại là hệ đồng thể, hệ siêu vi dị thể"],"correct":0,"explanation":"Đáp án đúng là: 3 loại là hệ đồng thể, hệ dị thể, hệ siêu vi dị thể Vì: Phân loại dung dịch thuốc","reference":"Mục 6.1"},{"id":311,"text":"Chất đẳng trương trong thuốc tiêm có vai trò gì?","answers":["A. Giúp thuốc tiêm có màu sắc đẹp","B. Giúp thuốc tiêm không gây tổn thương tế bào khi tiêm vào cơ thể","C. Làm giảm cảm giác đau khi tiêm","D. Làm tăng hiệu quả điều trị của thuốc"],"correct":1,"explanation":"Đáp án đúng là: Giúp thuốc tiêm không gây tổn thương tế bào khi tiêm vào cơ thể Vì: Các thành phần của thuốc tiêm","reference":"Mục 8.3"},{"id":312,"text":"Thuốc mỡ dùng tra mắt hoặc bôi vết thương, vết bỏng cần đáp ứng yêu cầu đặc biệt nào?","answers":["A. Không cần kiểm soát kích thước tiểu phần","B. Không cần đảm bảo độ vô khuẩn","C. Phải vô khuẩn, đạt yêu cầu về hàm lượng nước và kích thước tiểu phần phân tán","D. Chỉ cần chứa dược chất có tác dụng kháng khuẩn"],"correct":2,"explanation":"Đáp án đúng là: Phải vô khuẩn, đạt yêu cầu về hàm lượng nước và kích thước tiểu phần phân tán Vì: Theo yêu cầu đối với thuốc mỡ","reference":"Mục 11.3"},{"id":313,"text":"Tại sao dung dịch thuốc dễ dàng được hấp thu hơn so với thuốc rắn?","answers":["A. Vì dung dịch có độ ổn định cao hơn thuốc rắn","B. Vì dung dịch dễ dàng được hấp thu vào máu mà không cần hòa tan","C. Vì dung dịch có thể hòa tan trong cơ thể ngay lập tức","D. Vì thuốc rắn không thể hòa tan trong cơ thể"],"correct":2,"explanation":"Đáp án đúng là: Vì dung dịch có thể hòa tan trong cơ thể ngay lập tức Vì: Ưu điểm của dung dịch thuốc","reference":"Mục 6.2"},{"id":314,"text":"Khi pha chế thuốc tiêm, nên làm gì để hạn chế sự oxy hoá?","answers":["A. Thêm chất gây thấm vào công thức","B. Sử dụng chất chống vi khuẩn","C. Dùng nước cất đã loại oxy hoà tan","D. Thực hiện pha chế trong môi trường có ánh sáng"],"correct":2,"explanation":"Đáp án đúng là: Dùng nước cất đã loại oxy hoà tan Vì: Các thành phần của thuốc tiêm","reference":"Mục 8.3"},{"id":315,"text":"Dạng thuốc là gì?","answers":["A. sản phẩm cuối cùng của quá trình bào chế","B. tất cả các chất tham gia tạo nên chế phẩm hoàn chỉnh","C. thành phần chính của chế phẩm","D. Tất cả các ý đã nêu đều đúng"],"correct":0,"explanation":"Đáp án đúng là: sản phẩm cuối cùng của quá trình bào chế Vì: Theo khái niệm dạng thuốc Tham khảo:","reference":"mục 1.3"},{"id":316,"text":"Việc cung cấp không khí sạch trong khu vực sạch nhằm mục đích gì?","answers":["A. Cung cấp không khí lạnh để giảm nhiệt độ","B. Để tạo ra một môi trường làm việc thoải mái cho công nhân","C. Đảm bảo không có bụi trong không khí","D. Đảm bảo không khí luôn mới và sạch, giảm ô nhiễm từ hoạt động sản xuất"],"correct":3,"explanation":"Đáp án đúng là: Đảm bảo không khí luôn mới và sạch, giảm ô nhiễm từ hoạt động sản xuất Vì: Theo yêu cầu về nhà xưởng sản xuất thuốc tiêm","reference":"Mục 9.1"},{"id":317,"text":"Các phễu lọc thuỷ tinh xốp có ưu điểm gì?","answers":["A. dễ rửa và thay thế sau khi lọc","B. trơ về mặt hóa học và có lỗ lọc phù hợp","C. trơ về mặt hóa học và có lỗ lọc rất bé","D. rẻ tiền, có lỗ lọc lớn"],"correct":2,"explanation":"Đáp án đúng là: trơ về mặt hóa học và có lỗ lọc rất bé Vì: quá trình lọc","reference":"Mục 7.3"},{"id":318,"text":"Thuốc nang cứng có đặc điểm gì?","answers":["A. Có vỏ nang gồm hai phần lồng khít vào nhau","B. Chỉ tan trong ruột, không tan trong dạ dày","C. Chỉ chứa được dược chất dạng lỏng","D. Có vỏ nang là một khối mềm dẻo"],"correct":0,"explanation":"Đáp án đúng là: Có vỏ nang gồm hai phần lồng khít vào nhau Vì: Theo đặc điểm của các loại thuốc viên nang","reference":"Mục 15.3"},{"id":319,"text":"Biện pháp nào có thể được áp dụng khi dược chất không tan trong dung môi nước?","answers":["A. Sử dụng hỗn hợp dung môi","B. Thêm chất bảo quản để kéo dài thời gian bảo quản","C. Tăng nhiệt độ để dược chất dễ hòa tan","D. Dùng nước cất làm dung môi duy nhất"],"correct":0,"explanation":"Đáp án đúng là: Sử dụng hỗn hợp dung môi Vì: các khắc phục tương kỵ hóa học","reference":"Mục 4.3"},{"id":320,"text":"Thuốc nang mềm thường chứa dược chất ở dạng nào?","answers":["A. Dạng bột hoặc cốm","B. Dạng dung dịch, hỗn dịch hoặc nhũ tương","C. Dạng bột nén chặt","D. Dạng viên nén nhỏ"],"correct":1,"explanation":"Đáp án đúng là: Dạng dung dịch, hỗn dịch hoặc nhũ tương Vì: Theo đặc điểm của các loại thuốc viên nang","reference":"Mục 15.3"},{"id":321,"text":"Nhược điểm của viên nén là gì?","answers":["A. Dược chất có thể bị giảm sinh khả dụng khi bào chế dưới dạng viên nén","B. Viên nén khó sử dụng hơn các dạng thuốc khác","C. Dược chất có thể bị biến dạng khi bào chế dưới dạng viên nén","D. Viên nén thường có giá thành đắt hơn các dạng thuốc khác"],"correct":0,"explanation":"Đáp án đúng là: Dược chất có thể bị giảm sinh khả dụng khi bào chế dưới dạng viên nén Vì: Ưu nhược điểm của thuốc viên nén","reference":"Mục 13.1"},{"id":322,"text":"Tá dược độn có tác dụng gì trong viên nén?","answers":["A. Tạo độ cứng cho viên nén","B. Làm tăng khả năng trượt giữa các hạt","C. Giúp viên nén phân tán đều trong dịch tiêu hóa","D. Giúp viên nén có hình dáng đẹp"],"correct":2,"explanation":"Đáp án đúng là: Giúp viên nén phân tán đều trong dịch tiêu hóa Vì: Thành phần thuốc viên nén","reference":"Mục 13.4"},{"id":323,"text":"Vì sao viên nang dễ uống hơn viên nén?","answers":["A. Do viên nang không cần nước khi uống","B. Do viên nang luôn có kích thước nhỏ hơn viên nén","C. Do viên nang tan ngay khi vào miệng","D. Do viên nang có vỏ trơn, dễ nuốt và màu sắc phong phú hơn"],"correct":3,"explanation":"Đáp án đúng là: Do viên nang có vỏ trơn, dễ nuốt và màu sắc phong phú hơn Vì: Theo ưu, nhược điểm của viên nén","reference":"Mục 15.2"},{"id":324,"text":"Độ tan của dược chất tăng lên khi KTTP giảm đi là do nguyên nhân nào?","answers":["A. trọng lượng phân tử giảm","B. năng lượng tự do trên bề mặt tiếp xúc tăng lên","C. trọng lượng phân tử tăng","D. tỷ trọng chất rắn giảm"],"correct":1,"explanation":"Đáp án đúng là: năng lượng tự do trên bề mặt tiếp xúc tăng lên Vì: quá trình hòa tan","reference":"Mục 7.2"},{"id":325,"text":"Tốc độ lọc tỷ lệ nghịch với gì?","answers":["A. Độ nhớt của dung dịch cần lọc, diện tích bề mặt lọc","B. Bán kính lỗ xốp, diện tích bề mặt lọc","C. Chiều dài mao quản trong màng lọc và độ nhớt của dung dịch cần lọc","D. Chiều dài mao quản trong màng lọc, diện tích bề mặt lọc"],"correct":2,"explanation":"Đáp án đúng là: Chiều dài mao quản trong màng lọc và độ nhớt của dung dịch cần lọc Vì: quá trình lọc","reference":"Mục 7.3"},{"id":326,"text":"Tăng hoạt động của cơ bắp sau khi tiêm sẽ ảnh hưởng đến sự hấp thu thuốc như nào?","answers":["A. Làm giảm tốc độ hấp thu","B. Không ảnh hưởng đến tốc độ hấp thu","C. Làm giảm hiệu quả thuốc","D. Tăng tốc độ hấp thu dược chất"],"correct":3,"explanation":"Đáp án đúng là: Tăng tốc độ hấp thu dược chất Vì: Đặc điểm các yếu tố ảnh hưởng đến sinh khả dụng của thuốc tiêm","reference":"Mục 10.4"},{"id":327,"text":"Trong hệ thống lau và đánh bóng viên nang, bộ phận nào giúp loại bỏ bụi trên viên?","answers":["A. Bộ phận lau viên dạng bàn chải trong ống hình trụ","B. Lớp phủ gelatin bảo vệ viên nang","C. Quạt gió làm khô viên nang","D. Bể siêu âm để làm sạch viên nang"],"correct":0,"explanation":"Đáp án đúng là: Bộ phận lau viên dạng bàn chải trong ống hình trụ Vì: Theo phương pháp hoàn chỉnh viên nang","reference":"Mục 16.5"},{"id":328,"text":"Ethanol, Glyxerin là các dung môi có tính chất gì?","answers":["A. phân cực thân dầu","B. không phân cực thân nước","C. phân cực thân nước","D. không phân cực thân dầu"],"correct":1,"explanation":"Đáp án đúng là: phân cực thân nước Vì: các loại dung môi","reference":"Mục 6.3"},{"id":329,"text":"Theo phương trình Hagen - Poisseulille, tốc độ chất lỏng đi qua các lỗ của vật liệu phụ thuộc vào yếu tố gì?","answers":["A. lực hút sau màng lọc","B. tỷ số áp suất tác dụng lên 2 mặt của màng lọc","C. áp lực giữa 2 màng lọc","D. hiệu số áp suất tác dụng lên 2 mặt của màng lọc"],"correct":3,"explanation":"Đáp án đúng là: hiệu số áp suất tác dụng lên 2 mặt của màng lọc Vì: quá trình lọc","reference":"Mục 7.3"},{"id":330,"text":"Thuốc mỡ thuộc hệ phân tán đồng thể còn được gọi là gì?","answers":["A. Thuốc mỡ hỗn dịch","B. Thuốc mỡ hai pha","C. Thuốc mỡ kiểu nhũ tương","D. Thuốc mỡ một pha"],"correct":3,"explanation":"Đáp án đúng là: Thuốc mỡ một pha Vì: Theo phân loại thuốc mỡ","reference":"Mục 11.2"},{"id":331,"text":"Nhiệt hoà tan (∆H) có mối quan hệ với yếu tố nào?","answers":["A. Năng lượng phá vỡ cấu trúc tinh thể của chất rắn","B. Tính ổn định của chất rắn","C. Nhiệt độ môi trường xung quanh","D. Độ phân cực của phân tử"],"correct":0,"explanation":"Đáp án đúng là: Năng lượng phá vỡ cấu trúc tinh thể của chất rắn Vì: quá trình hòa tan","reference":"Mục 7.2"},{"id":332,"text":"Tại sao viên nang thường có sinh khả dụng cao hơn viên nén?","answers":["A. Do viên nang có khả năng kiểm soát giải phóng thuốc tốt hơn viên nén","B. Do khối thuốc trong nang không bị nén chặt, giúp thuốc dễ rã hơn","C. Do vỏ nang giúp bảo vệ thuốc khỏi dịch tiêu hóa","D. Do viên nang luôn chứa hoạt chất tan nhanh hơn viên nén"],"correct":1,"explanation":"Đáp án đúng là: Do khối thuốc trong nang không bị nén chặt, giúp thuốc dễ rã hơn Vì: Theo ưu, nhược điểm của viên nén","reference":"Mục 15.2"},{"id":333,"text":"Tá dược ảnh hưởng đến tốc độ phóng thích của dược chất như thế nào?","answers":["A. Không có ảnh hưởng đáng kể","B. Giúp kiểm soát tốc độ phóng thích tùy thuộc vào dạng bào chế","C. Chỉ ảnh hưởng đến viên nén phóng thích tức thì","D. Chỉ ảnh hưởng đến viên nén phóng thích kéo dài"],"correct":1,"explanation":"Đáp án đúng là: Giúp kiểm soát tốc độ phóng thích tùy thuộc vào dạng bào chế Vì: Nguyên tắc lựa chọn tá dược xây dựng công thức dập viên","reference":"Mục 14.2"},{"id":334,"text":"Yếu tố nào sau đây ảnh hưởng đến độ ổn định và chất lượng của chế phẩm thuốc bôi ngoài da?","answers":["A. Chất liệu bao gói và điều kiện bảo quản","B. Màu sắc của tá dược","C. Tên thương hiệu của thuốc","D. Quy mô sản xuất"],"correct":0,"explanation":"Đáp án đúng là: Chất liệu bao gói và điều kiện bảo quản Vì: Các yếu tố ảnh hưởng đến sự hấp thu thuốc qua da","reference":"Mục 12.4"},{"id":335,"text":"Vai trò chính của tá dược trong thuốc mỡ là gì?","answers":["A. Không ảnh hưởng đến hiệu quả trị liệu","B. Làm chất mang dược chất, giúp bảo quản, giải phóng và dẫn thuốc qua da","C. Chỉ để tạo mùi thơm cho thuốc mỡ","D. Chỉ có tác dụng làm mềm thuốc mỡ"],"correct":1,"explanation":"Đáp án đúng là: Làm chất mang dược chất, giúp bảo quản, giải phóng và dẫn thuốc qua da Vì: Theo đặc điểm thành phần của thuốc mỡ","reference":"Mục 11.4"},{"id":336,"text":"Phương pháp nào có thể dùng để bào chế nang chứa dược chất có tác dụng mạnh như vitamin A, D?","answers":["A. Ép khuôn","B. Nhỏ giọt","C. Tất cả các phương pháp đã nêu","D. Nhúng khuôn"],"correct":3,"explanation":"Đáp án đúng là: Nhúng khuôn Vì: Theo phương pháp bào chế nang mềm gelatin","reference":"Mục 16.2"},{"id":337,"text":"Trong thử nghiệm SKD in vivo, nồng độ cực đại (Cmax) của thuốc thể hiện điều gì?","answers":["A. Tốc độ hấp thu thuốc","B. Nồng độ thuốc cực đại","C. Thời gian đạt hiệu quả điều trị","D. Mức độ chuyển hóa của thuốc"],"correct":1,"explanation":"Đáp án đúng là: Nồng độ thuốc cực đại Vì: Theo khái niệm Cmax","reference":"Mục 2.2"},{"id":338,"text":"Chọn câu sai về ý nghĩa của sinh khả dụng invitro:","answers":["A. phản ánh đầy đủ hiệu quả lâm sàng của chế phẩm thử","B. là công cụ kiểm soát chất lượng các dạng thuốc rắn để uống.","C. là công cụ cơ bản để xây dựng công thức, thiết kế dạng thuốc","D. dùng để sàng lọc, định hướng cho đánh giá của sinh khả dụng invivo"],"correct":0,"explanation":"Đáp án đúng là: phản ánh đầy đủ hiệu quả lâm sàng của chế phẩm thử Vì: Theo khái niệm SKD invitro","reference":"Mục 2.2"},{"id":339,"text":"Thuốc mỡ có tác dụng tại chỗ (giảm đau, chống viêm, kháng khuẩn...) cần đáp ứng yêu cầu gì?","answers":["A. Không cần có tác dụng thấm vào da","B. Dược chất không cần giải phóng nhanh","C. Dược chất được giải phóng nhanh và có tính thấm phù hợp","D. Luôn chứa tá dược silicon để bảo vệ da"],"correct":2,"explanation":"Đáp án đúng là: Dược chất được giải phóng nhanh và có tính thấm phù hợp Vì: Theo yêu cầu đối với thuốc mỡ","reference":"Mục 11.3"},{"id":340,"text":"Ở động vật còn non, khả năng hấp thu thuốc qua đường tiêu hóa như nào?","answers":["A. Tốt hơn so với động vật trưởng thành","B. Kém hơn so với động vật trưởng thành","C. Không có sự khác biệt lớn","D. Không thay đổi so với động vật trưởng thành"],"correct":0,"explanation":"Đáp án đúng là: Tốt hơn so với động vật trưởng thành Vì: Yếu tố sinh học ảnh hưởng đến SKD","reference":"Mục 3.2"},{"id":341,"text":"Theo quy định của GMP WHO, phần lớn thuốc tiêm có tiệt trùng sản phẩm cuối cùng phải được pha chế tối thiểu trong điều kiện phòng sạch cấp độ nào?","answers":["A. Cấp độ D","B. Cấp độ A","C. Cấp độ C","D. Cấp độ B"],"correct":0,"explanation":"Đáp án đúng là: Cấp độ D Vì: Theo yêu cầu về nhà xưởng sản xuất thuốc tiêm","reference":"Mục 9.1"},{"id":342,"text":"Mục đích của gờ khóa trên thân nang và nắp nang là gì?","answers":["A. Để tạo hình thẩm mỹ cho viên nang","B. Giúp nang dễ mở hơn sau khi đóng thuốc","C. Ngăn nắp nang bị tách rời trước và sau khi đóng thuốc","D. Giúp vỏ nang tan nhanh hơn trong dịch tiêu hóa"],"correct":2,"explanation":"Đáp án đúng là: Ngăn nắp nang bị tách rời trước và sau khi đóng thuốc Vì: Theo đặc điểm của vỏ nang","reference":"Mục 15.4"},{"id":343,"text":"Việc chọn tá dược trong bào chế thuốc cần phải xem xét gì?","answers":["A. Tính chất lý hóa của dược chất và yêu cầu dạng thuốc cần bào chế","B. Chỉ cần xem xét giá thành","C. Thời gian sử dụng thuốc","D. Là chất phụ nên không cần xem xét kỹ"],"correct":0,"explanation":"Đáp án đúng là: Tính chất lý hóa của dược chất và yêu cầu dạng thuốc cần bào chế Vì: tá dược không được làm ảnh hưởng, làm giảm hoặc làm mất tác dụng của dược chất Tham khảo:","reference":"mục 1.3"},{"id":344,"text":"Trong quá trình bào chế vỏ nang cứng, khuôn được bôi trơn bằng gì?","answers":["A. Cồn ethanol","B. Glycerin","C. Sáp ong","D. Dầu thực vật hoặc dầu parafin"],"correct":3,"explanation":"Đáp án đúng là: Dầu thực vật hoặc dầu parafin Vì: Theo phương pháp bào chế nang cứng gelatin","reference":"Mục 16.3"},{"id":345,"text":"Trong phương pháp ép khuôn, dược chất được đóng vào nang bằng cách nào?","answers":["A. Piston phân phối tự động","B. Buret","C. Bơm tiêm","D. Nhỏ giọt tự nhiên"],"correct":0,"explanation":"Đáp án đúng là: Piston phân phối tự động Vì: Theo phương pháp bào chế nang mềm gelatin","reference":"Mục 16.2"},{"id":346,"text":"Tá dược siêu rã thường được sử dụng trong trường hợp nào?","answers":["A. Viên nén sủi bọt","B. Viên nhai","C. Viên nén phóng thích kéo dài","D. Viên nén phóng thích tức thì hoặc viên chứa dược chất ít tan"],"correct":3,"explanation":"Đáp án đúng là: Viên nén phóng thích tức thì hoặc viên chứa dược chất ít tan Vì: Nguyên tắc lựa chọn tá dược xây dựng công thức dập viên","reference":"Mục 14.2"},{"id":347,"text":"Bao viên có thể giúp viên thuốc kéo dài tác dụng bằng cách nào?","answers":["A. Tăng độ hòa tan của dược chất trong nước","B. Thay đổi hình dạng viên thuốc","C. Làm tăng khối lượng viên thuốc","D. Dùng các polyme kiểm soát giải phóng dược chất"],"correct":3,"explanation":"Đáp án đúng là: Dùng các polyme kiểm soát giải phóng dược chất Vì: Đặc điểm phương pháp bao viên","reference":"Mục 14.4"},{"id":348,"text":"Để đánh giá SKD in vitro, phương pháp nào thường được sử dụng để định lượng dược chất trong môi trường hòa tan?","answers":["A. Phương pháp hóa học","B. Phương pháp sắc ký","C. Phương pháp quang phổ hấp thu","D. Phương pháp điện hóa"],"correct":2,"explanation":"Đáp án đúng là: Phương pháp quang phổ hấp thu Vì: Theo cách đánh giá SKD invitro","reference":"Mục 2.2"},{"id":349,"text":"Quá trình sinh dược học của một dạng thuốc trong cơ thể gồm các giai đoạn và theo trình tự nào?","answers":["A. giải phóng, hoà tan, hấp thu, bài tiết","B. hoà tan, hấp thu, giải phóng","C. hoà tan, giải phóng, hấp thu","D. giải phóng, hoà tan, hấp thu"],"correct":0,"explanation":"Đáp án đúng là: giải phóng, hoà tan, hấp thu Vì: Theo khái niệm quá trình sinh dược học","reference":"Mục 2.1"},{"id":350,"text":"Tiệt khuẩn bằng nhiệt khô thích hợp với loại thuốc tiêm nào?","answers":["A. Thuốc tiêm dạng nhũ tương","B. Thuốc tiêm dung dịch nước","C. Thuốc tiêm lỏng chứa dung môi nước","D. Thuốc tiêm dầu và các bao bì đựng thuốc bằng thủy tinh"],"correct":3,"explanation":"Đáp án đúng là: Thuốc tiêm dầu và các bao bì đựng thuốc bằng thủy tinh Vì: Theo yêu cầu đảm bảo sự vô khuẩn của thuốc tiêm","reference":"Mục 9.3"},{"id":351,"text":"Vì sao nang tinh bột ít được sử dụng trong thực tế?","answers":["A. Do vỏ nang dễ hút ẩm, khó bảo quản, nang to và khó nuốt","B. Do kích thước quá nhỏ, khó sản xuất","C. Do vỏ nang có khả năng bảo vệ dược chất rất tốt","D. Do nang tinh bột chỉ đựng được các dược chất dạng lỏng"],"correct":0,"explanation":"Đáp án đúng là: Do vỏ nang dễ hút ẩm, khó bảo quản, nang to và khó nuốt Vì: Theo phân loại thuốc viên nang","reference":"Mục 15.1"},{"id":352,"text":"Thuốc nào sau đây có thể dẫn đến hiện tượng quá liều ở động vật còn non do dễ dàng hấp thu vào cơ thể?","answers":["A. Vitamin C","B. Penicillin","C. Aspirin","D. Neomycin"],"correct":3,"explanation":"Đáp án đúng là: Neomycin Vì: Yếu tố sinh học ảnh hưởng đến SKD","reference":"Mục 3.2"},{"id":353,"text":"Khi dùng tá dược thân dầu, ví dụ như dầu parafin, điều gì cần thiết trước khi sử dụng?","answers":["A. Ngâm trong nước ấm","B. Đun nóng và để nguội","C. Lọc và tiệt khuẩn nếu cần","D. Đun chảy và lọc"],"correct":3,"explanation":"Đáp án đúng là: Đun chảy và lọc Vì: Theo quy trình điều chế thuốc mỡ bằng phương pháp hòa tan","reference":"Mục 12.1"},{"id":354,"text":"Khi sản xuất thuốc mỡ với số lượng lớn, phương tiện nào được sử dụng để đảm bảo chế phẩm đồng nhất?","answers":["A. Máy làm bột siêu mịn","B. Máy trộn thuốc mỡ chuyên dụng","C. Máy cán 3 trục","D. Máy rây"],"correct":1,"explanation":"Đáp án đúng là: Máy trộn thuốc mỡ chuyên dụng Vì: Theo quy trình điều chế thuốc mỡ bằng phương pháp trộn đều đơn giản","reference":"Mục 12.2"},{"id":355,"text":"Theo cấu trúc hệ phân tán, dạng thuốc nào sau đây là dị thể?","answers":["A. Dịch chiết dược liệu","B. Nhũ tương","C. Siro","D. Viên nang"],"correct":1,"explanation":"Đáp án đúng là: Nhũ tương Vì: Theo phân loại dạng thuốc Tham khảo:","reference":"mục 1.3"},{"id":356,"text":"Dung môi nào có khả năng hòa tan tanin và một số hợp chất hữu cơ khác?","answers":["A. Nước","B. Glyx+C18:D18erin","C. Benzen","D. Ethanol"],"correct":1,"explanation":"Đáp án đúng là: Glyx+C18:D18erin Vì: các loại dung môi","reference":"Mục 6.3"},{"id":357,"text":"Thiết bị nào dưới đây không được sử dụng trong phương pháp trộn đều đơn giản để sản xuất thuốc mỡ?","answers":["A. Máy nghiền bi","B. Máy trộn thuốc mỡ chuyên dụng","C. Máy lọc chân không","D. Máy xay"],"correct":2,"explanation":"Đáp án đúng là: Máy lọc chân không Vì: Theo quy trình điều chế thuốc mỡ bằng phương pháp trộn đều đơn giản","reference":"Mục 12.2"},{"id":358,"text":"Trong sản xuất thuốc tiêm, các giai đoạn nào có nguy cơ ô nhiễm cao nhất từ môi trường vào thuốc?","answers":["A. Giai đoạn kiểm tra chất lượng thuốc","B. Giai đoạn hoà tan, lọc, đóng ống","C. Giai đoạn chuẩn bị hoá chất","D. Giai đoạn pha chế và tiệt khuẩn"],"correct":1,"explanation":"Đáp án đúng là: Giai đoạn hoà tan, lọc, đóng ống Vì: Các công đoạn: Hoà tan, lọc, đóng ống là giai đoạn thuốc “hở”, nguy cơ ô nhiễm từ môi trường vào thuốc rất cao","reference":"Mục 10.2"},{"id":359,"text":"Thành phần chính của vỏ nang mềm bao gồm gelatin, chất hóa dẻo, nước, chất bảo quản và chất nào sau đây?","answers":["A. Dầu parafin","B. Sáp ong","C. Chất màu","D. Tinh bột"],"correct":2,"explanation":"Đáp án đúng là: Chất màu Vì: Theo phương pháp bào chế nang mềm gelatin","reference":"Mục 16.2"},{"id":360,"text":"Biện pháp khắc phục tương kỵ oxy hóa là gì?","answers":["A. Thêm chất bảo quản","B. Tăng nhiệt độ bảo quản","C. Giảm độ ẩm môi trường","D. Thêm chất chống oxy hóa"],"correct":3,"explanation":"Đáp án đúng là: Thêm chất chống oxy hóa Vì: Biện pháp khắc phục tương kỵ hóa học","reference":"Mục 5.2"},{"id":361,"text":"Khu vực pha chế thuốc tiêm phải được thiết kế và xây dựng như thế nào?","answers":["A. Không cần tuân theo các quy định GMP","B. Tách biệt với các khu vực khác, tuân theo các quy định GMP","C. Không cần tách biệt, có thể pha chế chung với các loại thuốc khác","D. Không cần thiết kế đặc biệt, chỉ cần rộng rãi"],"correct":1,"explanation":"Đáp án đúng là: Tách biệt với các khu vực khác, tuân theo các quy định GMP Vì: Theo yêu cầu về nhà xưởng sản xuất thuốc tiêm","reference":"Mục 9.1"},{"id":362,"text":"Quá trình hoà tan xảy ra theo nguyên lý nào?","answers":["A. Nhiệt động học","B. Vật lý học","C. Quang học","D. Cơ học"],"correct":0,"explanation":"Đáp án đúng là: Nhiệt động học Vì: quá trình hòa tan","reference":"Mục 7.2"},{"id":363,"text":"Yêu cầu đối với vật liệu lọc là gì?","answers":["A. vật liệu phải rẻ tiền, dễ kiếm, lỗ lọc lớn","B. phải có lỗ lớn để lọc được nhanh","C. phải có những lỗ lọc có kích thước nhất định và đồng nhất","D. phải có những lỗ lọc có kích thước càng nhỏ càng tốt"],"correct":2,"explanation":"Đáp án đúng là: phải có những lỗ lọc có kích thước nhất định và đồng nhất Vì: quá trình lọc","reference":"Mục 7.3"},{"id":364,"text":"Khi đóng thuốc vào nang, cỡ nang được xác định dựa trên công thức nào sau đây?","answers":["A. Khối lượng thuốc đóng nang = Tỷ trọng tuyệt đối × Dung tích nang","B. Khối lượng thuốc đóng nang = Độ ẩm × Dung tích nang","C. Khối lượng thuốc đóng nang = Tỷ trọng biểu kiến × Dung tích nang","D. Khối lượng thuốc đóng nang = Độ hòa tan × Dung tích nang"],"correct":2,"explanation":"Đáp án đúng là: Khối lượng thuốc đóng nang = Tỷ trọng biểu kiến × Dung tích nang Vì: Theo phương pháp đóng thuốc vào nang","reference":"Mục 16.4"},{"id":365,"text":"tmax là gì?","answers":["A. thời gian bán thải cực đại","B. thời gian thuốc đạt nồng độ cực đại tại tổ chức","C. thời gian thuốc đạt nồng độ cực đại tại mô","D. thời gian thuốc đạt nồng độ cực đại trong máu"],"correct":3,"explanation":"Đáp án đúng là: thời gian thuốc đạt nồng độ cực đại trong máu Vì: Theo cách đánh giá SKD invivo","reference":"Mục 2.2"},{"id":366,"text":"Để dược chất được hấp thu, quá trình nào phải diễn ra trước tiên?","answers":["A. Hòa tan","B. Chuyển hóa","C. Giải phóng","D. Hấp thu"],"correct":2,"explanation":"Đáp án đúng là: Giải phóng Vì: Theo khái niệm quá trình sinh dược học","reference":"Mục 2.1"},{"id":367,"text":"Khi hòa tan các tiểu phần chất keo cần chú ý gì?","answers":["A. khuấy đều cho các chất keo không dính với nhau","B. Khuấy nhanh rồi để yên","C. Để yên cho các chất keo hút nước trương nở hoàn toàn","D. Khuấy đều rồi để yên"],"correct":2,"explanation":"Đáp án đúng là: Để yên cho các chất keo hút nước trương nở hoàn toàn Vì: quá trình hòa tan","reference":"Mục 7.2"},{"id":368,"text":"Nguyên liệu nào thường được sử dụng để làm vỉ xé cho viên nén cần chống ẩm tốt?","answers":["A. PVC tráng PVDC","B. Polyethylen","C. PVC","D. Giấy nhôm tráng plastic"],"correct":3,"explanation":"Đáp án đúng là: Giấy nhôm tráng plastic Vì: Thành phần thuốc viên nén","reference":"Mục 13.4"},{"id":369,"text":"Khi đánh giá SKD in vitro, điều kiện thử hòa tan dược chất không bao gồm yếu tố nào sau đây?","answers":["A. Thời gian thử","B. Tốc độ khuấy","C. Nồng độ dược chất trong máu","D. Nhiệt độ môi trường hòa tan"],"correct":2,"explanation":"Đáp án đúng là: Nồng độ dược chất trong máu Vì: Theo cách đánh giá SKD invitro","reference":"Mục 2.2"},{"id":370,"text":"Nguyên nhân gây tương kỵ vật lý trong dạng thuốc rắn là gì?","answers":["A. Dược chất bị oxy hóa","B. Dược chất bị thủy phân","C. Dược chất hút nước từ môi trường","D. Dược chất gây phản ứng trao đổi"],"correct":2,"explanation":"Đáp án đúng là: Dược chất hút nước từ môi trường Vì: nguyên nhân của tương kỵ vật lý","reference":"Mục 5.1"},{"id":371,"text":"Polyvinyl pyrrolidon (PVP) là tá dược dính thường được sử dụng trong dạng nào?","answers":["A. Dạng hạt","B. Dạng dung dịch cồn hoặc nước","C. Dạng viên","D. Dạng bột mịn"],"correct":1,"explanation":"Đáp án đúng là: Dạng dung dịch cồn hoặc nước Vì: Thành phần thuốc viên nén","reference":"Mục 13.4"},{"id":372,"text":"Điều nào dưới đây có thể làm tăng SKD của thuốc ở động vật mang thai?","answers":["A. Tăng sự phân bố của thuốc và tăng khả năng ion hóa của thuốc","B. Tăng khả năng ion hóa của thuốc và giảm hoạt động của men chuyển hóa","C. Tăng sự phân bố của thuốc và giảm hoạt động của men chuyển hóa","D. Tăng tuần hoàn và giảm hoạt động của men chuyển hóa"],"correct":2,"explanation":"Đáp án đúng là: Tăng sự phân bố của thuốc và giảm hoạt động của men chuyển hóa Vì: Yếu tố sinh học ảnh hưởng đến SKD","reference":"Mục 3.2"},{"id":373,"text":"Chất hiệp đồng chống oxy hoá có tác dụng gì trong công thức thuốc tiêm?","answers":["A. Ngăn chặn hoàn toàn quá trình oxy hoá dược chất","B. Tăng mức độ phản ứng của dược chất","C. Làm giảm hiệu quả điều trị","D. Giảm thời gian bảo quản thuốc"],"correct":0,"explanation":"Đáp án đúng là: Ngăn chặn hoàn toàn quá trình oxy hoá dược chất Vì: Các thành phần của thuốc tiêm","reference":"Mục 8.3"},{"id":374,"text":"Thuốc tiêm là gì?","answers":["A. Dạng thuốc tinh khiết, tiêm vào cơ thể","B. Dạng thuốc để tiêm bắp","C. Dạng thuốc để tiêm ngoài da","D. Dạng thuốc vô khuẩn tiêm vào cơ thể qua nhiều đường khác nhau"],"correct":3,"explanation":"Đáp án đúng là: Dạng thuốc vô khuẩn tiêm vào cơ thể qua nhiều đường khác nhau Vì: Định nghĩa thuốc tiêm","reference":"Mục 8.1.1"},{"id":375,"text":"Sự tương tác giữa dược chất và các chất phụ trong công thức thuốc tiêm có thể ảnh hưởng đến yếu tố nào?","answers":["A. Tăng hiệu quả điều trị ngay lập tức","B. Độ ổn định của thuốc và tốc độ hấp thu","C. Không ảnh hưởng đến bất kỳ yếu tố nào","D. Giảm tính an toàn của thuốc"],"correct":1,"explanation":"Đáp án đúng là: Độ ổn định của thuốc và tốc độ hấp thu Vì: Đặc điểm các yếu tố ảnh hưởng đến sinh khả dụng của thuốc tiêm","reference":"Mục 10.4"},{"id":376,"text":"Tương kỵ vật lý đối với dạng thuốc lỏng thường xảy ra do nguyên nhân nào?","answers":["A. trong thành phần thuốc có chất háo ẩm","B. có các chất keo bị ngưng kết, đông vón","C. trong thành phần thuốc có chất dễ bị kết tủa","D. phối hợp dược chất với dung môi, tá dược không phù hợp; có các chất keo bị ngưng kết, đông vốn"],"correct":3,"explanation":"Đáp án đúng là: phối hợp dược chất với dung môi, tá dược không phù hợp; có các chất keo bị ngưng kết, đông vốn Vì: nguyên nhân của tương kỵ hóa học","reference":"Mục 4.3"},{"id":377,"text":"Biện pháp nào được sử dụng để khắc phục sự tương kỵ khi pha chế thuốc tiêm Sulfamethoxazol - Trimethoprim?","answers":["A. Sử dụng dung dịch kiềm như natrihydroxyd","B. Thêm nước cất","C. Dùng chất điện hoạt như tween 80","D. Thêm acid boric"],"correct":0,"explanation":"Đáp án đúng là: Sử dụng dung dịch kiềm như natrihydroxyd Vì: các khắc phục tương kỵ hóa học","reference":"Mục 4.3"},{"id":378,"text":"Khi phối hợp các dược chất tạo hỗn hợp ơtecti, ta cần chú ý đến điều gì?","answers":["A. Môi trường axit mạnh","B. cả 3 ý đã nêu đều đúng","C. Tỷ lệ các chất và nhiệt độ phối hợp","D. Sự oxy hóa của dược chất"],"correct":1,"explanation":"Đáp án đúng là: cả 3 ý đã nêu đều đúng Vì: Biện pháp khắc phục tương kỵ vật lý","reference":"Mục 5.1"},{"id":379,"text":"Phương pháp xát hạt khô phù hợp với dược chất có đặc điểm nào?","answers":["A. Dễ bị oxy hóa","B. Dễ hỏng bởi độ ẩm cao hoặc nhiệt độ cao","C. Không tan trong nước","D. Có hàm lượng thấp"],"correct":1,"explanation":"Đáp án đúng là: Dễ hỏng bởi độ ẩm cao hoặc nhiệt độ cao Vì: Nguyên tắc lựa chọn phương pháp tạo hạt dập viên","reference":"Mục 14.3"},{"id":380,"text":"Ưu điểm chính của phương pháp ép khuôn là gì?","answers":["A. Năng suất cao, phân liều chính xác","B. Không cần kiểm soát nhiệt độ","C. Nang có thể chứa mọi loại dược chất","D. Dễ thực hiện bằng tay"],"correct":0,"explanation":"Đáp án đúng là: Năng suất cao, phân liều chính xác Vì: Theo phương pháp bào chế nang mềm gelatin","reference":"Mục 16.2"},{"id":381,"text":"Viên nén không phù hợp với dược chất nào?","answers":["A. Dược chất dễ phân tán trong dịch tiêu hóa","B. Dược chất có thể bào chế dễ dàng dưới dạng viên nén","C. Dược chất khó tan và có độ ổn định thấp","D. Dược chất dễ tan và ổn định trong môi trường axit"],"correct":2,"explanation":"Đáp án đúng là: Dược chất khó tan và có độ ổn định thấp Vì: Ưu nhược điểm của thuốc viên nén","reference":"Mục 13.1"},{"id":382,"text":"Phương pháp nhúng khuôn dùng để chế nang mềm ở quy mô nào?","answers":["A. Quy mô công nghiệp","B. Không áp dụng thực tế","C. Quy mô lớn","D. Quy mô nhỏ"],"correct":3,"explanation":"Đáp án đúng là: Quy mô nhỏ Vì: Theo phương pháp bào chế nang mềm gelatin","reference":"Mục 16.2"}];
</script>

<script>
(function () {
  var LETTERS = "ABCDEFGHIJ";
  var container = document.getElementById("questionContainer");
  var noResults = document.getElementById("noResults");
  var searchInput = document.getElementById("searchInput");
  var searchClear = document.getElementById("searchClear");
  var countEl = document.getElementById("searchCount");
  var total = QUESTIONS.length;

  /* ── Escape HTML ── */
  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  /* ── Highlight từ khóa ── */
  function highlight(text, term) {
    if (!term) return esc(text);
    var safe = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return esc(text).replace(
      new RegExp("(" + safe.replace(/&amp;/g, "&amp;amp;") + ")", "gi"),
      "<mark>$1</mark>"
    );
  }

  /* ── Render 1 câu hỏi ── */
  function renderQ(q, term) {
    var answersHtml = q.answers.map(function (ans, i) {
      var isCorrect = i === q.correct;
      var cls = "answer-item" + (isCorrect ? " correct" : "");
      var check = isCorrect ? '<span class="check-mark">&#10003;</span>' : "";
      return (
        '<div class="' + cls + '">' +
        '<span class="answer-letter">' + (LETTERS[i] || i + 1) + ".</span>" +
        '<span class="answer-text">' + highlight(ans, term) + "</span>" +
        check +
        "</div>"
      );
    }).join("");

    var feedbackHtml = "";
    if (q.explanation || q.reference) {
      feedbackHtml =
        '<div class="feedback-section">' +
        (q.explanation
          ? "<p><strong>Vì: </strong>" + esc(q.explanation) + "</p>"
          : "") +
        (q.reference
          ? "<p><strong>Tham khảo: </strong>" + esc(q.reference) + "</p>"
          : "") +
        "</div>";
    }

    return (
      '<div class="question-block" id="q' + q.id + '">' +
      '<div class="question-header">' +
      '<span class="q-badge">Câu ' + q.id + "</span>" +
      "</div>" +
      '<div class="question-text">' + highlight(q.text, term) + "</div>" +
      '<div class="answers">' + answersHtml + "</div>" +
      feedbackHtml +
      "</div>"
    );
  }

  /* ── Render danh sách câu hỏi ── */
  function renderList(filtered, term) {
    // Xóa các block cũ (giữ lại #noResults)
    var old = container.querySelectorAll(".question-block");
    old.forEach(function (el) { el.remove(); });

    if (filtered.length === 0) {
      noResults.style.display = "block";
    } else {
      noResults.style.display = "none";
      var frag = document.createDocumentFragment();
      filtered.forEach(function (q) {
        var div = document.createElement("div");
        div.innerHTML = renderQ(q, term);
        frag.appendChild(div.firstChild);
      });
      container.appendChild(frag);
    }

    countEl.innerHTML =
      "<strong>" + filtered.length + "</strong> / " + total + " câu";
  }

  /* ── Lọc câu hỏi ── */
  function doSearch(term) {
    var t = term.trim().toLowerCase();
    var filtered = t
      ? QUESTIONS.filter(function (q) {
          return (
            q.text.toLowerCase().includes(t) ||
            q.answers.some(function (a) { return a.toLowerCase().includes(t); })
          );
        })
      : QUESTIONS;

    searchClear.style.display = term ? "block" : "none";
    renderList(filtered, term.trim());
  }

  /* ── Khởi tạo ── */
  renderList(QUESTIONS, "");

  searchInput.addEventListener("input", function () {
    doSearch(this.value);
  });
  searchClear.addEventListener("click", function () {
    searchInput.value = "";
    doSearch("");
    searchInput.focus();
  });

  /* ── Scroll to top ── */
  var scrollBtn = document.getElementById("scrollTopBtn");
  window.addEventListener("scroll", function () {
    scrollBtn.style.display = window.scrollY > 320 ? "flex" : "none";
  }, { passive: true });
  scrollBtn.addEventListener("click", function (e) {
    e.preventDefault();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
})();
</script>
</body>
</html>
