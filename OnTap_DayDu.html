<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn Tập - Kỹ Thuật Bào Chế Sinh Dược Học (382 câu)</title>
<style>
:root {
  --blue:      #2563eb;
  --blue-dark: #1e40af;
  --blue-bg:   #eff6ff;
  --green:     #16a34a;
  --green-bg:  #f0fdf4;
  --green-bd:  #86efac;
  --yellow-bg: #fefce8;
  --yellow-bd: #fde047;
  --gray:      #6b7280;
  --gray-lt:   #f3f4f6;
  --border:    #e5e7eb;
  --text:      #111827;
  --radius:    12px;
  --shadow:    0 1px 4px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f1f5f9; color: var(--text);
  line-height: 1.65; font-size: 15px;
}

/* ── HEADER ── */
.page-header {
  background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%);
  color: #fff; padding: 28px 20px 22px; text-align: center;
  position: relative;
}
.page-header h1 { font-size: clamp(1.1em, 4vw, 1.7em); font-weight: 700; margin-bottom: 5px; }
.page-header p  { opacity: .85; font-size: .88em; }

/* ── SEARCH BAR ── */
.search-wrap {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
.search-inner {
  max-width: 860px; margin: 0 auto;
  display: flex; align-items: center; gap: 10px;
}
.search-box { flex: 1; position: relative; }
.search-box input {
  width: 100%; padding: 9px 36px 9px 38px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: .95em; outline: none; background: var(--gray-lt);
  transition: border-color .15s, background .15s;
  -webkit-appearance: none;
}
.search-box input:focus { border-color: var(--blue); background: #fff; }
.search-icon {
  position: absolute; left: 11px; top: 50%;
  transform: translateY(-50%); color: var(--gray);
  pointer-events: none; font-size: 1em;
}
.search-clear {
  position: absolute; right: 9px; top: 50%;
  transform: translateY(-50%); background: none; border: none;
  cursor: pointer; color: var(--gray); font-size: 1.1em;
  padding: 2px 4px; display: none; line-height: 1; border-radius: 50%;
}
.search-clear:hover { color: #111; background: var(--gray-lt); }
.search-count {
  white-space: nowrap; font-size: .88em; color: var(--gray);
  min-width: 90px; text-align: right;
}
.search-count strong { color: var(--blue-dark); }

/* ── CONTAINER ── */
.container {
  max-width: 860px; margin: 18px auto;
  padding: 0 14px 80px;
}

/* ── QUESTION CARD ── */
.question-block {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 16px;
  border-left: 4px solid var(--blue);
  overflow: hidden;
  transition: box-shadow .15s;
}
.question-block:hover {
  box-shadow: 0 2px 8px rgba(0,0,0,.12), 0 6px 20px rgba(0,0,0,.08);
}

.question-header {
  display: flex; align-items: center; gap: 8px;
  background: var(--blue-bg); padding: 8px 14px;
  border-bottom: 1px solid #dbeafe;
}
.q-badge {
  background: var(--blue); color: #fff;
  border-radius: 20px; padding: 1px 9px;
  font-size: .78em; font-weight: 700; letter-spacing: .3px;
}

.question-text {
  padding: 14px 16px 8px;
  font-size: 1em; font-weight: 500; color: #1e293b;
}
.question-text mark {
  background: #fef08a; color: inherit;
  border-radius: 3px; padding: 0 2px;
}

/* ── ANSWERS ── */
.answers {
  padding: 4px 16px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.answer-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 12px; border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--gray-lt);
}
.answer-item.correct {
  background: var(--green-bg);
  border-color: var(--green-bd);
  font-weight: 600;
}
.answer-letter {
  font-weight: 700; font-size: .9em;
  width: 22px; flex-shrink: 0; padding-top: 1px; color: var(--gray);
}
.answer-item.correct .answer-letter { color: var(--green); }
.answer-text {
  flex: 1; color: #374151; font-size: .95em;
}
.answer-item.correct .answer-text { color: #14532d; }
.answer-text mark {
  background: #bbf7d0; color: inherit;
  border-radius: 3px; padding: 0 2px;
}
.check-mark {
  flex-shrink: 0; margin-left: auto; padding-left: 6px;
  color: var(--green); font-weight: 700;
}

/* ── FEEDBACK ── */
.feedback-section {
  background: var(--yellow-bg);
  border-top: 1.5px solid var(--yellow-bd);
  padding: 10px 16px; font-size: .875em; color: #44403c;
}
.feedback-section p { margin: 3px 0; }
.feedback-section strong { color: #1c1917; }

/* ── EMPTY STATE ── */
#noResults {
  display: none; text-align: center;
  padding: 60px 20px; color: var(--gray);
}
#noResults .nr-icon { font-size: 2.5em; margin-bottom: 12px; }
#noResults p { font-size: .95em; }

/* ── SCROLL TOP ── */
#scrollTopBtn {
  position: fixed; bottom: 20px; right: 16px;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--blue); color: #fff; border: none;
  font-size: 1.3em; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 3px 10px rgba(37,99,235,.4);
  transition: background .15s, transform .15s;
  z-index: 200; text-decoration: none;
  line-height: 44px; text-align: center;
}
#scrollTopBtn:hover { background: var(--blue-dark); transform: translateY(-2px); }

/* ── MOBILE ── */
@media (max-width: 600px) {
  body { font-size: 14px; }
  .page-header { padding: 18px 14px 14px; }
  .container { margin: 12px auto; padding: 0 10px 80px; }
  .question-text { padding: 12px 12px 6px; }
  .answers { padding: 4px 12px 10px; gap: 5px; }
  .answer-item { padding: 7px 10px; }
  .feedback-section { padding: 9px 12px; }
  .search-count { display: none; }
}

.page-header { text-align: center; position: relative; }
.back-btn {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,.18); border: 1.5px solid rgba(255,255,255,.35);
  color: #fff; padding: 6px 13px; border-radius: 7px;
  text-decoration: none; font-size: .82em; font-weight: 600;
  white-space: nowrap; transition: background .15s; line-height: 1.4;
}
.back-btn:hover { background: rgba(255,255,255,.3); }
@media (max-width: 480px) {
  .back-btn { position: static; transform: none; display: inline-block;
              margin-bottom: 10px; font-size: .8em; }
  .page-header { padding-top: 16px; }
}
</style>
</head>

<div class="page-header">
  <a href="index.html" class="back-btn">&#8592; Trang chủ</a>
  <h1>Ôn Tập Kỹ Thuật Bào Chế Sinh Dược Học</h1>
  <p>Câu hỏi trắc nghiệm có đáp án &mdash; Nguồn: LT1 – LT10</p>
</div>

<div class="search-wrap">
  <div class="search-inner">
    <div class="search-box">
      <span class="search-icon">&#128269;</span>
      <input type="search" id="searchInput"
             placeholder="Tìm câu hỏi hoặc đáp án..." autocomplete="off">
      <button class="search-clear" id="searchClear" title="Xóa">&#10005;</button>
    </div>
    <div class="search-count" id="searchCount">
      <strong>382</strong> / 382 câu
    </div>
  </div>
</div>

<div class="container" id="questionContainer">
  <div id="noResults">
    <div class="nr-icon">&#128269;</div>
    <p>Không tìm thấy câu hỏi phù hợp.</p>
  </div>
</div>

<script>
const QUESTIONS = [{"id":1,"text":"Thuốc mỡ dùng với mục đích bảo vệ da cần có đặc điểm gì?","answers":["Chứa tá dược và chất phụ có khả năng thấm sâu vào da","Luôn chứa silicon để tăng khả năng thấm sâu","Không cần tạo lớp bao bọc trên da","Chỉ cần bảo vệ da mà không cần chứa dược chất có tác dụng điều trị"],"correct":3,"explanation":"Theo yêu cầu đối với thuốc mỡ","reference":"Mục 11.3"},{"id":2,"text":"Gel (Gels) là dạng thuốc có thể chất như thế nào?","answers":["Rắn","Lỏng","Dung dịch","Bán rắn"],"correct":3,"explanation":"Theo phân loại thuốc mỡ","reference":"Mục 11.2"},{"id":3,"text":"Thuốc mỡ tra mắt phải đáp ứng tiêu chuẩn đặc biệt nào sau đây?","answers":["Chứa ít nhất hai loại dược chất","Được sản xuất trong điều kiện vô khuẩn và thử độ vô khuẩn","Phải có màu trắng hoặc trong suốt","Có mùi thơm dễ chịu"],"correct":1,"explanation":"Theo phân loại thuốc mỡ","reference":"Mục 11.2"},{"id":4,"text":"Khi điều chế vỏ nang cứng, khuôn được làm từ vật liệu gì?","answers":["Thép không gỉ","Nhựa PVC","Sắt tĩnh điện","Nhôm"],"correct":0,"explanation":"Theo phương pháp bào chế nang cứng gelatin","reference":"Mục 16.3"},{"id":5,"text":"Các yếu tố nào sau đây có ảnh hưởng tới sự giải phóng thuốc ra khỏi tá dược?","answers":["Màu sắc của da","Khối lượng của thuốc","Tính chất lý hóa của dược chất","Sự dày của da"],"correct":2,"explanation":"Các yếu tố ảnh hưởng đến sự hấp thu thuốc qua da","reference":"Mục 12.4"},{"id":6,"text":"Thuốc nào dưới đây có thể chuyển hóa thành tiền thuốc (pro-drug) để tăng SKD?","answers":["Ciprofloxacin","Prednisolone","Paracetamol","Tetracycline"],"correct":1,"explanation":"Các tính chất lý hóa của dược chất ảnh hưởng đến SKD","reference":"Mục 3.1"},{"id":7,"text":"Khi dược chất có độ tan kém, tá dược nào có thể được sử dụng để tăng độ tan?","answers":["Tá dược tạo màu","Chất điện hoạt","Tá dược độn","Tá dược rã thông thường"],"correct":1,"explanation":"Nguyên tắc lựa chọn tá dược xây dựng công thức dập viên","reference":"Mục 14.2"},{"id":8,"text":"Yếu tố nào sau đây không thuộc về tính chất lý hoá của dược chất có ảnh hưởng đến sinh khả dụng?","answers":["Độ tan và tốc độ hoà tan","Đặc tính hấp thu của dược chất","Kích thước tiểu phần","Trạng thái kết tinh hay vô định hình"],"correct":1,"explanation":"Các tính chất lý hóa của dược chất ảnh hưởng đến SKD","reference":"Mục 3.1"},{"id":9,"text":"Trong điều kiện thử hòa tan, nhiệt độ môi trường hòa tan thường là bao nhiêu độ C?","answers":["27°C ± 0,5°C","35°C ± 0,5°C","30°C ± 0,5°C","37°C ± 0,5°C"],"correct":3,"explanation":"Theo cách đánh giá SKD invitro","reference":"Mục 2.2"},{"id":10,"text":"Dược chất trong viên nén phải có đặc điểm nào để có thể được hấp thu tốt trong đường tiêu hóa?","answers":["Tan trong dịch tiêu hóa","Dễ phân tán trong không khí","Không tan trong dịch tiêu hóa","Không cần phải tan"],"correct":0,"explanation":"Thành phần thuốc viên nén","reference":"Tham khảo : Mục 13.4"},{"id":11,"text":"Tại sao dung dịch NaCl 0,9% được coi là đẳng trương với máu?","answers":["Vì nó dễ dàng hoà tan dược chất","Vì nó có pH thích hợp cho thuốc tiêm","Vì nó có áp suất thẩm thấu và độ băng điểm giống máu","Vì nó có khả năng chống oxy hoá cao"],"correct":2,"explanation":"Các thành phần của thuốc tiêm","reference":"Mục 8.3"},{"id":12,"text":"Với chất tan là các chất lưỡng tính, độ tan sẽ giảm khi pH của dung dịch thay đổi như thế nào?","answers":["pH tăng trên điểm đẳng điện","pH tăng dưới điểm đẳng điện","pH không thay đổi","pH giảm dưới điểm đẳng điện"],"correct":1,"explanation":"quá trình hòa tan","reference":"Mục 7.2"},{"id":13,"text":"Nang ép khuôn có đặc điểm nhận dạng nào?","answers":["Màu sắc đồng đều","Có vết cắt trên thân","Nang trong suốt hơn nang khác","Có một gờ nhỏ trên thân nang"],"correct":3,"explanation":"Theo phương pháp bào chế nang mềm gelatin","reference":"Mục 16.2"},{"id":14,"text":"Tá dược là gì?","answers":["chất dùng để kéo dài thời gian tác dụng của thuốc","chất phụ gia bổ sung vào thành phần thuốc","thành phần chính của dạng thuốc","chất quyết định tác dụng điều trị của thuốc"],"correct":1,"explanation":"Theo khái niệm về tá dược","reference":"Tham khảo mục 1.3"},{"id":15,"text":"Trong kỹ thuật pha chế vô trùng, yêu cầu gì đối với nguyên liệu sử dụng?","answers":["Nguyên liệu chỉ cần kiểm tra chất lượng sau khi pha chế","Nguyên liệu cần phải tiệt trùng sau khi pha chế","Nguyên liệu không cần tiệt trùng nếu là thuốc tiêm dầu","Nguyên liệu cần được tiệt trùng trước khi sử dụng trong pha chế"],"correct":3,"explanation":"Theo yêu cầu đảm bảo sự vô khuẩn của thuốc tiêm","reference":"Mục 9.3"},{"id":16,"text":"Trong trường hợp dược chất là chất lỏng bán phân cực, ví dụ như dầu Cade, cần thực hiện bước nào trước khi phối hợp với tá dược còn lại?","answers":["Hòa tan dược chất trong nước","Thêm từ từ dược chất vào tá dược hút và khuấy nhẹ nhàng","Trộn dược chất với các tá dược thân dầu","Đun nóng dược chất"],"correct":1,"explanation":"Theo quy trình điều chế thuốc mỡ bằng phương pháp nhũ hóa","reference":"Mục 12.3"},{"id":17,"text":"Một trong những nhược điểm của thuốc mỡ là gì?","answers":["Gây cảm giác nhờn rít, khó rửa sạch khi sử dụng","Không thể sử dụng để điều trị tại chỗ","Luôn gây dị ứng khi sử dụng","Dễ bị nhiễm khuẩn hơn so với thuốc uống"],"correct":0,"explanation":"Theo ưu nhược điểm của thuốc mỡ","reference":"Mục 11.1.2"},{"id":18,"text":"Một trong những ưu điểm của phương pháp dập trực tiếp là gì?","answers":["Giảm khả năng hút ẩm của viên","Không cần kiểm soát lưu tính của khối bột","Tiết kiệm chi phí đầu tư trang thiết bị","Không cần sử dụng tá dược"],"correct":2,"explanation":"Nguyên tắc lựa chọn phương pháp tạo hạt dập viên","reference":"Mục 14.3"},{"id":19,"text":"Vì sao thuốc mỡ được xem là tiện lợi khi sử dụng?","answers":["Thuốc mỡ có thể tích gọn nhẹ, dễ dàng mang theo bên người","Thuốc mỡ có thời gian tác dụng dài hơn tất cả các dạng thuốc khác","Thuốc mỡ không bao giờ gây kích ứng da","Thuốc mỡ có thể dùng đường uống trong trường hợp khẩn cấp"],"correct":0,"explanation":"Theo ưu nhược điểm của thuốc mỡ","reference":"Mục 11.1.2"},{"id":20,"text":"Dược điển Hoa Kỳ được xuất bản đầu tiên năm nào?","answers":["1885","1821","1799","1820"],"correct":3,"explanation":"Theo lịch sử phát triển ngành bào chế","reference":"Tham khảo mục 1.2"},{"id":21,"text":"Khi tiêm tĩnh mạch, dược chất sẽ được hấp thu như nào?","answers":["Phải qua quá trình hấp thu qua màng sinh học","Phân bố trực tiếp vào máu và không qua quá trình hấp thu","Được hấp thu qua da","Không gây ra tác dụng sinh học"],"correct":1,"explanation":"Đặc điểm các yếu tố ảnh hưởng đến sinh khả dụng của thuốc tiêm","reference":"Mục 10.4"},{"id":22,"text":"Dung dịch thuốc được định nghĩa là gì?","answers":["Là chế phẩm dạng rắn chứa dược chất","Là chế phẩm lỏng chứa nhiều dược chất không tan","Là thuốc bột hòa tan trong nước","Là chế phẩm lỏng chứa một hoặc nhiều dược chất hòa tan trong dung môi"],"correct":3,"explanation":"Định nghĩa dung dịch thuốc","reference":"Mục 6.1"},{"id":23,"text":"Giấy lọc trắng có nhược điểm gì?","answers":["ít thấm hơn giấy lọc xám","Lọc nhanh hơn giấy lọc xám","còn chứa một số tạp chất","khó sử dụng hơn giấy lọc xám"],"correct":0,"explanation":"quá trình lọc","reference":"Mục 7.3"},{"id":24,"text":"Theo định lý Henry, độ tan của chất khí tỷ lệ thuận với yếu tố nào?","answers":["Lượng chất lỏng","Loại dung môi","Nhiệt độ","Áp suất khí trên bề mặt dung dịch"],"correct":3,"explanation":"quá trình hòa tan","reference":"Mục 7.2"},{"id":25,"text":"Quy trình xát hạt khô gồm công đoạn nào sau đây?","answers":["Trộn bột kép – Xát hạt – Sấy hạt – Dập viên","Trộn bột kép – Xay mịn – Sấy khô – Dập viên","Trộn bột kép – Xay mịn – Xát hạt – Dập viên","Trộn bột kép – Dập viên to – Tạo hạt – Dập viên"],"correct":3,"explanation":"Nguyên tắc lựa chọn phương pháp tạo hạt dập viên","reference":"Mục 14.3"},{"id":26,"text":"Các hoá chất, dung môi trong thành phần công thức của thuốc tiêm phải được kiểm nghiệm và đạt yêu cầu gì trước khi đưa vào sản xuất?","answers":["Đạt yêu cầu về chất lượng từ nhà cung cấp","Đạt yêu cầu ghi trong chuyên luận về hoá chất đó của Dược điển","Được kiểm nghiệm về độ an toàn đối với người sử dụng","Được kiểm tra theo quy trình dược phẩm quốc tế"],"correct":1,"explanation":"Yêu cầu về quy trình xử lý bao bì tiếp xúc trực tiếp thuốc tiêm","reference":"Mục 10.1"},{"id":27,"text":"Tiệt trùng bằng nhiệt ẩm thích hợp với những loại thuốc tiêm nào?","answers":["Chỉ thích hợp cho các thuốc tiêm chịu được ẩm và các dung dịch sử dụng dung môi là nước","Thích hợp với thuốc tiêm lỏng không phải là nước hoặc sản phẩm bột khô","được áp dụng khi thuốc tiêm có thành phần dược chất không bền dưới tác động của nhiệt độ khô","tiệt khuẩn dụng cụ, bao bì không tiệt khuẩn được bằng nhiệt khô"],"correct":0,"explanation":"Theo yêu cầu đảm bảo sự vô khuẩn của thuốc tiêm","reference":"Mục 9.3"},{"id":28,"text":"Vì sao vỏ nang làm từ dẫn chất cellulose ít được sử dụng?","answers":["Không tạo được hình dạng phù hợp","Không thể sản xuất ở quy mô công nghiệp","Không có khả năng chứa dược chất rắn","Có độ tan kém và giá thành cao"],"correct":3,"explanation":"Theo đặc điểm của vỏ nang","reference":"Mục 15.4"},{"id":29,"text":"Đối với thuốc mỡ hấp thu, gây tác dụng điều trị toàn thân, cần đảm bảo yếu tố nào?","answers":["Không cần tá dược hỗ trợ sự thẩm thấu","Dược chất không được thấm sâu vào da","Chỉ cần bền vững trong bảo quản, không cần kiểm soát mức độ hấp thu","Thiết kế thuốc sao cho dược chất có khả năng thấm sâu và hấp thu tốt"],"correct":3,"explanation":"Theo yêu cầu đối với thuốc mỡ","reference":"Mục 11.3"},{"id":30,"text":"Sinh khả dụng của viên nén có thể thay đổi thất thường do yếu tố nào sau đây?","answers":["Phương pháp bào chế","Màu sắc của viên","Chất lượng tá dược và lực nén trong quá trình sản xuất","Phương pháp bao viên"],"correct":2,"explanation":"Ưu nhược điểm của thuốc viên nén","reference":"Tham khảo : Mục 13.1"},{"id":31,"text":"Tương kỵ làm cho chế phẩm không đạt chất lượng về các mặt nào?","answers":["tính tan, độ đồng đều khối lượng và thể tích, tính đồng nhất","định tính, định lượng, tính tan, độ đồng đều khối lượng và thể tích độ rã","độ rã, độ pH, tính đồng nhất, tính tan, độ đồng đều khối lượng và thể tích","tính đồng nhất, tính bền vững, giảm hoặc không có hiệu lực điều trị"],"correct":3,"explanation":"Khái niệm tương kỵ","reference":"Mục 4.1"},{"id":32,"text":"Yếu tố nào dưới đây là một nguyên tắc quan trọng khi lựa chọn tá dược?","answers":["Tá dược phải có giá thành cao để đảm bảo chất lượng","Tá dược phải dễ mua, có tính ổn định cao và dễ phối hợp với dược chất","Tá dược phải có nhiều chức năng khác nhau","Tá dược phải có màu sắc đẹp"],"correct":1,"explanation":"Nguyên tắc lựa chọn tá dược xây dựng công thức dập viên","reference":"Mục 14.2"},{"id":33,"text":"Khi chuẩn bị tá dược, nếu tá dược là PEG, cần phải làm gì?","answers":["Lọc và đun chảy tá dược","Phối hợp và đun chảy tá dược","Chỉ phối hợp và lọc","Phối hợp và ngâm trong dung dịch trung gian"],"correct":1,"explanation":"Theo quy trình điều chế thuốc mỡ bằng phương pháp hòa tan","reference":"Mục 12.1"},{"id":34,"text":"Phản ứng trao đổi phân tử trong dược phẩm thường gặp khi nào?","answers":["Pha chế các acid mạnh với các base mạnh","Pha chế các muối kiềm với các acid yếu","Pha chế các dược chất với tá dược trơ","Pha chế các acid mạnh với các acid yếu"],"correct":1,"explanation":"nguyên nhân của tương kỵ hóa học","reference":"Mục 5.2"},{"id":35,"text":"Yếu tố nào ảnh hưởng đến sinh khả dụng của thuốc tiêm dưới da và tiêm bắp?","answers":["Độ đậm đặc của thuốc tiêm","Tất cả các yếu tố đã nêu","Nồng độ thuốc trong cơ thể","Độ tan và tốc độ hòa tan của dược chất"],"correct":3,"explanation":"Đặc điểm các yếu tố ảnh hưởng đến sinh khả dụng của thuốc tiêm","reference":"Mục 10.4"},{"id":36,"text":"Khi pha chế thuốc nhỏ mắt Protacgol 3%, nếu dùng dung dịch NaCl làm dung môi sẽ gây ra hiện tượng gì?","answers":["Làm tăng hiệu quả điều trị","Tăng tính ổn định của thuốc","Tạo thành dung dịch đồng nhất","Kết tủa dược chất"],"correct":3,"explanation":"các khắc phục tương kỵ hóa học","reference":"Mục 4.3"},{"id":37,"text":"Các dụng cụ, thiết bị lọc dùng trong pha chế, sản xuất thuốc tiêm dung dịch phải có đặc điểm gì?","answers":["Được chế tạo từ vật liệu không cần chịu được các tác động khi tiệt khuẩn","Không cần dễ vệ sinh và tiệt khuẩn","Được chế tạo từ vật liệu chịu được các tác động khi tiệt khuẩn và dễ vệ sinh","Được làm từ nhựa dễ vỡ, không cần tiệt khuẩn"],"correct":2,"explanation":"Theo yêu cầu về thiết bị, dụng cụ bào chế thuốc tiêm","reference":"Mục 9.2"},{"id":38,"text":"Trong lịch sử, năm 1347 – 1351 có sự kiện gì xảy ra ảnh hưởng sâu sắc đến toàn thế giới?","answers":["Bệnh dịch hạch (hay còn gọi là Cái chết đen) quét sạch 1/3 dân số thế giới","Bệnh đậu mùa quét sạch 1/3 dân số thế giới","Cuộc cách mạng công nghiệp lần thứ 3","Chiến tranh thế giới thứ 2"],"correct":0,"explanation":"Theo lịch sử phát triển ngành bào chế","reference":"Tham khảo mục 1.2"},{"id":39,"text":"Viên nang có ưu điểm nào sau đây so với viên nén?","answers":["Có màu sắc phong phú hơn","Dễ nuốt và hấp thu hơn","Chỉ chứa được dược chất ở dạng bột","Có màu sắc phong phú hơn và dễ nuốt hơn"],"correct":3,"explanation":"Theo ưu, nhược điểm của viên nén","reference":"Mục 15.2"},{"id":40,"text":"Trong trường hợp dược chất vừa là chất lỏng bán phân cực vừa là dược chất rắn, ví dụ như bạc nitrat, phương pháp tiến hành nào cần thực hiện?","answers":["Sử dụng dung môi không phân cực để hòa tan bạc nitrat","Hòa tan bạc nitrat vào nước tinh khiết và thay một phần vaselin bằng lanolin khan","Hòa tan bạc nitrat vào dầu Cade","Trộn bạc nitrat với vaselin và bôm Pêru"],"correct":1,"explanation":"Theo quy trình điều chế thuốc mỡ bằng phương pháp nhũ hóa","reference":"Mục 12.3"},{"id":41,"text":"Vỏ nang gelatin mềm có chứa thành phần nào giúp vỏ trở nên dẻo dai?","answers":["Chất hóa dẻo","Đường","Tinh bột","Muối vô cơ"],"correct":0,"explanation":"Theo phân loại thuốc viên nang","reference":"Mục 15.1"},{"id":42,"text":"Mục tiêu chính của nghiên cứu tiền công thức là gì?","answers":["Kiểm tra độ bền cơ học của viên nén","Xác định giá thành của dược chất","Khảo sát tính chất lý hóa của dược chất và sự ảnh hưởng của các yếu tố liên quan","Xác định phương pháp bảo quản dược chất"],"correct":2,"explanation":"Đặc điểm của quá trình khảo sát các tính chất lý hoá của dược chất","reference":"Mục 14.1"},{"id":43,"text":"Ngành Dược học bắt đầu có sự cống hiến lớn từ ai?","answers":["Claudius Gelanus","John Ferriar","Louis Pasteur","Alexander Fleming"],"correct":0,"explanation":"Lịch sử phát triển ngành bào chế","reference":"Mục 1.2"},{"id":44,"text":"Trong viên nén phóng thích kéo dài, tá dược nào sau đây thường được sử dụng?","answers":["Tá dược siêu rã","Polyme hoặc sáp","Tá dược trơn bóng","Tá dược tạo màu"],"correct":1,"explanation":"Nguyên tắc lựa chọn tá dược xây dựng công thức dập viên","reference":"Mục 14.2"},{"id":45,"text":"Biện pháp nào có thể được áp dụng khi không thể pha chế được dung dịch tiêm hỗn dịch hydrocortison acetate?","answers":["Thêm các chất chống oxy hoá","Thêm chất keo thấm nước để làm tăng độ nhớt","Thêm nước cất làm dung môi","Sử dụng chất điện giải"],"correct":1,"explanation":"các khắc phục tương kỵ hóa học","reference":"Mục 4.3"},{"id":46,"text":"Dung môi nước cất dùng để pha thuốc tiêm có ưu điểm gì?","answers":["Gây phản ứng mạnh tại chỗ tiêm","Tạo ra dung dịch ổn định cho thuốc","Không tương đồng với các mô cơ thể","Không hoà tan được các dược chất"],"correct":1,"explanation":"Dung môi thuốc tiêm","reference":"Mục 8.3.2"},{"id":47,"text":"Chọn câu sai về ý nghĩa của sinh khả dụng invivo","answers":["đánh dấu sự chuyển từ bào chế quy ước sang bào chế hiện đại","giúp thầy thuốc lựa chọn được đúng chế phẩm thay thế","thúc đẩy nhà sản xuất nâng cao chất lượng sản phẩm","Sinh khả dụng invivo không phản ánh được hiệu quả điều trị của thuốc"],"correct":3,"explanation":"Theo khái niệm SKD invivo","reference":"Mục 2.2"},{"id":48,"text":"Yếu tố nào đã thúc đẩy sự phát triển mạnh mẽ của việc sản xuất viên nén vào những năm 50 của thế kỷ XX?","answers":["Sự phát triển của máy dập viên hiện đại","Quá trình tự động hóa đóng gói viên nén","Sự xuất hiện của viên nang","Nghiên cứu phương pháp đo lực dập viên của Higuchi và cộng sự"],"correct":3,"explanation":"Quá trình phát triển của việc sản xuất viên nén","reference":"Mục 13.1"},{"id":49,"text":"Các công đoạn hoà tan, lọc, đóng ống được thực hiện trong sản xuất thuốc tiêm, phòng, buồng hoặc bàn pha chế cần phải đáp ứng yêu cầu gì?","answers":["Phải có thiết bị bảo vệ cá nhân cho người lao động","Phải có điều kiện môi trường vô khuẩn phù hợp với qui mô sản xuất","Phải có hệ thống thông gió tốt","Phải có đủ không gian cho các công đoạn"],"correct":1,"explanation":"Yêu cầu của quy trình điều chế dung dịch tiêm và tiệt trùng sản phẩm","reference":"Mục 10.2"},{"id":50,"text":"Tính phân cực của một dung môi có thể được đo bằng chỉ số nào?","answers":["Hằng số điện môi","Độ tinh khiết","Độ pH","Độ hòa tan"],"correct":0,"explanation":"các loại dung môi","reference":"Mục 6.3"},{"id":51,"text":"Khi tiêm insulin dưới da, dược chất được hấp thu nhanh hơn khi tiêm vào vị trí nào sau đây?","answers":["Vùng đùi","Vùng bụng","Vùng mông","Vùng cánh tay"],"correct":1,"explanation":"Đặc điểm các yếu tố ảnh hưởng đến sinh khả dụng của thuốc tiêm","reference":"Mục 10.4"},{"id":52,"text":"Khi phối hợp dược chất với tá dược, nếu dược chất dễ bay hơi hoặc thăng hoa, cần lưu ý điều gì?","answers":["Đảm bảo thiết bị hòa tan có nắp đậy kín","Nâng nhiệt độ hòa tan lên cao","Sử dụng dung môi khan","Chỉ sử dụng dụng cụ đun nóng"],"correct":0,"explanation":"Theo quy trình điều chế thuốc mỡ bằng phương pháp hòa tan","reference":"Mục 12.1"},{"id":53,"text":"Một trong những biện pháp chung để khắc phục tương kỵ là gì?","answers":["Sử dụng một loại tá dược duy nhất cho tất cả dược chất","Sử dụng dược chất ở nồng độ cao","Chọn đúng trình tự pha chế, phối hợp các dược chất và tá dược hợp lý","Thêm các chất phụ, dung m p các dung môi, dùng các chất trung gian thân nước, dùng chất điện hoạt"],"correct":0,"explanation":"quá trình hòa tan","reference":"Mục 7.2"},{"id":60,"text":"Độ tan của chất tan được định nghĩa là gì?","answers":["Lượng chất tan có thể hòa tan trong dung môi khi đạt trạng thái bão hòa","Lượng chất tan có thể hòa tan trong dung môi bất kỳ","Lượng dung môi cần thiết để hòa tan chất tan","Tỷ lệ giữa dung môi và chất tan trong dung dịch"],"correct":0,"explanation":"các loại dung môi","reference":"Mục 6.3"},{"id":61,"text":"Trong công thức thuốc tiêm Sulfamethoxazol - trimethoprim, để khắc phục tương kỵ cần dùng dung môi nào?","answers":["Nước cất pha tiêm","Natrihydroxyd hoặc các kiềm amin","Acetone","Glycerin"],"correct":1,"explanation":"các khắc phục tương kỵ hóa học","reference":"Mục 4.3"},{"id":62,"text":"Tương đương hóa học: Chỉ 2 hay nhiều chế phẩm bào chế có khác nhau về dạng dùng nhưng chứa…..?","answers":["2 loại dược chất với liều lượng như nhau","cùng loại dược chất với liều lượng khác nhau","cùng 1 dược chất với liều lượng khác nhau","cùng 1 dược chất với liều lượng như nhau"],"correct":3,"explanation":"Theo khái niệm các loại tương đương","reference":"Mục 2.1"},{"id":63,"text":"Các thuốc tiêm dạng bột khô có thể được điều chế bằng phương pháp nào sau đây?","answers":["Pha loãng bằng dung môi","Tiệt khuẩn bằng nhiệt khô","Chưng cất bằng hơi nước","Đông khô hoặc sấy phun"],"correct":3,"explanation":"Quy trình công nghệ với bột pha tiêm","reference":"Mục 10.3"},{"id":64,"text":"Tại sao tạp chất trong dược chất có thể ảnh hưởng đến độ ổn định của chế phẩm?","answers":["Gây phản ứng thủy phân hoặc oxy hóa","Làm viên nén dễ vỡ hơn","Làm thay đổi dạng tinh thể của dược chất","Không có ảnh hưởng đáng kể"],"correct":0,"explanation":"Đặc điểm của quá trình khảo sát các tính chất lý hoá của dược chất","reference":"Mục 14.1"},{"id":65,"text":"Để tăng tốc độ lọc dung dịch, trong phương pháp lọc nào người ta dùng biện pháp nén?","answers":["Lọc với áp suất cao","Lọc dư rượt cho viên nén và không tạo ra hiện tượng dính?","answers":["Talc","Sodium starch glycolat","Lactose","Dicalci phosphat"],"correct":0,"explanation":"Thành phần thuốc viên nén","reference":"Tham khảo : Mục 13.4"},{"id":117,"text":"Chọn câu nhận xét đúng về sinh khả dụng của thuốc","answers":["A. Dạng vô định hình có SKD thấp hơn dạng kết tinh","B. Dạng vô định hình có SKD cao hơn dạng kết tinh","C. Dạng vô định hình có SKD cao hơn dạng kết tinh tùy từng trường hợp","D. Dạng vô định hình có SKD bằng dạng kết tinh"],"correct":1,"explanation":"Đáp án đúng là: Dạng vô định hình có SKD cao hơn dạng kết tinh Vì: Tính chất của dạng kết tinh và dạng vô định hình","reference":"Mục 3.1"},{"id":118,"text":"Tính phân cực của dung môi có ảnh hưởng như thế nào đến khả năng hòa tan của chất tan?","answers":["A. Dung môi càng phân cực thì càng dễ hòa tan các chất phân cực","B. Dung môi càng ít phân cực thì càng dễ hòa tan các chất phân cực","C. Không có ảnh hưởng","D. Dung môi phân cực làm giảm khả năng hòa tan"],"correct":0,"explanation":"Đáp án đúng là: Dung môi càng phân cực thì càng dễ hòa tan các chất phân cực Vì: các loại dung môi","reference":"Mục 6.3"},{"id":119,"text":"Nhược điểm của phương pháp xát hạt ướt là gì?","answers":["A. Không thể sản xuất quy mô lớn","B. Khó kiểm soát kích thước hạt","C. Quy trình nhiều công đoạn và thời gian thực hiện dài","D. Viên có độ rã kém"],"correct":2,"explanation":"Đáp án đúng là: Quy trình nhiều công đoạn và thời gian thực hiện dài Vì: Nguyên tắc lựa chọn phương pháp tạo hạt dập viên","reference":"Mục 14.3"},{"id":120,"text":"Dược chất nào khi tạo thành muối có thể tăng SKD?","answers":["A. Diazepam","B. Caffeine","C. Penicillin V","D. Paracetamol"],"correct":2,"explanation":"Đáp án đúng là: Penicillin V Vì: Các tính chất lý hóa của dược chất ảnh hưởng đến SKD","reference":"Mục 3.1"},{"id":121,"text":"Trong phương pháp tá dược nhũ hoá chưa có sẵn, nếu dược chất là chất lỏng phân cực, phương pháp xử lý dược chất là gì?","answers":["A. Hòa tan dược chất trong dung môi không phân cực","B. Thêm dần từng lượng nhỏ dược chất vào tá dược khan và khuấy nhẹ","C. Trộn dược chất với tá dược nhũ tương","D. Đun dược chất đến nhiệt độ cao rồi trộn với tá dược"],"correct":1,"explanation":"Đáp án đúng là: Thêm dần từng lượng nhỏ dược chất vào tá dược khan và khuấy nhẹ Vì: Theo quy trình điều chế thuốc mỡ bằng phương pháp nhũ hóa","reference":"Mục 12.3"},{"id":122,"text":"Phễu lọc thuỷ tinh xốp thường được sử dụng với các kích thước lỗ xốp nào?","answers":["A. G1 (50µm) và G2 (30µm)","B. G3 (20µm) và G4 (10µm)","C. G6 (5µm) và G7 (3µm)","D. G4 (15-5µm) và G5 (1-1,5µm)"],"correct":3,"explanation":"Đáp án đúng là: G4 (15-5µm) và G5 (1-1,5µm) Vì: Theo yêu cầu về thiết bị, dụng cụ bào chế thuốc tiêm","reference":"Mục 9.2"},{"id":123,"text":"Cloroform, dầu thực vật là các dung môi có tính chất gì?","answers":["A. không phân cực thân nước","B. phân cực thân nước","C. phân cực thân dầu","D. không phân cực thân dầu"],"correct":3,"explanation":"Đáp án đúng là: không phân cực thân dầu Vì: các loại dung môi","reference":"Mục 6.3"},{"id":124,"text":"Nếu thuốc quá tan trong nước, khi cho uống sẽ bị như nào?","answers":["A. Hấp thu tùy trường hợp","B. Không được hấp thu","C. Dễ hấp thu qua đường tiêu hoá","D. khó hấp thu"],"correct":1,"explanation":"Đáp án đúng là: Không được hấp thu Vì: Tính chất về độ tan và tốc độ hòa tan của dược chất","reference":"Mục 3.1"},{"id":125,"text":"Phương pháp tiệt khuẩn nào được áp dụng để tiệt khuẩn đa số các thuốc tiêm đã được đóng trong bao bì kín?","answers":["A. Tiệt khuẩn bằng nhiệt khô","B. Tiệt khuẩn bằng khí ethylen oxyd","C. Tiệt khuẩn bằng ánh sáng tia cực tím","D. Tiệt khuẩn bằng hơi nước bão hòa (nhiệt ẩm) trong nồi hấp"],"correct":3,"explanation":"Đáp án đúng là: Tiệt khuẩn bằng hơi nước bão hòa (nhiệt ẩm) trong nồi hấp Vì: Theo yêu cầu đảm bảo sự vô khuẩn của thuốc tiêm","reference":"Mục 9.3"},{"id":126,"text":"Quy trình xử lý bao bì thuỷ tinh tiếp xúc trực tiếp với thuốc tiêm yêu cầu như nào?","answers":["A. rửa sạch bao bì bằng nước khử khoáng và dung dịch xà phòng","B. rửa sạch bao bì bằng nước khử khoáng và dung dịch xà phòng, sau đó rửa lại bằng nước và tráng bằng nước cất pha tiêm","C. rửa sạch bao bì bằng nước muối sinh lý và dung dịch xà phòng","D. rửa sạch bao bì bằng nước khử khoáng và dung dịch xà phòng, sau đó rửa lại bằng nước và tráng bằng nước muối sinh lý"],"correct":1,"explanation":"Đáp án đúng là: rửa sạch bao bì bằng nước khử khoáng và dung dịch xà phòng, sau đó rửa lại bằng nước và tráng bằng nước cất pha tiêm Vì: Yêu cầu về quy trình xử lý bao bì tiếp xúc trực tiếp thuốc tiêm","reference":"Mục 10.1"},{"id":127,"text":"Đâu là một trong những mốc quan trọng trong lịch sử phát triển ngành Dược tại Việt Nam trong giai đoạn trước Cách mạng tháng Tám?","answers":["A. Thái y viện được thành lập để điều trị cho vua và hoàng gia","B. Phát hiện ra Penicillin","C. Sự ra đời của các loại thuốc tiêm dịch truyền","D. Dược điển Hoa Kỳ được xuất bản"],"correct":0,"explanation":"Đáp án đúng là: Thái y viện được thành lập để điều trị cho vua và hoàng gia Vì: Lịch sử phát triển ngành bào chế","reference":"Mục 1.2"},{"id":128,"text":"Trong trường hợp dùng mọi biện pháp đều không khắc phục được tương kỵ thì dược sỹ phải làm gì?","answers":["A. đóng gói riêng từng dược chất","B. sửa chữa đơn thuốc và thay đổi công thức","C. sửa chữa đơn thuốc","D. thay đổi công thức"],"correct":1,"explanation":"Đáp án đúng là: sửa chữa đơn thuốc và thay đổi công thức Vì: các khắc phục tương kỵ","reference":"Mục 4.2"},{"id":129,"text":"Dược chất nào dễ tạo hỗn hợp ơtecti khi phối hợp với phenol?","answers":["A. Apsirin","B. Chloral hydrate","C. Thymol","D. Acetaminophen"],"correct":2,"explanation":"Đáp án đúng là: Thymol Vì: Biện pháp khắc phục tương kỵ vật lý","reference":"Mục 5.1"},{"id":130,"text":"Sinh học và dược học là lĩnh vực nghiên cứu của …..?","answers":["A. Hoá học và lý học","B. Sinh dược học","C. Sinh học và lý học","D. Sinh khả dụng"],"correct":1,"explanation":"Đáp án đúng là: Sinh dược học Vì: Theo khái niệm sinh dược học","reference":"Mục 2.1"},{"id":131,"text":"Mục tiêu của môn học bào chế là gì?","answers":["A. Đảm bảo thuốc không có tác dụng phụ","B. Phát triển các loại thuốc không cần bảo quản","C. Giúp người dược sỹ thiết kế thuốc cho bệnh nhân","D. Nêu được nguyên tắc bào chế và cấu tạo của dạng thuốc"],"correct":3,"explanation":"Đáp án đúng là: Nêu được nguyên tắc bào chế và cấu tạo của dạng thuốc Vì: Theo mục tiêu môn học bào chế Tham khảo:","reference":"mục 1.1"},{"id":132,"text":"Tương kỵ hoá học do kết quả của phản ứng nào?","answers":["A. cả 3 ý đã nêu đều đúng","B. phản ứng oxy hoá khử","C. phản ứng thuỷ phân","D. phản ứng trao đổi, phản ứng kết hợp"],"correct":0,"explanation":"Đáp án đúng là: cả 3 ý đã nêu đều đúng Vì: nguyên nhân của tương kỵ hóa học","reference":"Mục 5.2"},{"id":133,"text":"Khái niệm tương đương nào dùng để chỉ 2 hay nhiều chế phẩm bào chế khác nhau về dạng dùng nhưng chứa cùng 1 dược chất với liều lượng như nhau?","answers":["A. Sinh học","B. Lâm sàng","C. Hóa học","D. Bào Chế"],"correct":2,"explanation":"Đáp án đúng là: Hóa học Vì: Theo khái niệm các loại tương đương","reference":"Mục 2.1"},{"id":134,"text":"Trong các trạng thái vật lý của dược chất, trạng thái nào có SKD cao nhất?","answers":["A. Dạng khan","B. Dạng vô định hình","C. Dạng kết tinh","D. Dạng hydrat hóa"],"correct":1,"explanation":"Đáp án đúng là: Dạng vô định hình Vì: Các tính chất lý hóa của dược chất ảnh hưởng đến SKD","reference":"Mục 3.1"},{"id":135,"text":"Yếu tố nào không phải là yêu cầu trong kỹ thuật pha chế vô trùng?","answers":["A. Dụng cụ và thiết bị phải được tiệt trùng trước khi sử dụng","B. Kiểm soát thời gian lưu giữ thuốc trước khi đóng bao bì","C. Môi trường pha chế phải đạt cấp độ A","D. Sử dụng thuốc tiêm chưa tiệt trùng khi đóng vào bao bì"],"correct":3,"explanation":"Đáp án đúng là: Sử dụng thuốc tiêm chưa tiệt trùng khi đóng vào bao bì Vì: Theo yêu cầu đảm bảo sự vô khuẩn của thuốc tiêm","reference":"Mục 9.3"},{"id":136,"text":"Dung môi glycerin có tác dụng gì trong thuốc tiêm?","answers":["A. Tăng độ độc của thuốc","B. Làm ổn định dung dịch tiêm","C. Làm thuốc tiêm không ổn định","D. Gây kích ứng mạnh tại nơi tiêm"],"correct":1,"explanation":"Đáp án đúng là: Làm ổn định dung dịch tiêm Vì: Dung môi thuốc tiêm","reference":"Mục 8.3.2"},{"id":137,"text":"Để tránh tương kỵ do thủy phân, ta có thể làm gì?","answers":["A. Tăng nhiệt độ trong quá trình sản xuất","B. Thay thế dược chất dễ thủy phân bằng dược chất ổn định hơn","C. Thêm nước vào công thức","D. Sử dụng chất bảo quản"],"correct":1,"explanation":"Đáp án đúng là: Thay thế dược chất dễ thủy phân bằng dược chất ổn định hơn Vì: Biện pháp khắc phục tương kỵ hóa học","reference":"Mục 5.2"},{"id":138,"text":"Vitamin B1 có tính chất gì?","answers":["A. không hút ẩm","B. bền vững trong môi trường acid","C. không bền vững trong môi trường kiềm và acid","D. bền vững trong môi trường kiềm"],"correct":1,"explanation":"Đáp án đúng là: bền vững trong môi trường acid Vì: tính chất của vitamin B1","reference":"Mục 5.1"},{"id":139,"text":"Khi pha chế thuốc tiêm trong khu vực sạch, các buồng pha chế cần phải có đặc điểm gì?","answers":["A. Được mở thường xuyên để thoáng khí","B. Đảm bảo không có bụi trong không khí","C. Cô lập và cách ly hoàn toàn với môi trường ngoài","D. Được làm bằng vật liệu nhẹ và dễ di chuyển"],"correct":2,"explanation":"Đáp án đúng là: Cô lập và cách ly hoàn toàn với môi trường ngoài Vì: Theo yêu cầu về nhà xưởng sản xuất thuốc tiêm","reference":"Mục 9.1"},{"id":140,"text":"Thuốc nang hòa tan trong ruột có đặc điểm gì?","answers":["A. Giải phóng hoạt chất ngay khi uống vào miệng","B. Chỉ tan trong dịch ruột, không bị phân hủy bởi dịch dạ dày","C. Luôn có vỏ nang mềm, không bao giờ là nang cứng","D. Chứa thuốc dạng bột để tăng tốc độ hòa tan"],"correct":1,"explanation":"Đáp án đúng là: Chỉ tan trong dịch ruột, không bị phân hủy bởi dịch dạ dày Vì: Theo đặc điểm của các loại thuốc viên nang","reference":"Mục 15.3"},{"id":141,"text":"Kem bôi da (Creams) có đặc điểm nào sau đây?","answers":["A. Chỉ được dùng để bôi ngoài da, không dùng theo đường âm đạo","B. Không thể chứa nhiều hơn một dược chất","C. Là dạng thuốc bán rắn, chứa dược chất hòa tan hoặc phân tán trong tá dược phù hợp","D. Luôn có dạng bột khô"],"correct":2,"explanation":"Đáp án đúng là: Là dạng thuốc bán rắn, chứa dược chất hòa tan hoặc phân tán trong tá dược phù hợp Vì: Theo phân loại thuốc mỡ","reference":"Mục 11.2"},{"id":142,"text":"Chất điều chỉnh pH trong công thức thuốc tiêm có vai trò gì?","answers":["A. Tăng độ tan của dược chất và đảm bảo sự ổn định","B. Tăng tốc độ tiệt khuẩn","C. Giảm tác dụng phụ của thuốc","D. Điều chỉnh độ nhớt của dung dịch"],"correct":0,"explanation":"Đáp án đúng là: Tăng độ tan của dược chất và đảm bảo sự ổn định Vì: Các thành phần của thuốc tiêm","reference":"Mục 8.3"},{"id":143,"text":"Trong pha chế thuốc tiêm, thiết bị cân và đong cần phải có đặc điểm gì?","answers":["A. Cân và dụng cụ đong phải vô trùng","B. Cân và dụng cụ đong không cần phải có công suất phù hợp với quy mô sản xuất.","C. Sử dụng cân có sức cân thích hợp và dụng cụ đong phải được lựa chọn theo quy mô sản xuất","D. Cân có thể sử dụng bất kỳ loại cân nào mà không cần quan tâm đến sức cân"],"correct":2,"explanation":"Đáp án đúng là: Sử dụng cân có sức cân thích hợp và dụng cụ đong phải được lựa chọn theo quy mô sản xuất Vì: Theo yêu cầu về thiết bị, dụng cụ bào chế thuốc tiêm","reference":"Mục 9.2"},{"id":144,"text":"Nắp cao su dùng để đóng gói dung dịch thuốc phải có đặc điểm gì?","answers":["A. Cả 3 ý đã nêu đều đúng","B. Phải dễ vỡ","C. Không cần giữ tạp chất","D. Không hấp thụ dược chất"],"correct":3,"explanation":"Đáp án đúng là: Không hấp thụ dược chất Vì: đóng gói dung dịch thuốc","reference":"Mục 7.4"},{"id":145,"text":"Nút cao su trong bao bì thuốc tiêm có vai trò gì?","answers":["A. Tăng tốc độ hấp thu thuốc","B. Đảm bảo độ vô khuẩn và ngăn ngừa sự xâm nhập của vi khuẩn","C. Giảm đau khi tiêm thuốc","D. Làm thuốc tiêm dễ dàng sử dụng"],"correct":1,"explanation":"Đáp án đúng là: Đảm bảo độ vô khuẩn và ngăn ngừa sự xâm nhập của vi khuẩn Vì: Bao bì thuốc tiêm","reference":"Mục 8.4"},{"id":146,"text":"Loại polyme nào thường được dùng để tạo màng bao bảo vệ viên khỏi ẩm và tan nhanh trong dịch vị?","answers":["A. Tinh bột biến tính","B. Eudragit L, S","C. Sáp ong, parafin","D. PEG 600, HPMC"],"correct":3,"explanation":"Đáp án đúng là: PEG 600, HPMC Vì: Đặc điểm phương pháp bao viên","reference":"Mục 14.4"},{"id":147,"text":"Viên nang phóng thích kéo dài được tạo ra bằng cách nào?","answers":["A. Chỉ sử dụng dược chất có tính chất tan chậm","B. Phối hợp các vi hạt hoặc vi nang phóng thích dược chất tại nhiều thời điểm và vị trí khác nhau","C. Tăng độ cứng của vỏ nang","D. Giảm kích thước viên nang để thuốc hấp thu chậm hơn"],"correct":1,"explanation":"Đáp án đúng là: Phối hợp các vi hạt hoặc vi nang phóng thích dược chất tại nhiều thời điểm và vị trí khác nhau Vì: Theo ưu, nhược điểm của viên nén","reference":"Mục 15.2"},{"id":148,"text":"Trong bào chế thuốc mỡ, việc lựa chọn tá dược cần dựa vào yếu tố nào?","answers":["A. Chỉ cần lựa chọn tá dược theo giá thành thấp nhất","B. Phải dựa vào tính chất của dược chất, mục đích sử dụng và yêu cầu điều trị","C. Luôn sử dụng một loại tá dược cho tất cả các loại thuốc mỡ","D. Chỉ cần dựa vào tính chất của dược chất"],"correct":1,"explanation":"Đáp án đúng là: Phải dựa vào tính chất của dược chất, mục đích sử dụng và yêu cầu điều trị Vì: Theo đặc điểm thành phần của thuốc mỡ","reference":"Mục 11.4"},{"id":149,"text":"Thuốc tiêm tĩnh mạch có sinh khả dụng (SKD) là bao nhiêu phần trăm?","answers":["A. 0,9","B. 1","C. 0,7","D. 0,5"],"correct":1,"explanation":"Đáp án đúng là: 1 Vì: Theo khái niệm Sinh khả dụng","reference":"Mục 2.1"},{"id":150,"text":"Trong phương pháp điều chế thuốc mỡ hòa tan, giai đoạn chuẩn bị dược chất bao gồm việc làm gì?","answers":["A. Tìm kiếm nguồn cung cấp dược chất","B. Nghiền dược chất để tăng tốc độ hòa tan","C. Đun nóng dược chất trước khi hòa tan","D. Tiệt khuẩn dược chất"],"correct":1,"explanation":"Đáp án đúng là: Nghiền dược chất để tăng tốc độ hòa tan Vì: Theo quy trình điều chế thuốc mỡ bằng phương pháp hòa tan","reference":"Mục 12.1"},{"id":151,"text":"Khi lựa chọn tá dược, yếu tố nào sau đây cần được xem xét?","answers":["A. Tất cả các phương án đã nêu","B. Nguồn nguyên liệu ổn định","C. Tính chất lý hóa của dược chất","D. Giá thành hợp lý"],"correct":0,"explanation":"Đáp án đúng là: Tất cả các phương án đã nêu Vì: Nguyên tắc lựa chọn tá dược xây dựng công thức dập viên","reference":"Mục 14.2"},{"id":152,"text":"Viên bao bền với dịch vị dạ dày có đặc điểm nào?","answers":["A. Viên bao không phân hủy trong môi trường dịch ruột","B. Viên bao bền với dịch dạ dày nhưng tan trong dịch ruột","C. Viên bao tan trong dịch dạ dày và ruột","D. Viên bao chỉ có thể tan trong dạ dày, không tan trong ruột"],"correct":1,"explanation":"Đáp án đúng là: Viên bao bền với dịch dạ dày nhưng tan trong dịch ruột Vì: Các loại viên nén","reference":"Mục 13.3"},{"id":153,"text":"Quy trình xử lý nút cao su yêu cầu không tiệt khuẩn bằng phương pháp nào?","answers":["A. Tiệt khuẩn bằng nhiệt ẩm","B. Tiệt khuẩn trong nồi hấp tiệt trùng","C. Tiệt khuẩn bằng khí oxyd ethylen","D. Tiệt khuẩn bằng nhiệt khô"],"correct":2,"explanation":"Đáp án đúng là: Tiệt khuẩn bằng khí oxyd ethylen Vì: Yêu cầu về quy trình xử lý bao bì tiếp xúc trực tiếp thuốc tiêm","reference":"Mục 10.1"},{"id":154,"text":"Màng lọc nào có thể tiệt khuẩn được bằng cả nhiệt ẩm và nhiệt khô tới 200°C?","answers":["A. Màng lọc cellulose nitrat","B. Màng lọc cellulose actat","C. Màng lọc polypropylene","D. Màng lọc PTFE (polytetrafluoroethylene)"],"correct":3,"explanation":"Đáp án đúng là: Màng lọc PTFE (polytetrafluoroethylene) Vì: Theo yêu cầu về thiết bị, dụng cụ bào chế thuốc tiêm","reference":"Mục 9.2"},{"id":155,"text":"Các chất làm tăng hấp thu qua da phải đảm bảo yếu tố nào sau đây?","answers":["A. Tác dụng dược lý riêng mạnh","B. Gây kích ứng da nhẹ","C. Có tác dụng giải phóng thuốc nhanh","D. Không độc, không kích ứng da và niêm mạc"],"correct":3,"explanation":"Đáp án đúng là: Không độc, không kích ứng da và niêm mạc Vì: Các yếu tố ảnh hưởng đến sự hấp thu thuốc qua da","reference":"Mục 12.4"},{"id":156,"text":"Tween 20, tween 80, cremopor là các chất gì?","answers":["A. các chất làm tăng độ tan","B. các chất keo dính kết dược chất và tá dược","C. các chất ổn định pH","D. các chất điện hoạt làm tăng độ tan"],"correct":3,"explanation":"Đáp án đúng là: các chất điện hoạt làm tăng độ tan Vì: các khắc phục tương kỵ hóa học","reference":"Mục 4.3"},{"id":157,"text":"Đặc điểm của cấu trúc của chế phẩm thuốc mỡ được điều chế bằng phương pháp hòa tan là gì?","answers":["A. Dung dịch không ổn định","B. Dung dịch keo hoặc hệ phân tán đồng thể","C. Dung dịch bão hòa","D. Dung dịch huyền phù"],"correct":1,"explanation":"Đáp án đúng là: Dung dịch keo hoặc hệ phân tán đồng thể Vì: Theo quy trình điều chế thuốc mỡ bằng phương pháp hòa tan","reference":"Mục 12.1"},{"id":158,"text":"Sinh dược học chủ yếu nghiên cứu về các lĩnh vực nào?","answers":["A. Hoá học và lý học","B. Sinh học và dược học","C. Sinh học và lý học","D. Hoá học và dược học"],"correct":1,"explanation":"Đáp án đúng là: Sinh học và dược học Vì: Theo khái niệm sinh dược học","reference":"Mục 2.1"},{"id":159,"text":"Chất điện hoạt là những chất khi tan trong dung môi có khả năng gì?","answers":["A. làm giảm nồng độ của dung môi","B. làm giảm tỷ trọng của dung môi","C. làm giảm thể tích của dung môi","D. làm giảm sức căng bề mặt của dung môi"],"correct":3,"explanation":"Đáp án đúng là: làm giảm sức căng bề mặt của dung môi Vì: quá trình hòa tan","reference":"Mục 7.2"},{"id":160,"text":"Yếu tố nào dưới đây ảnh hưởng đến sinh khả dụng của thuốc?","answers":["A. Hình dạng của viên nén","B. Kích thước tiểu phần của dược chất","C. Màu sắc của viên thuốc","D. Mùi thơm của viên thuốc"],"correct":1,"explanation":"Đáp án đúng là: Kích thước tiểu phần của dược chất Vì: Đặc điểm của quá trình khảo sát các tính chất lý hoá của dược chất","reference":"Mục 14.1"},{"id":161,"text":"Khi lọc dung dịch tiêm qua màng lọc, người ta cần sử dụng loại màng lọc nào để đạt hiệu suất lọc cao nhất?","answers":["A. Màng lọc có kích thước lỗ xốp 10µm","B. Màng lọc có kích thước lỗ xốp 0,45µm (lọc trong)","C. Màng lọc có kích thước lỗ xốp 50µm","D. Màng lọc có kích thước lỗ xốp 1µm"],"correct":1,"explanation":"Đáp án đúng là: Màng lọc có kích thước lỗ xốp 0,45µm (lọc trong) Vì: Theo yêu cầu về thiết bị, dụng cụ bào chế thuốc tiêm","reference":"Mục 9.2"},{"id":162,"text":"Các bộ phận trong khu vực pha chế thuốc tiêm bao gồm tất cả các bộ phận sau, ngoại trừ khu vực nào?","answers":["A. Phòng đóng gói, hoàn chỉnh sản phẩm","B. Phòng họp của công nhân","C. Kho nguyên liệu bao bì","D. Phòng vệ sinh, thay đồ"],"correct":1,"explanation":"Đáp án đúng là: Phòng họp của công nhân Vì: Theo yêu cầu về nhà xưởng sản xuất thuốc tiêm","reference":"Mục 9.1"},{"id":163,"text":"Hệ số phân bố dầu-nước của dược chất có ảnh hưởng đến quá trình nào?","answers":["A. Độ tan của thuốc trong dịch cơ thể","B. Tốc độ khuyếch tán qua màng sinh học","C. Tốc độ đào thải thuốc","D. Liều thuốc tiêm"],"correct":1,"explanation":"Đáp án đúng là: Tốc độ khuyếch tán qua màng sinh học Vì: Đặc điểm các yếu tố ảnh hưởng đến sinh khả dụng của thuốc tiêm","reference":"Mục 10.4"},{"id":164,"text":"Nước khử khoáng có đặc điểm gì?","answers":["A. Cả 3 ý đã nêu đều đúng","B. Được dùng trong các quy trình bào chế thuốc tiêm","C. Có độ tinh khiết hóa học cao","D. Không cần sử dụng nhiệt"],"correct":0,"explanation":"Đáp án đúng là: Cả 3 ý đã nêu đều đúng Vì: các loại dung môi","reference":"Mục 6.3"},{"id":165,"text":"Louis Pasteur phát triển vắc xin phòng bệnh dại đầu tiên năm nào?","answers":["A. 1928","B. 1799","C. 1821","D. 1885"],"correct":3,"explanation":"Đáp án đúng là: 1885 Vì: Theo lịch sử phát triển ngành bào chế Tham khảo:","reference":"mục 1.2"},{"id":166,"text":"Thuỷ tinh loại 1 (borosilicate) thích hợp làm bao bì cho thuốc tiêm vì lý do gì?","answers":["A. Có độ bền cơ học cao và chịu được các loại pH khác nhau","B. Dễ vỡ khi tiếp xúc với nhiệt độ cao","C. Không thể kiểm soát chất lượng khi tiệt khuẩn","D. Tương thích với các loại thuốc chứa acid mạnh"],"correct":0,"explanation":"Đáp án đúng là: Có độ bền cơ học cao và chịu được các loại pH khác nhau Vì: Bao bì thuốc tiêm","reference":"Mục 8.4"},{"id":167,"text":"Trong lịch sử thế kỷ XX, Penicillin tinh khiết được sản xuất để đáp ứng nhu cầu gì?","answers":["A. Điều trị bệnh hô hấp","B. Đáp ứng nhu cầu của quân đội trong Thế chiến thứ hai","C. Điều trị bệnh tim mạch","D. Dự phòng cảm cúm"],"correct":1,"explanation":"Đáp án đúng là: Đáp ứng nhu cầu của quân đội trong Thế chiến thứ hai Vì: một số công ty dược phẩm Hoa Kỳ đã sản xuất hàng loạt penicillin tinh khiết để đáp ứng nhu cầu của quân đội trong Thế chiến thứ hai Tham khảo:","reference":"mục 1.2"},{"id":168,"text":"Theo lịch sử ngành Dược, ai được coi là \"Tổ sư ngành Dược Việt Nam\"?","answers":["A. Nguyễn Bá Tĩnh (Tuệ Tĩnh)","B. Hồ Tùng Mậu","C. Lê Lợi","D. Chu Văn An"],"correct":0,"explanation":"Đáp án đúng là: Nguyễn Bá Tĩnh (Tuệ Tĩnh) Vì: Lịch sử phát triển ngành bào chế","reference":"Mục 1.2"},{"id":169,"text":"Phân loại thuốc theo đường dùng gồm có các loại thuốc nào?","answers":["A. Qua da","B. Tất cả các đáp án","C. Đường tiêu hóa","D. Đường hô hấp","E. Tiêm"],"correct":1,"explanation":"Đáp án đúng là: Tất cả các đáp án Vì: Theo phân loại dạng thuốc Tham khảo:","reference":"mục 1.3"},{"id":170,"text":"Trong trường hợp tiêm bắp, dược chất được hấp thu nhanh hơn khi tiêm vào vị trí nào sau đây?","answers":["A. Cơ delta","B. Cơ đùi","C. Vùng dưới da","D. Cơ mông"],"correct":0,"explanation":"Đáp án đúng là: Cơ delta Vì: Đặc điểm các yếu tố ảnh hưởng đến sinh khả dụng của thuốc tiêm","reference":"Mục 10.4"},{"id":171,"text":"Prednisolone dùng dưới dạng natri hemisuccinat chậm tan sẽ như nào?","answers":["A. giảm thời gian được tác dụng của thuốc","B. kéo dài thời gian bán thải của thuốc","C. kéo dài được tác dụng của thuốc","D. rút ngắn thời gian bán thải của thuốc"],"correct":2,"explanation":"Đáp án đúng là: kéo dài được tác dụng của thuốc Vì: Các tính chất lý hóa của dược chất ảnh hưởng đến SKD","reference":"Mục 3.1"},{"id":172,"text":"Phương pháp nào dưới đây không được sử dụng để loại bụi và đánh bóng viên nang?","answers":["A. Ngâm viên nang trong nước để rửa sạch bụi","B. Sử dụng hệ thống lau viên dạng bàn chải và máy hút bụi","C. Lau bằng vải cotton hoặc vải gạc có tẩm dầu","D. Sử dụng nồi bao đục lỗ có hệ thống thổi và hút khí"],"correct":0,"explanation":"Đáp án đúng là: Ngâm viên nang trong nước để rửa sạch bụi Vì: Theo phương pháp hoàn chỉnh viên nang","reference":"Mục 16.5"},{"id":173,"text":"Chất bảo quản nào có thể gây tương tác với acid acylic và dẫn xuất?","answers":["A. Thiomersal","B. Benzakolium chloride","C. Cetyl pyridinium chloride","D. Phenol"],"correct":1,"explanation":"Đáp án đúng là: Benzakolium chloride Vì: nguyên nhân của tương kỵ hóa học","reference":"Mục 5.2"},{"id":174,"text":"Dung môi nào sau đây có thể hòa tan các chất béo và hydrocarbon?","answers":["A. Benzen","B. Nước","C. Ethanol","D. Glyxerin"],"correct":0,"explanation":"Đáp án đúng là: Benzen Vì: các loại dung môi","reference":"Mục 6.3"},{"id":175,"text":"Các cỡ nang cứng thông dụng nhất trong thực tế là?","answers":["A. Số 000, số 00 và số 5","B. Số 1, số 2 và số 5","C. Số 3, số 4 và số 5","D. Số 0, số 1 và số 2"],"correct":3,"explanation":"Đáp án đúng là: Số 0, số 1 và số 2 Vì: Theo phân loại thuốc viên nang","reference":"Mục 15.1"},{"id":176,"text":"Dung môi nào có thể được sử dụng để khắc phục tương kỵ trong công thức thuốc tiêm Phenobarbital?","answers":["A. Nước cất.","B. Ethanol","C. Acetone","D. Propylen glycol và alcol ethylic"],"correct":3,"explanation":"Đáp án đúng là: Propylen glycol và alcol ethylic Vì: các khắc phục tương kỵ hóa học","reference":"Mục 4.3"},{"id":177,"text":"Thuốc tiêm có ưu điểm gì so với các dạng thuốc khác?","answers":["A. Thuốc tiêm có thể gây phản ứng mạnh","B. Thuốc tiêm dễ dàng tiêu hóa","C. Thuốc tiêm không cần phải kiểm tra tính vô khuẩn","D. Thuốc tiêm có thể gây ra đáp ứng sinh học tức thì"],"correct":3,"explanation":"Đáp án đúng là: Thuốc tiêm có thể gây ra đáp ứng sinh học tức thì Vì: Ưu điểm của thuốc tiêm","reference":"Mục 8.2"},{"id":178,"text":"Phòng và khu vực sạch trong pha chế chế phẩm vô trùng nhằm mục đích gì?","answers":["A. Đảm bảo sự thoải mái cho các công nhân","B. Giới hạn mức độ ô nhiễm tiểu phân và vi sinh vật sống","C. Cung cấp không khí mát mẻ cho công nhân","D. Tạo ra không khí trong lành cho nhân viên"],"correct":1,"explanation":"Đáp án đúng là: Giới hạn mức độ ô nhiễm tiểu phân và vi sinh vật sống Vì: Theo yêu cầu về nhà xưởng sản xuất thuốc tiêm","reference":"Mục 9.1"},{"id":179,"text":"Thành phần tinh bột trong vỏ nang thường là hỗn hợp của loại nào?","answers":["A. 9 phần tinh bột ngô, 1 phần tinh bột mì","B. 5 phần tinh bột ngô, 5 phần tinh bột mì","C. 8 phần tinh bột gạo, 2 phần tinh bột mì","D. 9 phần tinh bột mì, 1 phần tinh bột ngô"],"correct":3,"explanation":"Đáp án đúng là: 9 phần tinh bột mì, 1 phần tinh bột ngô Vì: Theo phương pháp bào chế nang tinh bột","reference":"Mục 16.1"},{"id":180,"text":"Điểm khác biệt giữa bột nhão bôi da và kem bôi da là gì?","answers":["A. Bột nhão bôi da có chứa một tỷ lệ lớn dược chất rắn không tan, còn kem bôi da chứa nhiều chất lỏng","B. Kem bôi da chứa nhiều dược chất rắn hơn bột nhão bôi da","C. Bột nhão bôi da có thể chất mềm mịn, trong khi kem bôi da có thể chất cứng hơn","D. Kem bôi da không phải là một dạng thuốc mỡ"],"correct":0,"explanation":"Đáp án đúng là: Bột nhão bôi da có chứa một tỷ lệ lớn dược chất rắn không tan, còn kem bôi da chứa nhiều chất lỏng Vì: Theo định nghĩa về thuốc mỡ","reference":"Mục 11.1.1"},{"id":181,"text":"Gelatin dùng để làm vỏ nang mềm phải đạt tiêu chuẩn nào sau đây?","answers":["A. Độ hút ẩm thấp","B. Độ bền gel","C. Không chứa protein","D. Độ hoà tan trong dầu"],"correct":1,"explanation":"Đáp án đúng là: Độ bền gel Vì: Theo phương pháp bào chế nang mềm gelatin","reference":"Mục 16.2"},{"id":182,"text":"Chất hóa dẻo nào thường được dùng trong công thức vỏ nang mềm?","answers":["A. Talc","B. Titan dioxyd","C. Magie stearat","D. Glycerin"],"correct":3,"explanation":"Đáp án đúng là: Glycerin Vì: Theo phương pháp bào chế nang mềm gelatin","reference":"Mục 16.2"},{"id":183,"text":"Mục đích chính của việc bao viên là gì?","answers":["A. Giảm chi phí sản xuất viên nén","B. Bảo vệ dược chất và che giấu mùi vị khó chịu","C. Giảm kích thước viên nén","D. Làm viên dễ tan hơn trong nước"],"correct":1,"explanation":"Đáp án đúng là: Bảo vệ dược chất và che giấu mùi vị khó chịu Vì: Đặc điểm phương pháp bao viên","reference":"Mục 14.4"},{"id":184,"text":"Có thể dùng SKD in vitro thay cho SKD in vivo trong trường hợp nào?","answers":["A. Có tương quan thuận biến","B. Có tương quan đồng biến","C. Có tương quan nghịch biến","D. Có tương quan cảm biến"],"correct":1,"explanation":"Đáp án đúng là: Có tương quan đồng biến Vì: Theo tương quan của SKD invivo và SKD invitro","reference":"Mục 2.3"},{"id":185,"text":"Điều nào không phải là hạn chế của thuốc tiêm?","answers":["A. Thuốc tiêm có thể gây phản ứng dị ứng tại chỗ tiêm","B. Giá thành thuốc tiêm thường cao hơn thuốc uống","C. Không thể sử dụng thuốc tiêm cho tất cả loại thuốc","D. Dễ gây tai biến khi tiêm không đúng"],"correct":2,"explanation":"Đáp án đúng là: Không thể sử dụng thuốc tiêm cho tất cả loại thuốc Vì: Hạn chế của thuốc tiêm","reference":"Mục 8.2"},{"id":186,"text":"Khi tiêm thuốc có độ ưu trương, hiện tượng gì có thể xảy ra?","answers":["A. Tăng sinh khả dụng của thuốc","B. Không gây cảm giác đau","C. Các tế bào bị teo lại","D. Thuốc tiêm dễ dàng hòa tan vào máu"],"correct":2,"explanation":"Đáp án đúng là: Các tế bào bị teo lại Vì: Các thành phần của thuốc tiêm","reference":"Mục 8.3"},{"id":187,"text":"Dược chất nào sau đây dễ bị oxy hóa trong quá trình bảo quản?","answers":["A. Atropine sulfate","B. Magnesium sulfate","C. Vitamin C","D. Phyostigmin"],"correct":2,"explanation":"Đáp án đúng là: Vitamin C Vì: nguyên nhân của tương kỵ hóa học","reference":"Mục 5.2"},{"id":188,"text":"Phân loại thuốc theo nguồn gốc công thức gồm những loại nào?","answers":["A. Thuốc pha chế theo công thức dược dụng và thuốc pha chế theo đơn","B. Thuốc nhập khẩu và thuốc tự sản xuất","C. Thuốc pha chế theo đặt hàng và thuốc tự sản xuất","D. Thuốc nhập khẩu và thuốc xuất khẩu"],"correct":0,"explanation":"Đáp án đúng là: Thuốc pha chế theo công thức dược dụng và thuốc pha chế theo đơn Vì: Theo phân loại dạng thuốc Tham khảo:","reference":"mục 1.3"},{"id":189,"text":"Đâu là những sách ghi chép về kỹ thuật bào chế các dạng thuốc?","answers":["A. Kinh Vedas của Ấn Độ","B. \"Bản thảo cương mục\" của Trung Quốc","C. Kinh Vedas của Ấn Độ, \"Bản thảo cương mục\" của Trung Quốc","D. Kinh Vedas của Ấn Độ, \"Hồng Lâu Mộng\" của Trung Quốc"],"correct":2,"explanation":"Đáp án đúng là: Kinh Vedas của Ấn Độ, \"Bản thảo cương mục\" của Trung Quốc Vì: Theo lịch sử phát triển ngành bào chế Tham khảo:","reference":"mục 1.2"},{"id":190,"text":"Tương kỵ trong bào chế thuốc được hiểu là gì?","answers":["A. Sự pha chế không đúng nhưng không ảnh hưởng đến chất lượng thuốc.","B. Sự thay đổi về tính chất vật lý, hoá học hoặc dược lý của chế phẩm làm cho thuốc không đạt chất lượng.","C. Sự kết hợp của nhiều dược chất và tá dược có thể tạo ra hiệu quả điều trị tốt hơn.","D. Sự kết hợp của dược chất làm tăng hiệu quả điều trị."],"correct":1,"explanation":"Đáp án đúng là: Sự thay đổi về tính chất vật lý, hoá học hoặc dược lý của chế phẩm làm cho thuốc không đạt chất lượng. Vì: Khái niệm tương kỵ","reference":"Mục 4.1"},{"id":191,"text":"Độ tan của alcol ethylic trong nước là bao nhiêu?","answers":["A. 1:1000","B. 1:50","C. 1:100","D. 1:500"],"correct":1,"explanation":"Đáp án đúng là: 1:50 Vì: Tính tan của acol etylic","reference":"Mục 4.3"},{"id":192,"text":"Dược chất trong TTS được kiểm soát tốc độ giải phóng bởi yếu tố nào?","answers":["A. Nhiệt độ môi trường","B. Loại bệnh lý cần điều trị","C. Độ dày, đường kính và lỗ xốp của màng bán thấm","D. Lượng nước trong cơ thể bệnh súc"],"correct":2,"explanation":"Đáp án đúng là: Độ dày, đường kính và lỗ xốp của màng bán thấm Vì: Theo phân loại thuốc mỡ","reference":"Mục 11.2"},{"id":193,"text":"Điều kiện áp dụng phương pháp trộn đều đơn giản trong sản xuất thuốc mỡ là gì?","answers":["A. Tá dược chỉ là loại thân nước","B. Dược chất là rắn, ít tan hoặc không tan trong tá dược","C. Dược chất phải dễ dàng hòa tan trong dung môi","D. Dược chất phải tan hoàn toàn trong tá dược"],"correct":1,"explanation":"Đáp án đúng là: Dược chất là rắn, ít tan hoặc không tan trong tá dược Vì: Theo quy trình điều chế thuốc mỡ bằng phương pháp trộn đều đơn giản","reference":"Mục 12.2"},{"id":194,"text":"Tiệt khuẩn bằng nhiệt ẩm có đặc điểm gì khi áp dụng trong nồi hấp?","answers":["A. Nồi hấp chỉ sử dụng để tiệt khuẩn thuốc tiêm dầu","B. Nhiệt độ trong nồi hấp có thể nâng lên trên 100°C bằng cách tăng áp suất hơi nước bão hòa","C. Áp suất trong nồi hấp không ảnh hưởng đến nhiệt độ","D. Nồi hấp không cần có van xả và đồng hồ báo áp suất"],"correct":1,"explanation":"Đáp án đúng là: Nhiệt độ trong nồi hấp có thể nâng lên trên 100°C bằng cách tăng áp suất hơi nước bão hòa Vì: Theo yêu cầu đảm bảo sự vô khuẩn của thuốc tiêm","reference":"Mục 9.3"},{"id":195,"text":"Thuốc tiêm có thể ở dạng nào?","answers":["A. Dung dịch, hỗn dịch, nhũ tương, bột vô khuẩn","B. Chỉ dạng nhũ tương","C. Chỉ dạng bột","D. Chỉ dạng dung dịch"],"correct":0,"explanation":"Đáp án đúng là: Dung dịch, hỗn dịch, nhũ tương, bột vô khuẩn Vì: Phân loại thuốc tiêm","reference":"Mục 8.1.3"},{"id":196,"text":"Khảo sát các tính chất lý hóa của dược chất còn được gọi là gì?","answers":["A. Nghiên cứu tiền công thức","B. Nghiên cứu bào chế","C. Nghiên cứu công thức","D. Nghiên cứu sản xuất"],"correct":0,"explanation":"Đáp án đúng là: Nghiên cứu tiền công thức Vì: Đặc điểm của quá trình khảo sát các tính chất lý hoá của dược chất","reference":"Mục 14.1"},{"id":197,"text":"Phương pháp tạo hạt bằng máy tầng sôi có đặc điểm nào?","answers":["A. Thời gian thực hiện lâu","B. Viên khó rã hơn so với xát hạt ướt","C. Không cần kiểm soát kích thước hạt","D. Hạt có kích thước đồng đều"],"correct":3,"explanation":"Đáp án đúng là: Hạt có kích thước đồng đều Vì: Nguyên tắc lựa chọn phương pháp tạo hạt dập viên","reference":"Mục 14.3"},{"id":198,"text":"Thuốc tiêm vào cơ tim chủ yếu dùng trong tình huống nào?","answers":["A. Phẫu thuật tim","B. Cấp cứu khi sự sống bị đe dọa","C. Điều trị các bệnh về máu","D. Điều trị bệnh tim mạch lâu dài"],"correct":1,"explanation":"Đáp án đúng là: Cấp cứu khi sự sống bị đe dọa Vì: Các đường tiêm thuốc","reference":"Mục 8.1.2"},{"id":199,"text":"Các chất chống oxy hoá như sulfit có thể gây ra phản ứng gì?","answers":["A. Làm tăng độ bền của thuốc tiêm","B. Giảm đau tại nơi tiêm","C. Dị ứng trong một số trường hợp","D. Tăng độ ổn định của thuốc"],"correct":2,"explanation":"Đáp án đúng là: Dị ứng trong một số trường hợp Vì: Các thành phần của thuốc tiêm","reference":"Mục 8.3"},{"id":200,"text":"Nhược điểm của dung dịch thuốc là gì?","answers":["A. dược chất tác dụng chậm","B. dễ gây kích ứng khi dùng","C. dược chất thường có độ ổn định kém","D. dược chất khó được hấp thu"],"correct":2,"explanation":"Đáp án đúng là: dược chất thường có độ ổn định kém Vì: Nhược điểm của thuốc dạng dung dịch","reference":"Mục 6.2"},{"id":201,"text":"Lactose được dùng làm tá dược độn vì lý do nào?","answers":["A. Tăng độ bền cơ học của viên nén","B. Tạo mùi cho viên nén","C. Có tính trơn chảy tốt và giúp viên phóng thích hoạt chất nhanh","D. Tăng khả năng chống dính của viên nén"],"correct":2,"explanation":"Đáp án đúng là: Có tính trơn chảy tốt và giúp viên phóng thích hoạt chất nhanh Vì: Thành phần thuốc viên nén","reference":"Mục 13.4"},{"id":202,"text":"Vỏ nang có cấu tạo gồm mấy phần chính?","answers":["A. 2 phần: nắp nang và áo nang","B. 4 phần: nắp nang (cap) và thân nang (body), gờ khóa, lớp bao nang","C. 2 phần: nắp nang (cap) và thân nang (body)","D. 3 phần: nắp nang (cap) và thân nang (body), gờ khóa"],"correct":2,"explanation":"Đáp án đúng là: 2 phần: nắp nang (cap) và thân nang (body) Vì: Theo đặc điểm của vỏ nang","reference":"Mục 15.4"},{"id":203,"text":"Viên nang nào sau đây có thể giúp bảo vệ thuốc khỏi tác động của dịch dạ dày?","answers":["A. Thuốc nang thông thường","B. Thuốc nang hòa tan trong ruột","C. Thuốc nang mềm","D. Thuốc nang cứng"],"correct":1,"explanation":"Đáp án đúng là: Thuốc nang hòa tan trong ruột Vì: Theo đặc điểm của các loại thuốc viên nang","reference":"Mục 15.3"},{"id":204,"text":"AUC là chữ viết tắt có nghĩa là.............của đồ thị biểu diễn sự biến thiên của nồng độ thuốc trong máu theo thời gian","answers":["A. diện tích đường cong","B. diện tích trên đường cong","C. diện tích dưới đường tròn","D. diện tích dưới đường cong"],"correct":3,"explanation":"Đáp án đúng là: diện tích dưới đường cong Vì: Theo cách đánh giá SKD invivo","reference":"Mục 2.2"},{"id":205,"text":"Khi chuẩn bị dược chất trong phương pháp điều chế thuốc mỡ hòa tan, nếu dược chất là rắn có tốc độ hòa tan chậm, cần phải làm gì để tăng tốc độ hòa tan?","answers":["A. Dùng dung môi có nhiệt độ cao","B. Xay nghiền dược chất","C. Sử dụng dung môi khan","D. Đun nóng dược chất"],"correct":1,"explanation":"Đáp án đúng là: Xay nghiền dược chất Vì: Theo quy trình điều chế thuốc mỡ bằng phương pháp hòa tan","reference":"Mục 12.1"},{"id":206,"text":"Dạng bào chế thô sơ đầu tiên của dược phẩm là dạng thuốc gì?","answers":["A. Rượu thuốc","B. Thuốc bột","C. Nước sắc","D. Thuốc viên"],"correct":2,"explanation":"Đáp án đúng là: Nước sắc Vì: con người biết dùng nước thấm ướt, rồi biết đun với nước (sắc) lấy nước sắc để dùng – đó là dạng bào chế thô sơ đầu tiên của dược phẩm Tham khảo:","reference":"mục 1.2"},{"id":207,"text":"Biện pháp khắc phục phản ứng trao đổi ion là gì?","answers":["A. Tăng dung môi để hòa tan kết tủa","B. Thay đổi nồng độ acid trong công thức","C. Thêm chất bảo quản","D. Thêm chất chống oxy hóa"],"correct":0,"explanation":"Đáp án đúng là: Tăng dung môi để hòa tan kết tủa Vì: Biện pháp khắc phục tương kỵ hóa học","reference":"Mục 5.2"},{"id":208,"text":"Một trong những ưu điểm của thuốc mỡ so với thuốc uống là gì?","answers":["A. Thuốc mỡ có thể thay thế hoàn toàn thuốc đường tiêm trong điều trị toàn thân","B. Thuốc mỡ luôn có tác dụng mạnh hơn các dạng bào chế khác","C. Thuốc mỡ tránh được chuyển hóa lần đầu qua gan, giúp tăng sinh khả dụng","D. Thuốc mỡ có khả năng thẩm thấu vào máu nhanh hơn thuốc uống"],"correct":2,"explanation":"Đáp án đúng là: Thuốc mỡ tránh được chuyển hóa lần đầu qua gan, giúp tăng sinh khả dụng Vì: Theo ưu nhược điểm của thuốc mỡ","reference":"Mục 11.1.2"},{"id":209,"text":"Có các mức tương quan nào giữa SKD in vitro và SKD in vivo?","answers":["A. 1, 2, 3","B. mạnh, trung bình, nhẹ","C. mạnh, trung bình, yếu","D. A, B, C"],"correct":3,"explanation":"Đáp án đúng là: A, B, C Vì: Theo tương quan của SKD invivo và SKD invitro","reference":"Mục 2.3"},{"id":210,"text":"Ưu điểm của vật liệu lọc bằng len, dạ, vải là gì?","answers":["A. dễ rửa, dễ vệ sinh sau khi lọc","B. Lọc được bằng nhiều phương pháp","C. bền về mặt cơ học và hoá học","D. lọc được mọi loại dịch lọc"],"correct":2,"explanation":"Đáp án đúng là: bền về mặt cơ học và hoá học Vì: quá trình lọc","reference":"Mục 7.3"},{"id":211,"text":"Chất sát khuẩn nào dưới đây thường được sử dụng trong thuốc tiêm?","answers":["A. Phenol","B. Acetaminophen","C. Chlorophyll","D. Aspirin"],"correct":0,"explanation":"Đáp án đúng là: Phenol Vì: Các thành phần của thuốc tiêm","reference":"Mục 8.3"},{"id":212,"text":"Dạng kết tinh có cấu trúc tinh thể bền vững thường có khả năng tan thế nào?","answers":["A. tan nhanh hơn dạng vô định hình","B. khó tan hơn dạng vô định hình","C. tan chậm hơn dạng vô định hình","D. dễ tan hơn dạng vô định hình"],"correct":1,"explanation":"Đáp án đúng là: khó tan hơn dạng vô định hình Vì: độ tan của các chất","reference":"Mục 6.3"},{"id":213,"text":"Chất làm tăng độ tan của dược chất có thể dùng trong thuốc tiêm nào?","answers":["A. Các thuốc kháng sinh dạng viên","B. Các thuốc tiêm có dược chất ít tan trong nước","C. Các thuốc viên nén","D. Các thuốc dùng ngoài da"],"correct":1,"explanation":"Đáp án đúng là: Các thuốc tiêm có dược chất ít tan trong nước Vì: Thành phần thuốc tiêm","reference":"Mục 8.3"},{"id":214,"text":"Đối với bệnh súc bị suy tim, sự hấp thu thuốc tiêm sẽ ảnh hưởng đến sự hấp thu thuốc như nào?","answers":["A. Tăng lên vì cơ thể dễ dàng hấp thu thuốc hơn","B. Không thay đổi","C. Giảm xuống do giảm lưu lượng máu đến mô","D. Tăng lên do giảm lưu lượng máu"],"correct":2,"explanation":"Đáp án đúng là: Giảm xuống do giảm lưu lượng máu đến mô Vì: Đặc điểm các yếu tố ảnh hưởng đến sinh khả dụng của thuốc tiêm","reference":"Mục 10.4"},{"id":215,"text":"Mục đích của việc đóng thuốc vào viên nang là gì?","answers":["A. Kéo dài thời gian tác dụng, che dấu mùi vị khó chịu, bảo vệ dược chất","B. Giảm giá thành sản xuất thuốc","C. Làm cho thuốc dễ phân hủy bởi dịch vị","D. Giúp thuốc dễ tan trong nước hơn"],"correct":0,"explanation":"Đáp án đúng là: Kéo dài thời gian tác dụng, che dấu mùi vị khó chịu, bảo vệ dược chất Vì: Theo phân loại thuốc viên nang","reference":"Mục 15.1"},{"id":216,"text":"Acid bromhydric và muối tương kỵ với chất bảo quản nào sau đây?","answers":["A. hợp chất thuỷ ngân phenyl","B. Cetyl piridinium clorid","C. muối clohexidin","D. acid sorbic"],"correct":0,"explanation":"Đáp án đúng là: hợp chất thuỷ ngân phenyl Vì: Tương tác, tương kỵ giữa các chất bảo quản với dược chất và tá dược","reference":"Mục 5.3"},{"id":217,"text":"Dung môi nào không phải là dung môi phân cực?","answers":["A. Benzen","B. Ethanol","C. Nước","D. Glyxerin"],"correct":0,"explanation":"Đáp án đúng là: Benzen Vì: các loại dung môi","reference":"Mục 6.3"},{"id":218,"text":"Trong các đường đưa thuốc sau, đường nào thuốc có sinh khả dụng thấp nhất?","answers":["A. Tiêm bắp","B. Tiêm tĩnh mạch","C. Tiêm dưới da","D. Uống"],"correct":3,"explanation":"Đáp án đúng là: Uống Vì: Yếu tố sinh học ảnh hưởng đến SKD","reference":"Mục 3.2"},{"id":219,"text":"Giai đoạn nào trong phương pháp trộn đều đơn giản nhằm làm cho chế phẩm đồng nhất và mịn màng hơn?","answers":["A. Phối hợp mỡ đặc với tá dược","B. Làm mỡ đặc","C. Đóng gói","D. Cán hoặc làm đồng nhất"],"correct":3,"explanation":"Đáp án đúng là: Cán hoặc làm đồng nhất Vì: Theo quy trình điều chế thuốc mỡ bằng phương pháp trộn đều đơn giản","reference":"Mục 12.2"},{"id":220,"text":"Lợi ích của việc sử dụng tá dược dập thẳng là gì?","answers":["A. Giúp viên có màu sắc đẹp hơn","B. Tăng sinh khả dụng của thuốc","C. Giảm tốc độ phóng thích dược chất","D. Giảm số công đoạn sản xuất"],"correct":3,"explanation":"Đáp án đúng là: Giảm số công đoạn sản xuất Vì: Nguyên tắc lựa chọn tá dược xây dựng công thức dập viên","reference":"Mục 14.2"},{"id":221,"text":"Vỏ nang thường được làm từ chất gì?","answers":["A. Chitin","B. Gelatin","C. Tinh bột","D. Cellulose"],"correct":1,"explanation":"Đáp án đúng là: Gelatin Vì: Theo khái niệm thuốc nang","reference":"Mục 15.1"},{"id":222,"text":"Trong phương pháp trộn đều đơn giản, khi làm mỡ đặc, mục đích của giai đoạn này là gì?","answers":["A. Làm mịn dược chất và dễ dàng trộn đều với tá dược","B. Tạo nhũ tương mỡ","C. Làm bột mịn dược chất","D. Làm đông tá dược"],"correct":0,"explanation":"Đáp án đúng là: Làm mịn dược chất và dễ dàng trộn đều với tá dược Vì: Theo quy trình điều chế thuốc mỡ bằng phương pháp trộn đều đơn giản","reference":"Mục 12.2"},{"id":223,"text":"Các chất có tính kiềm tương kỵ với chất bảo quản nào sau đây?","answers":["A. acid sorbic","B. thiomersal","C. Benzakolium clorid","D. Cetyl piridinium clorid"],"correct":3,"explanation":"Đáp án đúng là: Cetyl piridinium clorid Vì: Tương tác, tương kỵ giữa các chất bảo quản với dược chất và tá dược","reference":"Mục 5.3"},{"id":224,"text":"Phương pháp nhỏ giọt có nhược điểm gì?","answers":["A. Không thể áp dụng ở quy mô công nghiệp","B. Sai số khối lượng lớn","C. Nang dễ bị rách","D. Nang khó bảo quản"],"correct":1,"explanation":"Đáp án đúng là: Sai số khối lượng lớn Vì: Theo phương pháp bào chế nang mềm gelatin","reference":"Mục 16.2"},{"id":225,"text":"Một trong những lợi ích quan trọng của viên nang là gì?","answers":["A. Dễ nghiên cứu công thức và triển khai sản xuất ở nhiều quy mô khác nhau","B. Chỉ có thể đóng thuốc bằng máy đóng nang tự độn","C. Viên nang cần máy móc đơn giản để sản xuất","D. Có thể đóng thuốc bằng máy đóng nang tự động"],"correct":0,"explanation":"Đáp án đúng là: Dễ nghiên cứu công thức và triển khai sản xuất ở nhiều quy mô khác nhau Vì: Theo ưu, nhược điểm của viên nén","reference":"Mục 15.2"},{"id":226,"text":"Vai trò của người dược sỹ trong sản xuất thuốc là gì?","answers":["A. Tổ chức các cuộc họp để bàn về công thức thuốc","B. Thiết kế dạng thuốc cho phù hợp với đối tượng điều trị","C. Sản xuất thuốc tại các bệnh viện","D. Quảng bá thuốc ra thị trường"],"correct":1,"explanation":"Đáp án đúng là: Thiết kế dạng thuốc cho phù hợp với đối tượng điều trị Vì: Theo vai trò của người dược sỹ Tham khảo:","reference":"mục 1.1"},{"id":227,"text":"Chọn đáp án sai về tính chất của Vitamin B1","answers":["A. tan trong nước","B. hút ẩm","C. bền vững trong môi trường kiềm","D. bền vững trong môi trường acid"],"correct":2,"explanation":"Đáp án đúng là: bền vững trong môi trường kiềm Vì: tính chất của vitamin B1","reference":"Mục 5.1"},{"id":228,"text":"Penicillin tinh khiết đã được sản xuất năm nào?","answers":["A. 1945","B. 1928","C. 1885","D. 1943"],"correct":3,"explanation":"Đáp án đúng là: 1943 Vì: năm 1943, một số công ty dược phẩm Hoa Kỳ đã sản xuất hàng loạt penicillin tinh khiết Tham khảo:","reference":"mục 1.2"},{"id":229,"text":"Nguyên tắc chung trong kỹ thuật pha chế vô trùng là gì?","answers":["A. tiệt khuẩn riêng lẻ từng thành phần tham gia trong pha chế và phải phân phối trong môi trường vô khuẩn được kiểm soát chặt chẽ","B. tiệt khuẩn trong môi trường có độ ẩm thấp","C. tiệt khuẩn trong môi trường có độ ẩm cao","D. tiệt khuẩn chung các thành phần thuốc"],"correct":0,"explanation":"Đáp án đúng là: tiệt khuẩn riêng lẻ từng thành phần tham gia trong pha chế và phải phân phối trong môi trường vô khuẩn được kiểm soát chặt chẽ Vì: Theo yêu cầu đảm bảo sự vô khuẩn của thuốc tiêm","reference":"Mục 9.3"},{"id":230,"text":"Khi cân và giữ nguyên liệu trong quá trình sản xuất thuốc tiêm, yêu cầu về môi trường sạch là gì?","answers":["A. Cấp độ A với môi trường xung quanh là cấp độ B","B. Cấp độ C với môi trường xung quanh là cấp độ D","C. Cấp độ B với môi trường xung quanh là cấp độ C","D. Cấp độ D với môi trường xung quanh là cấp độ A"],"correct":0,"explanation":"Đáp án đúng là: Cấp độ A với môi trường xung quanh là cấp độ B Vì: Theo yêu cầu về nhà xưởng sản xuất thuốc tiêm","reference":"Mục 9.1"},{"id":231,"text":"Vai trò của glycerin trong vỏ nang là gì?","answers":["A. Tạo màu cho vỏ nang","B. Giúp vỏ nang có độ bóng và dai","C. Làm tăng độ tan của vỏ nang trong nước","D. Là thành phần chính giúp vỏ nang đông đặc"],"correct":1,"explanation":"Đáp án đúng là: Giúp vỏ nang có độ bóng và dai Vì: Theo phương pháp bào chế nang tinh bột","reference":"Mục 16.1"},{"id":232,"text":"Chất hóa dẻo giúp vỏ nang mềm có đặc điểm gì?","answers":["A. Làm vỏ nang trong suốt","B. Tăng độ dẻo dai của vỏ nang","C. Rút ngắn thời gian bảo quản thuốc","D. Giúp nang dễ tan trong dạ dày"],"correct":1,"explanation":"Đáp án đúng là: Tăng độ dẻo dai của vỏ nang Vì: Theo phương pháp bào chế nang mềm gelatin","reference":"Mục 16.2"},{"id":233,"text":"Chế phẩm bào chế lưu hành trên thị trường với 1 tên thương mại do nhà sản xuất đặt ra và giữ bản quyền mẫu nhãn hàng hoá là gì?","answers":["A. Biệt dược","B. Chế phẩm đặc biệt","C. Thuốc đặc biệt quý","D. Thuốc đặc biệt"],"correct":0,"explanation":"Đáp án đúng là: Biệt dược Vì: Theo khái niệm biệt dược Tham khảo:","reference":"mục 1.3"},{"id":234,"text":"Trong phương pháp nhỏ giọt, quá trình hàn kín nang được thực hiện bằng cách nào?","answers":["A. Làm lạnh đột ngột bằng dầu parafin","B. Ép nhiệt","C. Dùng áp suất cao","D. Nhúng vào dung dịch gelatin nóng"],"correct":0,"explanation":"Đáp án đúng là: Làm lạnh đột ngột bằng dầu parafin Vì: Theo phương pháp bào chế nang mềm gelatin","reference":"Mục 16.2"},{"id":235,"text":"Mục đích của việc thêm các thành phần khác vào công thức thuốc tiêm là gì?","answers":["A. Đảm bảo chất lượng của thuốc tiêm trong quá trình sản xuất và bảo quản","B. Làm thuốc tiêm dễ bảo quản lâu dài","C. Tăng tốc độ tiêm thuốc","D. Tăng hiệu quả dược lý"],"correct":0,"explanation":"Đáp án đúng là: Đảm bảo chất lượng của thuốc tiêm trong quá trình sản xuất và bảo quản Vì: Các thành phần của thuốc tiêm","reference":"Mục 8.3"},{"id":236,"text":"Tại sao pH của thuốc tiêm cần được điều chỉnh?","answers":["A. Để tăng sinh khả dụng của thuốc","B. Để đảm bảo thuốc có màu sắc đẹp","C. Để làm thuốc tiêm dễ sử dụng","D. Để đảm bảo sự ổn định của dược chất trong thuốc tiêm"],"correct":3,"explanation":"Đáp án đúng là: Để đảm bảo sự ổn định của dược chất trong thuốc tiêm Vì: Các thành phần của thuốc tiêm","reference":"Mục 8.3"},{"id":237,"text":"Trong sản xuất thuốc tiêm truyền, phương pháp đóng thuốc được thực hiện bằng loại máy nào?","answers":["A. Máy khuấy tự động","B. Máy đóng dịch tự động hoặc bán tự động","C. Máy lọc tự động","D. Máy đong tự động"],"correct":1,"explanation":"Đáp án đúng là: Máy đóng dịch tự động hoặc bán tự động Vì: Theo yêu cầu về thiết bị, dụng cụ bào chế thuốc tiêm","reference":"Mục 9.2"},{"id":238,"text":"Trong phương pháp nhúng khuôn, dung dịch vỏ nang phải duy trì ở nhiệt độ bao nhiêu?","answers":["A. 40 - 50°C","B. 60 - 70°C","C. 80 - 90°C","D. 20 - 30°C"],"correct":0,"explanation":"Đáp án đúng là: 40 - 50°C Vì: Theo phương pháp bào chế nang mềm gelatin","reference":"Mục 16.2"},{"id":239,"text":"Tương kỵ hóa học do phản ứng thủy phân có thể gây điều gì?","answers":["A. Biến đổi màu sắc","B. Thay đổi cấu trúc phân tử dược chất","C. Tạo kết tủa không tan trong môi trường","D. Giảm nồng độ dược chất"],"correct":3,"explanation":"Đáp án đúng là: Giảm nồng độ dược chất Vì: biểu hiện của tương kỵ hóa học","reference":"Mục 5.2"},{"id":240,"text":"Khi đóng thuốc tiêm có nguy cơ cao ô nhiễm từ môi trường, quá trình đóng phải thực hiện trong môi trường sạch cấp độ nào?","answers":["A. Cấp độ D với môi trường xung quanh là cấp độ A","B. Cấp độ B với môi trường xung quanh là cấp độ C","C. Cấp độ A với môi trường xung quanh là cấp độ B","D. Cấp độ C với môi trường xung quanh là cấp độ D"],"correct":2,"explanation":"Đáp án đúng là: Cấp độ A với môi trường xung quanh là cấp độ B Vì: Theo yêu cầu về nhà xưởng sản xuất thuốc tiêm","reference":"Mục 9.1"},{"id":241,"text":"Hệ trị liệu qua da (TTS) có ưu điểm gì so với thuốc uống?","answers":["A. Không bị ảnh hưởng bởi pH dịch tiêu hóa và thức ăn trong dạ dày","B. Không gây tác dụng phụ","C. Luôn có tác dụng nhanh hơn thuốc uống","D. Có thể dùng cho mọi bệnh lý mà thuốc uống điều trị được"],"correct":0,"explanation":"Đáp án đúng là: Không bị ảnh hưởng bởi pH dịch tiêu hóa và thức ăn trong dạ dày Vì: Theo phân loại thuốc mỡ","reference":"Mục 11.2"},{"id":242,"text":"Dung dịch thuốc tiêm không đẳng trương có thể gây ra hiện tượng gì?","answers":["A. Giảm đau tại nơi tiêm","B. Làm thuốc tiêm có tác dụng lâu dài","C. Tăng khả năng hấp thu dược chất","D. Gây hoại tử mô tại chỗ tiêm"],"correct":3,"explanation":"Đáp án đúng là: Gây hoại tử mô tại chỗ tiêm Vì: Thành phần thuốc tiêm","reference":"Mục 8.3"},{"id":243,"text":"Thuỷ tinh là loại vật liệu bao bì thuốc tiêm vì lý do gì?","answers":["A. Dễ vỡ nhưng không ảnh hưởng đến chất lượng thuốc","B. Không chịu tác động của các dược chất","C. Chịu tác động của nhiệt độ và áp suất cao","D. Khó vỡ, có khả năng cản trở ánh sáng"],"correct":3,"explanation":"Đáp án đúng là: Khó vỡ, có khả năng cản trở ánh sáng Vì: Bao bì thuốc tiêm","reference":"Mục 8.4"},{"id":244,"text":"Biểu hiện chung của tương kỵ hoá học do phản ứng trao đổi và phản ứng kết hợp là gì?","answers":["A. dung dịch bị đổi màu","B. Dung dịch bị giảm nhiệt độ","C. dung dịch nóng lên","D. xuất hiện vẩn đục, kết tủa trong dung dịch thuốc"],"correct":3,"explanation":"Đáp án đúng là: xuất hiện vẩn đục, kết tủa trong dung dịch thuốc Vì: biểu hiện của tương kỵ hóa học","reference":"Mục 5.2"},{"id":245,"text":"Muối nào dễ gây tương kỵ khi phối hợp với các dược chất có tính kiềm yếu?","answers":["A. Sodium sulfate","B. Sodium bicarbonate","C. Calcium chloride","D. Sodium carbonate"],"correct":3,"explanation":"Đáp án đúng là: Sodium carbonate Vì: nguyên nhân của tương kỵ hóa học","reference":"Mục 5.2"},{"id":246,"text":"Bào chế là môn học nghiên cứu về gì?","answers":["A. Cách sử dụng thuốc trong điều trị","B. Cơ sở lý luận và kỹ thuật thực hành về pha chế, sản xuất các dạng thuốc","C. Quy trình sản xuất thuốc tại các bệnh viện","D. Quá trình thu thập và bảo quản dược liệu"],"correct":1,"explanation":"Đáp án đúng là: Cơ sở lý luận và kỹ thuật thực hành về pha chế, sản xuất các dạng thuốc Vì: Theo khái niệm về bào chế Tham khảo:","reference":"mục 1.1"},{"id":247,"text":"Mục tiêu chính của nghiên cứu xây dựng công thức viên nén là gì?","answers":["A. Xác định thời gian bảo quản viên nén","B. Đánh giá độ bền cơ học của viên nén","C. Xác định giá thành sản xuất","D. Lựa chọn loại và tỷ lệ tá dược, quy trình điều chế phù hợp"],"correct":3,"explanation":"Đáp án đúng là: Lựa chọn loại và tỷ lệ tá dược, quy trình điều chế phù hợp Vì: Nguyên tắc lựa chọn tá dược xây dựng công thức dập viên","reference":"Mục 14.2"},{"id":248,"text":"Hàm lượng nước trong dung dịch chế vỏ nang cứng khoảng bao nhiêu?","answers":["A. 40 - 50%","B. 10 - 20%","C. 30 - 40%","D. 20 - 30%"],"correct":2,"explanation":"Đáp án đúng là: 30 - 40% Vì: Theo phương pháp bào chế nang cứng gelatin","r
