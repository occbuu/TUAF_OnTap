<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ôn Tập - Kiểm nghiệm dược phẩm (125 câu)</title>
    <style>
      :root {
        --blue: #2563eb;
        --blue-dark: #1e40af;
        --blue-bg: #eff6ff;
        --green: #16a34a;
        --green-bg: #f0fdf4;
        --green-bd: #86efac;
        --yellow-bg: #fefce8;
        --yellow-bd: #fde047;
        --gray: #6b7280;
        --gray-lt: #f3f4f6;
        --border: #e5e7eb;
        --text: #111827;
        --radius: 12px;
        --shadow: 0 1px 4px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.06);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: #f1f5f9;
        color: var(--text);
        line-height: 1.65;
        font-size: 15px;
      }

      /* ── HEADER ── */
      .page-header {
        background: linear-gradient(
          135deg,
          var(--blue-dark) 0%,
          var(--blue) 100%
        );
        color: #fff;
        padding: 28px 20px 22px;
        text-align: center;
        position: relative;
      }
      .page-header h1 {
        font-size: clamp(1.1em, 4vw, 1.7em);
        font-weight: 700;
        margin-bottom: 5px;
      }
      .page-header p {
        opacity: 0.85;
        font-size: 0.88em;
      }
      .back-btn {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255, 255, 255, 0.18);
        border: 1.5px solid rgba(255, 255, 255, 0.35);
        color: #fff;
        padding: 6px 13px;
        border-radius: 7px;
        text-decoration: none;
        font-size: 0.82em;
        font-weight: 600;
        white-space: nowrap;
        transition: background 0.15s;
        line-height: 1.4;
      }
      .back-btn:hover {
        background: rgba(255, 255, 255, 0.3);
      }
      @media (max-width: 480px) {
        .back-btn {
          position: static;
          transform: none;
          display: inline-block;
          margin-bottom: 10px;
          font-size: 0.8em;
        }
        .page-header {
          padding-top: 16px;
        }
      }

      /* ── SEARCH BAR ── */
      .search-wrap {
        position: sticky;
        top: 0;
        z-index: 100;
        background: #fff;
        border-bottom: 1px solid var(--border);
        padding: 10px 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .search-inner {
        max-width: 860px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .search-box {
        flex: 1;
        position: relative;
      }
      .search-box input {
        width: 100%;
        padding: 9px 36px 9px 38px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-size: 0.95em;
        outline: none;
        background: var(--gray-lt);
        transition:
          border-color 0.15s,
          background 0.15s;
        -webkit-appearance: none;
      }
      .search-box input:focus {
        border-color: var(--blue);
        background: #fff;
      }
      .search-icon {
        position: absolute;
        left: 11px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--gray);
        pointer-events: none;
        font-size: 1em;
      }
      .search-clear {
        position: absolute;
        right: 9px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: var(--gray);
        font-size: 1.1em;
        padding: 2px 4px;
        display: none;
        line-height: 1;
        border-radius: 50%;
      }
      .search-clear:hover {
        color: #111;
        background: var(--gray-lt);
      }
      .search-count {
        white-space: nowrap;
        font-size: 0.88em;
        color: var(--gray);
        min-width: 90px;
        text-align: right;
      }
      .search-count strong {
        color: var(--blue-dark);
      }

      /* ── CONTAINER ── */
      .container {
        max-width: 860px;
        margin: 18px auto;
        padding: 0 14px 80px;
      }

      /* ── QUESTION CARD ── */
      .question-block {
        background: #fff;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        margin-bottom: 16px;
        border-left: 4px solid var(--blue);
        overflow: hidden;
        transition: box-shadow 0.15s;
      }
      .question-block:hover {
        box-shadow:
          0 2px 8px rgba(0, 0, 0, 0.12),
          0 6px 20px rgba(0, 0, 0, 0.08);
      }

      .question-header {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--blue-bg);
        padding: 8px 14px;
        border-bottom: 1px solid #dbeafe;
      }
      .q-badge {
        background: var(--blue);
        color: #fff;
        border-radius: 20px;
        padding: 1px 9px;
        font-size: 0.78em;
        font-weight: 700;
        letter-spacing: 0.3px;
      }

      .question-text {
        padding: 14px 16px 8px;
        font-size: 1em;
        font-weight: 500;
        color: #1e293b;
      }
      .question-text mark {
        background: #fef08a;
        color: inherit;
        border-radius: 3px;
        padding: 0 2px;
      }

      /* ── ANSWERS ── */
      .answers {
        padding: 4px 16px 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .answer-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 8px 12px;
        border-radius: 8px;
        border: 1.5px solid var(--border);
        background: var(--gray-lt);
      }
      .answer-item.correct {
        background: var(--green-bg);
        border-color: var(--green-bd);
        font-weight: 600;
      }
      .answer-letter {
        font-weight: 700;
        font-size: 0.9em;
        width: 22px;
        flex-shrink: 0;
        padding-top: 1px;
        color: var(--gray);
      }
      .answer-item.correct .answer-letter {
        color: var(--green);
      }
      .answer-text {
        flex: 1;
        color: #374151;
        font-size: 0.95em;
      }
      .answer-item.correct .answer-text {
        color: #14532d;
      }
      .answer-text mark {
        background: #bbf7d0;
        color: inherit;
        border-radius: 3px;
        padding: 0 2px;
      }
      .check-mark {
        flex-shrink: 0;
        margin-left: auto;
        padding-left: 6px;
        color: var(--green);
        font-weight: 700;
      }

      /* ── FEEDBACK ── */
      .feedback-section {
        background: var(--yellow-bg);
        border-top: 1.5px solid var(--yellow-bd);
        padding: 10px 16px;
        font-size: 0.875em;
        color: #44403c;
      }
      .feedback-section p {
        margin: 3px 0;
      }
      .feedback-section strong {
        color: #1c1917;
      }

      /* ── EMPTY STATE ── */
      #noResults {
        display: none;
        text-align: center;
        padding: 60px 20px;
        color: var(--gray);
      }
      #noResults .nr-icon {
        font-size: 2.5em;
        margin-bottom: 12px;
      }
      #noResults p {
        font-size: 0.95em;
      }

      /* ── SCROLL TOP ── */
      #scrollTopBtn {
        position: fixed;
        bottom: 20px;
        right: 16px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--blue);
        color: #fff;
        border: none;
        font-size: 1.3em;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        box-shadow: 0 3px 10px rgba(37, 99, 235, 0.4);
        transition:
          background 0.15s,
          transform 0.15s;
        z-index: 200;
        text-decoration: none;
        line-height: 44px;
        text-align: center;
      }
      #scrollTopBtn:hover {
        background: var(--blue-dark);
        transform: translateY(-2px);
      }

      /* ── MOBILE ── */
      @media (max-width: 600px) {
        body {
          font-size: 14px;
        }
        .page-header {
          padding: 18px 14px 14px;
        }
        .container {
          margin: 12px auto;
          padding: 0 10px 80px;
        }
        .question-text {
          padding: 12px 12px 6px;
        }
        .answers {
          padding: 4px 12px 10px;
          gap: 5px;
        }
        .answer-item {
          padding: 7px 10px;
        }
        .feedback-section {
          padding: 9px 12px;
        }
        .search-count {
          display: none;
        }
      }
    </style>
  </head>

    <div class="page-header">

        <div class="search-count" id="searchCount">

    <script>
      (function () {
        var LETTERS = "ABCDEFGHIJ";
        F;
        var container = document.getElementById("questionContainer");
        var noResults = document.getElementById("noResults");
        var searchInput = document.getElementById("searchInput");
        var searchClear = document.getElementById("searchClear");
        var countEl = document.getElementById("searchCount");
        var total = QUESTIONS.length;

        /* ── Escape HTML ── */
        function esc(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        /* ── Highlight từ khóa ── */
        function highlight(text, term) {
          if (!term) return esc(text);
          var safe = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          return esc(text).replace(
            new RegExp("(" + safe.replace(/&amp;/g, "&amp;amp;") + ")", "gi"),
            "<mark>$1</mark>",
          );
        }

        /* ── Render 1 câu hỏi ── */
        function renderQ(q, term) {
          var answersHtml = q.answers
            .map(function (ans, i) {
              var isCorrect = i === q.correct;
              var cls = "answer-item" + (isCorrect ? " correct" : "");
              var check = isCorrect
                ? '<span class="check-mark">&#10003;</span>'
                : "";
              return (
                '<div class="' +
                cls +
                '">' +
                '<span class="answer-letter">' +
                (LETTERS[i] || i + 1) +
                ".</span>" +
                '<span class="answer-text">' +
                highlight(ans, term) +
                "</span>" +
                check +
                "</div>"
              );
            })
            .join("");

          var feedbackHtml = "";
          if (q.explanation || q.reference) {
            feedbackHtml =
              '<div class="feedback-section">' +
              (q.explanation
                ? "<p><strong>Vì: </strong>" + esc(q.explanation) + "</p>"
                : "") +
              (q.reference
                ? "<p><strong>Tham khảo: </strong>" + esc(q.reference) + "</p>"
                : "") +
              "</div>";
          }

          return (
            '<div class="question-block" id="q' +
            q.id +
            '">' +
            '<div class="question-header">' +
            '<span class="q-badge">Câu ' +
            q.id +
            "</span>" +
            "</div>" +
            '<div class="question-text">' +
            highlight(q.text, term) +
            "</div>" +
            '<div class="answers">' +
            answersHtml +
            "</div>" +
            feedbackHtml +
            "</div>"
          );
        }

        /* ── Render danh sách câu hỏi ── */
        function renderList(filtered, term) {
          // Xóa các block cũ (giữ lại #noResults)
          var old = container.querySelectorAll(".question-block");
          old.forEach(function (el) {
            el.remove();
          });

          if (filtered.length === 0) {
            noResults.style.display = "block";
          } else {
            noResults.style.display = "none";
            var frag = document.createDocumentFragment();
            filtered.forEach(function (q) {
              var div = document.createElement("div");
              div.innerHTML = renderQ(q, term);
              frag.appendChild(div.firstChild);
            });
            container.appendChild(frag);
          }

          countEl.innerHTML =
            "<strong>" + filtered.length + "</strong> / " + total + " câu";
        }

        /* ── Lọc câu hỏi ── */
        function doSearch(term) {
          var t = term.trim().toLowerCase();
          var filtered = t
            ? QUESTIONS.filter(function (q) {
                return (
                  q.text.toLowerCase().includes(t) ||
                  q.answers.some(function (a) {
                    return a.toLowerCase().includes(t);
                  })
                );
              })
            : QUESTIONS;

          searchClear.style.display = term ? "block" : "none";
          renderList(filtered, term.trim());
        }

        /* ── Khởi tạo ── */
        renderList(QUESTIONS, "");

        searchInput.addEventListener("input", function () {
          doSearch(this.value);
        });
        searchClear.addEventListener("click", function () {
          searchInput.value = "";
          doSearch("");
          searchInput.focus();
        });

        /* ── Scroll to top ── */
        var scrollBtn = document.getElementById("scrollTopBtn");
        window.addEventListener(
          "scroll",
          function () {
            scrollBtn.style.display = window.scrollY > 320 ? "flex" : "none";
          },
          { passive: true },
        );
        scrollBtn.addEventListener("click", function (e) {
          e.preventDefault();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      })();
    </script>
