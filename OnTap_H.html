<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn Tập - Kỹ Thuật Bào Chế Sinh Dược Học (50 câu)</title>
<style>
:root {
  --blue:      #2563eb;
  --blue-dark: #1e40af;
  --blue-bg:   #eff6ff;
  --green:     #16a34a;
  --green-bg:  #f0fdf4;
  --green-bd:  #86efac;
  --yellow-bg: #fefce8;
  --yellow-bd: #fde047;
  --gray:      #6b7280;
  --gray-lt:   #f3f4f6;
  --border:    #e5e7eb;
  --text:      #111827;
  --radius:    12px;
  --shadow:    0 1px 4px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f1f5f9; color: var(--text);
  line-height: 1.65; font-size: 15px;
}

/* ── HEADER ── */
.page-header {
  background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 100%);
  color: #fff; padding: 28px 20px 22px; text-align: center;
  position: relative;
}
.page-header h1 { font-size: clamp(1.1em, 4vw, 1.7em); font-weight: 700; margin-bottom: 5px; }
.page-header p  { opacity: .85; font-size: .88em; }
.back-btn {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,.18); border: 1.5px solid rgba(255,255,255,.35);
  color: #fff; padding: 6px 13px; border-radius: 7px;
  text-decoration: none; font-size: .82em; font-weight: 600;
  white-space: nowrap; transition: background .15s; line-height: 1.4;
}
.back-btn:hover { background: rgba(255,255,255,.3); }
@media (max-width: 480px) {
  .back-btn { position: static; transform: none; display: inline-block;
              margin-bottom: 10px; font-size: .8em; }
  .page-header { padding-top: 16px; }
}

/* ── SEARCH BAR ── */
.search-wrap {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
.search-inner {
  max-width: 860px; margin: 0 auto;
  display: flex; align-items: center; gap: 10px;
}
.search-box { flex: 1; position: relative; }
.search-box input {
  width: 100%; padding: 9px 36px 9px 38px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: .95em; outline: none; background: var(--gray-lt);
  transition: border-color .15s, background .15s;
  -webkit-appearance: none;
}
.search-box input:focus { border-color: var(--blue); background: #fff; }
.search-icon {
  position: absolute; left: 11px; top: 50%;
  transform: translateY(-50%); color: var(--gray);
  pointer-events: none; font-size: 1em;
}
.search-clear {
  position: absolute; right: 9px; top: 50%;
  transform: translateY(-50%); background: none; border: none;
  cursor: pointer; color: var(--gray); font-size: 1.1em;
  padding: 2px 4px; display: none; line-height: 1; border-radius: 50%;
}
.search-clear:hover { color: #111; background: var(--gray-lt); }
.search-count {
  white-space: nowrap; font-size: .88em; color: var(--gray);
  min-width: 90px; text-align: right;
}
.search-count strong { color: var(--blue-dark); }

/* ── CONTAINER ── */
.container {
  max-width: 860px; margin: 18px auto;
  padding: 0 14px 80px;
}

/* ── QUESTION CARD ── */
.question-block {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 16px;
  border-left: 4px solid var(--blue);
  overflow: hidden;
  transition: box-shadow .15s;
}
.question-block:hover {
  box-shadow: 0 2px 8px rgba(0,0,0,.12), 0 6px 20px rgba(0,0,0,.08);
}

.question-header {
  display: flex; align-items: center; gap: 8px;
  background: var(--blue-bg); padding: 8px 14px;
  border-bottom: 1px solid #dbeafe;
}
.q-badge {
  background: var(--blue); color: #fff;
  border-radius: 20px; padding: 1px 9px;
  font-size: .78em; font-weight: 700; letter-spacing: .3px;
}

.question-text {
  padding: 14px 16px 8px;
  font-size: 1em; font-weight: 500; color: #1e293b;
}
.question-text mark {
  background: #fef08a; color: inherit;
  border-radius: 3px; padding: 0 2px;
}

/* ── ANSWERS ── */
.answers {
  padding: 4px 16px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.answer-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 12px; border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--gray-lt);
}
.answer-item.correct {
  background: var(--green-bg);
  border-color: var(--green-bd);
  font-weight: 600;
}
.answer-letter {
  font-weight: 700; font-size: .9em;
  width: 22px; flex-shrink: 0; padding-top: 1px; color: var(--gray);
}
.answer-item.correct .answer-letter { color: var(--green); }
.answer-text {
  flex: 1; color: #374151; font-size: .95em;
}
.answer-item.correct .answer-text { color: #14532d; }
.answer-text mark {
  background: #bbf7d0; color: inherit;
  border-radius: 3px; padding: 0 2px;
}
.check-mark {
  flex-shrink: 0; margin-left: auto; padding-left: 6px;
  color: var(--green); font-weight: 700;
}

/* ── FEEDBACK ── */
.feedback-section {
  background: var(--yellow-bg);
  border-top: 1.5px solid var(--yellow-bd);
  padding: 10px 16px; font-size: .875em; color: #44403c;
}
.feedback-section p { margin: 3px 0; }
.feedback-section strong { color: #1c1917; }

/* ── EMPTY STATE ── */
#noResults {
  display: none; text-align: center;
  padding: 60px 20px; color: var(--gray);
}
#noResults .nr-icon { font-size: 2.5em; margin-bottom: 12px; }
#noResults p { font-size: .95em; }

/* ── SCROLL TOP ── */
#scrollTopBtn {
  position: fixed; bottom: 20px; right: 16px;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--blue); color: #fff; border: none;
  font-size: 1.3em; cursor: pointer; display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 3px 10px rgba(37,99,235,.4);
  transition: background .15s, transform .15s;
  z-index: 200; text-decoration: none;
  line-height: 44px; text-align: center;
}
#scrollTopBtn:hover { background: var(--blue-dark); transform: translateY(-2px); }

/* ── MOBILE ── */
@media (max-width: 600px) {
  body { font-size: 14px; }
  .page-header { padding: 18px 14px 14px; }
  .container { margin: 12px auto; padding: 0 10px 80px; }
  .question-text { padding: 12px 12px 6px; }
  .answers { padding: 4px 12px 10px; gap: 5px; }
  .answer-item { padding: 7px 10px; }
  .feedback-section { padding: 9px 12px; }
  .search-count { display: none; }
}
</style>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-btn">&#8592; Trang ch&#7911;</a>
  <h1>Ôn Tập Kỹ Thuật Bào Chế Sinh Dược Học</h1>
  <p>Câu hỏi trắc nghiệm có đáp án &mdash; Nguồn: LT_H01 – LT_H02</p>
</div>

<div class="search-wrap">
  <div class="search-inner">
    <div class="search-box">
      <span class="search-icon">&#128269;</span>
      <input type="search" id="searchInput"
             placeholder="Tìm câu hỏi hoặc đáp án..." autocomplete="off">
      <button class="search-clear" id="searchClear" title="Xóa">&#10005;</button>
    </div>
    <div class="search-count" id="searchCount">
      <strong>50</strong> / 50 câu
    </div>
  </div>
</div>

<div class="container" id="questionContainer">
  <div id="noResults">
    <div class="nr-icon">&#128269;</div>
    <p>Không tìm thấy câu hỏi phù hợp.</p>
  </div>
</div>

<script>
const QUESTIONS = [{"id":1,"text":"Động vật dùng trong thí nghiệm phải đáp ứng yêu cầu gì?","answers":["A. Có độ tuổi lớn, không có thai","B. Có khả năng sinh sản tốt","C. Đồng đều về nòi giống, khoẻ mạnh, không nhiễm bệnh","D. Được nuôi dưỡng trong môi trường tự nhiên"],"correct":2,"explanation":"Đáp án đúng là: Đồng đều về nòi giống, khoẻ mạnh, không nhiễm bệnh Vì: Động vật thí nghiệm cần đồng đều về nòi giống, khoẻ mạnh, không nhiễm bệnh, và không có thai để đảm bảo độ chính xác của phép thử.","reference":"Mục 5.2"},{"id":2,"text":"Xu hướng thay thế và giảm thiểu thử nghiệm trên động vật là gì?","answers":["A. 2D: Design, Development","B. 4M: Monitor, Model, Measure, Manage","C. 3R: Replacement, Reduction, Refinement","D. 1P: Prediction"],"correct":2,"explanation":"Đáp án đúng là: 3R: Replacement, Reduction, Refinement Vì: Xu hướng \"3R\" (Replacement, Reduction, Refinement) nhằm giảm thiểu và thay thế thử nghiệm trên động vật trong kiểm nghiệm dược phẩm.","reference":"Mục 5.2"},{"id":3,"text":"Môi trường nào thường được dùng để thử vô trùng trong kiểm nghiệm thuốc?","answers":["A. Môi trường Canh thang cao thịt","B. Môi trường Thioglycolat lỏng và Casein đậu tương lỏng","C. Môi trường Sabouraud đặc","D. Môi trường thạch thông thường"],"correct":1,"explanation":"Đáp án đúng là: Môi trường Thioglycolat lỏng và Casein đậu tương lỏng Vì: Môi trường Thioglycolat lỏng và Casein đậu tương lỏng thường được dùng để thử vi khuẩn và vi nấm trong kiểm nghiệm thuốc.","reference":"Mục 5.3"},{"id":4,"text":"Chất chuẩn trong phương pháp sinh học có vai trò gì?","answers":["A. Đánh giá chất lượng chất thử","B. Cải thiện độ bền của thuốc","C. Tăng cường tác dụng của thuốc thử","D. Giảm độ độc tính của thuốc"],"correct":0,"explanation":"Đáp án đúng là: Đánh giá chất lượng chất thử Vì: Kết quả thử nghiệm sinh học được đánh giá bằng toán thống kê để đảm bảo độ chính xác, vì thử nghiệm có thể phụ thuộc vào nhiều yếu tố không ổn định.","reference":"Mục 5.1"},{"id":5,"text":"Phương pháp nuôi cấy trực tiếp trong thử vô trùng có ưu điểm gì?","answers":["A. Phát hiện chính xác ngay cả khi vi sinh vật ít","B. Dễ dàng phát hiện vi sinh vật trong mẫu","C. Kiểm tra hiệu quả với mẫu có tác dụng ức chế","D. Kỹ thuật đơn giản"],"correct":3,"explanation":"Đáp án đúng là: Kỹ thuật đơn giản Vì: Phương pháp nuôi cấy trực tiếp có kỹ thuật đơn giản, nhưng có thể khó phát hiện vi sinh vật khi số lượng ít.","reference":"Mục 5.3"},{"id":6,"text":"Chất chuẩn thứ cấp khác gì với chất chuẩn gốc?","answers":["A. Có độ tinh khiết thấp, không có hoạt tính sinh học","B. Có độ tinh khiết cao, hoạt tính sinh học xác định theo chất chuẩn gốc","C. Là chất có nguồn gốc tự nhiên, không qua xử lý","D. Là chất chuẩn không có hoạt tính sinh học"],"correct":1,"explanation":"Đáp án đúng là: Có độ tinh khiết cao, hoạt tính sinh học xác định theo chất chuẩn gốc Vì: Chất chuẩn phải được bảo quản trong các ống thủy tinh, ở nhiệt độ dưới 5°C, trong điều kiện khô, tránh ánh sáng để duy trì tính chính xác.","reference":"Mục 5.1"},{"id":7,"text":"Mục đích của thử nghiệm xác định hiệu lực của vaccin là gì?","answers":["A. Kiểm tra tác dụng phụ của vaccin","B. Đo lường khả năng tạo miễn dịch hoặc trung hòa độc tố","C. Đánh giá mức độ ổn định của vaccin","D. Xác định liều lượng vaccin"],"correct":1,"explanation":"Đáp án đúng là: Đo lường khả năng tạo miễn dịch hoặc trung hòa độc tố Vì: Thử nghiệm hiệu lực vaccin đo lường khả năng tạo miễn dịch hoặc khả năng trung hòa độc tố của vaccin.","reference":"Mục 5.2"},{"id":8,"text":"Mục đích của thử nghiệm chất hạ huyết áp là gì?","answers":["A. Phát hiện chất gây sốt trong thuốc","B. Đo sự tương tác của thuốc với máu","C. Kiểm tra sự thay đổi huyết áp sau khi ăn","D. Đánh giá tác dụng làm giảm huyết áp của thuốc"],"correct":3,"explanation":"Đáp án đúng là: Đánh giá tác dụng làm giảm huyết áp của thuốc Vì: Thử nghiệm chất hạ huyết áp giúp đánh giá tác dụng của thuốc trong việc làm giảm huyết áp, đặc biệt trong điều trị tăng huyết áp.","reference":"Mục 5.2"},{"id":9,"text":"Khi nuôi cấy mẫu trong môi trường thạch Sabouraud, nhiệt độ ủ thích hợp cho vi nấm là gì?","answers":["A. 25 - 28°C","B. 30 - 35°C","C. 20 - 25°C","D. 35 - 40°C"],"correct":0,"explanation":"Đáp án đúng là: 25 - 28°C Vì: Nhiệt độ ủ thích hợp cho vi nấm trong môi trường thạch Sabouraud là 25 - 28°C.","reference":"Mục 5.3"},{"id":10,"text":"Nguyên tắc của phương pháp thử vô trùng dựa trên yếu tố nào?","answers":["A. Vi sinh vật chỉ phát triển trong môi trường khô","B. Vi sinh vật không thể phát triển khi thiếu oxygen","C. Vi sinh vật phát triển trên môi trường dinh dưỡng, làm đục môi trường","D. Môi trường cần giữ nhiệt độ ổn định"],"correct":2,"explanation":"Đáp án đúng là: Vi sinh vật phát triển trên môi trường dinh dưỡng, làm đục môi trường Vì: Nguyên tắc thử vô trùng là vi sinh vật có trong chế phẩm sẽ phát triển trên môi trường dinh dưỡng, làm đục môi trường lỏng.","reference":"Mục 5.3"},{"id":11,"text":"Ưu điểm chính của việc sử dụng động vật trong kiểm nghiệm thuốc là gì?","answers":["A. Giảm thiểu chi phí và thời gian thử nghiệm","B. Cải thiện kết quả thử nghiệm trong ống nghiệm","C. Tăng khả năng kiểm tra các phản ứng bất lợi","D. Cung cấp dữ liệu an toàn và hiệu quả trên sinh vật sống"],"correct":3,"explanation":"Đáp án đúng là: Cung cấp dữ liệu an toàn và hiệu quả trên sinh vật sống Vì: Sử dụng động vật trong kiểm nghiệm thuốc giúp cung cấp dữ liệu an toàn và hiệu quả trên sinh vật sống có cơ chế sinh lý tương tự người.","reference":"Mục 5.2"},{"id":12,"text":"Mục đích của thử vô trùng trong kiểm nghiệm thuốc là gì?","answers":["A. Kiểm tra chất lượng dược liệu","B. Đánh giá độ ổn định của chế phẩm thuốc","C. Xác định tính năng bảo quản của thuốc","D. Phát hiện sự có mặt của vi khuẩn, vi nấm trong các chế phẩm cần vô trùng"],"correct":3,"explanation":"Đáp án đúng là: Phát hiện sự có mặt của vi khuẩn, vi nấm trong các chế phẩm cần vô trùng Vì: Thử vô trùng nhằm mục đích phát hiện sự có mặt của vi khuẩn, vi nấm trong các chế phẩm cần vô trùng.","reference":"Mục 5.3"},{"id":13,"text":"Thử nghiệm chất gây sốt nhằm mục đích gì?","answers":["A. Phát hiện sự hiện diện của chất gây sốt trong thuốc tiêm","B. Xác định mức độ an toàn của thuốc tiêm","C. Đo nhiệt độ cơ thể của động vật thí nghiệm","D. Kiểm tra sự tác dụng của thuốc trong điều trị sốt"],"correct":0,"explanation":"Đáp án đúng là: Phát hiện sự hiện diện của chất gây sốt trong thuốc tiêm Vì: Mục đích của thử nghiệm chất gây sốt là phát hiện sự có mặt của chất gây sốt trong thuốc tiêm.","reference":"Mục 5.2"},{"id":14,"text":"Thử nghiệm in vitro khác với in vivo ở điểm nào?","answers":["A. In vitro chỉ dùng cho thuốc tiêm truyền","B. In vitro là thử nghiệm trên cơ thể động vật sống","C. Thử nghiệm in vitro thực hiện trên cơ quan cô lập, hoặc điều kiện mô phỏng","D. Thử nghiệm in vivo không cần động vật"],"correct":2,"explanation":"Đáp án đúng là: Thử nghiệm in vitro thực hiện trên cơ quan cô lập Vì: Thử nghiệm in vitro được thực hiện trên cơ quan cô lập của động vật, trong khi in vivo thực hiện trên cơ thể động vật sống.","reference":"Mục 5.2"},{"id":15,"text":"Phương pháp sinh học thường được sử dụng để kiểm tra đặc tính nào của dược phẩm?","answers":["A. Độ mài mòn của viên thuốc","B. Hoạt tính sinh học của thuốc","C. Tính an toàn về mặt vật lý","D. Thành phần hóa học của thuốc"],"correct":1,"explanation":"Đáp án đúng là: Hoạt tính sinh học của thuốc Vì: Chất chuẩn gốc có độ tinh khiết cao và thường được làm tại các viện nghiên cứu quốc gia hoặc quốc tế chuyên về chất chuẩn sinh học.","reference":"Mục 5.1"},{"id":16,"text":"Phép thử độc tính bất thường giúp xác định gì?","answers":["A. Độ an toàn lâu dài của thuốc","B. Khả năng gây dị ứng của thuốc","C. Hiệu quả của thuốc trong điều trị bệnh","D. Mức độ độc cấp tính của thuốc"],"correct":3,"explanation":"Đáp án đúng là: Mức độ độc cấp tính của thuốc Vì: Thử độc tính bất thường giúp xác định mức độ độc cấp tính của thuốc khi sử dụng liều cao.","reference":"Mục 5.2"},{"id":17,"text":"Phương pháp nào dưới đây có thể được sử dụng để thử vô trùng?","answers":["A. Phương pháp tách ly tâm","B. Phương pháp ủ nhiệt độ cao","C. Phương pháp lọc qua màng lọc","D. Phương pháp chiếu xạ"],"correct":2,"explanation":"Đáp án đúng là: Phương pháp lọc qua màng lọc Vì: Phương pháp lọc qua màng lọc được sử dụng để thử vô trùng, đặc biệt với thuốc kháng sinh.","reference":"Mục 5.3"},{"id":18,"text":"Phương pháp kiểm nghiệm thuốc trên động vật dựa trên yếu tố nào?","answers":["A. Sự tương thích của thuốc với các hóa chất khác","B. Môi trường thí nghiệm và thiết bị","C. Thành phần hóa học của thuốc thử","D. Sự đáp ứng của động vật thí nghiệm với chế phẩm"],"correct":3,"explanation":"Đáp án đúng là: Sự đáp ứng của động vật thí nghiệm với chế phẩm Vì: Kiểm nghiệm thuốc trên động vật dựa trên phản ứng của động vật đối với thuốc thử để đánh giá chất lượng của chế phẩm.","reference":"Mục 5.2"},{"id":19,"text":"Nguyên tắc của phương pháp sinh học trong kiểm nghiệm thuốc là gì?","answers":["A. So sánh hiệu lực tác dụng của chất thử với chất chuẩn trong điều kiện thí nghiệm giống nhau","B. Đo lường độ hòa tan của thuốc trong môi trường nước","C. Phân tích thành phần hóa học của thuốc","D. Đo độ cứng của viên thuốc"],"correct":0,"explanation":"Đáp án đúng là: So sánh hiệu lực tác dụng của chất thử với chất chuẩn trong điều kiện thí nghiệm giống nhau Vì: Chất chuẩn trong thử nghiệm sinh học giúp đánh giá chất lượng của chất thử bằng cách so sánh với chất chuẩn trong cùng điều kiện thí nghiệm.","reference":"Mục 5.1"},{"id":20,"text":"Định lượng các hormon được sử dụng để làm gì trong kiểm nghiệm thuốc?","answers":["A. Phát hiện tác dụng phụ của thuốc","B. Đo độ ổn định của thuốc","C. Xác định hàm lượng hoạt chất sinh học trong chế phẩm","D. Kiểm tra tính an toàn của thuốc"],"correct":2,"explanation":"Đáp án đúng là: Xác định hàm lượng hoạt chất sinh học trong chế phẩm Vì: Thử nghiệm định lượng hormon giúp xác định chính xác hàm lượng hoạt chất sinh học trong các chế phẩm hormon.","reference":"Mục 5.2"},{"id":21,"text":"Đặc điểm nào dưới đây của màng lọc được sử dụng trong phương pháp lọc qua màng lọc?","answers":["A. Màng lọc có thể thấm dung dịch nước nóng","B. Lỗ màng lọc có đường kính > 0,45µm","C. Lỗ màng lọc có đường kính ≤ 0,45µm","D. Màng lọc không cần tiệt trùng"],"correct":2,"explanation":"Đáp án đúng là: Lỗ màng lọc có đường kính ≤ 0,45µm Vì: Lỗ màng lọc trong phương pháp lọc qua màng lọc có đường kính ≤ 0,45µm để giữ lại vi sinh vật.","reference":"Mục 5.3"},{"id":22,"text":"Khi lấy mẫu thử cho thử vô trùng, số lượng đơn vị lấy mẫu sẽ như thế nào?","answers":["A. Lấy 3 đơn vị nếu lô thuốc có ít hơn 100 đơn vị","B. Lấy 5 đơn vị cho bất kỳ lô thuốc nào","C. Lấy 10 đơn vị nếu lô thuốc có hơn 200 đơn vị","D. Lấy tất cả các đơn vị trong lô thuốc"],"correct":0,"explanation":"Đáp án đúng là: Lấy 3 đơn vị nếu lô thuốc có ít hơn 100 đơn vị Vì: Khi một lô có ít hơn 100 đơn vị, lấy 3 đơn vị để kiểm nghiệm.","reference":"Mục 5.3"},{"id":23,"text":"Thử in vivo được thực hiện trên loại gì?","answers":["A. Môi trường ống nghiệm","B. Các cơ quan cô lập của động vật","C. Các mô tế bào ngoài cơ thể","D. Cơ thể động vật sống"],"correct":3,"explanation":"Đáp án đúng là: Cơ thể động vật sống Vì: Thử in vivo là thử nghiệm trên cơ thể động vật sống để đánh giá tác dụng của thuốc.","reference":"Mục 5.2"},{"id":24,"text":"Thử nghiệm tính an toàn của vaccin giúp làm gì?","answers":["A. Kiểm tra hiệu quả của vaccin","B. Xác định tác dụng phụ của vaccin","C. Đo lường liều lượng vaccin","D. Đảm bảo vaccin không gây phản ứng có hại nghiêm trọng"],"correct":3,"explanation":"Đáp án đúng là: Đảm bảo vaccin không gây phản ứng có hại nghiêm trọng Vì: Mục đích thử nghiệm tính an toàn của vaccin là đảm bảo rằng vaccin không gây phản ứng có hại nghiêm trọng đối với cơ thể sống.","reference":"Mục 5.2"},{"id":25,"text":"Phương pháp sinh học trong kiểm nghiệm thuốc được áp dụng để đánh giá đặc tính nào?","answers":["A. Thành phần hóa học của thuốc","B. Đặc tính vật lý của thuốc","C. Độ hòa tan của thuốc","D. Hoạt lực tác dụng của chất kháng sinh"],"correct":3,"explanation":"Đáp án đúng là: Hoạt lực tác dụng của chất kháng sinh Vì: Phương pháp sinh học chủ yếu dùng để xác định các đặc tính sinh học như hoạt lực tác dụng của chất kháng sinh, sự vô trùng, độc tính, hiệu lực và tính an toàn của vaccine.","reference":"Mục 5.1"},{"id":26,"text":"Phương pháp đo pH nào được dùng trong kiểm nghiệm chính thức?","answers":["A. Dùng máy đo pH (pH meter)","B. Quan sát bằng mắt thường","C. Đo bằng nhiệt kế điện tử","D. Dùng giấy quỳ tím"],"correct":0,"explanation":"Đáp án đúng là: Dùng máy đo pH (pH meter) Vì: Máy đo pH cho kết quả chính xác, được sử dụng trong kiểm nghiệm chính thức.","reference":"Mục 6.4"},{"id":27,"text":"Mục đích chính của việc kiểm tra độ nhiễm khuẩn trong dung dịch thuốc thú y là gì?","answers":["A. Giảm chi phí sản xuất","B. Làm tăng tác dụng của thuốc","C. Đảm bảo an toàn cho vật nuôi và hiệu quả điều trị","D. Tăng tốc độ hấp thu thuốc"],"correct":2,"explanation":"Đáp án đúng là: Đảm bảo an toàn cho vật nuôi và hiệu quả điều trị Vì: Kiểm tra nhiễm khuẩn giúp ngăn ngừa các nguy cơ nhiễm trùng cho vật nuôi và đảm bảo thuốc phát huy tác dụng.","reference":"Mục 6.6"},{"id":28,"text":"Phương pháp nào sau đây phù hợp nhất để kiểm tra thể tích dung dịch trong dây chuyền sản xuất lớn?","answers":["A. Lắc nhẹ để ước lượng thể tích","B. Đo bằng nhiệt kế thủy ngân","C. Sử dụng máy đo thể tích tự động","D. Nhỏ từng giọt vào cốc đong"],"correct":2,"explanation":"Đáp án đúng là: Sử dụng máy đo thể tích tự động Vì: Máy đo thể tích tự động giúp kiểm tra nhanh, chính xác và phù hợp với quy mô công nghiệp.","reference":"Mục 6.3"},{"id":29,"text":"Trong kiểm tra độ trong, bước nào sau đây cần thực hiện trước khi tiến hành đo bằng turbidimeter?","answers":["A. Đun nóng dung dịch đến 60°C","B. Hiệu chuẩn thiết bị với dung dịch chuẩn","C. Thêm chất chỉ thị màu vào mẫu","D. Lắc mạnh dung dịch trước khi đo"],"correct":1,"explanation":"Đáp án đúng là: Hiệu chuẩn thiết bị với dung dịch chuẩn Vì: Hiệu chuẩn với dung dịch chuẩn giúp đảm bảo độ chính xác cho kết quả đo độ đục.","reference":"Mục 6.2"},{"id":30,"text":"Thiết bị nào sau đây có thể đánh giá chính xác số lượng và kích thước hạt trong dung dịch tiêm truyền?","answers":["A. Máy đo pH","B. Máy đếm tiểu phân tự động","C. Máy đo độ nhớt","D. Cân phân tích điện tử"],"correct":1,"explanation":"Đáp án đúng là: Máy đếm tiểu phân tự động Vì: Máy đếm tiểu phân tự động có độ chính xác cao, dùng để kiểm tra độ trong trong các dung dịch yêu cầu nghiêm ngặt như dung dịch tiêm truyền.","reference":"Mục 6.2"},{"id":31,"text":"Khi đo tỷ trọng, yếu tố nào cần kiểm soát để đảm bảo độ chính xác?","answers":["A. Loại chai lọ đựng dung dịch","B. Độ ẩm không khí","C. Màu sắc của dung dịch","D. Nhiệt độ dung dịch đo"],"correct":3,"explanation":"Đáp án đúng là: Nhiệt độ dung dịch đo Vì: Tỷ trọng phụ thuộc vào nhiệt độ, do đó cần kiểm tra ở nhiệt độ quy định hoặc hiệu chỉnh kết quả.","reference":"Mục 6.5"},{"id":32,"text":"Khi kiểm tra bằng thiết bị đo độ đục (turbidimeter), ánh sáng tán xạ thường được đo ở góc bao nhiêu?","answers":["A. 90 độ","B. 180 độ","C. 45 độ","D. 0 độ"],"correct":0,"explanation":"Đáp án đúng là: 90 độ Vì: Turbidimeter đo ánh sáng tán xạ tại góc 90 độ để xác định giá trị độ đục của dung dịch.","reference":"Mục 6.2"},{"id":33,"text":"Màu sắc của thuốc cần phù hợp với tiêu chuẩn nào?","answers":["A. Màu sắc do chuyên gia đánh giá bằng cảm tính","B. Tiêu chuẩn cảm quan của các thuốc khác","C. Tiêu chuẩn đã đăng ký","D. Màu sắc theo quy định chung của dược điển"],"correct":2,"explanation":"Đáp án đúng là: Tiêu chuẩn đã đăng ký Vì: Màu sắc thuốc cần phù hợp với tiêu chuẩn đã đăng ký để đảm bảo tính ổn định và chất lượng sản phẩm.","reference":"Mục 6.1"},{"id":34,"text":"Vì sao cần tuân thủ quy định pháp lý về độ nhiễm khuẩn trong thuốc thú y?","answers":["A. Để giảm số lần tiêm cho vật nuôi","B. Vì quy định bắt buộc phải làm xét nghiệm máu","C. Để đảm bảo chất lượng và tránh gây hại cho người sử dụng và vật nuôi","D. Vì thuốc có thể tự vô trùng sau một thời gian"],"correct":2,"explanation":"Đáp án đúng là: Để đảm bảo chất lượng và tránh gây hại cho người sử dụng và vật nuôi Vì: Quy định về độ nhiễm khuẩn nhằm đảm bảo sản phẩm an toàn cho vật nuôi, người sử dụng và đúng tiêu chuẩn chất lượng.","reference":"Mục 6.6"},{"id":35,"text":"Mục đích chính của việc kiểm tra độ trong dung dịch là gì?","answers":["A. Xác định hoạt chất chính","B. Kiểm tra độ ổn định hóa học","C. Đánh giá độ tinh khiết và chất lượng dung dịch","D. Kiểm tra khả năng hấp thu ánh sáng"],"correct":2,"explanation":"Đáp án đúng là: Đánh giá độ tinh khiết và chất lượng dung dịch Vì: Độ trong giúp phát hiện sự hiện diện của tạp chất, hạt rắn không tan ảnh hưởng đến chất lượng và an toàn sản phẩm.","reference":"Mục 6.2"},{"id":36,"text":"Ưu điểm chính của Densitometer là gì?","answers":["A. Đo nhanh, chính xác, tự động","B. Không bị ảnh hưởng bởi nhiệt độ","C. Có thể dùng cho mọi loại chất rắn và lỏng","D. Không cần điện để hoạt động"],"correct":0,"explanation":"Đáp án đúng là: Đo nhanh, chính xác, tự động Vì: Densitometer là thiết bị hiện đại, độ chính xác cao, thường dùng trong sản xuất quy mô lớn.","reference":"Mục 6.5"},{"id":37,"text":"Khi kiểm tra cảm quan dung dịch thuốc, cần quan sát dưới loại ánh sáng nào?","answers":["A. Ánh sáng tự nhiên hoặc ánh sáng trắng tiêu chuẩn","B. Ánh sáng huỳnh quang xanh","C. Ánh sáng nhân tạo thông thường","D. Ánh sáng vàng ấm để dễ nhận diện màu"],"correct":0,"explanation":"Đáp án đúng là: Ánh sáng tự nhiên hoặc ánh sáng trắng tiêu chuẩn Vì: Quan sát bằng ánh sáng tự nhiên hoặc trắng tiêu chuẩn giúp phát hiện chính xác màu sắc, độ đục, dị vật.","reference":"Mục 6.1"},{"id":38,"text":"Phương pháp nào dưới đây đo tỷ trọng bằng nguyên lý nổi của vật trong dung dịch?","answers":["A. Phương pháp chuẩn độ thể tích","B. Phương pháp dùng Densitometer","C. Phương pháp dùng thủy kế (hydrometer)","D. Phương pháp sắc ký lỏng"],"correct":2,"explanation":"Đáp án đúng là: Phương pháp dùng thủy kế (hydrometer) Vì: Thủy kế hoạt động dựa trên nguyên lý nổi, đọc kết quả theo mức chìm của dụng cụ trong dung dịch.","reference":"Mục 6.5"},{"id":39,"text":"Tỷ trọng của dung dịch là gì?","answers":["A. Là tỷ lệ giữa nồng độ và thể tích","B. Là tỷ lệ giữa khối lượng riêng và nồng độ","C. Là tỷ lệ giữa thể tích và nhiệt độ","D. Là tỷ lệ giữa khối lượng và thể tích của dung dịch"],"correct":3,"explanation":"Đáp án đúng là: Là tỷ lệ giữa khối lượng và thể tích của dung dịch Vì: Tỷ trọng được xác định bằng công thức ρ = m/V, là chỉ tiêu quan trọng trong kiểm nghiệm dung dịch.","reference":"Mục 6.5"},{"id":40,"text":"Khi sử dụng máy đo pH, bước nào sau đây là cần thiết để đảm bảo độ chính xác?","answers":["A. Hiệu chuẩn thiết bị bằng dung dịch chuẩn","B. Nhúng điện cực vào bất kỳ dung dịch nào","C. Sử dụng ngay khi lấy ra khỏi hộp","D. Đo ở nhiệt độ bất kỳ"],"correct":0,"explanation":"Đáp án đúng là: Hiệu chuẩn thiết bị bằng dung dịch chuẩn Vì: Hiệu chuẩn thiết bị trước khi đo giúp đảm bảo kết quả pH chính xác.","reference":"Mục 6.4"},{"id":41,"text":"Vì sao không nên kiểm tra cảm quan trong điều kiện ánh sáng yếu hoặc ánh sáng có màu sắc không tự nhiên?","answers":["A. Gây sai lệch kết quả định lượng hoạt chất","B. Không ảnh hưởng đáng kể đến cảm quan","C. Làm mẫu thử bị biến tính","D. Dễ gây sai lệch khi quan sát màu sắc, độ trong và dị vật"],"correct":3,"explanation":"Đáp án đúng là: Dễ gây sai lệch khi quan sát màu sắc, độ trong và dị vật Vì: Ánh sáng không phù hợp khiến việc quan sát trở nên kém chính xác, có thể bỏ sót các dấu hiệu bất thường.","reference":"Mục 6.1"},{"id":42,"text":"Mục đích chính của việc kiểm tra pH dung dịch thuốc thú y là gì?","answers":["A. Xác định hàm lượng hoạt chất","B. Xác định độ hòa tan của tá dược","C. Kiểm tra độ nhớt của thuốc","D. Đảm bảo ổn định và an toàn của thuốc"],"correct":3,"explanation":"Đáp án đúng là: Đảm bảo ổn định và an toàn của thuốc Vì: pH ảnh hưởng đến sự ổn định hoạt chất và an toàn khi sử dụng, đặc biệt với thuốc tiêm.","reference":"Mục 6.4"},{"id":43,"text":"Việc nhẹ nhàng mở nắp và ngửi thuốc giúp phát hiện điều gì?","answers":["A. Độ bay hơi của dung môi","B. Mùi lạ hoặc bất thường","C. Nồng độ hoạt chất dễ bay hơi","D. Thời hạn sử dụng của thuốc"],"correct":1,"explanation":"Đáp án đúng là: Mùi lạ hoặc bất thường Vì: Mùi bất thường có thể là dấu hiệu của sự phân hủy, nhiễm khuẩn hoặc thay đổi thành phần.","reference":"Mục 6.1"},{"id":44,"text":"Một lọ dung dịch có nhãn ghi 10 ml, thực tế đo được 9,8 ml. Theo tiêu chuẩn cho phép ±10%, vậy kết luận lọ thuốc này như nào?","answers":["A. Không đạt vì thiếu thể tích","B. Phải kiểm tra lại độ đục","C. Bị loại ngay lập tức","D. Vẫn đạt yêu cầu"],"correct":3,"explanation":"Đáp án đúng là: Vẫn đạt yêu cầu Vì: 9,8 ml nằm trong khoảng cho phép 9,0–11,0 ml nên vẫn đạt yêu cầu.","reference":"Mục 6.3"},{"id":45,"text":"Yêu cầu kỹ thuật khi đọc mức thể tích trên dụng cụ đo là gì?","answers":["A. Đọc trong điều kiện ánh sáng mờ","B. Đọc nhanh để tránh bay hơi","C. Mắt phải ngang tầm với mức dung dịch","D. Đọc từ phía trên miệng bình"],"correct":2,"explanation":"Đáp án đúng là: Mắt phải ngang tầm với mức dung dịch Vì: Đọc ngang tầm tránh sai số do góc nhìn (hiện tượng parallax).","reference":"Mục 6.3"},{"id":46,"text":"Trong phương pháp cân gián tiếp để kiểm tra thể tích, cần thêm thông tin nào để tính được thể tích?","answers":["A. Độ nhớt của dung dịch","B. Nhiệt độ môi trường","C. Tỷ lệ phần trăm hoạt chất","D. Khối lượng riêng của dung dịch"],"correct":3,"explanation":"Đáp án đúng là: Khối lượng riêng của dung dịch Vì: Từ khối lượng dung dịch và khối lượng riêng, ta tính được thể tích chính xác.","reference":"Mục 6.3"},{"id":47,"text":"pH quá thấp hoặc quá cao trong thuốc thú y có thể gây hậu quả gì?","answers":["A. Làm thuốc dễ bay hơi hơn","B. Không gây ảnh hưởng gì","C. Gây kích ứng, tổn thương mô ở vật nuôi","D. Làm tăng hiệu lực thuốc"],"correct":2,"explanation":"Đáp án đúng là: Gây kích ứng, tổn thương mô ở vật nuôi Vì: Thuốc có pH không phù hợp dễ gây viêm, kích ứng tại vị trí tiêm.","reference":"Mục 6.4"},{"id":48,"text":"Phương pháp cảm quan giúp phát hiện điều gì trong kiểm nghiệm thuốc?","answers":["A. Đo độ tan và độ rã của thuốc","B. Đánh giá nhanh và tổng quát các đặc điểm bên ngoài của thuốc","C. Kiểm tra độ tinh khiết của dung môi","D. Xác định thành phần hoạt chất trong thuốc"],"correct":1,"explanation":"Đáp án đúng là: Đánh giá nhanh và tổng quát các đặc điểm bên ngoài của thuốc Vì: Phương pháp cảm quan giúp phát hiện nhanh các sai sót về hình thức, màu sắc, mùi vị, bao bì có thể ảnh hưởng đến chất lượng và an toàn của thuốc.","reference":"Mục 6.1"},{"id":49,"text":"Sau khi đo pH bằng máy, việc xử lý điện cực đúng là gì?","answers":["A. Ngâm điện cực trong nước muối sinh lý","B. Để khô hoàn toàn rồi cất","C. Dùng khăn lau mạnh điện cực","D. Rửa bằng nước cất và bảo quản đúng cách"],"correct":3,"explanation":"Đáp án đúng là: Rửa bằng nước cất và bảo quản đúng cách Vì: Việc vệ sinh và bảo quản đúng giúp duy trì độ chính xác và tuổi thọ điện cực.","reference":"Mục 6.4"},{"id":50,"text":"Kiểm tra thể tích dung dịch nhằm mục đích gì?","answers":["A. Đánh giá mức độ hòa tan của dược chất","B. Đảm bảo lượng dung dịch thực tế phù hợp với thể tích ghi nhãn","C. Xác định độ tinh khiết của dung dịch","D. Kiểm tra độ ổn định của hoạt chất"],"correct":1,"explanation":"Đáp án đúng là: Đảm bảo lượng dung dịch thực tế phù hợp với thể tích ghi nhãn Vì: Việc kiểm tra giúp đảm bảo người dùng nhận đúng lượng thuốc như cam kết trên nhãn.","reference":"Mục 6.3"}];
</script>

<script>
(function () {
  var LETTERS = "ABCDEFGHIJ";
  var container = document.getElementById("questionContainer");
  var noResults = document.getElementById("noResults");
  var searchInput = document.getElementById("searchInput");
  var searchClear = document.getElementById("searchClear");
  var countEl = document.getElementById("searchCount");
  var total = QUESTIONS.length;

  /* ── Escape HTML ── */
  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  /* ── Highlight từ khóa ── */
  function highlight(text, term) {
    if (!term) return esc(text);
    var safe = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return esc(text).replace(
      new RegExp("(" + safe.replace(/&amp;/g, "&amp;amp;") + ")", "gi"),
      "<mark>$1</mark>"
    );
  }

  /* ── Render 1 câu hỏi ── */
  function renderQ(q, term) {
    var answersHtml = q.answers.map(function (ans, i) {
      var isCorrect = i === q.correct;
      var cls = "answer-item" + (isCorrect ? " correct" : "");
      var check = isCorrect ? '<span class="check-mark">&#10003;</span>' : "";
      return (
        '<div class="' + cls + '">' +
        '<span class="answer-letter">' + (LETTERS[i] || i + 1) + ".</span>" +
        '<span class="answer-text">' + highlight(ans, term) + "</span>" +
        check +
        "</div>"
      );
    }).join("");

    var feedbackHtml = "";
    if (q.explanation || q.reference) {
      feedbackHtml =
        '<div class="feedback-section">' +
        (q.explanation
          ? "<p><strong>Vì: </strong>" + esc(q.explanation) + "</p>"
          : "") +
        (q.reference
          ? "<p><strong>Tham khảo: </strong>" + esc(q.reference) + "</p>"
          : "") +
        "</div>";
    }

    return (
      '<div class="question-block" id="q' + q.id + '">' +
      '<div class="question-header">' +
      '<span class="q-badge">Câu ' + q.id + "</span>" +
      "</div>" +
      '<div class="question-text">' + highlight(q.text, term) + "</div>" +
      '<div class="answers">' + answersHtml + "</div>" +
      feedbackHtml +
      "</div>"
    );
  }

  /* ── Render danh sách câu hỏi ── */
  function renderList(filtered, term) {
    // Xóa các block cũ (giữ lại #noResults)
    var old = container.querySelectorAll(".question-block");
    old.forEach(function (el) { el.remove(); });

    if (filtered.length === 0) {
      noResults.style.display = "block";
    } else {
      noResults.style.display = "none";
      var frag = document.createDocumentFragment();
      filtered.forEach(function (q) {
        var div = document.createElement("div");
        div.innerHTML = renderQ(q, term);
        frag.appendChild(div.firstChild);
      });
      container.appendChild(frag);
    }

    countEl.innerHTML =
      "<strong>" + filtered.length + "</strong> / " + total + " câu";
  }

  /* ── Lọc câu hỏi ── */
  function doSearch(term) {
    var t = term.trim().toLowerCase();
    var filtered = t
      ? QUESTIONS.filter(function (q) {
          return (
            q.text.toLowerCase().includes(t) ||
            q.answers.some(function (a) { return a.toLowerCase().includes(t); })
          );
        })
      : QUESTIONS;

    searchClear.style.display = term ? "block" : "none";
    renderList(filtered, term.trim());
  }

  /* ── Khởi tạo ── */
  renderList(QUESTIONS, "");

  searchInput.addEventListener("input", function () {
    doSearch(this.value);
  });
  searchClear.addEventListener("click", function () {
    searchInput.value = "";
    doSearch("");
    searchInput.focus();
  });

  /* ── Scroll to top ── */
  var scrollBtn = document.getElementById("scrollTopBtn");
  window.addEventListener("scroll", function () {
    scrollBtn.style.display = window.scrollY > 320 ? "flex" : "none";
  }, { passive: true });
  scrollBtn.addEventListener("click", function (e) {
    e.preventDefault();
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
})();
</script>
</body>
</html>
